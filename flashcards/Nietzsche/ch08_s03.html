<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Nietzsche's term for the systematic re-examination and reversal of Christian moral values?", "back": "The Transvaluation of All Values (Umwertung aller Werte)."}, {"front": "In the context of \"The Antichrist,\" how does Nietzsche define \"Good\"?", "back": "Whatever augments the feeling of power, the will to power, or power itself in man."}, {"front": "According to Nietzsche, what is the source of all that is \"Evil\"?", "back": "Whatever springs from weakness."}, {"front": "How does Nietzsche define \"Happiness\" in terms of power?", "back": "The feeling that power increases and that resistance is overcome."}, {"front": "What mythical people does Nietzsche use to represent those who have moved beyond conventional morality?", "back": "The Hyperboreans."}, {"front": "According to Nietzsche's preamble, what is the formula for the Hyperboreans' happiness?", "back": "A Yea, a Nay, a straight line, a goal."}, {"front": "Term: Virtù (Renaissance sense)", "back": "Definition: Excellence, strength, and mastery free of Christian moral connotations."}, {"front": "What does Nietzsche identify as the first principle of his \"charity\" regarding the weak and botched?", "back": "That they shall perish and one should help them to it."}, {"front": "Why does Nietzsche claim Christianity is more harmful than any vice?", "back": "It practices sympathy for the \"botched and the weak.\""}, {"front": "In Nietzsche's view, what type of man is willed and cultivated by the \"terror\" of the higher type?", "back": "The domestic animal, the herd animal, or the \"Christian.\""}, {"front": "How does Nietzsche characterize the modern idea of \"progress\"?", "back": "A false idea that does not necessarily represent evolution toward a higher level."}, {"front": "Which philosopher does Nietzsche use as a \"lamentable example\" of an intellect destroyed by Christianity?", "back": "Blaise Pascal."}, {"front": "Term: Décadence", "back": "Definition: A condition of declining vitality and exhaustion where one prefers what is injurious to themselves."}, {"front": "Nietzsche argues that all the highest values of humanity are currently emptied of the _____.", "back": "Will to power"}, {"front": "Why does Nietzsche call pity a \"depressant\"?", "back": "It results in a drain of strength and energy, multiplying the effects of suffering."}, {"front": "How does pity interfere with the law of natural selection?", "back": "It preserves and maintains life in those who are \"ripe for destruction.\""}, {"front": "Nietzsche describes pity as the \"technic of _____.\"", "back": "Nihilism"}, {"front": "What Greek philosopher viewed pity as a \"dangerous state of mind\" requiring a \"purgative\" like tragedy?", "back": "Aristotle."}, {"front": "According to Nietzsche, why is the Christian world of \"imaginary causes\" worse than a world of dreams?", "back": "Dreams reflect reality, whereas Christianity's fictitious world falsifies, cheapens, and denies it."}, {"front": "What does a \"nation that still believes in itself\" honor in its god?", "back": "The conditions that enable it to survive and its own feeling of power."}, {"front": "According to Nietzsche, when does a nation overhaul its god into a \"good god\"?", "back": "When the nation is on a downward path and begins to value submission as a necessity."}, {"front": "How does the \"god of the great majority\" differ from a \"proud heathen god\"?", "back": "He is a \"democrat among gods,\" becoming pale, weak, and a \"staff for the weary.\""}, {"front": "Concept: The Redeemer Type", "back": "Definition: The psychological type of Jesus characterized by an inability to be an enemy and the practice of \"not resisting evil.\""}, {"front": "How does Nietzsche contrast the psychological honesty of Buddhism and Christianity?", "back": "Buddhism is a technique for reducing suffering, while Christianity uses guilt and sin to explain it."}, {"front": "Nietzsche claims that Buddhism is a religion for the _____ of a civilization.", "back": "End"}, {"front": "In Nietzsche's analysis, what is the \"Kingdom of God\" for the historical Jesus?", "back": "An inner state or way of experiencing life, not a future reward."}, {"front": "Who does Nietzsche identify as the \"genius for hatred\" who founded the actual religion of Christianity?", "back": "Paul of Tarsus."}, {"front": "Term: Dysangelium", "back": "Definition: Nietzsche's term for \"bad tidings,\" representing the corruption of Jesus' original message."}, {"front": "What \"un-evangelical\" feeling did the disciples experience after the death of Jesus, according to Nietzsche?", "back": "Revenge."}, {"front": "Nietzsche argues that by elevating Jesus as the \"Only Son of God,\" the disciples were motivated by _____.", "back": "Ressentiment (resentment)"}, {"front": "What doctrine does Nietzsche call the \"most vicious outrage upon noble humanity ever perpetrated\"?", "back": "Personal immortality."}, {"front": "How does the lie of \"personal immortality\" destroy natural instinct?", "back": "It shifts the center of gravity from life itself to \"the beyond\" or nothingness."}, {"front": "Nietzsche claims that \"equal rights for all\" is a poisonous doctrine rooted in _____.", "back": "Christian principles and the ressentiment of the masses."}, {"front": "What ancient Indian law-book does Nietzsche contrast favorably with the New Testament?", "back": "The Code of Manu."}, {"front": "According to the Code of Manu, which caste has the sole \"right to beauty\" and the \"privileges of the few\"?", "back": "The intellectual caste (the superior caste)."}, {"front": "In Nietzsche's social hierarchy, what is the primary duty of the \"second caste\"?", "back": "To be the guardians of the law and the executive arm of the intellectuals."}, {"front": "Why does Nietzsche believe mediocrity is necessary for a high civilization?", "back": "A high civilization is a pyramid that requires a strong and consolidated base of specialized workers."}, {"front": "Term: Chandala", "back": "Definition: The lowest caste; used by Nietzsche to describe those driven by envy and revenge against the noble."}, {"front": "Nietzsche labels Christianity as the \"_____ of the imperium Romanum.\"", "back": "Vampire"}, {"front": "What does Nietzsche call \"the one great war of the past\" that attempted to transvalue Christian values?", "back": "The Renaissance."}, {"front": "Why does Nietzsche despise Martin Luther?", "back": "Luther's rebellion against the papacy restored the church and crushed the Renaissance."}, {"front": "What is the \"Christian dynamite\" that Nietzsche claims leads to the overthrow of the social order?", "back": "The concept of the \"equality of souls before God.\""}, {"front": "According to Nietzsche, why does the Christian church \"create distress\"?", "back": "To make itself immortal, as it lives by the distress it claims to heal."}, {"front": "Nietzsche claims the Jewish priesthood \"denaturized\" the concept of God by turning Him into a God of _____.", "back": "Justice (used as a weapon of clerical reward and punishment)"}, {"front": "In Nietzsche's view, why does the priest require the existence of \"sin\"?", "back": "Sin is the priest's primary weapon of power; he lives upon the submissiveness of the \"repentant.\""}, {"front": "What does Nietzsche identify as the \"true key\" to the Gospels?", "back": "The sentence \"Resist not evil!\""}, {"front": "How did Paul's \"vision at Damascus\" change the focus of Jesus' message?", "back": "He shifted the center of gravity to the lie of the \"risen\" Jesus and the promise of a beyond."}, {"front": "What does Nietzsche describe as the \"one immortal blemish upon the human race\"?", "back": "Christianity."}, {"front": "Nietzsche argues that \"natural causation\" was swept out of the world by the doctrines of _____.", "back": "Reward and punishment."}, {"front": "According to Nietzsche, what culture in Spain was more \"fundamentally nearer to us\" than Rome or Greece?", "back": "The Moorish (Mohammedan) civilization."}, {"front": "What German emperor does Nietzsche praise as a \"great free spirit\" for his hostility toward Rome?", "back": "Frederick II."}, {"front": "How does Nietzsche define \"corruption\" in a species or individual?", "back": "When it loses its instincts and chooses what is injurious to it."}, {"front": "Nietzsche asserts that the \"European of today\" falls far below the European of the _____.", "back": "Renaissance"}, {"front": "What does Nietzsche call the \"most profound sentence in the Gospels\"?", "back": "\"Resist not evil!\""}, {"front": "What was the \"master crime against history\" perpetrated by the Jewish priesthood according to Nietzsche?", "back": "Translating the past of their people into an \"idiotic mechanism of salvation.\""}, {"front": "Nietzsche claims that the \"will to power\" failing results in _____.", "back": "Disaster"}, {"front": "What does Nietzsche call the \"most magnificent form of organization\" ever achieved?", "back": "The Imperium Romanum (Roman Empire)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
