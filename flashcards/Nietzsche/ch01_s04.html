    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "During which years did Nietzsche's productive career span?", "back": "1872 to 1888."}, {"front": "What was the title of Nietzsche's first book, published in 1872?", "back": "The Birth of Tragedy."}, {"front": "Concept: Apollonian drive", "back": "Definition: An artistic impulse representing order, form, beauty, and individuation."}, {"front": "Concept: Dionysian drive", "back": "Definition: An artistic impulse representing chaos, ecstasy, and the dissolution of the self."}, {"front": "According to Nietzsche's first book, Greek tragedy resulted from the tension between which two impulses?", "back": "The Apollonian and the Dionysian."}, {"front": "In 'The Birth of Tragedy', how does the Apollonian drive interact with the Dionysian encounter with formless reality?", "back": "The Apollonian gives shape and meaning to the Dionysian terror."}, {"front": "Which modern composer's music did Nietzsche initially defend as the rebirth of tragic art?", "back": "Richard Wagner."}, {"front": "Whose devastating review effectively destroyed Nietzsche’s reputation in classical philology?", "back": "Ulrich von Wilamowitz-Moellendorff."}, {"front": "How did Nietzsche describe the style of 'The Birth of Tragedy' in his 1886 self-criticism?", "back": "As badly written, heavy, embarrassing, and image-muddled."}, {"front": "Which 1878 book marked Nietzsche's break with the influences of Schopenhauer and Wagner?", "back": "Human, All Too Human."}, {"front": "In what specific literary form did Nietzsche write 'Human, All Too Human'?", "back": "Short, numbered aphorisms."}, {"front": "To which Enlightenment figure, despised by Wagner, was 'Human, All Too Human' dedicated?", "back": "Voltaire."}, {"front": "What is the literal translation of the German title 'Die fr\\\"ohliche Wissenschaft'?", "back": "The Joyful Science or The Gay Science."}, {"front": "The title 'The Gay Science' evokes the term 'gai saber' used by which group?", "back": "Provencal troubadours."}, {"front": "How does Nietzsche define 'gay science' in contrast to academic scholarship?", "back": "Philosophy pursued with joy, lightness, and artistic flair rather than grim solemnity."}, {"front": "In which book does Nietzsche first introduce the parable of the madman and the phrase \"God is dead\"?", "back": "The Gay Science (Book Three, aphorism 125)."}, {"front": "What thought experiment is introduced at the close of Book Four of 'The Gay Science'?", "back": "Eternal recurrence."}, {"front": "Describe the core premise of the 'eternal recurrence' thought experiment.", "back": "The possibility of living one's entire life over again, identically, for all eternity."}, {"front": "In what literary style is 'Thus Spoke Zarathustra' written?", "back": "Philosophical prose-poetry with biblical rhythms."}, {"front": "Which three major concepts does the figure Zarathustra teach humanity?", "back": "The Overman ($\\ddot{U}bermensch$), the death of God, and eternal recurrence."}, {"front": "Nietzsche described 'Beyond Good and Evil' as a companion piece to which earlier work?", "back": "Thus Spoke Zarathustra."}, {"front": "What is the subtitle of 'Beyond Good and Evil'?", "back": "Prelude to a Philosophy of the Future."}, {"front": "In 'Ecce Homo', Nietzsche describes the task of 'Beyond Good and Evil' as the _____ of existing values.", "back": "Revaluation."}, {"front": "Which section of 'Beyond Good and Evil' contains the portrait of \"noble\" versus \"slave\" morality?", "back": "Part IX."}, {"front": "What are the primary subjects of Part I and Part II of 'Beyond Good and Evil'?", "back": "The prejudices of philosophers and the \"free spirit.\""}, {"front": "How does the structure of 'On the Genealogy of Morals' differ from 'Beyond Good and Evil'?", "back": "It consists of three sustained, argued essays rather than aphoristic leaps."}, {"front": "According to the First Essay of the 'Genealogy', what is the origin of master morality?", "back": "Values created by the strong out of self-affirmation."}, {"front": "In the 'Genealogy', what psychological state drives the creation of slave morality?", "back": "Ressentiment."}, {"front": "According to the Second Essay of the 'Genealogy', where does the feeling of guilt originate?", "back": "In the debtor-creditor relationship."}, {"front": "How does Nietzsche define \"bad conscience\" in 'On the Genealogy of Morals'?", "back": "The internalization of aggressive instincts."}, {"front": "What is the central question explored in the Third Essay of the 'Genealogy'?", "back": "What is the meaning of ascetic ideals?"}, {"front": "In the context of ascetic ideals, how does Nietzsche characterize the \"ascetic priest\"?", "back": "As the doctor of the sick."}, {"front": "What does Nietzsche identify as the latest form of the ascetic ideal?", "back": "Science."}, {"front": "Which 1888 work served as Nietzsche's final \"settling of accounts\" with Richard Wagner?", "back": "The Case of Wagner."}, {"front": "What is the alternative title for 'Twilight of the Idols'?", "back": "How One Philosophizes with a Hammer."}, {"front": "In 'The Antichrist', whom does Nietzsche blame for building the religion associated with Jesus's name?", "back": "Paul (the Apostle)."}, {"front": "What is the nature of Nietzsche's autobiographical work 'Ecce Homo'?", "back": "A reflection on his life and works, written in a state of increasing euphoria."}, {"front": "Why is the book 'The Will to Power' considered a \"posthumous fabrication\"?", "back": "It was assembled and altered by Nietzsche's sister from unpublished notebooks to serve her own ideology."}, {"front": "Who was responsible for assembling and editing 'The Will to Power' after Nietzsche's death?", "back": "His sister, Elisabeth."}, {"front": "True or False: The concept of \"will to power\" is illegitimate because the book of that name is a fabrication.", "back": "False, Nietzsche uses the concept throughout his legitimate published works."}, {"front": "Why did Nietzsche reject systematic philosophy as a method?", "back": "He viewed it as a form of intellectual dishonesty that falsely tried to fit the world into a logical structure."}, {"front": "What is the intended effect of Nietzsche's aphoristic style on the reader?", "back": "It forces the reader to think, question, and struggle rather than passively receiving conclusions."}, {"front": "Which work is described as the dramatic and mythic version of the ideas found in 'Beyond Good and Evil'?", "back": "Thus Spoke Zarathustra."}, {"front": "In 'The Birth of Tragedy', what medium represents the meeting point where the Apollonian and Dionysian produce the sublime?", "back": "Tragedy."}, {"front": "Aphorism 125 in 'The Gay Science' features which character announcing the death of God?", "back": "The madman."}, {"front": "What was Nietzsche's academic title at the University of Basel?", "back": "Professor of philology."}, {"front": "The Second Essay of the 'Genealogy' explores how humans became capable of which specific social action?", "back": "Making promises."}, {"front": "How does Nietzsche generally treat the figure of Jesus in 'The Antichrist'?", "back": "With surprising sympathy."}, {"front": "What is the primary theme of Part III of 'Beyond Good and Evil'?", "back": "Religion."}, {"front": "In 'Beyond Good and Evil', Nietzsche identifies the \"No-saying\" part of his task as the revaluation of values; what was the \"Yes-saying\" part?", "back": "Thus Spoke Zarathustra."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
