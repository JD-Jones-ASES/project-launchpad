    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the core belief of the ascetic ideal?", "back": "The belief that the highest form of human life involves systematic self-denial and spiritual discipline."}, {"front": "The Greek word askesis, the root of 'ascetic,' originally referred to what activity?", "back": "Athletic training or exercise."}, {"front": "According to Nietzsche's 'horror vacui' theory, what does man dread most?", "back": "Emptiness or meaninglessness."}, {"front": "Nietzsche claims that man would 'sooner will _____ than not will at all.'", "back": "nothingness"}, {"front": "What is the 'genealogical method' as applied to the ascetic ideal?", "back": "Breaking the ideal apart to show how different types of people adopt it for different reasons."}, {"front": "For the majority of mortals (physiological failures), the ascetic ideal serves as a weapon against what?", "back": "Lingering pain and ennui."}, {"front": "What does the ascetic ideal represent for priests?", "back": "Their best engine of power and supreme authority."}, {"front": "Which composer does Nietzsche use as the primary example of an artist capitulating to the ascetic ideal?", "back": "Richard Wagner."}, {"front": "What late work by Richard Wagner does Nietzsche view as a betrayal of life and a 'reversion to morbid Christian ideals'?", "back": "Parsifal"}, {"front": "Nietzsche argues that there is no 'necessary antithesis' between which two concepts in sound minds?", "back": "Chastity and sensuality."}, {"front": "According to Nietzsche, what is the typical relationship between an artist and their work's meaning?", "back": "The artist is merely the 'womb' or 'soil' and should be forgotten to enjoy the work."}, {"front": "What is Nietzsche's conclusion regarding the meaning of ascetic ideals for artists?", "back": "They mean 'nothing at all' because artists always play the valet to some other authority."}, {"front": "Which philosopher served as the 'covering man' or 'rampart' for Wagner's later ascetic turn?", "back": "Arthur Schopenhauer."}, {"front": "In Schopenhauer's aesthetics, music is understood as the direct language of what?", "back": "The will itself."}, {"front": "For a philosopher, the ascetic ideal represents an instinct for the conditions most favorable to _____.", "back": "advanced intellectualism"}, {"front": "What are the three great 'catch-words' of the ascetic ideal that philosophers adopt as natural conditions?", "back": "Poverty, humility, and chastity."}, {"front": "Why does a philosopher typically embrace chastity according to Nietzsche?", "back": "To ensure their dominant intellectual instinct can utilize all their strength for the growing work."}, {"front": "What three 'brilliant and noisy things' does a philosopher instinctively shun?", "back": "Fame, princes, and women."}, {"front": "How does Nietzsche define the philosopher's 'desert'?", "back": "A state of deliberate obscurity and withdrawal from the 'democratic babble' of the present."}, {"front": "Nietzsche views Schopenhauer's philosophy as an expression of the ascetic ideal that says '_____' to life.", "back": "no"}, {"front": "What is the primary historical mission of the ascetic priest?", "back": "To act as the saviour and herdsman of the 'sick herd' of sufferers."}, {"front": "The ascetic priest wields power by acting as the 'diverter' of what emotion?", "back": "Resentment."}, {"front": "According to Nietzsche, what is the physiological cause of the demand for resentment in sufferers?", "back": "The desire to deaden racking pain through a more violent emotion."}, {"front": "What 'ingenious' move does the ascetic priest make when a sufferer asks who is to blame for their pain?", "back": "He tells the sufferer that the fault lies solely with themselves."}, {"front": "What is the negative consequence of the priest interpreting suffering as guilt?", "back": "It transforms mere pain into internal, gnawing suffering that poisons the soul."}, {"front": "Nietzsche describes the ascetic priest as a doctor who treats the symptom of meaninglessness while worsening the _____.", "back": "disease (suffering itself)"}, {"front": "Why does Nietzsche consider modern science to be a form of the ascetic ideal?", "back": "It is driven by an unconditional, metaphysical 'will to truth' at any cost."}, {"front": "What question can science not ask about itself, according to Nietzsche?", "back": "The question of its own value (e.g., 'Why is truth worth pursuing?')."}, {"front": "How does Nietzsche view 'honest atheism' in relation to Christian morality?", "back": "As the final phase of a two-thousand-year training in truth that finally forbids the 'lie' of God."}, {"front": "Nietzsche argues that Christianity as a dogma was destroyed by its own _____.", "back": "morality (specifically the requirement of truthfulness)"}, {"front": "What is the 'great hundred-act play' Nietzsche predicts for the next two centuries of Europe?", "back": "The self-dissolution of morality as the 'will to truth' becomes self-conscious."}, {"front": "According to the essay's conclusion, what is the only thing man cannot endure?", "back": "Suffering without meaning (senseless suffering)."}, {"front": "The ascetic ideal 'saved' the human will by giving it what direction?", "back": "A direction toward nothingness (Wille zum Nichts)."}, {"front": "What does Nietzsche call the 'will opposed to life' that nonetheless affirms the ability to 'will'?", "back": "The Will to Nothingness (Wille zum Nichts)."}, {"front": "In the case of saints, the ascetic ideal serves as a 'pretext for hibernation' and their peace in _____.", "back": "nothingness (or 'God')"}, {"front": "What was the 'word of redemption' for the young Wagner during the 1830s and 40s?", "back": "Healthy sensuality (following Feuerbach)."}, {"front": "Nietzsche defines 'Hybris' in modern times as our violation of nature through _____.", "back": "machinery and scientific experimentation"}, {"front": "What philosopher's motto was 'He who possesses is possessed'?", "back": "The typical philosopher (as a general motto for their lifestyle)."}, {"front": "Concept: Wille zum Nichts", "back": "Definition: The 'will to nothingness'; a life-denying purpose that humans embrace rather than face the horror of purposelessness."}, {"front": "What was the 'faute de mieux' (best available option) that filled the 'tremendous gap' in human meaning?", "back": "The ascetic ideal."}, {"front": "Nietzsche observes that the ascetic priest must be 'sick' himself in order to be the herdsman of the _____.", "back": "sick herd"}, {"front": "The 'maternal instinct' of the philosopher guides them toward states where they are relieved of what?", "back": "The necessity of taking care of themselves."}, {"front": "In the context of the essay, what is the meaning of the Latin phrase 'novissima gloriae cupido'?", "back": "The last desire for glory (applied to the saint's 'peace in nothingness')."}, {"front": "Nietzsche suggests that for philosophers like Goethe or Hafiz, the balance between 'animal' and 'angel' was seen as a _____.", "back": "charm of life (alluring one to life)"}, {"front": "Why does the scientist sacrifice comfort and happiness according to Nietzsche?", "back": "To serve the ascetic 'will to truth' which values accuracy over life."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
