    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;

        .fc-breadcrumb a {

            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;

        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What was the primary goal of Descartes' method of radical doubt?", "back": "To find an unshakable foundation of certainty for all knowledge."}, {"front": "What is the only fact Descartes concluded could not be doubted?", "back": "The fact that he was doubting (thinking)."}, {"front": "In Descartes' philosophy, the sentence 'I think, therefore I am' is intended to serve as the _____ of knowledge.", "back": "bedrock"}, {"front": "What is Nietzsche's primary objection to Descartes' method of doubt?", "back": "Descartes failed to question the assumptions hidden within his own grammar."}, {"front": "Nietzsche argues that the 'I' in Descartes' *cogito* is not a self-evident truth, but a _____.", "back": "grammatical habit"}, {"front": "According to Nietzsche, what metaphysical concepts are wrongly inferred from the certainty of self-awareness?", "back": "The existence of a soul or a mind."}, {"front": "How does Nietzsche interpret the 'will to certainty'?", "back": "As an expression of fear and a desire to escape uncertainty."}, {"front": "Nietzsche identifies the 'will to truth' as a specific form of the _____.", "back": "will to power"}, {"front": "Term: Phenomenal world", "back": "Definition: The world as it appears to humans through the filters and categories of the mind."}, {"front": "Term: Noumenal world", "back": "Definition: The world as it exists in itself, independent of human perception and cognition."}, {"front": "What is the English translation of Kant's term 'Ding an sich'?", "back": "Thing in itself."}, {"front": "List three categories that Immanuel Kant argued the mind imposes on all experience.", "back": "Space, time, and causality."}, {"front": "Why did Kant believe we can never truly know 'things in themselves'?", "back": "Because the mind filters all reality through human cognitive structures."}, {"front": "What aspect of Kant's philosophy does Nietzsche actually appreciate?", "back": "The insight that the mind actively shapes experience."}, {"front": "What 'crucial error' does Nietzsche attribute to Kant's distinction between phenomenal and noumenal worlds?", "back": "It preserves the false distinction between a 'true world' and an 'apparent world.'"}, {"front": "In which work did Nietzsche outline the history of how the 'true world' became a fable?", "back": "Twilight of the Idols (1889)."}, {"front": "According to Nietzsche, what happens to the concept of the 'apparent world' once the 'true world' is abolished?", "back": "The concept of the apparent world is also abolished."}, {"front": "What are three historical examples of the 'true world' mentioned in the text?", "back": "Plato's Forms, the Christian heaven, and Kant's thing in itself."}, {"front": "Nietzsche argues that inventing a 'true world' is a symptom of _____.", "back": "life-denial (or dissatisfaction with this world)"}, {"front": "Why is Nietzsche frequently called the 'grandfather of postmodernism'?", "back": "Due to his perspectivism and suspicion of grand narratives."}, {"front": "Which postmodern thinker's 'genealogies' are direct descendants of Nietzsche's method?", "back": "Michel Foucault."}, {"front": "Name three postmodern thinkers who drew heavily on Nietzsche's ideas.", "back": "Michel Foucault, Jacques Derrida, and Richard Rorty."}, {"front": "How does Nietzsche's view of 'rank' conflict with typical postmodern thought?", "back": "Nietzsche believed some perspectives and cultures are genuinely superior, rejecting egalitarianism."}, {"front": "What was Nietzsche's view on the jargon-laden prose found in much postmodern theory?", "back": "He would have despised it, as he valued clarity as a philosophical virtue."}, {"front": "Nietzsche's goal was not merely to deconstruct values, but to _____.", "back": "create them"}, {"front": "According to the text, Nietzsche's perspectivism is a demand for _____ about our own dishonesty.", "back": "honesty"}, {"front": "Why does Nietzsche consider the philosopher who claims to 'speak from nowhere' to be dangerous?", "back": "They are lying about the inherently partial nature of human perspectives."}, {"front": "In Nietzsche's view, where does intellectual courage begin?", "back": "With the honest admission of one's own perspective and its conditions."}, {"front": "What central question does Nietzsche apply to every moral or religious claim?", "back": "What kind of life produced it?"}, {"front": "The shift from asking 'is it true?' to 'where does this come from?' is called the _____.", "back": "perspectival revolution"}, {"front": "What does Descartes' radical doubt strip away before arriving at the *cogito*?", "back": "Senses, the external world, and the truths of mathematics."}, {"front": "Nietzsche critiques the *cogito* by arguing that thinking is not necessarily an activity performed by a _____.", "back": "subject"}, {"front": "For Nietzsche, there is no 'true world' lurking behind our experiences, only the world seen from various _____.", "back": "perspectives"}, {"front": "Kant's 'thing in itself' represents reality as it exists _____ of our perception.", "back": "independently"}, {"front": "How many stages did Nietzsche use to describe the history of the 'True World' fable?", "back": "Six stages."}, {"front": "Nietzsche believed that the way a philosopher writes (their style) matters as much as _____.", "back": "what they say"}, {"front": "In the context of modern information, Nietzsche’s perspectivism is a tool for recognizing that all perspectives are _____.", "back": "partial"}, {"front": "What does Nietzsche call the elevation of grammatical habits to the status of truth?", "back": "Metaphysics."}, {"front": "What psychological state does the invention of a 'purer' reality attempt to escape?", "back": "The disorder and uncertainty of the actual world."}, {"front": "According to the text, Nietzsche is 'too elitist' to be fully categorized as a _____.", "back": "postmodernist"}, {"front": "Descartes believed that if he could find one thing he could not doubt, he could _____ all knowledge.", "back": "rebuild"}, {"front": "Nietzsche argues that Descartes' certainty is an expression of the _____ to truth.", "back": "will"}, {"front": "What is the 'phenomenal world' a result of, according to Kant?", "back": "The mind imposing categories on raw experience."}, {"front": "Nietzsche claims that with the abolition of the 'true world,' we also abolish the '_____' world.", "back": "apparent"}, {"front": "Foucault's studies of prisons and madness are examples of Nietzsche’s _____ method.", "back": "genealogical"}, {"front": "According to Nietzsche, a philosopher's honesty is defined by admitting the _____ of their standing point.", "back": "location (or position)"}, {"front": "What does Nietzsche believe is the motive for creating the concept of 'Christian heaven'?", "back": "Dissatisfaction with the present life (life-denial)."}, {"front": "Nietzsche's perspectival revolution replaces the question 'is it true?' with the question '_____?'", "back": "Where does this come from?"}, {"front": "The text states that Nietzsche valued clarity as a _____ virtue.", "back": "philosophical"}, {"front": "What does Nietzsche think Descartes assumed about the nature of 'thinking'?", "back": "That it requires a subject ('I') to perform the action."}, {"front": "How does Nietzsche define the relationship between knowledge and power?", "back": "He insists that all knowledge is shaped by power."}, {"front": "In the comparison of Descartes and Nietzsche, Descartes wants certainty while Nietzsche asks _____.", "back": "why certainty is needed"}, {"front": "Kant's 'noumenal' world corresponds to reality _____ through human cognition.", "back": "unfiltered"}, {"front": "Nietzsche's critique of Kant's 'thing in itself' focuses on the preservation of a _____ between worlds.", "back": "dualism (or distinction)"}, {"front": "Nietzsche's 'will to power' is the underlying drive behind the '_____ to truth.'", "back": "will"}, {"front": "Postmodernists often share Nietzsche’s suspicion of _____, which are over-arching stories that explain reality.", "back": "grand narratives"}, {"front": "Nietzsche's perspectivism demands that we stop pretending our perspective is _____.", "back": "universal (or not partial)"}, {"front": "Why is 'I think, therefore I am' called a 'bedrock' in Cartesian philosophy?", "back": "Because it is the foundation upon which all other knowledge is reconstructed."}, {"front": "For Nietzsche, 'intellectual courage' is directly linked to the virtue of _____.", "back": "honesty"}, {"front": "In Nietzsche's fable, the 'true world' is first posited, then made inaccessible, then unknowable, and finally _____.", "back": "abolished"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
