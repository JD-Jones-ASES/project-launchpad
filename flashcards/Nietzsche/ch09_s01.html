    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

        </div>

    <script>
    var CARDS = [{"front": "What is the literal translation of the German term \"Nachlass\"?", "back": "That which is left behind."}, {"front": "In scholarly terms, what does Nietzsche's \"Nachlass\" comprise?", "back": "His unpublished notebooks, letters, and fragments."}, {"front": "Which individual is noted for the editorial manipulation of Nietzsche's Nachlass?", "back": "Elisabeth Förster-Nietzsche."}, {"front": "The notebook arguments for eternal recurrence as a physical theory assume that time is infinite and matter is _____.", "back": "Finite"}, {"front": "According to the physical theory in Nietzsche's notebooks, what must eventually happen to every possible configuration of atoms?", "back": "They must recur."}, {"front": "In which specific published works does Nietzsche present eternal recurrence as an existential test?", "back": "GS 341 and BGE 56."}, {"front": "What is the core hypothetical question posed by the published versions of eternal recurrence?", "back": "\"What if your life recurred?\""}, {"front": "What figure appears in GS 341 to offer the hypothesis of eternal recurrence?", "back": "A demon."}, {"front": "Scholars Alexander Nehamas and Maudemarie Clark argue that eternal recurrence should not be treated as a _____ theory.", "back": "Physical"}, {"front": "To what other philosopher's \"evil demon\" thought experiment is Nietzsche's demon compared?", "back": "René Descartes."}, {"front": "Nietzsche's eternal recurrence experiment is valuable because it reveals what an individual truly _____.", "back": "Values"}, {"front": "While a doctor might ask how you would spend a single remaining year of life, Nietzsche asks how you would feel if time were _____.", "back": "Infinite"}, {"front": "What is the name of the moral test developed by Immanuel Kant that the text compares to eternal recurrence?", "back": "The categorical imperative."}, {"front": "Kant's categorical imperative asks individuals to consider if the principle of their action could become a _____.", "back": "Universal law"}, {"front": "How did Nietzsche regard Kant's moral philosophy?", "back": "As the most sophisticated expression of the morality he sought to overcome."}, {"front": "While Kant's moral test is social, Nietzsche's test is described as _____.", "back": "Personal"}, {"front": "Nietzsche's test evaluates whether a life is affirmable based on its creative intensity, honesty, and _____.", "back": "Depth"}, {"front": "Kant's morality is oriented toward duty and others, whereas Nietzsche's is oriented toward self and _____.", "back": "Affirmation"}, {"front": "What Latin term describes the achievement of a person who owns every part of their life, including suffering?", "back": "Amor fati."}, {"front": "What is the \"standard of judgment\" in Nietzsche's test of life?", "back": "Is this life worthy of eternity?"}, {"front": "Why is eternal recurrence often called Nietzsche's \"most abysmal thought\"?", "back": "It suggests everything repeats forever without variation or escape."}, {"front": "Under eternal recurrence, why is there no possibility of \"redemption\" or \"final resolution\"?", "back": "Every moment, including the worst ones, is permanent and will recur identically."}, {"front": "How does Nietzsche present eternal recurrence if not as a counsel of despair?", "back": "As the highest possible affirmation of life."}, {"front": "A person who affirms eternal recurrence does not need a _____ to make life bearable.", "back": "Heaven"}, {"front": "How is meaning created in the person who achieves the highest affirmation of life?", "back": "Through the act of affirmation itself."}, {"front": "One common objection to the eternal recurrence is that it may be _____ to victims of injustice or catastrophe.", "back": "Cruel"}, {"front": "Kant's test is primarily concerned with consistency and _____, while Nietzsche's is not.", "back": "Fairness"}, {"front": "According to the text, the person who achieves amor fati is not a hedonist but someone who takes their life _____.", "back": "Seriously"}, {"front": "Nietzsche suggests that saying \"yes\" to eternal recurrence requires a love of existence that embraces _____.", "back": "Suffering"}, {"front": "In the context of eternal recurrence, even a \"pointless Tuesday afternoon\" is considered _____.", "back": "Permanent"}, {"front": "What distinction does the text make regarding the \"truth\" of the eternal recurrence experiment?", "back": "Its power does not depend on whether it is actually true."}, {"front": "Term: Categorical Imperative", "back": "Definition: Kant's moral law requiring actions to be universalizable. Example: Only acting on a principle you would want everyone else to follow."}, {"front": "Term: Amor Fati", "back": "Definition: The love of one's fate. Example: Affirming the eternal recurrence of one's life including all its pain."}, {"front": "Why does Nietzsche exclude progress from the concept of eternal recurrence?", "back": "The theory posits that everything repeats exactly as it was, without improvement."}, {"front": "Kant's morality assumes that what is right for one person must be _____.", "back": "Right for all."}, {"front": "Nietzsche's demon in GS 341 poses a challenge to the individual's _____ to the idea of recurrence.", "back": "Response"}, {"front": "According to the text, the \"abysmal\" nature of eternal recurrence arises from the lack of a _____ narrative.", "back": "Redemptive"}, {"front": "Nietzsche's existential test asks if a person is living with enough _____ to will their life's return.", "back": "Honesty"}, {"front": "Does the demon in GS 341 offer a proof of eternal recurrence?", "back": "No, he offers a hypothesis."}, {"front": "What is the primary difference between how Nietzsche and a doctor use time-based questions?", "back": "The doctor uses time scarcity to reveal value, while Nietzsche uses time infinity."}, {"front": "In Nietzsche's view, a life is worthy of eternity only if it can be _____.", "back": "Affirmed"}, {"front": "What is the function of the \"evil demon\" in Descartes' philosophy according to the text?", "back": "To serve as a thought experiment that works regardless of the demon's existence."}, {"front": "Nietzsche's notebook argument relies on the idea that the universe has a _____ number of configurations.", "back": "Finite"}, {"front": "What is the relationship between \"worst moments\" and \"best moments\" in the eternal recurrence?", "back": "They are equally permanent and recurring."}, {"front": "Which philosopher's work \"Groundwork of the Metaphysics of Morals\" is cited as the source of the categorical imperative?", "back": "Immanuel Kant."}, {"front": "Nietzsche's test targets the individual's ability to _____ every part of their existence.", "back": "Own"}, {"front": "The text suggests that the eternal recurrence is not a cosmological theory but an _____ test.", "back": "Existential"}, {"front": "If a person cannot will the eternal recurrence of their life, what might Nietzsche suggest they do?", "back": "Change their life."}, {"front": "The thought of eternal recurrence is described as terrifying because it eliminates the possibility of _____.", "back": "Escape"}, {"front": "According to the text, a person who can say \"yes\" to eternal recurrence does not need meaning to be _____ to them.", "back": "Given (or provided by narrative/heaven)"}, {"front": "The standard of Nietzsche's test is not universalizability but _____.", "back": "Affirmability"}, {"front": "How does the text define the \"creative intensity\" required for Nietzsche's test?", "back": "A quality of living that makes a life worthy of repeating forever."}, {"front": "Nietzsche's unpublished arguments suggest that if time is _____, recurrence is inevitable.", "back": "Infinite"}, {"front": "What role does \"boredom\" play in the eternal recurrence?", "back": "It is a permanent part of existence that must also be affirmed."}, {"front": "Nietzsche's test asks: \"Is this action worthy of _____?\"", "back": "Eternity"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
