    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);

        /* Card */

            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);

        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is the core definition of Nietzsche's 'free spirit'?", "back": "An individual thinker who breaks from inherited frameworks to create new values through radical intellectual independence."}, {"front": "Which 20th-century French existentialist is considered the most direct philosophical heir to Nietzsche's free spirit?", "back": "Jean-Paul Sartre."}, {"front": "What does the existentialist phrase 'existence precedes essence' signify?", "back": "Human beings have no fixed nature or predetermined purpose and must define themselves through choices."}, {"front": "According to Sartre, why are human beings 'condemned to be free'?", "back": "Because there is no God or essence to provide a script, leaving individuals entirely responsible for their actions."}, {"front": "How does Sartre's view of freedom differ from Nietzsche's 'aristocratic' vision?", "back": "Sartre universalizes freedom to every human being, whereas Nietzsche reserves it for a rare, exceptional few."}, {"front": "What would be Nietzsche's likely critique of Sartre's universalization of radical freedom?", "back": "He would find it naive because most people prefer to flee from freedom rather than embrace it."}, {"front": "Concept: Bad Faith (in the context of Sartre's critique of Nietzsche)", "back": "Definition: The refusal to acknowledge the inherent freedom belonging to every conscious being."}, {"front": "Which American essayist articulated a vision of intellectual independence similar to Nietzsche's before Nietzsche wrote his own?", "back": "Ralph Waldo Emerson."}, {"front": "In which 1841 essay did Ralph Waldo Emerson write 'Whoso would be a man must be a nonconformist'?", "back": "Self-Reliance."}, {"front": "According to Emerson's 'Self-Reliance,' what is the only thing that is 'at last sacred'?", "back": "The integrity of your own mind."}, {"front": "How did Nietzsche describe Ralph Waldo Emerson in his personal annotations?", "back": "The most gifted of the Americans."}, {"front": "How does the tone of Emerson's 'Self-Reliance' contrast with Nietzsche's writing?", "back": "Emerson is warm, democratic, and optimistic, while Nietzsche is fierce, aristocratic, and provocative."}, {"front": "Where does Emerson believe self-reliance eventually leads the individual?", "back": "To a state of harmony with the universe."}, {"front": "Where does Nietzsche believe radical independence eventually leads the individual?", "back": "To a magnificent solitude that most people would find unbearable."}, {"front": "What modern industry has appropriated a 'debased' version of Nietzsche's free spirit through the concept of disruption?", "back": "Silicon Valley."}, {"front": "What was the early motto of Facebook that echoes Nietzsche's celebration of destroying old values?", "back": "Move fast and break things."}, {"front": "What is the primary difference in the 'service' of destruction between Nietzsche and Silicon Valley?", "back": "Nietzsche destroys in the service of creation, whereas Silicon Valley often destroys in the service of profit."}, {"front": "According to the text, what is the 'category error' in calling entrepreneurial innovation 'Nietzschean'?", "back": "It adopts Nietzsche's style of boldness while discarding the substance of creating genuine intellectual values."}, {"front": "What does a Nietzschean free spirit risk for the sake of intellectual integrity?", "back": "Being misunderstood, isolated, and impoverished."}, {"front": "How does the focus of a tech 'disruptor' differ from that of a Nietzschean free spirit regarding values?", "back": "The disruptor questions business models while leaving deeper values untouched, whereas the free spirit questions all inherited values."}, {"front": "Name three key existentialist thinkers who drew on Nietzsche's account of radical freedom.", "back": "Jean-Paul Sartre, Albert Camus, and Martin Heidegger."}, {"front": "Which founder of psychoanalysis acknowledged Nietzsche's deep psychological insights?", "back": "Sigmund Freud."}, {"front": "Which psychological concept developed by Alfred Adler is directly derived from Nietzsche?", "back": "The will to power."}, {"front": "Which two postmodern philosophers used Nietzsche's suspicion of 'truth' to critique power and language?", "back": "Michel Foucault and Jacques Derrida."}, {"front": "Name three literary figures whose characters embody Nietzschean themes of self-overcoming and independence.", "back": "Thomas Mann, Hermann Hesse, and André Gide."}, {"front": "Which popular ideology, associated with Ayn Rand, represents a circulating version of Nietzsche's ideas in popular culture?", "back": "Objectivism."}, {"front": "Nietzsche's vision of independence leads to _____ _____, a state he believed most people would find unbearable.", "back": "magnificent solitude"}, {"front": "Sartre's democratization of the free spirit implies that every human is making choices that _____ _____ _____ _____.", "back": "define who they are"}, {"front": "Term: Existentialism", "back": "Definition: A philosophical movement emphasizing individual existence, freedom, and choice in a world without fixed nature."}, {"front": "Term: Self-Reliance (Emersonian)", "back": "Definition: The necessity for an individual to avoid conformity and follow their own instincts and ideas."}, {"front": "How does the goal of the Silicon Valley 'disruptor' contrast with the 'spiritual work' of Nietzsche's free spirit?", "back": "The disruptor is engaged in market competition, while the free spirit is engaged in creating new values for a world without old ones."}, {"front": "Why is the Silicon Valley appropriation of Nietzsche described as 'debased'?", "back": "Because it strips away the intellectual rigor and personal sacrifice required by the original vision."}, {"front": "What is the common thread between Nietzsche, Sartre, and Emerson regarding the individual's relationship to society?", "back": "A shared insistence on intellectual integrity and the rejection of conformity."}, {"front": "In what way is Nietzsche's vision of the free spirit described as 'aristocratic'?", "back": "It posits that genuine independence is a difficult achievement possible only for a rare few."}, {"front": "Which philosophical movement is characterized by a 'suspicion of truth' and systematic critiques of language?", "back": "Postmodernism."}, {"front": "According to the text, the debt to Nietzsche is _____ throughout the work of Jean-Paul Sartre.", "back": "explicit"}, {"front": "Emerson's optimism regarding self-reliance is based on a trust that it leads to _____ _____ _____ _____.", "back": "harmony with the universe"}, {"front": "What is the primary critique of the Silicon Valley disruptor regarding the scope of their questioning?", "back": "They question business models but leave deeper, inherited values untouched."}, {"front": "Nietzsche's free spirit is described as a vision of radical _____ independence.", "back": "intellectual"}, {"front": "What does Sartre argue is the status of human 'nature' in his existentialist philosophy?", "back": "He argues that humans have no fixed nature or essence."}, {"front": "In 'Self-Reliance,' Emerson argues that nothing is sacred except for what specific entity?", "back": "The integrity of the individual's own mind."}, {"front": "What did Nietzsche do to his copy of Emerson's 'Essays' that proves his engagement with the work?", "back": "He annotated it heavily."}, {"front": "How does the Silicon Valley disruptor's approach to convention mirror Nietzsche's free spirit?", "back": "Both show a willingness to break with convention and use a rhetoric of boldness."}, {"front": "Which concept from Nietzsche emphasizes the struggle to grow beyond one's current state, influencing literature?", "back": "Self-overcoming."}, {"front": "Why does Nietzsche believe that independence results in solitude rather than harmony?", "back": "Because breaking from inherited frameworks separates the individual from the common comforts of society."}, {"front": "Sartre identifies the universal capacity for freedom, but Nietzsche focuses on the _____ _____ to exercise it.", "back": "rare independence"}, {"front": "What is the year of publication for Sartre's 'Being and Nothingness'?", "back": "1943."}, {"front": "What is the year of publication for Sartre's 'Existentialism Is a Humanism'?", "back": "1946."}, {"front": "Which American's influence on Nietzsche suggests that the idea of the free spirit did not emerge in a vacuum?", "back": "Ralph Waldo Emerson."}, {"front": "What is the key difference in the 'spiritual' vs 'commercial' nature of disruption?", "back": "Nietzschean disruption is a demanding spiritual task of value-creation; Silicon Valley disruption is an act of market competition."}, {"front": "How does Nietzsche view the average person's desire for radical freedom?", "back": "He believes most people do not want it and will flee from it."}, {"front": "In the comparison between Nietzsche and Sartre, who is noted for being 'right' that independence is difficult and rare?", "back": "Nietzsche."}, {"front": "In the comparison between Nietzsche and Sartre, who is noted for being 'right' that the capacity for freedom belongs to everyone?", "back": "Sartre."}, {"front": "Silicon Valley's rhetoric of 'thinking different' borrows Nietzsche's _____ while stripping away his seriousness.", "back": "style"}, {"front": "Which postmodern philosopher is associated with a systematic critique of power based on Nietzschean suspicion?", "back": "Michel Foucault."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
