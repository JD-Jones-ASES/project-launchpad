<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 9, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the literal translation of the German phrase \"Ewige Wiederkehr des Gleichen\"?", "back": "Eternal return of the same."}, {"front": "In which Nietzschean work does the thought experiment of eternal recurrence first appear?", "back": "The Gay Science (aphorism 341)."}, {"front": "Where does Nietzsche place the eternal recurrence in \"The Gay Science\" relative to the declaration that God is dead?", "back": "Immediately following it as an answer to the resulting void."}, {"front": "The prompt in GS 341 is titled \"The Heaviest _____.\"", "back": "Burden"}, {"front": "In the thought experiment of GS 341, what creature visits the individual in their \"loneliest loneliness\"?", "back": "A demon."}, {"front": "What is the core proposition delivered by the demon in the eternal recurrence thought experiment?", "back": "Your entire life will repeat identically and infinitely in the same series and sequence."}, {"front": "What specific mundane examples does Nietzsche use to illustrate that even small details repeat in the recurrence?", "back": "The spider and the moonlight among the trees."}, {"front": "Which metaphor does Nietzsche use to describe the repeating nature of existence in GS 341?", "back": "An eternal sand-glass being turned over."}, {"front": "According to Nietzsche, how would a person who cannot affirm their life respond to the demon's message?", "back": "They would throw themselves down and gnash their teeth."}, {"front": "What would a person who has experienced a \"tremendous moment\" call the demon who brings the news of recurrence?", "back": "A God."}, {"front": "What is the central question posed by the eternal recurrence as an ethical test?", "back": "\"Dost thou want this once more, and also for innumerable times?\""}, {"front": "Nietzsche defines the \"highest possible affirmation of life\" as being a _____-_____.", "back": "Yes-sayer (Ja-sagender)"}, {"front": "Which groups does Nietzsche associate with \"Nay-saying\" (Nein-sagen)?", "back": "Christianity, pessimism, and nihilism."}, {"front": "What is the significance of the demon appearing in the \"loneliest loneliness\" rather than a public setting?", "back": "It represents a deep confrontation with oneself where all social masks are removed."}, {"front": "In \"Beyond Good and Evil\", aphorism 56, how does Nietzsche describe the ideal of the \"most world-approving\" man?", "back": "One who wishes for existence to repeat as it was and is for all eternity."}, {"front": "What musical term does Nietzsche use to signify the desire for the \"play\" of life to repeat from the beginning?", "back": "Da capo."}, {"front": "What Latin phrase does Nietzsche use in BGE 56 to describe the world eternally repeating and willing itself?", "back": "Circulus vitiosus deus."}, {"front": "What is the literal meaning of the Latin phrase \"circulus vitiosus deus\"?", "back": "God as a vicious circle."}, {"front": "In what mountain village did Nietzsche first conceive the idea of eternal recurrence?", "back": "Sils-Maria, Switzerland."}, {"front": "Beside which specific lake did Nietzsche experience the revelation of eternal recurrence in August 1881?", "back": "Lake Silvaplana."}, {"front": "What physical landmark near Sils-Maria is associated with the birth of the eternal recurrence idea?", "back": "A massive, pyramidal boulder."}, {"front": "Term: Amor Fati", "back": "Definition: The love of fate; embracing everything that happens as necessary and beautiful."}, {"front": "How does Nietzsche's \"amor fati\" differ from the Stoic concept of fate?", "back": "The Stoics counseled acceptance of fate, whereas Nietzsche demands an active love of it."}, {"front": "In the context of \"amor fati\", how does Nietzsche propose to deal with the \"ugly\" or things he would otherwise accuse?", "back": "By looking aside and making that his sole negation."}, {"front": "How does Nietzsche's stance on life differ from nihilism regarding the value of everything?", "back": "Nihilists say nothing matters; Nietzsche says everything matters so much that its repetition should be willed."}, {"front": "What is the single, four-word command found in GS 270 that summarizes Nietzsche's demand on conscience?", "back": "\"Thou shalt become what thou art.\""}, {"front": "How does Nietzsche's \"egoist's categorical imperative\" differ from Immanuel Kant's categorical imperative?", "back": "Kant asks if an action could be a universal law for everyone; Nietzsche asks if you could endure the action infinitely for yourself."}, {"front": "According to Nietzsche, how does one \"become what they are\"?", "back": "Through the act of living, self-creation, and making choices and refusals."}, {"front": "Who was the German-born American philosopher most responsible for clearing Nietzsche's name of Nazi associations?", "back": "Walter Kaufmann."}, {"front": "Which relative of Nietzsche was primarily responsible for distorting his work to fit proto-Nazi ideologies?", "back": "Elisabeth Förster-Nietzsche."}, {"front": "What was the title of Walter Kaufmann's influential 1950 book about Nietzsche?", "back": "Nietzsche: Philosopher, Psychologist, Antichrist."}, {"front": "In Nietzsche's philosophy, what is the \"ultimate test\" of the meaning of your life in the absence of God?", "back": "Whether you can affirm it so completely that you would say yes to its infinite repetition."}, {"front": "The philosopher who can affirm the light and the dark, the beautiful and the terrible, is moving beyond the categories of _____ and _____.", "back": "Optimism; pessimism."}, {"front": "According to the text, what is the \"only honest form of freedom\"?", "back": "Affirming one's life as its own meaning without appeal to an afterlife or divine plan."}, {"front": "What was the specific date and location for the birth of the idea of eternal recurrence?", "back": "August 1881, near Sils-Maria in the Swiss Engadine."}, {"front": "Nietzsche described the revelation of eternal recurrence in \"Ecce Homo\" as occurring \"Six thousand feet beyond _____ and _____.\"", "back": "Man; time."}, {"front": "Concept: The Yes-sayer (Ja-sagender)", "back": "Definition: A person who affirms life in its totality, including all its suffering and failures."}, {"front": "How does the practitioner of \"amor fati\" view things that are \"necessary\" in life?", "back": "As beautiful."}, {"front": "Nietzsche uses the musical term \"da capo\" to express a desire for the repetition of not just the play of life, but also what?", "back": "The one who requires the play and makes it necessary (himself)."}, {"front": "What was Walter Kaufmann's academic affiliation during his career?", "back": "Princeton University."}, {"front": "What is the function of the eternal recurrence as a thought experiment?", "back": "It serves as a personal test of whether one can face the void without flinching."}, {"front": "In GS 341, Nietzsche calls the individual a \"speck of _____.\"", "back": "Dust"}, {"front": "What does the demon say about the possibility of change or improvement in the recurrent life?", "back": "There will be nothing new in it; everything occurs in the same sequence."}, {"front": "Nietzsche claims that the thought of eternal recurrence, if it acquired power over you, would either transform you or _____ you.", "back": "Crush"}, {"front": "Why does Nietzsche's philosophy of eternal recurrence stand as an alternative to nihilism?", "back": "It promotes total affirmation of existence as it is, rather than claiming nothing has value."}, {"front": "According to the passage from BGE 56, which philosopher's \"stupidity\" and pessimism was Nietzsche trying to overcome?", "back": "Arthur Schopenhauer."}, {"front": "Nietzsche frames \"amor fati\" as a wish to see the necessity in things as _____", "back": "Beautiful"}, {"front": "How does Nietzsche define the relationship between suffering and affirmation in \"amor fati\"?", "back": "Suffering is not denied but affirmed as a necessary part of the whole of life."}, {"front": "The standard of the eternal recurrence test is not moral blamelessness, but whether life is lived with enough _____ and _____ to be worthy of repetition.", "back": "Intensity; honesty."}, {"front": "What was the significance of Walter Kaufmann's translations of Nietzsche?", "back": "They became the standard scholarly editions, replacing distorted versions."}, {"front": "To what does Nietzsche refer when he speaks of the \"last eternal sanctioning and sealing\"?", "back": "The affirmation of the eternal recurrence."}, {"front": "In the new year of 1882 (GS 276), what does Nietzsche say he wants to be \"at any time hereafter\"?", "back": "Only a yea-sayer."}, {"front": "What does Nietzsche suggest about the \"self\" when he says it must be \"become\"?", "back": "The self is not a fixed essence but a creation of one's living and choices."}, {"front": "According to the text, what happens to the categories of creative and destructive in the state of \"amor fati\"?", "back": "They are both affirmed as necessary and interconnected parts of the whole."}, {"front": "Why is eternal recurrence described as a question about the \"present\" rather than the future?", "back": "Because it asks how one is living right now such that they would want to repeat it forever."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
