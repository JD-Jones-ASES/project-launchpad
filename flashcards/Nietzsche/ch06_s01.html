    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Nietzsche distinguish a 'free spirit' from a common rebel or teenage contrarian?", "back": "The free spirit does not refuse rules simply because they are rules, but because they have deeply mastered and seen through them."}, {"front": "Nietzsche uses the term '_____' to describe shallow Enlightenment rationalists who replace religious dogma with scientific dogma.", "back": "freethinkers"}, {"front": "According to GM III 24, why does Nietzsche believe 'freethinkers' are not actually free spirits?", "back": "They still believe in truth and fail to question its value."}, {"front": "What specifically does a genuine free spirit question regarding 'truth'?", "back": "They question why we value truth and what that valuation reveals about human nature."}, {"front": "Term: Libertine", "back": "Definition: A person who throws off moral restraint to pursue pleasure or hedonism, distinct from Nietzsche's disciplined free spirit."}, {"front": "Why does Nietzsche argue that the free spirit often lives more 'austerely' than the conformist?", "back": "Genuine independence demands enormous discipline and strength that hedonism lacks."}, {"front": "Nietzsche states the free spirit has not simply escaped from values, but has _____ them.", "back": "passed through"}, {"front": "In the chess analogy, what separates the 'grandmaster' of values from a child who simply doesn't know the rules?", "back": "The grandmaster's departure from convention is informed by a deep understanding of the rules' purposes and failures."}, {"front": "What three things does the 'grandmaster of values' see within the moral tradition?", "back": "Hidden assumptions, unacknowledged debts, and concealed fears."}, {"front": "What term does Nietzsche use to describe the separation between the genuine philosopher and the 'mass of humanity'?", "back": "Pathos of distance"}, {"front": "How does Nietzsche view the idea of freedom being shared equally among all people?", "back": "He views genuine freedom as an aristocratic privilege that most people neither want nor could endure."}, {"front": "Nietzsche's vision of 'aristocracy' is explicitly _____, rather than hereditary or racial.", "back": "spiritual"}, {"front": "According to Beyond Good and Evil 264, Nietzsche mocks the idea that _____ guarantees a noble spirit.", "back": "noble birth"}, {"front": "What is the 'productive response' suggested for handling Nietzsche's aristocratic tone?", "back": "Holding the reality of intellectual rarity in tension with the dangers of hierarchy and intellectual honesty."}, {"front": "Nietzsche writes in BGE 29 that independence is a 'privilege of the _____.'", "back": "strong"}, {"front": "What is 'negative freedom' in the context of Nietzsche’s 'freethinkers'?", "back": "Freedom from the authority of church, tradition, and inherited morality."}, {"front": "What defines 'positive freedom' for a genuine free spirit?", "back": "The freedom for the creation of new values and new possibilities of life."}, {"front": "Why is Nietzsche's destruction of inherited morality not considered nihilism?", "back": "Destruction is the precondition for creating new values, whereas the nihilist stops at the rejection of values."}, {"front": "In 'Thus Spoke Zarathustra', what does the spirit become when it is bearing the weight of tradition?", "back": "The camel"}, {"front": "Which of Nietzsche's three metamorphoses represents the destruction of 'Thou shalt' in the name of 'I will'?", "back": "The lion"}, {"front": "What is the final stage of the three metamorphoses, representing the creation of new values?", "back": "The child"}, {"front": "What characteristic defines the 'Child' stage in the three metamorphoses?", "back": "Innocent spontaneity"}, {"front": "According to the text, what is one of the central tensions or 'fatal flaws' in Nietzsche's work?", "back": "He is much more vivid about the destruction of values than about his positive vision for creation."}, {"front": "Why might Nietzsche have left his 'positive vision' for value creation relatively sketchy?", "back": "He believed genuine creation must be an individual act that no philosopher can dictate in advance."}, {"front": "What feeling do most people experience when faced with genuine questioning, according to Nietzsche's view?", "back": "Vertigo"}, {"front": "Nietzsche characterizes 'freethinkers' as replacing religious dogma with _____ dogma.", "back": "scientific"}, {"front": "The free spirit's independence is described as a '_____' of the few, not a universal right.", "back": "privilege"}, {"front": "How does the free spirit's relationship to morality differ from someone who has never taken it seriously?", "back": "The free spirit has taken morality so seriously that they have seen through its foundations."}, {"front": "In the three metamorphoses, the '_____' represents the achievement of negative freedom.", "back": "lion"}, {"front": "Nietzsche claims that most people are more comfortable with _____ than with genuine questioning.", "back": "conformity"}, {"front": "What does the 'lion' stage use to replace the external 'Thou shalt'?", "back": "The internal 'I will'"}, {"front": "Why is the free spirit not considered a hedonist?", "back": "They prioritize the discipline required for independence over the pursuit of pleasure."}, {"front": "Nietzsche's 'aristocratic' language emphasizes 'rank' and 'the _____' who can endure freedom.", "back": "few"}, {"front": "What is the primary role of the 'Camel' in the development of the free spirit?", "back": "To bear the heavy weight of tradition and master it."}, {"front": "What does the text suggest about the compatibility of Nietzsche's vision with democracy?", "back": "It is questionable, as democracy assumes equal capability for thought, while Nietzsche emphasizes hierarchy."}, {"front": "The 'grandmaster' analogy suggests that departure from convention must be _____.", "back": "informed"}, {"front": "Nietzsche's 'freethinkers' are described as having achieved only _____ freedom.", "back": "negative"}, {"front": "According to the text, what is the 'precondition' for something new in Nietzsche's philosophy?", "back": "The destruction of inherited morality."}, {"front": "What is the primary difference between a 'nihilist' and a 'free spirit'?", "back": "The nihilist stays at the point where no values exist; the free spirit passes through it to create."}, {"front": "Nietzsche refers to the '_____ of distance' to describe the hierarchy between types of people.", "back": "pathos"}, {"front": "The free spirit's quest is to understand why we _____ truth at all.", "back": "value"}, {"front": "The 'Three Metamorphoses' are a famous image from which of Nietzsche's works?", "back": "Thus Spoke Zarathustra"}, {"front": "In the context of the grandmaster analogy, what do the 'rules' represent?", "back": "Moral tradition and inherited values."}, {"front": "What does the 'Lion' stage lack that the 'Child' stage provides?", "back": "The ability to create new values (positive freedom)."}, {"front": "True or False: Nietzsche believes that hereditary nobility guarantees a higher spirit.", "back": "False"}, {"front": "Nietzsche's free spirit is described as having gone 'further' than the freethinker by questioning the _____ of truth.", "back": "value"}, {"front": "The 'weight of tradition' is symbolized by which animal in Nietzsche's metamorphoses?", "back": "The camel"}, {"front": "Why is the free spirit's independence considered a burden?", "back": "It requires the strength to endure 'vertigo' and the responsibility of creating one's own values."}, {"front": "The 'freethinker' is critiqued for merely replacing one form of _____ with another.", "back": "dogma"}, {"front": "What does the text identify as the 'first question' a careful reader should ask about Nietzsche's arguments?", "back": "Who, exactly, is Nietzsche talking about?"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
