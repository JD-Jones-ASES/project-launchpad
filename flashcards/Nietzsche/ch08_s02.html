    <style>

            width: 100%;

            padding: 0.35rem 0.8rem;

            transition: all 0.2s ease;

        .fc-tool:hover {
            border-color: var(--secondary-color);

        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;

                min-height: 220px;
            }

                gap: 0.5rem;
            }
        }

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "In 'The Antichrist', what sharp distinction does Nietzsche draw regarding the figure of Jesus?", "back": "The distinction between the \"historical Jesus\" and the Christ of church doctrine."}, {"front": "Who authored the 1835 work 'The Life of Jesus Critically Examined'?", "back": "David Friedrich Strauss."}, {"front": "How did David Friedrich Strauss treat the Gospel narratives in his critical examination?", "back": "He treated them as mythological rather than historical."}, {"front": "What was Nietzsche's primary criticism of David Friedrich Strauss in his 1873 essay?", "back": "He criticized Strauss's timidity and his \"comfortable\" secular humanism."}, {"front": "Nietzsche's essay \"David Strauss, the Confessor and the Writer\" (1873) attacked Strauss for being too _____.", "back": "comfortable"}, {"front": "What did Nietzsche want David Friedrich Strauss to face regarding his own arguments?", "back": "The devastating consequences of demolishing the foundations of Christianity."}, {"front": "Who wrote 'The Quest of the Historical Jesus' (1906)?", "back": "Albert Schweitzer."}, {"front": "According to Albert Schweitzer, what was Jesus's primary role?", "back": "An apocalyptic prophet."}, {"front": "Albert Schweitzer argued that Jesus's message was inseparable from his expectation of what event?", "back": "An imminent end of the world."}, {"front": "Which theologian argued that we can know almost nothing about the historical Jesus?", "back": "Rudolf Bultmann."}, {"front": "In Rudolf Bultmann's view, what should be the focus of theological study instead of the historical Jesus?", "back": "The existential meaning of the kerygma (the preached message)."}, {"front": "Term: Kerygma", "back": "The preached message of the Christian gospel."}, {"front": "Which modern scholar is known for portraying Jesus as a \"social revolutionary\"?", "back": "John Dominic Crossan."}, {"front": "How does scholar N. T. Wright portrait the figure of Jesus?", "back": "As the inaugurator of God's kingdom."}, {"front": "What fundamental recognition do Nietzsche and modern historical Jesus scholars share?", "back": "There is a gap between the actual life of Jesus and the development of Christianity."}, {"front": "Nietzsche's portrait of Jesus is described as a kind of \"Buddhist-anarchist-_____.\"", "back": "mystic"}, {"front": "Which two Russian authors most influenced Nietzsche's portrait of Jesus?", "back": "Leo Tolstoy and Fyodor Dostoevsky."}, {"front": "The description of Jesus as an \"idiot\" in Nietzsche's AC 29 refers to a character by which author?", "back": "Fyodor Dostoevsky (from the novel 'The Idiot')."}, {"front": "What living question remains in theology regarding Nietzsche's distinction between Jesus and the church?", "back": "The distinction between the founder of the faith and the institution that followed."}, {"front": "Which Danish philosopher's critique of Christianity offers a fascinating parallel to Nietzsche's?", "back": "Søren Kierkegaard."}, {"front": "Kierkegaard's late-life attack was not on Christianity itself, but on _____.", "back": "Christendom"}, {"front": "How did Kierkegaard define \"Christendom\"?", "back": "Comfortable, bourgeois, state-sponsored religion."}, {"front": "Whom did Nietzsche blame for the betrayal of Jesus's original message?", "back": "The apostle Paul."}, {"front": "Whom did Kierkegaard blame for the betrayal of the original Christian message?", "back": "Every generation of Christians who made the faith easier and more respectable."}, {"front": "For Kierkegaard, what does authentic Christianity demand of the individual?", "back": "A \"leap of faith.\""}, {"front": "What are the three characteristics of Kierkegaard's \"leap of faith\"?", "back": "Terrifying, irrational, and absolutely individual."}, {"front": "Why did the institutional church make authentic Christianity impossible, according to Kierkegaard?", "back": "By making the faith comfortable."}, {"front": "What is the crucial difference between Kierkegaard's and Nietzsche's attacks on religion?", "back": "Kierkegaard attacked in the name of Christianity, while Nietzsche attacked Christianity itself."}, {"front": "Which mid-20th-century theological movement was inspired by Nietzsche's proclamation that \"God is dead\"?", "back": "The Death of God theology."}, {"front": "Who were the two most notable Protestant theologians of the \"Death of God\" movement?", "back": "Thomas Altizer and William Hamilton."}, {"front": "In \"Death of God\" theology, the death of God is viewed as a _____ reality rather than a metaphysical fact.", "back": "cultural"}, {"front": "According to \"Death of God\" theology, how must authentic Christianity be lived?", "back": "Without the concept of a supernatural being \"up there\" or \"out there.\""}, {"front": "Nietzsche's critique of Christianity challenges believers to hold faith without what kind of \"cosmic insurance policy\"?", "back": "God used as a guarantor of morality or rewards and punishments."}, {"front": "According to Kierkegaard, honest faith is only possible through a _____.", "back": "terrifying leap"}, {"front": "According to Dostoevsky, how is it possible to hold religious faith honestly?", "back": "Only through suffering."}, {"front": "What concept did Dietrich Bonhoeffer write about while in a Nazi prison?", "back": "Religionless Christianity."}, {"front": "How did modern theologian Paul Tillich redefine God to address modern challenges?", "back": "As the \"ground of being.\""}, {"front": "Nietzsche's 1873 essay criticized David Strauss for replacing Christian foundations with what?", "back": "Bland secular humanism."}, {"front": "Strauss (1835) : Mythological narratives :: Schweitzer (1906) : _____.", "back": "Apocalyptic prophecy"}, {"front": "Nietzsche's Jesus as a \"Buddhist-anarchist-mystic\" is a portrait that likely would not survive what process?", "back": "Peer review (historical scholarship)."}, {"front": "What shared themes do Nietzsche and Kierkegaard possess?", "back": "Individual authenticity, attack on mediocrity, irony, and indirect communication."}, {"front": "In what decade did the \"Death of God\" theology movement emerge?", "back": "The 1960s."}, {"front": "According to Kierkegaard, what happened when religion became a \"Sunday social club\"?", "back": "The radical demands of the Gospel were turned into Christendom."}, {"front": "Rudolf Bultmann's focus on the 'kerygma' prioritizes the _____ of the message over the historical facts of the messenger.", "back": "existential meaning"}, {"front": "Concept: The Quest for the Historical Jesus", "back": "Definition: A scholarly effort to distinguish the Jesus of history from the Christ of faith and church dogma."}, {"front": "Nietzsche believed the institutional church had _____ the original message of its founder.", "back": "betrayed"}, {"front": "Kierkegaard and Nietzsche both used _____ and pseudonyms as methods of communication.", "back": "irony"}, {"front": "What was the result of making Christianity \"respectable\" according to Kierkegaard?", "back": "It made authentic faith impossible."}, {"front": "Which 19th-century thinker's work on the 'historical Jesus' did Nietzsche despise for its 'timidity'?", "back": "David Friedrich Strauss."}, {"front": "Term: Christendom (Kierkegaardian)", "back": "The external, institutional, and socialized version of Christianity that lacks the radical inwardness of true faith."}, {"front": "Which scholar viewed Jesus primarily as a Jewish prophet?", "back": "E. P. Sanders."}, {"front": "The 'Death of God' theologians argued that the _____ God of traditional theism had died.", "back": "transcendent"}, {"front": "Nietzsche’s Jesus is noted for having more in common with characters in the works of _____ than with historical research.", "back": "Dostoevsky"}, {"front": "What is the primary question Nietzsche's critique raises for 'thoughtful believers'?", "back": "Is it possible to hold religious faith honestly without self-deception?"}, {"front": "True or False: Nietzsche and Kierkegaard were known to have read and influenced each other's work.", "back": "False (Nietzsche almost certainly never read Kierkegaard)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
