<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dangerous Perhaps (Nietzsche) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Nietzsche's primary objective when performing a 'genealogy' of morals?", "back": "Tracing the psychological needs and historical conditions that produced specific moral values."}, {"front": "True or False: A Nietzschean genealogy is intended to be a direct recommendation of a specific value system.", "back": "False; a genealogy is an investigation of origins rather than an act of advocacy."}, {"front": "Which moral framework does Nietzsche describe as characterized by vitality, self-affirmation, and creative power?", "back": "Master morality."}, {"front": "Nietzsche views virtues such as humility and pity as potential masks for _____.", "back": "Ressentiment."}, {"front": "In master morality, what is the foundational statement that defines 'good'?", "back": "\"I am good.\""}, {"front": "How does the 'slavish spirit' derive its definition of 'good'?", "back": "By first labeling the 'other' as evil and then defining itself as the opposite."}, {"front": "According to Nietzsche, what essential human characteristic did slave morality produce that master morality lacked?", "back": "Depth (or the internal 'soul' and 'conscience')."}, {"front": "Nietzsche argues that the 'internalization of instinct' required by slave morality resulted in the creation of the _____.", "back": "Soul (or interior life)."}, {"front": "What potential flaw does Nietzsche identify in a world governed purely by master morality?", "back": "He suspects it would be vital and beautiful but also somewhat shallow."}, {"front": "Nietzsche believes that human greatness is produced by the struggle between _____ and negation.", "back": "Affirmation."}, {"front": "The logical error of judging the truth of a belief based solely on its origin is known as the _____.", "back": "Genetic fallacy."}, {"front": "Why is Nietzsche's genealogy considered a 'provocation' rather than a simple 'refutation'?", "back": "It forces readers to question if they hold values because they are true or because those values serve psychological needs."}, {"front": "Concept: Genetic Fallacy", "back": "Definition: The error of judging the value or truth of a belief based on its historical or psychological origins."}, {"front": "Which historical group does Nietzsche identify as the originators of the 'slave revolt in morality'?", "back": "The Jews."}, {"front": "How does Nietzsche characterize the Jewish 'revaluation of values' in terms of historical impact?", "back": "As the most consequential revaluation in human history."}, {"front": "Nietzsche attributes the triumph of slave morality to a 'resolute _____ to power' rather than military conquest.", "back": "Will."}, {"front": "Nietzsche's attitude toward the Jewish revaluation of values is described as a mix of grudging and _____ admiration.", "back": "Awestruck."}, {"front": "According to the text, why do we often fail to see the history of the slave revolt in morality?", "back": "Because the revolt was so successful that its values now appear natural or obvious."}, {"front": "Nietzsche argues the slave revolt has been victorious for approximately _____ years.", "back": "Two thousand."}, {"front": "Nietzsche contrasts 'priestly' peoples with _____ peoples in his cultural generalizations.", "back": "Warrior."}, {"front": "What is the primary psychological driver behind slave morality according to Nietzsche?", "back": "Ressentiment."}, {"front": "Nietzsche suggests that the tension between affirmation and negation is the source of human _____.", "back": "Greatness."}, {"front": "In Nietzsche’s view, master morality is characterized as 'life-_____' while slave morality is characterized by negation.", "back": "Affirming."}, {"front": "How does Nietzsche differentiate between a historian tracing democracy and an advocate for monarchy?", "back": "He uses this analogy to show that tracing a value's origin (genealogy) is not the same as endorsing its alternative."}, {"front": "Nietzsche identifies the _____ framework as the one overturned by the Jewish revaluation of values.", "back": "Aristocratic."}, {"front": "What does the text identify as a major risk regarding Nietzsche's identification of Judaism as the source of slave morality?", "back": "His identification has been exploited by anti-Semites despite Nietzsche's own intentions."}, {"front": "Nietzsche views the 'aristocratic spirit' as being more _____ than the 'slavish spirit.'", "back": "Honest (or vigorous/life-affirming)."}, {"front": "The transformation of political weakness into a world-historical triumph is a key feature of the _____ revolt in morality.", "back": "Slave."}, {"front": "Nietzsche's work asks us to decide on our values after he hands us the _____.", "back": "Evidence."}, {"front": "What is the specific 'internalization' that leads to the creation of the soul?", "back": "The internalization of instinct."}, {"front": "Nietzsche's genealogy is intended to highlight the 'all-too-_____' origins of sacred values.", "back": "Human."}, {"front": "Term: Ressentiment", "back": "Definition: A sense of hostility directed toward an object that one identifies as the cause of one's frustration."}, {"front": "In Nietzsche's framework, which morality is defined by its reaction to an outside stimulus?", "back": "Slave morality."}, {"front": "What does Nietzsche call the 'ongoing struggle' between two moral types?", "back": "The struggle between affirmation and negation."}, {"front": "Nietzsche's 'thinkdeeper' prompt asks readers to consider if values that feel 'natural' actually have _____ origins.", "back": "Specific historical."}, {"front": "True or False: Nietzsche denies that the concept of 'evil' has any validity because it was born from ressentiment.", "back": "False; he suggests its origin makes us question our reasons for holding it, but origin alone doesn't prove it false."}, {"front": "According to the text, Nietzsche is not a 'system-builder' but a _____.", "back": "Genealogist."}, {"front": "What does Nietzsche believe master morality lacks that makes human beings 'interesting'?", "back": "The interior life or soul."}, {"front": "Nietzsche argues that the Jews accomplished their moral revaluation through the force of _____.", "back": "Will."}, {"front": "What is the relationship between slave morality and Christianity according to Nietzsche?", "back": "The slave revolt initiated by Judaism eventually produced Christianity."}, {"front": "Nietzsche's admiration for the Jews is described as '_____' because it recognizes their immense power in the revaluation.", "back": "Grudging (or awestruck)."}, {"front": "Which virtue does Nietzsche specifically view with suspicion as a mask for ressentiment?", "back": "Self-denial (or humility/pity)."}, {"front": "The 'genetic fallacy' involves judging a belief based on its _____.", "back": "Origin."}, {"front": "According to Nietzsche, a world of pure master morality would be 'beautiful but also... _____' .", "back": "Shallow."}, {"front": "What does Nietzsche mean by describing the slave revolt as 'victorious'?", "back": "Its values have become so dominant that they are now invisible as a specific historical choice."}, {"front": "Nietzsche contrasts the 'warrior' people with which other archetype?", "back": "The 'priestly' people."}, {"front": "Slave morality is described as starting with a _____ of the 'other.'", "back": "Negation."}, {"front": "Which 'all-too-human' origins does Nietzsche seek to reveal through his work?", "back": "The origins of our most sacred values."}, {"front": "Nietzsche's genealogy challenges the idea that values are rooted in rational reflection by suggesting they are rooted in _____.", "back": "Psychological needs."}, {"front": "In the context of the text, what is the 'internalization of instinct'?", "back": "The process by which instincts that cannot be released outwardly are turned inward, creating the soul."}, {"front": "The belief in human equality is used as an example of a value that might arise from _____ morality.", "back": "Slave."}, {"front": "Nietzsche uses the term 'aristocratic' to describe the spirit of _____ morality.", "back": "Master."}, {"front": "According to the text, a student should read Nietzsche with attention to what he 'actually says' to avoid _____ interpreters.", "back": "Bad-faith."}, {"front": "What is the result of the 'tension' between master and slave morality?", "back": "The production of human greatness."}, {"front": "Nietzsche describes the Jews as a people of the 'most resolute will to _____' .", "back": "Power."}, {"front": "Is Nietzsche 'neutral' in his genealogical observations?", "back": "No, he clearly finds master morality more vigorous and honest."}, {"front": "What does the text suggest is the most common mistake when reading Nietzsche?", "back": "Assuming that showing the origin of a value is the same as proving it is false."}, {"front": "Nietzsche's genealogical method is compared to which two professions in the text?", "back": "Historian and anthropologist."}, {"front": "Concept: The Soul (Nietzschean)", "back": "Definition: The product of internalizing instincts, creating an interior life that adds depth to the human experience."}, {"front": "What does the text claim regarding Nietzsche’s intentions and anti-Semitism?", "back": "Nietzsche would have been infuriated by the exploitation of his texts by anti-Semites."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
