    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Dangerous Perhaps (Nietzsche) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Nietzsche">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

    <script>
    var CARDS = [{"front": "How does the writing style of Nietzsche's 'Genealogy of Morality' differ from 'Beyond Good and Evil'?", "back": "The 'Genealogy' sustains a continuous argument rather than an aphoristic style."}, {"front": "In German, what two distinct meanings are captured by the single word 'Schuld'?", "back": "Guilt and debt."}, {"front": "Why does Nietzsche view the dual meaning of the German word 'Schuld' as significant?", "back": "He believes it provides linguistic evidence of a genuine historical connection between moral guilt and economic debt."}, {"front": "According to Nietzsche, what was the nature of the earliest human sense of obligation?", "back": "It was economic rather than spiritual."}, {"front": "From what material practice did moral guilt evolve?", "back": "The practice of lending and borrowing (owing and repaying)."}, {"front": "When we speak of 'paying for' our sins, what type of language are we using according to Nietzsche?", "back": "The language of commerce and debt."}, {"front": "The term 'redeeming' oneself is derived from which historical context?", "back": "The debtor-creditor relationship."}, {"front": "What commercial term is often applied to sin in religious contexts?", "back": "Wages."}, {"front": "What is Nietzsche's counterintuitive claim regarding the relationship between punishment and guilt?", "back": "Punishment does not produce a sense of guilt in the person being punished."}, {"front": "According to Nietzsche's observation, which group of people is least likely to develop a guilty conscience?", "back": "Those most exposed to punishment, such as criminals and prisoners."}, {"front": "How does punishment typically affect a person's character instead of producing remorse?", "back": "It makes them cautious, cunning, resentful, and hardened."}, {"front": "Why does punishment fail to create moral transformation in the soul?", "back": "It is an external imposition that acts on the body rather than the soul."}, {"front": "What lesson does a prisoner typically learn from being beaten?", "back": "To avoid being caught in the future."}, {"front": "What is the specific source of the internal feeling that one 'deserves' punishment?", "back": "Bad conscience."}, {"front": "How is bad conscience produced in the individual?", "back": "Through the internalization of instinct."}, {"front": "According to Nietzsche, what is the 'confusion' upon which the criminal justice system rests?", "back": "The expectation that punishment will create guilt, when it actually produces fear and cunning."}, {"front": "What is the limit of punishment's effect on guilt?", "back": "It can reinforce existing guilt but cannot create it."}, {"front": "Nietzsche famously metaphors bad conscience as a 'disease' similar to what biological state?", "back": "Pregnancy."}, {"front": "In the metaphor of bad conscience as 'pregnancy,' what is the creative outcome?", "back": "The birth of the human interior and the capacity for self-reflection."}, {"front": "What would human beings lack if they did not possess bad conscience?", "back": "Depth and the capacity for self-examination."}, {"front": "What is Nietzsche's term for the noble predator who acts without guilt?", "back": "The blond beast."}, {"front": "What does the internalization of instinct allow humans to imagine?", "back": "Being other than what they currently are."}, {"front": "Nietzsche describes bad conscience as the 'womb' of which cultural developments?", "back": "Art, philosophy, religion, and human culture."}, {"front": "What does Nietzsche call the 'price we pay' for having souls?", "back": "Bad conscience."}, {"front": "How does the 'priestly' answer interpret bad conscience?", "back": "As evidence of sin and unworthiness before God."}, {"front": "What is Nietzsche's proposed alternative to the moralization of bad conscience?", "back": "Redirecting it from self-punishment toward self-creation and affirmation."}, {"front": "The earliest human sense of obligation was _____ rather than spiritual.", "back": "Economic"}, {"front": "Nietzsche argues that moral guilt did not descend from heaven but evolved from _____.", "back": "Material practices of lending and borrowing"}, {"front": "While a standard disease destroys, Nietzsche's metaphor of 'pregnancy' implies that bad conscience _____.", "back": "Creates"}, {"front": "Nietzsche argues that bad conscience is the origin of the human _____.", "back": "Interior (or soul)"}, {"front": "Punishment acts on the _____ rather than the soul.", "back": "Body"}, {"front": "The internalization of instinct involves turning _____ instincts against the self.", "back": "Aggressive"}, {"front": "What is the primary psychological effect of punishment according to Nietzsche?", "back": "It makes people more cautious and cunning to avoid future pain."}, {"front": "Term: Internalization of Instinct", "back": "Definition: The process where aggressive drives that cannot be released outwardly are inhibited and turned inward against the self."}, {"front": "Concept: The Schuld Pun", "back": "Definition: The linguistic identity in German between the concepts of 'guilt' and 'debt'."}, {"front": "Concept: Bad Conscience", "back": "Definition: A state of inner suffering caused by internalized instincts, serving as the origin of human depth and the soul."}, {"front": "Why is the connection between guilt and debt less obvious to English speakers than to German speakers?", "back": "The English words 'guilt' and 'debt' come from entirely different linguistic roots."}, {"front": "What capacity allows humans to set goals for self-transformation?", "back": "The capacity for self-reflection created by bad conscience."}, {"front": "In Nietzsche's view, can bad conscience be entirely removed from human existence?", "back": "No, it is an irreversible condition of human depth."}, {"front": "How does Nietzsche characterize the 'blond beast' in terms of reflection?", "back": "They are unreflective and act with strong spontaneity."}, {"front": "What role does Nietzsche assign to bad conscience in the development of art?", "back": "It is the 'womb' or creative condition under which art becomes possible."}, {"front": "How does punishment impact existing feelings of guilt?", "back": "It can reinforce them but cannot generate them from scratch."}, {"front": "According to Nietzsche, where does the 'soul' come from?", "back": "The internalization of instincts and the resulting bad conscience."}, {"front": "What is the result of applying bad conscience to the pursuit of self-creation?", "back": "Affirmation."}, {"front": "What does the 'priestly' interpretation of guilt aim to prove?", "back": "Human unworthiness before God."}, {"front": "Nietzsche claims that the feeling of deserving punishment comes not from without, but from _____.", "back": "Within (or bad conscience)"}, {"front": "Why does Nietzsche believe criminals do not feel guilty?", "back": "Because punishment is perceived as an external force to be navigated, not an internal moral failing."}, {"front": "The language of 'wages of sin' is an example of what conceptual overlap?", "back": "The overlap between moral transgression and economic debt."}, {"front": "In Nietzsche's framework, what is the primary difference between a 'magnificent animal' and a human with 'depth'?", "back": "The animal lacks bad conscience and the ability to examine itself."}, {"front": "What is the 'disease' of bad conscience described as potentially creating?", "back": "Something genuinely new, such as self-overcoming and the inner world."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
