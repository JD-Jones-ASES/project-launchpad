<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does Oliver Wendell Holmes Jr. identify as the 'ruling value' that replaced honor in Gilded Age America?", "back": "Commerce"}, {"front": "According to Holmes, what has become the primary measure of a man in a peaceful, commercial society?", "back": "Wealth"}, {"front": "Holmes critiques the 'comfortable classes' for desiring a world in which they can shine without what two factors?", "back": "Trouble or danger"}, {"front": "In Holmes' cultural critique, he argues that a nation trading warrior virtues for material success is in a state of _____.", "back": "Decline"}, {"front": "What does Holmes identify as the 'foundation' of his entire argument in 'The Soldier's Faith'?", "back": "The diagnosis of a society gone soft through peace and materialism."}, {"front": "Which specific figure does Holmes mention to illustrate the contemporary worship of wealth?", "back": "Vanderbilt"}, {"front": "According to Holmes, what has 'dissolved the old religious certainties' in modern society?", "back": "Scientific materialism"}, {"front": "What term refers to the qualities like courage, discipline, and self-sacrifice believed to be developed through military service?", "back": "Martial virtue"}, {"front": "How does Holmes define the 'Soldier's Faith'?", "back": "The willingness to die for a cause one does not fully understand."}, {"front": "In Holmes' view, what is the 'supreme expression of human nobility'?", "back": "The Soldier's Faith (acting without certainty or guarantee of reward)."}, {"front": "Does Holmes argue that a war must be 'just' for the soldier's faith to be valuable?", "back": "No, he claims the act of faith itself is the highest value regardless of the cause."}, {"front": "What are the two principal sources of evidence Holmes uses to support his argument?", "back": "Personal combat experience and cultural/literary tradition."}, {"front": "What rhetorical appeal does Holmes establish by describing his own memories of standing under artillery fire?", "back": "Ethos (the authority of the witness)."}, {"front": "Which literary works or authors does Holmes invoke to show that the warrior ideal is a Western inheritance?", "back": "Beowulf, Tennyson, Swinburne, and Spenser."}, {"front": "According to Holmes' argument structure, why are martial virtues essential to a civilization's health?", "back": "They prevent the moral complacency and loss of sacrifice inherent in a society focused only on comfort."}, {"front": "What is the key 'unstated assumption' identified in Holmes' argument for war?", "back": "The virtues developed through war cannot be cultivated by any other means."}, {"front": "What economic question regarding war does Holmes entirely omit from his speech?", "back": "Who profits from the conflict and who bears the financial cost."}, {"front": "How does Holmes view the political causes of specific wars?", "back": "He treats war as a permanent feature of human existence rather than a political decision to be evaluated."}, {"front": "In Holmes' speech, the soldier is portrayed as a figure of _____ rather than a victim of suffering.", "back": "Nobility"}, {"front": "What social divide does Holmes fail to address in his analysis of the military experience?", "back": "The gap between officers and enlisted men."}, {"front": "Why is it inaccurate to label Holmes a 'warmonger' based on his speech?", "back": "He explicitly describes war as 'horrible and dull' and hopes America isn't called to fight again soon."}, {"front": "What does Holmes consider the 'antidote' to the moral complacency of a commercial society?", "back": "War, or at minimum, the willingness to face danger."}, {"front": "Holmes identifies the 'revolt against suffering' through what two specific types of organizations?", "back": "Socialism and societies for the prevention of cruelty."}, {"front": "Concept: The authority of the witness", "back": "The credibility a speaker gains by having personally experienced the events they are describing."}, {"front": "What specific battlefield experience does Holmes cite to establish his credibility?", "back": "Standing under artillery fire and advancing toward a line of fire at night."}, {"front": "According to Holmes, what human capacity is revealed through the 'spiritual dimension' of war?", "back": "The capacity for faith and sacrifice."}, {"front": "Holmes argues that Gilded Age America has traded 'hard virtues' for '_____ pleasures'.", "back": "Soft"}, {"front": "What does Holmes mean by 'blind' faith in the context of a soldier?", "back": "The willingness to act on a belief one cannot prove and follow orders one cannot question."}, {"front": "Which future figure is mentioned as a contrast to Holmes for focusing on the economic profits of war?", "back": "Smedley Butler"}, {"front": "Which author's work is cited as a contrast to Holmes' noble portrait of the soldier?", "back": "Remarque"}, {"front": "What is the 'disease' Holmes diagnoses in American society?", "back": "Devotion to comfort, profit, and the avoidance of pain."}, {"front": "According to Holmes, martial virtues are not the virtues of the _____ or the library.", "back": "Marketplace"}, {"front": "Holmes claims the warrior ideal grows from the belief that some things are '_____'.", "back": "Worth dying for"}, {"front": "In 'The Soldier's Faith', Holmes focuses on the _____ dimension of war over its politics or economics.", "back": "Spiritual"}, {"front": "How does Holmes characterize the relationship between a soldier and the 'plan' they are part of?", "back": "The soldier acts in a plan they did not choose and under orders they cannot question."}, {"front": "What does Holmes identify as the 'root' of the code of the gentleman and the ethic of honor?", "back": "The belief that certain values are worth the sacrifice of one's life."}, {"front": "Term: Scientific Materialism (in Holmes' context)", "back": "The worldview that emphasizes physical matter and laws, often dissolving traditional religious certainties."}, {"front": "What does Holmes believe happens to a society that knows only 'comfort'?", "back": "It loses the capacity for sacrifice, courage, and faith."}, {"front": "Why does Holmes emphasize the 'blindness' of the soldier's faith as its highest quality?", "back": "Because acting without certainty is, for him, the supreme expression of human nobility."}, {"front": "What is the primary target of Holmes' critique in the 'Diagnosis' section of his argument?", "back": "The moral decline caused by the pursuit of material success in the Gilded Age."}, {"front": "How does Holmes justify the 'horrible and dull' nature of war in his philosophy?", "back": "By arguing that the indispensable qualities war demands outweigh its unpleasantness."}, {"front": "In the argument map, what is the 'Reasoning' provided for why war is necessary?", "back": "A society focused only on comfort loses the capacity for virtues essential to its health."}, {"front": "What role does 'duty' play in Holmes' concept of martial virtue?", "back": "Obedience to duty is required even when it makes no rational sense."}, {"front": "True or False: Holmes provides a detailed analysis of the political justifications for the Civil War in this speech.", "back": "False"}, {"front": "What does the text suggest is the significance of Holmes' Harvard education and wealthy background?", "back": "It may create a gap between his noble view of war and the experience of working-class soldiers."}, {"front": "According to Holmes, what has peace done to the 'honor' of the warrior past?", "back": "It has been replaced by commerce as the ruling social value."}, {"front": "In Holmes' view, is the soldier's faith defined by the 'outcome' of the battle?", "back": "No, it is defined by the act of sacrifice without guarantee of reward."}, {"front": "What is the 'prescription' Holmes offers to cure the 'disease' of societal softness?", "back": "The cultivation of martial virtues through war or the facing of danger."}, {"front": "What 'specific revolt' does Holmes identify as a sign of the avoidance of pain?", "back": "The revolt against suffering (socialism and societies for the prevention of cruelty)."}, {"front": "Why is the 'Soldier's Faith' considered a 'provocative' philosophy?", "back": "Because it values blind obedience and death for a cause regardless of its merits."}, {"front": "What is the 'skeleton beneath the skin' referring to in the introduction of the text?", "back": "The underlying coherent philosophy beneath Holmes' eloquent rhetorical prose."}, {"front": "According to Holmes, what quality allows a human to act decisively under conditions of 'extreme uncertainty'?", "back": "Martial virtue"}, {"front": "What is the 'radically' different view of war that Holmes presents compared to standard defenses of a cause?", "back": "The claim that the act of faith is higher than the righteousness of the cause itself."}, {"front": "In the context of the speech, what does 'Acting without certainty' signify?", "back": "The capacity for faith and the supreme expression of human nobility."}, {"front": "What is the 'Evidence' section of the argument map primarily comprised of?", "back": "Personal experience (ethos), Western literary tradition, and observations of moral decline."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
