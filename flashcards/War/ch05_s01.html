    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the text, what is the deepest disagreement between Oliver Wendell Holmes Jr. and Smedley Butler regarding war?", "back": "Their disagreement is philosophical, concerning 'what war does to the human soul,' beyond just policy."}, {"front": "What does the term 'crucible' mean, both literally and figuratively, in the context of Holmes' view of war?", "back": "Literally, a container for melting metals at high temperatures; figuratively, a severe test or trial that transforms whatever passes through it."}, {"front": "What was Oliver Wendell Holmes Jr.'s core claim about the impact of war on society?", "back": "War cultivates virtues (courage, self-sacrifice, discipline, faith) that a peaceful, commercial society cannot produce, preventing civilization from growing soft."}, {"front": "Why did Holmes believe war was necessary for society, particularly in the Gilded Age?", "back": "He believed the focus on profit and material comfort in Gilded Age America prevented the development of moral virtues, which war's pressure could restore."}, {"front": "How did Holmes' personal experience strengthen his argument about war's virtues?", "back": "As a Civil War veteran shot multiple times and left for dead, his direct experience of battle gave his claims about soldier's faith and courage significant personal authority (ethos)."}, {"front": "What was Smedley Butler's core claim about the true nature and purpose of war?", "back": "War is a 'racket': a scheme where a few profit (corporations, profiteers) and the many (soldiers, families) pay, systematically exploiting soldiers' courage for economic interests."}, {"front": "Define 'profiteer' as used in Butler's argument.", "back": "A person who makes an excessive or unfair profit, especially during a time of national difficulty such as war."}, {"front": "How did Smedley Butler's background lend weight to his condemnation of war?", "back": "As a highly decorated career Marine (two Medals of Honor), he spoke from decades of direct combat experience, concluding the entire enterprise was a con, making his pacifist stance powerful."}, {"front": "What is the 'most striking thing' about the disagreement between Holmes and Butler, despite their opposing views?", "back": "Both men earned the right to their opinions by putting their lives on the line as veterans, making their differing conclusions about their experiences particularly poignant."}, {"front": "What is the fundamental difference in focus between Holmes' and Butler's perspectives on war?", "back": "Holmes focuses on the individual experience of war and the virtues it cultivates, while Butler focuses on the systemic function of war and its exploitation for economic interests."}, {"front": "According to the text, how is it possible that both Holmes and Butler could be considered 'right' in their differing views on war?", "back": "Holmes describes what war does to individual persons (cultivating virtue), while Butler describes what war does to systems (serving corrupt economic purposes). Both reveal a truth, but at different scales."}, {"front": "Give examples of the individual virtues Holmes attributed to soldiers in war.", "back": "Courage, self-sacrifice, discipline, faith without certainty, action without guarantee, the willingness to advance under fire or carry a wounded comrade."}, {"front": "Who does Butler identify as the real beneficiaries of war, and what is the effect on soldiers and their families?", "back": "Corporations and profiteers are the real beneficiaries. War destroys bodies, minds, and families for soldiers, while enriching a small class who never experience combat."}, {"front": "The text identifies a tension between individual virtue and systemic exploitation. How does war intensify this tension to a 'breaking point'?", "back": "Unlike other forms of difficult work, the stakes in war are not merely wages or working conditions but life and death, making the exploitation of individual virtue particularly severe."}, {"front": "How do Holmes' and Butler's perspectives serve as different 'lenses' through which to view war?", "back": "Holmes' lens reveals the best human beings are capable of; Butler's lens reveals the worst institutions are capable of. Both reveal something true."}, {"front": "What critical question does the 'Question of Scale' raise regarding acknowledging a soldier's virtue?", "back": "It asks whether acknowledging the soldier's virtue (as Holmes does) distracts us from questioning the corrupt system (as Butler demands)."}, {"front": "Which author mentioned in the introduction provided a voice for soldiers finding that 'no argument... matched the reality of the trenches'?", "back": "Erich Maria Remarque, author of 'All Quiet on the Western Front'."}, {"front": "Besides Holmes and Butler, what 'middle ground' perspective on war is mentioned in the introduction?", "back": "Woodrow Wilson argued that war is terrible but sometimes necessary."}, {"front": "How did Holmes contrast the virtues cultivated by war with the characteristics of Gilded Age America?", "back": "He believed the Gilded Age, with its focus on profit and material comfort, could not produce virtues like courage and self-sacrifice on its own, needing war to prevent moral atrophy."}, {"front": "Define 'pacifist' in the context of Smedley Butler's later views.", "back": "A person who believes that war and violence are unjustifiable and who refuses to participate in or support armed conflict."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
