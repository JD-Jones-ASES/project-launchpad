<html lang="en">
<head>

    <link rel="stylesheet" href="../../styles.css">

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>

            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary goal of communication defined as propaganda?", "back": "To influence attitudes and behavior rather than to inform or reason."}, {"front": "Propaganda is characterized by subordinating _____ to _____.", "back": "truth; effect"}, {"front": "Legitimate persuasion is characterized by subordinating _____ to _____.", "back": "effect; truth"}, {"front": "Name the propaganda technique that involves only using specific data points to support a position while ignoring others.", "back": "Selective presentation of facts."}, {"front": "Which propaganda technique aims to provoke specific feelings to bypass a person's rational thinking?", "back": "Emotional manipulation."}, {"front": "How does the repetition of slogans function as a propaganda technique?", "back": "It reinforces a message through constant recurrence rather than logical evidence."}, {"front": "What propaganda technique involves portraying an opponent as evil or subhuman?", "back": "Demonization."}, {"front": "Besides group identity, what is a common psychological state targeted by propaganda appeals?", "back": "Fear."}, {"front": "What is the propaganda technique of intentionally ignoring or hiding opposing viewpoints?", "back": "Suppression of counterarguments."}, {"front": "Why is the line between persuasion and propaganda considered \"blurry\" in practice?", "back": "Because every effective argument must select evidence and use emotion to some degree."}, {"front": "Term: Straw Man", "back": "Definition: Misrepresenting an opponent's position to make it easier to attack."}, {"front": "Why do propagandists frequently use straw man arguments?", "back": "They allow the arguer to appear victorious without engaging an opponent's strongest points."}, {"front": "Term: False Dilemma (or False Dichotomy)", "back": "Definition: Presenting only two options when more alternatives actually exist."}, {"front": "What is the primary psychological effect of a false dilemma in propaganda?", "back": "It creates a sense of urgency and forecloses alternative solutions."}, {"front": "In Oliver Wendell Holmes' address, what specific aspect of war is omitted to focus on martial virtue?", "back": "The physical horrors and suffering of combat, such as \"the screaming and the gangrene.\""}, {"front": "What context suggests that Holmes' address might be ceremonial rather than manipulative propaganda?", "back": "He was delivering a Memorial Day address to honor the dead, not recruiting for a new war."}, {"front": "Smedley Butler's pamphlet is often scrutinized for propaganda because it omits what counterargument regarding war?", "back": "The possibility that some wars might be morally justified regardless of corporate profits."}, {"front": "What element of Smedley Butler's argument supports its status as legitimate persuasion?", "back": "His factual claims about wartime profits were largely accurate and based on real data."}, {"front": "Why is Woodrow Wilson's war address considered the \"hardest case\" in the study of propaganda?", "back": "It combined moral necessity and factual crises to persuade Congress into an act with life-and-death consequences."}, {"front": "How did Wilson simplify the complex imperial interests of Britain and France in his address?", "back": "He framed the conflict strictly as a contest between democracy and autocracy."}, {"front": "What factual evidence did Wilson use to show that the crisis he described was genuine?", "back": "Germany's submarine warfare and the Zimmermann Telegram."}, {"front": "What was the Nazi regime's justification for burning Erich Maria Remarque's novel?", "back": "They viewed its unflinching depiction of war's horror as a betrayal of the German soldier."}, {"front": "How can a truthful witness account, like Remarque's novel, function as propaganda?", "back": "By having a political effect—making war harder to glorify—regardless of the author's intent."}, {"front": "According to the text, why is it a mistake to define propaganda as \"any argument I disagree with\"?", "back": "Propaganda refers to specific manipulative techniques, not the content of an opinion."}, {"front": "Why is the presence of true facts not enough to disqualify a statement from being propaganda?", "back": "Systematic selection and framing of true facts can still be used to prevent critical thinking."}, {"front": "Diagnostic Question: How does a writer's treatment of counterarguments indicate honest persuasion?", "back": "Honest persuasion acknowledges and engages with the strongest opposing views."}, {"front": "Diagnostic Question: How should a reader evaluate the evidence presented in a suspicious argument?", "back": "By checking if the claims are supported by data that can be independently verified."}, {"front": "Diagnostic Question: What role does audience autonomy play in distinguishing persuasion from propaganda?", "back": "Legitimate persuasion leaves the audience free to disagree, while propaganda seeks to eliminate alternatives."}, {"front": "Diagnostic Question: What is the relationship between emotional intensity and evidence in a manipulative argument?", "back": "The argument generates significantly more emotional heat than its evidence actually warrants."}, {"front": "Diagnostic Question: What logical structure should a reader look for when checking for a false dilemma?", "back": "The simplification of a complex situation into a binary choice."}, {"front": "What is the primary difference between Holmes' intent and the typical intent of a propagandist?", "back": "Holmes sought to give meaning to sacrifice in a philosophical context rather than manipulate an unwilling populace."}, {"front": "How did the British naval blockades complicate Wilson’s depiction of the war as purely moral?", "back": "They also resulted in the deaths of civilians, similar to the German submarine warfare he criticized."}, {"front": "According to the text, what is the danger of using the word \"propaganda\" too loosely?", "back": "It tends to end conversations and analysis rather than start them."}, {"front": "What specific technique is used when an author presents corporate profit figures without mentioning the lives saved by those corporations' goods?", "back": "Selective presentation of facts."}, {"front": "Why is a true dilemma not considered a \"false dilemma\" even if it only offers two options?", "back": "Because in some cases, there actually are only two available responses to a situation."}, {"front": "What does the text suggest is the ultimate \"survival skill\" for citizens in a democracy?", "back": "The ability to identify and evaluate the techniques of persuasion and propaganda in public rhetoric."}, {"front": "In the context of the four writers, which one focused on elevating the soldier's experience to a level of religious devotion?", "back": "Oliver Wendell Holmes."}, {"front": "Which writer's work was stripped of citizenship and banned for its political effect on the audience?", "back": "Erich Maria Remarque."}, {"front": "The text states that propaganda often creates a sense of _____ to foreclose alternatives.", "back": "urgency"}, {"front": "How does the text define the \"intent\" of legitimate persuasion regarding truth?", "back": "It aims to use rhetoric to serve or illuminate the truth."}, {"front": "What is the problem with characterizing Wilson's argument as \"he wanted war because he enjoyed it\"?", "back": "It is a straw man argument that ignores his stated view of war as a \"fearful thing.\""}, {"front": "According to the text, the difference between persuasion and propaganda is a matter of _____ and _____, not kind.", "back": "degree; intent"}, {"front": "Why might a writer's focus on a specific case be considered legitimate rather than propaganda?", "back": "It may reflect the natural emphasis required to argue a specific point clearly."}, {"front": "What was the purpose of the \"Uncle Sam Needs That Extra Shovelful\" poster?", "back": "To use patriotic imagery to direct civilian behavior on the home front during World War I."}, {"front": "What historical group govern millions without a voice, contradicting Wilson's \"democracy versus autocracy\" framing?", "back": "The colonial empires of Britain and France."}, {"front": "A writer who uses pressure or shame to force agreement is likely using _____.", "back": "propaganda"}, {"front": "If a writer acknowledges that reasonable opposition exists, they are likely practicing _____.", "back": "honest persuasion"}, {"front": "Which diagnostic question helps identify if an argument is oversimplifying a moral question?", "back": "Does the writer simplify a complex situation into a binary choice?"}, {"front": "What is the relationship between factual accuracy and Smedley Butler's emotional appeals?", "back": "His appeals were grounded in real suffering rather than fabricated scenarios."}, {"front": "What distinguishes Holmes’ use of language from \"calculated distortion\"?", "back": "It is viewed as artful emphasis appropriate for a ceremonial address."}, {"front": "In propaganda, the presentation of facts is often described as being _____.", "back": "systematic"}, {"front": "What is the primary danger of propaganda to an audience’s cognitive process?", "back": "It is designed to prevent the audience from thinking critically."}, {"front": "Which author’s work is described as having no explicit argument or policy recommendations?", "back": "Erich Maria Remarque."}, {"front": "The line between persuasion and propaganda is described as a _____ rather than a wall.", "back": "spectrum"}, {"front": "How does the text suggest thoughtful readers should categorize writers?", "back": "By locating them on a spectrum rather than sorting them into heroes and villains."}, {"front": "What does a reader identify when they find a claim supported only by emotional appeals that resist scrutiny?", "back": "A likely sign of propaganda."}, {"front": "What does the text label as \"name-calling\" rather than analysis?", "back": "Calling an argument propaganda without identifying specific manipulative techniques."}, {"front": "What historical event in May 1933 is cited as a reaction to Remarque's \"propaganda\" effect?", "back": "The Nazi book burnings."}, {"front": "How did Wilson's address utilize moral necessity?", "back": "It created enormous pressure for agreement by framing the war as a righteous cause."}, {"front": "Why is selective evidence necessary in even the most legitimate arguments?", "back": "No writer can present every single fact; choices must be made for clarity and focus."}, {"front": "When does emotional appeal become a sign of propaganda according to the diagnostic tests?", "back": "When the intensity of the emotion does not match the strength of the evidence provided."}, {"front": "Which writer used vivid imagery of wounded veterans to provoke outrage over corporate profits?", "back": "Smedley Butler."}, {"front": "What does the text conclude about the possibility of an answer to \"When does persuasion become propaganda?\"", "back": "It is not an easy question and the book provides tools for thinking rather than a final answer."}, {"front": "The phrase \"Either we go to war or we surrender our freedoms\" is an example of what fallacy?", "back": "False dilemma."}, {"front": "What defines the \"appropriate focus\" of a Memorial Day address like Holmes'?", "back": "Honoring the dead and finding meaning in their sacrifice."}, {"front": "According to the definition, what does propaganda typically suppress?", "back": "Counterarguments."}, {"front": "What is the significance of the diagnostic questions provided at the end of the text?", "back": "They are a test to practice critical analysis rather than to deliver a final verdict."}, {"front": "Propaganda is communication designed primarily to influence _____ and _____.", "back": "attitudes; behavior"}, {"front": "Why should readers be cautious about using the word \"propaganda\" too loosely based on Remarque's case?", "back": "Because even a truthful witness account can be labeled propaganda by those who want to suppress it."}, {"front": "In the context of the text, what is the value of learning to read historical writers with a critical eye?", "back": "It serves as practice for evaluating the arguments aimed at citizens in contemporary life."}, {"front": "Which technique allows a propagandist to appear to defeat an opponent without engaging their actual claims?", "back": "Straw man argument."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
