    <style>
        .fc-container {
            max-width: 700px;

        }
        .fc-label {

            font-weight: 600;

            transition: all 0.3s ease;

        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;

        .fc-btn:disabled {

        }
        .fc-btn:disabled:hover {

        .fc-counter {

        /* Progress bar */

        /* Toolbar */

        .fc-tool.active {

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">

                    <button class="fc-tool" onclick="resetDeck()">Reset</button>

    <script>
    var CARDS = [{"front": "What forty-year period of history is spanned by the four writers discussed in the text?", "back": "The writers span the years from 1895 to 1935."}, {"front": "What historical event is identified as the primary catastrophe that shaped the arguments of the four writers?", "back": "The First World War shaped their arguments."}, {"front": "On what date was Archduke Franz Ferdinand of Austria-Hungary assassinated?", "back": "He was assassinated on June 28, 1914."}, {"front": "What was the nationalist identity of the individual who assassinated Archduke Franz Ferdinand?", "back": "The assassin was a Serbian nationalist."}, {"front": "Which nation did Austria-Hungary declare war on following the Archduke's assassination?", "back": "Austria-Hungary declared war on Serbia."}, {"front": "Why did Russia mobilize its military immediately after the declaration of war on Serbia?", "back": "Russia mobilized to defend its ally, Serbia."}, {"front": "Which major power provided military backing to Austria-Hungary in 1914?", "back": "Germany backed Austria-Hungary."}, {"front": "Which three nations comprised the Triple Entente in 1914?", "back": "The Triple Entente consisted of France, Russia, and Britain."}, {"front": "Which three powers formed the Central Powers in 1914?", "back": "The Central Powers were Germany, Austria-Hungary, and the Ottoman Empire."}, {"front": "How did the European alliance system contribute to the scale of World War I?", "back": "It obligated members to fight if a partner was attacked, turning a regional dispute into a continental war."}, {"front": "Term: Western Front", "back": "The four-hundred-mile line of trenches stretching from the English Channel to the Swiss border."}, {"front": "To what specific location did the Western Front trenches stretch from the English Channel?", "back": "The trenches stretched to the Swiss border."}, {"front": "What environmental conditions defined the daily experience of soldiers on the Western Front?", "back": "Soldiers lived in mud surrounded by barbed wire."}, {"front": "Which 1916 battle resulted in over one million combined casualties for British, French, and German forces?", "back": "The Battle of the Somme resulted in over one million casualties."}, {"front": "How far did the front line move as a result of the Battle of the Somme?", "back": "The front line moved barely six miles."}, {"front": "Approximately how many soldiers were killed during World War I?", "back": "Approximately ten million soldiers died."}, {"front": "On what date did World War I officially end?", "back": "The war ended on November 11, 1918."}, {"front": "What pandemic contributed to millions of deaths during 1918–1919?", "back": "The influenza pandemic caused millions of additional deaths."}, {"front": "For how long did the United States remain neutral before entering World War I?", "back": "The United States stayed out of the conflict for nearly three years."}, {"front": "What slogan did Woodrow Wilson use during his 1916 re-election campaign?", "back": "Wilson's slogan was \"He Kept Us Out of War.\""}, {"front": "Cloze: In early 1917, Germany's decision to resume _____ warfare pushed the United States toward war.", "back": "unrestricted submarine"}, {"front": "What was the Zimmermann Telegram?", "back": "It was a secret German proposal for a military alliance with Mexico against the United States."}, {"front": "Which nation intercepted and decoded the Zimmermann Telegram?", "back": "British intelligence intercepted and decoded the message."}, {"front": "Which three U.S. states did Germany promise to return to Mexico in the Zimmermann Telegram?", "back": "Germany promised the return of Texas, New Mexico, and Arizona."}, {"front": "In what month and year was the Zimmermann Telegram made public to Americans?", "back": "It was made public in March 1917."}, {"front": "On what date did Woodrow Wilson ask Congress for a declaration of war?", "back": "He asked for the declaration on April 2, 1917."}, {"front": "What was the name of the 1919 treaty that officially ended World War I?", "back": "The treaty was the Treaty of Versailles."}, {"front": "Which nation was forced to accept sole responsibility for World War I under the Treaty of Versailles?", "back": "Germany was forced to accept sole responsibility."}, {"front": "What economic penalty was imposed on Germany as part of the 1919 peace treaty?", "back": "Germany was forced to pay enormous reparations."}, {"front": "What international organization did Woodrow Wilson propose that was ultimately rejected by the U.S. Senate?", "back": "The U.S. Senate rejected the League of Nations."}, {"front": "What political movement rose in Italy and Germany during the interwar years (1919–1939)?", "back": "Fascism rose in Italy and Germany during this period."}, {"front": "Who was the retired Marine general who authored \"War Is a Racket\" in 1935?", "back": "Smedley Butler wrote the book."}, {"front": "What was the \"Bonus Army\" of 1932?", "back": "The Bonus Army consisted of impoverished veterans demanding early payment of wartime service bonuses."}, {"front": "What was the \"Business Plot\" that Smedley Butler testified about to Congress?", "back": "It was an alleged conspiracy by wealthy industrialists to overthrow President Franklin Roosevelt."}, {"front": "How did Oliver Wendell Holmes' historical background influence his view of war?", "back": "Holmes thought of war through the lens of the Civil War."}, {"front": "Which two writers in the book focused on the post-war question of whether the conflict's cost was worth paying?", "back": "Smedley Butler and Erich Maria Remarque focused on this question."}, {"front": "What was the length of the trench network on the Western Front?", "back": "The trenches stretched for more than four hundred miles."}, {"front": "Cloze: The _____ system that was supposed to prevent war made it almost inevitable in 1914.", "back": "alliance"}, {"front": "What specific weaponized threat, in addition to artillery, did soldiers face in the trenches?", "back": "Soldiers lived under the constant threat of poison gas."}, {"front": "Who was the German Foreign Secretary who sent the coded telegram to Mexico in 1917?", "back": "The telegram was sent by Arthur Zimmermann."}, {"front": "What was the primary sentiment among many Americans regarding World War I during the interwar years?", "back": "There was a growing sense that the war had been a mistake."}, {"front": "Why did the U.S. nation eventually choose to fight according to the text's description of Woodrow Wilson?", "back": "The nation reached a \"moment of decision\" regarding Germany's naval and diplomatic provocations."}, {"front": "What condition was placed on Mexico receiving territory from the U.S. in the Zimmermann proposal?", "back": "Mexico had to attack the U.S. if the U.S. entered the war against Germany."}, {"front": "How did the scale of death in WWI change the public's perception of warfare?", "back": "The vast scale of death changed how people thought about war itself."}, {"front": "What was the approximate range of military deaths in World War I according to general estimates?", "back": "Military deaths are generally placed between 9 and 11 million."}, {"front": "Cloze: The interwar years were characterized by the rise of fascism and _____ instability.", "back": "economic"}, {"front": "Which author is associated with the 1932 Bonus Army march?", "back": "Smedley Butler is associated with the march."}, {"front": "What was the geopolitical status of Europe in the summer of 1914 before the assassination?", "back": "Europe was a network of alliances and imperial ambitions held together by habit."}, {"front": "Which writer's perspective represented the nation's view before the First World War began?", "back": "Oliver Wendell Holmes represented that pre-war perspective."}, {"front": "What did British intelligence do after intercepting Arthur Zimmermann's telegram?", "back": "They decoded the message and made it public in March 1917."}, {"front": "Term: Reparations", "back": "Compensatory payments forced upon Germany for its role in starting World War I."}, {"front": "In what year did the Battle of the Somme occur?", "back": "The Battle of the Somme occurred in 1916."}, {"front": "What was the goal of the Serbian nationalist in June 1914?", "back": "The goal was the assassination of Archduke Franz Ferdinand."}, {"front": "According to the text, what atmosphere shaped Smedley Butler's writing of \"War Is a Racket\"?", "back": "He wrote it in an atmosphere of post-war disillusionment."}, {"front": "What was the primary outcome of Wilson’s dream for a League of Nations in the United States?", "back": "It was realized on paper but ultimately rejected by the Senate."}, {"front": "Cloze: The Battle of the Somme killed or wounded more than _____ men.", "back": "one million"}, {"front": "Which writer's work is specifically mentioned as being written in 1935?", "back": "Smedley Butler wrote his work in 1935."}, {"front": "What does the 1916 map of Verdun illustrate about trench warfare?", "back": "It illustrates the scale and complexity of dense networks of positions and fortifications."}, {"front": "What prompted the revelation of the Zimmermann Telegram to have such a strong impact on the U.S.?", "back": "The telegram provoked American outrage by proposing a Mexican attack on U.S. soil."}, {"front": "Which writer's perspective is contrasted with Butler and Remarque's post-war views?", "back": "Woodrow Wilson's perspective at the \"moment of decision\" is contrasted with them."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
