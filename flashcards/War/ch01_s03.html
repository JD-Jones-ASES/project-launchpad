<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What were the dates of Oliver Wendell Holmes Jr.'s life?", "back": "1841–1935"}, {"front": "What was the profession of Oliver Wendell Holmes Sr.?", "back": "He was a physician, poet, and essayist."}, {"front": "In what city was Oliver Wendell Holmes Jr. born?", "back": "Boston"}, {"front": "On what date was Oliver Wendell Holmes Jr. born?", "back": "March 8, 1841"}, {"front": "In what year did Oliver Wendell Holmes Jr. enter Harvard College?", "back": "1857"}, {"front": "Which military unit did Holmes join at the start of the Civil War?", "back": "The Twentieth Massachusetts Volunteer Infantry"}, {"front": "What was the nickname of the Twentieth Massachusetts Volunteer Infantry?", "back": "The \"Harvard Regiment\""}, {"front": "Why was the Twentieth Massachusetts known as the \"Harvard Regiment\"?", "back": "Many of its officers were Harvard men."}, {"front": "What was Holmes's initial rank when he joined the army in 1861?", "back": "First lieutenant"}, {"front": "How many times was Oliver Wendell Holmes Jr. seriously wounded during the Civil War?", "back": "Three times"}, {"front": "Where was Holmes first wounded in October 1861?", "back": "Ball's Bluff, Virginia"}, {"front": "What specific injury did Holmes sustain at the Battle of Ball's Bluff?", "back": "He was shot through the chest."}, {"front": "What happened to Union forces during the disastrous engagement at Ball's Bluff?", "back": "They were driven into the Potomac River."}, {"front": "During which 1862 battle was Holmes shot through the neck?", "back": "Antietam, Maryland"}, {"front": "How is the Battle of Antietam described in terms of its casualties?", "back": "The bloodiest single day in American history"}, {"front": "Who traveled from Boston to find the wounded Holmes after the Battle of Antietam?", "back": "His father, Oliver Wendell Holmes Sr."}, {"front": "In what city and state was Holmes wounded for the third time in May 1863?", "back": "Fredericksburg, Virginia"}, {"front": "During which larger military campaign was Holmes wounded at Fredericksburg?", "back": "The Chancellorsville campaign"}, {"front": "What was the nature of Holmes's third wound in 1863?", "back": "He was struck in the heel by a shell fragment."}, {"front": "What impact did the wound at Fredericksburg have on Holmes's service?", "back": "It ended his front-line service."}, {"front": "With what rank did Holmes muster out of the army in 1864?", "back": "Brevet colonel"}, {"front": "What subject did Holmes return to Harvard to study after the war?", "back": "Law"}, {"front": "In what year was Oliver Wendell Holmes Jr. admitted to the Massachusetts bar?", "back": "1867"}, {"front": "What is the title of Holmes's 1881 masterwork of legal scholarship?", "back": "The Common Law"}, {"front": "According to the opening sentence of *The Common Law*, what is the life of the law?", "back": "Experience"}, {"front": "What does Holmes's masterwork argue regarding the nature of legal rules?", "back": "They are shaped by experience and the needs of society rather than fixed logic."}, {"front": "How many years did Holmes serve on the Massachusetts Supreme Judicial Court?", "back": "Twenty years"}, {"front": "What was Holmes's final role on the Massachusetts Supreme Judicial Court?", "back": "Chief Justice"}, {"front": "Which U.S. President appointed Holmes to the United States Supreme Court?", "back": "Theodore Roosevelt"}, {"front": "In what year was Holmes appointed to the United States Supreme Court?", "back": "1902"}, {"front": "At what age did Holmes retire from the United States Supreme Court?", "back": "Ninety"}, {"front": "What nickname did Holmes earn for his influential minority opinions?", "back": "The Great Dissenter"}, {"front": "List three areas championed by Holmes in his Supreme Court dissents.", "back": "Free speech, legislative experimentation, and judicial restraint"}, {"front": "How did Holmes believe the Constitution should be interpreted?", "back": "As a living document rather than a rigid code"}, {"front": "When did Holmes believe judges should interfere with the democratic process?", "back": "Only in the most extreme cases"}, {"front": "What fundamental belief did Holmes hold about the nature of life?", "back": "Life is struggle."}, {"front": "According to Holmes's philosophy, what is the status of certainty?", "back": "Certainty is an illusion."}, {"front": "What did Holmes consider the highest human quality?", "back": "The willingness to act decisively for a cause one cannot prove is right"}, {"front": "What did Holmes's philosophy promise about a life lived with courage?", "back": "It was better than a life lived in the pursuit of safety."}, {"front": "On what holiday did Holmes deliver his famous 1895 speech?", "back": "Memorial Day"}, {"front": "How old was Holmes when he delivered his 1895 speech?", "back": "Fifty-four years old"}, {"front": "According to the text, why is understanding the soldier essential to understanding the judge?", "back": "The war was the defining experience that shaped his lifelong philosophy."}, {"front": "Which university was the center of Holmes's early education and later legal studies?", "back": "Harvard"}, {"front": "How long did Holmes serve as an Associate Justice of the U.S. Supreme Court?", "back": "Nearly thirty years"}, {"front": "The bullet that wounded Holmes at Ball's Bluff passed close to which organ?", "back": "His heart"}, {"front": "In what year did Holmes retire from the Supreme Court?", "back": "1932"}, {"front": "Cloze: Holmes believed that judges should _____ to the democratic process except in extreme cases.", "back": "defer"}, {"front": "Cloze: Holmes argued that the life of the law has not been logic, but _____.", "back": "experience"}, {"front": "What did Holmes conclude about the reward for virtue in his personal philosophy?", "back": "His philosophy did not promise that virtue would be rewarded."}, {"front": "What was the profession of the \"literary giants\" Holmes grew up around?", "back": "Physicians, poets, and essayists"}, {"front": "How many years after the Civil War ended did Holmes deliver his 1895 address?", "back": "Thirty years"}, {"front": "What was the rank of the Twentieth Massachusetts among other regiments for combat intensity?", "back": "It saw some of the heaviest fighting of the war."}, {"front": "What did Holmes call the experience of surviving three near-death wounds?", "back": "The \"raw material\" for his views on war and sacrifice"}, {"front": "Concept: The Great Dissenter", "back": "Definition: A justice whose minority opinions are often more influential than the majority rulings."}, {"front": "Term: Pragmatic philosophy (in Holmes's context)", "back": "Definition: The idea that law is shaped by practical experience and societal needs rather than abstract logic."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
