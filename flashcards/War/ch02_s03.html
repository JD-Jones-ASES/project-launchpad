<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the highest rank achieved by Smedley Darlington Butler in the Marine Corps?", "back": "Major General"}, {"front": "During what years did Smedley Butler serve in the United States Marine Corps?", "back": "1898 to 1931"}, {"front": "Smedley Butler was one of only nineteen men in American history to receive what military honor twice?", "back": "The Medal of Honor"}, {"front": "For what specific military action in 1914 did Smedley Butler receive his first Medal of Honor?", "back": "Action at Veracruz, Mexico"}, {"front": "In which country did Smedley Butler earn his second Medal of Honor in 1915?", "back": "Haiti (at Fort Rivière)"}, {"front": "At the time of his retirement in 1931, what distinction did Butler hold regarding his service record?", "back": "He was the most decorated Marine in United States history."}, {"front": "In what year and city was Smedley Butler born?", "back": "1881 in West Chester, Pennsylvania"}, {"front": "What was the religious background of Smedley Butler’s family?", "back": "Quaker"}, {"front": "What significant political position did Smedley Butler’s father, Thomas S. Butler, hold?", "back": "Member of the U.S. House of Representatives and Chair of the House Naval Affairs Committee"}, {"front": "How old was Smedley Butler when he lied about his age to enlist in the Marine Corps?", "back": "Sixteen"}, {"front": "Smedley Butler first enlisted during which American conflict?", "back": "The Spanish-American War of 1898"}, {"front": "Name the specific insurrection Butler participated in shortly after the Spanish-American War.", "back": "The Philippine-American War (Philippine insurrection)"}, {"front": "In what major 1900 conflict in China did Smedley Butler serve?", "back": "The Boxer Rebellion"}, {"front": "Which two Central American countries did Butler lead Marines into in 1903?", "back": "Honduras and Panama"}, {"front": "In what year did Smedley Butler serve in Nicaragua?", "back": "1910"}, {"front": "Term: Gendarmerie d'Haïti", "back": "Definition: The Haitian national police force commanded by U.S. Marine officers during the American occupation (1915–1934)."}, {"front": "What was Smedley Butler’s primary assignment during World War I in France?", "back": "Commanding Camp Pontanezen, the largest American debarkation camp in Europe"}, {"front": "What collective term is used for the military interventions in Central America, the Caribbean, and Mexico from 1898 to 1934?", "back": "The Banana Wars"}, {"front": "According to the text, what was the primary motivation behind the Banana Wars?", "back": "Protecting the commercial interests of American corporations"}, {"front": "Which specific American corporation is cited as a major beneficiary of the Banana Wars?", "back": "The United Fruit Company"}, {"front": "How did Smedley Butler later describe his role in military interventions on behalf of corporations?", "back": "He called himself a “muscle man for Big Business.”"}, {"front": "Who typically ordered the interventions known as the Banana Wars?", "back": "Presidents and the State Department"}, {"front": "What is the title of the famous pamphlet written by Smedley Butler after his retirement?", "back": "War Is a Racket"}, {"front": "Besides two Medals of Honor, name another major military decoration Butler received.", "back": "The Marine Corps Brevet Medal (or Haitian Médaille Militaire/Distinguished Service Medal)"}, {"front": "Butler was one of the youngest officers to reach which rank in Marine Corps history?", "back": "Major General"}, {"front": "Concept: Ethos", "back": "Definition: A rhetorical appeal based on the character, credibility, or authority of the speaker."}, {"front": "Why was Smedley Butler’s indictment of war considered more difficult to dismiss than that of a career pacifist?", "back": "His authority came from his extensive first-hand combat experience and decorated military career."}, {"front": "What is described as the \"great irony\" of Smedley Butler’s life?", "back": "He spent thirty years performing the military work that he would later condemn."}, {"front": "According to Butler, who enriches themselves during war at the expense of the many?", "back": "A small group of profit-seeking corporations and individuals"}, {"front": "What was the duration of the American occupation of Haiti mentioned in the text?", "back": "1915–1934"}, {"front": "Butler's father chaired the House Naval Affairs Committee for how many years?", "back": "Thirty-one years"}, {"front": "What specific type of tradition ran deep in the Butler household, contrasting with his military career?", "back": "Quaker pacifism"}, {"front": "Where did Butler obtain the knowledge he used to name corporations that profited from World War I?", "back": "From decades of watching government contract money flow to private hands"}, {"front": "The text states Butler's authority comes not from education or eloquence but from his _____.", "back": "Scars (firsthand combat experience)"}, {"front": "What kind of rebellions did Butler put down during his service in Latin America?", "back": "Rebellions that threatened American-owned plantations and railroads"}, {"front": "The Banana Wars were not declared by _____ or fought for national survival.", "back": "Congress"}, {"front": "How many years did Smedley Butler spend in uniform?", "back": "Thirty-three years"}, {"front": "In the context of the text, what does Butler mean when he calls war a 'racket'?", "back": "That war is a scheme used to benefit a few at the expense of many."}, {"front": "What was the primary function of Camp Pontanezen during World War I?", "back": "It served as a debarkation camp for American troops in Europe."}, {"front": "What distinguished Smedley Butler from 'pacifist intellectuals' or 'politicians' who criticized war?", "back": "He was an accomplished combat soldier who had seen the reality of war firsthand."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
