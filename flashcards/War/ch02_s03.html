<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year was Smedley Darlington Butler born?", "back": "1881"}, {"front": "In which Pennsylvania town was Smedley Butler born?", "back": "West Chester"}, {"front": "Smedley Butler was raised in a prominent household of which religious denomination?", "back": "Quaker"}, {"front": "How many years did Smedley Butler's father, Thomas S. Butler, serve in the U.S. House of Representatives?", "back": "Thirty-one years"}, {"front": "Which specific House committee did Thomas S. Butler chair during his time in Congress?", "back": "House Naval Affairs Committee"}, {"front": "At what age did Smedley Butler lie about his age to enlist in the Marine Corps?", "back": "Sixteen"}, {"front": "During which 1898 conflict did Smedley Butler first join the Marine Corps?", "back": "Spanish-American War"}, {"front": "How many total years did Smedley Butler spend in military uniform?", "back": "Thirty-three years"}, {"front": "In what year did Smedley Butler retire from the Marine Corps?", "back": "1931"}, {"front": "At the time of his retirement, what was Butler's distinction regarding Marine Corps history?", "back": "He was the most decorated Marine in United States history."}, {"front": "How many Medals of Honor did Smedley Butler receive during his career?", "back": "Two"}, {"front": "For what 1914 action did Smedley Butler receive his first Medal of Honor?", "back": "Action at Veracruz, Mexico"}, {"front": "For what 1915 action did Smedley Butler receive his second Medal of Honor?", "back": "Action at Fort Rivière, Haiti"}, {"front": "During which 1900 conflict in China did Smedley Butler serve?", "back": "The Boxer Rebellion"}, {"front": "What was the Gendarmerie d'Haïti?", "back": "The Haitian national police force commanded by U.S. Marine officers."}, {"front": "Which major European debarkation camp did Butler command during World War I?", "back": "Camp Pontanezen"}, {"front": "Term: Banana Wars", "back": "Definition: U.S. military interventions in Latin America and the Caribbean (1898–1934) to protect American corporate interests."}, {"front": "According to the text, which specific corporation was a primary beneficiary of the Banana Wars?", "back": "United Fruit Company"}, {"front": "Instead of being declared by Congress, how were the interventions in the Banana Wars typically ordered?", "back": "By presidents and the State Department."}, {"front": "Butler famously described himself as a \"_____ man for Big Business.\"", "back": "muscle"}, {"front": "Beyond the Medal of Honor, name another high-level decoration Butler received from the Marine Corps.", "back": "Marine Corps Brevet Medal (or Distinguished Service Medal)"}, {"front": "Concept: Ethos", "back": "Definition: A rhetorical appeal based on the character, credibility, or authority of the speaker."}, {"front": "According to the text, what was the primary source of Butler's ethos regarding his criticism of war?", "back": "His firsthand combat experience and \"scars.\""}, {"front": "What is the \"great irony\" of Smedley Butler’s life as described in the text?", "back": "He spent three decades performing the military interventions he later condemned."}, {"front": "According to Butler, war enriches a small group of people at the expense of the _____.", "back": "many"}, {"front": "Why was Butler's identity as a combat veteran significant to the reception of his pamphlet?", "back": "It made his indictment of war difficult to dismiss compared to a career pacifist."}, {"front": "Which two Caribbean and Central American countries did Butler lead Marines in during 1903?", "back": "Honduras and Panama"}, {"front": "In what year did Smedley Butler serve in Nicaragua?", "back": "1910"}, {"front": "Butler's critique of war was based on reporting what he saw regarding the flow of money from government contracts to _____.", "back": "private hands"}, {"front": "What specific types of infrastructure did Butler protect on behalf of American corporations?", "back": "Plantations and railroads"}, {"front": "Smedley Butler was one of only _____ men in American history to receive the Medal of Honor twice.", "back": "nineteen"}, {"front": "Which conflict occurred in the Philippines shortly after the Spanish-American War where Butler fought?", "back": "The insurrection"}, {"front": "What was the rank held by Smedley Butler at the time of his retirement?", "back": "Major General"}, {"front": "According to the text, Butler's authority came not from education or eloquence, but from his _____.", "back": "scars"}, {"front": "Smedley Butler was one of the _____ major generals in Marine Corps history.", "back": "youngest"}, {"front": "What was the Haitian award given to Smedley Butler during his service?", "back": "Médaille Militaire"}, {"front": "The Banana Wars were often conducted at the behest of which group?", "back": "American business interests"}, {"front": "Butler's pamphlet 'War Is a Racket' argues that war is essentially a method for _____ to profit.", "back": "corporations"}, {"front": "Where did Butler serve in Europe during the First World War?", "back": "France"}, {"front": "How did Butler's religious upbringing contrast with his professional career choice?", "back": "He was raised in the Quaker pacifist tradition but spent 33 years in combat."}, {"front": "When did Smedley Butler die?", "back": "1940"}, {"front": "According to the text, who did Butler claim administrations answered to when ordering foreign occupations?", "back": "Corporate interests"}, {"front": "What was the primary tool Butler used to enforce American commercial interests abroad?", "back": "Rifle and bayonet"}, {"front": "Butler's pamphlet 'War Is a Racket' was published in what year?", "back": "1935"}, {"front": "In the context of rhetoric, the credibility Butler earned from his military record is known as _____.", "back": "ethos"}, {"front": "What was the primary goal of American military interventions in Latin America between 1898 and 1934?", "back": "To protect commercial interests of American corporations."}, {"front": "The text notes that Butler did not have the luxury of _____ moralizing because he had lived through the actions he denounced.", "back": "abstract"}, {"front": "Smedley Butler was born to a _____ family.", "back": "prominent"}, {"front": "Where was the 'largest American debarkation camp' in Europe located?", "back": "France (Camp Pontanezen)"}, {"front": "During the occupation of Haiti, who organized the Gendarmerie d'Haïti?", "back": "The U.S. Marine Corps"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
