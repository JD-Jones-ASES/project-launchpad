    <style>
        .fc-container {

    <script>
    var CARDS = [{"front": "Butler’s writing style is likened to which specific profession?", "back": "A Marine sergeant addressing his men."}, {"front": "Term: Vernacular", "back": "Definition: The ordinary, everyday language of common people as opposed to formal literary prose."}, {"front": "In Butler’s prose, what rhetorical purpose does the vernacular voice serve?", "back": "It signals he is speaking as a soldier and citizen rather than an intellectual."}, {"front": "How does the text describe the physical structure of Butler's prose?", "back": "It is described as being \"stripped to the bone.\""}, {"front": "\"War is a racket. It always has been.\" What is the rhetorical effect of these opening sentences?", "back": "They state a thesis immediately without qualifications or literary allusions."}, {"front": "Butler uses three parallel _____ in his opening to overwhelm the reader with his claim's extremity.", "back": "superlatives"}, {"front": "What are the three specific superlatives Butler uses to describe war?", "back": "Oldest, most profitable, and most vicious."}, {"front": "Concept: Superlative", "back": "Definition: The grammatical form expressing the highest degree of a quality, such as \"oldest.\""}, {"front": "How do Oliver Wendell Holmes’ sentences differ structurally from Butler’s?", "back": "Holmes uses long, ornate, periodic sentences with winding clauses."}, {"front": "What is the primary difference between the target audiences of Holmes and Butler?", "back": "Holmes spoke to Harvard gentlemen, while Butler speaks to everyone."}, {"front": "Definition: Ethos", "back": "The credibility or authority of a speaker."}, {"front": "What are the two primary military honors that contribute to Butler’s ethos?", "back": "Two Medals of Honor."}, {"front": "How many years of combat service ground Butler's authority?", "back": "Thirty-three years."}, {"front": "Why does Butler’s admission of being part of the \"machine\" strengthen his ethos?", "back": "A critic who confesses personal complicity is harder for an audience to ignore."}, {"front": "Why is Butler's blunt style considered a \"weapon\" rather than a limitation?", "back": "It uses plain language to make the argument harder for a reader to evade."}, {"front": "In what way does Butler use logos differently than Holmes?", "back": "Butler uses concrete financial data while Holmes appeals to abstract ideals."}, {"front": "Definition: Empirical", "back": "Information based on observation and measurement rather than theory or pure logic."}, {"front": "What specific type of data does Butler use to make his argument concrete?", "back": "Financial ledger data, such as company names and profit figures."}, {"front": "According to the text, what is the rhetorical effect of presenting specific profit figures?", "back": "It shifts the burden of proof to anyone wishing to defend the war."}, {"front": "How much did Du Pont’s earnings increase during the war according to Butler’s data?", "back": "Tenfold."}, {"front": "What specific number of new millionaires does Butler cite as appearing during the war?", "back": "21,000."}, {"front": "How does the text define the source of the \"furious moral energy\" in Butler's work?", "back": "Pathos, or the rhetoric of outrage."}, {"front": "Definition: Anaphora", "back": "The deliberate repetition of a word or phrase at the beginning of successive clauses."}, {"front": "Which phrase does Butler repeat to create a \"drumbeat of accusation\" in his series of questions?", "back": "\"How many of them.\""}, {"front": "What was Butler’s primary rhetorical goal in using anaphora in his questions?", "back": "To emphasize that war profiteers never personally participated in combat."}, {"front": "How does Butler make the suffering of war concrete rather than abstract in his pathos?", "back": "By using physically specific language like \"dug a trench\" and \"ducking shells.\""}, {"front": "Identify the rhetorical device: \"How many of them shouldered a rifle? How many of them dug a trench?\"", "back": "Anaphora."}, {"front": "What genre of writing did Butler choose for War Is a Racket?", "back": "The pamphlet."}, {"front": "What is the primary aim of the pamphlet as a rhetorical genre?", "back": "To be a short, polemical work aimed at a mass audience."}, {"front": "Name one historical precedent for the American political pamphlet mentioned in the text.", "back": "Thomas Paine's Common Sense (1776)."}, {"front": "What are the three constraints imposed by the pamphlet genre?", "back": "It must be brief, readable by ordinary people, and build to a clear call to action."}, {"front": "What does the brevity of Butler’s pamphlet imply about the nature of war?", "back": "It implies the truth about war is not complicated and can be stated plainly."}, {"front": "How does Butler view the fundamental nature of war?", "back": "As the lowest expression of human greed."}, {"front": "How does Oliver Wendell Holmes view the fundamental nature of war?", "back": "As the highest expression of human virtue."}, {"front": "What shared source of authority do both Butler and Holmes claim?", "back": "Personal military experience."}, {"front": "Why does Butler specifically name companies and cite profit figures?", "back": "To make his argument unusually concrete for a political pamphlet."}, {"front": "Butler’s tone is described as one that _____ you to disagree.", "back": "dares"}, {"front": "Why is Butler's rhetorical style compared to a \"fist on a table\"?", "back": "Because of his use of short sentences and aggressive superlatives."}, {"front": "Holmes’ sentences are compared to waves that _____ and _____.", "back": "crest; break"}, {"front": "What prevents readers from dismissing Butler as a \"coward\" or \"shirker\"?", "back": "His thirty-three years of combat service and high military honors."}, {"front": "Butler states that he did not fully realize war was a racket until what life event?", "back": "His retirement to civil life."}, {"front": "In Butler’s questions, what does \"parried a bayonet thrust\" represent rhetorically?", "back": "Physical specificity used to evoke pathos."}, {"front": "The \"central tension\" of the debate between Holmes and Butler is their _____ conclusions.", "back": "diametrically opposed"}, {"front": "Why does Butler avoid literary allusions in his prose?", "back": "To maintain a vernacular voice that appeals to the common person."}, {"front": "What is the effect of Butler stacking three superlatives in a single sentence?", "back": "It overwhelms the reader with the extremity of his claim."}, {"front": "To whom was the pamphlet War Is a Racket primarily addressed?", "back": "Ordinary Americans whose sons might be called to fight."}, {"front": "How does Butler's use of \"ledger books\" relate to his rhetorical strategy?", "back": "It appeals to logic (logos) through empirical financial data."}, {"front": "What does Butler’s \"confession\" of being a soldier reveal about his ethos?", "back": "It shows he was part of the machine he now condemns."}, {"front": "What specific rhythmic effect is created by Butler’s use of anaphora?", "back": "A hammering effect that builds in intensity."}, {"front": "Why are Butler's rhetorical choices described as being as \"deliberate\" as Holmes'?", "back": "They are calculated to serve his specific argument effectively."}, {"front": "What does Butler ask the reader to look at instead of \"philosophical principles\"?", "back": "The numbers."}, {"front": "How does the text describe the nature of the \"truth\" Butler presents?", "back": "It is not complicated."}, {"front": "In rhetorical terms, what is the purpose of Butler's series of \"How many\" questions?", "back": "To showcase the lack of combat experience among war profiteers."}, {"front": "Contrast the diction of Holmes and Butler.", "back": "Holmes uses elevated diction, while Butler uses plain words."}, {"front": "What is the rhetorical result of Butler hitting the reader with the conclusion first?", "back": "It dares the reader to argue against the established thesis."}, {"front": "Why does the text describe Butler's pathos as \"rooted in physical reality, not sentiment\"?", "back": "It focuses on concrete experiences like hunger and fear rather than vague emotions."}, {"front": "How does the phrase \"rat-infested dug-out\" contribute to Butler's rhetoric?", "back": "It provides physical specificity to build pathos and moral outrage."}, {"front": "Why does the pamphlet form allow Butler to bypass policy experts?", "back": "It is designed to be readable by and accessible to the common person."}, {"front": "What is the central claim of Butler's work?", "back": "War is a racket."}, {"front": "According to the comparison at the end of the text, what does war express for Butler?", "back": "The lowest expression of human greed."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
