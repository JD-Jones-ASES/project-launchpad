    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Smedley Butler, what is a 'racket'?", "back": "A scheme or enterprise carried on for private profit under the guise of public service; something that is not what it seems to the majority, benefiting a small 'inside' group at the expense of many."}, {"front": "What are the key characteristics Butler attributes to war as a racket?", "back": "It is the oldest, most profitable, and most vicious racket. It is international in scope, with profits reckoned in dollars and losses in lives."}, {"front": "How does Butler support his claim that 'out of war a few people make huge fortunes' during World War I?", "back": "He states that at least 21,000 new millionaires and billionaires were made in the United States during WWI, admitting their 'blood gains' in income tax returns."}, {"front": "What rhetorical questions does Butler use to highlight the disconnect between those who profit from war and those who fight it?", "back": "He asks 'How many of these war millionaires shouldered a rifle? How many of them dug a trench?' and other similar questions about combat experiences, implying they did not participate in the fighting."}, {"front": "Beyond financial profit for a few, what does Butler identify as the 'bill' the general public shoulders for war?", "back": "Newly placed gravestones, mangled bodies, shattered minds, broken hearts and homes, economic instability, depression, and back-breaking taxation for generations."}, {"front": "When did Smedley Butler fully realize that war was a racket?", "back": "He had a suspicion as a soldier but fully realized it only after he retired to civil life."}, {"front": "In 1935, what international signs did Butler observe that indicated another war was brewing?", "back": "Nations were choosing sides (e.g., France/Russia, Italy/Austria), rearming (e.g., Hitler's Germany, France increasing military service), Mussolini's explicit embrace of war, and general sabre rattling in Europe and maneuvering in the Orient."}, {"front": "What does Butler suggest about Mussolini's view on perpetual peace and war?", "back": "Mussolini, as quoted, believed 'neither in the possibility nor the utility of perpetual peace' and asserted that 'war alone brings up to its highest tension all human energy and puts the stamp of nobility upon the people who have the courage to meet it.'"}, {"front": "How does Butler analyze the potential US motivation for war in the Orient concerning China and the Philippines?", "back": "He questions going to war to protect relatively small economic interests like $90 million in China trade or less than $200 million in Philippine investments, when such a war could cost tens of billions of dollars and hundreds of thousands of American lives."}, {"front": "Who are the specific groups Butler names as those who would 'fare well' and make 'fortunes' from a future war?", "back": "Munitions makers, bankers, ship builders, manufacturers, meat packers, and speculators."}, {"front": "How does Butler use US national debt figures to argue against the benefits of foreign entanglements?", "back": "He notes the national debt jumped from a little over $1 billion (pre-1898) to over $25 billion (post-WWI), arguing that the costs far outweighed any 'favorable trade balance.'"}, {"front": "According to Butler, what was the total cost of the United States' 'brief participation' in the World War?", "back": "$52,000,000,000, which he calculates as $400 for every American man, woman, and child at the time."}, {"front": "How do normal business profits in the US compare to wartime profits, according to Butler?", "back": "Normal profits are typically 6-12%, whereas wartime profits can skyrocket to 20%, 60%, 100%, 300%, or even 1800%+, with 'the sky is the limit.'"}, {"front": "What common justification for wartime profit does Butler expose as a cover-up?", "back": "Speeches about patriotism, love of country, and 'we must all put our shoulders to the wheel,' which he states merely dress up the reality of profits jumping and being safely pocketed."}, {"front": "Provide an example of a company Butler uses to illustrate extreme wartime profit increases.", "back": "The du Ponts, whose average yearly earnings went from $6,000,000 (1910-1914) to $58,000,000 (1914-1918), an increase of over 950 percent."}, {"front": "How did Bethlehem Steel's average yearly profits change from the pre-war period (1910-1914) to the war years (1914-1918)?", "back": "Their average yearly earnings increased from $6,000,000 (pre-war) to $49,000,000 (war years)."}, {"front": "What was the change in average yearly profits for United States Steel during the war compared to pre-war?", "back": "Pre-war (1910-1914) average was $105,000,000, while war years (1914-1918) average was $240,000,000."}, {"front": "Describe the profit jump for Anaconda Copper during WWI.", "back": "Its average yearly earnings increased from $10,000,000 (1910-1914) to $34,000,000 (1914-1918)."}, {"front": "What is a 'rhetorical question,' as defined in the text?", "back": "A question asked not to elicit an answer but to make a point, where the expected answer is so obvious that stating it would be unnecessary."}, {"front": "According to Butler, what advice from George Washington did the US forget when it became 'internationally minded' and went to war?", "back": "Washington's warning about 'entangling alliances.'"}, {"front": "What metaphor does Butler use to describe the rearming and aggressive posturing of European nations in 1935?", "back": "He states, 'The mad dogs of Europe are on the loose.'"}, {"front": "How does Butler connect the cost of war operations to the general public?", "back": "He asserts that 'the cost of operations is always transferred to the people – who do not profit.'"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
