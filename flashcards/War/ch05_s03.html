    <style>
        .fc-container {

        .fc-label {

        .fc-btn:hover {
            background: var(--secondary-color);

        .fc-btn:disabled {

        }
        .fc-btn:disabled:hover {

        .fc-counter {

            font-size: 1.1rem;

        /* Progress bar */
        .fc-progress {
            width: 100%;

        /* Toolbar */

            transition: all 0.2s ease;

        .fc-tool:hover {
            border-color: var(--secondary-color);

        }
        .fc-tool.active {
            background: var(--secondary-color);

            border-color: var(--secondary-color);

        /* Keyboard hint */

            margin-top: 1.5rem;

                font-size: 1rem;

            }

                gap: 0.5rem;

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">

    <main class="main-content">

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">

                    <button class="fc-tool" onclick="resetDeck()">Reset</button>

    <script>
    var CARDS = [{"front": "Definition: Talking Past Each Other", "back": "A situation where debaters address different questions or assumptions rather than engaging each other's arguments."}, {"front": "In rhetoric, what term describes the questions an argument does not ask or the evidence it does not consider?", "back": "Blind spots"}, {"front": "What characterizes the interaction between Holmes, Butler, Wilson, and Remarque according to the text?", "back": "They fail to engage each other's strongest points."}, {"front": "Debaters delivering parallel monologues are typically operating within different _____.", "back": "Frameworks"}, {"front": "What specific virtues of the soldier does Oliver Wendell Holmes Jr. celebrate?", "back": "Courage, sacrifice, and faith in something larger than oneself."}, {"front": "What does Holmes treat war as in his philosophical view?", "back": "A test of character or a forge of virtue."}, {"front": "What critical question does Holmes fail to ask regarding a soldier's sacrifice?", "back": "Who benefits from that sacrifice?"}, {"front": "What 'machinery' behind war does Holmes ignore in his analysis?", "back": "Political and economic machinery."}, {"front": "What would Butler say is missing from Holmes's definition of 'virtue'?", "back": "An inquiry into whose purposes the courage served."}, {"front": "How does Butler describe courage when it is exercised in the service of a 'racket'?", "back": "Exploitation made to look noble."}, {"front": "What aspect of war does Smedley Butler expose with precision?", "back": "The economic machinery and profit motive."}, {"front": "What possibility does Butler's framework never seriously consider?", "back": "That some wars might be genuinely necessary."}, {"front": "Butler's argument is based on the central thesis that war is always a _____.", "back": "Racket"}, {"front": "According to the text, why can Butler's thesis not admit exceptions like fighting an aggressor?", "back": "The framework would collapse."}, {"front": "Which two historical provocations would Wilson use to challenge Butler's economic focus?", "back": "Submarine attacks on American ships and the Zimmermann Telegram."}, {"front": "How does Woodrow Wilson frame the justification for war?", "back": "As a moral crusade for democracy and self-determination."}, {"front": "What major dimension of war does Wilson's address to Congress entirely omit?", "back": "The economic dimension."}, {"front": "How many times does Wilson's address mention loans, profits, or trade?", "back": "Zero"}, {"front": "Wilson ignored the fact that American banks had lent billions of dollars to which group?", "back": "The Allies"}, {"front": "What is the definition of 'Rhetorical Omission'?", "back": "The deliberate exclusion of relevant information to avoid weakening a position."}, {"front": "Why might a speaker use rhetorical omission regarding a complex audience response?", "back": "To avoid complicating the audience's response or undermining a moral appeal."}, {"front": "According to the text, what must a 'complete argument for war' address even if it prioritizes morality?", "back": "Who profits from the war."}, {"front": "In what way is Erich Maria Remarque's voice 'unusual' in the debate?", "back": "He does not argue for or against the war."}, {"front": "Instead of making a formal argument, what does Remarque's novel provide?", "back": "Testimony"}, {"front": "What specific experience does Remarque describe to challenge abstract justifications?", "back": "The physical reality of combat in the trenches."}, {"front": "By stripping away all justifications, what does Remarque implicitly challenge?", "back": "Every other voice in the debate."}, {"front": "Contrast Holmes and Remarque: What does Remarque show that war 'builds'?", "back": "Shell craters and corpses."}, {"front": "Contrast Wilson and Remarque: What does Remarque show that war actually 'defends'?", "back": "A few hundred yards of mud between trenches."}, {"front": "Contrast Butler and Remarque: What is Remarque's primary concern versus Butler's?", "back": "Remarque cares about who dies rather than who profits."}, {"front": "Definition: Argument from Silence", "back": "A technique that forces an audience to confront a reality by refusing to engage with standard justifications."}, {"front": "How does Remarque's 'Argument from Silence' specifically challenge Holmes?", "back": "It forces him to explain how martial virtues look during a gas attack."}, {"front": "What does Remarque's approach force Wilson to explain regarding a dying soldier?", "back": "What democracy means to someone bleeding to death in no man's land."}, {"front": "What does Remarque force Butler to explain regarding the dead?", "back": "Whether his economic analysis matters to them."}, {"front": "According to the text, why do serious thinkers often talk past each other?", "back": "They disagree at a fundamental level about what matters most."}, {"front": "Arguments that are internally coherent but _____ _____ are a feature of serious debate.", "back": "Externally incomplete"}, {"front": "What is the primary question Holmes seeks to answer?", "back": "What does war reveal about the human spirit?"}, {"front": "What is the primary question Smedley Butler seeks to answer?", "back": "Who profits from war, and who pays?"}, {"front": "What is the primary question Woodrow Wilson seeks to answer?", "back": "What moral obligations justify the use of force?"}, {"front": "What is the primary question Erich Maria Remarque seeks to answer?", "back": "What does war actually feel like?"}, {"front": "Why does the text argue we need all four voices at the table?", "back": "The question 'What is war for?' is too large for any single argument to contain."}, {"front": "What is the 'most revealing thing' to look for when comparing arguments?", "back": "Where the speakers fail to engage each other's strongest points."}, {"front": "Holmes views war as a _____ _____, ignoring the machinery of production.", "back": "Philosophical abstraction"}, {"front": "Which author is criticized for having a framework with 'no room' for wars against genocide?", "back": "Smedley Butler"}, {"front": "What financial catastrophe did Wilson fail to mention in his moral crusade?", "back": "The impact of an Allied defeat on the American economy."}, {"front": "Remarque's refusal to argue is described as a kind of _____.", "back": "Argument"}, {"front": "What did American manufacturers gain during the war that Wilson omitted?", "back": "Profits"}, {"front": "According to the text, recognizing that writers talk past each other is not a _____ of the thinkers.", "back": "Criticism"}, {"front": "What did Holmes fail to ask regarding the soldiers at Antietam?", "back": "Whether their cause was worthy of their courage."}, {"front": "Butler believes war is explained fully once you have identified the _____.", "back": "Profiteers"}, {"front": "Wilson's address to Congress is noted for its total lack of reference to _____.", "back": "Money"}, {"front": "Remarque forces Butler to consider if his analysis matters to _____.", "back": "The dead"}, {"front": "What does 'parallel monologues' imply about a debate?", "back": "The participants are not truly engaging each other's arguments."}, {"front": "What is the specific focus of Remarque's testimony?", "back": "The physical reality of combat."}, {"front": "Which author asks: 'What moral obligations justify the use of force?'", "back": "Woodrow Wilson"}, {"front": "Which author asks: 'What does war reveal about the human spirit?'", "back": "Oliver Wendell Holmes Jr."}, {"front": "Which author asks: 'Who profits from war, and who pays?'", "back": "Smedley Butler"}, {"front": "Which author asks: 'What does war actually feel like?'", "back": "Erich Maria Remarque"}, {"front": "Cloze: Every argument has _____ — questions it does not ask.", "back": "Blind spots"}, {"front": "Cloze: Wilson omitted the economic dimension to avoid undermining the _____ of his moral appeal.", "back": "Purity"}, {"front": "Cloze: Butler’s thesis cannot admit _____ without collapsing.", "back": "Exceptions"}, {"front": "Cloze: Remarque's approach demonstrates the _____ from silence.", "back": "Argument"}, {"front": "What does a 'complete reckoning' with war require, according to the conclusion?", "back": "Answering the core questions of all four perspectives."}, {"front": "Why is 'the courage is real' an insufficient argument for Butler?", "back": "It ignores the fact that the courage serves a racket."}, {"front": "What does Wilson consider more important than the profits of Du Pont?", "back": "Responding to provocations like the Zimmermann Telegram."}, {"front": "In the context of the text, what is the 'physical reality' Remarque highlights?", "back": "Exploding shells, dying friends, shaking ground, and burning air."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
