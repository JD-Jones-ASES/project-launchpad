<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which author wrote the novel \"All Quiet on the Western Front\"?", "back": "Erich Maria Remarque"}, {"front": "According to Remarque, how did the reality of the trenches compare to arguments for or against war?", "back": "The reality of the trenches matched no argument made for or against the war."}, {"front": "What was Woodrow Wilson's \"middle ground\" position on the necessity of war?", "back": "War is terrible but sometimes necessary."}, {"front": "The core disagreement between Holmes and Butler is described as a clash over what war does to the _____.", "back": "human soul"}, {"front": "What metaphor did Oliver Wendell Holmes Jr. use to describe war as a transformative test of character?", "back": "A crucible"}, {"front": "Term: Crucible (figurative definition)", "back": "A severe test or trial that transforms whatever passes through it."}, {"front": "According to Holmes, what does the \"crucible\" of war burn away in a person?", "back": "Weakness"}, {"front": "What is Holmes' core claim regarding the relationship between war and virtue?", "back": "War cultivates virtues like courage and self-sacrifice that a peaceful society cannot produce on its own."}, {"front": "According to Holmes, what is the \"highest form of moral courage\"?", "back": "Acting with faith without certainty and without guarantee of the outcome."}, {"front": "Why did Holmes believe Gilded Age America needed the pressure of war?", "back": "To prevent the nation's moral muscles from atrophying due to a focus on material comfort."}, {"front": "Where was Oliver Wendell Holmes Jr. wounded by a shot through the neck?", "back": "Antietam"}, {"front": "At which battle was Holmes left for dead before surviving to write his arguments?", "back": "Ball's Bluff"}, {"front": "Term: Ethos", "back": "The personal authority or credibility an author brings to their argument."}, {"front": "How does Holmes' background as a soldier impact the ethos of his argument?", "back": "His direct experience with being wounded gives his claims a weight a civilian's version would lack."}, {"front": "What does a civilization lose if it lacks the \"test of battle\" according to Holmes?", "back": "It loses the qualities that made it worth defending in the first place."}, {"front": "Smedley Butler agreed with Holmes that individual soldiers display extraordinary _____.", "back": "courage"}, {"front": "According to Butler, what does the system of war do to the courage of individual soldiers?", "back": "The system exploits their courage rather than honoring it."}, {"front": "Who did Smedley Butler identify as the real beneficiaries of war?", "back": "Corporations that sell ammunition, uniforms, and canned goods."}, {"front": "What is Butler's core claim regarding the nature of war?", "back": "War is a racket where the few profit and the many pay."}, {"front": "Term: Profiteer", "back": "A person who makes an excessive or unfair profit during a time of national difficulty."}, {"front": "What is the primary motive for war according to Smedley Butler?", "back": "Economic interests that treat war as a business opportunity."}, {"front": "What military honors did Smedley Butler earn during his career?", "back": "Two Medals of Honor."}, {"front": "Term: Pacifist", "back": "A person who believes that war and violence are unjustifiable."}, {"front": "How does Butler's ethos differ from that of a typical pacifist intellectual?", "back": "His conclusion came from decades as a warrior rather than from abstract principles."}, {"front": "Butler concluded after three decades of service that the entire enterprise of war was a _____.", "back": "con"}, {"front": "During which conflict did Oliver Wendell Holmes Jr. serve as a young officer?", "back": "The American Civil War."}, {"front": "How does Holmes' lens of war differ from Butler's regarding the scale of analysis?", "back": "Holmes focuses on the individual experience, while Butler focuses on the systemic function."}, {"front": "What specific actions of a soldier does the text use to illustrate Holmes' focus on virtue?", "back": "Choosing to advance under fire or carry a wounded comrade."}, {"front": "According to Butler's systemic view, what happens to soldiers who survive the machinery of war?", "back": "They come home broken while the profiteers move on to the next opportunity."}, {"front": "The text suggests that Holmes and Butler may not contradict each other because they analyze war at different _____.", "back": "scales"}, {"front": "What is the primary danger of acknowledging the soldier's individual virtue according to the text's final question?", "back": "It may distract us from questioning the corrupt system the soldier serves."}, {"front": "Why does war intensify the tension between individual virtue and systemic exploitation more than other dangerous work?", "back": "The stakes involved are life and death rather than just wages or working conditions."}, {"front": "Which author's lens reveals the \"worst that institutions are capable of\"?", "back": "Smedley Butler"}, {"front": "Which author's lens reveals the \"best that human beings are capable of\"?", "back": "Oliver Wendell Holmes Jr."}, {"front": "According to Butler, war destroys bodies, minds, and families while enriching _____.", "back": "a small class of profiteers"}, {"front": "In Holmes' view, what specific quality of commercial society prevents the development of \"moral muscles\"?", "back": "Its focus on profit and material comfort."}, {"front": "How did Butler define the term \"racket\" in the context of war?", "back": "A scheme in which the few profit and the many pay."}, {"front": "True or False: Smedley Butler believed that the virtues soldiers display are non-existent.", "back": "False; he believed they were real but systematically exploited."}, {"front": "Holmes argued that soldiers demonstrate the highest form of courage by exhibiting _____ without certainty.", "back": "faith"}, {"front": "What does the text conclude about the validity of Holmes' and Butler's opposing verdicts?", "back": "Both reached opposite conclusions despite earning the right to their opinions through direct combat service."}, {"front": "What was the duration of Smedley Butler’s career in the Marines?", "back": "Three decades."}, {"front": "According to the comparison, Holmes focuses on the soldier's _____ while Butler focuses on economic interests.", "back": "soul"}, {"front": "What does the text suggest is the ultimate question regarding the philosophical clash of war?", "back": "Whether celebrating individual virtue makes it harder to confront systemic corruption."}, {"front": "What is the figurative meaning of \"atrophying\" in Holmes' critique of society?", "back": "The wasting away or weakening of moral qualities due to lack of use."}, {"front": "In Butler's view, who never hears a shot fired while reaping the rewards of war?", "back": "The class of profiteers."}, {"front": "What is the common factor in how both Holmes and Butler established their authority on the subject of war?", "back": "Both put their lives on the line in actual combat."}, {"front": "According to Butler, what happens to the machinery of war once a conflict ends?", "back": "The profiteers move on to the next opportunity for gain."}, {"front": "Holmes' argument is centered on the idea that war is a _____ that reveals human capability.", "back": "forge of character"}, {"front": "Woodrow Wilson's stance is described as a middle ground between which two extremes?", "back": "The glorification of war and the total condemnation of war."}, {"front": "According to the text, the tension between virtue and exploitation is found in any dangerous work that _____.", "back": "benefits someone else more than the worker"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
