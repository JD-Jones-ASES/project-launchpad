    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Who served as the twenty-eighth President of the United States from 1913 to 1921?", "back": "Woodrow Wilson"}, {"front": "In what city and state was Woodrow Wilson born?", "back": "Staunton, Virginia"}, {"front": "Woodrow Wilson holds the unique distinction of being the only American president to earn what academic degree?", "back": "A doctorate (PhD)"}, {"front": "In which region of the United States was Woodrow Wilson raised during the postwar era?", "back": "The South"}, {"front": "In what year did Woodrow Wilson receive the Nobel Peace Prize?", "back": "1919"}, {"front": "Which two leaders are mentioned alongside Wilson as leading figures of the early twentieth-century progressive movement?", "back": "Theodore Roosevelt and Robert La Follette"}, {"front": "What was Woodrow Wilson's earliest childhood memory?", "back": "Hearing that Abraham Lincoln had been elected and that war was coming"}, {"front": "What was the profession of Woodrow Wilson's father?", "back": "Presbyterian minister"}, {"front": "From which university did Woodrow Wilson earn his doctorate in political science in 1886?", "back": "Johns Hopkins University"}, {"front": "What was the title of Woodrow Wilson's 1885 doctoral dissertation?", "back": "Congressional Government"}, {"front": "What was the core argument of Wilson's dissertation, *Congressional Government*?", "back": "Congress had become too powerful relative to the presidency"}, {"front": "Before entering politics, Wilson served as the president of which university starting in 1902?", "back": "Princeton University"}, {"front": "What specific social organizations at Princeton did Wilson attempt to break up as a reformer?", "back": "Exclusive eating clubs"}, {"front": "Woodrow Wilson was elected to what political office in 1910?", "back": "Governor of New Jersey"}, {"front": "The _____ of the early twentieth century aimed to fix problems caused by industrialization, urbanization, and political corruption.", "back": "Progressive movement"}, {"front": "Which 1913 act signed by Wilson created the modern central banking system of the United States?", "back": "The Federal Reserve Act"}, {"front": "What was the primary purpose of the Clayton Antitrust Act?", "back": "To strengthen the regulation of monopolies"}, {"front": "Which federal agency was established under Wilson to monitor business practices and prevent unfair competition?", "back": "The Federal Trade Commission (FTC)"}, {"front": "Which Constitutional amendment authorized the first federal income tax during Wilson's presidency?", "back": "The Sixteenth Amendment"}, {"front": "How did Woodrow Wilson change the racial policy of federal agencies that had been integrated since Reconstruction?", "back": "He re-segregated them"}, {"front": "Who was the African American leader Wilson ordered out of the White House in November 1914 after a challenge to segregation policies?", "back": "William Monroe Trotter"}, {"front": "What was Woodrow Wilson's stated justification to Black leaders regarding the implementation of federal segregation?", "back": "That segregation was in their best interest"}, {"front": "What slogan did Wilson use to campaign for re-election in 1916?", "back": "“He Kept Us Out of War”"}, {"front": "In what month and year did the sinking of the Lusitania occur?", "back": "May 1915"}, {"front": "How many Americans died in the sinking of the Lusitania?", "back": "128"}, {"front": "By 1917, American banks had extended over $2 billion in loans to which side of the European war?", "back": "The Allies (Britain and France)"}, {"front": "Roughly how much money did American banks loan to Germany by 1917?", "back": "$27 million"}, {"front": "Which major financial firm led the effort to extend loans to Britain and France during the period of American neutrality?", "back": "J.P. Morgan & Company"}, {"front": "What British military action made it difficult for American businesses to trade with Germany during WWI?", "back": "The naval blockade"}, {"front": "According to the text, Wilson believed the world was governed by principles and that leaders should act on _____ rather than convenience.", "back": "Conviction"}, {"front": "How did Wilson's view on executive authority change between his time as an academic and his time as a wartime president?", "back": "He reversed his stance by dramatically expanding executive authority"}, {"front": "Woodrow Wilson viewed the European conflict in 1914 as a quarrel among what kind of entities?", "back": "Empires"}, {"front": "When did Wilson finally conclude that the United States must enter World War I?", "back": "April 1917"}, {"front": "What ideological contradiction exists between Wilson's war address and his domestic policy?", "back": "He claimed to fight for rights and self-determination while denying them to Black Americans at home"}, {"front": "True or False: International law during WWI prohibited neutral nations from trading munitions with belligerent nations.", "back": "False"}, {"front": "Concept: The Progressive Movement", "back": "Definition: A reform effort to address industrialization, urbanization, and corruption through government intervention."}, {"front": "What was the total death toll of the sinking of the Lusitania?", "back": "1,198"}, {"front": "Under Wilson, what happened to Black federal employees in integrated agencies?", "back": "They were demoted or dismissed"}, {"front": "What primary moral trait did Wilson absorb from his upbringing as a minister's son?", "back": "Moral certainty"}, {"front": "Wilson argued that the first step toward improving a governmental system is _____ it.", "back": "Understanding"}, {"front": "Identify one of the progressive reforms Wilson pushed through as Governor of New Jersey.", "back": "A direct primary law (or corrupt practices act, workers' compensation, utility regulation)"}, {"front": "Wilson's neutrality stance was challenged by the fact that a German victory would have caused financial catastrophe for which American sector?", "back": "Wall Street"}, {"front": "In what year was Woodrow Wilson first elected President of the United States?", "back": "1912"}, {"front": "Which three universities did Wilson teach at before becoming the president of Princeton?", "back": "Bryn Mawr, Wesleyan, and Princeton"}, {"front": "What did the Democratic party bosses in New Jersey mistakenly expect from Wilson when they recruited him for governor?", "back": "That he would be a compliant academic they could control"}, {"front": "Wilson viewed the study of government as being similar to how a _____ studies the human body.", "back": "Physician"}, {"front": "What was the significance of the year 1886 for Woodrow Wilson?", "back": "He earned his doctorate from Johns Hopkins University"}, {"front": "The _____ Act was a legislative achievement of Wilson's first term that strengthened the regulation of business monopolies.", "back": "Clayton Antitrust"}, {"front": "Which South Carolina city did Wilson live in during or after the Civil War?", "back": "Columbia"}, {"front": "Who was the architect of the League of Nations?", "back": "Woodrow Wilson"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
