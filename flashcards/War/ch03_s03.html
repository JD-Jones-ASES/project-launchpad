    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {

            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How does the text define a 'Presidential Address' in the context of a speech to Congress?", "back": "An official act of state delivered by a head of government to a legislative body to request legislative action."}, {"front": "Beyond the immediate audience in the room, what three groups does a Presidential Address typically target?", "back": "The nation, the world, and posterity."}, {"front": "Why did Wilson avoid sounding 'eager' for war in his 1917 address to Congress?", "back": "To avoid alarming the peace faction in Congress and the millions of Americans who voted for him to keep them out of war."}, {"front": "What was the rhetorical danger of Wilson sounding 'reluctant' to go to war in his 1917 address?", "back": "It would have undermined Allied confidence and encouraged the German government."}, {"front": "In the 'fearful thing' passage, what is the rhetorical purpose of naming the costs of war (e.g., 'terrible and disastrous') directly?", "back": "It positions Wilson as a 'reluctant warrior' rather than a warmonger by conceding the opposition's strongest point."}, {"front": "Which specific conjunction serves as the pivot point in the 'fearful thing' passage of Wilson's address?", "back": "The word 'But'."}, {"front": "How does Wilson's 'fearful thing' sentence escalate its scope from beginning to end?", "back": "It moves from the specific situation of 'this great peaceful people' to the universal cause of all nations being 'at last free'."}, {"front": "In the 'fearful thing' passage, what rhetorical device is used with the phrase 'for democracy, for the right... for the rights and liberties'?", "back": "Rhythmic repetition (or anaphora)."}, {"front": "Term: Rhetorical Omission", "back": "Definition: The deliberate exclusion of information, arguments, or perspectives to shape an audience's understanding."}, {"front": "What economic detail did Wilson omit regarding American banks' involvement with the Allied powers?", "back": "American banks had loaned approximately $2.3 billion to the Allies by April 1917."}, {"front": "How much money had American banks loaned to the Central Powers compared to the Allied powers by April 1917?", "back": "Only $27 million compared to $2.3 billion loaned to the Allies."}, {"front": "Why did Wilson omit economic dimensions like trade relationships and munitions contracts from his address?", "back": "To maintain moral clarity and avoid arguments that the war was being fought to protect financial investments."}, {"front": "What practical military necessity did Wilson choose not to mention in his address to Congress?", "back": "The military draft required to raise an army."}, {"front": "According to the text, what does Oliver Wendell Holmes omit in his rhetoric to celebrate the nobility of war?", "back": "The suffering of war."}, {"front": "What does Smedley Butler omit in his rhetoric to focus on war as a 'racket'?", "back": "The possibility that any war might be justified."}, {"front": "On what paradox does Wilson's personal authority (ethos) as a war leader rest?", "back": "He is credible because he resisted war and tried to maintain peace for three years."}, {"front": "How does Wilson's ethos differ from that of Oliver Wendell Holmes?", "back": "Wilson speaks as a peacemaker who has exhausted alternatives, while Holmes speaks as a veteran who found nobility in suffering."}, {"front": "How does Smedley Butler's form of authority contrast with Wilson's?", "back": "Butler speaks as a disillusioned veteran who views war as a fraud, while Wilson speaks as a leader driven to war by necessity."}, {"front": "How is Wilson's use of 'pathos' described in comparison to Holmes or Butler?", "back": "It is restrained, controlled, and architectural rather than relying on vivid pictures of heroism or maimed victims."}, {"front": "In Wilson's logos, what two specific hostile acts by Germany are identified as the starting point for war?", "back": "Submarine warfare and the Zimmermann Telegram."}, {"front": "What is the third step in the logical structure of Wilson's address?", "back": "Redefining the conflict as a fundamental struggle between democracy and autocracy rather than a shipping rights dispute."}, {"front": "What is considered the 'weakest link' in the logical chain of Wilson's address?", "back": "The leap from a specific maritime dispute to a universal principle of democracy versus autocracy."}, {"front": "According to Smedley Butler, what was the true purpose of Wilson's moral language in the address?", "back": "To serve as propaganda that makes the decision impossible to oppose without appearing to oppose freedom itself."}, {"front": "The phrase 'this great peaceful people' refers to which specific audience in Wilson's speech?", "back": "The American public."}, {"front": "In the 'fearful thing' passage, what does Wilson state is 'more precious than peace'?", "back": "The right."}, {"front": "What is the primary goal of the 'multiplicity of audiences' strategy in Wilson's speech?", "back": "To achieve an extraordinarily difficult rhetorical balance between sounding resolute and sober."}, {"front": "What rhythmic effect does Wilson use to build momentum toward the promise of a world 'at last free'?", "back": "A drumbeat of purpose created by the repetition of the word 'for'."}, {"front": "Why would mentioning the draft have been rhetorically problematic for Wilson?", "back": "It would remind the 'peaceful people' that they would soon be compelled to fight against their will."}, {"front": "How does Wilson justify the move to war at the end of his logical chain?", "back": "He argues that as a democracy, America has a duty to defend democratic principles."}, {"front": "What type of authority does a speaker have when they say 'I have tried everything else, and nothing worked'?", "back": "The authority of the peacemaker (Wilson's ethos)."}, {"front": "In Wilson's address, how does he frame the decision of going to war for the audience to accept it?", "back": "As a moral equation where the cause of human freedom outweighs the terror of war."}, {"front": "What is the intended tone of a statesman according to the text's analysis of Wilson?", "back": "Moved by events but governed by reason."}, {"front": "Why does Wilson mention 'small nations' in the 'fearful thing' passage?", "back": "To broaden the cause from American self-interest to the rights and liberties of all nations."}, {"front": "How does Wilson's 'Architecture of Necessity' characterize Germany's actions?", "back": "As hostile acts that leave the United States no choice but to respond."}, {"front": "What is the final rhetorical goal of Wilson expanding his argument from the concrete to the universal?", "back": "To make opposing the war synonymous with opposing freedom itself."}, {"front": "Which audience must be convinced that the American commitment to the war is genuine?", "back": "The Allied governments."}, {"front": "Wilson's address is described as a 'formal act of state' because its genre is a _____.", "back": "Presidential Address"}, {"front": "True or False: Wilson's speech focuses heavily on the battlefield heroism seen in Holmes's addresses.", "back": "False"}, {"front": "What specific amount did American banks loan to the Central Powers, according to the text?", "back": "$27 million"}, {"front": "What rhetorical concept involves shaping an audience's understanding by what is *not* said?", "back": "Rhetorical Omission"}, {"front": "Who argued that Wilson wrapped a practical decision in moral language to make it unassailable?", "back": "Smedley Butler"}, {"front": "In Wilson's 'moral equation,' what is balanced against the 'fearful thing' of leading people into war?", "back": "A 'universal dominion of right' and peace for all nations."}, {"front": "What rhetorical role does Wilson adopt by spending three years trying to avoid the conflict?", "back": "The Reluctant Warrior."}, {"front": "Why does Wilson avoid a 'blunt polemic' style like Butler's in his address?", "back": "The formal genre of a Presidential Address to Congress requires a more statesmanlike and balanced tone."}, {"front": "What effect did Wilson's focus on moral principle have on the perceived 'moral clarity' of the war?", "back": "It sought to simplify the stakes and make the decision follow logically from democratic duty."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
