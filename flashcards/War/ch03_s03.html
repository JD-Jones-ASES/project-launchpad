<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was the only American president to hold an earned doctorate?", "back": "Woodrow Wilson"}, {"front": "In what year was Woodrow Wilson awarded the Nobel Peace Prize?", "back": "1919"}, {"front": "Woodrow Wilson's earliest memory involved hearing about the election of which president?", "back": "Abraham Lincoln"}, {"front": "How did Wilson's father's profession as a minister influence Wilson's political leadership?", "back": "It instilled a deep moral seriousness and a belief that right and wrong were governed by principles."}, {"front": "Wilson studied the government methodically and theoretically, comparing his approach to that of a _____.", "back": "physician"}, {"front": "From which institution did Woodrow Wilson earn his doctorate in political science in 1886?", "back": "Johns Hopkins University"}, {"front": "What was the title of Woodrow Wilson's 1885 doctoral dissertation?", "back": "Congressional Government"}, {"front": "What was the central argument of Wilson's dissertation, 'Congressional Government'?", "back": "Congress had become too powerful relative to the presidency."}, {"front": "Before becoming president of Princeton, Wilson taught at which two other institutions?", "back": "Bryn Mawr and Wesleyan"}, {"front": "In 1902, Wilson was appointed as the president of which university?", "back": "Princeton University"}, {"front": "Which social organizations did Wilson attempt to break up during his tenure as Princeton's president?", "back": "Exclusive eating clubs"}, {"front": "Why did New Jersey Democratic party bosses initially recruit Wilson to run for governor in 1910?", "back": "They expected him to be a compliant academic they could easily control."}, {"front": "List two progressive reforms Wilson successfully pushed through as Governor of New Jersey.", "back": "Direct primary law and workers' compensation"}, {"front": "Concept: The Progressive Movement", "back": "Definition: An early 20th-century movement seeking to address industrialization, urbanization, and corruption through government reform."}, {"front": "Along with Woodrow Wilson, who were two other leading figures of the early 20th-century progressive movement?", "back": "Theodore Roosevelt and Robert La Follette"}, {"front": "Which 1913 act created the modern central banking system in the United States?", "back": "Federal Reserve Act"}, {"front": "What was the primary objective of the Clayton Antitrust Act signed by Wilson?", "back": "To strengthen the regulation of monopolies."}, {"front": "What does the acronym FTC stand for in the context of Wilson's domestic legislation?", "back": "Federal Trade Commission"}, {"front": "The first federal income tax was established under the authority of which constitutional amendment?", "back": "Sixteenth Amendment"}, {"front": "How did Wilson change the integration status of federal agencies in Washington D.C.?", "back": "He re-segregated agencies that had been integrated since Reconstruction."}, {"front": "What action did Wilson take against Black federal employees during his presidency?", "back": "They were demoted or dismissed."}, {"front": "Which African American leader did Wilson order out of the White House in November 1914?", "back": "William Monroe Trotter"}, {"front": "What was Wilson's campaign slogan during the 1916 presidential election?", "back": "“He Kept Us Out of War”"}, {"front": "What was Wilson's initial view of the European conflict when it began in August 1914?", "back": "He believed it was a quarrel among empires that America had no business joining."}, {"front": "Which 1915 event involving a British ocean liner resulted in the deaths of 128 Americans?", "back": "The sinking of the Lusitania"}, {"front": "By 1917, approximately how much in loans had American banks extended to the Allied powers?", "back": "Over 2 billion dollars"}, {"front": "By 1917, approximately how much in loans had American banks extended to Germany?", "back": "27 million dollars"}, {"front": "Which major financial firm led the effort to provide loans to Britain and France during U.S. neutrality?", "back": "J.P. Morgan & Company"}, {"front": "What factor, besides policy, contributed to the low volume of U.S. trade with Germany during WWI neutrality?", "back": "The British naval blockade"}, {"front": "Why would a German victory have been a 'financial catastrophe' for Wall Street in 1917?", "back": "Because of the massive scale of American loans tied to an Allied victory."}, {"front": "According to Wilson, what was the driving force behind his decision to enter the war?", "back": "Principle, rather than profit."}, {"front": "What was the core principle Wilson claimed America was fighting for in his war address?", "back": "The principle of self-determination"}, {"front": "How did Wilson's wartime actions regarding executive authority contrast with his doctoral dissertation?", "back": "He dramatically expanded executive authority despite having argued that the presidency was too weak."}, {"front": "Wilson's Meeting with William Monroe Trotter: Purpose of the meeting?", "back": "To protest the re-segregation of the federal government."}, {"front": "Wilson was born in Staunton, Virginia, but primarily raised in which two southern cities?", "back": "Augusta, Georgia, and Columbia, South Carolina"}, {"front": "What moral contradiction exists between Wilson's war address and his domestic policy?", "back": "He advocated for global self-determination while denying basic rights to Black U.S. citizens."}, {"front": "Wilson believed war should only be entered as a _____.", "back": "last resort"}, {"front": "Which 1914 act established a commission to investigate and prohibit unfair business practices?", "back": "Federal Trade Commission Act"}, {"front": "In what month and year did Wilson finally conclude that the U.S. must enter World War I?", "back": "April 1917"}, {"front": "Wilson's reputation as a reformer was cemented by his willingness to challenge _____.", "back": "entrenched power"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
