    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

            </div>

    <script>
    var CARDS = [{"front": "What is 'logos' in rhetoric, as described in the textbook section?", "back": "Logos refers to the logic and evidence that support a claim, providing an argument with its backbone by establishing its logical framework."}, {"front": "What is Holmes' primary logical method?", "back": "Inductive generalization."}, {"front": "How does inductive generalization work, using Holmes' approach as an example?", "back": "It moves from specific observations (Holmes' personal experiences in the Civil War) to a general rule or philosophical principle (war cultivates virtues)."}, {"front": "What is a key strength of Holmes' inductive approach?", "back": "Its vividness, concreteness, and personal nature, drawing authority from lived experience and witnessed moments."}, {"front": "What is the main weakness of Holmes' inductive generalization?", "back": "His sample is narrow and potentially unrepresentative (one war, limited engagements), leading to sweeping conclusions that may not hold universally or account for negative experiences."}, {"front": "What is Holmes' central claim about war?", "back": "War cultivates virtues (like courage, discipline, and self-sacrifice) that a comfortable commercial society cannot produce on its own."}, {"front": "What logical vulnerability is identified in Holmes' argument?", "back": "The evidence is drawn from one man's limited experience in one war, meaning the generalization about war's virtues may not be universally applicable or hold for all circumstances."}, {"front": "What is Butler's primary logical method?", "back": "Economic analysis supported by specific data."}, {"front": "What is Butler's central claim about war?", "back": "War is a racket—a scheme in which a few profit enormously while the many pay the ultimate costs."}, {"front": "What type of evidence does Butler use to support his claim?", "back": "Concrete dollar figures, such as specific corporate profits during World War I, costs borne by taxpayers, and the disparity between soldiers' pay and munitions makers' earnings."}, {"front": "What is a major strength of Butler's logical approach compared to Holmes'?", "back": "His evidence (numbers and figures) is, in principle, verifiable and testable, unlike Holmes' more philosophical claims based on personal testimony."}, {"front": "What is the significant vulnerability in Butler's logic, and what logical fallacy is associated with it?", "back": "The gap between his evidence and conclusion: he proves corporations profited from war but then concludes profit is the *reason* wars are fought. This is the *post hoc ergo propter hoc* fallacy."}, {"front": "Explain the 'post hoc ergo propter hoc' fallacy.", "back": "It's the assumption that because one event follows another ('after this'), the first event must have caused the second ('therefore because of this'), without conclusively proving a causal link."}, {"front": "What is Wilson's primary logical method?", "back": "Moral and geopolitical reasoning, which operates deductively."}, {"front": "How does Wilson's deductive logic generally proceed?", "back": "He begins with a set of principles (e.g., rights of neutral nations, sovereignty of democratic peoples) and argues that specific actions (Germany's violations) necessitate a certain, logical response (war)."}, {"front": "What is Wilson's central claim for U.S. entry into World War I?", "back": "The United States must enter the war to defend the rights of free peoples and make the world safe for democracy."}, {"front": "What evidence does Wilson present for his claim?", "back": "Germany's violations of neutral rights (unrestricted submarine warfare, the Zimmermann Telegram) and the perceived threat to democratic self-governance and world order."}, {"front": "What is a strength of Wilson's logical structure?", "back": "It is a tightly constructed chain of reasoning, with clear and disciplined links that can be examined independently for their truth and warrant."}, {"front": "What is the main vulnerability in Wilson's argument?", "back": "It depends on premises and predictions (such as the necessity of war to save democracy) that were hotly debated at the time and remain contested by historians, requiring acceptance of his assessment of the geopolitical situation."}, {"front": "What is Remarque's 'logical method,' if it can be called that?", "back": "Experiential testimony, which presents raw sensory data and implicitly claims this data speaks for itself without explicit argument or syllogism."}, {"front": "What kind of 'evidence' does Remarque offer?", "back": "The evidence of the human body and senses: what it feels like to be shelled, gassed, to watch a friend die, and to lose the ability to imagine a future."}, {"front": "What is Remarque's greatest strength as an arguer?", "back": "His evidence is impossible to argue with on its own terms; no one can deny the physical reality and horror of the experiences he describes."}, {"front": "What is the main limitation of Remarque's experiential testimony?", "back": "While powerful, it cannot by itself answer policy questions ('what should we do?') because different individuals can draw widely varying conclusions from the same experiences."}, {"front": "Briefly compare the core logical framework of Holmes and Butler.", "back": "Holmes uses inductive generalization from vivid personal experience; Butler uses empirical economic data analyzed to reveal patterns of exploitation."}, {"front": "Briefly compare the core logical framework of Wilson and Remarque.", "back": "Wilson uses deductive moral and geopolitical reasoning from principles; Remarque uses direct experiential testimony from sensory evidence."}, {"front": "According to the text, what does critical thinking require when evaluating different logical frameworks?", "back": "Not certainty, but honest evaluation: explaining why one framework is convincing, and identifying the weaknesses in both the frameworks one prefers and those one rejects."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
