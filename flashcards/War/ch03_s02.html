    <style>
        .fc-container {

            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;

        .fc-card.flipped {
            transform: rotateY(180deg);

        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;

        .fc-back {

        .fc-label {

        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }

            background: transparent;

            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }

<body>

        <div class="container">
            <div class="hero-content">

    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>

                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>

    <script>
    var CARDS = [{"front": "How does Wilson rhetorically establish himself as a reasonable man in his 1917 address?", "back": "By leading with established facts regarding German actions rather than emotional appeals."}, {"front": "What specific German naval policy does Wilson identify as a primary grievance?", "back": "The resumption of unrestricted submarine warfare."}, {"front": "Wilson argues that the United States is entering the war not because it is a virtue, but because it is a _____.", "back": "grim duty."}, {"front": "In Wilson's moral argument, what makes the war a \"necessary\" action for the United States?", "back": "The actions of the German government left the nation with no honorable alternative."}, {"front": "Wilson draws a sharp distinction between the German government and the _____.", "back": "German people."}, {"front": "According to Wilson's logic, why are autocracies more likely to wage aggressive wars?", "back": "Because their leaders do not answer to their citizens."}, {"front": "Why does Wilson believe democracies naturally seek peace?", "back": "Because democratic citizens bear the costs of war directly."}, {"front": "What is the name of the political science theory that suggests republics are naturally inclined toward peace?", "back": "Democratic peace theory."}, {"front": "Which philosopher's 1795 work \"Perpetual Peace\" is a precursor to the democratic peace theory?", "back": "Immanuel Kant."}, {"front": "Concept: Self-Determination", "back": "Definition: The principle that peoples and nations have the right to choose their own form of government without external interference."}, {"front": "Concept: Liberal Democracy", "back": "Definition: A government system characterized by free elections, the rule of law, and protection of individual rights."}, {"front": "Wilson's argument transforms the war from a maritime dispute into a struggle between democracy and _____.", "back": "autocracy."}, {"front": "What famous phrase summarizes Wilson's goal for the international order?", "back": "To make the world \"safe for democracy.\""}, {"front": "In Wilson's view, why does the United States have a special responsibility to defend democracy?", "back": "It is a nation founded on universal principles like liberty and equality."}, {"front": "According to Wilson's reasoning, when is neutrality no longer possible?", "back": "When a belligerent nation attacks ships and plots against territory."}, {"front": "What piece of evidence, besides submarine warfare, did Wilson use to show German hostility toward the U.S.?", "back": "The Zimmermann Telegram."}, {"front": "In the conclusion of his argument, Wilson describes war as a \"_____.\"", "back": "fearful thing."}, {"front": "According to the text, what is the primary economic factor Wilson omits from his address?", "back": "The influence of war profits and the financial interests of munitions manufacturers and bankers."}, {"front": "Which critic argued that World War I was a \"racket\" fought for the profit of corporations?", "back": "Smedley Butler."}, {"front": "What British naval action did Wilson omit from his moral argument against Germany?", "back": "The British naval blockade of Germany."}, {"front": "Wilson's argument for global democracy fails to mention which domestic systemic inequality in the U.S.?", "back": "Jim Crow laws and the denial of democracy to African Americans."}, {"front": "How does Wilson's presentation of the war's cost differ from that of Oliver Wendell Holmes?", "back": "Wilson presents war as a terrible burden rather than a celebrated experience."}, {"front": "What alternative to war did Wilson's address fail to seriously engage with?", "back": "Continued neutrality at the cost of lost ships."}, {"front": "Wilson argues that lasting peace requires every nation to govern itself according to _____.", "back": "the will of its own citizens."}, {"front": "What is the \"clash of civilizations\" framework Wilson uses to characterize the war?", "back": "Freedom versus tyranny and the consent of the governed versus arbitrary power."}, {"front": "Why might Wilson's omissions be considered \"practical\" rather than \"strategic\"?", "back": "Because no speaker can address every possible objection in a single address."}, {"front": "Wilson's argument operates entirely in the realm of _____, rather than economics.", "back": "principle."}, {"front": "What was the consequence of the British blockade that Wilson failed to acknowledge?", "back": "It prevented food from reaching German civilians."}, {"front": "Wilson's core claim is that the German government is _____ aggressive.", "back": "inherently."}, {"front": "To Wilson, the war is a struggle between the arbitrary power of emperors and the _____.", "back": "consent of the governed."}, {"front": "What does Wilson claim is worse than entering a fearful war?", "back": "Submission to autocratic aggression."}, {"front": "In the context of the 1917 address, what does \"unrestricted\" mean regarding submarine warfare?", "back": "Sinking vessels, including neutral and noncombatant ships, without warning."}, {"front": "According to Wilson, who is responsible for the war within Germany?", "back": "The autocratic rulers."}, {"front": "What role does the text suggest American financial interests played in the decision for war?", "back": "They were so deeply invested in Allied victory that the economic consequences of an Allied defeat were staggering."}, {"front": "Wilson suggests that a world of democracies would be a world without _____.", "back": "aggressive war."}, {"front": "What is the relationship between Wilson's establishing of facts and his rhetorical persona?", "back": "It paints him as a peaceful leader forced into an extreme position by events."}, {"front": "Wilson's argument for American entry into WWI is built on the survival of _____ government.", "back": "democratic."}, {"front": "What did the British blockade do to American cargo and firms?", "back": "It seized American cargo and blacklisted American firms."}, {"front": "The text defines Wilson's address not as a call to arms, but as a _____.", "back": "carefully constructed moral argument."}, {"front": "Why does the text mention Wilson's protest of the British blockade?", "back": "To highlight that he protested it far less vigorously than German submarine actions."}, {"front": "In the argument map, the Zimmermann Telegram serves as _____ for the claim that the U.S. must enter the war.", "back": "evidence."}, {"front": "Wilson's vision for the postwar world was centered on the principle of _____.", "back": "self-determination."}, {"front": "According to political science, what prevents citizens from voting for the costs of war in a democracy?", "back": "The direct personal burden of the war's consequences."}, {"front": "Wilson frames the conflict as a defense of _____ principles, rather than just American interests.", "back": "universal."}, {"front": "What is the primary difference between how Wilson and Smedley Butler view the purpose of WWI?", "back": "Wilson sees it as a fight for democracy, while Butler sees it as a fight for profit."}, {"front": "The first layer of Wilson's argument focuses on establishing the _____.", "back": "grievance."}, {"front": "What does Wilson's argument imply is the relationship between an international order and democratic nations?", "back": "An international order allows democracies to live in peace without threat from autocracies."}, {"front": "Wilson characterizes the United States as a \"great _____ people\" being led into war.", "back": "peaceful."}, {"front": "How does the text characterize the escalation of Wilson's argument?", "back": "It moves from specific facts to universal principles of civilization."}, {"front": "What does the text suggest is the heart of Butler's argument in \"War Is a Racket\"?", "back": "That the war was fought for the profit of a few rather than for democracy."}, {"front": "According to the definition, what characterizes the rule of law in a liberal democracy?", "back": "Limits on government power and the protection of individual rights."}, {"front": "Wilson's argument suggests that lasting peace is impossible without _____.", "back": "the spread of democracy."}, {"front": "What does Wilson establish before drawing any conclusions in his speech?", "back": "The facts of German submarine warfare and the deaths of noncombatants."}, {"front": "Wilson's address is described as being built in _____, each supporting the next.", "back": "layers."}, {"front": "What does the text conclude about identifying omissions in Wilson's argument?", "back": "It is a tool for critical reading, but does not inherently invalidate the argument."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
