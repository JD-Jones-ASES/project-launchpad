<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Woodrow Wilson's 1917 address structurally build its moral argument?", "back": "It is built in layers, with each layer supporting the next through a sequence of grievance, principle, and duty."}, {"front": "Why does Wilson lead his address with facts about German submarine warfare rather than emotional appeals?", "back": "To establish himself as a reasonable man compelled to an extreme position by extreme circumstances."}, {"front": "According to Wilson's core claim, why is the United States entering the war?", "back": "Because German actions have left the nation no honorable alternative to war."}, {"front": "How does Wilson's view of war differ from that of Oliver Wendell Holmes?", "back": "Wilson views war as a grim duty rather than a virtue."}, {"front": "How does Wilson's view of war contrast with Smedley Butler's later arguments?", "back": "Wilson views war as a necessary struggle for principle, while Butler views it as a racket for profit."}, {"front": "What distinction does Wilson draw between the German people and the German government?", "back": "He argues that the German people did not choose the war, but were forced into it by their autocratic rulers."}, {"front": "Why do autocracies have the capacity to wage aggressive wars according to Wilson?", "back": "Because their leaders do not answer to their citizens."}, {"front": "According to political philosophy, why are democracies naturally inclined toward peace?", "back": "Because their citizens directly bear the costs of war and would not vote to impose those costs on themselves."}, {"front": "Which 1795 work by Immanuel Kant argued that republican governments are naturally inclined toward peace?", "back": "Perpetual Peace"}, {"front": "What is the political science term for the theory that democracies are less likely to go to war?", "back": "Democratic peace theory"}, {"front": "Term: Self-Determination", "back": "Definition: The principle that peoples and nations have the right to choose their own form of government without external interference."}, {"front": "Term: Liberal Democracy", "back": "Definition: A government system with free elections, the rule of law, individual rights, and limits on government power."}, {"front": "What is the ultimate objective of making the world \"safe for democracy\"?", "back": "To establish an international order where democratic nations can live in peace without threat from autocracies."}, {"front": "According to Wilson, why does the United States have a special responsibility to respond when democracy is threatened?", "back": "The nation is founded on universal principles like liberty and equality that impose global obligations."}, {"front": "What piece of evidence in Wilson's argument demonstrated direct German hostility toward U.S. territory?", "back": "The Zimmermann Telegram"}, {"front": "According to the argument map, why is neutrality no longer possible for the U.S.?", "back": "A belligerent nation has attacked American ships and plotted against its territory."}, {"front": "How does Wilson characterize the alternative to entering the war?", "back": "Submission to autocratic aggression."}, {"front": "What tone does Wilson adopt regarding the burden of leading the nation into war?", "back": "He presents it as a \"fearful thing\" and emphasizes the weight of his responsibility."}, {"front": "Which significant economic factor does Wilson omit from his argument for war?", "back": "The financial interests of munitions manufacturers and bankers who lent to the Allies."}, {"front": "What specific Allied action violating neutral rights did Wilson fail to address in his speech?", "back": "The British naval blockade of Germany."}, {"front": "Which domestic inconsistency in Wilson's \"pro-democracy\" argument do critical readers often point out?", "back": "The denial of democracy to African Americans under Jim Crow laws."}, {"front": "Why did Wilson protest the German blockade more vigorously than the British blockade?", "back": "The German blockade involved sinking ships and killing noncombatants, rather than just seizing cargo."}, {"front": "According to the text, what is a \"strategic\" omission in an argument?", "back": "An instance where the speaker intentionally hides information to strengthen their case."}, {"front": "What is a \"practical\" omission in an argument?", "back": "When a speaker focuses on what matters most to the audience due to the constraints of the occasion."}, {"front": "How does Wilson transform the meaning of the war beyond a maritime dispute?", "back": "By framing it as a clash of civilizations between democracy and autocracy."}, {"front": "What specific German action marked the beginning of Wilson's established facts?", "back": "The resumption of unrestricted submarine warfare."}, {"front": "Wilson argues that lasting peace requires every nation to govern itself according to _____.", "back": "The will of its own citizens"}, {"front": "According to Wilson, what is the primary threat to the international order?", "back": "Arbitrary power exercised by emperors and generals."}, {"front": "What does Wilson claim about the inevitability of the U.S. entry into the war?", "back": "He argues he was driven to an extreme position by extreme circumstances, not by choice."}, {"front": "The principle that the spread of liberal democracy is essential to world peace is a cornerstone of whose vision?", "back": "Woodrow Wilson's"}, {"front": "Why does Wilson argue that autocracies are inherently aggressive?", "back": "Their leaders are not constrained by the citizens who must fight and pay for the wars."}, {"front": "What was the economic status of U.S. financial interests regarding the Allies by April 1917?", "back": "They were deeply invested, standing to lose billions if the Allies were defeated."}, {"front": "In Wilson's argument, what is the relationship between American principles and American duty?", "back": "The principles of liberty and equality impose an obligation to defend democracy wherever it is threatened."}, {"front": "What is the main critique of Wilson's framing of the choice to go to war?", "back": "He presents it as a binary choice between fighting and submission, ignoring continued neutrality."}, {"front": "How does the text define the \"architecture\" of Wilson's speech?", "back": "A carefully constructed moral argument built in layers."}, {"front": "What was the purpose of the British naval blockade that Wilson omitted from his address?", "back": "Preventing food and cargo from reaching German civilians and firms."}, {"front": "Wilson frames the war not as a European quarrel, but as a struggle between _____ and _____.", "back": "Democracy; autocracy"}, {"front": "What is the \"record\" Wilson uses to establish the grievance against Germany?", "back": "The sinking of neutral vessels and the deaths of noncombatants."}, {"front": "How does Wilson's", "back": "It characterizes war as a terrible burden rather than an ennobling experience."}, {"front": "According to the reasoning in the argument map, when is neutrality no longer possible?", "back": "When a belligerent nation attacks your ships and plots against your territory."}, {"front": "What does the text suggest about the strategic nature of Wilson's focus on principle over economics?", "back": "It allowed him to avoid the controversial role of munitions manufacturers and bankers in the war effort."}, {"front": "Wilson's vision for the postwar world centered on which key concept of national governance?", "back": "Self-determination"}, {"front": "What role does the \"consent of the governed\" play in Wilson's escalation of the argument?", "back": "It serves as the moral divide between the democratic world and the arbitrary power of autocracies."}, {"front": "Which groups did Smedley Butler argue were the true beneficiaries of the war?", "back": "Corporations such as munitions manufacturers, steel companies, and bankers."}, {"front": "What is the \"common misreading\" regarding omissions in an argument mentioned in the text?", "back": "Concluding that an argument is dishonest or wrong simply because it is selective."}, {"front": "According to the text, what prevents democracies from seeking aggressive war?", "back": "The fact that their citizens bear the cost of war directly."}, {"front": "How did the British blockade violate neutral rights?", "back": "By seizing American cargo and blacklisting American firms."}, {"front": "What does Wilson suggest is the only alternative to submission to autocratic aggression?", "back": "Entering the war to defend democratic principles."}, {"front": "Wilson's argument moves from a specific maritime dispute to a universal _____.", "back": "Clash of civilizations"}, {"front": "Why is the sinking of American ships described as a \"matter of record\" in the text?", "back": "To show that Wilson led with undisputed facts rather than interpretation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
