    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);

        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;

        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "According to the text, what is the current status of the debate among Holmes, Butler, Wilson, and Remarque?", "back": "It is a permanent and active feature of American public discourse that continues to the present day."}, {"front": "What remains constant in the debate over war, even as specific names and locations change?", "back": "The underlying questions and rhetorical strategies used to argue for and against conflict."}, {"front": "The lasting influence of an idea, argument, or event on subsequent generations is defined as its _____.", "back": "historical legacy"}, {"front": "How is the legacy of an argument measured according to the text's definition?", "back": "By whether it continues to shape how people think about similar questions in the future."}, {"front": "Why is World War II often referred to as \"the good war\" in the context of this debate?", "back": "It was seen as a conflict so clearly justified that even skeptics of war had difficulty objecting."}, {"front": "Which historical figure's logic—that democracies must fight to survive—was vindicated by World War II?", "back": "Woodrow Wilson's logic."}, {"front": "In World War II, Holmes' vision of _____ was reinforced by the liberation of concentration camps.", "back": "martial virtue"}, {"front": "What aspect of World War II production supported Butler's skepticism regarding war?", "back": "The fact that war production made massive fortunes for industrialists."}, {"front": "Which event during World War II demonstrated that wartime can be used to justify internal injustices?", "back": "The internment of Japanese Americans."}, {"front": "In World War II, Remarque's perspective was reflected in the gap between patriotic rhetoric and _____.", "back": "battlefield reality"}, {"front": "The Korean War tested Wilson's framework within the new geopolitical context of the _____.", "back": "Cold War"}, {"front": "How did President Truman frame the Korean War in Wilsonian terms?", "back": "As a defense of the free world against communist expansion."}, {"front": "What was a significant procedural difference between the authorization of World War II and the Korean War?", "back": "The Korean War was not a declared war and Congress never voted on it."}, {"front": "The three-year stalemate in Korea caused Americans to begin questioning the costs of _____.", "back": "global leadership"}, {"front": "Why did Butler's question about who profits from war find a new audience during the Korean War?", "back": "Because the military budget failed to shrink even during times of relative peace."}, {"front": "Which conflict is described as \"Butler's moment\" due to the resurgence of his arguments?", "back": "The Vietnam War."}, {"front": "What Wilsonian goals were initially used to justify United States involvement in Vietnam?", "back": "Defending against aggression and preserving the self-determination of South Vietnam."}, {"front": "Why did Vietnam protesters echo Smedley Butler by calling the war a \"racket\"?", "back": "They perceived a massive gap between official Washington optimism and the reality of the battlefield."}, {"front": "What 1971 document revealed that the U.S. government had systematically deceived the public about Vietnam?", "back": "The Pentagon Papers."}, {"front": "Name one of the writers mentioned who echoed Remarque's unflinching honesty regarding the Vietnam combat experience.", "back": "Tim O'Brien (also Michael Herr or Philip Caputo)."}, {"front": "Why did Holmes' martial idealism seem \"obscene\" to the generation that lived through the Vietnam War?", "back": "They witnessed the unedited reality of the war on television every night."}, {"front": "The Gulf War (1990–1991) challenged the post-Vietnam conclusion that the U.S. would never again fight a _____.", "back": "large-scale war"}, {"front": "In the Gulf War, President George H. W. Bush used _____ language to describe the enforcement of international law.", "back": "Wilsonian"}, {"front": "Which figure's vision of \"decisive, purposeful military action\" seemed restored by the outcome of the Gulf War?", "back": "Oliver Wendell Holmes'."}, {"front": "What resource led Butler's skeptics to question the true motivation behind the Gulf War?", "back": "Oil (specifically Kuwait's oil reserves)."}, {"front": "The wars in Iraq and Afghanistan combined every strand of the historical debate initiated in _____.", "back": "1935"}, {"front": "The initial 2001 invasion of Afghanistan was supported using Wilson's logic of _____.", "back": "necessary self-defense"}, {"front": "How did the mission in Afghanistan expand over the years according to the text?", "back": "It shifted from destroying al-Qaeda to the project of rebuilding an entire nation."}, {"front": "What was the initial justification for the 2003 invasion of Iraq?", "back": "The claim that Saddam Hussein possessed weapons of mass destruction (WMDs)."}, {"front": "When no WMDs were found in Iraq, what did the justification for the war shift toward?", "back": "The Wilsonian goal of spreading democracy."}, {"front": "Butler's heirs pointed to the \"revolving door\" between _____ and government as evidence of war profiteering.", "back": "defense firms"}, {"front": "What Remarque-like discrepancy was noted during the twenty-year conflict in Afghanistan?", "back": "Soldiers served multiple tours while the rest of the country continued with normal life (\"went shopping\")."}, {"front": "According to the text, the debate over war is not a problem to be solved, but a _____ to be met.", "back": "responsibility"}, {"front": "What three qualities does the text argue are necessary to meet the responsibility of the war debate?", "back": "Evidence, honesty, and respect for the stakes involved."}, {"front": "The text claims that every major war produces its own versions of which four historical voices?", "back": "Holmes, Butler, Wilson, and Remarque."}, {"front": "Which 20th-century war is described as the \"fullest vindication\" of the idea that democracies must fight to survive?", "back": "World War II."}, {"front": "Cloze: In the Korean War, Butler's question—_____?—found a new audience among those noticing high military budgets.", "back": "who profits"}, {"front": "How did the ending of the Korean War contribute to the national debate on war?", "back": "Its stalemate made Americans question if the costs of global leadership were worth paying."}, {"front": "Term: The Pentagon Papers", "back": "Definition: A 1971 publication revealing that government officials had systematically deceived the public about the Vietnam War."}, {"front": "What was the duration of the military campaign during the Gulf War that liberated Kuwait?", "back": "Six weeks."}, {"front": "According to the text, which figure's voice would be associated with a critique of the military-industrial complex in the Iraq war?", "back": "Smedley Butler's."}, {"front": "What did the soldiers' letters from World War II reveal regarding the nature of combat?", "back": "They often experienced a gap between patriotic rhetoric and the reality of the battlefield."}, {"front": "Why does the text argue that the rhetorical strategies of war remain \"remarkably stable\"?", "back": "Because the same fundamental questions arise every time a nation considers military action."}, {"front": "Which war's justification shifted from WMDs to spreading democracy?", "back": "The 2003 Iraq invasion."}, {"front": "What is the primary significance of the Tomb of the Unknown Soldier in the context of this chapter?", "back": "It serves as a symbol of the \"honored glory\" and sacrifice that is central to the debate over war's meaning."}, {"front": "In the Gulf War context, what was the \"uncomfortable question\" raised by Butlerian skeptics?", "back": "Whether the U.S. would have intervened if Kuwait did not possess strategic oil reserves."}, {"front": "Which historical voice focuses on the \"martial virtue\" and the moral discipline of the soldier?", "back": "Oliver Wendell Holmes."}, {"front": "The argument that free nations must resist aggression to prevent international collapse is central to the _____ framework.", "back": "Wilsonian"}, {"front": "Which figure's perspective is most closely associated with the phrase \"war is a racket\"?", "back": "Smedley Butler."}, {"front": "According to the conclusion, what happens to the voices of Holmes, Butler, Wilson, and Remarque in future wars?", "back": "They will remain active in substance, even if they are not mentioned by name."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
