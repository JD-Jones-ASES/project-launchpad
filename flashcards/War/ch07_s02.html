<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Oliver Wendell Holmes, war serves as a _____ of character.", "back": "crucible"}, {"front": "What did Holmes believe was the 'highest expression of human virtue'?", "back": "The willingness to fight and die for a cause greater than oneself."}, {"front": "Smedley Butler famously argued that war is a _____, designed to enrich the few.", "back": "racket"}, {"front": "In Butler's view, who pays the ultimate price while corporations profit from war?", "back": "Ordinary people (who pay in blood)."}, {"front": "What was Woodrow Wilson's primary moral justification for entering World War I?", "back": "The survival of democracy against autocracy."}, {"front": "Unlike the other writers mentioned, what was unique about Erich Maria Remarque’s 'argument' regarding war?", "back": "He offered no formal argument, only a"}, {"front": "According to Remarque, what effect does the reality of industrial warfare have on abstract justifications for war?", "back": "It mocks them."}, {"front": "Term: Synthesis", "back": "Definition: The process of combining multiple perspectives into a coherent analysis to see how they relate."}, {"front": "What is the primary goal of synthesis in critical reading?", "back": "To reach a considered judgment that accounts for the strongest points on every side."}, {"front": "Oliver Wendell Holmes frames war at the level of the _____, focusing on what it does to the soul.", "back": "individual"}, {"front": "Smedley Butler frames war as an _____ system, focusing on costs and profits.", "back": "economic"}, {"front": "Woodrow Wilson frames war as a _____ necessity, focusing on the actions of nations and types of government.", "back": "political"}, {"front": "What is the inherent limitation of any single 'frame' used to describe war?", "back": "Each frame reveals something real but conceals something else."}, {"front": "What is described as the 'beginning of honest judgment' regarding the complexity of war?", "back": "Acknowledging that multiple, conflicting truths about war can exist simultaneously."}, {"front": "What central question must a critical reader ask of every argument?", "back": "What has been left out?"}, {"front": "Concept: Ethos", "back": "Definition: A rhetorical strategy appealing to the character or credibility of the speaker/writer."}, {"front": "Concept: Pathos", "back": "Definition: A rhetorical strategy appealing to the audience's emotions."}, {"front": "Concept: Logos", "back": "Definition: A rhetorical strategy appealing to logic, reason, and evidence."}, {"front": "Critical reading requires the ability to distinguish evidence from _____.", "back": "assertion"}, {"front": "True or False: Emotional appeals in an argument are automatically invalid.", "back": "False"}, {"front": "What specific background detail gave Smedley Butler's argument ethos?", "back": "He was the most decorated Marine of his era."}, {"front": "What specific background detail gave Oliver Wendell Holmes's argument ethos?", "back": "He had been shot three times in combat."}, {"front": "Which historical threats did Wilson cite as genuine dangers to the international order?", "back": "Unrestricted submarine warfare and the Zimmermann Telegram."}, {"front": "According to the text, what is the relationship between 'ennobling' individual soldiers and 'enriching' profiteers?", "back": "Both can happen simultaneously within the same war."}, {"front": "Why is Wilson’s decision to enter WWI described as a reversal of course?", "back": "He had originally campaigned on a platform of peace."}, {"front": "Remarque’s work focuses on the experience of _____ warfare.", "back": "industrial"}, {"front": "In the context of critical thinking, what does it mean to identify a writer's 'frame'?", "back": "Identifying the level of abstraction and specific focus the writer has chosen."}, {"front": "How does the text define the 'highest expression of human virtue' according to Holmes?", "back": "The willingness to sacrifice one's life for a cause greater than oneself."}, {"front": "What does Butler believe is the primary motivation for war schemes?", "back": "Profit/Wealth for the powerful."}, {"front": "What was the core tension in Wilson's political position regarding the war?", "back": "Balancing his campaign for peace with the perceived necessity to fight for democracy."}, {"front": "The ability to hold multiple arguments in one's mind at once is a key component of _____.", "back": "synthesis"}, {"front": "How does the text characterize the relationship between a legitimate cause and the suffering war produces?", "back": "The suffering can be so vast that the cause seems inadequate to justify it."}, {"front": "According to the text, identifying what a frame leaves out is a part of _____.", "back": "reading arguments critically"}, {"front": "What does the text suggest is the point of providing multiple conflicting voices on war?", "back": "To give the reader tools to evaluate arguments for themselves."}, {"front": "What specific type of warfare conducted by Imperial Germany is mentioned as a threat to American security?", "back": "Unrestricted submarine warfare."}, {"front": "Butler's critique of the First World War noted that soldiers often returned home to _____.", "back": "poverty"}, {"front": "According to Holmes, what is the relationship between war and peace regarding virtue?", "back": "War builds virtues that peace cannot produce."}, {"front": "What does the text describe as 'Industrial Warfare'?", "back": "A horrifying experience involving shelling and mass death that mocks abstractions."}, {"front": "How does the text describe the nature of synthesis regarding 'choosing sides'?", "back": "Synthesis does not mean choosing one side; it means understanding how positions relate."}, {"front": "What is the specific danger of a rhetorical 'assertion' in an argument?", "back": "It is a statement made without provided evidence."}, {"front": "Wilson's argument was that the survival of _____ required the U.S. to take up arms.", "back": "democracy"}, {"front": "Holmes's perspective focuses on war's effect on the individual _____.", "back": "soul"}, {"front": "Butler characterizes war as a 'scheme' organized by the _____.", "back": "powerful"}, {"front": "What 'tool' of critical reading involves evaluating a writer's appeal to reason?", "back": "Logos"}, {"front": "What 'tool' of critical reading involves evaluating how a writer establishes their authority?", "back": "Ethos"}, {"front": "What 'tool' of critical reading involves evaluating emotional engagement?", "back": "Pathos"}, {"front": "According to the text, can all four conflicting perspectives on war be 'correct'?", "back": "Yes, in the sense that they reveal different simultaneous truths."}, {"front": "What is the primary question used to open the book mentioned in the text?", "back": "What is war for?"}, {"front": "In Wilson's framework, what was the 'threat' that became too great to ignore?", "back": "The threat to democracy and international order from autocracy."}, {"front": "Remarque's", "back": "what was actually happening in the war"}, {"front": "What is the relationship between synthesis and 'considered judgment'?", "back": "Synthesis allows one to reach a judgment that accounts for all strong points."}, {"front": "What does a political frame, like Wilson's, typically 'leave out'?", "back": "The personal soul/experience (Holmes's frame) or the economic system (Butler's frame)."}, {"front": "According to Butler, what is the disparity between those who fight and those who profit?", "back": "Ordinary people die while corporations and the powerful get rich."}, {"front": "Which author provides a perspective based on being shot multiple times?", "back": "Oliver Wendell Holmes"}, {"front": "Which author provides a perspective based on being a highly decorated Marine?", "back": "Smedley Butler"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
