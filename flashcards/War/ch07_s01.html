    <style>
        .fc-container {
            max-width: 700px;

        .fc-breadcrumb {
            margin-bottom: 2rem;

        .fc-breadcrumb a {

        /* Card */

            cursor: pointer;
            user-select: none;

        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;

        .fc-front {

            color: var(--text-primary);

        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;

            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;

        /* Controls */
        .fc-controls {
            display: flex;

            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle

            </div>
        </div>

    <script>
    var CARDS = [{"front": "Where is the Vietnam Veterans Memorial located?", "back": "Washington, D.C."}, {"front": "Approximately how many American names are etched into the Vietnam Veterans Memorial?", "back": "More than 58,000."}, {"front": "What specific material is used for the walls of the Vietnam Veterans Memorial?", "back": "Polished black granite."}, {"front": "Which national landmark is reflected in the stone of the Vietnam Veterans Memorial?", "back": "The Washington Monument."}, {"front": "What is the central question the book attempts to address regarding conflict?", "back": "What is war for?"}, {"front": "Why does the author claim that the question 'What is war for?' has no single answer?", "back": "War is too vast and terrible to be captured by one frame of analysis."}, {"front": "Which perspective on war is described as the voice that 'simply reports what it sees'?", "back": "The voice of the soldier in the trench."}, {"front": "Who is the author of the 1929 novel 'All Quiet on the Western Front'?", "back": "Erich Maria Remarque."}, {"front": "In Remarque's quote, how old were the soldiers when they 'began to love life'?", "back": "Eighteen."}, {"front": "According to Remarque, what did the young soldiers have to do to the world they loved?", "back": "Shoot it to pieces."}, {"front": "Remarque's quote states that the soldiers are not 'fleeing' from the enemy, but from _____.", "back": "Themselves."}, {"front": "What is the primary thing Erich Maria Remarque's perspective tells us about war?", "back": "What it costs."}, {"front": "Which historical figure is associated with the celebration of 'martial virtue'?", "back": "Oliver Wendell Holmes."}, {"front": "Smedley Butler's perspective on war is characterized as an indictment of _____.", "back": "Profiteering."}, {"front": "Which figure provides a defense of war based on 'democratic necessity'?", "back": "Woodrow Wilson."}, {"front": "According to the text, what must every argument about war eventually confront?", "back": "The human reality described by Remarque."}, {"front": "What is the fundamental disagreement regarding war that has persisted for thousands of years?", "back": "Whether any purpose or principle is large enough to justify the suffering."}, {"front": "The text defines a moral argument as one grounded in claims about right and wrong rather than _____.", "back": "Calculations of cost and benefit."}, {"front": "Concept: Moral Argument", "back": "Definition: An argument grounded in claims about right and wrong, justice and injustice."}, {"front": "Concept: Economic Argument", "back": "Definition: An argument grounded in calculations of cost and benefit."}, {"front": "Which figure mentioned in the text utilizes both moral and economic arguments for war?", "back": "Woodrow Wilson."}, {"front": "What is the primary focus of an economic argument according to the Chapter 7 excerpt?", "back": "Calculations of cost and benefit."}, {"front": "The ability to recognize if a speaker is using 'calls to honor' is an example of identifying appeals to _____.", "back": "Emotions."}, {"front": "When evaluating a claim about war, what should a citizen ask regarding omitted information?", "back": "What evidence has been left out?"}, {"front": "The text states that analytical skills used for reading old speeches are also skills for _____.", "back": "Citizenship."}, {"front": "Whose 'voice' will you hear when arguments are made regarding honor and sacrifice?", "back": "Oliver Wendell Holmes."}, {"front": "Whose 'voice' is represented by questions regarding who profits from a war?", "back": "Smedley Butler."}, {"front": "Whose 'voice' is reflected in arguments about necessity and democracy?", "back": "Woodrow Wilson."}, {"front": "Whose 'voice' is heard in the testimony of those who return home from war?", "back": "Erich Maria Remarque."}, {"front": "When listening to arguments for war, the author advises readers to 'Demand _____' .", "back": "Evidence."}, {"front": "When listening to arguments for war, the author advises readers to 'Identify _____' .", "back": "Assumptions."}, {"front": "The ability to hold four competing positions in mind without 'collapsing them' is a sign of _____.", "back": "Intelligence and integrity."}, {"front": "According to the conclusion, who is ultimately responsible for deciding if a war is justified?", "back": "The individual (yourself)."}, {"front": "The quote 'We are not youth any longer' is attributed to which literary work?", "back": "All Quiet on the Western Front."}, {"front": "In the context of the text, what is 'martial virtue'?", "back": "A moral argument for war celebrated by Holmes."}, {"front": "What does the text suggest is more important than finding a 'single answer' to war's purpose?", "back": "Participating in the disagreement with intelligence and integrity."}, {"front": "According to the text, what separates a 'moral argument' from calculations of 'cost and benefit'?", "back": "A focus on right, wrong, and justice."}, {"front": "What does the author suggest you should ask when a speaker makes a claim?", "back": "What evidence supports the claim?"}, {"front": "How does the author describe the nature of war in relation to analysis?", "back": "Too vast and too terrible to be captured by one frame."}, {"front": "Which figure's argument is specifically described as an indictment of profiteering?", "back": "Smedley Butler."}, {"front": "In the quote from Remarque, what are the soldiers 'flying from' besides themselves?", "back": "From their life."}, {"front": "The text states that everyone agrees war causes _____.", "back": "Suffering."}, {"front": "What analytical task should you perform regarding a speaker's 'assumptions'?", "back": "Identify them."}, {"front": "What is the difference between an appeal to reason and an appeal to emotion?", "back": "An appeal to reason relies on logic/evidence; an appeal to emotion targets feelings."}, {"front": "The Vietnam Veterans Memorial reflects the Washington Monument, symbolizing the link between the fallen and _____.", "back": "National history/founding ideals."}, {"front": "How does the text define the 'soldier's voice' in contrast to others?", "back": "It does not argue, but simply reports what it sees."}, {"front": "According to the text, why is identifying 'what has been left out' crucial?", "back": "It reveals omitted evidence that could change an evaluation."}, {"front": "Woodrow Wilson's argument for 'necessity' is an example of what kind of argument?", "back": "Both a moral and an economic argument."}, {"front": "The phrase 'take the world by storm' in Remarque's quote refers to the lost _____ of the soldiers.", "back": "Ambition or youth."}, {"front": "What does the text imply is the outcome of using the 'tools' of intelligence and integrity?", "back": "Better citizenship in the face of national debates."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
