<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Smedley Butler define a 'racket' in the context of war?", "back": "A scheme for private profit conducted under the guise of public service."}, {"front": "According to Butler, who are the only people who know what a war racket is truly about?", "back": "A small 'inside' group."}, {"front": "Butler asserts that war is the only racket where profits are reckoned in dollars and losses are reckoned in _____.", "back": "lives"}, {"front": "How many new millionaires and billionaires admitted their wartime gains in U.S. tax returns during WWI?", "back": "21,000"}, {"front": "What group of people does Butler claim 'foment wars and remain safely at home to profit'?", "back": "The few who benefit at the expense of the many."}, {"front": "What is the 'horrible accounting' or bill paid by the general public after a war?", "back": "Losses such as mangled bodies, shattered minds, and back-breaking taxation."}, {"front": "At the time of Butler's writing in 1935, how many men were under arms globally?", "back": "40,000,000"}, {"front": "Which Italian leader stated that war 'puts the stamp of nobility upon the people who have the courage to meet it'?", "back": "Benito Mussolini (Il Duce)"}, {"front": "According to Butler, what was the U.S. national debt in 1898 before it became 'internationally minded'?", "back": "A little more than \\1,000,000,000$"}, {"front": "By the end of the World War I period, what had the U.S. national debt jumped to?", "back": "Over \\25,000,000,000$"}, {"front": "What was the total estimated cost of World War I to the United States?", "back": "Approximately \\52,000,000,000$"}, {"front": "How much does the total cost of WWI represent for every American man, woman, and child?", "back": "\\400$"}, {"front": "What does Butler identify as the 'normal' profit range for a business concern in the U.S. during peacetime?", "back": "$6\\%to12\\%$"}, {"front": "During wartime, what is the upper limit for profit percentages according to Butler?", "back": "There is no limit ('the sky is the limit')."}, {"front": "What were the average yearly earnings of the du Pont family from 1910 to 1914?", "back": "\\6,000,000$"}, {"front": "What were the average yearly profits for the du Ponts during the war years of 1914 to 1918?", "back": "\\58,000,000$"}, {"front": "By what percentage did the du Ponts' profits increase during the war compared to their pre-war average?", "back": "More than $950\\%$"}, {"front": "Bethlehem Steel's average yearly earnings jumped from \\6,000,000$ pre-war to what amount during the war?", "back": "\\49,000,000$"}, {"front": "United States Steel's average yearly profit rose from \\105,000,000to what amount during1914-1918$?", "back": "\\240,000,000$"}, {"front": "What happened to Anaconda Copper's yearly earnings during the war years?", "back": "They increased from \\10,000,000to\\34,000,000."}, {"front": "Utah Copper's average yearly profits leaped from \\5,000,000$ to _____ during the war.", "back": "\\21,000,000$"}, {"front": "What was the approximate total percentage increase in profits for the group of five major steel, powder, and copper companies?", "back": "$200\\%$"}, {"front": "Which company saw its profits jump from roughly \\1,167,000a year to\\15,000,000 in 1916?", "back": "Central Leather Company"}, {"front": "Central Leather Company's profit increase in 1916 represented a rise of _____.", "back": "$1,100\\%$"}, {"front": "General Chemical Company's profits increased from \\800,000$ a year to what amount during the war?", "back": "\\12,000,000$"}, {"front": "What was the percentage increase in profits for the International Nickel Company during the war?", "back": "More than $1,700\\%$"}, {"front": "International Nickel Company's average yearly profits rose from \\4,000,000$ to _____.", "back": "\\73,000,000$"}, {"front": "According to Senate Document No. 259, some coal companies made up to _____ on their capital stock during the war.", "back": "$7,856\\%$"}, {"front": "Why does Butler claim the wartime profits of bankers were kept secret?", "back": "They are partnerships that do not have to report to stockholders."}, {"front": "How many pairs of hobnailed service shoes did the U.S. government buy for 4,000,000 soldiers?", "back": "35,000,000"}, {"front": "Approximately how many pairs of shoes were left over for the U.S. government after WWI ended?", "back": "25,000,000"}, {"front": "Why were hundreds of thousands of McClellan saddles purchased when there was no American cavalry overseas?", "back": "To ensure leather manufacturers could record and pocket a profit."}, {"front": "How many mosquito nets were sold to the U.S. government for use by soldiers in France?", "back": "20,000,000"}, {"front": "In addition to 20 million finished nets, how much extra mosquito netting did manufacturers sell to the U.S. government?", "back": "40,000,000 yards"}, {"front": "How much did the U.S. government spend on airplane engines that never left the ground or entered battle?", "back": "\\1,000,000,000$"}, {"front": "What was the production cost versus the government's purchase price for soldier undershirts?", "back": "14 cents to make versus 30 to 40 cents paid."}, {"front": "Why were 4,000,000 sets of knapsack equipment scrapped after the war?", "back": "The regulations changed the required contents."}, {"front": "For what specific purpose were twelve dozen 48-inch wrenches purchased by the government?", "back": "There was no military use; they only fit a nut at Niagara Falls."}, {"front": "How many buckboards were purchased for the use of colonels, none of which were used?", "back": "6,000"}, {"front": "What was the total value of ships built by shipbuilders during the war period?", "back": "More than \\3,000,000,000$"}, {"front": "What was the issue with the \\635,000,000$ worth of ships made of wood?", "back": "They wouldn't float because their seams opened up."}, {"front": "Of the total \\52,000,000,000$ spent on WWI, how much was for the actual war itself?", "back": "\\39,000,000,000$"}, {"front": "How much of the total WWI expenditure was yielded as pure profit for the 'few'?", "back": "\\16,000,000,000$"}, {"front": "Which Senate committee was responsible for probing the munitions industry and wartime profits?", "back": "The Nye Committee"}, {"front": "Butler criticizes profit-limiting plans for failing to limit what aspect of war?", "back": "The losses of the soldiers (lives, limbs, and health)."}, {"front": "What was the 'open door' policy trade value with China that Butler mentions as a justification for potential war with Japan?", "back": "About \\90,000,000$ a year"}, {"front": "What was the total amount the U.S. spent in the Philippines over 35 years compared to the private investment there?", "back": "\\600,000,000spent versus less than\\200,000,000 in investment."}, {"front": "Who does Butler claim were 'old friends' that the U.S. turned against in 1904 to back Japan?", "back": "The Russians"}, {"front": "Who was the Chancellor of Austria assassinated by Nazis, leading to Italian troop mobilization?", "back": "Engelbert Dollfuss"}, {"front": "Butler refers to the 'mad dogs of Europe' to describe the rising tensions in which decade?", "back": "The 1930s"}, {"front": "What does Butler suggest would be the 'purely bookkeeping' result of the U.S. foreign trade and war debt?", "back": "The nation ran behind year for year because trade could have been achieved without war."}, {"front": "According to Butler, to whom is the 'cost of operations' for the war racket always transferred?", "back": "The people (who do not profit)."}, {"front": "What warning from George Washington does Butler claim the U.S. ignored when it became 'internationally minded'?", "back": "The warning about 'entangling alliances'."}, {"front": "Term: Rhetorical Question", "back": "Definition: A question asked to make a point where the answer is obvious, used by Butler to challenge assumptions."}, {"front": "In the context of the 1930s, what country's rearmament does Butler identify as an equal or greater menace to peace than Italy?", "back": "Germany (under Hitler)"}, {"front": "France increased its youth's military service term from one year to _____ months as war clouds gathered.", "back": "18"}, {"front": "Butler claims the U.S. would be 'stirred up to hate Japan' to protect private investments in the Philippines totaling less than _____.", "back": "\\200,000,000$"}, {"front": "Who were the 'very generous international bankers' financing during the Russo-Japanese War of 1904?", "back": "Japan"}, {"front": "What does Butler call the bold claims by diplomats that war is not in the making despite 40,000,000 men being under arms?", "back": "Temerity (excessive boldness)."}, {"front": "What was the pre-war yearly average profit for American Sugar Refining Company?", "back": "\\2,000,000$"}, {"front": "Butler lists meat packers, cotton manufacturers, and garment makers as examples of industries that made profits of at least _____ during the war.", "back": "$25\\%$"}, {"front": "What is the primary reason Butler believes nations acquire additional territory through victory in war?", "back": "So it can be promptly exploited by the 'selfsame few' who made money from the conflict."}, {"front": "According to Butler, the cost of the WWI debt will be paid by which generations?", "back": "The current generation, their children, and their children's children."}, {"front": "Butler uses the metaphor of '_____ and other underworld rackets' to describe the nature of war profits.", "back": "bootlegging"}, {"front": "What happened to the term of military service in France shortly before Butler wrote this pamphlet?", "back": "It was increased from one year to 18 months."}, {"front": "In 1916, American Sugar Refining Company recorded a profit of _____, three times its pre-war average.", "back": "\\6,000,000$"}, {"front": "Butler notes that the 1910-1914 average earnings of 'one of our little steel companies' was \\6,000,000$. Which company was this?", "back": "Bethlehem Steel"}, {"front": "How did Butler's perspective on war change after he retired to civil life?", "back": "He fully realized war was a racket, a suspicion he only held during his years as a soldier."}, {"front": "Which two countries agreed to stand side by side, causing Italy and Austria to make a similar agreement?", "back": "France and Russia"}, {"front": "The assassination of King Alexander of _____ in the 1930s complicated European international relations.", "back": "Jugoslavia (Yugoslavia)"}, {"front": "What was the dispute between Poland and Germany that was temporarily forgotten in the mid-1930s?", "back": "The dispute over the Polish Corridor."}, {"front": "What is the purpose of the 'Administration names a committee' mentioned by Butler at the end of Chapter 2?", "back": "To limit profits in war time."}, {"front": "Who was appointed as chairman of the committee to limit wartime profits?", "back": "A Wall Street speculator"}, {"front": "Butler asks rhetorically if 40,000,000 men under arms are being trained to be _____.", "back": "dancers"}, {"front": "What is the 'nonce' in the context of the Polish-German dispute mentioned by Butler?", "back": "The present or particular occasion (temporarily)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
