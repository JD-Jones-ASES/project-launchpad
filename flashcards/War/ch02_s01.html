    <script>

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How does Smedley Butler define a 'racket' in the context of war?", "back": "A scheme for private profit carried on under the guise of public service."}, {"front": "According to Butler, who are the only people who know what a war 'racket' is actually about?", "back": "A small 'inside' group."}, {"front": "In Butler's view, war is the only racket where profits are reckoned in dollars and losses in _____.", "back": "lives"}, {"front": "How many 'new millionaires and billionaires' were created in the United States during World War I according to tax returns?", "back": "$21,000$"}, {"front": "In the 'racket' of war, who typically shoulders the financial bill while a few exploit newly acquired territory?", "back": "The general public."}, {"front": "Butler identifies 'back-breaking taxation for generations' as a result of which consequence of war?", "back": "The 'horrible accounting' or financial bill of the conflict."}, {"front": "What group of people does Butler claim are the only ones looking ahead to war, as opposed to the general public?", "back": "Those who foment wars and remain safely at home to profit."}, {"front": "How many men were estimated to be 'under arms' globally when Butler wrote his pamphlet in 1935?", "back": "$40,000,000$"}, {"front": "According to Mussolini's quote in the text, what is the only thing that brings human energy to its 'highest tension'?", "back": "War"}, {"front": "Which European leader is described as a menace to peace due to constant demands for rearmament?", "back": "Herr Hitler (Adolf Hitler)."}, {"front": "How much did the United States spend in the Philippines over thirty-five years leading up to 1935?", "back": "$600,000,000$"}, {"front": "What was the approximate value of annual U.S. trade with China that Butler mentions as a justification for war?", "back": "$90,000,000$"}, {"front": "What was the approximate U.S. national debt in 1898 before it became 'internationally minded'?", "back": "$1,000,000,000$"}, {"front": "Following World War I, to what amount did the U.S. national debt jump?", "back": "Over $25,000,000,000$."}, {"front": "What was the total cost of U.S. participation in the World War according to Butler's 1935 estimate?", "back": "$52,000,000,000$"}, {"front": "The cost of World War I translated to approximately how many dollars for every American man, woman, and child?", "back": "$400$"}, {"front": "While normal business profits range from $6\\%$ to $12\\%$, wartime profits can reach as high as _____.", "back": "$1800\\%$"}, {"front": "What was the average yearly profit for the DuPont corporation during the pre-war period (1910–1914)?", "back": "$6,000,000$"}, {"front": "During the war years of 1914–1918, the DuPont corporation's average yearly profit jumped to _____.", "back": "$58,000,000$"}, {"front": "By what percentage did DuPont's profits increase during the war compared to their pre-war average?", "back": "More than $950\\%$"}, {"front": "What was the average yearly profit of Bethlehem Steel during the war period of 1914–1918?", "back": "$49,000,000$"}, {"front": "How did United States Steel's yearly profits change from the pre-war period to the war period?", "back": "They increased from $105,000,000$ to $240,000,000$."}, {"front": "What was the average yearly profit for Anaconda Copper during the war years (1914–1918)?", "back": "$34,000,000$"}, {"front": "Utah Copper's average yearly profits increased from $5,000,000$ pre-war to _____ during the war.", "back": "$21,000,000$"}, {"front": "Which company saw a profit increase of $1100\\%$ in 1916 compared to its pre-war average?", "back": "Central Leather Company."}, {"front": "General Chemical Company's profits leaped from $800,000$ pre-war to what amount during the war?", "back": "$12,000,000$"}, {"front": "International Nickel Company saw a profit increase of more than $1700\\%$, reaching a yearly average of _____.", "back": "$73,000,000$"}, {"front": "According to Senate Document No. 259, what range of profits did coal companies make on their capital stock during the war?", "back": "Between $100\\%$ and $7856\\%$."}, {"front": "Why were the 'millions and billions' in profits made by wartime bankers difficult for investigators to track?", "back": "They were partnerships that did not have to report to stockholders."}, {"front": "How many pairs of hobnailed service shoes did the U.S. government buy for its $4,000,000$ soldiers?", "back": "$35,000,000$"}, {"front": "Approximately how many pairs of service shoes were 'left over' and paid for after World War I ended?", "back": "$25,000,000$"}, {"front": "What piece of cavalry equipment was bought in the hundreds of thousands despite there being no American cavalry overseas?", "back": "McClellan saddles."}, {"front": "How many mosquito nets were sold to the U.S. government for soldiers in France, where there were no mosquitoes?", "back": "$20,000,000$ (plus $40,000,000$ additional yards of netting)."}, {"front": "How much money did the U.S. spend on airplane engines that never left the ground or entered battle?", "back": "$1,000,000,000$"}, {"front": "What was the manufacturing cost of a soldier's undershirt compared to the price Uncle Sam paid for it?", "back": "$14$ cents to make vs. $30$ to $40$ cents paid."}, {"front": "Butler mentions twelve dozen 48-inch wrenches were purchased; what was the only nut in existence large enough to fit them?", "back": "The nut holding the turbines at Niagara Falls."}, {"front": "How many buckboards were purchased for the use of colonels, none of which were actually used?", "back": "$6,000$"}, {"front": "What was the total value of ships built during the war period according to Butler?", "back": "More than $3,000,000,000$."}, {"front": "Of the $3 billion spent on ships, how much was spent on wooden ships that would not float?", "back": "$635,000,000$"}, {"front": "Butler estimates that of the $39 billion spent on the actual war, how much was purely profit?", "back": "$16,000,000,000$"}, {"front": "What was the primary focus of the Nye Committee (referred to as the Senate committee probe)?", "back": "The munitions industry and its wartime profits."}, {"front": "What is Butler's main criticism of the government's plan to 'limit' wartime profits?", "back": "The plan does not call for any limitation of the 'losses' (wounds/lives) of the soldiers."}, {"front": "Term: Temerity", "back": "Definition: Excessive boldness or audacity; reckless daring."}, {"front": "Who was the Chancellor of Austria whose assassination led to a hurried mobilization of Italian troops?", "back": "Engelbert Dollfuss."}, {"front": "Butler compares the war racket to which underworld activity to illustrate how costs are transferred to the people?", "back": "Bootlegging"}, {"front": "What was the average yearly profit of American Sugar Refining Company during the three years before the war?", "back": "$2,000,000$"}, {"front": "What was the favorable trade balance of the U.S. during the 25-year period mentioned by Butler?", "back": "Approximately $24,000,000,000$."}, {"front": "Butler asserts that the war was conducted for the benefit of the _____, at the expense of the _____.", "back": "very few; very many"}, {"front": "Which two nations 'cast sheep's eyes at each other' while forgetting their dispute over the Polish Corridor?", "back": "Poland and Germany."}, {"front": "According to Butler, what is the 'compensating profit' for the loss of hundreds of thousands of American lives?", "back": "The fortunes made by munitions makers, bankers, and other industrialists."}, {"front": "What is the 'open door' policy to China meant to protect, according to the text?", "back": "U.S. trade interests (about $90,000,000$ a year)."}, {"front": "What did George Washington warn against that Butler believes the U.S. ignored by going to war?", "back": "Entangling alliances."}, {"front": "Butler uses the phrase 'Hell's bells!' to react to what claim by statesmen?", "back": "That war is not in the making despite $40,000,000$ men being trained."}, {"front": "Which group of people reported profits between $100\\%$ and $7856\\%$ on their capital stock?", "back": "Coal producers."}, {"front": "Butler notes that 'not one' of which specific textile product ever actually reached France?", "back": "Mosquito nets."}, {"front": "Why are sets of soldier equipment being scrapped post-war despite having been bought at high profit?", "back": "The regulations changed the required contents."}, {"front": "Concept: 'Open Door' Policy", "back": "Example: Justifying potential war with Japan to save $90 million in trade with China."}, {"front": "Which specific industry 'doubled and tripled their earnings' according to the report on 122 of its members?", "back": "Chicago meat packers."}, {"front": "Butler compares the wartime 'patriotic' speeches to the actual outcome of 'safely pocketed' _____.", "back": "profits"}, {"front": "In 1904, which nation did U.S. international bankers finance during its war against Russia?", "back": "Japan"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
