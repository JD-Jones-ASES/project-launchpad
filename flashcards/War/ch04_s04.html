    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Chapter 3 of \"War Is a Racket,\" Butler shifts from using logos as evidence to using _____.", "back": "Pathos."}, {"front": "Which rhetorical appeal did Butler primarily use in Chapters 1 and 2 by citing corporate profit data?", "back": "Logos."}, {"front": "Why does Butler refer to veterans as \"boys\" in Chapter 3?", "back": "To emphasize their youth and vulnerability."}, {"front": "What animalistic term does Butler use to describe the housing of veterans in government hospitals?", "back": "Pens."}, {"front": "In what Indiana city is the veterans' hospital that Butler describes located?", "back": "Marion."}, {"front": "How many veterans does Butler describe as being \"in pens\" at the Marion hospital?", "back": "1,800."}, {"front": "How many veterans does Butler describe as being in barracks surrounded by steel bars and wires?", "back": "500."}, {"front": "Butler uses the emotional", "back": "Corporate earnings and profit data."}, {"front": "Term: Pathos in the Service of Logos", "back": "The use of emotional"}, {"front": "Butler writes Chapter 4 in a style that is described as short, direct, and _____.", "back": "Plain."}, {"front": "Unlike the ornate oratory of Holmes or Wilson, Butler writes like a man _____.", "back": "Giving orders."}, {"front": "Which grammatical mood does Butler use in Chapter 4 to convey his proposals?", "back": "The imperative mood."}, {"front": "What does Butler propose should happen to the officers and directors of capital and industry?", "back": "They should be conscripted."}, {"front": "Butler argues that conscripting capital would work because directors are not running any risk of _____.", "back": "Being killed."}, {"front": "How long does Butler claim it would take to smash the \"war racket\" if capital and labor were given time to \"think it over\"?", "back": "Thirty days."}, {"front": "What aspect of Butler's character supports the blunt confidence of his plain style?", "back": "His ethos as a man who has seen war from the inside."}, {"front": "What is the primary rhetorical risk of Butler's absolute certainty in his proposals?", "back": "It leaves no room for compromise or the possibility of being wrong."}, {"front": "Definition: Peroration", "back": "The closing section of a speech or argument designed to summarize points and move the audience."}, {"front": "According to classical rhetoric, what is one of the two main purposes of a peroration?", "back": "To move the audience to action or strong feeling."}, {"front": "In Chapter 5, Butler accuses Woodrow Wilson of betraying the platform of which election year?", "back": "1916."}, {"front": "How many months after his re-election did Woodrow Wilson ask Congress to declare war?", "back": "Five months."}, {"front": "What does Butler claim was the actual driver of the U.S. decision to enter WWI?", "back": "Allied debt and the financial interests of American bankers."}, {"front": "Butler characterizes the U.S. entry into WWI as a \"_____ operation\" disguised as a crusade for democracy.", "back": "Collection."}, {"front": "What specific German provocation from 1917 does Butler ignore in his explanation of the war?", "back": "The Zimmermann Telegram."}, {"front": "Butler's explanation for the war is criticized for being a \"_____-cause explanation\" that ignores historical complexity.", "back": "Single."}, {"front": "According to the text, Butler treats the presence of _____ as proof of the absence of a legitimate cause for war.", "back": "Profit."}, {"front": "What are the final four words of Butler's pamphlet?", "back": "TO HELL WITH WAR!"}, {"front": "Why does Butler's closing line carry an authority that civilian critics cannot match?", "back": "It is backed by his two Medals of Honor and decades of combat experience."}, {"front": "Which orator closes his speech with an elevated appeal to the beauty of sacrifice?", "back": "Oliver Wendell Holmes Jr."}, {"front": "In his closing, Woodrow Wilson frames the acceptance of war as a need for _____ guidance.", "back": "God's."}, {"front": "While Wilson's closing wants the audience to accept the war, Butler's closing wants them to _____.", "back": "Revolt."}, {"front": "Butler argues against war in general, whereas Wilson argues for a _____ war.", "back": "Specific."}, {"front": "What is the central tension between Butler's systemic critique and Wilson's situational justification?", "back": "Whether an individual war can be just if the war system itself is corrupt."}, {"front": "The strongest reading of Butler focuses on how _____ incentives make it easy to frame profit as a noble cause.", "back": "Financial."}, {"front": "Butler's use of the exclamation \"Oh, the looks on their faces!\" is used to break what kind of tone?", "back": "The detached tone of a policy argument."}, {"front": "In Chapter 3, Butler describes the veterans as already having been _____ destroyed.", "back": "Mentally."}, {"front": "What does the text suggest is the \"weakness\" of the confident style used in Chapter 4?", "back": "It closes the door on alternative solutions."}, {"front": "The peroration is described as the most likely part of a speech to be remembered because it is _____.", "back": "The last thing the audience hears."}, {"front": "Butler claims that American bankers lent billions to which two countries during WWI?", "back": "England and France."}, {"front": "What type of warfare conducted by Germany does Butler fail to address in Chapter 5?", "back": "Unrestricted submarine warfare."}, {"front": "How does the text describe the tone of the closing line \"TO HELL WITH WAR!\"?", "back": "Raw, angry, and final."}, {"front": "How many specific proposals for reform does Butler lay out in Chapter 4?", "back": "Three."}, {"front": "Wilson's rhetorical framework is described as making it easy to justify wars by framing them as a defense of _____.", "back": "Civilization."}, {"front": "In Chapter 3, Butler's juxtaposition of profit and human cost functions as a form of _____.", "back": "Evidence."}, {"front": "What Victorian-era style is contrasted with Butler's plain style in Chapter 4?", "back": "Victorian oratory (exemplified by Holmes)."}, {"front": "Butler's Chapter 5 turn toward anger and accusation is referred to as the _____.", "back": "Peroration."}, {"front": "Which historical figure does Butler explicitly name and challenge in Chapter 5?", "back": "Woodrow Wilson."}, {"front": "What phrase does Butler use to dismiss objections to his proposal to conscript capital?", "back": "Why shouldn't they?"}, {"front": "The text questions if Butler's emotional closing line _____ the seriousness of his detailed proposals.", "back": "Undercuts."}, {"front": "Butler's use of pathos in Chapter 3 is described as a rhetorical _____ between data and policy.", "back": "Bridge."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
