    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;

            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "How is the term 'oratory' defined within the context of Holmes' era?", "back": "The art of public speaking, especially formal and persuasive address."}, {"front": "Which 19th-century oratorical tradition is characterized by long, complex sentences and elevated diction?", "back": "The Victorian grand style."}, {"front": "What type of audience does the Victorian grand style assume?", "back": "An educated audience capable of following multiple subordinate clauses."}, {"front": "How does the text define a 'classical allusion'?", "back": "A reference to a well-known figure, event, or work from classical literature, mythology, or history."}, {"front": "Name two of the literary figures Holmes alludes to in 'The Soldier's Faith' to add authority to his argument.", "back": "Beowulf and Tennyson."}, {"front": "According to the text, how do Holmes' long, winding sentences enact the 'faith' he describes?", "back": "They require the reader to follow a path without seeing the destination immediately."}, {"front": "Which sentence structure delays its main clause until the very end to build suspense and emphasis?", "back": "The periodic sentence."}, {"front": "To what natural phenomenon does the text compare the effect of a periodic sentence?", "back": "A wave that rises and rises before finally breaking."}, {"front": "In the famous battlefield passage, what specific word does Holmes repeat to create a rhythmic pulse?", "back": "If."}, {"front": "What is the rhetorical purpose of the 'drumbeat' rhythm created by repetition in the battlefield passage?", "back": "To steadily raise the emotional stakes for the listener."}, {"front": "How does the periodic structure of the battlefield passage force the audience to mirror a soldier's experience?", "back": "It requires moving forward through uncertainty toward an unseen conclusion."}, {"front": "Which rhetorical appeal uses vivid sensory descriptions to make an audience feel an emotion like terror?", "back": "Pathos."}, {"front": "What sensory detail does Holmes use to describe the sound of bullets hitting trees?", "back": "The 'spat' of the bullets."}, {"front": "What specific physical sensation does Holmes describe to evoke the horror of the picketline at night?", "back": "Feeling one's foot slip upon a dead man's body."}, {"front": "How does the prose style change when Holmes moves from the battlefield description to his central creed?", "back": "The style shifts from baroque complexity to stark simplicity."}, {"front": "What two things does Holmes claim he does 'not know' at the beginning of his creed?", "back": "What is true and the meaning of the universe."}, {"front": "According to Holmes' creed, what is the 'one thing' he does not doubt in the midst of uncertainty?", "back": "That the soldier's faith is true and adorable."}, {"front": "How does Holmes define the soldier's faith in his central creed?", "back": "Obedience to a blindly accepted duty in a cause the soldier little understands."}, {"front": "Which adjectives does Holmes use in his creed to emphasize the soldier's lack of intellectual understanding?", "back": "Blindly, little, and no notion."}, {"front": "Why is Holmes' argument for 'blind faith' considered rhetorically powerful?", "back": "It appeals to the idea that noble acts are performed without expectation of reward."}, {"front": "What is the primary logical vulnerability of Holmes' celebration of 'blind' faith?", "back": "It can be used to justify a wicked cause as easily as a just one."}, {"front": "What rhetorical strategy does Holmes use by quoting Beowulf, Tennyson, Swinburne, and Spenser?", "back": "He claims the authority of the Western tradition of warrior culture."}, {"front": "The transition from argument to mourning at the end of the speech is called an _____.", "back": "Elegy."}, {"front": "How is an 'elegy' defined in the context of rhetoric?", "back": "A poem or speech of mourning for the dead."}, {"front": "What final image does Holmes use to shift his speech from abstract philosophy to concrete emotion?", "back": "The funeral of an old colonel in an empty church."}, {"front": "According to Holmes, what is the final part of the soldier's faith regarding their legacy?", "back": "To be content with silence after having known great things."}, {"front": "Which rhetorical appeal is based on the speaker's personal authority, rank, or reputation?", "back": "Ethos."}, {"front": "From what personal experience does Holmes derive his ethos when discussing combat?", "back": "His status as a thrice-wounded veteran."}, {"front": "How does Holmes establish 'intimate ethos' at the end of his speech?", "back": "By claiming authority through his personal grief for fallen comrades."}, {"front": "Which rhetorical appeal relies on reason, logic, and a coherent worldview?", "back": "Logos."}, {"front": "What is the fundamental 'fact of life' in Holmes' logos-based worldview?", "back": "Life is a struggle for existence."}, {"front": "In Holmes' logic, what is the only way human beings can discover their true capabilities?", "back": "Through facing danger."}, {"front": "According to the 'Caution' box, what is the difference between rhetoric and demonstration?", "back": "Rhetoric is the art of persuasion, while demonstration is the art of proving truth."}, {"front": "What critical skill does the text suggest students should develop when evaluating grand oratory?", "back": "The ability to distinguish between sound arguments and beautiful language."}, {"front": "Who is the 'contrasting voice' mentioned at the end of the chapter who also knew war but reached different conclusions?", "back": "Smedley Butler."}, {"front": "In the battlefield passage, what does Holmes call the projectile that 'burst' as it came toward the soldier?", "back": "Spherical case-shot."}, {"front": "Which specific rhetorical device is 'the art of persuasion, not the art of demonstration'?", "back": "Rhetoric."}, {"front": "What does the repetition of conditional clauses in a periodic sentence help to build?", "back": "Momentum and emotional intensity."}, {"front": "What aspect of Victorian grand style assumes an audience can handle 'multiple subordinate clauses'?", "back": "Its sentence complexity."}, {"front": "In the context of the speech, what does the 'Song of the Sword' represent?", "back": "A series of literary quotations embedding Holmes' argument in heroic tradition."}, {"front": "Why does Holmes present himself as a man 'standing in the void' during his central creed?", "back": "To strip away intellectual pretension and focus on pure will."}, {"front": "According to the text, Holmes is not just a thinker but a '_____ of language.'", "back": "Craftsman."}, {"front": "What does Holmes call the 'fragments' that go 'tearing through your company'?", "back": "Shrieking fragments."}, {"front": "In the battlefield passage, what color is the 'line of fire' that the soldier rides toward at night?", "back": "Blue."}, {"front": "The phrase 'I do not know what is true' is an example of what kind of sentence style?", "back": "Short and plain."}, {"front": "In Holmes' view, does the soldier need to understand the 'plan of campaign' to have faith?", "back": "No, he has 'no notion' of it."}, {"front": "What does the text identify as the 'heart of the speech'?", "back": "The central creed regarding the soldier's faith."}, {"front": "What is the primary effect of using pathos in descriptions of combat?", "back": "It makes the audience feel the battlefield rather than just thinking about it."}, {"front": "How does Holmes use literary allusions to position his own voice?", "back": "He speaks as the voice of a 'thousand years of warrior culture.'"}, {"front": "What 'concrete emotional weight' is given to the speech's end through the image of the old colonel?", "back": "The weight of personal remembrance and grief."}, {"front": "What does the text warn may happen when 'rolling periods' and 'literary allusions' are used effectively?", "back": "They can carry an audience past logical objections."}, {"front": "What is the relationship between 'comfort' and 'weakness' in Holmes' logos?", "back": "Comfort breeds weakness."}, {"front": "According to Holmes, the noblest acts are those performed without certainty of _____.", "back": "Success."}, {"front": "What 'tradition' is Holmes claiming authority from in the 'Song of the Sword' section?", "back": "Western civilization and heroic literature."}, {"front": "What did 19th-century society do with great speeches that elevated them to the status of essays or poems?", "back": "They were published, reprinted, and studied."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
