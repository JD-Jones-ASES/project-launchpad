<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How did Woodrow Wilson's view on the effect of war on the human soul differ from that of Holmes?", "back": "Wilson did not believe that battle ennobles the soul."}, {"front": "What term did Woodrow Wilson use to describe the decision to enter World War I?", "back": "A \"fearful thing.\""}, {"front": "According to Wilson, what German naval policy directly threatened American lives and commerce?", "back": "Unrestricted submarine warfare."}, {"front": "What was the primary objective of the Zimmermann Telegram revealed in the text?", "back": "Germany's attempt to draw Mexico into a war against the United States."}, {"front": "What larger moral claim did Wilson use to justify war beyond immediate provocations?", "back": "The autocratic governments of Central Europe threatened the survival of democracy."}, {"front": "Wilson's argument relies on a distinction between war as a general category and a _____ war fought for specific reasons.", "back": "particular"}, {"front": "What was Wilson's stance on the justice of many wars throughout history?", "back": "He admitted many were unjust, unnecessary, or fought for selfish reasons."}, {"front": "In April 1917, what specific goal did Wilson set for the American war effort?", "back": "To make the world \"safe for democracy.\""}, {"front": "According to Wilson's political argument, why is a particular war justified regarding national sovereignty?", "back": "Germany had attacked American lives and sovereignty."}, {"front": "Wilson argued that a nation does not deserve its principles if it is unwilling to _____.", "back": "fight for them"}, {"front": "Term: Window dressing (in the context of Butler's argument)", "back": "A misleading display designed to create a deceptively favorable impression of a motive."}, {"front": "According to Butler, what was the actual motive behind the U.S. entering World War I?", "back": "Economic profit."}, {"front": "Which two Allied nations had received enormous loans from American banks prior to U.S. entry into the war?", "back": "Britain and France."}, {"front": "Why did Butler believe American entry was necessary to save \"Wall Street's investment\"?", "back": "If the Allies lost the war, the loans made to them would never be repaid."}, {"front": "What kind of evidence did Butler provide to support his claim that war was motivated by profit?", "back": "Specific data and dollar figures showing corporate earnings during the war."}, {"front": "Name the four specific corporations cited by Butler as major war profiteers.", "back": "Du Pont, Bethlehem Steel, U.S. Steel, and Anaconda Copper."}, {"front": "In Butler's comparison, how much did a soldier earn per month compared to the profits of supplying companies?", "back": "Soldiers earned thirty dollars a month, while companies earned hundreds of millions."}, {"front": "According to Butler, what is the actual purpose of the lofty rhetoric used by leaders like Wilson?", "back": "To disguise the economic reality of the war."}, {"front": "Butler's political argument states that the people who lobby for war are the same ones who _____.", "back": "profit from it"}, {"front": "In Butler's view, what tool is used to convince ordinary citizens to support wars for profit?", "back": "The rhetoric of patriotism and freedom."}, {"front": "What is the central question raised by the clash between Wilson and Butler's ideologies?", "back": "Can a war be both principled and profitable?"}, {"front": "How does Wilson justify a war where some people happen to make a profit?", "back": "He argues the righteousness of the cause is independent of the financial interests aligned with it."}, {"front": "What is Butler's critique of the idea that a war's cause can be independent of financial interests?", "back": "He argues that when enormous profits are at stake, the stated cause is never truly independent of those interests."}, {"front": "In what year did Woodrow Wilson deliver his justification for entering the war?", "back": "1917."}, {"front": "In what year did Smedley Butler write his critique of the war?", "back": "1935."}, {"front": "What contextual factor complicates the comparison between Wilson and Butler's arguments?", "back": "The timing problem (Wilson spoke in real time, while Butler wrote with hindsight)."}, {"front": "Term: Hindsight", "back": "The understanding of a situation or event only after it has occurred."}, {"front": "What negative outcome of the Treaty of Versailles did Butler observe that Wilson could not have known in 1917?", "back": "It failed to produce a lasting democratic order and sowed the seeds of a second world war."}, {"front": "According to the text, why is it unfair to say Wilson's argument was wrong just because his predictions failed?", "back": "An argument can be reasonable at the time it is made even if it turns out to be wrong in its predictions."}, {"front": "What is the distinction between \"sincerity\" and \"accuracy\" regarding Wilson's wartime justifications?", "back": "Wilson may have sincerely believed his reasons even if they were not an accurate reflection of the war's outcome."}, {"front": "Wilson's political analysis asks the reader to trust _____ reasons.", "back": "stated"}, {"front": "Butler's political analysis asks the reader to trust _____ incentives.", "back": "structural"}, {"front": "According to Butler, instead of asking if a cause sounds noble, what question should be asked about a war?", "back": "Who benefits?"}, {"front": "How does a mature reader apply the methods of both Wilson and Butler?", "back": "By learning to apply both stated reasons and structural incentives rather than choosing one over the other."}, {"front": "Wilson argued that Germany's actions were a threat to American _____, beyond just physical lives.", "back": "sovereignty"}, {"front": "What was the economic status of manufacturers selling supplies to the Allies according to Butler?", "back": "They were selling goods at staggering markups."}, {"front": "Which specific metals or materials company did Butler name in his critique of war profits?", "back": "Anaconda Copper."}, {"front": "How did Wilson view the potential for American casualties in World War I?", "back": "He acknowledged openly that the war would cost American lives."}, {"front": "According to Wilson, why was the United States entering the war as an act of \"elevated\" self-defense?", "back": "Because it was a defense of principle, not just a response to provocation."}, {"front": "Butler's argument suggests that lofty language about democracy is simply a _____ for real economic motives.", "back": "cover"}, {"front": "What does the text suggest is the rhetorical power of Butler's argument?", "back": "His retrospective vantage point (the benefit of hindsight)."}, {"front": "Wilson's argument rests on the idea that a nation can act solely on _____.", "back": "principle"}, {"front": "According to Butler, the gap between Wilson's rhetoric and economic reality was the \"_____ _____.\"", "back": "whole point"}, {"front": "What was Wilson's stance on the possibility of war being ennobling?", "back": "He did not celebrate war or claim that it ennobles the soul."}, {"front": "Butler's method of following the money is described as an analysis of _____ incentives.", "back": "structural"}, {"front": "Wilson's method is described as taking _____ reasons seriously.", "back": "stated"}, {"front": "The clash between Wilson and Butler is fundamentally a disagreement about what should be _____.", "back": "trusted"}, {"front": "According to the text, Butler did not merely assert his points; he provided _____.", "back": "data"}, {"front": "Which steel company, other than U.S. Steel, did Butler name as a beneficiary of war profits?", "back": "Bethlehem Steel."}, {"front": "What did Wilson acknowledge as the cost of the \"fearful thing\" he asked Congress to authorize?", "back": "American lives."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
