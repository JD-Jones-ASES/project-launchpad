    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "While Holmes and Butler disagreed on how war affects human character, what was the primary focus of the disagreement between Wilson and Butler?", "back": "Whether a specific war is justified."}, {"front": "How did Woodrow Wilson's view of war's effect on the soul differ from the view held by Oliver Wendell Holmes?", "back": "Wilson did not claim that battle ennobles the soul, instead calling the decision for war a \"fearful thing.\""}, {"front": "Wilson acknowledged that entering the First World War would cost American lives and described the decision as a _____ thing.", "back": "fearful"}, {"front": "What was Wilson's primary defense for entering the war if he did not believe war itself was good?", "back": "He argued that the war was unavoidable."}, {"front": "Which German naval policy did Wilson cite as a direct threat to American lives and commerce?", "back": "Unrestricted submarine warfare."}, {"front": "What was the objective of the Zimmermann Telegram, according to the source material?", "back": "Germany was attempting to draw Mexico into a war against the United States."}, {"front": "Wilson argued that the survival of democracy was threatened by the _____ governments of Central Europe.", "back": "autocratic"}, {"front": "Wilson's political argument rested on a distinction between war as a general category and a _____.", "back": "particular war fought for particular reasons"}, {"front": "Did Woodrow Wilson believe that all wars throughout history were just and necessary?", "back": "No; he admitted many wars were unjust, unnecessary, or fought for selfish reasons."}, {"front": "What famous phrase did Wilson use to define the goal of the 1917 war?", "back": "To make the world \"safe for democracy.\""}, {"front": "Wilson described the American entry into WWI as a war of self-defense elevated to a war of _____.", "back": "principle"}, {"front": "According to Wilson, what is the status of a nation that refuses to fight for the principles on which it was founded?", "back": "It does not deserve those principles."}, {"front": "Butler dismissed Wilson's rhetoric about democracy as \"_____,\" intended to hide the real motive for war.", "back": "window dressing"}, {"front": "Term: Window dressing", "back": "Definition: A misleading display designed to create a deceptively favorable impression of something."}, {"front": "According to Smedley Butler, what was the actual motive behind American entry into World War I?", "back": "Economic profit."}, {"front": "American banks had loaned enormous sums to which two nations, creating a financial interest in an Allied victory?", "back": "Britain and France."}, {"front": "Why did Butler believe the U.S. entered the war to save \"Wall Street's investment\"?", "back": "If the Allies lost, the massive loans made by American banks would never be repaid."}, {"front": "What specific type of evidence did Butler use to argue that corporations lobbied for war?", "back": "Data comparing wartime profits to peacetime profits for specific companies."}, {"front": "Name one of the major corporations Butler explicitly identified as profiting from the war.", "back": "Du Pont (or Bethlehem Steel, U.S. Steel, Anaconda Copper)."}, {"front": "Butler highlighted the economic gap of the war by contrasting the millions in corporate profits with the _____ per month earned by soldiers.", "back": "$30"}, {"front": "According to Butler, what is the purpose of the rhetoric of patriotism and freedom?", "back": "To convince ordinary citizens to support a war that benefits those making a profit."}, {"front": "Wilson argued that the righteousness of a cause is _____ of the financial interests that align with it.", "back": "independent"}, {"front": "How did Butler counter Wilson's claim that a war can be both principled and profitable?", "back": "He argued that when enormous profits are at stake, the stated cause is never truly independent of those interests."}, {"front": "What is the significant difference in timing between Wilson's defense of the war and Butler's critique?", "back": "Wilson spoke in real-time (1917), while Butler wrote with eighteen years of hindsight (1935)."}, {"front": "Term: Hindsight", "back": "Definition: The understanding of a situation or event only after it has already occurred."}, {"front": "What major post-war failure did Butler know about in 1935 that Wilson could not have known in 1917?", "back": "The failure of the Treaty of Versailles to produce a lasting democratic order."}, {"front": "Why is it logically possible for Wilson to have been sincere in his 1917 argument even if he was eventually proven wrong?", "back": "Because sincerity (believing one's own justification) is not the same as accuracy (the justification being true)."}, {"front": "According to the \"caution\" section, can an argument be reasonable at the time it is made and still be wrong in its predictions?", "back": "Yes; the failure of a predicted outcome does not automatically make the initial argument unreasonable."}, {"front": "The political clash between Wilson and Butler is fundamentally a choice between trusting stated reasons or _____.", "back": "structural incentives"}, {"front": "Wilson's method of analysis asks readers to take seriously the possibility that a nation can act on _____.", "back": "principle"}, {"front": "Butler's method of analysis is colloquially summarized by the instruction to \"follow the _____.\"", "back": "money"}, {"front": "Which specific metals corporation did Butler name when listing companies that profited from WWI?", "back": "Anaconda Copper."}, {"front": "According to Wilson, what three factors justified the war against Germany?", "back": "(1) Attacks on lives/sovereignty, (2) the survival of democracy, and (3) the moral obligation to defend principles."}, {"front": "Butler argued that manufacturers sold weapons and ammunition to the Allies at \"staggering _____.\"", "back": "markups"}, {"front": "What does the text suggest a \"mature reader\" should do regarding the conflicting analytical methods of Wilson and Butler?", "back": "Learn to apply both methods rather than choosing one and ignoring the other."}, {"front": "According to Wilson, what did Germany's policy of unrestricted submarine warfare threaten besides American lives?", "back": "American commerce."}, {"front": "Butler claimed that the people who _____ for war are often the same ones who profit from it.", "back": "lobby"}, {"front": "In the context of the political clash, what does the phrase \"hindsight is twenty-twenty\" imply about Butler's argument?", "back": "It is easier for Butler to critique the war's results after the wreckage of the peace settlement is visible."}, {"front": "Wilson insisted that entering WWI was a \"fearful thing,\" meaning he did not _____ war.", "back": "celebrate"}, {"front": "What was the core difference between the \"philosophical\" clash and the \"political\" clash discussed in the text?", "back": "The philosophical clash concerned war's effect on character; the political clash concerned the justification of a specific war."}, {"front": "Butler argued that the rhetoric of patriotism was a _____ used to convince citizens to support the war.", "back": "tool"}, {"front": "According to the text, what did the Treaty of Versailles \"sow the seeds\" of?", "back": "A second world war."}, {"front": "Wilson admitted that a particular war could be justified even if the _____ that produces wars is corrupt.", "back": "system"}, {"front": "Why did Butler believe Wilson's rhetoric was intentionally designed to be noble?", "back": "To disguise the reality of the economic interests behind the war."}, {"front": "Which steel company, other than U.S. Steel, did Butler list as a war profiteer?", "back": "Bethlehem Steel."}, {"front": "The clash between Wilson and Butler raises the question of whether a war can be both _____ and _____.", "back": "principled; profitable"}, {"front": "What was Wilson's stance on the relationship between financial interest and the righteousness of a cause?", "back": "The righteousness of the cause is independent of the financial interests that might align with it."}, {"front": "How many years after Wilson's 1917 speech did Butler write his critique?", "back": "Eighteen years (1935)."}, {"front": "Butler's critique focuses on who _____, while Wilson's argument focuses on the _____ being defended.", "back": "benefits; principles"}, {"front": "Did Wilson view WWI as an act of aggression or an act of self-defense?", "back": "An act of self-defense elevated to a war of principle."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
