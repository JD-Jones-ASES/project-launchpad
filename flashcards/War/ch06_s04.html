<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What fundamental question does the rhetorical appeal of pathos address?", "back": "Pathos asks, “Why should I care?” It appeals to the audience's emotions to motivate them."}, {"front": "What is the primary emotion Holmes seeks to evoke in his audience regarding soldiers' sacrifice?", "back": "Holmes aims for “elevation,” inspiring reverence, admiration, and aspiration by making the sacrifice seem noble and transcendent."}, {"front": "Describe Holmes's \"pathos of the memorial.\"", "back": "It idealizes war by presenting it through the language of beauty, faith, and spiritual exaltation, focusing on monuments and noble sacrifice rather than the physical suffering of war."}, {"front": "What is the main risk associated with Holmes's use of pathos?", "back": "By making war beautiful and appealing to reverence, Holmes risks obscuring the physical reality and ugliness of suffering, such as shattered limbs or dysentery."}, {"front": "How does Butler's emotional appeal differ fundamentally from Holmes's?", "back": "While Holmes seeks reverence and elevation, Butler seeks “outrage” and indignation, focusing on anger at injustice rather than admiration for sacrifice."}, {"front": "What is the core emotional architecture of Butler's pathos?", "back": "Butler invites the audience to feel anger at a specific injustice: young men dying and suffering while a small class of industrialists and bankers profit from their misery."}, {"front": "According to the text, why does Butler choose anger over sadness as his primary emotional appeal?", "back": "Butler needs action (petition signing, voting, protesting), and anger tends to produce action, whereas sadness tends to produce contemplation."}, {"front": "What is the primary risk of Butler's pathos, built on outrage and indignation?", "back": "Righteous anger can oversimplify complex questions, turning them into a story of pure villainy and making nuanced understanding difficult."}, {"front": "What emotion does Wilson primarily appeal to in his rhetoric?", "back": "Wilson appeals to “duty” and moral gravity, aiming for solemn resolve by acknowledging the costs of war but insisting that duty demands action regardless."}, {"front": "Explain the \"emotional logic of the tragic hero\" as applied to Wilson's pathos.", "back": "Wilson presents entering war as a necessary burden, a choice made reluctantly because honor and justice require it, reflecting the tragic hero who does what he must despite suffering."}, {"front": "What is the main risk associated with Wilson's rhetoric of duty?", "back": "The rhetoric of duty can make war seem inevitable, potentially foreclosing the possibility that peace might still have been an option and pressuring agreement."}, {"front": "How does Remarque's emotional strategy differ from the other writers discussed?", "back": "Remarque's strategy is not a conscious appeal but a direct “showing” of raw, unmediated experience, stripping away layers of meaning without telling the reader what to feel."}, {"front": "What is the emotional effect Remarque aims to produce in the reader?", "back": "He aims for “empathic horror” – a deep, inarticulate sadness and shock from being exposed to the raw, unbearable reality of war, like being inside a nightmare."}, {"front": "What is the risk of Remarque's pathos, which relies on raw experience without argument?", "back": "Raw experience without an accompanying argument or framework can leave the reader overwhelmed and without a clear direction for response or action."}, {"front": "Define emotional manipulation in rhetoric.", "back": "Emotional manipulation occurs when a speaker uses emotional appeals to bypass the audience's rational judgment, substituting emotion for evidence or distorting facts to produce an unwarranted reaction."}, {"front": "What is the first principle for evaluating the legitimacy of an emotional appeal?", "back": "Assess whether the emotional appeal accompanies evidence, reinforcing the logic, or if it replaces evidence entirely, which should raise suspicion."}, {"front": "What is the second principle for evaluating the legitimacy of an emotional appeal?", "back": "Consider whether the emotional appeal fairly represents the situation or if it omits crucial details (like Holmes omitting the horrors of war) that might undermine the argument."}, {"front": "What is the third principle for evaluating the legitimacy of an emotional appeal?", "back": "Determine if the emotional appeal leaves room for disagreement, or if it coerces the audience by making dissent feel morally intolerable, like cowardice or treason."}, {"front": "Is all use of emotion in argument considered unfair or dishonest?", "back": "No, this is a common misunderstanding. Emotions are legitimate and necessary parts of human reasoning. The key is *how* and *whether* the emotional appeal is proportional to the evidence and illuminates a genuine truth."}, {"front": "What is the difference between emotional persuasion and emotional manipulation?", "back": "Emotional persuasion uses emotion to illuminate a genuine truth or reinforce a valid argument. Emotional manipulation uses emotion to obscure a weak argument or bypass critical thinking."}, {"front": "Compare the primary *purpose* of pathos for Holmes vs. Butler.", "back": "Holmes uses pathos to inspire admiration and aspiration towards sacrifice, aiming for reverence. Butler uses pathos to incite anger and outrage to demand political and social reform, aiming for action."}, {"front": "How do Wilson and Remarque's approaches to depicting the negative aspects of war differ in their emotional impact?", "back": "Wilson acknowledges the “fearful thing” of war but frames it within duty and solemn resolve. Remarque shows the raw, unbearable horror directly, leading to empathic shock and sadness without a prescriptive framework."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
