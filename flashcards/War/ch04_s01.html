    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "According to Butler, what was the range of profit percentages made by industries during the war?", "back": "They ranged from $20\\%to as high as1,800\\%$."}, {"front": "How did bankers manipulate Liberty Bonds to profit from the public?", "back": "They depressed prices to buy bonds back at \\84or\\86 after selling them at \\100$."}, {"front": "Approximately how many \"destroyed men\" did Butler report seeing in the eighteen government hospitals he visited?", "back": "About 50,000 men."}, {"front": "What did the chief surgeon at the Milwaukee government hospital call the 3,800 veterans under his care?", "back": "The living dead."}, {"front": "According to the chief surgeon in Milwaukee, how does the mortality rate of veterans compare to those who stayed home?", "back": "It is three times as great."}, {"front": "What psychological transition were soldiers forced to make when they were recruited from civilian life?", "back": "They were remolded to regard murder as the order of the day through mass psychology."}, {"front": "What difficulty did soldiers face when they were discharged and told to make an \"about face\" to civilian life?", "back": "They had to readjust alone without the aid of officers, mass psychology, or propaganda."}, {"front": "In the government hospital in Marion, Indiana, where were 1,800 mentally destroyed veterans housed?", "back": "In pens and barracks with steel bars and wires."}, {"front": "During the Civil War, what was the maximum bonus paid by the government or states for a soldier's enlistment?", "back": "As high as \\1,200$."}, {"front": "How did the government's approach to \"prize money\" change between the Spanish-American War and later conflicts?", "back": "The government began keeping all prize money while still conscripting the soldiers."}, {"front": "Concept: The Napoleonic system (in Butler's context)", "back": "Definition: Using medals and decorations to obtain soldiers for less money by appealing to their hunger for honors."}, {"front": "What was the primary tool used during the World War to make young men accept conscription?", "back": "Vicious propaganda that made them feel ashamed if they did not join."}, {"front": "How were clergymen involved in the war effort according to Butler?", "back": "They joined the clamor to kill, claiming that killing Germans was the will of God."}, {"front": "What ironic reality did Butler point out regarding the ammunition used in the World War?", "back": "American soldiers might be shot by bullets made by their own brothers in the U.S."}, {"front": "What was the base monthly salary for a soldier during the World War?", "back": "\\30$."}, {"front": "What portion of a soldier's monthly wage was taken to support their dependents?", "back": "Half of the wage, or \\15$."}, {"front": "How much did a soldier pay monthly for what Butler called \"accident insurance\"?", "back": "\\6$ per month."}, {"front": "After deductions for dependents and insurance, how much monthly cash did a soldier typically have left?", "back": "Less than \\9$."}, {"front": "How were soldiers \"blackjacked\" into returning their remaining pay to the government?", "back": "They were virtually forced to buy Liberty Bonds."}, {"front": "What was the total value of Liberty Bonds purchased by soldiers during the war?", "back": "About \\2,000,000,000$."}, {"front": "What does Butler identify as the only effective way to \"smash\" the war racket?", "back": "By taking the profit out of war."}, {"front": "What is Butler's first proposed reform regarding the conscription of capital and industry?", "back": "Capital, industry, and labor must be conscripted one month before the nation's manhood is conscripted."}, {"front": "What wage does Butler propose for all factory executives, bankers, and politicians during wartime?", "back": "The same \\\\30 monthly wage that the soldiers in the trenches receive."}, {"front": "According to Butler's reform, what happens if capital, industry, and labor are given thirty days to think over a $30 wage limit?", "back": "There will be no war because the profit is gone."}, {"front": "What is Butler's second proposed step to smash the war racket?", "back": "A limited plebiscite to determine whether a war should be declared."}, {"front": "In Butler's proposed plebiscite, who should be the only people eligible to vote on declaring war?", "back": "Only those who would be called upon to do the fighting and dying."}, {"front": "Why does Butler argue that a 76-year-old factory president should not vote on declaring war?", "back": "Because they would never be called upon to shoulder arms or sleep in a trench."}, {"front": "What is Butler's third proposed step to stop the war racket?", "back": "Limiting military forces to home defense purposes only."}, {"front": "To what specific distance does Butler suggest the U.S. Navy should be limited by law?", "back": "Within 200 miles of the coastline."}, {"front": "What historical event does Butler claim would have been avoided if the Navy had been limited to a 200-mile range?", "back": "The sinking of the Maine and the subsequent Spanish-American War."}, {"front": "What distance limit does Butler propose for military reconnaissance planes?", "back": "500 miles from the coast."}, {"front": "What geographic restriction does Butler propose for the U.S. Army?", "back": "The army should never leave the territorial limits of the nation."}, {"front": "On what slogan was Woodrow Wilson re-elected in 1916?", "back": "He \"kept us out of war.\""}, {"front": "How much time passed between Wilson's re-election and his request for a declaration of war?", "back": "Five months."}, {"front": "According to Butler, what was the real reason the U.S. government changed its mind and entered WWI?", "back": "To ensure that the five or six billion dollars owed to American interests by the Allies would be repaid."}, {"front": "What did the Allied commission tell President Wilson would happen to their debts if they lost the war?", "back": "They would be unable to pay back the money, and Germany would not pay it for them."}, {"front": "Butler argues that instead of worrying about foreign ideologies, the United States should focus on ____.", "back": "Preserving our own democracy."}, {"front": "Why does Butler believe that professional soldiers and sailors are against disarmament?", "back": "Disarmament means the loss of their ships, commands, and jobs."}, {"front": "Who does Butler describe as \"lurking in the background\" of disarmament conferences to ensure they fail?", "back": "The sinister agents of those who profit by war."}, {"front": "What is the true aim of powers attending disarmament conferences according to Butler?", "back": "To get more armament for themselves and less for any potential foe."}, {"front": "According to experts cited by Butler, what will be the primary weapons of the next war?", "back": "Deadly chemicals and gases."}, {"front": "Who will determine victory or defeat in future wars according to Butler's analysis?", "back": "The skill and ingenuity of scientists."}, {"front": "Butler argues that scientists could build greater prosperity if they were not tasked with ____.", "back": "Making poison gas and instruments of destruction."}, {"front": "Term: Conscript", "back": "Definition: To compel into military service by law (the draft)."}, {"front": "Term: Munificent", "back": "Definition: Extremely generous (used sarcastically by Butler to describe meager soldier pay)."}, {"front": "Term: Swivel-chair admirals", "back": "Definition: Butler's contemptuous term for naval officers who stay in Washington offices rather than at sea."}, {"front": "Term: Plebiscite", "back": "Definition: A direct vote by all eligible citizens on an important public question."}, {"front": "How does the \"Napoleon system\" explain why enlistments increased despite low pay?", "back": "It utilized the human hunger for decorations and medals to replace financial compensation."}, {"front": "What does Butler identify as the primary reason for the secrecy surrounding war negotiations?", "back": "To prevent the public from knowing that wars are often fought for the benefit of bankers and speculators."}, {"front": "What is Butler's final unadorned closing argument against the military-industrial complex?", "back": "TO HELL WITH WAR!"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
