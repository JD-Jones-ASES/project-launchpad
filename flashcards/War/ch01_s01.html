    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {

        }

        }

        /* Card */

            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);

        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;

        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;

            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {

        .fc-btn {

            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;

        }
        .fc-btn:hover {

        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {

        .fc-counter {

        .fc-tool:hover {

            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */

            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;

        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;

        @media (max-width: 768px) {

                font-size: 1rem;
                padding: 2rem 1.5rem;

<body>

    <script>
    var CARDS = [{"front": "In Holmes's opening analogy, who is playing a flute in the busy Washington Street?", "back": "A blind man."}, {"front": "According to the man quoted by Holmes, where is 'the head of the table' located?", "back": "Where Vanderbilt sits."}, {"front": "What did the man who praised Vanderbilt teach his son to be?", "back": "To be rich."}, {"front": "What does Holmes identify as the 'great power' and focus of the world's aspirations in 1895?", "back": "Commerce."}, {"front": "According to 'moralists and philosophers' following the lead of commerce, what is the status of war?", "back": "It is wicked, foolish, and soon to disappear."}, {"front": "What kind of society does Holmes claim philanthropists and 'men of fashion' long for?", "back": "One in which they may be comfortable and shine without trouble or danger."}, {"front": "Holmes suggests the hatred of the poor for the rich rests on the belief that _____ is the main thing.", "back": "money."}, {"front": "To which British soldier and military historian does Holmes compare the social standing of regular army officers?", "back": "Sir William Napier."}, {"front": "What term does Holmes use to describe the 'rootless self-seeking search' for enjoyment at the least cost?", "back": "Cosmopolitanism."}, {"front": "Holmes observes a growing 'revolt' in society against _____ in all its forms.", "back": "pain."}, {"front": "What notion is expressed by societies ranging from animal cruelty prevention to socialism?", "back": "That suffering is a wrong which can and ought to be prevented."}, {"front": "What does the 'literature of sympathy' describe as 'terrible' and 'unjust'?", "back": "That anyone should fail in the battle of life."}, {"front": "How has science affected established religion in the minds of many, according to Holmes?", "back": "It has shaken it through analysis."}, {"front": "Scientific analysis causes the world to resolve into a vast network of _____.", "back": "vibrations."}, {"front": "Into what does the 'rainbow flush of cathedral windows' fade when analyzed by science?", "back": "The pale irony of the void."}, {"front": "What do the 'hardly silenced cannon of the East' proclaim as the 'portion of man'?", "back": "Combat and pain."}, {"front": "What does Holmes identify as the 'order of the world' at which it is vain to repine?", "back": "The struggle for life."}, {"front": "In a hypothetical future, what 'stage' might science reach to take total control of life?", "back": "The dogmatic stage."}, {"front": "According to Holmes, what is man's 'destiny' as long as he dwells upon the globe?", "back": "Battle."}, {"front": "What does Holmes say is the proper 'book for the army'?", "back": "A war song."}, {"front": "What does Holmes believe it is 'not well for soldiers to think much about'?", "back": "Wounds."}, {"front": "Instead of worrying about wounds, what should a soldier fix their eyes upon?", "back": "The point to be stormed."}, {"front": "From what source were the 'ideals of the past' for men traditionally drawn?", "back": "War."}, {"front": "On what specific choice is the title of 'gentleman' built?", "back": "The soldier's choice of honor rather than life."}, {"front": "What does Holmes call the 'divine folly' that a worthy world cannot endure to be without?", "back": "Honor."}, {"front": "According to Holmes, what is the 'essence' of ideals?", "back": "That they can never be achieved."}, {"front": "Does Holmes claim to know the meaning of the universe or what is true?", "back": "He claims he does not know."}, {"front": "What 'faith' does Holmes describe as 'true and adorable'?", "back": "The willingness of a soldier to throw away his life in obedience to a blindly accepted duty."}, {"front": "What force assails men of common sense in times of stress in battle?", "back": "Cynic force."}, {"front": "What 'tramples' the thoughts of common sense in a soldier's greatest moments?", "back": "Faith."}, {"front": "To what local Boston street does Holmes compare the slope where the enemy brought guns to bear?", "back": "Beacon Street."}, {"front": "What type of artillery ammunition does Holmes describe as 'shrieking fragments' tearing through companies?", "back": "Spherical case-shot."}, {"front": "At which Civil War battle site did Holmes ride toward a 'blue line of fire' at a 'dead angle'?", "back": "Spotsylvania."}, {"front": "What sensory detail does Holmes use to describe bullets hitting mud and earth?", "back": "Splashing."}, {"front": "What does Holmes describe as the 'unspeakable somewhat' in man?", "back": "That which makes him capable of miracle and able to face annihilation for a belief."}, {"front": "To what group of people, including himself, does life seem 'hung about by dark mists'?", "back": "Children of the North."}, {"front": "Which ancient warrior does Holmes quote regarding the gain of honor before death?", "back": "Beowulf."}, {"front": "What phrase does Tennyson's Merlin use to represent the light one must follow?", "back": "The Gleam."}, {"front": "What imagery of a revolutionary soldier caused Holmes to believe soldiers were all old men?", "back": "A white-haired man with his flintlock slung across his back."}, {"front": "According to Holmes, war is the 'business' of which age groups?", "back": "Youth and early middle age."}, {"front": "In the 'Song of the Sword,' the sword is described as the 'Father of _____.'", "back": "Honor."}, {"front": "In the 'Song of the Sword,' what is the sword's relationship with victory?", "back": "A marriage."}, {"front": "How does the 'Song of the Sword' describe the act of dying in war?", "back": "Making death beautiful."}, {"front": "The 'Song of the Sword' calls the sword the '_____ of God.'", "back": "Will."}, {"front": "What is Holmes's view of war while one is actually 'at it'?", "back": "It is horrible and dull."}, {"front": "When does the 'divine' message of war become visible according to Holmes?", "back": "Only after time has passed."}, {"front": "What does Holmes call the 'snug, oversafe corner of the world'?", "back": "Modern comfortable routine."}, {"front": "What does 'high and dangerous action' teach us to believe as right beyond dispute?", "back": "Things for which our doubting minds are slow to find words of proof."}, {"front": "Which specific German university students inspire Holmes with 'sincere respect'?", "back": "The students at Heidelberg."}, {"front": "What physical mark on Heidelberg students does Holmes consider an honor?", "back": "Sword-slashed faces."}, {"front": "Why does Holmes regard a broken neck in 'rough riding' as a price well paid?", "back": "It breeds a race fit for headship and command."}, {"front": "What does Holmes lament that his country fails to save?", "back": "Its traditions."}, {"front": "What does Holmes define as 'the joy of life'?", "back": "Living and putting out all one's powers as far as they will go."}, {"front": "How does Holmes define the 'measure of power'?", "back": "Obstacles overcome."}, {"front": "Instead of comfort, what does Holmes suggest one should pray for?", "back": "Combat."}, {"front": "What is 'more besetting and harder to overcome' than misgivings on the battlefield?", "back": "The doubts of civil life."}, {"front": "According to Holmes, when should duty be 'obeyed unquestioning'?", "back": "In the evil day."}, {"front": "Who does Holmes identify as a person's 'final judge and only rival'?", "back": "Oneself."}, {"front": "What is the 'incommunicable experience' shared by Holmes and his audience?", "back": "War."}, {"front": "Which specific regiment did Holmes serve in during the Civil War?", "back": "The Twentieth Massachusetts."}, {"front": "Who gave the Twentieth Massachusetts 'its soul'?", "back": "Its old colonel."}, {"front": "What was the colonel's command that ensured no man could falter?", "back": "'Forward, Twentieth!'"}, {"front": "To what does Holmes compare the choir-boys at the colonel's funeral?", "back": "A flight of careless doves."}, {"front": "What 'skeleton' remained of the Twentieth Massachusetts by the time of the colonel's funeral?", "back": "A few gray heads and a memory."}, {"front": "What is the soldier's faith regarding having known 'great things'?", "back": "To be content with silence."}, {"front": "In the song from the Danube, what does the soldier ask the wind from his grave?", "back": "If the banner still fluttered."}, {"front": "In the Danube song, why does the wind say the comrades have borne the banner hence?", "back": "In triumph."}, {"front": "What is the buried soldier's response when told the banner won?", "back": "'I am content.'"}, {"front": "What do the lovers in the Danube song say to the dead soldier?", "back": "That they remember him not."}, {"front": "What is the buried soldier's response to being forgotten by the lovers?", "back": "'I am content.'"}, {"front": "Holmes uses the term 'stall-fed' to describe modern English _____.", "back": "poetry."}, {"front": "What does 'high and dangerous action' produce, according to Holmes?", "back": "Faith in the worth of heroism."}, {"front": "Holmes compares the aspirations of his time to those of _____.", "back": "commerce."}, {"front": "What is 'the faith' of the soldier who dies in a cause he does not understand?", "back": "True and adorable."}, {"front": "What term does Holmes use to describe the thoughts of common sense in battle?", "back": "Cynic force."}, {"front": "According to Holmes, what has science pursued until the world resolves into vibrations?", "back": "Analysis."}, {"front": "What does Holmes call the 'tempestuous untamed streaming of the world'?", "back": "The reality outside of our snug corner."}, {"front": "Who are the 'vultures' mentioned at the end of the address?", "back": "The scavengers of the battlefield now buried with their prey."}, {"front": "Where must any 'glory' remaining for the old veterans now be won?", "back": "In the council or the closet."}, {"front": "What does Holmes claim he and his veterans felt 'to its top'?", "back": "The passion of life."}, {"front": "The 'Song of the Sword' describes the sword as the '_____-smith.'", "back": "fame."}, {"front": "According to the Song of the Sword, life is a coin to be staked in a _____.", "back": "pastime."}, {"front": "What does Holmes say we are trying to 'steal' if we claim to be gentlemen without sacrifice?", "back": "The good will of the place."}, {"front": "What does Holmes describe as 'wallowing ease'?", "back": "The temptations of civil life."}, {"front": "What 'illusions' does Holmes say he shared regarding the age of soldiers?", "back": "That they were all old men."}, {"front": "What does Holmes call 'French and American humor' in literature?", "back": "Individualist negations."}, {"front": "According to Holmes, what does the literature of 'American humor' deny?", "back": "That anything is worthy of reverence."}, {"front": "What does high and dangerous action teach us that buffoons _____.", "back": "forget."}, {"front": "What does Holmes mean by 'faith' in a soldier's context?", "back": "Facing annihilation for a blind belief."}, {"front": "In the 'Song of the Sword,' the sword is called the 'Arch-_____.'", "back": "anarch."}, {"front": "What does the 'War-Thing' identify as its Lord?", "back": "The Lord God."}, {"front": "What did the old colonel do for the regiment?", "back": "He gave it its soul."}, {"front": "What does Holmes say regarding the 'truth'?", "back": "He does not know what is true."}, {"front": "How does Holmes describe the 'meaning of the universe'?", "back": "He does not know it."}, {"front": "In the context of the speech, what is a 'hospital sketch' contrasted with?", "back": "A war song."}, {"front": "What does 'cosmopolitanism' represent to Holmes?", "back": "A rootless search for enjoyment at the least cost."}, {"front": "To what does Holmes compare the 'rainbow flush of cathedral windows'?", "back": "The very smile of God."}, {"front": "What does the 'Song of the Sword' describe as its 'marriage'?", "back": "Victory."}, {"front": "What 'creeds' does Holmes refer to as being in 'collapse'?", "back": "Established religions shaken by science."}, {"front": "In the poem about country, what is 'brutish' not to understand?", "back": "How much we owe to our country."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
