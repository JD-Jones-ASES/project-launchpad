<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Oliver Wendell Holmes Jr. deliver \"The Soldier's Faith\"?", "back": "1895"}, {"front": "How many years had passed between the end of the Civil War and Holmes's 1895 speech?", "back": "Thirty years"}, {"front": "What event marked the official end of the American Civil War as mentioned in the text?", "back": "Robert E. Lee's surrender at Appomattox Courthouse"}, {"front": "What was the original name for the holiday now known as Memorial Day?", "back": "Decoration Day"}, {"front": "In the years immediately following the Civil War, what was the primary purpose of Decoration Day?", "back": "To honor the Union dead by decorating their graves with flowers"}, {"front": "Which veterans' organization was responsible for organizing Memorial Day ceremonies throughout the country in the 1890s?", "back": "The Grand Army of the Republic"}, {"front": "What was the specific setting for the delivery of \"The Soldier's Faith\" on May 30, 1895?", "back": "A Memorial Day gathering organized by the Harvard graduating class"}, {"front": "Who were the primary groups included in Holmes's audience at Harvard?", "back": "Students, faculty, Boston civic leaders, and Civil War veterans"}, {"front": "How did Holmes physically represent his own experience in the Civil War during the speech?", "back": "He carried the scars of battle beneath his formal dress"}, {"front": "What was the status of the United States economy by the year 1895?", "back": "It was the world's largest industrial economy"}, {"front": "According to the text, which three industries primarily remade the American landscape in the late 19th century?", "back": "Steel mills, railroads, and factories"}, {"front": "Which three wealthy industrialists does Holmes invoke in his speech?", "back": "Andrew Carnegie, John D. Rockefeller, and Cornelius Vanderbilt"}, {"front": "How did Holmes characterize the shift in national aspirations during the Gilded Age?", "back": "A shift from honor to profit and from duty to comfort"}, {"front": "Why was Holmes troubled by the prosperity of the young men in his audience?", "back": "He feared they would never experience the essential capacity for sacrifice"}, {"front": "What is the central argument of \"The Soldier's Faith\" regarding the virtues of war?", "back": "The virtues cultivated by war are indispensable to a healthy civilization"}, {"front": "Name one of the three specific virtues Holmes believed the living needed to adopt from the dead.", "back": "Courage (or faith, or the willingness to act without guarantees)"}, {"front": "Term: Periodic sentence", "back": "A sentence where the main idea is not completed until the very end"}, {"front": "What is the rhetorical effect of using periodic sentences in a speech?", "back": "It creates suspense and emphasis as subordinate clauses build toward a resolution"}, {"front": "Holmes's prose style is described as stacking clause upon clause to create the force of a _____.", "back": "Wave breaking on shore"}, {"front": "According to some critics, Holmes sounded like a prophet calling the nation back to its _____.", "back": "Highest ideals"}, {"front": "What was the negative interpretation of Holmes's speech by some listeners?", "back": "He was romanticizing the horror of war as a source of moral instruction"}, {"front": "By the 1890s, the generation that knew the sound of cannon was being replaced by a generation that knew the sound of _____.", "back": "Commerce"}, {"front": "What was the traditional focus of the annual Memorial Day address at Harvard?", "back": "The meaning of the war and the obligations of the living to the dead"}, {"front": "How does the text describe the physical condition of the Civil War veterans by 1895?", "back": "Their ranks were thinning as they reached middle and old age"}, {"front": "In Holmes's view, what is the danger of a society devoted entirely to material comfort?", "back": "It loses the willingness to risk everything for something larger than oneself"}, {"front": "What does Holmes mean by \"acting without guarantees\"?", "back": "Having the faith and courage to take risks despite uncertain outcomes"}, {"front": "How does the text define the \"Gilded Age\" in terms of national transformation?", "back": "The transition of a war-torn nation into the world's leading industrial power"}, {"front": "True or False: Holmes's speech was intended solely as a nostalgic tribute to his fallen comrades.", "back": "False"}, {"front": "What specific group of Harvard students organized the event where Holmes spoke?", "back": "The graduating class"}, {"front": "What did the Illustration from \"Stories of the Civil War\" (1890) depict?", "back": "Veterans and civilians gathering at a soldier's grave for a Memorial Day ceremony"}, {"front": "How did the audience's professional prospects influence Holmes's message?", "back": "Since most would enter professions like law or business, he worried they would never face the test of battle"}, {"front": "What role did steel mills play in the 1895 context of the speech?", "back": "They were part of the industrial expansion that remade the American landscape"}, {"front": "The phrase \"shot fired in anger\" refers to what experience that Holmes's audience lacked?", "back": "Combat or direct experience of war"}, {"front": "How does a periodic sentence build toward an emotional climax?", "back": "By delaying the main point until multiple subordinate clauses have built suspense"}, {"front": "What does the text suggest is the \"truth\" regarding the two conflicting readings of Holmes's speech?", "back": "Both readings—as a call to ideals and as a romanticization of war—have merit"}, {"front": "Which specific day of the year was Holmes's address delivered?", "back": "May 30"}, {"front": "What does the text identify as the \"obligations of the living\" in the context of Harvard's Memorial Day tradition?", "back": "The duties owed by the survivors to those who died in the war"}, {"front": "According to Holmes, what is essential for a \"healthy civilization\"?", "back": "The cultivation of virtues typically associated with military service"}, {"front": "The America of 1895 is described as being transformed from a nation \"torn itself apart\" to one characterized by _____.", "back": "Staggering fortunes and industrial power"}, {"front": "What literary style is characterized by long, rolling sentences that delay the main idea?", "back": "The periodic sentence"}, {"front": "Why is \"The Soldier's Faith\" considered a \"carefully constructed case\" rather than just a memoir?", "back": "Because it argues that specific virtues are necessary for the survival of civilization"}, {"front": "What was the significance of the year 1895 in relation to the average veteran's age?", "back": "It was long enough after the war that veterans were becoming old and fewer in number"}, {"front": "What specific landscape changes were mentioned as results of the industrial economy?", "back": "The emergence of steel mills, railroads, and factories"}, {"front": "What kind of listener would view Holmes as a \"prophet\"?", "back": "One who felt the nation had become complacent and lost its highest ideals"}, {"front": "In the context of the speech, what does \"sound of commerce\" symbolize?", "back": "A generation focused on business, profit, and material gain"}, {"front": "In the context of the speech, what does \"sound of cannon\" symbolize?", "back": "The generation that experienced the sacrifice and duty of the Civil War"}, {"front": "What does the phrase \"prosperous and secure\" describe in the text?", "back": "The general state of the Harvard audience Holmes addressed in 1895"}, {"front": "What is the primary objective of a learner reading \"The Soldier's Faith\" according to the text's conclusion?", "back": "To decide for themselves which interpretation of Holmes's argument is closer to the truth"}, {"front": "Who usually delivered the annual address at Harvard for Memorial Day?", "back": "A distinguished speaker, often a veteran"}, {"front": "What did Holmes believe was being sacrificed in the pursuit of \"material comfort\"?", "back": "The willingness to risk everything for something larger than oneself"}, {"front": "How did the 1890s version of Memorial Day differ from its post-war origins?", "back": "It had evolved from a simple grave-decorating day into a national occasion for parades and public speeches"}, {"front": "What was the primary goal of the Grand Army of the Republic in the 1890s?", "back": "Organizing Memorial Day ceremonies throughout the country"}, {"front": "What does the text imply about the relationship between Holmes's clothing and his history?", "back": "His formal dress hid the physical evidence of his military service"}, {"front": "According to the text, Holmes is not merely remembering the dead, but telling the living they _____.", "back": "Need what the dead had"}, {"front": "Which term describes the nation's economic state during the time of Holmes's speech?", "back": "Industrial economy"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
