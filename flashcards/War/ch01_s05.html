<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Oliver Wendell Holmes Jr. deliver his speech titled \"The Soldier's Faith\"?", "back": "1895"}, {"front": "How many years had passed between the end of the Civil War and Holmes' 1895 address?", "back": "Thirty years"}, {"front": "What was the original name of Memorial Day?", "back": "Decoration Day"}, {"front": "What was the primary purpose of Decoration Day when it first began?", "back": "To honor the Union dead by decorating their graves with flowers."}, {"front": "Which veterans' organization was primarily responsible for organizing Memorial Day ceremonies in the 1890s?", "back": "The Grand Army of the Republic"}, {"front": "Who organized the Memorial Day gathering at Harvard where Holmes delivered his speech?", "back": "The Harvard graduating class"}, {"front": "Who comprised the audience for \"The Soldier's Faith\" besides Harvard students and faculty?", "back": "Boston civic leaders and surviving Civil War veterans."}, {"front": "How did the national economy of 1895 compare to the rest of the world?", "back": "It was the world's largest industrial economy."}, {"front": "Name three major industries that transformed the American landscape by 1895.", "back": "Steel mills, railroads, and factories."}, {"front": "Which three industrial titans did Holmes specifically invoke in his speech?", "back": "Andrew Carnegie, John D. Rockefeller, and Cornelius Vanderbilt."}, {"front": "According to Holmes, what had the nation's aspirations shifted from and toward by the 1890s?", "back": "From honor and duty toward profit and comfort."}, {"front": "Why was Holmes troubled by the prosperity of the young men in his audience?", "back": "He feared a society devoted to comfort would lose its capacity for sacrifice."}, {"front": "What is the central argument of \"The Soldier's Faith\" regarding the virtues of war?", "back": "The virtues cultivated by war are indispensable to a healthy civilization."}, {"front": "According to Holmes, what specific quality is necessary for the living to possess, as the dead once did?", "back": "The willingness to act without guarantees."}, {"front": "What critique was leveled against Holmes by those who found his speech controversial?", "back": "He was accused of romanticizing the horror of war."}, {"front": "Term: Periodic sentence", "back": "Definition: A sentence structure where the main idea is not completed until the very end."}, {"front": "What is the intended rhetorical effect of using periodic sentences in a speech?", "back": "To create suspense and emphasis by stacking subordinate clauses before a final resolution."}, {"front": "The generation of 1895 was described as knowing only the sound of _____, rather than the sound of cannon.", "back": "Commerce"}, {"front": "At Harvard, what was the typical focus of the annual Memorial Day address?", "back": "The meaning of the war and the obligations of the living to the dead."}, {"front": "In what way did Holmes himself resemble the Civil War veterans in his audience?", "back": "He carried the physical scars of battle beneath his formal dress."}, {"front": "What era of American history is characterized by the rise of steel mills and massive fortunes like Rockefeller's?", "back": "The Gilded Age"}, {"front": "How does the text describe the physical condition of Civil War veterans in 1895?", "back": "They were middle-aged or old, with thinning ranks."}, {"front": "What did Holmes believe was the danger of a society focused entirely on material comfort?", "back": "The loss of the willingness to risk everything for something larger than oneself."}, {"front": "Beyond a nostalgic tribute, \"The Soldier's Faith\" is described as a carefully constructed _____.", "back": "Argument"}, {"front": "How does the periodic sentence structure relate to the listener's experience of Holmes' speech?", "back": "It makes the speech an experience rather than just an argument by building toward emotional climaxes."}, {"front": "Where did Robert E. Lee surrender to end the Civil War?", "back": "Appomattox Courthouse"}, {"front": "By the 1890s, Memorial Day had transformed from a local grave-decorating ritual into a _____.", "back": "National occasion for speeches, parades, and public remembrance."}, {"front": "What did Holmes hope to challenge by addressing the prosperous young men of Harvard?", "back": "A world that prioritized security and material success over higher ideals."}, {"front": "In the context of the speech, what does it mean to act \"without guarantees\"?", "back": "To have faith and courage in the face of uncertainty and risk."}, {"front": "What metaphor is used to describe the resolution of a periodic sentence in Holmes' writing?", "back": "A wave breaking on shore."}, {"front": "Identify the industrial leader associated with the development of railroads in the text.", "back": "Cornelius Vanderbilt"}, {"front": "According to the text, what was the primary occupation many of the young men in Holmes' audience would enter?", "back": "Business, law, or the professions."}, {"front": "What was the status of the veterans' presence in society by the year 1895?", "back": "Their ranks were thinning as they were replaced by a new generation."}, {"front": "What did Holmes consider to be the essential \"faith\" of the soldier?", "back": "The capacity for sacrifice and devotion to duty without the promise of comfort."}, {"front": "How did the 1890s version of Memorial Day ceremonies differ from the earliest post-war years?", "back": "They became large-scale national events organized by groups like the Grand Army of the Republic."}, {"front": "The America of 1895 is described as a nation _____ compared to its state during the Civil War.", "back": "Transformed"}, {"front": "What specific professional background did the annual Memorial Day speaker at Harvard usually possess?", "back": "They were often a veteran of the war."}, {"front": "Which specific virtue did Holmes believe was cultivated by war and needed by a healthy civilization?", "back": "Courage"}, {"front": "What tension exists in the interpretation of \"The Soldier's Faith\" today?", "back": "The choice between seeing it as a prophetic call to ideals or a romanticization of war's horror."}, {"front": "Concept: Periodic sentence resolution", "back": "The main point is delayed by stacking clause upon clause to create force and emphasis."}, {"front": "What did the \"generation that knew only the sound of commerce\" lack, according to Holmes?", "back": "The experience of hearing a shot fired in anger."}, {"front": "What did Holmes see as the ultimate cost of prioritizing comfort over duty?", "back": "The loss of the capacity for individual sacrifice for a greater cause."}, {"front": "What role did the Harvard graduating class play in Holmes' 1895 speech?", "back": "They organized the Memorial Day gathering at which he spoke."}, {"front": "Why was the 30-year anniversary of the war's end significant to the context of the speech?", "back": "It marked the transition of leadership from the war generation to a new, industrial generation."}, {"front": "In a periodic sentence, where must the user look to find the completed main idea?", "back": "At the very end of the sentence."}, {"front": "Which industry is specifically linked to the \"remaking of the landscape\" alongside railroads and factories?", "back": "Steel mills"}, {"front": "The speaker, Oliver Wendell Holmes Jr., held what personal connection to the Civil War?", "back": "He was a veteran who had fought in the war and carried its scars."}, {"front": "What aspect of the 1895 audience's lifestyle did Holmes aim to challenge?", "back": "Their prosperous and secure existence based on material profit."}, {"front": "How did Holmes characterize the \"living\" in relation to the \"dead\" in his speech?", "back": "He argued that the living needed the virtues that the dead had demonstrated."}, {"front": "What is the primary rhetorical goal of the \"rolling sentences\" used by Holmes?", "back": "To build toward emotional climaxes."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
