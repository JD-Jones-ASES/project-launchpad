    <style>
        .fc-container {

        .fc-btn:hover {

<body>
    <header class="hero-section" style="padding: 2rem 0;">

    <script>
    var CARDS = [{"front": "What is the primary objective of Smedley Butler's three policy proposals?", "back": "To dismantle the specific mechanisms by which he believes war is perpetuated."}, {"front": "According to Butler's 'Conscript Capital' proposal, what must occur before any young man is drafted into military service?", "back": "The government must conscript the nation's capital, industry, and labor."}, {"front": "What specific monthly income limit does Butler propose for all citizens during wartime?", "back": "Thirty dollars per month."}, {"front": "Which groups of people would be subject to the thirty-dollar monthly income cap under Butler's first proposal?", "back": "Everyone, including corporate executives, bankers, generals, and politicians."}, {"front": "What evidence does Butler cite regarding corporate profits during World War I to justify conscripting capital?", "back": "Profits rose by hundreds or thousands of percent while soldiers earned only thirty dollars a month."}, {"front": "What is the core reasoning behind Butler's proposal to eliminate the profit motive in war?", "back": "If no one can profit from war, the financial incentive and pressure to lobby for it will disappear."}, {"front": "What is the central assumption underlying Butler's 'Conscript Capital' proposal?", "back": "War is primarily caused by the profit motive."}, {"front": "Why is 'Conscript Capital' considered Butler's most radical proposal?", "back": "It attempts to make war completely unprofitable by capping all wartime income at a soldier's pay level."}, {"front": "What 'rough justice' logic does Butler use to defend capping executive pay during war?", "back": "The men who send others to die should share the same economic sacrifice as those fighting."}, {"front": "What economic objection do critics raise against capping all wages at thirty dollars during a war?", "back": "A modern industrial economy might fail to produce necessary supplies without financial incentives."}, {"front": "How does the aggression of Nazi Germany in World War II challenge Butler’s assumption about the cause of war?", "back": "It suggests some wars are driven by genuine external threats rather than manufactured by profiteers."}, {"front": "Term: Feasibility", "back": "Definition: Whether a proposed plan can actually be carried out in practice given real-world political, economic, or constitutional constraints."}, {"front": "What does Butler’s 'Limited Plebiscite' proposal suggest regarding the decision to go to war?", "back": "The decision should be made by a direct vote of those who will actually fight."}, {"front": "Who specifically would be eligible to vote in Butler's proposed war plebiscite?", "back": "Young men of military age who are physically fit for service."}, {"front": "What is the democratic principle behind Butler's plebiscite proposal?", "back": "Those who bear the direct consequences of a decision should be the ones who make it."}, {"front": "What historical evidence does Butler use to support the need for a plebiscite?", "back": "Four million American men were sent to World War I by Congress without their own consent."}, {"front": "What is the underlying assumption regarding how young men would vote in a plebiscite?", "back": "They will vote against war in most cases, thereby preventing unnecessary conflicts."}, {"front": "What historical precedents does Butler cite for restricting the right to vote to a specific group?", "back": "Literacy tests and property requirements."}, {"front": "What constitutional obstacle exists for Butler’s plebiscite proposal?", "back": "Article I, Section 8 of the Constitution grants the power to declare war to Congress, not the people."}, {"front": "What legal action would be required to implement a national plebiscite for declaring war?", "back": "A constitutional amendment."}, {"front": "What practical concern regarding the speed of modern warfare is raised against the plebiscite proposal?", "back": "A national vote might be too slow to respond to a sudden surprise attack."}, {"front": "How do the events of 1917 and 1941 challenge the assumption that young men will always vote against war?", "back": "History shows that in those years, many young Americans were eager or universally supportive of entering combat."}, {"front": "In terms of military scope, what does Butler's plebiscite proposal *not* address?", "back": "How to conduct a war of self-defense once it has already been triggered by an attack."}, {"front": "According to Proposal 3, what legal limit should be placed on the operation of American naval vessels?", "back": "They should be restricted to operating within two hundred miles of the coastline."}, {"front": "What geographic restriction does Butler propose for the United States Army?", "back": "The army should never leave American territory."}, {"front": "What is the proposed operational limit for American military aircraft in Butler's 'Defense Only' plan?", "back": "Five hundred miles from the coastline."}, {"front": "What historical event involving the U.S.S. Maine does Butler use to justify restricting naval movement?", "back": "The ship's presence in Havana Harbor triggered the Spanish-American War after it exploded."}, {"front": "What is the reasoning behind restricting the military to a narrow defensive perimeter?", "back": "A nation without the ability to project force beyond its borders cannot physically start an offensive war."}, {"front": "What is the central assumption of Butler’s 'Defense Only' proposal regarding national security?", "back": "American security can be maintained without the ability to project military power abroad."}, {"front": "Why does Butler believe all American military interventions beyond the homeland are unnecessary?", "back": "He believes such interventions serve corporate interests rather than genuine national security."}, {"front": "How did Woodrow Wilson’s argument regarding submarine warfare contrast with Butler's 'Defense Only' view?", "back": "Wilson argued that threats to American lives and commerce can originate far from U.S. shores."}, {"front": "According to Wilson, what is the moral implication of a nation remaining neutral in the face of distant aggression?", "back": "Neutrality in the face of aggression is not peace; it is complicity."}, {"front": "In Butler's view, what is the likely purpose of any military operation conducted far from home?", "back": "It is likely serving a 'racket' or corporate interests."}, {"front": "What is the 'core disagreement' between Butler and Wilson regarding American security?", "back": "Whether security is best served by staying home (Butler) or by engaging with the world (Wilson)."}, {"front": "What is a potential danger of Butler's defensive limitations if a threat originates far from American shores?", "back": "The nation would be unable to respond until the threat arrived at its own doorstep."}, {"front": "How do Butler’s three proposals function together as an interlocking system?", "back": "They simultaneously attack the motive, the decision-making process, and the physical capability for war."}, {"front": "In Butler's system, which proposal is designed to remove the *motive* for war?", "back": "Proposal 1: Conscript Capital."}, {"front": "In Butler's system, which proposal is designed to transfer the *decision* to go to war?", "back": "Proposal 2: A Limited Plebiscite."}, {"front": "In Butler's system, which proposal is designed to remove the *capability* for offensive war?", "back": "Proposal 3: Defense Only."}, {"front": "Term: Policy Proposal", "back": "Definition: A specific plan of action recommended to address a public problem, detailing exactly what should be done, by whom, and how."}, {"front": "What is considered the primary 'strength' of Butler's anti-war arguments?", "back": "Their specificity in identifying and proposing concrete steps to dismantle the mechanisms of profit."}, {"front": "What is identified as the primary 'weakness' or vulnerability in Butler’s overall framework?", "back": "The rigid assumption that all war is a racket, which ignores potentially necessary or defensive wars."}, {"front": "Which three American wars do historians often cite as candidates for being 'necessary' rather than a 'racket'?", "back": "The Revolution, the Civil War, and World War II."}, {"front": "According to the text, a policy proposal must be evaluated not just on moral grounds, but also on its _____.", "back": "feasibility"}, {"front": "Butler argues that naval maneuvers thousands of miles from home are _____ rather than defensive.", "back": "provocative"}, {"front": "In Butler's logic, if everyone earns the same as a soldier, those who 'beat the drums for war' would _____.", "back": "think twice"}, {"front": "Why does the text mention Butler’s reference to literacy tests as 'uncomfortable'?", "back": "Because those restrictions were historically used to disenfranchise African Americans and poor whites."}, {"front": "Butler believes that restricting the military to home defense removes the _____ for aggression.", "back": "physical capability"}, {"front": "What is the year of the publication of *War Is a Racket*?", "back": "1935"}, {"front": "The U.S. Constitution's grant of war-declaring power to Congress is found in _____.", "back": "Article I, Section 8"}, {"front": "According to Butler, what was the pay of a soldier during World War I?", "back": "Thirty dollars a month (half of which was deducted)."}, {"front": "In Butler's view, who currently makes the decision for war instead of those who fight?", "back": "Congress."}, {"front": "Butler's Proposal 3 assumes that no legitimate American interest extends beyond _____ of the coastline.", "back": "two hundred miles"}, {"front": "What does Wilson consider a duty that might require the projection of national power?", "back": "Defending the principles of democratic civilization."}, {"front": "What is the risk of a 'blanket system' like Butler's according to the concluding paragraph?", "back": "It may be too rigid and prevent the wars that should be fought for legitimate reasons."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
