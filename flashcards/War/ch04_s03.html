    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is the overarching goal of Smedley Butler's three policy proposals?", "back": "Butler's proposals aim to dismantle the mechanisms by which he believes war is perpetuated, particularly focusing on the profit motive."}, {"front": "List Smedley Butler's three main policy recommendations for preventing war.", "back": "1. Conscript Capital; 2. A Limited Plebiscite; 3. Restrict the Military to Home Defense (Defense Only)."}, {"front": "What foundational assumption underpins all of Smedley Butler's proposals?", "back": "The assumption that war is always a racket, primarily driven by private profit rather than genuine threats or national security concerns."}, {"front": "Explain Butler's 'Conscript Capital' proposal.", "back": "Before drafting men, the government must conscript the nation's capital, industry, and labor, limiting all incomes (including corporate executives and generals) to thirty dollars per month during wartime."}, {"front": "What evidence did Butler use to support 'Conscript Capital'?", "back": "Corporate profits rose by hundreds or thousands of percent during World War I, while soldiers earned thirty dollars a month, half of which was deducted."}, {"front": "What is the core reasoning behind Butler's 'Conscript Capital' proposal?", "back": "If no one can profit from war, no one will lobby for it, thereby removing the financial incentive and pressure to fight."}, {"front": "What is the primary assumption underlying Butler's 'Conscript Capital' proposal?", "back": "War is primarily caused by the profit motive. Eliminating profits will prevent wars or make them far less likely."}, {"front": "What major criticism challenges the feasibility of 'Conscript Capital' in a modern economy?", "back": "Critics question if a modern industrial economy could function, and if factories would produce necessary war supplies, without financial incentive or varied wages."}, {"front": "How might Butler's 'Conscript Capital' proposal be problematic in the face of genuine threats like World War II?", "back": "It might cripple the very industries needed to mount an effective defense, hindering the nation's ability to respond to a real threat not manufactured by profiteers."}, {"front": "Define 'Feasibility' in the context of evaluating policy proposals.", "back": "Feasibility refers to whether a proposed plan can actually be carried out in practice, considering real-world constraints like political opposition, economic disruption, or constitutional limitations."}, {"front": "Describe Butler's 'Limited Plebiscite' proposal.", "back": "The decision to go to war should be made by a direct vote of those who will actually fight: physically fit young men of military age."}, {"front": "What evidence did Butler cite to support his 'Limited Plebiscite' proposal?", "back": "In World War I, four million American men were sent to fight without being asked; Congress declared war while soldiers had no say."}, {"front": "What is the reasoning behind Butler's 'Limited Plebiscite'?", "back": "Those who bear the consequences of a decision (e.g., combat) should be the ones who make it, ensuring accountability and a higher threshold for war."}, {"front": "What is the key assumption of Butler's 'Limited Plebiscite' proposal?", "back": "Young men facing the prospect of combat will almost always vote against war, thereby preventing unnecessary conflicts."}, {"front": "What is a major constitutional objection to Butler's 'Limited Plebiscite'?", "back": "The U.S. Constitution grants Congress the power 'to declare War' (Article I, Section 8), meaning a plebiscite would likely require a constitutional amendment."}, {"front": "What practical objection exists regarding the 'Limited Plebiscite'?", "back": "Wars can begin with surprise attacks, making it impractical to hold a national vote while enemy forces are advancing."}, {"front": "How does historical evidence challenge the assumption that young men will always vote against war?", "back": "Many young Americans were eager to fight in 1917 (WWI), and the desire for war was nearly universal across age groups after Pearl Harbor in 1941."}, {"front": "What specific aspect of war does Butler's 'Limited Plebiscite' address, and what does it not?", "back": "It addresses whether to go to war, but not how to conduct a war once it has begun, nor does it address wars of self-defense triggered by an attack."}, {"front": "Summarize Butler's 'Defense Only' proposal for the military.", "back": "American naval vessels limited by law to operating within 200 miles of the coastline, aircraft to 500 miles, and the army should never leave American territory."}, {"front": "What historical event did Butler use as evidence for his 'Defense Only' proposal?", "back": "The U.S.S. Maine's explosion in Havana Harbor in 1898, which triggered the Spanish-American War; Butler argued it wouldn't have happened if the ship was restricted to American waters."}, {"front": "What is the central reasoning behind Butler's 'Defense Only' proposal?", "back": "A nation unable to project military force beyond its own borders cannot start an offensive war, thereby removing the physical capability for aggression."}, {"front": "What is the core assumption of Butler's 'Defense Only' proposal?", "back": "American security can be maintained without the ability to project power abroad, and all American military engagements beyond the homeland are, by definition, unnecessary and likely serve corporate interests."}, {"front": "Compare Smedley Butler's and Woodrow Wilson's views on the appropriate scope of military action.", "back": "Butler: Military should be restricted to home defense, as foreign operations serve corporate interests. Wilson: Some threats to American security and democracy originate far away, requiring power projection to defend principles."}, {"front": "What counterargument can be made against Butler's 'Defense Only' proposal, especially from Wilson's perspective?", "back": "If genuine threats originate far from American shores, a 'Defense Only' policy would leave the nation unable to respond until the threat arrived at its doorstep."}, {"front": "How do Butler's three proposals (Conscript Capital, Limited Plebiscite, Defense Only) form a coherent system?", "back": "They are interlocking mechanisms: Conscript Capital removes the motive (profit), Limited Plebiscite transfers the decision (to those who suffer), and Defense Only removes the capability (by restricting force to defense)."}, {"front": "What is a key strength of Butler's proposals as specific policy recommendations?", "back": "Their specificity; he doesn't just say 'war is bad,' but identifies concrete mechanisms that make war profitable and proposes specific steps to dismantle them."}, {"front": "What is the fundamental weakness of Butler's entire system of proposals?", "back": "The overarching assumption that war is *always* a racket driven by profit rather than by genuine threats, which may not hold true for all conflicts."}, {"front": "According to the text, what is the strongest counterargument to Butler's blanket system for preventing war?", "back": "The strongest counterargument is that some wars are necessary (e.g., the Revolution, Civil War, WWII), and a system designed to prevent all wars might also prevent the ones that should be fought."}, {"front": "Define 'Policy Proposal'.", "back": "A specific plan of action recommended to address a public problem. Evaluating it requires asking not only if it's morally justified but also if it is feasible (can be implemented in the real world)."}, {"front": "What key questions should be asked when evaluating a policy proposal like Butler's?", "back": "What problem does it solve? What assumptions does it rest on? What objections might a thoughtful critic raise? Is it morally justified and feasible given real-world constraints?"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
