    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define the term 'vernacular' as it applies to writing style.", "back": "Vernacular refers to the ordinary, everyday language of common people, as opposed to formal, elevated language."}, {"front": "How does Smedley Butler's writing style exemplify the 'vernacular voice'?", "back": "Butler uses short sentences, plain words, and avoids qualifications or literary allusions, signaling he is speaking as a soldier and citizen."}, {"front": "Contrast Smedley Butler's rhetorical style with that of Oliver Wendell Holmes, as described in the text.", "back": "Holmes writes with long, ornamented sentences and elevated diction for academic audiences, while Butler uses short, plain sentences and a daring tone for a mass audience."}, {"front": "What is the rhetorical effect of Butler's blunt opening: 'WAR is a racket. It always has been.'?", "back": "It states his thesis in six words, devoid of qualifications, creating an immediate, forceful, and undeniable impact like 'a fist on a table'."}, {"front": "Identify the rhetorical device used in Butler's phrase 'oldest, most profitable, surely the most vicious' and explain its impact.", "back": "The device is a superlative. Butler stacks three superlatives to overwhelm the reader with the extremity and negative nature of his claim about war."}, {"front": "What is the primary source of Smedley Butler's ethos (credibility) in 'War Is a Racket'?", "back": "His ethos comes from thirty-three years of combat service and two Medals of Honor, establishing him as an irrefutable authority on war."}, {"front": "How does Butler's admission of personal complicity ('I was part of the machine') strengthen his ethos?", "back": "By confessing his involvement, he becomes harder to dismiss as an outsider, making his condemnation of the system more powerful and credible."}, {"front": "Explain the 'common misreading' of Butler's blunt rhetorical style.", "back": "Readers might mistake his blunt style for simplicity, but it is strategically simple: plain language is a 'weapon' designed to be harder to evade or misunderstand."}, {"front": "Which rhetorical appeal is most central to Smedley Butler's use of concrete financial data?", "back": "Logos (appeal to logic and reason) is central, as he relies on empirical observation and specific numbers rather than abstract ideals."}, {"front": "How does Butler's use of specific financial data impact the burden of proof for his argument?", "back": "It shifts the burden of proof onto anyone defending war, forcing them to explain away the compelling profit figures and statistics he presents."}, {"front": "What is the core emotional appeal (pathos) Butler employs in his pamphlet 'War Is a Racket'?", "back": "He employs a furious moral energy and rhetoric of outrage, conveyed through rhetorical questions, catalogs of suffering, and contempt for profiteers."}, {"front": "Identify the rhetorical device used in Butler's repeated questions like 'How many of these war millionaires shouldered a rifle?'", "back": "The device is anaphora, the deliberate repetition of a word or phrase ('How many of them') at the beginning of successive clauses or sentences."}, {"front": "What is the effect of anaphora in Butler's questions regarding war profiteers?", "back": "It creates a rhythmic, hammering drumbeat of accusation that builds in intensity, driving home the point that those who profited from war did not personally fight."}, {"front": "How does Butler's language make the suffering of soldiers concrete rather than abstract?", "back": "He uses physical specificity, describing concrete bodily experiences like 'shouldered a rifle,' 'dug a trench,' and 'ducked shells,' rooting his pathos in physical reality."}, {"front": "What are the defining characteristics of the pamphlet as a rhetorical genre?", "back": "It is a short, polemical work aimed at a mass audience, designed to be brief, readable by ordinary people, and build toward a clear call to action."}, {"front": "What does Butler's choice of the pamphlet genre suggest about his intentions and target audience?", "back": "It suggests he was writing for ordinary Americans, implying that the truth about war is not complicated and can be stated plainly by an eyewitness, not just scholars or experts."}, {"front": "According to the text, what is the 'central tension' between Holmes' and Butler's perspectives on war?", "back": "Holmes sees war as the highest expression of human virtue, while Butler sees it as the lowest expression of human greed."}, {"front": "In what way do both Holmes and Butler derive their rhetorical authority from a similar source, despite their contrasting conclusions?", "back": "Both men draw their authority from personal military experience."}, {"front": "Why is Butler's use of plain language described as a 'weapon' rather than a limitation?", "back": "Its strategic simplicity and directness make his argument harder to evade or misunderstand, ensuring his message is clear and impactful, unlike more elaborate prose."}, {"front": "Give an example of a specific financial detail Butler might use to support his logos argument about war profits.", "back": "He might cite figures such as Du Pont's earnings increasing tenfold or the appearance of 21,000 new millionaires during the war."}, {"front": "How did Butler's personal understanding of war evolve, according to his own statement quoted in the text?", "back": "He stated that as a soldier he suspected war was a racket, but he didn't fully realize it until he retired to civil life."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
