<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In what year did Smedley Butler retire from the Marine Corps?", "back": "1931"}, {"front": "Describe the transformation Smedley Butler underwent after his military retirement.", "back": "He changed from a celebrated warrior into an outspoken antiwar crusader."}, {"front": "What economic event characterized the America Butler returned to in the early 1930s?", "back": "The Great Depression"}, {"front": "Which 1924 legislation promised World War I veterans a cash bonus to be paid in 1945?", "back": "The World War Adjusted Compensation Act"}, {"front": "Why did the 1924 World War Adjusted Compensation Act become a source of resentment during the Depression?", "back": "The promised cash bonus was not scheduled to be paid until 1945."}, {"front": "What name did the tens of thousands of veterans who marched on Washington in 1932 give themselves?", "back": "The Bonus Expeditionary Force (or Bonus Army)"}, {"front": "Where did the Bonus Army set up its vast encampment of shacks and tents?", "back": "Within sight of the U.S. Capitol in Washington, D.C."}, {"front": "Which U.S. President ordered the Army to clear the Bonus Army camp on July 28, 1932?", "back": "President Herbert Hoover"}, {"front": "Who was the General that led the U.S. Army operation to clear the veteran encampment in 1932?", "back": "General Douglas MacArthur"}, {"front": "Which future U.S. President served as General MacArthur's aide during the clearing of the Bonus Army?", "back": "Major Dwight Eisenhower"}, {"front": "Who was the Major commanding the cavalry against the unarmed veterans of the Bonus Army?", "back": "Major George Patton"}, {"front": "List the military assets deployed by the U.S. Army against the Bonus Army veterans.", "back": "Infantry, cavalry, and six tanks."}, {"front": "What tactical methods did the U.S. troops use to clear the Bonus Army camp?", "back": "They fired tear gas, bayoneted resisters, and burned the camp to the ground."}, {"front": "How many veterans were shot and killed during the 1932 clearing of the Bonus Army?", "back": "Two veterans"}, {"front": "What was the cause of death for the infant who died during the military action against the Bonus Army?", "back": "Tear gas exposure"}, {"front": "How did Smedley Butler respond to being told that folks called the Bonus Marchers 'Reds and Radicals'?", "back": "He told the veterans that he was a radical, too."}, {"front": "Butler's support for the Bonus Army was partly based on the fact that many marchers had served under him in _____ or _____.", "back": "France; the Caribbean"}, {"front": "What did the attack on the Bonus Army confirm for Smedley Butler regarding the government and big business?", "back": "That the relationship between the military, government, and big business was rotten at its core."}, {"front": "In 1933, Butler testified about a conspiracy by wealthy businessmen to overthrow which U.S. President?", "back": "Franklin Roosevelt"}, {"front": "What type of government did the Business Plot conspirators intend to install in the United States?", "back": "A fascist-style government"}, {"front": "Identify the two alternative names often given to the 1933 'Business Plot.'", "back": "The Wall Street Putsch or the White House Putsch"}, {"front": "Which congressional committee heard Butler's testimony regarding the Business Plot in late 1933?", "back": "The McCormack-Dickstein Committee"}, {"front": "Why did the Business Plot conspirators specifically choose Smedley Butler to lead their coup?", "back": "They believed his fame and influence among veterans could help him mobilize a private army."}, {"front": "According to Butler's testimony, how many veterans did the conspirators hope to mobilize for the march on Washington?", "back": "500,000 veterans"}, {"front": "What was the official finding of the McCormack-Dickstein Committee regarding Butler's testimony?", "back": "The committee confirmed that Butler's testimony was credible and that such a plot had been discussed."}, {"front": "What was the legal consequence for the businessmen involved in the Business Plot following the committee report?", "back": "No one was prosecuted."}, {"front": "How did major newspapers at the time treat Smedley Butler's allegations of a fascist plot?", "back": "They largely dismissed the story."}, {"front": "Identify the two European fascist leaders who had already come to power by the time of Butler's 1933 testimony.", "back": "Benito Mussolini and Adolf Hitler"}, {"front": "Why did some prominent American and British businessmen admire fascist governments in the early 1930s?", "back": "They admired fascism's efficiency and its hostility to labor unions and communism."}, {"front": "Butler's book 'War Is a Racket' was published in what year?", "back": "1935"}, {"front": "Contrast Butler's observation of corporate profits with his observation of veterans during the 1930s.", "back": "Corporations saw profits flow to them while veterans were forced to beg for their bonuses."}, {"front": "How does the source material describe the tone of Smedley Butler's 'War Is a Racket'?", "back": "Written in anger and personally betrayed, rather than a calm, scholarly analysis."}, {"front": "Concept: Pamphlet", "back": "Definition: A short, unbound publication (typically under 100 pages) devoted to a single argument or cause."}, {"front": "Why is Smedley Butler's 'War Is a Racket' exceptionally short, at barely fifty pages?", "back": "Butler was not interested in nuance; he wanted to name the crime, the criminals, and the remedy."}, {"front": "Which 1776 work by Thomas Paine is cited as a historical example of a political pamphlet?", "back": "Common Sense"}, {"front": "What rhetorical genre rewards brevity and urgency over scholarly balance and qualification?", "back": "The pamphlet"}, {"front": "Butler's realization that the causes he fought for were not the ones he was told about led him to describe himself as _____.", "back": "Bearing witness"}, {"front": "How does Butler's writing style in 'War Is a Racket' reflect his military background?", "back": "He writes directly, forcefully, and without apology."}, {"front": "The Business Plot conspirators wanted a private army to seize control of the government rather than ask for _____.", "back": "Bonuses"}, {"front": "What specific month and year did Hitler come to power in Germany, providing context for the Business Plot?", "back": "January 1933"}, {"front": "Identify the three things Butler explicitly wanted to accomplish in 'War Is a Racket'.", "back": "Name the crime, name the criminals, and propose a remedy."}, {"front": "What event served as the 'defining image' of the Great Depression's social unrest in 1932?", "back": "The U.S. Army attacking its own veterans (the Bonus Army)."}, {"front": "Butler believed he had been recruited by the very class of men who profited from war to do what?", "back": "Overthrow a democratically elected president."}, {"front": "Who owned many of the major newspapers that dismissed Butler's testimony about the Wall Street Putsch?", "back": "The same class of businessmen Butler had accused of the plot."}, {"front": "What was the primary goal of the World War I veterans when they marched on Washington in 1932?", "back": "To demand early payment of their promised cash bonuses."}, {"front": "How many pages is the pamphlet 'War Is a Racket'?", "back": "Barely fifty pages"}, {"front": "Mussolini had been the ruler of Italy since which year?", "back": "1922"}, {"front": "Butler visited the Bonus Army camp and told the men, 'You hear folks call you _____ and _____.'", "back": "Reds; Radicals"}, {"front": "What was the specific fate of the shacks and tents of the Bonus Army after the military intervention?", "back": "They were burned to the ground."}, {"front": "In the context of political rhetoric, what is the primary purpose of a pamphlet?", "back": "To promote a single argument or cause with directness and urgency."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
