    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 0, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Term: Rhetoric", "back": "Definition: The art of effective communication and persuasion."}, {"front": "Rhetoric is the study of how speakers and writers use language to convince an _____.", "back": "audience"}, {"front": "Why is rhetoric described as a neutral \"tool\"?", "back": "It can be used for both beneficial purposes (like a doctor's advice) and harmful ones (like a con artist's scam)."}, {"front": "Which philosopher wrote the foundational text of the Western rhetorical tradition around 335 B.C.?", "back": "Aristotle"}, {"front": "Name the three fundamental appeals identified by Aristotle for persuading an audience.", "back": "Ethos, pathos, and logos."}, {"front": "Definition: Ethos", "back": "An appeal based on the speaker's character, credibility, or authority."}, {"front": "What central question does a speaker's ethos answer for the audience?", "back": "Why should I believe you because of who you are?"}, {"front": "In rhetorical analysis, what specific experience gives Oliver Wendell Holmes Jr. strong ethos regarding combat?", "back": "He was wounded three times during the Civil War."}, {"front": "Definition: Pathos", "back": "An appeal to the audience's emotions."}, {"front": "What is the primary danger of a strong pathos appeal in an argument?", "back": "It can make a weak argument feel convincing by clouding judgment with emotion."}, {"front": "How does Smedley Butler use pathos in his argument against war?", "back": "He describes the suffering of young soldiers returning with missing limbs and shattered minds to provoke outrage."}, {"front": "Definition: Logos", "back": "An appeal to logic and evidence."}, {"front": "Unlike pathos, logos asks the audience to _____ rather than just feel.", "back": "think"}, {"front": "Which rhetorical appeal is being used when Smedley Butler cites specific profit margins of steel companies?", "back": "Logos"}, {"front": "What are the three criteria for evaluating a logical (logos) argument?", "back": "The facts can be checked, the reasoning tested, and conclusions evaluated on merit."}, {"front": "True or False: An argument can be persuasive even if its logos is weak, provided its ethos and pathos are strong.", "back": "True"}, {"front": "Term: Claim", "back": "Definition: The central assertion or point that a speaker wants the audience to accept."}, {"front": "What type of claim is the statement \"War profits went to a small number of corporations\"?", "back": "A statement of fact."}, {"front": "What type of claim is the statement \"War is noble\"?", "back": "A statement of value."}, {"front": "What type of claim is the statement \"We should limit the military to defense\"?", "back": "A statement of policy."}, {"front": "Definition: Evidence", "back": "The support offered—such as facts, statistics, or testimony—that makes a claim believable."}, {"front": "What three qualities characterize strong evidence?", "back": "Specific, verifiable, and relevant."}, {"front": "Definition: Warrant", "back": "The underlying assumption or principle that connects the evidence to the claim."}, {"front": "Warrants in an argument are often _____, meaning they are not explicitly stated by the speaker.", "back": "unstated"}, {"front": "What happens to an argument if the audience rejects the warrant, even if the evidence is solid?", "back": "The argument falls apart."}, {"front": "Identify the warrant: If combat builds courage (evidence) and courage is essential to society (claim), what is the underlying principle?", "back": "Qualities developed under extreme conditions are the most valuable ones."}, {"front": "Definition: Counterargument", "back": "An opposing claim or objection that challenges the speaker's position."}, {"front": "How do strong writers typically handle counterarguments?", "back": "They acknowledge and respond to them."}, {"front": "Term: Primary Source", "back": "Definition: An original document or firsthand account created during the period under study."}, {"front": "A textbook describing a speech is a secondary source, while the actual speech transcript is a _____ source.", "back": "primary"}, {"front": "How does reading a primary source differ from reading a textbook in terms of cognitive effort?", "back": "A textbook tells you what to think, while a primary source requires you to do the thinking yourself."}, {"front": "In the analysis of primary sources, what does the question \"Who is speaking?\" evaluate?", "back": "Ethos"}, {"front": "In the analysis of primary sources, what does the question \"What does the speaker want me to feel?\" evaluate?", "back": "Pathos"}, {"front": "In the analysis of primary sources, what does the question \"What evidence does the speaker offer?\" evaluate?", "back": "Logos"}, {"front": "What is the fourth critical question to ask of a primary source beyond ethos, pathos, and logos?", "back": "What is the speaker not saying? (Omission)"}, {"front": "Why is what a speaker chooses to omit considered revealing in an argument?", "back": "Every argument involves a choice about what to include, and omissions signal the speaker's priorities or blind spots."}, {"front": "In his arguments about war, what specific topic does Oliver Wendell Holmes Jr. omit?", "back": "Who profits from war."}, {"front": "In his arguments about war, what specific topic does Smedley Butler omit?", "back": "Whether some causes are worth fighting for."}, {"front": "In his arguments about war, what specific topic does Woodrow Wilson omit?", "back": "What the war will cost in human lives."}, {"front": "Why should readers avoid assuming that an old argument is inherently bad?", "back": "Disagreement between brilliant historical figures often means the question being addressed is genuinely difficult."}, {"front": "An argument with strong ethos and pathos but weak _____ can still be highly persuasive to an audience.", "back": "logos"}, {"front": "Which rhetorical appeal is fundamentally based on the speaker's moral standing and expertise?", "back": "Ethos"}, {"front": "Which part of an argument answers the question \"Why should I believe this?\"", "back": "Evidence"}, {"front": "Examples of _____ sources include diaries, letters, photographs, and government records from the time period.", "back": "primary"}, {"front": "Rhetoric is not inherently good or bad; it is defined as a tool whose value depends on its _____.", "back": "purpose"}, {"front": "If a speaker fails to address the strongest objection to their position, what structural part of their argument is weak?", "back": "The counterargument."}, {"front": "The three types of claims include statements of fact, value, and _____.", "back": "policy"}, {"front": "Which rhetorical appeal specifically targets feelings like anger, pity, pride, fear, or hope?", "back": "Pathos"}, {"front": "A politician speaking on combat might have weaker ethos than a veteran because he lacks personal _____ in that area.", "back": "experience"}, {"front": "What is the primary role of a 'critical reader' when encountering an argument that uses all three appeals?", "back": "To untangle the appeals and evaluate each one on its own terms."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
