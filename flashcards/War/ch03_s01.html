<html lang="en">
<head>

    <link rel="stylesheet" href="../../styles.css">

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "Why did President Wilson call the Congress into an extraordinary session on April 2, 1917?", "back": "He believed the choices of policy were too serious for him to assume responsibility for alone under the Constitution."}, {"front": "What was the core of the Imperial German Government's announcement on February 1, 1917?", "back": "It intended to use submarines to sink every vessel approaching enemy ports, regardless of law or humanity."}, {"front": "How did the German submarine policy change after February 1, 1917, compared to the previous year?", "back": "It swept aside all previous restraints, such as giving warnings or ensuring the safety of crews."}, {"front": "In Wilson's view, what made the sinking of Belgian relief ships particularly egregious?", "back": "The German Government had previously provided them with safe conduct through the proscribed areas."}, {"front": "What is the primary origin and purpose of international law according to Wilson's address?", "back": "It arose from the attempt to establish rules for the seas, where no nation has right of dominion."}, {"front": "Why does Wilson argue that property damage from submarine warfare is secondary to the loss of life?", "back": "Property can be paid for, but the lives of noncombatants and innocent people cannot be."}, {"front": "How does Wilson characterize the German submarine warfare against commerce?", "back": "He describes it as a warfare against all mankind and all nations."}, {"front": "What motive does Wilson explicitly reject for entering the war?", "back": "He rejects revenge or the victorious assertion of physical might as motives."}, {"front": "Why did Wilson conclude that 'armed neutrality' was no longer a viable policy?", "back": "It is ineffectual against submarines and likely to draw the nation into war without the effectiveness of a belligerent."}, {"front": "How did the German Government indicate it would treat armed guards on merchant ships?", "back": "It intimated that they would be treated as beyond the pale of law and dealt with as pirates."}, {"front": "Term: Belligerent", "back": "Definition: A nation or person engaged in war."}, {"front": "What specific action did Wilson advise Congress to take regarding Germany's course of action?", "back": "He advised Congress to formally accept the status of belligerent that had been thrust upon the United States."}, {"front": "What level of cooperation did Wilson advocate for with the governments already at war with Germany?", "back": "He advocated for the utmost practicable cooperation in counsel and action."}, {"front": "What was Wilson's recommendation regarding financial credit for the Allied governments?", "back": "He suggested extending the most liberal financial credit possible to support their resources."}, {"front": "According to Wilson, what is the primary goal of organizing and mobilizing national resources?", "back": "To supply the materials of war in the most abundant, economical, and efficient way possible."}, {"front": "How many additional men did Wilson initially propose adding to the armed forces?", "back": "He proposed an addition of at least five hundred thousand men."}, {"front": "Upon what principle did Wilson believe new soldiers should be chosen?", "back": "He believed they should be chosen upon the principle of universal liability to service."}, {"front": "Why did Wilson argue that war costs should be sustained by taxation rather than entirely by loans?", "back": "To protect the people from the serious hardships and evils of inflation produced by vast loans."}, {"front": "What 'practical duty' did Wilson emphasize regarding nations already in the field against Germany?", "back": "The duty to supply them with materials they can only obtain from or through the United States."}, {"front": "How did Wilson describe the menace to the peace and freedom of the world?", "back": "It lies in the existence of autocratic governments backed by organized force not controlled by the will of their people."}, {"front": "What was Wilson's stated attitude toward the German people as opposed to their government?", "back": "He expressed feelings of sympathy and friendship, claiming the US had no quarrel with them."}, {"front": "How does Wilson characterize the decision-making process of autocratic governments in wartime?", "back": "Wars are provoked and waged in the interest of dynasties or ambitious groups without consulting the people."}, {"front": "Why are 'cunningly contrived plans of deception' impossible in self-governed nations?", "back": "Public opinion in those nations commands and insists upon full information concerning all affairs."}, {"front": "What kind of partnership is required to maintain a steadfast concert for peace?", "back": "A partnership of democratic nations, which Wilson termed a 'League of Honor.'"}, {"front": "Why did Wilson believe autocratic governments could not be trusted in a league of nations?", "back": "No autocratic government could be trusted to keep faith or observe its covenants due to inner-circle plottings."}, {"front": "What development in Russia did Wilson cite as adding assurance to the hope for future peace?", "back": "The shaking off of autocracy by the Russian people, whom Wilson described as 'democratic at heart.'"}, {"front": "What evidence did Wilson provide that the Prussian autocracy was never a friend to the U.S.?", "back": "It filled American communities and government offices with spies and set criminal intrigues afoot."}, {"front": "What was the significance of the intercepted note to the German Minister at Mexico City?", "back": "It served as eloquent evidence that the German government meant to stir up enemies at the U.S. borders."}, {"front": "What is the primary objective of the United States in 'accepting gauge of battle' with Germany?", "back": "To fight for the ultimate peace of the world and the liberation of all peoples, including Germans."}, {"front": "The phrase 'The world must be made _____ ___ _________' became a famous rallying cry for Wilson's war aims.", "back": "safe for democracy"}, {"front": "What material compensations did Wilson claim the United States was seeking for its sacrifices?", "back": "He stated the U.S. desired no conquest, no dominion, and no indemnities for itself."}, {"front": "Term: Punctilio", "back": "Definition: Careful attention to the details of correct behavior or a fine point of conduct."}, {"front": "Why did Wilson postpone a formal discussion of relations with the Austro-Hungarian Government?", "back": "That government had not yet actually engaged in warfare against U.S. citizens on the seas."}, {"front": "Who was Count Tarnowski?", "back": "The Austro-Hungarian ambassador whose credentials Wilson refused to accept after Austria-Hungary endorsed submarine warfare."}, {"front": "How did Wilson propose the U.S. treat loyal Americans of German birth during the war?", "back": "With an attitude of friendship and pride in their loyalty to their neighbors and government."}, {"front": "How did Wilson intend to deal with disloyalty within the United States?", "back": "With a firm hand of stern repression."}, {"front": "According to Wilson's concluding remarks, what is 'more precious than peace'?", "back": "The right is more precious than peace."}, {"front": "What does Wilson define as the 'universal dominion of right'?", "back": "A concert of free peoples that brings peace and safety to all nations and makes the world free."}, {"front": "Term: Autocratic", "back": "Definition: Relating to government by a single person or small group with absolute, unchecked power."}, {"front": "Why did Wilson characterize submarine warfare as 'unmanly'?", "back": "Because it involved the ruthless destruction of lives without warning or opportunity for rescue."}, {"front": "According to Wilson, what is the 'minimum of right' that the German Government swept aside?", "back": "The basic humane practices and international laws governing the conduct of nations on the seas."}, {"front": "Wilson argued that the 'challenge is to all mankind.' How should each nation respond?", "back": "Each nation must decide for itself how it will meet the challenge with moderation and temperateness."}, {"front": "Term: Privateer", "back": "Definition: A privately owned ship authorized by a government to attack enemy vessels."}, {"front": "Why is it necessary to destroy submarines before they show their intention, according to Wilson?", "back": "Because their method of attack is invisible and they deny neutrals the right to use arms in defense."}, {"front": "Wilson describes the current war as being waged against 'civilization itself.' What was at stake?", "back": "The balance and survival of civilization itself during a fiery trial and sacrifice."}, {"front": "In what way did the German Government treat Belgian relief ships despite their unmistakable identity?", "back": "They were sunk with the same reckless lack of compassion as belligerent vessels."}, {"front": "What 'sacred rights' did Wilson refuse to choose the path of submission over?", "back": "The sacred rights of the Nation and the people which were being ignored and violated."}, {"front": "What branch of government did Wilson suggest should frame the measures for conducting the war?", "back": "The executive branch, upon which the responsibility of conducting the war and safeguarding the Nation falls directly."}, {"front": "Wilson hoped for a new age where nations observe the same standards of conduct as _____.", "back": "individual citizens of civilized states"}, {"front": "Wilson viewed the war as determined in 'old, unhappy days' by rulers interested in _____.", "back": "dynasties or little groups of ambitious men"}, {"front": "According to Wilson, why can democratic nations hold their purpose steady to a common end?", "back": "Because they are free people who prefer the interests of mankind to narrow interests of their own."}, {"front": "Wilson described the Russian autocracy as 'not Russian' in what three aspects?", "back": "In origin, character, or purpose."}, {"front": "What was the 'unhappy fact' proved in U.S. courts regarding German agents?", "back": "They directed intrigues to disturb peace and dislocate industries under the support of the Imperial Government."}, {"front": "How did Wilson describe the U.S. approach to checking German intrigue before the war declaration?", "back": "The U.S. sought to put the most generous interpretation possible on these actions due to friendship for the German people."}, {"front": "Wilson believed that security for democratic governments was impossible in the presence of what?", "back": "The organized power of an autocratic government following methods of intrigue and deception."}, {"front": "What foundation must the peace of the world be planted upon, according to Wilson?", "back": "The tested foundations of political liberty."}, {"front": "How did Wilson describe the U.S. role in the international struggle for rights?", "back": "As but one of the champions of the rights of mankind."}, {"front": "What was the status of the relationship with the German government at the time of the speech?", "back": "Wilson advised that the course of the German government was in fact war against the U.S."}, {"front": "Wilson believed the U.S. could conduct itself as a belligerent without animus because it fought against an _____.", "back": "irresponsible government which has thrown aside all considerations of humanity"}, {"front": "What does Wilson promise to the loyal German-Americans during the 'hour of test'?", "back": "That the U.S. will be proud to prove its friendship through its daily attitude and actions."}, {"front": "Wilson states that 'America is privileged to spend her blood and her might' for what?", "back": "For the principles that gave her birth and happiness and the peace she has treasured."}, {"front": "Why did Wilson believe that neutrality was no longer 'feasible or desirable'?", "back": "Because the peace of the world and freedom of its peoples were involved."}, {"front": "What is the 'League of Honor' in Wilson's vision?", "back": "A partnership of democratic nations committed to collective security and the interests of mankind."}, {"front": "How does Wilson characterize the use of submarines against merchant shipping?", "back": "He defines them as 'outlaws' when used in such a manner."}, {"front": "What was the primary concern Wilson cited regarding 'vast loans' for war funding?", "back": "The danger of creating inflation."}, {"front": "Wilson characterizes the German government's actions as 'running _____' against right and humanity.", "back": "amuck"}, {"front": "According to the speech, what happens to 'cunningly contrived plans' in a society with public opinion?", "back": "They are happily impossible because public opinion insists upon full information."}, {"front": "What did Wilson identify as the 'natural foe to liberty'?", "back": "Prussian autocracy."}, {"front": "What was Wilson's ultimate hope for the relationship between the U.S. and the German people?", "back": "The early reestablishment of intimate relations of mutual advantage."}, {"front": "According to Wilson, why did the U.S. bear with the German government for 'all these bitter months'?", "back": "Out of friendship for the German people, exercising patience and forbearance."}, {"front": "What does Wilson mean by 'universal liability to service'?", "back": "The principle that all citizens are subject to being chosen for military service (the draft)."}, {"front": "How did Wilson describe the Russian people's contribution to the war for freedom?", "back": "They were added in 'naive majesty and might' to the forces fighting for freedom, justice, and peace."}, {"front": "What was the significance of April 6, 1917, following Wilson's address?", "back": "Congress voted to declare war on Germany four days after the speech."}, {"front": "According to Wilson, what provides the 'only' successful cover for designs of conquest?", "back": "Secrecy, where no one has the right to ask questions."}, {"front": "Wilson argues that 'the right' includes the ability of those who submit to authority to have what?", "back": "A voice in their own governments."}, {"front": "What was the 'solemn and even tragical character' of Wilson's step?", "back": "Leading a great peaceful people into the most terrible and disastrous of all wars."}, {"front": "How did Wilson describe the effect of submarine warfare on neutral nations?", "back": "Vessels of friendly neutrals were ruthlessly sent to the bottom without discrimination."}, {"front": "Wilson stated that 'International law had its origin in the attempt to set up some law... respected upon the ____.'", "back": "seas"}, {"front": "What did Wilson call 'the most sacred rights of our Nation and our people'?", "back": "The rights that the U.S. would not choose to suffer to be ignored or violated through submission."}, {"front": "Why did Wilson believe that the Navy needed immediate full equipment?", "back": "To deal specifically with the best means of countering the enemy's submarines."}, {"front": "Wilson argued that the 'wrongs against which we now array ourselves' cut to what?", "back": "The very roots of human life."}, {"front": "How did Wilson define the goal of the 'concert of purpose and of action' among free peoples?", "back": "To ensure the future observance of the principles of peace and justice."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
