<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "On what date did Woodrow Wilson deliver his address to Congress requesting a declaration of war against Germany?", "back": "April 2, 1917."}, {"front": "On what date did the Imperial German Government announce it would resume unrestricted submarine warfare?", "back": "February 1, 1917."}, {"front": "What specific regions did the German government target with its submarine campaign in February 1917?", "back": "Ports of Great Britain, Ireland, the western coasts of Europe, and enemy-controlled Mediterranean ports."}, {"front": "What was the Imperial Government's previous promise regarding passenger boats and resistance-free vessels?", "back": "That they would not be sunk without warning and care for the safety of crews."}, {"front": "According to Wilson, what happened to the previously observed 'meager and haphazard' restraints on submarine warfare?", "back": "The new policy swept every restriction aside."}, {"front": "Which specific non-combatant vessels did Wilson mention were sunk despite having German-provided safe conduct?", "back": "Ships carrying relief to the people of Belgium."}, {"front": "How did Wilson characterize the German government's disregard for hospital ships and relief vessels?", "back": "A reckless lack of compassion or of principle."}, {"front": "Where did Wilson state that international law had its historical origin?", "back": "In the attempt to set up law for the seas, where no nation had dominion."}, {"front": "Why did Wilson argue that property damage was secondary to the loss of life in the submarine campaign?", "back": "Property can be paid for, but the lives of peaceful and innocent people cannot be."}, {"front": "Wilson characterized the German submarine warfare against commerce as a warfare against _____.", "back": "Mankind."}, {"front": "What did Wilson assert should be the motive of the United States in entering the war?", "back": "The vindication of human right."}, {"front": "Term: Armed Neutrality", "back": "Definition: The policy of arming merchant ships for self-defense while remaining officially neutral."}, {"front": "Why did Wilson conclude that armed neutrality was no longer practicable against submarines?", "back": "Submarines are 'outlaws' that must be destroyed on sight before they can attack."}, {"front": "Wilson warned that armed neutrality was likely to produce what specific negative outcome?", "back": "Drawing the nation into war without the rights or effectiveness of a belligerent."}, {"front": "What was the 'one choice' Wilson stated the United States was incapable of making?", "back": "The path of submission."}, {"front": "Wilson advised Congress to formally accept which status that had been 'thrust upon' the nation?", "back": "Status of belligerent."}, {"front": "What level of cooperation did Wilson request between the US and the governments already at war with Germany?", "back": "Utmost practicable cooperation in counsel and action."}, {"front": "What financial measure did Wilson propose for the governments currently fighting Germany?", "back": "The extension of the most liberal financial credit."}, {"front": "Wilson called for the immediate addition of how many men to the armed forces?", "back": "At least 500,000 men."}, {"front": "What principle did Wilson advocate for the selection of new troops?", "back": "Universal liability to service."}, {"front": "Why did Wilson urge that war credits be sustained by taxation rather than entirely by loans?", "back": "To protect the people against the evils of inflation produced by vast loans."}, {"front": "Wilson stated that US motives were to vindicate the principles of peace and justice against what kind of power?", "back": "Selfish and autocratic power."}, {"front": "According to Wilson, where does the 'menace to peace and freedom' lie?", "back": "In the existence of autocratic governments backed by organized force."}, {"front": "Term: Autocratic", "back": "Definition: Relating to government by a single person or small group with absolute, unchecked power."}, {"front": "How did Wilson describe the American relationship with the German people?", "back": "One of sympathy and friendship, with no quarrel against them."}, {"front": "Wilson argued that the war was not determined upon by the German people, but by whom?", "back": "Dynasties or little groups of ambitious men who used fellow men as pawns."}, {"front": "Why did Wilson believe that self-governed nations do not fill neighbor states with spies?", "back": "Designs for conquest can only be worked out under cover where no one can ask questions."}, {"front": "What did Wilson argue was the only foundation upon which a steadfast concert for peace could be maintained?", "back": "A partnership of democratic nations."}, {"front": "Term: League of Honor", "back": "Definition: Wilson's vision of an alliance of democratic nations committed to collective security."}, {"front": "How did Wilson characterize the Russian people following the revolution mentioned in his address?", "back": "As democratic at heart and a 'fit partner for a League of Honor.'"}, {"front": "Wilson claimed that the Prussian autocracy had filled US communities and government offices with _____ from the outset of the war.", "back": "Spies."}, {"front": "What specific piece of evidence did Wilson cite to prove Germany meant to 'stir up enemies at our very doors'?", "back": "The intercepted note to the German Minister at Mexico City."}, {"front": "Wilson famously stated: 'The world must be made _____.'", "back": "Safe for democracy."}, {"front": "What material gains did Wilson say the United States sought for its sacrifices in the war?", "back": "No conquest, no dominion, and no indemnities."}, {"front": "How did Wilson promise the United States would conduct its operations as a belligerent?", "back": "Without passion and with proud punctilio for the principles of right."}, {"front": "Term: Punctilio", "back": "Definition: Careful attention to the details of correct behavior or a fine point of conduct."}, {"front": "Why did Wilson postpone a discussion of relations with the authorities at Vienna (Austria-Hungary)?", "back": "They had endorsed the submarine warfare but not actually engaged in warfare against US citizens on the seas."}, {"front": "Who was the Austro-Hungarian Ambassador whose credentials Wilson refused to accept?", "back": "Count Tarnowski."}, {"front": "How did Wilson describe his attitude toward Americans of German birth?", "back": "They are mostly true and loyal Americans who share our life."}, {"front": "What did Wilson say would happen to any 'disloyalty' that might lift its head during the war?", "back": "It would be dealt with with a firm hand of stern repression."}, {"front": "What did Wilson claim was 'more precious than peace'?", "back": "The right."}, {"front": "According to Wilson's conclusion, for what four things would the United States fight?", "back": "Democracy, the right to a voice in government, the liberties of small nations, and a universal dominion of right."}, {"front": "What did Wilson say the United States is 'privileged' to spend in the service of its principles?", "back": "Her blood and her might."}, {"front": "Wilson argued that the 'minimum of right' on the seas had been swept aside by Germany under what plea?", "back": "Retaliation and necessity."}, {"front": "How did Wilson describe the 'new policy' of German submarine warfare regarding vessel nationality?", "back": "Vessels of every kind, whatever their flag or character, were ruthlessly sent to the bottom."}, {"front": "Term: Belligerent", "back": "Definition: A nation or person engaged in war."}, {"front": "Wilson noted that submarines cannot be used against merchant shipping without throwing away all _____.", "back": "Scruples of humanity."}, {"front": "What did Wilson believe would happen to the 'same standards of conduct' observed by individuals in the coming age?", "back": "They would be observed among nations and their governments."}, {"front": "According to Wilson, why can autocratic governments never be trusted to keep faith?", "back": "Because they are controlled by the will of the rulers, not the people."}, {"front": "Term: Privateer", "back": "Definition: A privately owned ship authorized by a government to attack enemy vessels."}, {"front": "In Wilson's view, the Russian autocracy was not Russian in origin but was merely the _____ of its political structure.", "back": "Summit."}, {"front": "What did Wilson describe as a 'fearful thing' in his closing remarks?", "back": "To lead this great peaceful people into war."}, {"front": "Wilson stated that US operations should be conducted 'without animus' toward whom?", "back": "The German people."}, {"front": "What did Wilson identify as the ultimate foundation upon which the peace of the world must be planted?", "back": "Political liberty."}, {"front": "Wilson argued that the German government acts against US peace and security at its _____.", "back": "Convenience."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
