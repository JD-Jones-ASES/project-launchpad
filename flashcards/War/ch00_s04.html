    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 0, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the text, what is the most consequential action a nation can take?", "back": "War"}, {"front": "In what way does war typically affect a nation's treasury?", "back": "It empties it."}, {"front": "What impact does war have on national borders and governments?", "back": "It reshapes borders and topples governments."}, {"front": "How does the text quantify the human cost of war?", "back": "It kills people by the millions."}, {"front": "The belief that war calls out courage, sacrifice, and loyalty represents which perspective?", "back": "The view that war is noble."}, {"front": "According to proponents of war as a \"noble\" pursuit, what does a society lose if it cannot fight?", "back": "Its spine."}, {"front": "How do critics who call war a \"racket\" describe its purpose?", "back": "A scheme run by the powerful to enrich themselves."}, {"front": "In the \"war is a racket\" argument, who are the primary victims of the scheme?", "back": "Ordinary people who do the fighting and dying."}, {"front": "What conditions make war a \"necessary evil\" according to some observers?", "back": "When civilization is threatened by tyranny."}, {"front": "The presence of _____ on a battlefield is often cited as evidence that no argument can justify war.", "back": "bodies"}, {"front": "Which Civil War veteran celebrated war as a \"school of virtue\" in 1895?", "back": "Oliver Wendell Holmes Jr."}, {"front": "How did Oliver Wendell Holmes Jr.'s personal experience in the Civil War influence his view?", "back": "He nearly died in battle yet still celebrated war's virtues."}, {"front": "Name the highly decorated Marine who argued in 1935 that war was a racket.", "back": "Smedley Butler"}, {"front": "What was the core of Smedley Butler's 1935 critique of war?", "back": "It is run for the profit of a few."}, {"front": "Which U.S. President led the nation into WWI after campaigning on a platform of peace?", "back": "Woodrow Wilson"}, {"front": "In what year did Woodrow Wilson lead the United States into war?", "back": "1917"}, {"front": "Who authored the 1929 novel that stripped away justifications for war based on trench experience?", "back": "Erich Maria Remarque"}, {"front": "What specific environment did Erich Maria Remarque survive before writing about war?", "back": "The trenches"}, {"front": "According to the text, why does the argument about the meaning of war persist?", "back": "Because intelligent and experienced people look at war and see different things."}, {"front": "Term: Rhetoric", "back": "Definition: The ancient art of persuasion and argument."}, {"front": "What is identified as \"The Central Question\" regarding war in this text?", "back": "What is war for?"}, {"front": "The central question asks if war is a test of national _____, a profitable enterprise, or a necessary evil.", "back": "character"}, {"front": "What skill is required for a reader to decide which claims about war hold up under scrutiny?", "back": "Rhetoric"}, {"front": "The text suggests that if the answer to war's purpose were _____, there would be no argument.", "back": "obvious"}, {"front": "What are the three traits the text uses to describe Holmes, Butler, Wilson, and Remarque?", "back": "Intelligent, sincere, and experienced."}, {"front": "According to the \"noble\" perspective, war promotes loyalty to something larger than _____.", "back": "oneself"}, {"front": "In the context of rhetoric, a reader's job is to identify an argument's _____ and weaknesses.", "back": "strengths"}, {"front": "Woodrow Wilson led the nation into what was then the _____ war the world had ever seen.", "back": "bloodiest"}, {"front": "Which figure's perspective is most directly rooted in the 19th century (1895)?", "back": "Oliver Wendell Holmes Jr."}, {"front": "Which figure's perspective was published in 1929 following the Great War?", "back": "Erich Maria Remarque"}, {"front": "How does the text describe the nature of the positions held by the four featured men?", "back": "They are not abstract positions but were argued for and staked upon reputations."}, {"front": "What must a reader understand to evaluate the four voices effectively?", "back": "The world they lived in and the tools they used to make their cases."}, {"front": "Perspective: War as a school of virtue.", "back": "Oliver Wendell Holmes Jr."}, {"front": "Perspective: War as a racket for profit.", "back": "Smedley Butler"}, {"front": "Perspective: War as a necessary evil against tyranny.", "back": "Woodrow Wilson (implied by context of leading into war)."}, {"front": "Perspective: War as a brutal reality stripping away all justifications.", "back": "Erich Maria Remarque"}, {"front": "What is the primary objective given to the reader regarding the different arguments?", "back": "To understand each argument on its own terms."}, {"front": "War is described as a \"scheme run by the powerful\" in which specific viewpoint?", "back": "War as a racket."}, {"front": "The argument that war is a \"test of national character\" aligns with which of the four main perspectives?", "back": "War as noble."}, {"front": "Does the book aim to provide a single answer to the question \"What is war for?\"", "back": "No; it provides arguments and asks the reader to think."}, {"front": "What is the significance of the dates 1895, 1917, 1929, and 1935 in the text?", "back": "They mark the specific times when the four featured individuals presented their arguments."}, {"front": "Which of the four perspectives is most skeptical of eloquent arguments used to justify battlefields?", "back": "The view based on the reality of bodies and brutality (Remarque)."}, {"front": "Cloze: Every generation confronts war and argues about its _____.", "back": "meaning"}, {"front": "According to the text, a reader should decide for themselves which claims hold up under _____.", "back": "scrutiny"}, {"front": "Which figure's argument is explicitly linked to the defense of civilization?", "back": "Woodrow Wilson (as the \"necessary evil\" representative)."}, {"front": "What specific role did Smedley Butler hold?", "back": "Marine (the most decorated of his era)."}, {"front": "What is the relationship between the four men's experiences and their intelligence according to the author?", "back": "Their intelligence and experience led them to see different things in the same phenomenon (war)."}, {"front": "How does the text characterize the arguments about war relative to human history?", "back": "People have disagreed about war for as long as there have been wars."}, {"front": "What is the intended outcome of learning the \"skills of rhetoric\" in this context?", "back": "To enable the reader to evaluate and understand the four voices on war."}, {"front": "Which perspective focuses on the enrichment of the few at the expense of the many?", "back": "War as a racket."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
