        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was the fundamental nature of Woodrow Wilson's address for war, beyond a simple call to arms?", "back": "It was a carefully constructed moral argument, built in layers, presenting a case for why U.S. entry into the war was necessary."}, {"front": "What specific German actions did Wilson present as the primary grievance for U.S. entry into WWI?", "back": "Germany's resumption of unrestricted submarine warfare, leading to the sinking of American ships and the deaths of American citizens and noncombatants."}, {"front": "What rhetorical purpose did Wilson achieve by leading his address with facts about German aggression rather than emotions?", "back": "He established himself as a reasonable leader, compelled to an extreme position (war) by extreme circumstances, rather than being eager for conflict."}, {"front": "What was Wilson's core claim regarding the necessity of this particular war?", "back": "He argued that this war was necessary—a grim duty forced upon a peaceful nation by the aggression of an autocratic power—rather than being inherently good or a virtue."}, {"front": "How did Wilson elevate the argument for war beyond specific German actions to a universal principle?", "back": "He argued it was about the survival of democratic government itself, framing the conflict as a clash between democracy and autocracy."}, {"front": "According to Wilson's argument, why are autocracies more inclined to wage aggressive war than democracies?", "back": "Autocratic leaders do not answer to their citizens and therefore do not directly bear the costs of war, unlike leaders in democracies where citizens directly bear these costs."}, {"front": "Define the 'democratic peace theory' as mentioned in the context of Wilson's argument.", "back": "The theory that republican/democratic governments are naturally inclined toward peace because citizens would never vote to impose the costs of war upon themselves."}, {"front": "Define 'Self-Determination' as a cornerstone of Wilson's vision for the postwar world.", "back": "The principle that peoples and nations have the right to choose their own form of government without external interference, essential for lasting peace."}, {"front": "What is 'Liberal Democracy,' and why did Wilson believe its spread was essential for world peace?", "back": "A system of government characterized by free elections, rule of law, protection of individual rights, and limits on government power. Wilson believed a world of democracies would be a world without aggressive war."}, {"front": "What became America's ultimate goal in WWI, according to Wilson's escalated argument?", "back": "To make the world 'safe for democracy' and establish an international order where democratic nations could live in peace without autocratic aggression."}, {"front": "According to Wilson, why did America have a special duty to enter the war, beyond its national interests?", "back": "As a nation founded on principles like liberty, equality, and self-government, America had an obligation to defend these principles globally when democracy was threatened."}, {"front": "Briefly outline the three main layers of Wilson's moral argument for entering WWI.", "back": "1) The Grievance (German aggression via submarine warfare), 2) The Principle (democracy vs. autocracy), and 3) The Duty (America's special responsibility to defend democratic principles)."}, {"front": "Besides unrestricted submarine warfare, what other piece of evidence did Wilson cite to demonstrate German hostility toward the United States?", "back": "The Zimmermann Telegram, which revealed German plots against U.S. territory."}, {"front": "How did Wilson's portrayal of war's difficulty contrast with figures like Holmes?", "back": "Unlike Holmes, who celebrated the experience of war, Wilson presented it as a terrible burden and 'a fearful thing,' emphasizing the weight of his responsibility."}, {"front": "What significant economic aspect did Wilson omit from his argument, which critics like Butler later highlighted?", "back": "He did not discuss war profits or the deep economic entanglement of American financial interests with Allied victory, which Butler argued was a primary motive for war."}, {"front": "What major violation of neutral rights, committed by Britain, did Wilson largely omit from his argument, despite protesting German actions vigorously?", "back": "He largely omitted the British naval blockade of Germany, which also violated neutral rights by seizing American cargo and preventing food from reaching German civilians."}, {"front": "What major domestic issue did Wilson not address when speaking of democracy and rights for all peoples?", "back": "He did not mention the millions of African Americans living under Jim Crow laws in the United States, highlighting a contradiction in advocating for democracy abroad while denying it at home."}, {"front": "What alternative to war did Wilson not seriously consider in his argument, presenting the choice as binary?", "back": "He did not seriously engage with the argument that continued neutrality, even at the cost of lost ships, might save more lives than entering a continental war."}, {"front": "What is a common misreading when identifying omissions in an argument, and what is a more nuanced interpretation?", "back": "A common misreading is to conclude that omissions necessarily mean the argument is dishonest or wrong. A more nuanced interpretation considers whether omissions are strategic (hiding something) or practical (focusing on what matters most for the audience and occasion)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
