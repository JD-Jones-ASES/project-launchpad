<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What defines the genre of a 'Presidential Address' according to the text?", "back": "An official act and formal speech delivered to Congress or the nation to request legislative action on matters of national importance."}, {"front": "How does a Presidential Address differ from a campaign speech in terms of its intended audience?", "back": "It is addressed not just to those present, but to the nation, the world, and posterity."}, {"front": "Why did Wilson need to avoid sounding 'eager' for war in his 1917 address?", "back": "To avoid alarming the peace faction in Congress and the millions of Americans who voted for him to keep them out of war."}, {"front": "What was the rhetorical risk if Wilson sounded 'reluctant' to go to war?", "back": "It would have undermined Allied confidence and encouraged the German government."}, {"front": "The text describes Wilson's tone as a balance between being resolute but _____.", "back": "Sober"}, {"front": "Wilson’s tone in the 1917 address is described as a balance between being principled but _____.", "back": "Practical"}, {"front": "In the 'Fearful Thing' passage, how does Wilson initially characterize the nature of leading people into war?", "back": "He describes it as 'fearful,' 'terrible,' and 'disastrous.'"}, {"front": "What is the rhetorical purpose of Wilson naming the horrors of war before arguing for it?", "back": "It positions him as a 'reluctant warrior' rather than a warmonger."}, {"front": "Which specific conjunction serves as the 'pivot' for Wilson’s argument in the 'Fearful Thing' passage?", "back": "But"}, {"front": "How does the 'Fearful Thing' passage demonstrate an escalation from the concrete to the universal?", "back": "It begins with 'this great peaceful people' (America) and concludes with the 'world itself at last free.'"}, {"front": "In the 'Fearful Thing' passage, what does Wilson use to create a 'drumbeat of purpose' and build momentum?", "back": "Rhythmic repetition of the word 'for.'"}, {"front": "Definition: Rhetorical Omission", "back": "The deliberate exclusion of specific information or perspectives to shape an audience's understanding."}, {"front": "What major dimension of the war did Wilson omit from his 1917 address to maintain 'moral clarity'?", "back": "The economic dimensions, such as bank loans and trade relationships."}, {"front": "Approximately how much had American banks loaned to the Allied powers by April 1917?", "back": "2.3 billion$"}, {"front": "How much had American banks loaned to the Central Powers by April 1917?", "back": "27 million$"}, {"front": "Why did Wilson omit the mention of a military draft in his address?", "back": "To avoid reminding his audience that citizens would soon be compelled to fight against their will."}, {"front": "How does Wilson's use of omission compare to that of Oliver Wendell Holmes?", "back": "Wilson omits economic details for moral principle, while Holmes omits the suffering of war to celebrate its nobility."}, {"front": "How does Smedley Butler’s use of omission compare to Wilson's?", "back": "Butler omits the possibility of justified war to focus on corruption and profiteering."}, {"front": "What is the central paradox of Wilson's ethos in his 1917 address?", "back": "He is credible as a war leader because he spent three years trying to avoid war."}, {"front": "Contrast the ethos of Oliver Wendell Holmes with that of Woodrow Wilson.", "back": "Holmes speaks with the authority of a veteran who found nobility in war, while Wilson speaks as a peacemaker who has exhausted all alternatives."}, {"front": "Contrast the ethos of Smedley Butler with that of Woodrow Wilson.", "back": "Butler speaks with the authority of a disillusioned veteran, while Wilson speaks as a man driven to war by forces beyond his control."}, {"front": "What is the core message of Wilson's 'reluctant warrior' authority?", "back": "\"I have tried everything else, and nothing worked.\""}, {"front": "How does Wilson's use of pathos differ from typical demagoguery?", "back": "His emotional appeals are 'architectural' and woven into the argument’s structure rather than being standalone set pieces."}, {"front": "What does Wilson ask his audience to feel in the 'Fearful Thing' passage instead of anger or pity?", "back": "The weight and gravity of the decision for war."}, {"front": "What is the first step in the logical structure (logos) of Wilson’s address?", "back": "Establishing that Germany has committed hostile acts against the United States."}, {"front": "According to Wilson's logos, why must the United States enter the conflict?", "back": "Because the war is a fundamental struggle between democracy and autocracy that America has a duty to defend."}, {"front": "Which step in Wilson's logical chain is considered the 'weakest link'?", "back": "The leap from a specific dispute over shipping rights to a universal struggle for democracy."}, {"front": "What was Smedley Butler's critique of Wilson's use of moral language?", "back": "He argued it was propaganda designed to make opposing the war appear as if one were opposing freedom itself."}, {"front": "Identify one of the specific hostile acts Wilson cited as a cause for war.", "back": "Submarine warfare or the Zimmermann Telegram."}, {"front": "What was the Allied governments' specific interest as an audience for Wilson's speech?", "back": "They needed to know that the American commitment to the war was genuine."}, {"front": "According to the text, why did Wilson present the decision for war as a 'moral equation'?", "back": "To show that although war is terrible, there are things at stake that outweigh that terror."}, {"front": "How does the text describe Wilson's use of emotion in the speech?", "back": "Controlled pathos that is moved by events but governed by reason."}, {"front": "Wilson's argument escalates to the claim that to oppose the war is to oppose _____.", "back": "Freedom itself"}, {"front": "What specific phrase does Wilson use to describe the American people near the end of his address?", "back": "This great peaceful people."}, {"front": "What concept does Smedley Butler use to describe war that Wilson pointedly ignores?", "back": "A racket."}, {"front": "What did Wilson hope the German government would understand from his speech?", "back": "That America was fully prepared and willing to fight."}, {"front": "In the context of the speech, what is 'more precious than peace'?", "back": "The right."}, {"front": "What was the purpose of the phrase 'a universal dominion of right' in Wilson's speech?", "back": "To define the goal of the war as bringing peace and safety to all nations."}, {"front": "According to the text, what prevents a president from sounding like a demagogue when asking for a declaration of war?", "back": "Sounding like a statesman moved by events but governed by reason."}, {"front": "In the comparison of authorities, what is the core message of Smedley Butler (1935)?", "back": "\"I have been there, and it was a fraud.\""}, {"front": "What is the primary function of the word 'But' in Wilson's 'Fearful Thing' sentence?", "back": "It pivots the argument from conceding the horrors of war to justifying the necessity of fighting."}, {"front": "What does Wilson mean by 'the right of those who submit to authority to have a voice in their own governments'?", "back": "Democracy."}, {"front": "How does Wilson justify the transition from a shipping dispute to a world war?", "back": "By framing it as a duty to protect the rights and liberties of small nations."}, {"front": "Wilson's logical structure argues that the conflict is not a quarrel over shipping but a struggle between democracy and _____.", "back": "Autocracy"}, {"front": "What was the effect of Wilson starting his argument with America's specific situation and expanding outward?", "back": "It made the cause of human freedom seem to be the primary stake of the conflict."}, {"front": "According to the text, Wilson achieves a rhetorical balance by being willing to fight but _____.", "back": "Grieved by the necessity"}, {"front": "Who cited the financial loan figures as evidence that WWI was fought to protect Wall Street?", "back": "Smedley Butler"}, {"front": "Which audience must vote on Wilson's proposal for war?", "back": "The senators and representatives in the chamber (Congress)."}, {"front": "Wilson describes the current state of civilization as seeming to be in the _____.", "back": "Balance"}, {"front": "What term does the text use to describe Wilson's logical steps?", "back": "The Architecture of Necessity."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
