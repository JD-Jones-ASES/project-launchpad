    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;

        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);

            background: var(--secondary-color);

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;

            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What three factors are studied in rhetorical situation analysis?", "back": "The writer's audience, occasion, and purpose."}, {"front": "What is the primary goal of rhetorical situation analysis?", "back": "To understand how a text is shaped by the moment of its creation."}, {"front": "Term: Audience Analysis", "back": "Definition: The practice of identifying a writer's listeners and determining how they shape the resulting argument."}, {"front": "How does a sympathetic audience influence a speaker's choices compared to a skeptical one?", "back": "It affects the choice of evidence, the tone adopted, and which topics are avoided."}, {"front": "In rhetorical analysis, what determines why a writer might avoid certain topics altogether?", "back": "The nature and expectations of the intended audience."}, {"front": "What specific genre did Holmes use for his speech at Harvard?", "back": "An oration."}, {"front": "Which stylistic features characterize Holmes’s oration to suit a ceremonial occasion?", "back": "Long, rolling sentences and classical allusions."}, {"front": "What was the primary rhetorical purpose of Holmes’s Harvard speech?", "back": "To inspire his audience."}, {"front": "What genre did Smedley Butler use to deliver his argument?", "back": "A pamphlet."}, {"front": "Which sentence style did Butler employ to provoke outrage and action?", "back": "Short, punchy sentences."}, {"front": "What type of evidence did Butler use to convince readers who were not seeking consolation?", "back": "Concrete dollar figures."}, {"front": "What genre defines Woodrow Wilson’s address to Congress?", "back": "A presidential address."}, {"front": "How did the gravity of Wilson’s request to Congress manifest in his writing style?", "back": "Through careful, legalistic phrasing."}, {"front": "What dual purpose did Wilson’s address serve regarding its audience?", "back": "It aimed to persuade legislators while simultaneously speaking to history."}, {"front": "How does Remarque’s novel communicate its argument differently than a conventional speech?", "back": "It places the reader inside an experience and lets the experience do the work."}, {"front": "Why was Holmes able to assume a baseline of sympathy from his audience?", "back": "He was speaking to Harvard graduates and veterans who shared his values."}, {"front": "What was Butler’s rhetorical goal for his audience of ordinary Americans?", "back": "To shock them into seeing the connection between corporate profits and war deaths."}, {"front": "How did Wilson’s audience of politicians influence his tone?", "back": "He had to be persuasive without appearing reckless."}, {"front": "Who were the two primary target audiences for Remarque’s writing?", "back": "The generation that lived through the war and the younger generation that did not."}, {"front": "What was Remarque’s rhetorical challenge regarding the nature of war?", "back": "To make the incomprehensible somehow comprehensible to his readers."}, {"front": "What can a careful reader learn from 'silences' in a text?", "back": "What the writer chooses not to say, which is as revealing as the explicit argument."}, {"front": "What specific topic did Holmes omit from his discussion of war?", "back": "The question of who profits from war."}, {"front": "What rhetorical concession did Butler refuse to make in his pamphlet?", "back": "That any war might be justified."}, {"front": "What reality of war did Wilson avoid dwelling on when speaking to Congress?", "back": "The physical horrors the constituents of the legislators would endure."}, {"front": "What specific type of opinion did Remarque withhold from his novel?", "back": "A political opinion on whether the war should have been fought."}, {"front": "How does the rhetorical category of Remarque differ from Holmes, Butler, and Wilson?", "back": "Remarque is bearing witness rather than making an explicit argument."}, {"front": "Which three writers in the text make an explicit argument with a thesis and marshaled evidence?", "back": "Holmes, Butler, and Wilson."}, {"front": "What is the 'implicit argument' found in Remarque’s testimony?", "back": "The idea that the reader should judge the war based on the experience described."}, {"front": "How does Remarque’s use of ethos, pathos, and logos differ from the other three voices?", "back": "He uses them in the service of testimony rather than direct persuasion."}, {"front": "In rhetorical analysis, the relationship between genre and argument suggests that short, punchy sentences are often used for _____.", "back": "Provocation."}, {"front": "Holmes's use of classical allusions was a choice driven by the _____ nature of his occasion.", "back": "Ceremonial."}, {"front": "Wilson’s phrasing is described as _____ because it had to withstand the scrutiny of history.", "back": "Legalistic."}, {"front": "The practice of evaluating why a writer emphasizes certain evidence is part of _____ analysis.", "back": "Audience."}, {"front": "According to the text, the genre of the _____ is designed to be a weapon for provocation.", "back": "Pamphlet."}, {"front": "While Holmes spoke to those with shared values, Butler spoke to those who needed to be _____ into attention.", "back": "Shocked."}, {"front": "Remarque’s novel aims to make the _____ comprehensible to different generations.", "back": "Incomprehensible."}, {"front": "The absence of discussion about war profits in Holmes's speech is an example of a rhetorical _____.", "back": "Silence."}, {"front": "Remarque's role as a writer is defined as bearing _____.", "back": "Witness."}, {"front": "How does the intended audience's level of sympathy affect a speaker's tone?", "back": "It determines whether they can assume shared values or must work to gain attention."}, {"front": "Why are dollar figures specifically cited as an effective tool for Butler's audience?", "back": "They provide concrete evidence for readers who need convincing about economic motives."}, {"front": "What does Wilson's need to avoid appearing 'reckless' suggest about his rhetorical situation?", "back": "His audience of politicians held the responsibility for high-consequence decisions."}, {"front": "In what way does genre dictate the sentence length in the examples of Holmes and Butler?", "back": "Oration favors long, rolling sentences, while pamphlets favor short, punchy ones."}, {"front": "What is the primary difference between explicit persuasion and testimony in rhetoric?", "back": "Persuasion uses a thesis and evidence to convince, while testimony presents an experience for the reader to judge."}, {"front": "According to the text, why does Wilson avoid dwelling on physical horrors?", "back": "To maintain a persuasive stance toward politicians without overwhelming them with constituent suffering."}, {"front": "What is the defining characteristic of a 'ceremonial' rhetorical occasion?", "back": "It is an event meant to inspire an audience that already shares the speaker's values."}, {"front": "How does the text define the 'implicit' nature of Remarque's argument?", "back": "It describes the experience of war directly and allows the reader to form their own judgment."}, {"front": "Why is 'occasion' a critical component of rhetorical situation analysis?", "back": "It dictates the appropriate style, such as ceremonial versus legalistic, for the argument."}, {"front": "The Boardman Robinson cartoon 'The Deserter' depicts a firing squad taking aim at _____.", "back": "Christ."}, {"front": "What year was Boardman Robinson’s anti-war cartoon 'The Deserter' published?", "back": "1917."}, {"front": "Rhetorical situation analysis reminds us that no argument exists in a _____; every text is shaped by its creation.", "back": "Vacuum."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
