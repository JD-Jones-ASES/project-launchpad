    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 0, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What historical period do the four writers in the book span, and what major event is crucial for understanding their arguments?", "back": "The writers span forty years of American and European history, from 1895 to 1935. The catastrophe of the First World War is crucial for understanding their arguments."}, {"front": "What event triggered the outbreak of World War I in the summer of 1914?", "back": "The assassination of Archduke Franz Ferdinand of Austria-Hungary by a Serbian nationalist on June 28, 1914, triggered a chain reaction of declarations of war due to existing alliances."}, {"front": "Who were the major powers in the Triple Entente alliance bloc by 1914?", "back": "The Triple Entente consisted of France, Russia, and Britain."}, {"front": "Who were the major powers in the Central Powers alliance bloc by 1914?", "back": "The Central Powers consisted of Germany, Austria-Hungary, and the Ottoman Empire."}, {"front": "How did the European alliance system contribute to the escalation of World War I?", "back": "The system obligated its members to fight if any partner was attacked, turning a regional dispute in the Balkans into a continental war, making conflict almost inevitable rather than preventing it."}, {"front": "Describe the main characteristics of warfare on the Western Front during World War I.", "back": "The Western Front was characterized by over four hundred miles of trenches, soldiers living in mud, barbed wire, constant artillery bombardment, and poison gas. Attacks gained minimal ground at the cost of thousands of lives."}, {"front": "What was the significance of the Battle of the Somme in 1916?", "back": "The Battle of the Somme resulted in over a million combined casualties (British, French, German) and moved the front line barely six miles, illustrating the brutal and static nature of trench warfare."}, {"front": "When did World War I officially end, and what was the approximate number of military deaths?", "back": "World War I ended on November 11, 1918. Approximately ten million soldiers were dead, with millions more wounded and civilian deaths adding significantly to the toll."}, {"front": "For how long did the United States remain neutral in World War I, and what was President Woodrow Wilson's re-election slogan in 1916?", "back": "The United States stayed out of the conflict for nearly three years. President Woodrow Wilson's re-election slogan in 1916 was 'He Kept Us Out of War.'"}, {"front": "What were the two primary reasons that compelled the United States to enter World War I?", "back": "Germany's decision to resume unrestricted submarine warfare in early 1917 (sinking American merchant ships without warning) and the revelation of the Zimmermann Telegram forced the U.S. into the war."}, {"front": "What was the Zimmermann Telegram?", "back": "The Zimmermann Telegram was a secret German proposal in January 1917 for a military alliance with Mexico against the United States, promising Mexico the return of Texas, New Mexico, and Arizona if the U.S. entered the war."}, {"front": "When did President Wilson ask Congress for a declaration of war against Germany?", "back": "President Wilson asked Congress for a declaration of war on April 2, 1917."}, {"front": "What were the main terms imposed on Germany by the Treaty of Versailles (1919)?", "back": "The Treaty of Versailles forced Germany to accept sole responsibility for the conflict and pay enormous reparations."}, {"front": "What was Woodrow Wilson's vision for a League of Nations, and what was its fate in the U.S.?", "back": "Wilson's dream of a League of Nations was a post-war international organization to prevent future conflicts, but it was rejected by the U.S. Senate, despite being realized on paper."}, {"front": "Characterize the 'interwar years' (1919–1939) in Europe and America.", "back": "The interwar years were marked by economic instability, the rise of fascism in Italy and Germany, and a growing sense of disillusionment among many Americans that the war had been a mistake."}, {"front": "Who was Smedley Butler, and what was his significant work published in 1935?", "back": "Smedley Butler was a retired Marine general. His significant work, published in 1935, was 'War Is a Racket,' an angry critique of war influenced by his experiences and post-war events."}, {"front": "What was the 'Bonus Army,' and how did it influence Smedley Butler?", "back": "The Bonus Army was a group of thousands of impoverished WWI veterans who marched on Washington in 1932, demanding early payment of promised bonuses. Their treatment fueled Butler's disillusionment with war and its costs."}, {"front": "How did the timing of World War I affect the perspectives of authors like Holmes, Wilson, and Butler/Remarque?", "back": "Holmes spoke before WWI (viewing war through the Civil War lens), Wilson spoke at the moment of decision (choosing to fight), and Butler/Remarque spoke after the war, when the full cost was visible, questioning its worth."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
