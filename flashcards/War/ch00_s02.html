<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 0, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "During which historical conflict did Oliver Wendell Holmes Jr. enlist in the Union Army?", "back": "The American Civil War"}, {"front": "In what specific Civil War battles was Oliver Wendell Holmes Jr. wounded?", "back": "Ball's Bluff, Antietam, and Fredericksburg."}, {"front": "How many times was Oliver Wendell Holmes Jr. seriously wounded during his military service?", "back": "Three"}, {"front": "What professional position did Oliver Wendell Holmes Jr. hold from 1902 to 1932?", "back": "Justice of the U.S. Supreme Court"}, {"front": "What famous nickname was given to Oliver Wendell Holmes Jr. due to his tendency to challenge the majority?", "back": "The Great Dissenter"}, {"front": "According to Oliver Wendell Holmes Jr., what role does war play in relation to human virtue?", "back": "It acts as a crucible that forges courage, self-sacrifice, and devotion."}, {"front": "Why did Oliver Wendell Holmes Jr. believe that a commercial society needed the influence of war?", "back": "He believed commercial society cannot produce the essential virtues of sacrifice and devotion on its own."}, {"front": "What did Oliver Wendell Holmes Jr. describe as the 'highest expression of human character'?", "back": "The soldier's faith"}, {"front": "How many years did Smedley Butler spend in uniform as a Marine?", "back": "Thirty-three years"}, {"front": "How many Medals of Honor were awarded to Smedley Butler during his career?", "back": "Two"}, {"front": "In what year did Smedley Butler retire from the military?", "back": "1931"}, {"front": "What was the nature of Smedley Butler’s 'remarkable transformation' after his retirement?", "back": "He shifted from being a decorated warrior to an antiwar activist."}, {"front": "What alleged conspiracy did Smedley Butler expose in 1933?", "back": "The Business Plot"}, {"front": "Who were the alleged conspirators in the 1933 Business Plot exposed by Smedley Butler?", "back": "Wealthy industrialists"}, {"front": "What was the intended goal of the Business Plot according to Smedley Butler's testimony?", "back": "To overthrow President Roosevelt."}, {"front": "What is the title of Smedley Butler's 1935 pamphlet that attacked the military-industrial system?", "back": "War Is a Racket"}, {"front": "According to Smedley Butler, who reaps the enormous profits from the 'racket' of war?", "back": "A small group of insiders"}, {"front": "What solution did Smedley Butler propose to stop the cycle of war?", "back": "Taking the profit out of war."}, {"front": "From which university did Woodrow Wilson earn his doctorate?", "back": "Johns Hopkins University"}, {"front": "Before being elected president in 1912, Woodrow Wilson served as the president of which university?", "back": "Princeton University"}, {"front": "Which political office did Woodrow Wilson hold immediately before winning the presidency?", "back": "Governor of New Jersey"}, {"front": "On what specific platform did Woodrow Wilson win re-election in 1916?", "back": "Neutrality"}, {"front": "On what date did Woodrow Wilson deliver his address to Congress requesting a declaration of war?", "back": "April 2, 1917"}, {"front": "Which international organization was championed by Woodrow Wilson but rejected by the U.S. Senate?", "back": "The League of Nations"}, {"front": "In what year was Woodrow Wilson awarded the Nobel Peace Prize?", "back": "1919"}, {"front": "What was Woodrow Wilson's primary moral justification for entering World War I?", "back": "To make the world safe for democratic governance."}, {"front": "According to Woodrow Wilson, what is the only power capable of making the world safe for democracy?", "back": "American power"}, {"front": "What was Erich Maria Remarque's birth name?", "back": "Erich Paul Remark"}, {"front": "At what age was Erich Maria Remarque drafted into the German Army?", "back": "Eighteen"}, {"front": "On which military front did Erich Maria Remarque serve and receive wounds from shell fragments?", "back": "The Western Front"}, {"front": "List two of the various jobs Erich Maria Remarque held after World War I but before his literary success.", "back": "Journalist, racecar driver, or schoolteacher."}, {"front": "In what year was the novel 'All Quiet on the Western Front' published?", "back": "1929"}, {"front": "Whose perspective does Erich Maria Remarque use to narrate his famous novel?", "back": "An ordinary young German soldier"}, {"front": "What action did the Nazi regime take against Erich Maria Remarque's books in 1933?", "back": "The regime burned them."}, {"front": "What happened to Erich Maria Remarque's German citizenship in 1933?", "back": "It was revoked by the Nazi regime."}, {"front": "In what year did Erich Maria Remarque become a citizen of the United States?", "back": "1947"}, {"front": "Rather than using traditional logic, how does Erich Maria Remarque present his argument about war?", "back": "He shows the physical and psychological reality of combat and lets the reader draw conclusions."}, {"front": "What aspects of trench warfare does Remarque highlight to challenge 'noble' abstractions of war?", "back": "Mud, terror, and senseless death."}, {"front": "The source material contrasts the four writers by stating that Oliver Wendell Holmes Jr. celebrates what _____ condemns.", "back": "Smedley Butler"}, {"front": "The source material contrasts the four writers by stating that Woodrow Wilson justifies what _____ exposes.", "back": "Erich Maria Remarque"}, {"front": "What is the primary pedagogical goal of the book according to Section 2?", "back": "To provide tools for evaluating arguments and reaching individual conclusions about war."}, {"front": "According to Smedley Butler, what do ordinary soldiers pay with while insiders reap profits?", "back": "Their bodies, their minds, and their lives."}, {"front": "Woodrow Wilson's argument emphasizes that America fights for human rights rather than a war of _____.", "back": "Conquest"}, {"front": "What commonality exists between the wartime experiences of Holmes and Remarque?", "back": "Both were wounded while serving on the front lines of their respective wars."}, {"front": "Which of the four writers was a professional scholar and university president before entering politics?", "back": "Woodrow Wilson"}, {"front": "In which city in Germany was Erich Maria Remarque born?", "back": "Osnabrück"}, {"front": "Oliver Wendell Holmes Jr. was the son of a famous Boston _____.", "back": "Physician and writer"}, {"front": "Smedley Butler testified before _____ about the alleged conspiracy to overthrow the President.", "back": "Congress"}, {"front": "To which country did Erich Maria Remarque first emigrate after leaving Germany?", "back": "Switzerland"}, {"front": "Which of the four writers was the most decorated serviceman of his era?", "back": "Smedley Butler"}, {"front": "Woodrow Wilson was known as a _____ reformer who believed in democracy and international cooperation.", "back": "Progressive"}, {"front": "Holmes's argument suggests that war provides a 'devotion to a cause _____ than oneself'.", "back": "Greater"}, {"front": "Remarque's work is described as a challenge to every _____ about war, whether noble or necessary.", "back": "Abstraction"}, {"front": "At what age did Oliver Wendell Holmes Jr. enlist in the military?", "back": "Twenty"}, {"front": "Smedley Butler fought in which five locations mentioned in his biography?", "back": "Philippines, China, Central America, Haiti, and France."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
