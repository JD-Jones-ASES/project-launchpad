    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

                </div>
            </div>
        </div>

    <script>
    var CARDS = [{"front": "What silent question does an audience implicitly ask at the beginning of any argument?", "back": "The question is: \"Why should I listen to you?\" This addresses the speaker's credibility, character, and authority."}, {"front": "In rhetoric, what does the term \"ethos\" refer to?", "back": "Ethos is the credibility, character, and authority a speaker brings to the podium or argument."}, {"front": "What is the core foundation of Oliver Wendell Holmes Jr.'s ethos when speaking about war?", "back": "His personal sacrifice as a volunteer soldier who was wounded three times during the Civil War, giving him firsthand, painful experience."}, {"front": "What type of authority does Holmes' ethos represent?", "back": "The ethos of the volunteer, deriving authority from chosen sacrifice and direct, lived experience."}, {"front": "How does Holmes' personal history strengthen his argument regarding \"the soldier's faith\"?", "back": "Because he \"paid for that faith in blood,\" his audience finds his celebration of martial virtue far more difficult to dismiss than if it came from someone without combat experience."}, {"front": "According to the text, what is a potential weakness of Holmes' \"Volunteer\" ethos?", "back": "His experience was exceptional, not typical, meaning it might not represent the universal soldier's experience."}, {"front": "What is the core foundation of Smedley Butler's ethos when he denounces war as \"a racket\"?", "back": "His lifetime career as a highly decorated professional soldier (a two-time Medal of Honor recipient) who ultimately turned against the military institution he served."}, {"front": "What type of authority does Butler's ethos represent?", "back": "The ethos of the insider or whistle-blower, deriving authority from professional expertise turned against the institution."}, {"front": "How does Butler's distinguished military career as an \"insider\" give his denunciation of war particular force?", "back": "The audience expects a decorated general to defend the military; his attack on it instead creates surprise and lends enormous power to his words, as he knows the system from within."}, {"front": "According to the text, what is a potential weakness of Butler's \"Insider\" ethos?", "back": "Critics could question why he served for so long before speaking out against the system he now condemns."}, {"front": "What is the primary source of Woodrow Wilson's ethos when he asks Congress for a declaration of war, given he was not a soldier?", "back": "His positional authority as the President of the United States, speaking with the full weight of his office."}, {"front": "Beyond his office, what distinctive rhetorical element characterizes Wilson's ethos when he advocates for war?", "back": "The ethos of reluctance, emphasizing that he campaigned on peace, sought alternatives, and acts from a profound sense of moral duty, not eagerly."}, {"front": "What type of authority does Wilson's ethos represent?", "back": "The ethos of the statesman, combining positional power with perceived reluctance or moral duty."}, {"front": "How did Wilson's 1916 re-election slogan \"He Kept Us Out of War\" relate to his 1917 call for war, and what was its rhetorical effect?", "back": "It highlighted his reversal. If even the man who tried hardest to avoid war concluded it was necessary, the case for war seemed exceptionally strong to the audience."}, {"front": "According to the text, what is a potential weakness of Wilson's \"Statesman\" ethos?", "back": "He has never personally experienced what he is asking others to endure, potentially creating a disconnect with those who fight."}, {"front": "Define \"appeal to authority\" in a rhetorical context.", "back": "An argument that draws its persuasive force from the speaker's credentials, experience, or position rather than from evidence or logic alone."}, {"front": "When does an appeal to authority become problematic or fallacious?", "back": "When the authority cited is irrelevant to the claim being made, or when the appeal substitutes for evidence that should be provided."}, {"front": "What is the core foundation of Erich Maria Remarque's ethos regarding war, distinguishing him from Holmes and Butler?", "back": "His experience as an ordinary conscript drafted into the Imperial German Army, making him a representative witness of the common soldier's experience rather than a volunteer or career professional."}, {"front": "What type of authority does Remarque's ethos represent?", "back": "The ethos of the witness, deriving authority from representative or typical experience and speaking for the common person."}, {"front": "How does Remarque's \"typicality\" (as an ordinary conscript) contribute to his authority, especially when compared to Holmes' \"choice\"?", "back": "Remarque speaks for the millions of ordinary soldiers swept up by forces beyond their control, representing a common experience that Holmes, Butler, and Wilson lack, giving him authority from representativeness."}, {"front": "According to the text, what is a potential weakness of Remarque's \"Witness\" ethos?", "back": "He primarily offers testimony, which alone cannot settle complex policy questions, lacking the argumentative structure of others."}, {"front": "In \"The Ethos Spectrum,\" what is the primary strength of Holmes' \"Volunteer\" ethos?", "back": "No one can accuse him of cowardice, as his authority comes from chosen sacrifice and direct combat experience."}, {"front": "What is the main strength of Butler's \"Insider\" ethos?", "back": "He knows the military system from within, making his critique highly informed and authoritative because he was its most decorated servant."}, {"front": "What is the main strength of Wilson's \"Statesman\" ethos?", "back": "He speaks with the full weight and authority of the presidency behind him."}, {"front": "What is the main strength of Remarque's \"Witness\" ethos?", "back": "He speaks for the common soldier, providing a representative perspective of shared experience often missing from other accounts."}, {"front": "Which of the four forms of ethos discussed (Volunteer, Insider, Statesman, Witness) is inherently superior to the others?", "back": "None. Each carries real weight and real limitations, and none is inherently superior; their effectiveness depends on the argument being made."}, {"front": "What is the critical reader's task when analyzing different forms of ethos, rather than deciding which is \"best\"?", "back": "To understand how each writer's particular authority shapes the argument he is able to make, and what it allows—or prevents—him from saying."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
