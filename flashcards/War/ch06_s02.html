<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the context of rhetoric, what is the definition of 'ethos'?", "back": "The credibility, character, and authority a speaker brings to an argument."}, {"front": "According to the text, every argument begins with what silent question from the audience?", "back": "Why should I listen to you?"}, {"front": "Oliver Wendell Holmes Jr. was a graduate of which university before enlisting in the Civil War?", "back": "Harvard."}, {"front": "What was the name of the infantry regiment Oliver Wendell Holmes Jr. joined as a lieutenant?", "back": "The Twentieth Massachusetts Volunteer Infantry."}, {"front": "How many times was Oliver Wendell Holmes Jr. wounded during the Civil War?", "back": "Three times."}, {"front": "At which 1861 battle was Oliver Wendell Holmes Jr. shot through the chest?", "back": "Ball's Bluff."}, {"front": "At which 1862 battle was Oliver Wendell Holmes Jr. shot through the neck?", "back": "Antietam."}, {"front": "At which 1862 battle was Oliver Wendell Holmes Jr. shot in the heel?", "back": "Fredericksburg."}, {"front": "What is the primary foundation of Oliver Wendell Holmes Jr.'s ethos?", "back": "Personal sacrifice and physical experience of war rather than library theory."}, {"front": "Concept: Holmes' Ethos", "back": "Definition: The ethos of the volunteer who chose to walk toward danger and paid for his faith in blood."}, {"front": "How did the 30 years Holmes spent with his scars affect his ethos in his 1895 Harvard speech?", "back": "It provided a lasting physical foundation for his authority on martial virtue."}, {"front": "What is the specific rhetorical strength of the 'Volunteer' ethos?", "back": "The speaker cannot be easily accused of cowardice or lack of commitment."}, {"front": "What is the primary weakness of the 'Volunteer' ethos represented by Holmes?", "back": "The speaker's experience is often exceptional rather than typical of the common soldier."}, {"front": "How many continents did Smedley Butler serve in during his military career?", "back": "Four continents."}, {"front": "Which military honor did Smedley Butler receive twice during his career?", "back": "The Medal of Honor."}, {"front": "What rhetorical term describes the foundation of Smedley Butler's authority?", "back": "Insider betrayal."}, {"front": "What famous and provocative term did Smedley Butler use to describe war?", "back": "\"A racket.\""}, {"front": "Concept: Butler's Ethos", "back": "Definition: The ethos of the whistle-blower who knows an institution from the inside and declares it corrupt."}, {"front": "Why does Smedley Butler's denunciation of war carry such 'enormous force'?", "back": "The audience does not expect a highly decorated general to attack the institution that honored him."}, {"front": "What is the rhetorical strength of the 'Insider' ethos?", "back": "The speaker possesses intimate, professional knowledge of the system from within."}, {"front": "What is the rhetorical weakness of the 'Insider' ethos?", "back": "Critics may question why the speaker served the institution for so long before speaking out."}, {"front": "In what way is Woodrow Wilson's background different from Holmes's or Butler's?", "back": "He was a man of words—a scholar and university president—rather than a soldier."}, {"front": "From what source does Woodrow Wilson's primary ethos derive?", "back": "His positional authority as the President of the United States."}, {"front": "What secondary layer did Wilson add to his positional authority to make his ethos distinctive?", "back": "The ethos of reluctance."}, {"front": "What was the 1916 re-election slogan that Woodrow Wilson had to reverse in 1917?", "back": "\"He Kept Us Out of War.\""}, {"front": "Why is the figure of the 'reluctant warrior' powerful in rhetoric?", "back": "If an advocate for peace concludes war is necessary, the case appears exceptionally strong."}, {"front": "Concept: Wilson's Ethos", "back": "Definition: The ethos of the statesman whose duty compels him to act against his own personal inclinations."}, {"front": "Term: Appeal to Authority", "back": "Definition: An argument that draws persuasive force from a speaker's credentials, experience, or position."}, {"front": "Under what condition does an appeal to authority become rhetorically problematic?", "back": "When the authority is irrelevant to the claim or is used as a substitute for necessary evidence."}, {"front": "What is the rhetorical weakness of the 'Statesman' ethos?", "back": "The speaker has never personally experienced the hardships they are asking others to endure."}, {"front": "Unlike Holmes, Erich Maria Remarque did not choose to serve; he was a _____.", "back": "Conscript (or draftee)."}, {"front": "In which army did Erich Maria Remarque serve during World War I?", "back": "The Imperial German Army."}, {"front": "What age was Erich Maria Remarque when he was drafted and sent to the Western Front?", "back": "Eighteen."}, {"front": "Where did Remarque spend the remainder of World War I after being wounded in 1917?", "back": "In a military hospital."}, {"front": "What is the foundation of Remarque's authority?", "back": "Representativeness (or the common experience of the ordinary soldier)."}, {"front": "In the context of ethos, what does 'typicality' refer to?", "back": "The ability to speak for the common experience rather than an exceptional one."}, {"front": "Concept: Remarque's Ethos", "back": "Definition: The ethos of the witness who survived an experience to tell the truth for those who lack words."}, {"front": "What is the rhetorical strength of the 'Witness' ethos?", "back": "The speaker represents the common soldier rather than the elite or the exceptional."}, {"front": "What is the rhetorical weakness of the 'Witness' ethos?", "back": "It offers only testimony, which alone cannot settle a policy question."}, {"front": "On the 'Ethos Spectrum,' which figure represents authority from chosen sacrifice?", "back": "Holmes (The Volunteer)."}, {"front": "On the 'Ethos Spectrum,' which figure represents authority from professional expertise turned against an institution?", "back": "Butler (The Insider)."}, {"front": "On the 'Ethos Spectrum,' which figure represents authority from office and reluctance?", "back": "Wilson (The Statesman)."}, {"front": "On the 'Ethos Spectrum,' which figure represents authority from representative experience?", "back": "Remarque (The Witness)."}, {"front": "According to the text, what is the 'critical reader's task' when evaluating ethos?", "back": "To understand how a writer's authority shapes and limits the argument they can make."}, {"front": "How does Holmes's 'volunteer' ethos specifically shape his rhetorical capabilities?", "back": "It allows him to celebrate the virtues of war."}, {"front": "How does Butler's 'insider' ethos specifically shape his rhetorical capabilities?", "back": "It allows him to condemn the economic 'racket' of war."}, {"front": "How does Wilson's 'positional' ethos specifically shape his rhetorical capabilities?", "back": "It allows him to call an entire nation to arms."}, {"front": "How does Remarque's 'witness' ethos specifically shape his rhetorical capabilities?", "back": "It allows him to show the human realities that other forms of authority might omit."}, {"front": "Why is Holmes's celebration of martial virtue described as 'difficult to dismiss'?", "back": "Because his authority rests on the fact that he personally paid for his beliefs in blood."}, {"front": "The power of Smedley Butler's ethos lies in the _____, as he attacks the institution that decorated him.", "back": "Reversal."}, {"front": "On what date did Woodrow Wilson stand before Congress to ask for a declaration of war?", "back": "April 2, 1917."}, {"front": "What kind of injury did Erich Maria Remarque sustain on the Western Front?", "back": "A shrapnel wound."}, {"front": "Why might Holmes be considered to have more authority than Remarque if ethos is defined by 'choice'?", "back": "Holmes deliberately decided to put himself in harm's way, while Remarque was forced."}, {"front": "Why might Remarque be considered more authoritative than Holmes if ethos is defined by 'typicality'?", "back": "Remarque speaks for the millions of young men sent to fight by governments, which is the more common experience."}, {"front": "According to the text, what does each speaker's particular authority both 'allow' and 'prevent'?", "back": "What they are able to say versus what they are prohibited from saying."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
