    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;

        }

        /* Card */

            perspective: 1000px;

            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);

            background: var(--card-background);

            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;

        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "According to the text, what is the definition of 'ethos'?", "back": "The credibility, character, and authority a speaker brings to the podium."}, {"front": "What silent question from the audience does ethos aim to answer at the start of an argument?", "back": "Why should I listen to you?"}, {"front": "In the context of rhetorical authority, what was the 'foundation' of Oliver Wendell Holmes Jr.'s ethos?", "back": "His personal experience and physical sacrifice as a wounded soldier."}, {"front": "In which regiment did Oliver Wendell Holmes Jr. serve during the Civil War?", "back": "The Twentieth Massachusetts Volunteer Infantry."}, {"front": "What was Oliver Wendell Holmes Jr.'s military rank when he enlisted?", "back": "Lieutenant."}, {"front": "Name the three battles where Oliver Wendell Holmes Jr. was wounded.", "back": "Ball's Bluff, Antietam, and Fredericksburg."}, {"front": "At which battle was Oliver Wendell Holmes Jr. shot through the chest?", "back": "Ball's Bluff (1861)."}, {"front": "At which battle was Oliver Wendell Holmes Jr. shot through the neck?", "back": "Antietam (1862)."}, {"front": "At which battle was Oliver Wendell Holmes Jr. shot in the heel?", "back": "Fredericksburg (1862)."}, {"front": "Why does the text describe Holmes' ethos as the 'ethos of the volunteer'?", "back": "Because he chose to walk toward danger despite having the social standing to avoid the war."}, {"front": "Concept: Holmes' Ethos", "back": "Definition: Authority derived from personal sacrifice and the choice to fight."}, {"front": "What is identified as the primary strength of Holmes' 'Volunteer' authority?", "back": "No one can accuse him of cowardice because he paid for his faith in blood."}, {"front": "What is identified as the primary weakness of Holmes' 'Volunteer' authority?", "back": "His experience was exceptional and elite rather than typical of the average soldier."}, {"front": "How does Smedley Butler's ethos differ fundamentally from that of Oliver Wendell Holmes Jr.?", "back": "Butler is a career professional who turned against the system, rather than a volunteer reflecting on virtue."}, {"front": "How many times did Smedley Butler receive the Medal of Honor?", "back": "Twice."}, {"front": "What specific term does Smedley Butler use to denounce war?", "back": "A racket."}, {"front": "Concept: Butler's Ethos", "back": "Definition: Authority derived from 'insider betrayal' or whistle-blowing against an institution one served."}, {"front": "What is the primary strength of Smedley Butler's 'Insider' authority?", "back": "He knows the system from within as one of its most decorated servants."}, {"front": "What is the primary weakness of Smedley Butler's 'Insider' authority?", "back": "Critics can question why he served for over thirty years before speaking out."}, {"front": "Why is Smedley Butler's denunciation of war described as 'devastating'?", "back": "The audience expects a decorated general to defend the institution that honored him."}, {"front": "How does Woodrow Wilson's background differ from that of Holmes and Butler regarding combat?", "back": "Wilson was not a soldier; he was a scholar, university president, and politician."}, {"front": "What are the two components that create Woodrow Wilson's distinctive ethos?", "back": "Positional power (the Presidency) and moral reluctance."}, {"front": "What was Woodrow Wilson's 1916 re-election campaign slogan?", "back": "He Kept Us Out of War."}, {"front": "Why does Wilson emphasize his 'reluctance' to go to war in his 1917 address to Congress?", "back": "To suggest that if even a man dedicated to peace concludes war is necessary, the case must be undeniable."}, {"front": "Concept: Wilson's Ethos", "back": "Definition: Authority derived from high office and the performance of duty against personal inclination."}, {"front": "What is the primary strength of Woodrow Wilson's 'Statesman' authority?", "back": "The full weight and prestige of the Office of the President of the United States."}, {"front": "What is the primary weakness of Woodrow Wilson's 'Statesman' authority?", "back": "He has never personally experienced the combat he is asking others to endure."}, {"front": "In rhetorical terms, what is the 'reluctant warrior' figure?", "back": "A speaker who acts against their own peaceful inclinations out of a profound sense of moral duty."}, {"front": "Term: Appeal to Authority", "back": "Definition: An argument that derives persuasive force from the speaker's credentials, experience, or position."}, {"front": "Under what condition does an appeal to authority become problematic or fallacious?", "back": "When the cited authority is irrelevant to the claim or substitutes for necessary evidence."}, {"front": "How did Erich Maria Remarque's entry into the military differ from Oliver Wendell Holmes Jr.'s?", "back": "Remarque was a conscript (drafted) at eighteen, whereas Holmes was a volunteer."}, {"front": "In which army did Erich Maria Remarque serve during World War I?", "back": "The Imperial German Army."}, {"front": "What type of injury did Remarque sustain on the Western Front?", "back": "Wounds from shrapnel."}, {"front": "The authority Remarque possesses is based on 'typicality' or _____.", "back": "Representativeness."}, {"front": "Concept: Remarque's Ethos", "back": "Definition: Authority derived from being an ordinary witness to common experience rather than an exceptional figure."}, {"front": "What is the primary strength of Remarque's 'Witness' authority?", "back": "He speaks for the millions of common soldiers who lacked the words to tell their own truth."}, {"front": "What is the primary weakness of Remarque's 'Witness' authority?", "back": "He offers only testimony, which cannot settle broad policy or political questions."}, {"front": "Why is Remarque's ordinariness considered a source of authority?", "back": "It allows him to represent the majority of soldiers sent to fight for reasons they barely understand."}, {"front": "Which historical figure's ethos is defined as 'The Volunteer'?", "back": "Oliver Wendell Holmes Jr."}, {"front": "Which historical figure's ethos is defined as 'The Insider'?", "back": "Smedley Butler."}, {"front": "Which historical figure's ethos is defined as 'The Statesman'?", "back": "Woodrow Wilson."}, {"front": "Which historical figure's ethos is defined as 'The Witness'?", "back": "Erich Maria Remarque."}, {"front": "According to the 'Ethos Spectrum,' what does Holmes' authority allow him to do rhetorically?", "back": "Celebrate the virtues of martial life and the soldier's faith."}, {"front": "According to the 'Ethos Spectrum,' what does Butler's authority allow him to do rhetorically?", "back": "Condemn the economic motivations (the 'racket') behind warfare."}, {"front": "According to the 'Ethos Spectrum,' what does Wilson's authority allow him to do rhetorically?", "back": "Call an entire nation to arms from a position of duty."}, {"front": "According to the 'Ethos Spectrum,' what does Remarque's authority allow him to do rhetorically?", "back": "Show the raw, common human experience that other rhetorical perspectives leave out."}, {"front": "True or False: One form of ethos in the spectrum is inherently superior to the others.", "back": "False (each has weight and limitations depending on the argument's purpose)."}, {"front": "What distinguishes the 'Witness' from the 'Volunteer' regarding the role of 'choice'?", "back": "The Volunteer's authority comes from choosing to fight; the Witness's authority comes from enduring a fight they did not choose."}, {"front": "Woodrow Wilson's reversal of his campaign promise 'He Kept Us Out of War' is an example of what rhetorical strategy?", "back": "The ethos of reluctance."}, {"front": "What is the 'surprise' element in Smedley Butler's ethos?", "back": "The fact that a highly decorated, career military professional is attacking the military institution."}, {"front": "How does the text define the 'critical reader's task' regarding ethos?", "back": "To understand how a writer's specific authority shapes and limits the argument they make."}, {"front": "Oliver Wendell Holmes Jr. was the son of one of the most famous _____ in America.", "back": "Writers."}, {"front": "How long had Oliver Wendell Holmes Jr. lived with his war scars before giving his 1895 Harvard speech?", "back": "Thirty years."}, {"front": "Smedley Butler's career spanned more than _____ decades and four continents.", "back": "Three."}, {"front": "In what year did Woodrow Wilson stand before Congress to ask for a declaration of war?", "back": "1917."}, {"front": "What age was Erich Maria Remarque when he was conscripted into the army?", "back": "Eighteen."}, {"front": "Where did Erich Maria Remarque spend the remainder of the war after being wounded in July 1917?", "back": "A military hospital."}, {"front": "Holmes' authority rests on the fact that he paid for his faith in _____.", "back": "Blood."}, {"front": "The text states that Butler was speaking not as a _____ who never held a rifle, but as a career warrior.", "back": "Pacifist."}, {"front": "What makes an appeal to authority reasonable rather than fallacious?", "back": "When we defer to experts in their specific fields for relevant claims."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
