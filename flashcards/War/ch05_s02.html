<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary focus of 'reception history'?", "back": "How a text, speech, or idea was received and used by successive audiences over time."}, {"front": "Beyond logical merit, what factors determine if an argument succeeds or fails in the 'arena of history'?", "back": "Timing, power, audience, and circumstance."}, {"front": "Reception history examines not just the writer's intent, but how later generations ______, applied, or rejected the work.", "back": "Understood"}, {"front": "Which historical figure's argument dominated American foreign policy throughout the twentieth century?", "back": "Woodrow Wilson"}, {"front": "Term: Internationalism", "back": "Definition: The principle of cooperation among nations, often involving active engagement in world affairs rather than isolation."}, {"front": "According to Wilson's framework, the United States has a moral obligation to defend ______ abroad.", "back": "Democracy"}, {"front": "Wilson's framework suggests that American power should serve American ______.", "back": "Ideals"}, {"front": "When Franklin Roosevelt asked for a declaration of war in 1941, he echoed Wilson's language of ______ necessity.", "back": "Moral"}, {"front": "How did Harry Truman frame the conflict when committing American forces to Korea in 1950?", "back": "As a defense of freedom against communist aggression."}, {"front": "Which U.S. President declared that America would 'pay any price, bear any burden' to defend liberty?", "back": "John F. Kennedy"}, {"front": "Smedley Butler's central claim in his argument against war was that war is always a ______.", "back": "Racket"}, {"front": "Why did Butler's antiwar message resonate with the American public in the 1930s?", "back": "The public was determined to stay out of another European conflict."}, {"front": "What specific historical reality in the 1940s undercut Butler's claim that war is always a scheme for profit?", "back": "The existence of a war against Hitler that appeared clearly justified."}, {"front": "Butler's argument found a new and enormous audience during which 20th-century conflict?", "back": "The Vietnam War"}, {"front": "According to Butler's critique, who bears the costs of war disproportionately?", "back": "The poor and working class."}, {"front": "In Butler's 'racket' framework, who earns record profits while the poor bear the cost of war?", "back": "Defense contractors"}, {"front": "Butler's central insight is that war serves ______ interests disguised as patriotic ones.", "back": "Economic"}, {"front": "Despite being a Marine Corps general, Smedley Butler became a hero of which movement?", "back": "The peace movement"}, {"front": "What term describes Oliver Wendell Holmes' vision of war as a forge of virtue?", "back": "Martial idealism"}, {"front": "According to Holmes, what is the effect of military service on an individual's character?", "back": "It builds character and reveals the best in human beings."}, {"front": "Where does Holmes' martial idealism persist most strongly in modern American society?", "back": "In military culture and memorial ceremonies."}, {"front": "Holmes argued that a society needs the ______ of war to stay morally strong.", "back": "Disciplines"}, {"front": "What widespread cultural belief in America is a subtle, non-military form of Holmes' argument?", "back": "The belief that hardship and adversity build character."}, {"front": "How did Erich Maria Remarque's novel 'All Quiet on the Western Front' influence the cultural perception of war?", "back": "It shifted the dominant literary image of war from heroic to one of mud, terror, and waste."}, {"front": "Before Remarque, what was the dominant literary image of war?", "back": "Heroic images of knights, cavalrymen, and glorious last stands."}, {"front": "After Remarque, the focus of war literature shifted toward the mud, the terror, and the ______.", "back": "Waste"}, {"front": "Key Concept: Rhetoric and Historical Timing", "back": "Definition: The principle that an argument's success depends on meeting the needs of an audience at a specific historical moment."}, {"front": "Why was Smedley Butler's argument largely ignored in 1941?", "back": "The public was not ready to hear that the war against fascism was a racket."}, {"front": "When does Butler's critique typically surge back into public consciousness?", "back": "Whenever a war's justification begins to crumble."}, {"front": "Under what condition does Holmes' martial idealism typically fade from the public eye?", "back": "Whenever the costs of war become visible."}, {"front": "When does Remarque's testimony gain power in the public discourse?", "back": "Whenever people need to be reminded of the human cost of abstractions like 'democracy.'"}, {"front": "The ability to distinguish ______ from testimony is a key tool for navigating debates about war.", "back": "Argument"}, {"front": "What does the text suggest about the 'permanent winner' of the debate between these four voices?", "back": "No argument is the permanent winner because every generation must decide which holds up."}, {"front": "According to the text, Wilson's internationalism became the 'operating ______' for American foreign policy.", "back": "Framework"}, {"front": "Which argument's revival during the Vietnam War proved that it was not permanently defeated by its 1941 rejection?", "back": "Butler's 'War Is a Racket' argument."}, {"front": "Holmes' argument persists in the way politicians talk about veterans, such as praising the ______ generation.", "back": "Greatest"}, {"front": "In the context of rhetorical analysis, what are the three modes of persuasion mentioned as tools to evaluate these arguments?", "back": "Ethos, pathos, and logos."}, {"front": "What did Remarque's novel do that was more lasting than shaping foreign policy?", "back": "It shaped how millions of people imagine war."}, {"front": "Wilson's triumph in 1917 was possible because the public was ready for a ______ justification for war.", "back": "Moral"}, {"front": "According to the text, a society often returns to Holmes' martial idealism when it feels ______.", "back": "Threatened"}, {"front": "Butler's pamphlet became a defining resource for which specific movement in the 1960s?", "back": "The antiwar movement"}, {"front": "In the study of reception history, the focus is on the ______ rather than the author's original intent.", "back": "Audience"}, {"front": "Remarque's work serves as a reminder of what abstractions cost in ______.", "back": "Blood"}, {"front": "True or False: According to the text, an argument fails only if it lacks logical merit.", "back": "False (it also depends on history, timing, power, and audience)."}, {"front": "What rhetorical tool is used to identify what is missing from an argument?", "back": "Detecting omissions and blind spots."}, {"front": "Which of the four figures provided a 'martial expression' to the idea that adversity builds character?", "back": "Oliver Wendell Holmes Jr."}, {"front": "In terms of timing, why was Wilson's argument effective in 1917?", "back": "The public was ready for a moral justification for entering the war."}, {"front": "Butler's question 'Who ______?' became a defining question for the Vietnam generation.", "back": "Profits"}, {"front": "Wilsonian internationalism is defined by the belief that U.S. power should serve global ______.", "back": "Democracy"}, {"front": "The 'arena of history' determines which ideas take hold and which are pushed to the ______.", "back": "Margins"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
