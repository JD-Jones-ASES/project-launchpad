    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What factors, beyond logical merits, determine whether an argument succeeds or fails in history?", "back": "Timing, power, audience, and circumstance."}, {"front": "Define \"Reception History.\"", "back": "The study of how a text, speech, or idea was received, interpreted, and used by successive audiences over time, examining not just what a writer intended but how later generations understood, applied, or rejected the work."}, {"front": "What was the core of Wilson's argument regarding American foreign policy?", "back": "The idea that the United States has a moral obligation to defend democracy abroad and that American power should serve American ideals."}, {"front": "How did Wilson's argument influence American internationalism throughout the 20th century?", "back": "It became the operating framework for American internationalism, shaping the belief that the U.S. should actively engage in world affairs for moral purposes."}, {"front": "Provide examples of 20th-century presidents who echoed Wilson's foreign policy framework.", "back": "Franklin Roosevelt (WWII), Harry Truman (Korean War), and John F. Kennedy (inaugural address) all used language of moral necessity and defense of liberty."}, {"front": "Define \"Internationalism\" in the American context.", "back": "The principle or policy of cooperation among nations, especially in political and economic matters, often referring to the belief that the United States should actively engage in world affairs rather than remaining isolated."}, {"front": "Why was Butler's antiwar argument largely marginalized for decades after the 1930s?", "back": "During World War II, a war widely seen as genuinely necessary against Hitler, his blanket condemnation of all war as a 'racket' seemed inadequate and was largely rejected."}, {"front": "What historical event led to a significant revival and widespread acceptance of Butler's argument, \"War Is a Racket\"?", "back": "The Vietnam War (1960s and 1970s), which many Americans perceived as a conflict fought for unclear reasons, with disproportionate costs, and record profits for defense contractors."}, {"front": "What was Butler's central insight that became a standard element of antiwar rhetoric across the political spectrum?", "back": "That war serves economic interests disguised as patriotic ones, often encapsulated in his question, 'who profits?'"}, {"front": "What was the central idea of Holmes' \"martial idealism\"?", "back": "That military service builds character, combat tests and reveals the best in human beings, and society needs the disciplines of war to stay morally strong."}, {"front": "In what ways does Holmes' argument persist in American culture, even if not official government policy?", "back": "It persists in military culture, memorial ceremonies, the way many Americans talk about veterans and service (e.g., 'the greatest generation'), and the broader belief that hardship builds character."}, {"front": "How does Holmes' idea connect to the broader cultural belief about hardship and character?", "back": "Holmes gave a specifically martial expression to the widespread belief that hardship and adversity build character, shaping how many Americans think about courage, sacrifice, and serving something larger than oneself."}, {"front": "What was Remarque's significant contribution to how war is perceived through his novel *All Quiet on the Western Front*?", "back": "He shaped how millions imagine war, shifting the dominant literary image from heroic tales to the mud, terror, and waste of combat."}, {"front": "How did Remarque's depiction of war differ from the dominant literary image before him?", "back": "Before Remarque, the dominant literary image of war was heroic (knights, brave charges, glorious stands). After him, it shifted toward the brutal realities, suffering, and futility of war."}, {"front": "What lasting impact did *All Quiet on the Western Front* have on cultural representations of war?", "back": "Every antiwar novel, film, and poem written since 1929 owes something to what Remarque accomplished, establishing a new paradigm for war literature."}, {"front": "Explain the concept of \"Rhetoric and Historical Timing\" as it applies to the success of an argument.", "back": "It means that the success or failure of a rhetorical argument depends not only on its quality but also on whether it meets the needs of its audience at a particular historical moment."}, {"front": "How do Wilson's and Butler's arguments exemplify the principle of historical timing in rhetoric?", "back": "Wilson's argument succeeded in 1917 because the public was ready for a moral justification for war, while Butler's was ignored in 1941 but surged back during Vietnam when the public's perception of war had changed."}, {"front": "Why should we be cautious about declaring any argument the permanent \"winner\" of a debate, especially concerning war?", "back": "Because arguments' effectiveness is not permanent; they can surge or fade depending on changing historical contexts, societal needs, and public perception of war's costs or justifications."}, {"front": "According to the text, why is the debate among these four voices (Wilson, Butler, Holmes, Remarque) considered \"never over\"?", "back": "Every new war reopens the same questions about its purpose, costs, and justifications, requiring each generation to re-evaluate which arguments hold up and which do not."}, {"front": "What rhetorical analysis tools are highlighted as essential for navigating ongoing debates about war?", "back": "The ability to identify ethos, pathos, and logos; to detect omissions and blind spots; and to distinguish argument from testimony."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
