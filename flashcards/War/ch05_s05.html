<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Remarque’s perspective on war differ from the orators, generals, and presidents mentioned in the text?", "back": "He provides the perspective of an ordinary soldier experiencing combat directly rather than from a position of authority."}, {"front": "In the context of World War I, what was 'no man's land'?", "back": "The narrow strip of devastated ground separating the opposing trenches."}, {"front": "Approximately how long was the Western Front during World War I?", "back": "440 miles."}, {"front": "Which 1916 battle resulted in over a million casualties while moving the front line only six miles?", "back": "The Battle of the Somme."}, {"front": "Why does the text include Remarque's fiction in a book about rhetorical arguments over war?", "back": "It provides a visceral, internal experience of combat that abstract rhetorical claims cannot convey."}, {"front": "According to the excerpt, what do the soldiers see stacked against a shelled school-house that signals an upcoming offensive?", "back": "A high double wall of brand-new coffins."}, {"front": "Why are the German soldiers' own shells falling into their trenches in the Remarque excerpt?", "back": "The artillery barrels are worn out, making the shots uncertain."}, {"front": "Concept: Chance", "back": "The belief that survival in the trenches is purely random and cannot be determined by a soldier's actions."}, {"front": "How does the reliance on 'Chance' affect the psychological state of the soldiers?", "back": "It makes them indifferent to the dangers surrounding them."}, {"front": "What specific animal infestation in the trenches is described as 'repulsive' and 'shocking'?", "back": "Corpse-rats."}, {"front": "What sign do the soldiers interpret as a 'sure sign of a coming bombardment' regarding the rats?", "back": "The rats become much more numerous and aggressive."}, {"front": "In the trenches, why was the appearance of Edamer cheese considered a 'vile' sign?", "back": "It was traditionally served when the command expected heavy casualties."}, {"front": "Why do the experienced soldiers advise the recruits to exchange their saw-edged bayonets for ordinary ones?", "back": "If the enemy catches a man with a saw-bayonet, they will kill him on sight as a form of retaliation."}, {"front": "According to the narrator, why is the sharpened spade a better weapon than the bayonet in trench combat?", "back": "It is more versatile, heavier for striking, and does not get jammed like a bayonet blade."}, {"front": "Term: Dug-out", "back": "An underground shelter in a trench used for protection from artillery bombardment."}, {"front": "What is the primary sensory signal the soldiers monitor to track enemy movements behind the lines?", "back": "The ceaseless rolling of transports, trains, and lorries."}, {"front": "How does Kat describe the feeling of the upcoming battle compared to past experiences?", "back": "He predicts it will be as devastating as the Battle of the Somme."}, {"front": "What metaphor does the narrator use to describe the front lines for the soldiers awaiting attack?", "back": "A cage."}, {"front": "What psychological condition causes a recruit to try and rush out of the dug-out during heavy shelling?", "back": "Claustrophobia."}, {"front": "How does the narrator contrast his experience with Oliver Wendell Holmes’ 'soldier's faith'?", "back": "He describes a state of desperate survival rather than a school of virtue or heroic endurance."}, {"front": "What is the narrator's counter-point to Woodrow Wilson’s claim that war is for a 'world safe for democracy'?", "back": "The soldiers on both sides suffer identical horrors, regardless of the political justifications used by their leaders."}, {"front": "How does Remarque’s", "back": "It shows that for the man in the trench, the question of who profits is distant and irrelevant compared to immediate survival."}, {"front": "What happens to the first recruit who successfully escapes the dug-out during the bombardment?", "back": "He is killed by a shell, leaving only 'lumps of flesh' on the trench wall."}, {"front": "Why is it significant that 'food is as important as ammunition' in the eyes of the command?", "back": "It is necessary to maintain the physical ability and morale of the soldiers to continue fighting."}, {"front": "Term: Parapet", "back": "The raised bank of earth at the front edge of a trench providing cover from enemy fire."}, {"front": "The narrator notes that the hollow, furious blast of a shell landing in a trench is like a blow from the ____.", "back": "Paw of a raging beast of prey"}, {"front": "What action do the experienced soldiers take to stop the rats from eating their bread?", "back": "They create a heap of gnawed scraps and strike at the rats with spades when they gather."}, {"front": "What weapon, first used by Germany in 1915, was among the most feared in trench warfare?", "back": "Flame-throwers."}, {"front": "Why does the narrator believe that no soldier outlives 'a thousand chances'?", "back": "The environment is so lethal that luck eventually runs out, regardless of skill."}, {"front": "What is the primary reason the recruits' faces are described as 'green and vomiting' in the morning?", "back": "Inexperience and the overwhelming physical effect of the heavy bombardment."}, {"front": "How does the text define the 'Limits of Argument' regarding war?", "back": "Arguments provide frameworks for meaning, but the physical reality of war is too chaotic to be fully contained by them."}, {"front": "The narrator observes that their trench is nearly destroyed by the bombardment, at some points reaching a height of only ____.", "back": "Eighteen inches"}, {"front": "According to the text, why do historians cite Remarque's novel despite it being fiction?", "back": "It captures an authentic emotional and physical truth of the war that statistics cannot convey."}, {"front": "What does the narrator do with his bread crust to make it last longer during the food shortage?", "back": "He puts it back in his knapsack and nibbles on it from time to time."}, {"front": "What physical manifestation of fear does the narrator observe in a recruit before he has a psychological 'fit'?", "back": "Grinding teeth and opening and shutting fists."}, {"front": "How do the experienced soldiers respond to the recruit's 'fit' to prevent it from spreading to others?", "back": "They give him 'a hiding' (a physical beating) to bring him back to his senses."}, {"front": "What is the role of the 'listening-post'?", "back": "A forward position where a soldier watches and listens for enemy activity during the night."}, {"front": "The narrator describes the sky as being 'hung with ____' during the day, signifying constant surveillance.", "back": "Observation balloons"}, {"front": "Why does the narrator say he and his comrades 'avoid each other's eyes' during the wait for the offensive?", "back": "They share a silent, mutual understanding of the impending terror and exhaustion."}, {"front": "What happened to the men in the next sector who were found with their own 'saw-bayonets'?", "back": "Their noses were cut off, eyes poked out, and mouths stuffed with sawdust."}, {"front": "Kat is described as an 'old front-hog,' which means he is a _____.", "back": "Veteran soldier with a keen instinct for survival and the coming of attacks"}, {"front": "What does the narrator mean when he says, 'The organization surpasses itself in that kind of thing' regarding the coffins?", "back": "He is sarcastically noting that the military is more efficient at preparing for death than providing for life."}, {"front": "According to the narrator, what is the 'most dementing convulsion of all' during a bombardment?", "back": "The explosion of mines."}, {"front": "During the night, why do the soldiers almost attack one another in the dug-out?", "back": "They are triggered by a swarm of fleeing rats, which releases their built-up madness and despair."}, {"front": "How many soldiers were killed or wounded in the Battle of the Somme?", "back": "Over one million."}, {"front": "What does the narrator use to keep himself awake during his shift at the listening-post?", "back": "He works his toes in his boots."}, {"front": "What specific item is brought up by three lucky soldiers that temporarily reassures the recruits?", "back": "A loaf of bread."}, {"front": "Why is the bombardment described as turning 'an old soldier's hair grey'?", "back": "To emphasize the unprecedented intensity and psychological toll of the artillery fire."}, {"front": "The narrator states that they sit in the dug-out 'as if in our ____ waiting only to be closed in.'", "back": "Graves"}, {"front": "What does the narrator identify as the challenge posed to the reader of the book *At the Table*?", "back": "To take rhetorical arguments seriously while never losing sight of the concrete reality of war."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
