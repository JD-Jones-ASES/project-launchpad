<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 5, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is the author of the 1929 novel \"All Quiet on the Western Front\"?", "back": "Erich Maria Remarque."}, {"front": "What event in Erich Maria Remarque's life provided the basis for his novel?", "back": "His experience as a German soldier drafted to the Western Front in World War I."}, {"front": "Who is the protagonist of \"All Quiet on the Western Front\"?", "back": "Paul Bäumer."}, {"front": "Why did Paul Bäumer and his classmates enlist in the army?", "back": "They were swept up by the patriotic speeches of their schoolteacher."}, {"front": "What was the Nazi party's reaction to Remarque's work in 1933?", "back": "They burned his books and revoked his German citizenship."}, {"front": "What unique perspective does Remarque provide compared to orators like Holmes or Wilson?", "back": "He takes the reader inside the immediate, physical experience of combat in the trenches."}, {"front": "Describe the physical extent of the Western Front during World War I.", "back": "A 440-mile line of trenches stretching from the English Channel to the Swiss border."}, {"front": "What was \"no man's land\"?", "back": "The narrow strip of devastated ground that separated opposing enemy trenches."}, {"front": "What was the human cost of the Battle of the Somme (1916) in relation to the ground gained?", "back": "Over one million casualties were suffered to move the front line only six miles."}, {"front": "How does Remarque's", "back": "It depicts desperate survival and random chance rather than a school of heroic virtue."}, {"front": "In what way does Remarque's work complicate Woodrow Wilson's goal of making the world \"safe for democracy\"?", "back": "It shows that German soldiers suffered the same horrors as Allied soldiers under the same justifications of duty."}, {"front": "How does the reality of the trench relate to Smedley Butler's argument that war is a \"racket\"?", "back": "For the men in the trench, the question of economic profit is distant and irrelevant compared to immediate survival."}, {"front": "Why do historians and scholars cite \"All Quiet on the Western Front\" as evidence?", "back": "It captures the authentic physical and emotional truth of the war that statistics cannot convey."}, {"front": "In the novel's excerpt, what did the sight of new coffins stacked against a school-house signify?", "back": "Preparation for a major offensive and high expected casualties."}, {"front": "What is a \"dug-out\" in the context of trench warfare?", "back": "An underground shelter used for protection from artillery bombardment."}, {"front": "Why were German soldiers occasionally wounded by their own shells in the excerpt?", "back": "The artillery gun barrels were worn out, making the aim uncertain."}, {"front": "According to the narrator, what force determines who lives and who dies in a bombardment?", "back": "Chance."}, {"front": "What behavior of the rats indicates a coming bombardment?", "back": "They become more numerous and aggressive in the trenches."}, {"front": "How did the soldiers in the excerpt attempt to protect their bread from the rats?", "back": "They created a heap of gnawed pieces to lure the rats and then struck them with spades."}, {"front": "What was the significance of Edamer cheese being issued to the troops?", "back": "It was a traditional sign that a \"bad time\" or heavy fighting was imminent."}, {"front": "Why did veteran soldiers tell recruits to swap their saw-edged bayonets for ordinary ones?", "back": "If caught with a saw-bayonet, the enemy would kill or mutilate the soldier on sight."}, {"front": "Why did soldiers often prefer using a sharpened spade over a bayonet in hand-to-hand combat?", "back": "The spade was heavier for striking and did not get jammed in the enemy's body like a bayonet blade."}, {"front": "What psychological condition often affected soldiers confined in a dug-out during heavy shelling?", "back": "Claustrophobia."}, {"front": "How did the veterans handle a recruit who suffered a violent fit of claustrophobia during a barrage?", "back": "They beat him to bring him to his senses and prevent him from running out into the fire."}, {"front": "What is a \"parapet\" in a trench system?", "back": "The raised bank of earth at the front edge of a trench providing cover."}, {"front": "Why does the narrator describe the front as a \"cage\"?", "back": "Soldiers are trapped and must fearfully await whatever happens to them without control."}, {"front": "What weapon did the soldiers fear more than tanks or low-flying planes?", "back": "Flame-throwers."}, {"front": "To what does Remarque compare the blast of a shell landing in a trench?", "back": "A blow from the paw of a raging beast of prey."}, {"front": "What was the outcome when the soldiers tried to bring food up through the barrage?", "back": "The attempt miscarried because no one, including the experienced Kat, could get through the fire."}, {"front": "How did the soldiers manage their dwindling food supplies during the bombardment?", "back": "They pulled their belts tighter and chewed every mouthful three times as long."}, {"front": "What was the role of the \"listening-post\" during the night?", "back": "A tense forward position used to watch for enemy movements under the light of rockets."}, {"front": "Why was the deep, concrete dug-out superior to the newer \"light\" dug-outs?", "back": "It could withstand a direct hit that would have killed everyone in a lighter shelter."}, {"front": "What does the \"ceaseless rolling\" of transports behind enemy lines indicate to the veteran Kat?", "back": "The enemy is bringing up fresh troops, munitions, and shells for an attack."}, {"front": "What happens to the recruit who manages to escape the dug-out during the shelling?", "back": "He is immediately killed by a shell, leaving only fragments of flesh and uniform on the trench wall."}, {"front": "According to the text's analysis, what is the \"fundamental limitation\" of all military arguments?", "back": "They offer frameworks to make sense of war, but the actual experience is too chaotic and physical to be contained by them."}, {"front": "Why does the narrator describe himself and his comrades as \"indifferent\"?", "back": "The randomness of survival makes them stop caring about their fate."}, {"front": "What specific card game did the soldiers play to pass the time in the dug-out?", "back": "Skat."}, {"front": "What does the phrase \"corpse-rats\" imply about the rats in the trenches?", "back": "They grew fat by feeding on the bodies of dead soldiers."}, {"front": "Why did the recruits feel \"reassured\" by the mention of bringing up food?", "back": "They associated the delivery of food with a connection to the safe, outside world."}, {"front": "How long did the soldiers remain in the dug-out waiting for the attack to start?", "back": "Several days and nights of steady shelling."}, {"front": "What is the narrator's attitude toward the \"glorious war\" described by his schoolteacher?", "back": "Disillusionment, as the reality of the trenches bears no resemblance to the teacher's"}, {"front": "What was the narrator's physical reaction to the suspense of being in a listening-post?", "back": "His heart thumped and he worked his toes in his boots to stay awake."}, {"front": "Why did the soldiers avoid looking at each other during the bombardment?", "back": "They had tired faces and were overwhelmed by the grim reality of their situation."}, {"front": "What does the narrator mean by \"the outside world seems to draw a little nearer\"?", "back": "The potential arrival of supplies makes the soldiers feel less isolated in their \"grave\" of a trench."}, {"front": "What does the text suggest is the challenge for a reader of arguments about war?", "back": "To take the arguments seriously while never losing sight of the reality of what is being argued about."}, {"front": "According to the narrator, what makes a soldier's face look \"green\"?", "back": "Inexperience and the physical sickness caused by heavy bombardment."}, {"front": "What happened to the bread Detering suspended from the roof by a wire?", "back": "A fat rat successfully rode the wire to reach and eat the bread."}, {"front": "How did the arrival of morning light affect the appearance of the shell flashes?", "back": "The grey daylight made the flashes of the explosions look pale."}, {"front": "What does Kat's loss of \"fun\" signal to the other soldiers?", "back": "That a very dangerous and serious situation is approaching, as he is an experienced veteran."}, {"front": "Why did the soldiers find the \"rum\" served to them to be uncomforting?", "back": "It was another sign that a heavy and dangerous offensive was about to begin."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
