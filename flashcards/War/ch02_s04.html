<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Which specific persona is Smedley Butler's writing style compared to in the text?", "back": "A Marine sergeant addressing his men."}, {"front": "What type of sentences characterize Smedley Butler's rhetorical style?", "back": "Short sentences."}, {"front": "How does the text describe the sentences used by Oliver Wendell Holmes?", "back": "Long, ornamented, and periodic sentences."}, {"front": "Term: Vernacular", "back": "Definition: The ordinary, everyday language of common people as opposed to formal or literary prose."}, {"front": "What does Butler's use of vernacular signal about his identity as a writer?", "back": "He is speaking as a soldier and citizen rather than an intellectual or statesman."}, {"front": "What is the six-word thesis statement that opens Butler's pamphlet?", "back": "WAR is a racket. It always has been."}, {"front": "Butler uses the superlatives 'oldest,' 'most profitable,' and _____ to hammer his thesis.", "back": "Most vicious"}, {"front": "What grammatical form is used with words like 'oldest' to express the highest degree of a quality?", "back": "Superlative."}, {"front": "In contrast to Butler's direct hits, how does Holmes build toward meaning in his sentences?", "back": "Through long, winding clauses that crest and break like waves."}, {"front": "According to the text, who was the intended audience for Oliver Wendell Holmes?", "back": "Harvard gentlemen."}, {"front": "Who is the intended audience for Smedley Butler's 'War Is a Racket'?", "back": "Everyone (the common people)."}, {"front": "Term: Ethos", "back": "Definition: The credibility or authority of a speaker."}, {"front": "From what source does Butler draw his primary rhetorical authority?", "back": "Thirty-three years of combat service and two Medals of Honor."}, {"front": "Why is it difficult for readers to dismiss Butler's accusations about war?", "back": "Because he understands war better than almost anyone alive through direct experience."}, {"front": "How does Butler's admission of his own complicity in the 'machine' affect his ethos?", "back": "It strengthens his credibility because he is an insider confessing his own involvement."}, {"front": "What error do some readers make when evaluating Butler's blunt style?", "back": "Mistaking his strategically simple rhetoric for actual simplicity or lack of intelligence."}, {"front": "Why does Butler choose to use plain language as a rhetorical 'weapon'?", "back": "Because plain language is harder for a reader to evade or misunderstand."}, {"front": "While Holmes appeals to abstract ideals, to what does Butler's logos primarily appeal?", "back": "Financial data and ledger books."}, {"front": "Term: Empirical", "back": "Definition: Based on observation and measurement rather than theory or pure logic."}, {"front": "What specific company does Butler cite to show a 10-fold increase in earnings during the war?", "back": "Du Pont."}, {"front": "How many new millionaires does Butler claim appeared during the war?", "back": "21,000."}, {"front": "What is the rhetorical effect of Butler presenting concrete financial figures?", "back": "It shifts the burden of proof to anyone wishing to defend the war."}, {"front": "Term: Pathos", "back": "Definition: An appeal to the audience's emotions, often driven by moral energy or outrage."}, {"front": "Term: Anaphora", "back": "Definition: The deliberate repetition of a word or phrase at the beginning of successive clauses or sentences."}, {"front": "What specific phrase does Butler repeat to create a drumbeat of accusation in his questions?", "back": "\"How many of them.\""}, {"front": "What historical sources are cited as having used the technique of anaphora?", "back": "The Psalms, Cicero, and Lincoln's speeches."}, {"front": "How does Butler make his pathos concrete rather than sentimental?", "back": "By rooting his language in physical reality and bodily experiences of war."}, {"front": "What is one example of the physical war experiences Butler uses to evoke pathos?", "back": "Going hungry in a rat-infested dug-out."}, {"front": "Term: Pamphlet", "back": "Definition: A short, polemical work aimed at a mass audience with a clear call to action."}, {"front": "Which famous 1776 work by Thomas Paine is cited as a predecessor to Butler's pamphlet?", "back": "Common Sense."}, {"front": "What are the three primary genre constraints of a political pamphlet?", "back": "Brevity, readability by ordinary people, and a clear call to action."}, {"front": "What does the brevity of 'War Is a Racket' imply about the truth regarding war?", "back": "The truth is not complicated and can be stated plainly in a few pages."}, {"front": "What is the 'central tension' of the debate between Holmes and Butler?", "back": "War as the highest expression of virtue versus war as the lowest expression of greed."}, {"front": "How does the text describe the diction used by Oliver Wendell Holmes?", "back": "Elevated diction with classical allusions."}, {"front": "What does the text compare the effect of Butler's opening sentences to?", "back": "A fist on a table."}, {"front": "According to the text, when did Butler fully realize that war was a racket?", "back": "After he retired to civil life."}, {"front": "Why is a critic who confesses their own complicity harder to ignore than an outsider?", "back": "Because they were part of the machine they are now condemning."}, {"front": "How does Butler's logos use percentage increases and profit figures?", "back": "To force the reader to draw obvious conclusions from concrete numbers."}, {"front": "In his series of rhetorical questions, what activity does Butler contrast with making profits?", "back": "Physical combat experiences like shouldering a rifle or digging a trench."}, {"front": "What phrase describes Butler's prose in terms of its lack of ornamentation?", "back": "Stripped to the bone."}, {"front": "The use of the vernacular signals that Butler is speaking as a _____ and a _____, not an intellectual.", "back": "Soldier; citizen"}, {"front": "What is the primary difference between how Holmes and Butler conceive of their audience?", "back": "Holmes spoke to elite gentlemen, while Butler speaks to everyone."}, {"front": "True or False: Butler relies on abstract ideals like courage and sacrifice to make his argument.", "back": "False."}, {"front": "What rhythmic effect is created by Butler's use of anaphora?", "back": "A hammering effect that builds in intensity."}, {"front": "Why is Butler's pathos considered rooted in 'physical reality'?", "back": "It uses specific, gritty details like mud, hunger, and shrapnel."}, {"front": "What historical American collection of essays is mentioned as part of the pamphlet tradition?", "back": "The Federalist Papers."}, {"front": "Under what condition does Butler argue he developed his initial 'suspicion' about war?", "back": "While he was serving as a soldier."}, {"front": "How does Butler's tone 'dare' the reader?", "back": "It dares the reader to disagree with his blunt conclusions."}, {"front": "In Butler's questions, what does he ask if the war millionaires ever 'parried'?", "back": "A bayonet thrust of an enemy."}, {"front": "What does the text identify as Butler's 'most powerful rhetorical tool'?", "back": "His own ethos (himself)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
