    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "According to Butler’s rhetorical strategy, what is the primary focus of Chapters 1 and 2 of *War Is a Racket*?", "back": "Diagnosing the problem by presenting evidence of corporate war profits."}, {"front": "According to Butler’s rhetorical strategy, what is the primary focus of Chapters 3 through 5 of *War Is a Racket*?", "back": "Prescribing specific reforms and solutions to end the war racket."}, {"front": "What term does Butler use in Chapter 3 to describe veterans in hospitals whose lives were destroyed by the trauma of combat?", "back": "The living dead."}, {"front": "In Chapter 3, Butler describes soldiers in psychiatric wards being kept behind what physical barrier?", "back": "Steel bars."}, {"front": "What was the standard monthly pay for an ordinary American soldier during World War I, according to Butler?", "back": "Thirty dollars."}, {"front": "What percentage of a soldier’s monthly pay was immediately deducted during World War I?", "back": "50 percent."}, {"front": "Term: Liberty Bonds.", "back": "Government securities sold to the American public to finance World War I."}, {"front": "How does Butler claim bankers exploited soldiers regarding Liberty Bonds?", "back": "They repurchased the bonds at a steep discount when soldiers returned home unemployed."}, {"front": "Why does Butler place the", "back": "To ensure readers view the reforms as urgent responses to real suffering rather than abstract ideas."}, {"front": "What is the first concrete reform Butler proposes in Chapter 4?", "back": "Conscripting the nation’s capital, industry, and labor before conscripting men."}, {"front": "Under Butler’s proposal to conscript capital, what monthly pay limit would apply to corporate executives and generals?", "back": "Thirty dollars."}, {"front": "What is the primary objective of Butler's proposal to conscript capital and limit all pay to thirty dollars a month?", "back": "To remove the profit motive from war."}, {"front": "What is the second concrete reform Butler proposes in Chapter 4?", "back": "A limited plebiscite to decide on the declaration of war."}, {"front": "Definition: Plebiscite.", "back": "A direct vote by the citizens of a nation on a major political question."}, {"front": "In Butler’s proposed \"limited plebiscite,\" who would be the only citizens allowed to vote on going to war?", "back": "Young men of military age who pass a physical examination."}, {"front": "What logic does Butler use to justify limiting the war vote to men of military age?", "back": "Only those who will bear the physical consequences should have the power to authorize war."}, {"front": "What is the third concrete reform Butler proposes in Chapter 4?", "back": "Restricting the military strictly to defensive operations within American territory."}, {"front": "Under Butler’s defensive military reform, how far from the coastline would the Navy be legally permitted to operate?", "back": "Two hundred miles."}, {"front": "What is the legal mileage limit Butler proposes for military aircraft?", "back": "Five hundred miles from the American coastline."}, {"front": "According to Butler’s third reform, what is the geographic restriction for the United States Army?", "back": "It should never leave American territory."}, {"front": "What is the intended result of restricting the distance military branches can travel from the U.S.?", "back": "To make offensive war physically impossible."}, {"front": "Definition: Peroration.", "back": "The concluding section of a speech or written argument, typically the most emotionally intense passage."}, {"front": "In Chapter 5, Butler identifies which U.S. President as having been re-elected on a promise to keep America out of war?", "back": "Woodrow Wilson."}, {"front": "What was Woodrow Wilson's campaign slogan in the 1916 presidential election?", "back": "“He Kept Us Out of War.”"}, {"front": "How long after his 1916 inauguration did Woodrow Wilson ask Congress for a declaration of war?", "back": "Five months."}, {"front": "According to Butler, what was the underlying reason for the United States entering World War I?", "back": "The billions of dollars owed to American bankers by the Allied powers."}, {"front": "What are the final four words of Smedley Butler's pamphlet *War Is a Racket*?", "back": "“TO HELL WITH WAR!”"}, {"front": "In Wilson’s own account, what was one of the two primary reasons for entering WWI that contrasted with Butler’s financial explanation?", "back": "Unrestricted submarine warfare (or the Zimmermann Telegram)."}, {"front": "What did Art Young’s 1917 cartoon *Having Their Fling* depict as a visual argument against war?", "back": "An editor, capitalist, politician, and minister dancing while war rages behind them."}, {"front": "According to Butler’s corporate data, by how much did Bethlehem Steel's profits rise annually during the war?", "back": "From six million to forty-nine million dollars."}, {"front": "What was the maximum percentage of profit on capital recorded by coal producers during the war, according to Butler?", "back": "7,856 percent."}, {"front": "In Butler’s first reform, why must labor and politicians be included in the pay limitation along with corporate executives?", "back": "To ensure everyone in the nation shares the same financial burden as the soldier."}, {"front": "How does Butler’s shift from evidence to passion in Chapter 5 fulfill the goals of classical rhetoric?", "back": "It uses the peroration to move the audience toward taking direct action."}, {"front": "Which chapter of *War Is a Racket* serves as Butler’s peroration?", "back": "Chapter 5."}, {"front": "Butler argues that war is a scheme operated by a small number of _____ for their own profit.", "back": "insiders."}, {"front": "What specific group does Butler blame for pressuring the government into war to protect their loans to the Allies?", "back": "American bankers."}, {"front": "Under Butler's second proposal, who is specifically excluded from voting on whether the nation should go to war?", "back": "Congress and citizens not of military age or physical fitness."}, {"front": "What was the name of the German diplomatic message that Woodrow Wilson cited as a reason for war?", "back": "The Zimmermann Telegram."}, {"front": "In Butler's view, the _____ of the ordinary soldier was the most damning evidence of the racket's exploitation.", "back": "financial exploitation (or low pay/Liberty Bond losses)."}, {"front": "The graveyard in Lubaszowa, Poland, mentioned in the text serves as a visual reminder of what theme in Chapter 3?", "back": "The human cost of millions who died far from home."}, {"front": "According to Butler, why is a limited plebiscite more just than a Congressional vote for war?", "back": "It transfers decision-making power from those who benefit to those who suffer."}, {"front": "What is the relationship between the diagnostic phase (Ch 1-2) and the prescriptive phase (Ch 3-5) of Butler’s writing?", "back": "The diagnosis identifies the problem, while the prescription proposes the cure."}, {"front": "By how much did Du Pont's earnings increase during the war according to Butler's research?", "back": "Nearly tenfold."}, {"front": "Why were returning soldiers often forced to sell their Liberty Bonds back to bankers?", "back": "Because they were unemployed and needed money immediately."}, {"front": "In Chapter 5, Butler drops policy details to speak “from the gut,” which is a characteristic of what rhetorical technique?", "back": "Emotional intensity in a peroration."}, {"front": "What is the main question Butler addresses in Chapters 3 through 5?", "back": "“What do we do about it?” (referring to the war racket)."}, {"front": "How does Butler characterize the psychiatric casualties of war in Chapter 3?", "back": "As men whose minds were destroyed by the trauma of combat."}, {"front": "Butler argues that the decision to enter WWI was driven by money rather than a change in _____.", "back": "the threat to American security."}, {"front": "In Butler's reform model, what happens to offensive military capabilities?", "back": "They are eliminated by strict geographic limitations on all military branches."}, {"front": "According to Butler, the three proposals in Chapter 4 are designed to attack the war racket at what three distinct points?", "back": "Profit motive, decision-making power, and physical capability for offensive war."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
