<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Smedley Butler's 1935 work, what absolute term does he use to define war?", "back": "A racket."}, {"front": "During the 1930s, the term 'racket' was most commonly associated with what group?", "back": "Organized crime (such as bootleggers and gangsters)."}, {"front": "How does Butler define the general nature of a 'racket'?", "back": "A criminal scheme that benefits a few insiders at the expense of the many."}, {"front": "What is Butler's central thesis regarding the operation of war?", "back": "War operates like organized crime, where insiders reap profits while the public pays the cost."}, {"front": "According to Butler, what is the 'true purpose' of war in relation to the general public?", "back": "The public is deceived about its purpose, as it is not what it seems to the majority."}, {"front": "Who are the 'insiders' that Butler identifies as the primary beneficiaries of war?", "back": "Industrialists, bankers, and arms manufacturers."}, {"front": "In what three stages does Butler unpack his argument against war?", "back": "Definition of the problem, presentation of evidence, and a moral reckoning."}, {"front": "Why does Butler's argument begin with a sweeping, categorical claim about war?", "back": "To force the reader to either accept his framing or argue against it, leaving no middle ground."}, {"front": "According to Chapter 2, what was the primary source of the evidence Butler used to support his claims?", "back": "The wartime profits of specific American industries during the World War."}, {"front": "The Du Pont corporation's annual peacetime earnings of approximately \\6,000,000$ rose to what annual amount during the war?", "back": "\\58,000,000$ per year."}, {"front": "By approximately what factor did Du Pont's annual earnings increase during the World War?", "back": "Nearly a 10 × increase."}, {"front": "What were Bethlehem Steel's average annual earnings during the war compared to its \\6,000,000$ peacetime average?", "back": "\\49,000,000$."}, {"front": "What was the wartime earnings peak for United States Steel, according to Butler's data?", "back": "\\240,000,000$."}, {"front": "United States Steel's earnings climbed from a peacetime average of \\105,000,000$ to a wartime average of _____.", "back": "\\240,000,000$."}, {"front": "Name two copper companies Butler cites as seeing massive surges in profit during the war.", "back": "Anaconda Copper and Utah Copper."}, {"front": "Besides steel and copper, what other specific industry company did Butler name in his catalog of profits?", "back": "Central Leather."}, {"front": "How many new millionaires and billionaires were created in the United States during the World War according to Butler's text?", "back": "At least 21,000."}, {"front": "From what source did the massive wartime profits of corporations primarily originate?", "back": "Government contracts paid for by taxpayers."}, {"front": "Butler refers to wartime profits as '_____ gains' because the goods were consumed in a conflict that killed millions.", "back": "Blood"}, {"front": "What specific rhetorical appeal (Logos, Ethos, or Pathos) is most prominent in Butler's use of industrial profit figures?", "back": "Logos (logic and evidence)."}, {"front": "Term: War Profiteering", "back": "Definition: The practice of making excessive profits from selling goods or services to a government during wartime."}, {"front": "What negative moral connotation is carried by the term 'war profiteering'?", "back": "It implies the profiteer benefits directly from the suffering and death of others."}, {"front": "Butler argues that war profiteering is not an abuse of the system, but rather the system's _____.", "back": "Actual purpose."}, {"front": "In Butler's 'Moral Reckoning' stage, how does he suggest the human 'bill' of war is measured?", "back": "In gravestones, mangled bodies, shattered minds, and broken hearts."}, {"front": "Butler's argument regarding the human cost of war is built on a specific '_____ of cost and profit'.", "back": "Asymmetry"}, {"front": "According to Butler, where do the industrialists and bankers stay while the war is being fought?", "back": "Safely at home."}, {"front": "What pointed questions does Butler ask to highlight the asymmetry between profiteers and soldiers?", "back": "How many war millionaires shouldered a rifle, dug a trench, or were wounded/killed?"}, {"front": "What is the primary critique regarding the scope of Butler's evidence in the first two chapters?", "back": "His evidence is drawn almost entirely from a single conflict (the World War)."}, {"front": "What fundamental logical distinction does Butler fail to make regarding the relationship between profit and war?", "back": "The distinction between profit being an outcome of war and profit being the actual purpose of war."}, {"front": "Butler's three-stage argument structure (Definition, Evidence, Reckoning) is designed to give his claims _____ force.", "back": "Cumulative"}, {"front": "Why did Butler place the human cost (Stage Three) after the financial evidence (Stage Two)?", "back": "So the reader would absorb the obscenity of the profits before confronting the human price."}, {"front": "Does Butler's categorical claim 'War is a racket' allow for 'middle ground' exceptions in his opening chapters?", "back": "No, he forces the reader to either accept or reject the framing entirely."}, {"front": "What specific goods does Butler list as being purchased with taxpayer-funded contracts to generate 'blood gains'?", "back": "Shells, ships, uniforms, and steel."}, {"front": "According to Butler's central thesis, who pays the cost of war in 'blood, treasure, and broken lives'?", "back": "The general public."}, {"front": "A strong reader should identify not only what a writer says, but also what the writer _____.", "back": "Assumes or omits."}, {"front": "In the context of the 1930s, calling war a 'racket' placed it in the same moral category as the _____.", "back": "Mafia."}, {"front": "Does Butler initially address if his argument applies to wars of national defense or against tyranny?", "back": "No, he leaves those questions hanging in the opening chapters."}, {"front": "What is the 'Definition' stage of Butler's argument intended to do for the reader?", "back": "Tell the reader what to look for (framing the crime)."}, {"front": "What is the purpose of the 'Evidence' stage in Butler's argument structure?", "back": "To show that the 'crime' defined in the first stage is real and documented."}, {"front": "What is the purpose of the 'Moral Reckoning' stage in Butler's argument structure?", "back": "To explain why the evidence presented matters on a human level."}, {"front": "Butler's use of specific dollar figures and company names is an example of concrete _____.", "back": "Logos."}, {"front": "Is war profiteering considered by Butler to be an 'unjust' outcome of war or the 'actual purpose' of the enterprise?", "back": "The actual purpose."}, {"front": "How does Butler characterize the psychological state of soldiers in his moral reckoning?", "back": "As having shattered minds and broken hearts."}, {"front": "According to Butler, the public pays for war with treasure and _____.", "back": "Blood."}, {"front": "What industry was Anaconda Copper a part of in Butler's list of profiteers?", "back": "Copper."}, {"front": "What industry was Central Leather a part of in Butler's list of profiteers?", "back": "Leather."}, {"front": "In 1935, the term 'racket' implied a scheme that was 'not what it _____ to the majority of people.'", "back": "Seems."}, {"front": "Which specific steel company saw earnings rise from \\6,000,000to\\49,000,000?", "back": "Bethlehem Steel."}, {"front": "Which specific steel company saw its earnings more than double from \\105,000,000to\\240,000,000?", "back": "United States Steel."}, {"front": "In which chapters does the text indicate Butler will address proposed solutions?", "back": "Chapters 3-5."}, {"front": "True or False: Butler acknowledges that some war millionaires actually fought in trenches.", "back": "False (he claims none of them did)."}, {"front": "Butler's rhetorical power depends heavily on the _____ in which he delivers his punches.", "back": "Order."}, {"front": "What is the core reason Butler labels wartime profits as 'blood gains'?", "back": "They are earned from the death and suffering of millions."}, {"front": "Butler's argument asserts that war is not a noble enterprise or a necessary evil, but a _____.", "back": "Criminal scheme."}, {"front": "According to Butler, who is the victim of the deception in any racket?", "back": "The majority of the people (the public)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
