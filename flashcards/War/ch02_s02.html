    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#War">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What specific term does Smedley Butler use to define war in his 1935 work?", "back": "A racket."}, {"front": "In the 1930s context, with what specific societal element was the word \"racket\" associated?", "back": "Organized crime."}, {"front": "Butler compares the practitioners of war to what specific Prohibition-era figures?", "back": "Gangsters (or racketeers)."}, {"front": "According to Butler's definition, who primarily benefits from a racket?", "back": "A small group of insiders."}, {"front": "In a racket, at whose expense are the benefits obtained?", "back": "The many (the general public)."}, {"front": "What is the public's perception of the true purpose of a racket, according to Butler?", "back": "The public is deceived about its true purpose."}, {"front": "Butler's Central Thesis: War operates like organized crime because a small group reaps profits while the public pays the cost in _____.", "back": "Blood and treasure."}, {"front": "Name one of the three specific groups Butler identifies as the \"insiders\" of the war racket.", "back": "Industrialists (or bankers/arms manufacturers)."}, {"front": "How does Butler frame his claim about war to prevent the reader from finding a \"middle ground\"?", "back": "He makes a sweeping, categorical claim that war itself is always a racket."}, {"front": "What is the primary rhetorical goal of Stage One (The Definition) in Butler's argument?", "back": "To force the reader to either accept his framing or argue against it entirely."}, {"front": "In which chapter does Butler primarily present the financial numbers and data?", "back": "Chapter 2."}, {"front": "What were the average annual peacetime earnings of the Du Pont corporation before the World War?", "back": "$6,000,000."}, {"front": "What did Du Pont's annual earnings rise to during the World War?", "back": "$58,000,000."}, {"front": "By approximately what factor did Du Pont's earnings increase during the war?", "back": "Tenfold."}, {"front": "What were Bethlehem Steel's annual earnings during the World War?", "back": "$49,000,000."}, {"front": "United States Steel's earnings rose from $105,000,000 in peacetime to what amount during the war?", "back": "$240,000,000."}, {"front": "Approximately how many new millionaires and billionaires were created in the U.S. during the World War?", "back": "21,000."}, {"front": "According to Butler, what was the source of the enormous wartime profits made by corporations?", "back": "Government contracts paid for by taxpayers."}, {"front": "What specific phrase does Butler use to describe profits derived from war-related death and destruction?", "back": "Blood gains."}, {"front": "Why does Butler name specific companies and dollar figures rather than making vague claims about the rich?", "back": "To use logos (logic and concrete evidence) to make his case undeniable."}, {"front": "Definition: War Profiteering", "back": "The practice of making excessive profits from selling goods/services to a government during wartime."}, {"front": "How does Butler's view of war profiteering differ from the idea that it is an \"abuse\" of the system?", "back": "He argues that profiteering is the actual purpose of the system."}, {"front": "What negative connotation is carried by the term \"war profiteering\"?", "back": "The profiteer benefits from the suffering and death of others."}, {"front": "In Butler's three-stage structure, what follows \"The Evidence\"?", "back": "The Moral Reckoning."}, {"front": "How does Butler measure the \"bill\" of war beyond financial dollars?", "back": "In gravestones, mangled bodies, and shattered minds."}, {"front": "Why does Butler place the human cost of war *after* the financial evidence?", "back": "So the reader absorbs the obscenity of the profits before seeing the human price paid."}, {"front": "The concept that those who profit from war do not fight it is known as the _____.", "back": "Asymmetry of cost and profit."}, {"front": "Who, according to Butler, bears the actual cost of war in terms of suffering and disability?", "back": "The soldiers and their families."}, {"front": "Where do the industrialists and bankers remain while the war is being fought?", "back": "Safely at home."}, {"front": "What rhetorical method does Butler use to highlight that millionaires did not experience combat?", "back": "A series of pointed questions (e.g., \"How many dug a trench?\")."}, {"front": "What is the primary function of the \"Definition\" stage in Butler's argument?", "back": "To tell the reader what to look for (framing the crime)."}, {"front": "What is the primary function of the \"Moral Reckoning\" stage in Butler's argument?", "back": "To explain why the evidence matters on a human level."}, {"front": "Which conflict provides almost all of the evidence for Butler's argument in Chapters 1 and 2?", "back": "The World War (WWI)."}, {"front": "What is one question Butler leaves open regarding the necessity of war?", "back": "Whether his argument applies to wars of national defense or against tyranny."}, {"front": "What logical distinction does the text suggest Butler fails to make explicitly?", "back": "The distinction between the existence of profit and profit being the *purpose* of the war."}, {"front": "According to the analysis, a strong reader must identify not just what a writer says, but also what the writer _____.", "back": "Assumes or omits."}, {"front": "Concept: Logos", "back": "Definition: A rhetorical appeal based on logic, reason, facts, and statistics."}, {"front": "What was the peacetime earnings of Bethlehem Steel as cited by Butler?", "back": "$6,000,000."}, {"front": "Butler's argument structure is described as having _____ force because each stage builds on the one before it.", "back": "Cumulative."}, {"front": "What does Butler suggest is the relationship between war profiteering and the general public's knowledge?", "back": "The public is deceived into thinking war is a noble enterprise rather than a criminal scheme."}, {"front": "How does Butler classify war in terms of moral categories by calling it a \"racket\"?", "back": "He places it in the same moral category as the Mafia."}, {"front": "According to the text, why is Butler's use of specific company names like Anaconda Copper effective?", "back": "It moves the argument from abstract reasoning to documented facts."}, {"front": "Butler characterizes war as not a noble enterprise or a necessary evil, but as a _____.", "back": "Criminal scheme."}, {"front": "What two things does Butler claim the general public pays as the cost of the war racket?", "back": "Treasure and blood."}, {"front": "In Butler's view, do the people who reap the profits of war take part in the physical risks of war?", "back": "No (none of them)."}, {"front": "What is the \"Stage Two\" of Butler's three-stage argument structure?", "back": "The Evidence."}, {"front": "What is the primary rhetorical appeal used when Butler catalogs the surging earnings of corporations?", "back": "Logos."}, {"front": "According to the analysis, what is the effect of Butler's \"absolute statement\" at the beginning of his argument?", "back": "It eliminates the middle ground for the reader."}, {"front": "Which copper company is mentioned alongside Utah Copper as seeing surging wartime profits?", "back": "Anaconda Copper."}, {"front": "Butler's accounting of the \"bill\" of war includes the price paid in \"shattered minds\" and _____.", "back": "Broken hearts."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
