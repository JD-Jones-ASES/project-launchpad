<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War: A Debate in Primary Sources &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">War: A Debate in Primary Sources &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Butler, what is the three-stage structure of the argument in his first two chapters?", "back": "Define the problem, present the evidence, and channel moral outrage."}, {"front": "In the context of 1935, what specific association did Butler intend by labeling war a \"racket\"?", "back": "Organized crime, such as gangsters and bootleggers of the Prohibition era."}, {"front": "What is Butler's definition of a \"racket\"?", "back": "An enterprise that benefits a small group of insiders at the expense of the many while deceiving the public."}, {"front": "Who are the \"insiders\" that Butler identifies as the primary beneficiaries of the war racket?", "back": "Industrialists, bankers, and arms manufacturers."}, {"front": "Butler's Central Thesis claims that the public pays for war in what three forms?", "back": "Blood, treasure, and broken lives."}, {"front": "What rhetorical effect does Butler achieve by making a categorical claim that war is always a racket?", "back": "It forces the reader to either accept his framing or argue against it, leaving no middle ground."}, {"front": "In Stage Two of his argument, what role does Butler adopt to present his case?", "back": "A detective."}, {"front": "What was the average annual peacetime earnings of the Du Pont corporation compared to its wartime earnings?", "back": "Earnings rose from 6,000,000 to58,000,000 per year."}, {"front": "How did Bethlehem Steel's earnings change during the World War?", "back": "They rose from 6,000,000 to49,000,000."}, {"front": "What was the increase in United States Steel's earnings during the World War?", "back": "Earnings climbed from 105,000,000 to240,000,000."}, {"front": "Approximately how many new millionaires and billionaires were created in the United States during the World War?", "back": "At least 21,000."}, {"front": "According to Butler, where did the massive wartime profits of corporations originate?", "back": "From government contracts paid for by taxpayers."}, {"front": "What term does Butler use to describe profits made from goods consumed in a war that kills millions?", "back": "Blood gains."}, {"front": "Which rhetorical appeal does Butler utilize by naming specific companies and citing dollar figures?", "back": "Logos (logic and evidence)."}, {"front": "Term: War Profiteering", "back": "Definition: The practice of making excessive profits from selling goods or services to a government during wartime."}, {"front": "What does the term \"war profiteering\" imply regarding the source of a profiteer's benefits?", "back": "The profiteer benefits from the suffering and death of others."}, {"front": "What is Butler's central charge regarding the nature of war profiteering within the system?", "back": "It is not an abuse of the system but the system's actual purpose."}, {"front": "In Stage Three, the \"Moral Reckoning,\" how does Butler measure the cost of war beyond financial terms?", "back": "In gravestones, mangled bodies, shattered minds, and broken hearts."}, {"front": "Concept: Asymmetry of Cost and Profit", "back": "Definition: The disconnection where those who profit from war are not the same people who fight and suffer in it."}, {"front": "How does Butler contrast the locations of industrialists versus soldiers during a war?", "back": "Industrialists stay safely at home while soldiers bear the cost in trenches and on the battlefield."}, {"front": "What is the intended rhetorical effect of placing the human cost of war after the financial evidence?", "back": "To ensure the reader has absorbed the obscenity of the profits before being confronted with the human price."}, {"front": "What answer does Butler imply for his questions about how many war millionaires shouldered rifles or dug trenches?", "back": "None."}, {"front": "What is the primary function of the \"Definition\" stage in Butler's argument structure?", "back": "It tells the reader what to look for by framing war as a criminal scheme."}, {"front": "What is the primary function of the \"Evidence\" stage in Butler's argument structure?", "back": "It shows the reader that the defined crime is real through documented facts and figures."}, {"front": "What is the primary function of the \"Moral Reckoning\" stage in Butler's argument structure?", "back": "It explains to the reader why the evidence and the crime matter ethically."}, {"front": "What limitation exists in the scope of Butler's evidence in the first two chapters?", "back": "His evidence is drawn almost entirely from a single conflict, the World War."}, {"front": "What logical distinction does Butler fail to make explicit regarding the relationship between profit and war?", "back": "The existence of profit does not necessarily prove that profit was the original purpose of the war."}, {"front": "What question does Butler leave open regarding the necessity of certain wars?", "back": "Whether his argument applies to wars of national defense or wars against genuine tyranny."}, {"front": "According to the analysis, what should a strong reader identify in addition to what a writer says?", "back": "What the writer assumes, omits, and where evidence might support different conclusions."}, {"front": "Besides Du Pont, Bethlehem Steel, and US Steel, what other industries saw wartime profit surges?", "back": "Anaconda Copper, Utah Copper, and Central Leather."}, {"front": "The Du Pont corporation's earnings increased by nearly what factor during the World War?", "back": "A tenfold increase."}, {"front": "Butler's use of the word \"racket\" places war into what moral category?", "back": "The same category as the Mafia or organized crime."}, {"front": "In Butler's view, how is the general public specifically treated in the racket of war?", "back": "They are deceived about the true purpose of the enterprise."}, {"front": "Why is Butler's opening statement considered a \"bold rhetorical move\"?", "back": "He claims war itself is a racket categorically, rather than just arguing some wars are unjust."}, {"front": "According to the text, Butler's rhetorical power depends on what specific structural element?", "back": "The order in which he delivers his arguments (the three stages)."}, {"front": "How does Butler describe the goods purchased with taxpayer-funded government contracts?", "back": "As items like shells, ships, uniforms, and steel consumed in conflict."}, {"front": "What does Butler suggest is the relationship between war profiteering and the \"system\" of war?", "back": "Profiteering is the actual purpose of the system."}, {"front": "What is the term for a rhetorical appeal based on logic and documented facts?", "back": "Logos."}, {"front": "According to Butler, who specifically bears the cost of war in terms of disability and suffering?", "back": "The soldiers and their families."}, {"front": "What does the text suggest is the difference between \"outrage\" and \"proof\" in Butler's writing?", "back": "Outrage is a powerful emotion, but it does not equate to logical proof of a war's purpose."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
