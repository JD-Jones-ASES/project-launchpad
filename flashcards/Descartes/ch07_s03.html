<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 7, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the three main objectives Descartes aims to achieve in Meditation VI?", "back": "1) Prove the existence of material things. 2) Establish the real distinction between mind and body. 3) Acknowledge the intimate union of soul and body."}, {"front": "According to Descartes, how does he initially approach the question of whether material things exist?", "back": "He knows they *may* exist because they can be clearly and distinctly perceived as objects of pure mathematics, and God has the power to produce anything perceivable with distinctness."}, {"front": "How does Descartes define 'imagination' in Meditation VI?", "back": "Imagination is a certain application of the faculty of knowledge to a body immediately present to it."}, {"front": "What is the key difference Descartes identifies between imagination and pure intellection (or conception)?", "back": "Imagination involves 'apprehending' or 'inwardly seeing' an object as present (e.g., a triangle's three sides), while pure intellection grasps the concept without necessarily forming a distinct mental image (e.g., a chiliagon's 1000 sides)."}, {"front": "Provide an example Descartes uses to illustrate the distinction between imagination and pure intellection.", "back": "He can clearly conceive a chiliagon (a thousand-sided figure), but he cannot distinctly imagine all its sides, unlike a triangle. Imagining a chiliagon often results in a confused figure, not specific to 1000 sides."}, {"front": "Why does Descartes conclude that the faculty of imagination is not an essential element of his mind's nature?", "back": "Because he would still be himself (the same conscious being) even if he did not possess the power to imagine. It appears to depend on something distinct from his mind."}, {"front": "How does Descartes use the faculty of imagination to argue for the *probability* of the existence of body?", "back": "He conjectures that if a body exists with which his mind is conjoined, then imagination could be explained as the mind turning towards this body. Since he finds no other convenient explanation, it makes the existence of body probable."}, {"front": "Besides objects of pure mathematics, what other kinds of things does Descartes note he is accustomed to imagining?", "back": "Colors, sounds, scents, pain, and other such things, which he perceives better through the senses."}, {"front": "What does Descartes decide to investigate in order to find more certain proof of corporeal objects' existence?", "back": "The nature of sense perception, to see if he can derive proof from the ideas apprehended through 'feeling'."}, {"front": "List some common things Descartes initially believed to be true based on his senses.", "back": "That he had a body with specific members (head, hands, feet); that his body was amidst other bodies that could affect it; that he experienced pleasure, pain, hunger, thirst, and passions (joy, sadness, anger)."}, {"front": "What external qualities of bodies did Descartes perceive through his senses before doubt?", "back": "Extension, figure, motion, hardness, heat, light, color, scents, and sounds, which allowed him to distinguish different bodies."}, {"front": "What was a primary reason Descartes initially believed that sensory ideas proceeded from objects *outside* his mind?", "back": "The ideas presented themselves without his consent, he couldn't perceive objects unless present to senses, and couldn't *not* perceive them when present."}, {"front": "What qualitative difference did Descartes observe between sensory ideas and ideas he formed himself?", "back": "Sensory ideas were much more lively, clear, and even distinct (in their own way) than ideas framed in meditation or found in memory, suggesting they originated externally."}, {"front": "Why did Descartes initially believe his own body belonged to him 'more properly and strictly' than any other?", "back": "He could never be separated from it, he experienced all his appetites and affections in/on account of it, and he felt pain and pleasure in its parts, not in other bodies."}, {"front": "What does Descartes mean when he says 'nature taught me so' regarding the connection between sensations and mental states?", "back": "He refers to the seemingly inexplicable, but immediate, connections (e.g., stomach craving leading to a desire to eat, pain leading to sadness) for which he could find no rational affinity or reason."}, {"front": "How did Descartes's experiences with external senses lead him to doubt their reliability?", "back": "He observed optical illusions, such as distant towers appearing round but square up close, and colossal statues appearing tiny, demonstrating errors in judgments based on external perception."}, {"front": "Give an example of how Descartes found reasons to doubt even his *internal* senses.", "back": "He learned that amputees sometimes feel pain in a missing limb (phantom limb pain), which made him question whether pain was truly located in the perceived body part."}, {"front": "What two 'very general' grounds for doubt did Descartes add to his reasons for distrusting his senses?", "back": "1) The inability to distinguish between waking perceptions and dreams. 2) The possibility that the author of his being constituted him in such a way that he could be deceived even in seemingly certain matters (the deceiving God/evil demon hypothesis)."}, {"front": "After reviewing his former beliefs, why does Descartes conclude he should not trust the 'teachings of nature' implicitly?", "back": "Because nature seemed to incline him towards many things (via senses) that reason later compelled him to doubt or reject."}, {"front": "How does Descartes differentiate the mind's activity in pure intellection versus imagination in terms of its 'direction'?", "back": "In pure intellection, the mind 'turns on itself' and considers ideas it possesses. In imagination, the mind 'turns towards the body' and beholds something conformable to an idea there."}, {"front": "When Descartes states that God possesses the power to produce everything that he is capable of perceiving with distinctness, what is the implication for the existence of material things?", "back": "If he can clearly and distinctly conceive of material things (e.g., as objects of pure mathematics), then God, being omnipotent and non-deceiving, could create them, making their existence possible."}, {"front": "Why is the intimate union of soul and body considered a crucial acknowledgment at the end of the Meditations?", "back": "It moves beyond detached abstraction to embrace the embodied human being, grounding philosophical knowledge in the lived experience of being a human with both a mind and a physical presence."}, {"front": "Descartes mentions he found it difficult to argue against the old reasons for believing in sensible objects. What was his main rebuttal?", "back": "His main rebuttal was that 'nature' inclined him towards many things that 'reason' later showed to be dubious, implying that natural inclinations alone are not sufficient grounds for certain knowledge."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
