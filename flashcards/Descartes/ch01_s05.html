<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1, Section 5</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary ambition of Descartes' *Meditations on First Philosophy*?", "back": "To rebuild all human knowledge from scratch on a foundation of absolute certainty."}, {"front": "Define foundationalism in the context of epistemology.", "back": "The view that all knowledge rests on a small set of basic beliefs known without inference from others."}, {"front": "Who is considered the most famous foundationalist in the Western tradition?", "back": "René Descartes."}, {"front": "Under what condition is a belief considered 'basic' in foundationalist theory?", "back": "It must be known without being derived or inferred from other beliefs."}, {"front": "Descartes compares the project of rebuilding human knowledge to what structural act?", "back": "Demolishing a building with a shaky foundation to rebuild it from the ground up."}, {"front": "Why did Descartes reject the 'old building' of scholastic philosophy?", "back": "He considered it too unreliable to repair piece by piece."}, {"front": "How is the literary structure of the *Meditations* organized?", "back": "As a first-person monologue conducted over the course of six days."}, {"front": "What is the pedagogical purpose of casting the *Meditations* as an interior monologue?", "back": "To force the reader to participate in and conduct the philosophical experiment themselves."}, {"front": "Descartes' strategy of stripping away every doubtable belief to reach a bedrock of certainty is known as _____.", "back": "Foundationalism."}, {"front": "To which institution's theologians was the dedicatory letter of the *Meditations* addressed?", "back": "The Sorbonne."}, {"front": "Why did Descartes argue that rational proofs of God are more persuasive to unbelievers than scripture?", "back": "Unbelievers do not accept scripture as authoritative but cannot dismiss a valid rational argument."}, {"front": "What practical purpose did the dedicatory letter to the Sorbonne serve for Descartes?", "back": "It sought to place the work under the Church's protection to avoid the consequences of publishing heterodox ideas."}, {"front": "In what year was the *Meditations* placed on the Index of Forbidden Books?", "back": "1663."}, {"front": "What does the 'Synopsis' section of the *Meditations* reveal about the book's six parts?", "back": "They constitute a single continuous argument rather than separate essays."}, {"front": "Which Meditation is responsible for 'creating the problem' through total doubt?", "back": "Meditation I."}, {"front": "What is the primary function of Meditation II in the book's argument arc?", "back": "Finding the first solution to the problem of doubt."}, {"front": "In Descartes' arc of reasoning, which Meditations establish God as the guarantor of knowledge?", "back": "Meditations III through V."}, {"front": "What transition occurs in Meditation VI?", "back": "The meditator returns to the external world equipped with new philosophical resources."}, {"front": "Term: Epistemology", "back": "Definition: The branch of philosophy that studies the nature, sources, scope, and limits of human knowledge."}, {"front": "From which two Greek words is 'epistemology' derived?", "back": "$\\text{episteme}$ (knowledge) and $\\text{logos}$ (study)."}, {"front": "Which philosopher made epistemology the central discipline of modern philosophy?", "back": "René Descartes."}, {"front": "What central question does Descartes raise regarding the 'Self'?", "back": "Whether the self is defined by the mind, the body, or both."}, {"front": "How did Descartes' approach to philosophical questions differ from his predecessors?", "back": "He freed questions from dependence on Church authority and tradition, placing them before the individual reasoning mind."}, {"front": "What are the *Objections and Replies* in the context of the *Meditations*?", "back": "A published appendix containing written critiques from other thinkers and Descartes' detailed responses."}, {"front": "Name one of the three prominent thinkers mentioned who provided objections to Descartes' manuscript.", "back": "Antoine Arnauld (or Pierre Gassendi, or Marin Mersenne)."}, {"front": "According to Descartes, what is the role of God in the structure of knowledge?", "back": "God acts as the guarantor of the truth of our knowledge."}, {"front": "What philosophical goal is served by discarding any belief that 'can possibly be doubted'?", "back": "Reaching a foundation so certain that no skeptic or deceiver could undermine it."}, {"front": "How does Descartes' 'building' metaphor describe the relationship between beliefs?", "back": "Knowledge has a structure where some beliefs support others, all resting on a single foundation."}, {"front": "What was Descartes' personal religious motivation for writing the *Meditations*?", "back": "He was a sincere Catholic who believed reason should establish God's existence and the soul's immortality."}, {"front": "Why is the six-day timeframe of the *Meditations* considered a 'literary fiction'?", "back": "Descartes had actually been developing the ideas within the book for decades."}, {"front": "What is the primary subject of Descartes' inquiry into 'Truth and Error'?", "back": "Determining why intelligent people make mistakes and how those mistakes can be avoided."}, {"front": "Descartes' shift toward individual reason as the source of authority defined the era of _____ philosophy.", "back": "Modern."}, {"front": "In foundationalism, the 'whole edifice' of knowledge rests upon a _____. ", "back": "Foundation (or bedrock of certainty)."}, {"front": "What does the existence of the *Objections and Replies* reveal about Descartes' philosophical system?", "back": "It shows his willingness to refine arguments and occasionally reveals the limits of his system."}, {"front": "Which branch of philosophy asks 'What can we actually know, and how do we know it?'", "back": "Epistemology."}, {"front": "The Synopsis describes the overall movement of the *Meditations* as an arc from _____ to rebuilt knowledge.", "back": "Total doubt."}, {"front": "How did the Church eventually respond to the *Meditations* thirteen years after Descartes' death?", "back": "They placed the book on the Index of Forbidden Books."}, {"front": "What was the significance of Descartes' use of first-person 'monologue' rather than traditional proofs?", "back": "It invites the reader to experience the philosophical journey as their own interior monologue."}, {"front": "According to the text, for how long did foundationalism dominate European philosophy?", "back": "Three centuries."}, {"front": "Descartes sought a foundation so secure that not even a _____ evil power could undermine it.", "back": "God-like."}, {"front": "In the context of the dedicatory letter, how did Descartes present himself to the Faculty of Theology?", "back": "As an ally of theology rather than a competitor."}, {"front": "Which objector mentioned in the text was a mathematician?", "back": "Marin Mersenne."}, {"front": "What is the key takeaway from the Synopsis regarding the unity of the Meditations?", "back": "The six Meditations are a single continuous argument."}, {"front": "Which question regarding the external world does Descartes make central to modern philosophy?", "back": "Can I prove that the world around me is real?"}, {"front": "Descartes' foundationalism requires building upward only after reaching something that _____.", "back": "Cannot be doubted."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
