<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 6, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two primary questions Descartes addresses in Meditation V?", "back": "The nature of material things and whether God's existence can be proven a second time by a different route."}, {"front": "How are Descartes' answers to the nature of material things and God's existence connected in Meditation V?", "back": "Both rest on the power of the mind to know essences by reason alone, through clear and distinct ideas."}, {"front": "What is Descartes' \"principal task\" at the beginning of Meditation V, after noting what to do/avoid?", "back": "To emerge from a state of doubt and see if anything certain can be known regarding material things."}, {"front": "How does Descartes propose to examine material things before determining their external existence?", "back": "He considers the ideas of them as they are in his thought, distinguishing which are distinct and which are confused."}, {"front": "List some attributes of material things that Descartes can \"distinctly imagine.\"", "back": "Quantity (extension in length, breadth, depth), many different parts, sorts of size, figure, situation, local movement, and degrees of duration."}, {"front": "What does Descartes conclude about the origin of his knowledge of mathematical and geometric truths (e.g., numbers, figures)?", "back": "He discovers them as if recollecting what he formerly knew, perceiving things already present to his mind, possessing true and immutable natures, not invented by him."}, {"front": "According to Descartes, what is the nature of the \"infinitude of ideas\" he finds in himself (e.g., geometric figures)?", "back": "They are not pure negations, not framed by him, but possess true and immutable natures that are eternal and independent of his mind."}, {"front": "What specific geometric example does Descartes use to illustrate the immutable nature of certain ideas?", "back": "The idea of a triangle."}, {"front": "Give two examples of properties of a triangle that Descartes says he discovers, not invents.", "back": "Its three angles are equal to two right angles; the greatest side is subtended by the greatest angle."}, {"front": "How does Descartes argue against the idea that his concept of a triangle comes from sensory experience?", "back": "He can form infinitely many other figures for which there's no sensory experience, yet can demonstrate their properties, proving these ideas don't solely originate from the senses."}, {"front": "How does Descartes transition from the certainty of mathematical truths to an argument for God's existence?", "back": "If clear and distinct knowledge about mathematical objects (like properties of figures or numbers) guarantees their truth, then his clear and distinct idea of God, a supremely perfect Being, must also imply God's existence."}, {"front": "How does Descartes describe the idea of God he finds within himself?", "back": "The idea of a supremely perfect Being."}, {"front": "Explain Descartes' claim that existence is a perfection.", "back": "Existence is a quality that contributes to the completeness or supremacy of a being. A being that exists is more perfect than one that does not exist. Therefore, a supremely perfect Being must possess existence."}, {"front": "What is the initial objection one might raise about separating existence from God's essence?", "back": "Being accustomed to distinguishing existence from essence in all other things, one might persuade oneself that God's existence can be separated from His essence, allowing God to be conceived as not actually existing."}, {"front": "How does Descartes counter the objection that existence can be separated from God's essence like other things? Provide an analogy.", "back": "Existence can no more be separated from God's essence than having three angles equal to two right angles can be separated from a triangle, or a valley from a mountain. Conceiving God without existence is like conceiving a supremely perfect Being lacking a perfection."}, {"front": "What is the objection that thinking of something with existence doesn't mean it exists (e.g., a winged horse)?", "back": "My thought doesn't impose necessity on things; just as I can imagine a winged horse without one existing, I could attribute existence to God without Him existing."}, {"front": "Where does Descartes say the necessity for God's existence lies, countering the \"thought's power\" objection?", "back": "The necessity lies in the thing itself—the necessity of God's existence determines his thought, rather than his thought imposing necessity. It is impossible to conceive of God (a supremely perfect Being) without existence."}, {"front": "What objection suggests that God's existence only follows if one *presupposes* He has all perfections, and that this initial supposition might not be necessary?", "back": "One might argue that it's only necessary to assert God exists after presupposing He possesses every perfection (including existence), but that the original supposition itself wasn't necessary, like an erroneous geometric assumption."}, {"front": "How does Descartes argue that the necessity of attributing existence to God is not an arbitrary supposition? Use the triangle analogy.", "back": "Whenever he thinks of a first and sovereign Being, he *must* attribute every perfection, including existence. This is not an arbitrary choice, but inherent to the idea, just as he *must* attribute angle properties to a triangle whenever he considers it, even if he doesn't specifically think of that property."}, {"front": "What specific characteristics make the idea of God not \"factitious\" (invented) but an \"image of a true and immutable nature\"?", "back": "Only God's essence necessarily includes existence; it's impossible to conceive two or more such Gods; He must have existed from all eternity and exist eternally; and His properties cannot be diminished or changed."}, {"front": "Based on Descartes' argument, can there be more than one God? Why or why not?", "back": "No, it is not possible to conceive two or more Gods of the same position, as the idea of God implies a singular, supremely perfect, eternal, and immutable nature."}, {"front": "What does Descartes conclude about God's temporality (existence over time) based on his understanding of God's nature?", "back": "He concludes that God must have existed from all eternity and must exist eternally, as these are necessary attributes of a supremely perfect Being."}, {"front": "What is the ultimate criterion for conviction, according to Descartes, that applies to both mathematical truths and God's existence?", "back": "Only those things which are conceived clearly and distinctly have the power of persuading him entirely."}, {"front": "Why does Descartes believe that if his mind weren't preoccupied, he would know God more immediately and easily than anything else?", "back": "Because the existence of God, a Supreme Being whose essence alone pertains to existence, is the most manifest truth, hindered only by prejudices and the pressure of sensible things."}, {"front": "Briefly summarize Descartes' ontological argument for God's existence as presented in Meditation V.", "back": "Descartes argues that the idea of God as a supremely perfect Being necessarily includes existence, because existence is a perfection. To conceive of a supremely perfect Being without existence would be a contradiction, thus God must exist inherently."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
