<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 4, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What deeper problem does Descartes face after establishing the \"cogito\"?", "back": "The problem of guaranteeing the principle that what he perceives clearly and distinctly is true, which requires proving God's existence and non-deceiving nature."}, {"front": "What is the primary goal of Descartes' Meditation III?", "back": "To prove the existence of God."}, {"front": "According to Descartes, what kind of \"thing\" is he?", "back": "A thinking thing (res cogitans), meaning he doubts, affirms, denies, knows, is ignorant, loves, hates, wills, desires, imagines, and perceives."}, {"front": "What general rule does Descartes establish regarding truth?", "back": "That all things which he perceives very clearly and very distinctly are true."}, {"front": "What past experiences made Descartes doubt previously \"certain\" sensory perceptions?", "back": "He realized that things like the earth, sky, and stars, which he apprehended by senses, were later recognized as dubious. His error was in affirming that external objects *resembled* the ideas in his mind."}, {"front": "Why might even simple arithmetic truths (like 2+3=5) be called into doubt?", "back": "Because the possibility of a powerful, deceiving God (or demon) could mean he is deceived even concerning things that seem most manifest."}, {"front": "What two truths must Descartes establish to be certain of anything beyond the cogito?", "back": "Whether God exists, and if so, whether He is a deceiver."}, {"front": "How does Descartes classify his \"thoughts\" in Meditation III?", "back": "Into three kinds: Ideas, Volitions (or Affections), and Judgments."}, {"front": "According to Descartes, what are \"ideas\" in his classification of thoughts?", "back": "They are \"images of things,\" such as thoughts of a man, chimera, heaven, or God."}, {"front": "What are \"volitions or affections\" according to Descartes?", "back": "Thoughts that involve willing, fearing, approving, or denying, where something is added to the simple idea of the thing."}, {"front": "Which category of thoughts is the primary source of error for Descartes?", "back": "Judgments, specifically the judgment that ideas within him are similar or conformable to things outside him."}, {"front": "Why can't ideas themselves, or volitions/affections, properly speaking, be false?", "back": "Ideas, when considered only in themselves, cannot be false (e.g., whether I imagine a goat or a chimera, it's true that I imagine it). Volitions are also true as desires, even if the desired thing is evil or nonexistent."}, {"front": "What three kinds of ideas does Descartes suggest might exist, based on their apparent origin?", "back": "Innate ideas, adventitious ideas, and ideas formed (or invented) by himself (fictitious)."}, {"front": "Define \"adventitious ideas\" as presented in the text.", "back": "Ideas that seem to come from outside the mind, through the senses."}, {"front": "Give an example of an \"innate idea\" according to Descartes.", "back": "The power of understanding what is called a \"thing,\" a \"truth,\" or a \"thought."}, {"front": "Give an example of a \"fictitious idea\" according to Descartes.", "back": "Sirens, hippogryphs, or other imaginative creations of the mind."}, {"front": "What are the two initial reasons Descartes considers for believing that adventitious ideas proceed from external objects?", "back": "1) He feels \"taught by nature\" to believe it (a spontaneous inclination). 2) These ideas do not depend on his will (e.g., he feels heat whether he wants to or not)."}, {"front": "How does Descartes distinguish \"natural light\" from a \"spontaneous inclination\" (or being \"taught by nature\")?", "back": "\"Natural light\" causes him to believe something is true without doubt (like the cogito), providing a reliable faculty for truth. \"Spontaneous inclination\" is merely an impulse, which has often led him astray in moral choices, and thus cannot be trusted for truth or error."}, {"front": "Why does Descartes doubt the argument that ideas must come from external objects because they don't depend on his will?", "back": "He suggests there might be an unknown faculty within him capable of producing these ideas without external assistance, similar to how ideas are formed in dreams."}, {"front": "What is Descartes' final argument against the belief that adventitious ideas *resemble* external objects?", "back": "He notes that ideas often do not resemble their objects. He uses the example of two ideas of the sun: a small sensory one and a vast astronomical one. Reason suggests the sensory idea, though seemingly direct, is actually *least* similar to the real sun."}, {"front": "What conclusion does Descartes reach about his past belief in the existence of external objects resembling his ideas?", "back": "He concludes it was not based on certain judgment but on a \"blind impulse.\""}, {"front": "What is the significance of the \"Deceiving God\" hypothesis in Meditation III?", "back": "It raises a metaphysical doubt about the certainty of even clearly and distinctly perceived truths, highlighting the need to prove God's existence and non-deceiving nature to fully establish certainty."}, {"front": "When Descartes states, \"I am a thing that thinks, that is to say, that doubts, affirms, denies...\", what is he doing?", "back": "He is elaborating on the nature of his own self, listing the various modes or operations of his thinking substance."}, {"front": "Why is the distinction between \"natural light\" and \"spontaneous inclination\" crucial for Descartes?", "back": "It allows him to separate truly reliable epistemic foundations (natural light, which guarantees certainty) from unreliable impulses that have led to error, thus refining his method for establishing truth."}, {"front": "How does Descartes' analysis of ideas (innate, adventitious, fictitious) prepare the ground for proving God's existence?", "back": "By categorizing ideas and examining their potential origins, he sets up a framework to analyze the idea of God itself and determine if it could be merely fictitious or adventitious, or if its nature demands an innate, external cause."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
