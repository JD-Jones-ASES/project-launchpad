<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary question Descartes aims to answer in Meditation VI regarding the external world?", "back": "Descartes aims to prove whether the external world, consisting of bodies and material objects that cause our sensory ideas, actually exists."}, {"front": "Outline the core argument Descartes uses to prove the existence of the external world.", "back": "He argues that a strong, natural, and irresistible inclination to believe sensory ideas are caused by external objects implies their existence. If this inclination were a deception, God (who is not a deceiver) would be leading him into systematic error without means to correct it. Therefore, the external world must exist."}, {"front": "What crucial qualification does Descartes make about how our senses represent the external world?", "back": "He does not claim that material things are exactly as the senses represent them (e.g., colors, sounds). Senses provide practical information for survival, but reason is required for philosophical precision about the true nature of these extended, material causes."}, {"front": "Why is the order of the Meditations significant for establishing the existence of the external world?", "back": "The proof for the external world depends entirely on Descartes' prior proofs of God's existence and non-deception. Without a non-deceiving God, there is no guarantee that our natural inclinations track reality."}, {"front": "What does Descartes mean by the 'real distinction' between mind and body?", "back": "The 'real distinction' is the argument that mind and body are two fundamentally different substances that can exist independently of each other."}, {"front": "What is the first premise of Descartes' argument for the real distinction between mind and body?", "back": "I can clearly and distinctly conceive of my mind (a thinking thing) without conceiving of any body at all."}, {"front": "What is the second premise of Descartes' argument for the real distinction between mind and body?", "back": "I can clearly and distinctly conceive of bodies (extended, shaped, moving things) without conceiving of any thinking substance."}, {"front": "What philosophical principle is foundational to Descartes' argument for the real distinction?", "back": "The principle that conceivability implies possibility: if I can clearly and distinctly conceive of something, it is at least possible for God to make it so."}, {"front": "Define 'Substance Dualism' (or Cartesian Dualism).", "back": "Substance dualism is the philosophical view that reality contains two fundamentally different kinds of substance: mental substance (mind, soul, or res cogitans) and material substance (body or res extensa), each capable of existing independently."}, {"front": "List key characteristics of 'Mind' (res cogitans) in Cartesian Dualism.", "back": "Mind is a thinking substance that doubts, wills, imagines, feels, and perceives. It has no spatial location, size, shape, or divisibility."}, {"front": "List key characteristics of 'Body' (res extensa) in Cartesian Dualism.", "back": "Body is an extended substance that occupies space, has shape and size, and can be divided. It does not think."}, {"front": "How does Descartes' view of the mind-body relationship differ from an 'extreme' dualism (e.g., a sailor merely using a ship)?", "back": "Descartes affirms an intimate 'union' of mind and body, not just an association. He uses sensations like pain or hunger to show that the mind and body are deeply connected, where distress in the body directly causes distress in the mind."}, {"front": "What specific anatomical structure did Descartes propose as the point of interaction between the immaterial soul and the material body?", "back": "The pineal gland, a small structure at the center of the brain."}, {"front": "Why did Descartes choose the pineal gland as the mechanism for mind-body interaction?", "back": "He chose it because it appeared to be a single, unpaired structure in the brain, and he believed the unified soul must interact with the brain at a single point."}, {"front": "What is the 'Interaction Problem'?", "back": "The philosophical difficulty of explaining how two radically different substances—an immaterial, non-extended mind and a material, extended body—can causally interact with each other (e.g., how thought moves the body, or how physical events cause sensations)."}, {"front": "Why is Descartes' proposal of the pineal gland often criticized as not fully solving the interaction problem?", "back": "It merely relocates the mystery rather than resolving it. If the mind is truly non-extended, it cannot 'be at' the pineal gland in any ordinary spatial sense, leaving the mechanism of interaction opaque."}, {"front": "What is the practical value of the senses, according to Descartes, even if they are unreliable for philosophical precision?", "back": "The senses are reliable for practical purposes like survival, navigation, and avoiding immediate harm. Pain warns away from damage, hunger signals need for food, etc."}, {"front": "How does Descartes suggest one can distinguish waking experience from dreaming?", "back": "By the coherence of experience. Waking experience forms a connected, intelligible whole that coheres with memory and reason, unlike the typically disjointed and disconnected nature of dreams."}, {"front": "How does Descartes' dualism avoid being equated with Gnosticism?", "back": "Unlike Gnosticism, Descartes does not consider the body to be evil, illusory, or a prison for the soul. He emphasizes the intimate union of mind and body as a genuine part of being human, taking sensations and embodied experiences seriously as real features of the composite."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
