<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In which French town was René Descartes born in 1596?", "back": "La Haye en Touraine."}, {"front": "The town of La Haye en Touraine was eventually renamed _____ in honor of its most famous resident.", "back": "Descartes."}, {"front": "What was the profession of Descartes' father?", "back": "A lawyer and minor nobleman."}, {"front": "Descartes' father served as a councillor in the parliament of which French province?", "back": "Brittany."}, {"front": "Who raised Descartes after his mother died when he was just over a year old?", "back": "His maternal grandmother."}, {"front": "Which physical condition led Descartes to spend his mornings thinking in bed throughout his life?", "back": "A sickly constitution prone to illness."}, {"front": "At what age was Descartes sent to the Jesuit college of La Flèche?", "back": "Ten or eleven years old."}, {"front": "Which French monarch founded the prestigious Jesuit college of La Flèche in 1604?", "back": "King Henry IV."}, {"front": "How many years did Descartes spend studying at La Flèche?", "back": "Eight years."}, {"front": "Besides Latin and Greek, which traditional subjects comprised the curriculum at La Flèche?", "back": "Logic, rhetoric, mathematics, Aristotelian natural philosophy, and scholastic theology."}, {"front": "Why was Descartes granted the privilege of sleeping late in the mornings at La Flèche?", "back": "His delicate health."}, {"front": "Which specific subject at La Flèche did Descartes recall as the only one offering \"genuine certainty\"?", "back": "Mathematics."}, {"front": "What was the primary cause of Descartes' dissatisfaction with his education at La Flèche?", "back": "The conflicting opinions and lack of consensus among masters and ancient philosophers."}, {"front": "According to Descartes, why was theology certain while philosophy was not?", "back": "Theology rested on faith rather than demonstration."}, {"front": "In 1616, Descartes graduated with a degree in _____ from the University of Poitiers.", "back": "Law."}, {"front": "Why did Descartes join the army of Maurice of Nassau in 1618?", "back": "To seek the travel and leisure afforded to a gentleman-volunteer."}, {"front": "Who was Maurice of Nassau?", "back": "The Stadtholder of the Dutch Republic and a major military commander."}, {"front": "Concept: Isaac Beeckman", "back": "Definition: A Dutch scientist who influenced Descartes to apply mathematics to the natural world."}, {"front": "What specific intellectual challenge did Isaac Beeckman pose to Descartes?", "back": "To derive natural phenomena from first principles through mathematical physics."}, {"front": "Where did Descartes experience the \"Night of the Three Dreams\" on November 10, 1619?", "back": "A stove-heated room in Germany (possibly near Ulm)."}, {"front": "How did Descartes interpret his three vivid dreams in 1619?", "back": "As a divine call to unite all the sciences through mathematics and reason."}, {"front": "In 1628, Descartes moved to _____ because it offered him anonymity and seclusion.", "back": "The Netherlands."}, {"front": "In which year did Descartes publish the *Discourse on the Method*?", "back": "1637."}, {"front": "Which three scientific essays were published alongside the *Discourse on the Method* as demonstrations of Descartes' approach?", "back": "Optics, meteorology, and geometry."}, {"front": "Title: *Meditations on First Philosophy*", "back": "Definition: Descartes' 1641 work that explored the foundations of modern epistemology and the mind-body problem."}, {"front": "What supplemental material was included with the publication of the *Meditations*?", "back": "Six sets of Objections and Replies from philosophers and theologians."}, {"front": "Who invited Descartes to Stockholm in 1649 to serve as a philosophy tutor?", "back": "Queen Christina of Sweden."}, {"front": "What demanding schedule did Queen Christina set for her philosophy lessons with Descartes?", "back": "Lessons at five o'clock in the morning."}, {"front": "On what date did René Descartes die?", "back": "February 11, 1650."}, {"front": "What was the official cause of Descartes' death in Sweden?", "back": "Pneumonia."}, {"front": "How old was René Descartes when he died?", "back": "Fifty-three years old."}, {"front": "Which Dutch scientist's surviving journal provides a record of Descartes' early intellectual development?", "back": "Isaac Beeckman."}, {"front": "Describe the \"crisis of confidence\" that Descartes eventually detailed in his *Meditations*.", "back": "The result of years spent observing learned men contradict each other with self-assurance."}, {"front": "Descartes spent over _____ years living in the Netherlands to work in seclusion.", "back": "Twenty years."}, {"front": "What did Queen Christina of Sweden do in 1654, four years after Descartes' death?", "back": "She abdicated her throne and later converted to Catholicism."}, {"front": "The town of La Haye en Touraine is located in which region of France?", "back": "The Loire valley."}, {"front": "What was the significance of the year 1618 in Descartes' life?", "back": "He joined the forces of Maurice of Nassau and met Isaac Beeckman."}, {"front": "How did Descartes manage his privacy while living in the Netherlands?", "back": "He moved house frequently and shared his location with very few people."}, {"front": "According to his early biographer Adrien Baillet, Descartes' day of intense solitary reflection in 1619 occurred near which Bavarian city?", "back": "Ulm."}, {"front": "Which philosophical tradition did Descartes study at La Flèche and later find deeply unsatisfying?", "back": "Scholasticism (Aristotelian philosophy and theology)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
