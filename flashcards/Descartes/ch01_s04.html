<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Why does the author suggest reading the Meditations slowly?", "back": "It is an argument where each step depends on the reasoning of previous steps."}, {"front": "According to Descartes' Synopsis, when should a reader move on to a new section of the text?", "back": "Only when they are fully satisfied with the preceding material."}, {"front": "What is the consequence of reading the Meditations as a narrative or description rather than an argument?", "back": "The reader will likely experience confusion."}, {"front": "What action should a reader take upon reaching a passage they do not understand?", "back": "Stop and reread the passage instead of continuing."}, {"front": "How does Descartes explicitly invite the reader to interact with his work?", "back": "By conducting the meditations themselves rather than just reading about them."}, {"front": "In the context of the Meditations, what is the 'evil genius' hypothesis?", "back": "A thought experiment designed to test the limits of doubt."}, {"front": "What is the primary risk for a reader who 'simply watches from the outside' while reading the Meditations?", "back": "They will miss the elements that make the work philosophically interesting."}, {"front": "Term: The Meditator", "back": "Definition: The first-person narrator of the text, distinct from Descartes the historical author."}, {"front": "How does the Meditator's state of knowledge at the beginning of the book differ from the author's?", "back": "The Meditator begins in uncertainty, while the author already knows the final conclusions."}, {"front": "What literary device describes the gap between the Meditator’s struggle and Descartes’ established conclusions?", "back": "Dramatic irony"}, {"front": "According to the text, when should a reader be most skeptical of the Meditator’s argument?", "back": "When the progression of the argument seems too easy."}, {"front": "When the Meditator appears most uncertain, the text advises the reader to _____ the argument.", "back": "trust"}, {"front": "Which specific Meditation is responsible for creating a crisis by doubting everything?", "back": "Meditation I"}, {"front": "What is the central certainty discovered in Meditation II?", "back": "The Meditator exists as a thinking thing."}, {"front": "Which two Meditations are primarily concerned with establishing the existence and character of God?", "back": "Meditations III and V"}, {"front": "What is the primary focus of Meditation IV?", "back": "Explaining why error exists and how it can be avoided."}, {"front": "What are the two main objectives of Meditation VI?", "back": "Recovering the external world and distinguishing mind from body."}, {"front": "How should a reader interpret a step in Meditation VI that appears to lack context?", "back": "By looking back at the groundwork laid in earlier Meditations."}, {"front": "Who is the translator of the 1911 Cambridge University Press edition of Descartes' Meditations?", "back": "Elizabeth S. Haldane"}, {"front": "What was the original language in which Descartes wrote the Meditations?", "back": "Latin"}, {"front": "In what year did the French translation of the Meditations, supervised by Descartes, appear?", "back": "1647"}, {"front": "From which language did Elizabeth S. Haldane translate the Meditations?", "back": "Latin"}, {"front": "Why might a student find words like 'methought' in the Haldane translation?", "back": "The translation uses the formal English of the Edwardian era."}, {"front": "What was the primary language of international scholarship during the seventeenth century?", "back": "Latin"}, {"front": "Why does this volume include Latin terms in its footnotes?", "back": "To provide precision that may have been lost or smoothed over in translation."}, {"front": "According to the text, reading the Meditations requires a different kind of _____ than most books demand.", "back": "attention"}, {"front": "The Meditations is described as a sustained _____ in which each step depends on previous ones.", "back": "chain of reasoning"}, {"front": "What role does the reader play when Descartes decides to doubt everything?", "back": "They are encouraged to try to doubt those beliefs as well."}, {"front": "The Meditator is a figure used by scholars to distinguish the narrator from _____.", "back": "Descartes the historical author"}, {"front": "How does the Meditator build his knowledge throughout the book?", "back": "Slowly, starting from a state of uncertainty."}, {"front": "The six Meditations are intended to form a single _____.", "back": "continuous argument"}, {"front": "Elizabeth S. Haldane was notable for being the first woman appointed to what position in Scotland?", "back": "Justice of the Peace"}, {"front": "The Haldane translation was prepared alongside which other scholar?", "back": "G. R. T. Ross"}, {"front": "True or False: The Meditations can be fully understood by reading each section in isolation.", "back": "False"}, {"front": "What does the text suggest is usually clearer than the 'surface style' of the Haldane translation?", "back": "The argument"}, {"front": "What phrase does the text use to describe the narrator's process of arriving at conclusions?", "back": "Struggling toward conclusions"}, {"front": "What specific era's English is reflected in the Haldane translation?", "back": "Edwardian"}, {"front": "Descartes recommends that the reader be fully _____ with what has gone before before moving on.", "back": "satisfied"}, {"front": "In the author's view, what is the relationship between participation and the 'power' of the Meditations?", "back": "The power of the work comes from the reader's active participation."}, {"front": "What is the Meditator's primary discovery in Meditation II?", "back": "His own existence as a thinking thing."}, {"front": "Meditation VI uses previously established truths to recover the _____.", "back": "external world"}, {"front": "Why is it important that Descartes 'supervised and lightly revised' the 1647 French translation?", "back": "It adds authority to the French version alongside the Latin original."}, {"front": "The text defines the Meditator as a figure who 'discovers things, changes his mind, and _____.'", "back": "arrives at conclusions"}, {"front": "If a reader encounters a passage they don't understand, they should resist the temptation to _____.", "back": "keep going"}, {"front": "What is the purpose of the 'thought experiment' in the context of reading the Meditations?", "back": "To facilitate the reader's active participation in the philosophical process."}, {"front": "How many total Meditations make up the central argument of the book?", "back": "Six"}, {"front": "Who was Elizabeth S. Haldane's co-translator?", "back": "G. R. T. Ross"}, {"front": "The text describes the Haldane translation as being 'clear and _____' despite its archaic style.", "back": "faithful"}, {"front": "What is the primary function of the footnotes provided in this volume?", "back": "To gloss unusual or technical terms as they appear."}, {"front": "What is the Meditator's state at the very beginning of Meditation I?", "back": "A state of uncertainty"}, {"front": "In Meditation VI, what is distinguished from the mind?", "back": "The body"}, {"front": "The Meditations is not a narrative; it is a(n) _____.", "back": "argument"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
