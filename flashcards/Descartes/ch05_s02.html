<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Thomas Aquinas, what is the primary nature of truth?", "back": "Truth is not primarily a property of ideas in the mind, but a relation: the relation of conformity between the intellect and reality."}, {"front": "What is Aquinas's Latin formula for the correspondence theory of truth?", "back": "'Adaequatio intellectus et rei,' meaning the adequation (matching) of the intellect to the thing."}, {"front": "For Aquinas, where does truth primarily reside?", "back": "Truth resides primarily in the intellect."}, {"front": "In what secondary sense does Aquinas say 'things' can be true?", "back": "Things are said to be true secondarily insofar as they conform to an intellect on which they depend (e.g., artificial things to our intellect, natural things to the divine intellect)."}, {"front": "How does Aquinas's criterion for truth differ from Descartes's?", "back": "Aquinas held that truth is correspondence between intellect and world, while Descartes held that truth is clarity and distinctness in the mind itself."}, {"front": "What significant shift in the standard of truth marks the transition from Aquinas to early modern philosophy?", "back": "The standard of truth moved from the world (Aquinas's correspondence with external reality) to the mind (Descartes's internal clarity and distinctness)."}, {"front": "Who was Augustine of Hippo, and what was his key idea regarding the problem of evil?", "back": "Augustine was an influential Christian thinker who argued that evil is not a positive substance created by God, but a privation (absence) of good, similar to how darkness is an absence of light."}, {"front": "How does Descartes apply Augustine's concept of evil as privation to the problem of intellectual error?", "back": "Descartes argues that error is not a positive faculty God created, but a privation—an absence of the knowledge and restraint that should be present."}, {"front": "According to Descartes's view on error, is God responsible for human intellectual mistakes?", "back": "No, because error is a privation (an absence of knowledge), God is no more responsible for our intellectual mistakes than he is for our moral failures."}, {"front": "Who was Gottfried Wilhelm Leibniz, and what concept did he propose in his 'Theodicy'?", "back": "Leibniz was a German philosopher and mathematician who argued in his 'Theodicy' that God, being perfectly rational, created 'the best of all possible worlds.'"}, {"front": "How does Leibniz's 'Theodicy' address the existence of evil and error in a world created by a perfect God?", "back": "Leibniz argued that a world with free creatures capable of error is better than a world of perfect automatons. Thus, error is the 'price of freedom' that makes genuine virtue possible."}, {"front": "Describe Descartes's view of the human will concerning judgment.", "back": "Descartes believed the human will is effectively infinite; there is no proposition a person cannot affirm or deny, and no judgment is forced upon them."}, {"front": "How does Descartes's understanding of human freedom relate to God's freedom?", "back": "Descartes believed that human freedom of judgment is a participation in God's own unlimited freedom, differing only in extent."}, {"front": "How does Thomas Hobbes's view of the will contrast with Descartes's?", "back": "Hobbes held that the will is not free in a robust sense, but is simply the last desire or aversion before an action, entirely determined by prior causes."}, {"front": "What three core problems does Descartes address in Meditation IV?", "back": "The nature of truth, the origin of error, and the relationship between intellect and will."}, {"front": "According to Aquinas, if 'the good' denotes what the appetite tends towards, what does 'the true' denote?", "back": "'The true' denotes that towards which the intellect tends."}, {"front": "Aquinas states that the 'term of the appetite' (good) is in the desirable object. Where does he say the 'term of the intellect' (true) is?", "back": "In the intellect itself."}, {"front": "Why, according to Aquinas, does the truth of our intellect being caused by a thing not necessarily mean truth resides primarily in the thing?", "back": "He uses the analogy of health: medicine causes health, but health resides primarily in the animal, not the medicine. Similarly, the being of the thing causes truth in the intellect, but truth resides primarily in the intellect."}, {"front": "What does the detail 'Melencolia I' by Albrecht Dürer symbolize in relation to Descartes's search for certain knowledge?", "back": "It symbolizes the frustration of the thinking mind that cannot reach truth by reason alone, reflecting Descartes's search for certain knowledge."}, {"front": "What is the key characteristic of Descartes's criterion of truth that makes it 'inward'?", "back": "His criterion of clarity and distinctness does not require checking ideas against external reality but only inspecting whether ideas are perceived with full transparency within the mind."}, {"front": "According to Aquinas, artificial things are said to be true because they relate to which intellect?", "back": "They are true in so far as they are related to our intellect (e.g., a house is true if it expresses the form in the architect's mind)."}, {"front": "According to Aquinas, natural things are said to be true because they relate to which intellect?", "back": "They are true in so far as they relate to the divine mind (e.g., a stone is true if it possesses the nature proper to a stone according to the divine intellect's preconception)."}, {"front": "What did the ancient philosophers wrongly conclude about the truth of things, according to Aquinas, due to their belief that natural things didn't proceed from any intellect?", "back": "They were compelled to base the truth of things on their relation to *our* intellect, leading to inadmissible conclusions refuting by Aristotle."}, {"front": "Descartes's picture of human freedom is described as 'remarkably generous.' What aspect of human capacity does he equate with God's own unlimited freedom?", "back": "Our freedom of judgment."}, {"front": "Which historical figure is noted for mercilessly satirizing Leibniz's optimism in 'Candide'?", "back": "Voltaire."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
