<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary goal of Descartes' Method of Doubt in Meditation I?", "back": "To find a certain foundation for building philosophy."}, {"front": "What is the specific standard Descartes uses to set aside a belief in Meditation I?", "back": "Whether the belief admits of even the slightest possible doubt."}, {"front": "Descartes treats as false any belief that is merely _____, rather than proving it is actually false.", "back": "uncertain"}, {"front": "Concept: The Method of Doubt", "back": "Definition: A procedure for finding certainty by treating any doubtable belief as if it were false."}, {"front": "What are the three distinct stages of Descartes' method of doubt?", "back": "The argument from the senses, the dream argument, and the evil genius hypothesis."}, {"front": "Why does Descartes argue that it is 'imprudent' to trust the senses entirely?", "back": "Because the senses have deceived him in the past."}, {"front": "In the argument from the senses, what shape does a square tower appear to be from a distance?", "back": "Round."}, {"front": "What happens to the appearance of a straight stick when it is partially submerged in water?", "back": "It looks bent."}, {"front": "In the first stage of doubt, what happens to the perceived size of a large object viewed from far away?", "back": "It looks small."}, {"front": "Term: Skepticism", "back": "Definition: The philosophical view that certainty or knowledge is impossible or extremely difficult to achieve."}, {"front": "How does Descartes' use of skepticism differ from that of the ancient Pyrrhonian skeptics?", "back": "Descartes uses doubt as a tool to find certainty, whereas ancient skeptics suspended judgment as a final position."}, {"front": "Why is the first stage of doubt (the senses) considered relatively weak or 'mild'?", "back": "Because many sensory illusions can be compensated for once they are known."}, {"front": "What is the central question posed by the Dream Argument?", "back": "How can one be certain they are not dreaming at this very moment?"}, {"front": "According to Descartes, why can't we distinguish waking from dreaming while experiencing them?", "back": "There is no reliable criterion or 'stamp' on waking experience that dreams cannot counterfeit."}, {"front": "What specific type of beliefs are rendered uncertain by the Dream Argument?", "back": "All perception-based or sensory beliefs."}, {"front": "Which field of knowledge seems to remain certain even if one is dreaming?", "back": "Mathematics (arithmetic and geometry)."}, {"front": "In Meditation I, Descartes notes that whether dreaming or awake, 2 + 2 equals _____.", "back": "4"}, {"front": "In Meditation I, Descartes notes that whether dreaming or awake, a triangle always has _____ angles.", "back": "three"}, {"front": "What is the purpose of the 'Evil Genius' hypothesis?", "back": "To serve as a thought experiment to test what cannot be doubted even under extreme conditions of deception."}, {"front": "Term: Thought Experiment", "back": "Definition: A hypothetical scenario constructed to test a philosophical principle rather than describe reality."}, {"front": "The Evil Genius hypothesis allows Descartes to doubt which 'self-evident' field of study?", "back": "Mathematics (or logic)."}, {"front": "What is the Latin term for the 'evil genius' used in the Meditations?", "back": "malin g\\'enie"}, {"front": "How does the Evil Genius hypothesis affect Descartes' confidence in his own memory?", "back": "It strips it away, as the deceiver could be feeding him false memories."}, {"front": "At the conclusion of Meditation I, what is the status of the external world?", "back": "It is not established as certain."}, {"front": "What analogy does Descartes use to describe his state of mind at the end of Meditation I?", "back": "A man who has fallen into deep water and cannot find the bottom with his feet."}, {"front": "Why is Descartes' doubt described as 'methodological' rather than 'psychological'?", "back": "It is a controlled, hypothetical tool for inquiry, not a state of genuine panic or belief."}, {"front": "How does Descartes' method of doubt resemble a mathematician's use of a hypothesis?", "back": "Both assume a condition (e.g., 'Suppose x is even') to see what follows or to derive a result."}, {"front": "What is the common misunderstanding regarding Descartes' personal belief in the Evil Genius?", "back": "That he actually believes such a demon exists, rather than using it as a thought experiment."}, {"front": "What is the common misunderstanding regarding Descartes being a 'skeptic'?", "back": "Thinking he concludes knowledge is impossible, when he actually uses doubt to find knowledge."}, {"front": "How does Meditation I end, in terms of its logical structure?", "back": "It ends with a question and a suspension of judgment, not a final conclusion."}, {"front": "Why is 'pinching yourself' an ineffective rebuttal to the dream argument?", "back": "Because a vivid dream can simulate the sensation of being pinched and the feeling of being awake."}, {"front": "To be philosophically useful, a criterion for distinguishing waking from dreaming must not _____ that you are already awake.", "back": "presuppose"}, {"front": "The standard of doubt in Meditation I is not proof of falsity but the _____ of doubt.", "back": "possibility"}, {"front": "Stage One targets _____ deception; Stage Two targets _____ deception; Stage Three targets _____ deception.", "back": "sensory; dream; universal (or mathematical/logical)"}, {"front": "In Meditation I, Descartes resolves to act 'as though' all his former beliefs are _____.", "back": "false"}, {"front": "Which stage of doubt is the most radical instrument in Descartes' method?", "back": "The Evil Genius hypothesis."}, {"front": "Why does Descartes call the deceiver an 'anti-God'?", "back": "Because it is supremely powerful like God but dedicated to malice and deception rather than truth."}, {"front": "Does Meditation I suggest that we should never trust our senses in daily life?", "back": "No; the doubt is for the specific purpose of building a foundation for philosophy, not for practical living."}, {"front": "What is the 'lowest point' of the Meditations?", "back": "The state of radical uncertainty at the end of Meditation I."}, {"front": "According to the text, what is the subject of Meditation II?", "back": "Discovering what, if anything, survives the method of doubt."}, {"front": "If a belief has any chance of being wrong, Descartes' method requires that it be _____.", "back": "set aside"}, {"front": "The 'malicious demon' is a translation for which concept in the Meditations?", "back": "The Evil Genius."}, {"front": "Why are students often corrected for saying the Evil Genius hypothesis is Descartes' own view?", "back": "Because it is a maximally bad case scenario designed to isolate certainty, not a literal belief."}, {"front": "What does the text mean by 'radical uncertainty' at the end of Chapter 2, Section 1?", "back": "A state where not even simple logical or sensory truths are yet established as certain."}, {"front": "How does the 'square tower' example specifically support the argument against sensory reliability?", "back": "It demonstrates that the senses provide different information about the same object based on perspective."}, {"front": "Descartes compares himself to a scientist subjecting a material to _____ to see how strong it is.", "back": "extreme stress"}, {"front": "In the context of the dream argument, 'coherence' is often rejected as a criterion because dreams can be _____ from the inside.", "back": "vivid (or seemingly coherent)"}, {"front": "What is the primary difference between Stage One and Stage Two of Descartes' doubt?", "back": "Stage One doubts specific sensory instances, while Stage Two doubts the entirety of sensory experience."}, {"front": "Why is the Evil Genius hypothesis necessary even after the Dream Argument?", "back": "Because the Dream Argument does not successfully cast doubt on mathematical or logical truths."}, {"front": "According to the 'caution' section, how should a reader view Descartes' state of mind during the Meditations?", "back": "As a person conducting a controlled philosophical experiment, not someone in a state of distress."}, {"front": "Is the Evil Genius hypothesis intended to be falsifiable?", "back": "No, it is a tool for testing the limits of what cannot possibly be doubted regardless of external reality."}, {"front": "If Descartes finds a belief that survives the Evil Genius, what has he discovered?", "back": "An absolute certainty."}, {"front": "What does Descartes mean by 'suspension' at the end of Meditation I?", "back": "The deliberate act of holding back assent to all former beliefs until they are proven certain."}, {"front": "The argument that 2 + 3 = 5 could be a deception is part of which stage of doubt?", "back": "The Evil Genius (Stage Three)."}, {"front": "Why does Descartes describe the meditator as being in 'solitary reflection'?", "back": "To emphasize that the inquiry is a personal, internal examination of one's own beliefs."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
