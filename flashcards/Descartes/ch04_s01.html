        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "After establishing the 'cogito,' why did Descartes still face significant philosophical problems?", "back": "Despite knowing he exists as a thinking thing, the evil genius hypothesis still threatened the reliability of all other beliefs (including memory and mathematical truths), requiring a further guarantee."}, {"front": "What is Descartes' 'evil genius' hypothesis, and why is it a problem even after the cogito?", "back": "The evil genius is a hypothetical supremely powerful and deceitful being that could be systematically making Descartes believe false things. It remains a problem because it could make even seemingly clear and distinct perceptions unreliable."}, {"front": "Why does Descartes need God as a philosophical guarantor of truth?", "back": "God is needed to neutralize the evil genius hypothesis. If a perfectly good God exists and is not a deceiver, then whatever Descartes perceives clearly and distinctly must be true, validating his reason."}, {"front": "What is the primary philosophical role of Meditation III in Descartes' overall project?", "back": "Meditation III is essential to bridge the gap from the isolated certainty of the cogito to reliable knowledge of the world by proving God's existence and thus validating Descartes' criterion of truth."}, {"front": "Define Descartes' 'clear and distinct perception,' his criterion for truth.", "back": "An idea is clear when it is fully present to the attentive mind with nothing hidden or obscure. It is distinct when it is sharply separated from all other ideas, with no confusion."}, {"front": "Why can't Descartes immediately trust his criterion of clear and distinct perception after defining it?", "back": "The evil genius hypothesis implies that even seemingly clear and distinct perceptions could be false. The reliability of his rational faculties, and thus the criterion itself, is precisely what needs a divine guarantee."}, {"front": "According to Descartes, what must be proven before the criterion of clear and distinct perception can be universally trusted?", "back": "The existence of a non-deceiving God must be proven, as God's benevolence is the ultimate guarantee that his faculty of reason, when perceiving clearly and distinctly, reliably produces truth."}, {"front": "What is the starting point for Descartes' Causal Argument for God's Existence in Meditation III?", "back": "He examines the content of his own ideas, specifically focusing on the idea of God—an infinitely perfect, all-knowing, all-powerful, self-sufficient being."}, {"front": "Explain Descartes' 'Causal Adequacy Principle.'", "back": "This principle states that the cause of an idea must possess at least as much reality as the idea represents. Something cannot come from nothing, and something greater cannot arise from something lesser (e.g., a finite cause cannot produce an idea with infinite representational content)."}, {"front": "How does the Causal Adequacy Principle apply to Descartes' idea of God?", "back": "The idea of God represents an infinite being with unlimited perfection, meaning it has infinite objective reality. According to the principle, only a being with infinite formal reality (God) could be the adequate cause of such an idea."}, {"front": "Why does Descartes reject the possibility that he, a finite being, could have invented the idea of an infinite God himself?", "back": "As a finite being, Descartes lacks the infinite formal reality required to be the original cause of an idea representing infinite objective reality. He argues his idea of the infinite is positive and fundamental, not merely an extrapolation of the finite."}, {"front": "What is 'formal reality' in Descartes' metaphysics?", "back": "Formal reality is the reality a thing has in itself—its actual existence. It varies by degree, with God possessing infinite formal reality as the most complex and perfect being."}, {"front": "What is 'objective reality' in Descartes' technical usage?", "back": "Objective reality is the reality an idea has *as representing something*. It refers to the reality of the thing *as it is represented in the idea*, not the reality of the idea itself as a mental event."}, {"front": "What does it mean for a being to exist 'a se'?", "back": "'A se' is Latin for 'from itself.' A being that is 'a se' exists through its own nature and is not dependent on any external cause for its existence. Descartes holds that God alone is 'a se' in the fullest sense."}, {"front": "How do 'formal reality' and 'objective reality' relate to the Causal Adequacy Principle?", "back": "The principle states that the formal reality of the cause must be at least as great as the objective reality of the effect (the idea). An idea with infinite objective reality requires a cause with infinite formal reality."}, {"front": "What is 'eminent reality' according to Descartes?", "back": "To contain something eminently means to possess it in a higher degree or more perfect form than it appears in the effect. For example, God's infinite power eminently contains the power to create finite bodily things, even though God is incorporeal."}, {"front": "What is the 'Cartesian Circle' objection to Descartes' Meditations?", "back": "The Cartesian Circle is the objection that Descartes' argument is circular: he uses clear and distinct perception to prove God's existence, but then uses God's existence to guarantee the reliability of clear and distinct perception."}, {"front": "Who raised the Cartesian Circle objection against Descartes?", "back": "Antoine Arnauld raised the Cartesian Circle objection in the Fourth Objections to Descartes' Meditations."}, {"front": "How does Descartes' argument for God in Meditation III differ fundamentally from Thomas Aquinas's Five Ways?", "back": "Descartes argues from the internal idea of God found within his own mind, without yet affirming the external world. Aquinas's Five Ways argue from observable effects in the external world (e.g., motion, causation, design) to God as their cause."}, {"front": "What is the *only* premise from experience that Descartes' Meditation III argument relies on?", "back": "The only premise from experience is that Descartes finds in his own mind an idea with infinite representational content (the idea of God)."}, {"front": "If Descartes were to doubt the reliability of memory, what impact would that have on his ability to trust clear and distinct perceptions over time?", "back": "Doubting memory would prevent him from trusting a clear and distinct perception moments after he experiences it, as memory, rather than direct intuition, would be doing the work, and memory could be fallible under the evil genius hypothesis."}, {"front": "What consequence would follow if God were a deceiver, according to Descartes?", "back": "If God were a deceiver, then even Descartes' clear and distinct perceptions could be systematically false, and he could not trust his own faculty of reason, undermining the possibility of certain knowledge."}, {"front": "Descartes argues his idea of the infinite is not just an 'extrapolation' of finite concepts. What does he mean?", "back": "He means his idea of the infinite is positive, clear, and intelligible in its own right, perhaps even more so than his idea of himself. It's not merely the idea of 'not-finite' but a distinct, positive concept."}, {"front": "Consider the Cartesian Circle: Is the 'cogito' itself a clear and distinct perception? What implications does your answer have for the objection?", "back": "Yes, the 'cogito' is presented as a paradigm case of a clear and distinct perception. This implies that *some* clear and distinct perceptions (like the cogito) might be indubitable even without God, potentially offering a foundation from which to build without immediate circularity, though the problem persists for *all other* C&DPs."}, {"front": "How does the concept of 'a se' relate to God's 'infinite formal reality'?", "back": "God's infinite formal reality means God exists to the highest possible degree, without limitation. Being 'a se' means God's existence is derived solely from God's own nature, not from any external cause, which is a characteristic of an infinitely perfect and self-sufficient being."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
