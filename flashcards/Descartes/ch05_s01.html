<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the central philosophical question addressed in Descartes' Meditation IV?", "back": "If a perfect God made us, why do we ever go wrong or make mistakes?", "id": "fc01"}, {"front": "According to Descartes, what is the immediate consequence of God being supremely perfect?", "back": "God cannot be a deceiver, because deception is an imperfection.", "id": "fc02"}, {"front": "Why does Descartes argue that deception is an imperfection?", "back": "To deceive is to create a false impression, an act of a being that is either malicious or weak, neither of which qualities belongs to a supremely perfect being.", "id": "fc03"}, {"front": "What crucial epistemological conclusion does Descartes draw from God's non-deceiving nature?", "back": "What the mind genuinely perceives 'clearly and distinctly' is true, and not false perceptions planted by an evil genius.", "id": "fc04"}, {"front": "Outline Descartes' tight argument proving the truth of clear and distinct perceptions.", "back": "1) God exists and is supremely perfect. 2) A supremely perfect being cannot deceive. 3) Therefore, God does not deceive. 4) Therefore, what I clearly and distinctly perceive is not the product of deception. 5) Therefore, it is true.", "id": "fc05"}, {"front": "What 'serious problem' arises if God is perfect, non-deceiving, and made us, yet we still make mistakes?", "back": "This is a version of the 'Problem of Evil' applied to knowledge: how can an all-good, non-deceptive God allow intellectual error?", "id": "fc06"}, {"front": "What is Descartes' ultimate goal in Meditation IV regarding the source of error?", "back": "To show that error is entirely our own fault, not God's, through rigorous philosophical analysis.", "id": "fc07"}, {"front": "What are the two mental faculties Descartes distinguishes in his solution to the problem of error?", "back": "The intellect (*intellectus*) and the will (*voluntas*).", "id": "fc08"}, {"front": "Describe Descartes' concept of the intellect.", "back": "The intellect is the faculty by which we perceive and understand ideas. It is finite, limited in what it can grasp, and is the passive, receptive side of cognition.", "id": "fc09"}, {"front": "Describe Descartes' concept of the will.", "back": "The will is the faculty by which we affirm or deny propositions, judge, choose, or refuse. It is effectively infinite in its freedom to say yes or no, and is the active, judging side of cognition.", "id": "fc10"}, {"front": "How does Descartes explain the origin of intellectual error based on the intellect and will?", "back": "Error occurs when the infinite will rushes ahead of the finite intellect, meaning we affirm or deny something we have not clearly and distinctly grasped.", "id": "fc11"}, {"front": "What is Descartes' prescribed remedy for avoiding intellectual error?", "back": "Withhold judgment whenever your perception is not clear and distinct. This is an act of intellectual discipline.", "id": "fc12"}, {"front": "What further puzzle does Descartes address regarding the intellect and will mismatch?", "back": "If God made both faculties, why did He create them in a way (finite intellect, infinite will) that seemingly creates the opportunity for error?", "id": "fc13"}, {"front": "What is 'theodicy' in a philosophical context?", "back": "A defense of God's goodness in the face of evil or imperfection.", "id": "fc14"}, {"front": "How does Descartes use the concept of 'privation' to explain error without blaming God?", "back": "Error is not a positive thing God created, but a privation—an absence or lack of the knowledge and restraint that ought to be present, like blindness is a lack of sight.", "id": "fc15"}, {"front": "If error is a privation, where does Descartes place the responsibility for it?", "back": "The defect lies in what the individual fails to do (withhold judgment), not in a positive faculty for falsehood created by God.", "id": "fc16"}, {"front": "Does Descartes consider a finite intellect a defect created by God?", "back": "No. A finite intellect is simply a natural feature of being a finite creature. The problem arises when humans refuse to respect its limits.", "id": "fc17"}, {"front": "What is a common misunderstanding of Descartes' Meditation IV regarding God's role?", "back": "That Descartes is simply 'excusing God' as a theological apology. In reality, he offers a philosophical analysis of error, from which God's blamelessness follows.", "id": "fc18"}, {"front": "Does Descartes' argument imply we should never make judgments about uncertain matters?", "back": "No. It means we should be aware when judging beyond clear understanding and proportion our confidence to our clarity, rather than treating uncertain judgments as certain.", "id": "fc19"}, {"front": "What practical advice does Descartes' principle – 'do not judge beyond what you clearly and distinctly understand' – offer for intellectual integrity?", "back": "Be honest about the limits of your knowledge, do not pretend to certainty you do not have, and admit when you are genuinely uncertain.", "id": "fc20"}, {"front": "Why is the human will considered 'effectively infinite' by Descartes?", "back": "Because in its pure freedom to affirm or deny any proposition, it mirrors the divine will, not in the extent of its objects, but in its capacity for choice.", "id": "fc21"}, {"front": "What is the Latin term Descartes uses for 'understanding' or 'reason'?", "back": "Intellectus.", "id": "fc22"}, {"front": "What is the Latin term Descartes uses for 'will' or 'choice'?", "back": "Voluntas.", "id": "fc23"}, {"front": "How does Descartes' account place the 'blame squarely on us' for error, while still being 'generous, even hopeful'?", "back": "It blames us for misusing our freedom (will) but is hopeful because the remedy (withholding judgment) is within our control, allowing us to avoid error through discipline.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
