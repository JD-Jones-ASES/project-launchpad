<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was René Descartes' personal religious stance and his philosophical goal regarding religion?", "back": "Descartes was a sincere Catholic who believed philosophy could, and should, demonstrate God's existence and the soul's distinctness from the body."}, {"front": "What was ironic about Descartes' intentions for his philosophy?", "back": "Despite intending to defend the Catholic faith, his method of radical doubt opened a door that would lead many successors far from the faith he sought to defend."}, {"front": "How did Descartes demonstrate his commitment to the Catholic Church?", "back": "He was born, raised, and educated in the Catholic faith, maintained connections with Jesuit scholars, and dedicated his Meditations to the Faculty of Theology at the University of Paris."}, {"front": "Why did Descartes believe his new philosophy would better serve religion than the Aristotelian framework?", "back": "He thought that if Aristotelian physics was being dismantled, the theology built upon it might fall too. He aimed to rebuild theology's philosophical foundations on the unshakeable certainty of the cogito and the God who guarantees it."}, {"front": "What ironic fate befell Descartes' Meditations after his death?", "back": "His Meditations on First Philosophy, intended as a philosophical support for Catholic theology, was placed on the Roman Catholic Church's Index of Forbidden Books in 1663."}, {"front": "What was the Church's primary concern with Descartes' method, rather than his conclusions?", "back": "The Church was concerned that his method of beginning from radical doubt and rebuilding knowledge without appealing to the authority of tradition or revelation seemed to place human reason above the Church's teaching."}, {"front": "What common philosophical conclusions did Descartes and Aquinas share regarding God and the soul?", "back": "Both concluded that God exists and that the soul is distinct from matter."}, {"front": "Describe Thomas Aquinas's method for proving God's existence.", "back": "Aquinas used an *a posteriori* approach, starting from observable features of the created world (e.g., motion, causation, contingency) and reasoning from these effects back to God as their ultimate cause."}, {"front": "Define *a posteriori* knowledge as it relates to arguments for God's existence.", "back": "*A posteriori* knowledge is knowledge that depends on experience and observation. Arguments for God's existence based on *a posteriori* reasoning begin with observable facts about the world."}, {"front": "Describe René Descartes' method for proving God's existence.", "back": "Descartes used an *a priori* approach, turning inward to analyze innate ideas, such as the idea of an infinite perfect being (Meditation III) or the concept of a supremely perfect being (Meditation V)."}, {"front": "Define *a priori* knowledge as it relates to arguments for God's existence.", "back": "*A priori* knowledge is knowledge that is independent of experience; knowledge that can be established by reason alone, without appealing to observation."}, {"front": "Why did Aquinas and the Thomistic tradition generally reject ontological arguments for God's existence?", "back": "They argued that finite human minds do not have direct access to God's essence; we can only reason toward God from what we observe of his effects. Any attempt to derive God's existence from the concept of God alone overestimates human capacity to grasp the divine nature."}, {"front": "What is the Thomistic definition of 'essence'?", "back": "Essence is what a thing is, as opposed to whether it exists. Aquinas holds that in creatures, essence and existence are distinct. Only in God are essence and existence identical, but this must be established after proving God exists, not by analyzing the concept."}, {"front": "On what crucial point regarding God's existence did Descartes and Aquinas agree?", "back": "Both agreed that God's existence can be known by natural reason, without faith or revelation, aligning with the classical Christian tradition that God's existence is naturally knowable."}, {"front": "Explain the meaning of 'Fides quaerens intellectum' and its significance.", "back": "'Fides quaerens intellectum' means 'Faith seeking understanding.' It was Anselm's motto and describes the classical Christian view that the believer uses reason to deepen and articulate what faith already holds."}, {"front": "What is the core idea of the classical Christian philosophical view on faith and reason?", "back": "The classical view holds that faith and reason are complementary; they pursue different objects by different means but cannot ultimately contradict each other because God is the author of both revelation and reason."}, {"front": "How did Descartes' approach to philosophy differ from the classical Christian view of 'Faith and Reason'?", "back": "While the classical view (e.g., Anselm, Aquinas) began from faith's starting points, Descartes innovated by beginning from radical doubt rather than from faith, a shift with far-reaching consequences."}, {"front": "What is considered the most troubling aspect of Descartes' legacy for Christian philosophy?", "back": "His method implied that reason was autonomous – self-legislating and answerable to itself alone – thereby separating philosophical inquiry from the community of faith and theology."}, {"front": "How did Descartes' method make reason 'autonomous'?", "back": "By beginning from radical doubt and attempting to rebuild knowledge entirely through unaided reason, Descartes installed the individual reasoning mind as the final court of appeal, independent of external authority like tradition or revelation."}, {"front": "What consequence did the autonomy of reason have for the relationship between philosophy and theology?", "back": "Philosophy no longer needed theology's permission to proceed, and theology no longer provided philosophy's starting points, leading to a separation between the two disciplines."}, {"front": "How did Descartes' focus on 'What can I prove by reason alone?' impact his successors?", "back": "His successors found this first question difficult enough to occupy them entirely, causing the second question, 'What has God revealed?', to seem optional and eventually superfluous."}, {"front": "According to the text, what is one important philosophical contribution of Descartes' proofs of God, despite any specific flaws?", "back": "Descartes establishes that the existence of God is a philosophical question, not merely a matter of blind faith, demonstrating that faith and reason are not enemies and that God's existence can be rationally defended."}, {"front": "What philosophical virtue did Descartes emphasize that is beneficial for both philosophy and theology?", "back": "His insistence on clarity and rigor: accepting only what can be seen clearly and distinctly, withholding judgment when evidence is insufficient, and following arguments carefully wherever they lead."}, {"front": "What significant challenge did Descartes' sharp separation of mind and body pose for Christian anthropology?", "back": "His picture of the human person as a 'thinking substance accidentally united to a body' sits uneasily with Christian teaching about the goodness of creation, the Incarnation of Christ, and the resurrection of the body."}, {"front": "How does the Thomistic account of the soul contrast with Descartes' dualism regarding Christian anthropology?", "back": "The Thomistic account of the soul as the 'form of the body' is, in many respects, more congenial to Christian anthropology than Descartes' dualism because it better integrates the spiritual and material aspects of human nature."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
