<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 3, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Descartes describe his state of mind at the beginning of Meditation II?", "back": "He is in a state of crisis, filled with so many doubts from the previous day that he cannot forget them, and feels disconcerted, like someone fallen into very deep water.", "id": "fc01"}, {"front": "What is the 'Archimedean point' Descartes seeks in Meditation II?", "back": "A single fixed, certain, and indubitable point of knowledge from which he can rebuild all other knowledge, much like Archimedes sought a fixed point to move the earth.", "id": "fc02"}, {"front": "What method does Descartes employ in Meditation II to find certainty?", "back": "He proceeds by setting aside all that in which the least doubt could exist, treating it as if it were absolutely false, until he finds something certain.", "id": "fc03"}, {"front": "What does Descartes initially persuade himself of regarding his senses and body during his radical doubt?", "back": "He considers that he possesses no senses and imagines that body, figure, extension, movement, and place are but fictions of his mind.", "id": "fc04"}, {"front": "What is the 'definite conclusion' Descartes reaches regarding his own existence?", "back": "The proposition 'I am, I exist' is necessarily true each time that he pronounces it or mentally conceives it.", "id": "fc05"}, {"front": "How does the hypothesis of a powerful deceiver actually support Descartes' certainty of his own existence?", "back": "Even if a powerful and cunning deceiver employs all his ingenuity in deceiving Descartes, Descartes must still exist to be deceived. The deceiver 'can never cause me to be nothing so long as I think that I am something.'", "id": "fc06"}, {"front": "Before his radical doubt, how did Descartes primarily define himself as a 'man'?", "back": "He believed himself to be a 'reasonable animal,' possessing a body (face, hands, limbs, flesh, bones) and a soul (associated with nourishment, walking, feeling, and thinking).", "id": "fc07"}, {"front": "How did Descartes initially conceive of the soul before his deeper reflections in Meditation II?", "back": "He imagined it as 'something extremely rare and subtle like a wind, a flame, or an ether, which was spread throughout my grosser parts.'", "id": "fc08"}, {"front": "How did Descartes formerly define 'body' in his pre-doubt opinions?", "back": "A body was defined as something with a certain figure, confined in a certain place, filling a given space (excluding others), perceptible by senses, and moved by external forces (not self-movement, feeling, or thinking).", "id": "fc09"}, {"front": "After applying radical doubt, which attributes of his former self-conception (body, nutrition, walking, sensation, thinking) does Descartes find he can still affirm?", "back": "Only thinking. All other attributes associated with a body (body parts, nutrition, walking, and sensation as linked to a corporeal body) are cast into doubt.", "id": "fc10"}, {"front": "What is Descartes' ultimate conclusion about his nature after applying radical doubt and affirming his existence?", "back": "He concludes, 'I am not more than a thing which thinks, that is to say a mind or a soul, or an understanding, or a reason.'", "id": "fc11"}, {"front": "According to Descartes, for how long does his existence as a thinking thing last?", "back": "His existence lasts 'just when I think; for it might possibly be the case if I ceased entirely to think, that I should likewise cease altogether to exist.'", "id": "fc12"}, {"front": "Why does Descartes conclude that imagination is not a reliable tool for understanding his true nature as a thinking thing?", "back": "Imagination deals with 'figures or images of a corporeal thing,' which are still under doubt. Relying on it would be like trying to gain clearer perception by going to sleep to have more truthful dreams.", "id": "fc13"}, {"front": "What specific actions or faculties does Descartes identify as belonging to a 'thing which thinks'?", "back": "Doubting, understanding, conceiving, affirming, denying, willing, refusing, imagining, and feeling.", "id": "fc14"}, {"front": "How does Descartes reconcile the act of 'feeling' (like seeing light or hearing noise) with his conclusion that he is only a thinking thing?", "back": "Even if the external objects causing sensations are false or dreams, the internal experience or 'seeming' to see light, hear noise, or feel heat is an undeniable thought or perception within him. This internal 'feeling' is 'no other thing than thinking.'", "id": "fc15"}, {"front": "Why does Descartes quickly dismiss the traditional definition of man as a 'reasonable animal' during his search for what he is?", "back": "He states it would lead him into 'an infinitude of others more difficult' questions (e.g., what is an animal, what is reasonable), wasting his limited time on subtleties instead of finding fundamental certainties.", "id": "fc16"}, {"front": "What crucial question does Descartes pose to himself regarding his dependence on body and senses, and what is his immediate conclusion?", "back": "He asks, 'Am I so dependent on body and senses that I cannot exist without these?' and concludes 'Not at all,' because he existed in the very act of persuading himself of something.", "id": "fc17"}, {"front": "What makes the *experience* of feeling (e.g., seeing light, hearing noise) certain for Descartes, even if the external objects are illusions?", "back": "The certainty lies in the fact 'that it seems to me that I see light, that I hear noise and that I feel heat.' This internal 'seeming' or 'feeling' is an undeniable internal perception, which is a form of thinking.", "id": "fc18"}, {"front": "What are the synonyms Descartes uses for 'a thing which thinks'?", "back": "He uses 'a mind or a soul, or an understanding, or a reason.'", "id": "fc19"}, {"front": "Why does Descartes emphasize withdrawing former opinions that 'might even in a small degree be invalidated by the reasons which I have just brought forward'?", "back": "To ensure that nothing remains in his understanding beyond what is absolutely certain and indubitable, thereby preventing the rebuilding of knowledge on uncertain foundations.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
