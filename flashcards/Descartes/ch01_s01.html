    <script>

        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">
            <div class="footer-content">

            </div>
        </div>

    <script>
    var CARDS = [{"front": "According to Descartes, which two questions are best demonstrated through philosophical rather than theological argument?", "back": "The questions respecting God and the human soul."}, {"front": "Why does Descartes argue that natural reason is necessary to persuade 'infidels' of God's existence?", "back": "Because they do not accept the authority of faith or Holy Scripture."}, {"front": "What is the logical 'circle' Descartes aims to avoid when proving God's existence to non-believers?", "back": "Believing in God because of Scripture, while believing in Scripture because it comes from God."}, {"front": "According to the Wisdom of Solomon cited by Descartes, why are those who fail to find the 'Lord' of the world considered 'not to be excused'?", "back": "Because their understanding was great enough to discern the world and its creatures."}, {"front": "What did the Lateran Council under Leo X ordain Christian philosophers to do regarding the soul?", "back": "Refute arguments claiming the soul perishes with the body and employ their powers to make the truth known."}, {"front": "What was Descartes' primary motive for presenting his work to the Faculty of Theology at the Sorbonne?", "back": "To obtain their protection and authority to preempt censorship and satisfy the 'impious'."}, {"front": "How does Descartes compare his philosophical demonstrations to those found in Geometry?", "back": "Both involve lengthy, interdependent arguments that require a mind free of prejudice and devoted to their consideration."}, {"front": "What is the specific requirement for a mind to adequately understand Descartes' metaphysical speculations?", "back": "The mind must be free of all prejudices and capable of detaching itself from the affairs of the senses."}, {"front": "Why did Descartes choose not to publish the *Meditations* in French, the language of his earlier *Discourse on the Method*?", "back": "To prevent 'feebler minds' from mistakenly attempting to follow a path of doubt they might not handle correctly."}, {"front": "What is the first major objection to the *Discourse on the Method* that Descartes addresses in his preface?", "back": "That perceiving oneself as a thinking thing does not necessarily prove one's essence consists *only* of thinking."}, {"front": "How does Descartes distinguish an idea taken 'materially' from an idea taken 'objectively'?", "back": "Materially refers to the idea as an act of understanding; objectively refers to the thing represented by that act."}, {"front": "Why can an idea be 'more perfect' than the person who has it, according to Descartes' response to his critics?", "back": "Because of the essence of the thing the idea represents, rather than the idea being an act of the mind."}, {"front": "What general principle should be remembered when addressing atheist arguments against God's power?", "back": "Human minds are finite and limited, whereas God is an incomprehensible and infinite Being."}, {"front": "What is the primary pedagogical utility of 'General Doubt' in Meditation I?", "back": "It delivers the mind from prejudice and provides a way for the mind to detach itself from the senses."}, {"front": "What discovery does the mind make in Meditation II using its own liberty?", "back": "That it is absolutely impossible for the mind itself not to exist if it is doubting or thinking."}, {"front": "What distinction is drawn immediately following the discovery of the mind's existence in Meditation II?", "back": "The distinction between things pertaining to the intellectual nature and things pertaining to the body."}, {"front": "Concept: Substance", "back": "Definition: That which exists in such a way as to depend on nothing else for its existence."}, {"front": "In Meditation VI, what is the fundamental difference between the mind and the body regarding divisibility?", "back": "The body is always divisible, whereas the mind is entirely indivisible."}, {"front": "Why is the human body capable of 'perishing' while the mind is considered immortal by nature?", "back": "The body is a configuration of accidents and members that can change, while the mind is a pure, unchanging substance."}, {"front": "Under what condition would a substance like the human mind cease to exist?", "back": "Only if God denies his concurrence and reduces it to naught."}, {"front": "What is the 'principal argument' of Meditation III?", "back": "A proof for the existence of God based on the objective reality of the idea of a perfect being."}, {"front": "Concept: Objective Reality", "back": "Definition: The degree of reality or perfection an idea represents."}, {"front": "What comparison does Descartes use to explain how the idea of a perfect God must have a perfect cause?", "back": "A very perfect machine and the workman's idea of it, which must originate from the workman's actual skill."}, {"front": "What is established in Meditation IV to confirm the truths discovered in the preceding Meditations?", "back": "That all things clearly and distinctly perceived are true."}, {"front": "How does Descartes define the nature of 'error' in Meditation IV?", "back": "As a failure in deciding between the true and the false, rather than as a theological sin."}, {"front": "Concept: The Light of Nature", "back": "Definition: The innate capacity of natural reason to perceive truth."}, {"front": "What does Descartes demonstrate regarding geometrical demonstrations in Meditation V?", "back": "That the certainty of these demonstrations is itself dependent on the knowledge of God."}, {"front": "In Meditation VI, what two mental actions are distinguished from one another?", "back": "The action of the understanding and the action of the imagination."}, {"front": "How does Descartes characterize the relationship between the human mind and the human body in Meditation VI?", "back": "They are really distinct, yet so closely joined that they form a single thing."}, {"front": "Why does Descartes argue that arguments for the existence of God and the mind are superior to arguments for the external world?", "back": "Because the internal arguments are more certain and evident to the human mind than the knowledge of material things."}, {"front": "What is the primary aim of the synopsis included in the *Meditations*?", "back": "To map the structure of the argument, showing how each day's meditation builds upon the previous one."}, {"front": "How does the 'Method' Descartes uses in the *Meditations* relate to the 'Sciences'?", "back": "It is a method for the resolution of difficulties of every kind, intended to provide certain and evident demonstrations."}, {"front": "Why does Descartes believe it is 'almost impossible to invent new' proofs for God's existence?", "back": "Because the best reasons have already been identified by great men, though they lack clear and exact setting forth."}, {"front": "What does Descartes request the Sorbonne to do with his proofs after correcting any errors?", "back": "Authorize their approbation and provide public testimony to their truth and certainty."}, {"front": "Descartes argues that the 'impious' deny God and the soul's distinction because they believe _____.", "back": "No one has hitherto been able to demonstrate these two facts."}, {"front": "In the context of Meditation II, why can we not conceive of 'half of a mind'?", "back": "Because the mind is an indivisible substance, unlike the divisible nature of the body."}, {"front": "Meditation I concludes that foundations for the sciences are unreliable as long as we possess only _____.", "back": "The foundations which we have hitherto possessed based on the senses."}, {"front": "What specific type of truths does Descartes address in Meditation IV?", "back": "Speculative truths known by the aid of the light of nature."}, {"front": "According to the synopsis, Meditation V explains _____ generally.", "back": "Corporeal nature."}, {"front": "What is the 'order of the geometers' that Descartes follows in his reasoning?", "back": "Putting forward all premises upon which a proposition depends before drawing a conclusion."}, {"front": "What does Descartes hope to achieve by the end of Meditation VI regarding material things?", "back": "A recovery of the existence of the external world through deduction."}, {"front": "Why does Descartes claim that knowledge of God is easier to acquire than knowledge of 'created things'?", "back": "Because it is manifest in ourselves and can be known through the simple consideration of our own minds."}, {"front": "Descartes compares the certainty of his proofs to the geometrical demonstrations of which ancient mathematician?", "back": "Archimedes (or Apollonius/Pappus)."}, {"front": "How does the synopsis define the mind's 'accidents'?", "back": "Activities like thinking, willing, and perceiving, which can change without creating a new mind."}, {"front": "In the response to Objection 1, what does Descartes say is the 'order of his thought' regarding his essence?", "back": "That he knew nothing else as belonging to his essence except that he was a thinking thing."}, {"front": "According to Descartes, what is the principal cause of atheists' arrogance?", "back": "Attributing too much strength and wisdom to their own finite minds."}, {"front": "What does Meditation VI identify as the source of all 'errors' regarding material objects?", "back": "The senses."}, {"front": "Why is the mind considered 'pure substance' in contrast to the body?", "back": "Because its existence does not depend on a specific configuration of parts that can be changed or corrupted."}, {"front": "Descartes notes that in Philosophy, unlike Geometry, people frequently combat the truth to acquire a reputation for _____.", "back": "Boldness of thought."}, {"front": "According to Descartes, why is it sufficient for the 'faithful' to accept God's existence by faith alone?", "back": "Because faith is a gift of God's grace."}, {"front": "What is the final 'recovery' mentioned in the summary of the six Meditations?", "back": "The recovery of the external world."}, {"front": "In the synopsis of Meditation II, what does the mind use to take for granted that doubtful things are non-existent?", "back": "The liberty which pertains to it."}, {"front": "Why are the proofs of the existence of God and the soul 'most certain' compared to proofs of a physical world?", "back": "They fall more directly and clearly within the cognizance of the human mind."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
