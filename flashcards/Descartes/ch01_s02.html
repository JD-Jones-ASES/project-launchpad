<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What event in 1517 is credited with beginning the Reformation and fracturing European Christianity?", "back": "Martin Luther nailing his ninety-five theses to the church door in Wittenberg."}, {"front": "Which conflict during Descartes' lifetime resulted from a century of religious doctrinal disputes?", "back": "The Thirty Years' War (1618–1648)."}, {"front": "What portion of the population in German-speaking lands was killed during the Thirty Years' War?", "back": "Approximately one-third."}, {"front": "How did the Reformation contribute to the 17th-century crisis of authority?", "back": "It demonstrated that theologians could no longer agree on fundamental questions of faith."}, {"front": "René Descartes studied from approximately 1607 to 1615 at which Jesuit college?", "back": "La Flèche."}, {"front": "During his education at La Flèche, what two conflicting feelings did Descartes develop?", "back": "A love of mathematics and a dissatisfaction with scholastic philosophy."}, {"front": "Which astronomer proposed the heliocentric view that the Earth moves around the Sun?", "back": "Nicolaus Copernicus."}, {"front": "What did Galileo discover about the surface of the Moon that challenged the idea of celestial perfection?", "back": "The Moon's surface is covered in craters."}, {"front": "Which scientist demonstrated that planetary orbits are ellipses rather than perfect circles?", "back": "Johannes Kepler."}, {"front": "Why was the 'New Science' a major crisis for European thinkers?", "back": "It proved that established authorities like Aristotle and Ptolemy were fundamentally wrong about the cosmos."}, {"front": "In what year was Galileo tried by the Inquisition and forced to recant his scientific views?", "back": "1633."}, {"front": "Why did Descartes abandon his work titled 'Le Monde' in 1633?", "back": "Because Galileo had been tried by the Inquisition that same year."}, {"front": "The school of ancient skepticism named after Pyrrho of Elis is known as _____.", "back": "Pyrrhonism."}, {"front": "According to the Pyrrhonists, what should a wise person do when presented with equally strong arguments on both sides?", "back": "Suspend judgment entirely."}, {"front": "Term: Epoche.", "back": "The suspension of belief or judgment practiced by the Pyrrhonian skeptics."}, {"front": "Which Greek philosopher's recorded arguments sparked a 'skeptical crisis' when printed in Latin in 1562?", "back": "Sextus Empiricus."}, {"front": "Name the two major works by Sextus Empiricus that preserved ancient skeptical thought.", "back": "Outlines of Pyrrhonism and Against the Professors."}, {"front": "Michel de Montaigne is credited with inventing which literary form?", "back": "The essay."}, {"front": "What was Michel de Montaigne’s famous skeptical motto?", "back": "Que sais-je? (What do I know?)"}, {"front": "How did Michel de Montaigne view the reliability of human reason?", "back": "He believed reason was feeble, inconsistent, and culturally conditioned."}, {"front": "According to Montaigne, what factors determine most of what humans call 'knowledge'?", "back": "Custom, habit, and the accidents of birth."}, {"front": "What is the name of the medieval philosophical tradition that harmonized Aristotelian philosophy with Christian doctrine?", "back": "Scholasticism."}, {"front": "Who was the 13th-century philosopher most responsible for the Scholastic synthesis of Aristotle and Christianity?", "back": "Thomas Aquinas."}, {"front": "Aside from Thomas Aquinas, who were the other two 'great practitioners' of Scholasticism mentioned in the text?", "back": "Duns Scotus and William of Ockham."}, {"front": "What was the standard method of argument used in medieval university Scholasticism?", "back": "Formal disputations involving strict logical precision and objections."}, {"front": "Why did Descartes find Scholastic philosophy 'deeply unreliable' despite its sophistication?", "back": "It could produce arguments for any side of a question and was full of contradicting schools."}, {"front": "Identify the three interlocking upheavals that shaken European confidence in inherited knowledge by the early 1600s.", "back": "The Reformation, the New Science, and the revival of skepticism."}, {"front": "What was Descartes' radical response to the triple crisis of authority in his time?", "back": "To tear down the entire system of knowledge to its foundations and start over."}, {"front": "Which field of study did Descartes use as a model for his new philosophical system?", "back": "Mathematics (specifically geometry)."}, {"front": "In geometry, what starting points did Euclid use to derive a body of certain truths?", "back": "Self-evident axioms."}, {"front": "What is the primary objective of Descartes' 'Meditations'?", "back": "To find a starting point so certain it can serve as the foundation for all human knowledge."}, {"front": "How did Galileo’s observation of Jupiter’s moons affect the Aristotelian picture of the universe?", "back": "It showed that not all celestial bodies revolve around the Earth."}, {"front": "In what century did Sextus Empiricus live?", "back": "The 2nd century CE."}, {"front": "Which years did Michel de Montaigne write his 'Essays'?", "back": "1580–1588."}, {"front": "Descartes wanted to build a philosophy so solid it could not be shaken by a _____.", "back": "Skeptic."}, {"front": "What was the significance of Kepler's discovery that orbits are ellipses?", "back": "It violated the Aristotelian physical requirement that celestial motion must be in perfect circles."}, {"front": "How did the 1562 printing of Sextus Empiricus' works impact European philosophy?", "back": "It unleashed a wave of skeptical thought known as the 'skeptical crisis'."}, {"front": "Descartes felt that Scholasticism had a vocabulary and a method, but lacked _____.", "back": "Truth."}, {"front": "Which astronomical discovery by Galileo supported the Copernican view by showing celestial bodies orbiting something other than Earth?", "back": "The moons of Jupiter."}, {"front": "Why did the Reformation make religious authority an unreliable source for Descartes?", "back": "It led to violent, irreconcilable disagreements over settled doctrinal questions."}, {"front": "What is the main question that drives the Meditations?", "back": "Can there be a starting point for knowledge that is impossible to doubt?"}, {"front": "Which school of thought argued that reason could prove nothing with certainty?", "back": "Pyrrhonism (Skepticism)."}, {"front": "How did the new science challenge the 'heavenly' perfection described by Aristotle?", "back": "By observing physical imperfections like craters on the Moon."}, {"front": "The phrase 'coming apart at its intellectual seams' describes Europe during which centuries?", "back": "The sixteenth and seventeenth centuries."}, {"front": "What was the consequence of Galileo's 1633 trial by the Inquisition?", "back": "He was forced to recant his views and spent his remaining years under house arrest."}, {"front": "What specific astronomical body did Galileo observe to discover phases similar to the Moon?", "back": "Venus."}, {"front": "According to the text, what was the impact of Sextus Empiricus on Renaissance historians?", "back": "His work sparked the 'skeptical crisis' of the Renaissance."}, {"front": "What is the relationship between the Thirty Years' War and Descartes' life?", "back": "It raged throughout his most productive years."}, {"front": "Descartes sought to build a foundation for knowledge that no _____ could touch.", "back": "Reformation controversy."}, {"front": "Aristotelian physics required that planetary orbits take the shape of _____.", "back": "Perfect circles."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
