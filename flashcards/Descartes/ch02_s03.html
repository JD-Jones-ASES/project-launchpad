<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 2, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Descartes' primary motivation for undertaking the general upheaval of his former opinions?", "back": "To establish a firm and permanent structure in the sciences."}, {"front": "Instead of proving every opinion false, what criterion does Descartes use to justify rejecting a belief?", "back": "Finding any reason to doubt the belief, no matter how small."}, {"front": "Why does Descartes choose to attack the \"principles\" of his beliefs rather than each individual opinion?", "back": "Because the destruction of the foundations necessarily brings down the rest of the edifice."}, {"front": "According to the text, what is the primary source of the beliefs Descartes previously accepted as \"most true and certain\"?", "back": "The senses (either directly or through them)."}, {"front": "What general rule does Descartes adopt regarding things that have deceived us at least once?", "back": "It is wiser not to trust them entirely."}, {"front": "Under what specific conditions does Descartes admit the senses typically deceive us?", "back": "When perceiving things that are very far away or hardly perceptible."}, {"front": "How does the \"Dream Argument\" challenge the certainty of immediate sensory experiences, such as sitting by a fire?", "back": "It asserts there are no certain indications to clearly distinguish wakefulness from sleep."}, {"front": "What specific realization causes Descartes to feel \"lost in astonishment\" regarding his state of consciousness?", "back": "The fact that dreams can mimic waking sensations so perfectly that he might currently be dreaming."}, {"front": "In the \"Painter Analogy,\" what must remain real even if the specific images in a dream are false?", "back": "The simpler and more universal components from which images are formed."}, {"front": "According to the Painter Analogy, even if a painter invents a completely novel creature, what element must still be real?", "back": "The colors of which the image is composed."}, {"front": "List three examples of the \"simple and universal\" things that Descartes considers real even if composite objects are imaginary.", "back": "Corporeal nature, extension, and magnitude (or quantity, number, place, and time)."}, {"front": "Why does Descartes categorize Physics, Astronomy, and Medicine as \"dubious and uncertain\"?", "back": "They depend on the consideration of composite things which may not exist."}, {"front": "What characteristic of Arithmetic and Geometry makes them appear more certain than the physical sciences?", "back": "They treat simple and general things without concern for whether they actually exist in nature."}, {"front": "What mathematical truth does Descartes use to illustrate a clear and apparent certainty that persists even in sleep?", "back": "The fact that $2 + 3 = 5$."}, {"front": "What geometric fact does Descartes provide as an example of an indubitable truth?", "back": "A square can never have more than four sides."}, {"front": "What \"long-fixed\" belief does Descartes use to introduce doubt into the truths of mathematics?", "back": "The belief in an all-powerful God who created him."}, {"front": "How does Descartes reconcile the idea of a \"supremely good\" God with the fact that humans are sometimes deceived?", "back": "He argues that if it were contrary to God's goodness to permit constant deception, it would also be contrary to permit any deception at all."}, {"front": "If one denies the existence of God, why does Descartes argue they are still likely to be deceived?", "back": "The less powerful the cause of one's origin, the more likely one is to be imperfect enough to err."}, {"front": "Why does Descartes find it necessary to \"pretend\" that all his former opinions are entirely false?", "back": "To balance the force of habit and prejudice that naturally inclines him toward his old beliefs."}, {"front": "Concept: Evil Genius.", "back": "Definition: A hypothetical, supremely powerful, and deceitful being used by Descartes to sustain radical doubt."}, {"front": "What is the primary purpose of the \"Evil Genius\" in Descartes' meditation?", "back": "To ensure he remains obstinately attached to doubt and avoids falling back into old habits of belief."}, {"front": "Why does Descartes believe there is no \"peril\" in his method of radical doubt?", "back": "He is currently focused on the pursuit of knowledge rather than the necessity of action."}, {"front": "In the concluding analogy of Meditation I, what does the \"captive\" represent?", "back": "A person who prefers the comfort of familiar illusions over the difficult labor of discovering the truth."}, {"front": "Cloze: Descartes seeks to build a structure in the sciences that is both \"firm and _____.\"", "back": "permanent"}, {"front": "To what does Descartes compare the person who imagines they are made of glass or have an earthenware head?", "back": "Persons who are insane or whose cerebella are troubled by black bile."}, {"front": "What specific attribute of \"extended things\" does Descartes include in the class of simple, real objects?", "back": "Figure (or shape)."}, {"front": "Cloze: Descartes describes his old opinions as \"masters of my _____.\"", "back": "belief"}, {"front": "Why does Descartes characterize his task as \"laborious\"?", "back": "Because the mind naturally slips back into its ordinary life and former opinions."}, {"front": "How does Descartes describe the state of his mind at the start of his meditation?", "back": "Delivered from every care, happily agitated by no passions, and possessing assured leisure."}, {"front": "According to Descartes, why is it \"not necessary\" to show that all his former opinions are false?", "back": "Reason suggests that withholding assent from the uncertain is as effective as proving something false."}, {"front": "What does Descartes mean by \"corporeal nature in general\"?", "back": "The fundamental physical reality of objects, including their extension and quantity."}, {"front": "How does Descartes define \"extension\" within the context of simple, universal objects?", "back": "The property of occupying space, which allows for figure and magnitude."}, {"front": "Cloze: Descartes uses the term \"arch _____\\_\" to describe the powerful entity that might be deceiving him.", "back": "deceiver"}, {"front": "Why does Descartes say he will treat the heavens, earth, and colors as \"nought but illusions\"?", "back": "To protect himself from being imposed upon by the Evil Genius."}, {"front": "What does Descartes assume about his own body when applying the Evil Genius hypothesis?", "back": "He assumes he has no hands, eyes, flesh, blood, or senses."}, {"front": "Cloze: Descartes concludes that he must \"withhold my _____\" from matters that are not entirely indubitable.", "back": "assent"}, {"front": "Why does Descartes wait until a \"mature age\" to begin his project of doubt?", "back": "He wanted to be at a point where he could not hope to be better fitted for the task at a later date."}, {"front": "What does Descartes call the \"excessive darkness\" mentioned at the end of the text?", "back": "The difficult and confusing state of doubt he has entered."}, {"front": "In the painter analogy, what are \"sirens and satyrs\" examples of?", "back": "Strange forms that are nonetheless composed of members of real animals."}, {"front": "What determines the \"probability of my being so imperfect as to deceive myself\" if there is no powerful God?", "back": "The lack of power in the author to whom one assigns their origin."}, {"front": "Cloze: Descartes calls the habit of deferring to old opinions a \"long and familiar _____.\"", "back": "custom"}, {"front": "Why does Descartes decide to \"suspend my judgment\"?", "back": "To avoid giving credence to anything that might be false."}, {"front": "Which science is mentioned as being dubious because it considers \"composite things\"?", "back": "Medicine (or Physics/Astronomy)."}, {"front": "What is the relationship between the \"foundations\" and the \"edifice\" in Descartes' metaphor for belief?", "back": "If the foundations are destroyed, the entire structure built upon them will fall."}, {"front": "According to the text, why is it easier to doubt the existence of physical objects than the truths of Arithmetic?", "back": "Arithmetic deals with simple, general concepts that do not depend on the actual existence of objects."}, {"front": "What is Descartes' stance on the reliability of the senses in daily life vs. in the search for truth?", "back": "He acknowledges them as highly probable for life but insufficient for establishing certainty in the sciences."}, {"front": "Cloze: Descartes describes those with \"clouded\" cerebella who think they are kings as \"_____.\"", "back": "mad"}, {"front": "What does Descartes mean by \"the place in which they are\" when listing simple things?", "back": "The spatial location of extended objects."}, {"front": "Under what condition does Descartes say he would be doing \"wrong\" to delay his project further?", "back": "If he occupied the time remaining for action in mere deliberation."}, {"front": "How does Descartes characterize the \"wakefulness\" that follows his period of doubt?", "back": "As a laborious state spent in the darkness of difficult questions."}, {"front": "What specific example does Descartes use to show he is deceived while sleeping?", "back": "Dreaming he is dressed and seated by the fire while actually lying undressed in bed."}, {"front": "Why is the distinction between \"composite things\" and \"simple things\" important for Descartes' doubt?", "back": "It allows him to doubt complex sciences (Physics) before doubting abstract ones (Math)."}, {"front": "Cloze: Descartes refers to himself as a man who is in the habit of _____ and representing the same things as the insane.", "back": "sleeping"}, {"front": "What does Descartes mean by \"withholding assent\"?", "back": "Refusing to accept a proposition as true."}, {"front": "According to the text, what prevents Descartes from easily dismissing his old beliefs?", "back": "Their high probability and the force of long-standing custom."}, {"front": "What does Descartes hope to achieve by \"balancing\" his prejudices?", "back": "To ensure his judgment is no longer dominated by \"bad usage.\""}, {"front": "Cloze: Descartes describes the Evil Genius as \"not less powerful than _____.\"", "back": "deceitful"}, {"front": "What is the outcome of Descartes' reflection on the \"painter\" and \"colors\"?", "back": "That even if everything is a dream, there are basic, universal truths that must be real."}, {"front": "Why does Descartes call his retirement \"peaceable\"?", "back": "It provides the quiet and leisure necessary for sustained thinking."}, {"front": "Term: Extension.", "back": "Definition: The property of taking up space, which Descartes identifies as a fundamental, simple reality of corporeal things."}, {"front": "According to Descartes, what is the consequence of God permitting us to be \"sometimes deceived\"?", "back": "It makes it theoretically possible that God could permit us to be always deceived."}, {"front": "Why does Descartes say he is not currently considering the \"question of action\"?", "back": "To justify the extreme and impractical nature of his radical doubt for the sake of knowledge."}, {"front": "Cloze: Descartes aims to \"commence to build anew from the foundation\" to establish a \"firm and _____ structure.\"", "back": "permanent"}, {"front": "What does the \"Evil Genius\" use as \"traps for my credulity\"?", "back": "The heavens, the earth, colors, figures, sounds, and all external things."}, {"front": "What is the primary characteristic of the \"simple and universal\" objects Descartes identifies?", "back": "They are the real and true components from which all images in our thoughts are formed."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
