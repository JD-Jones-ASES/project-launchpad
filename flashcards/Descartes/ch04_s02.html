<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is natural theology?", "back": "Natural theology is the tradition of proving God's existence using human reason, without relying on Scripture or revelation."}, {"front": "Distinguish between *a priori* and *a posteriori* knowledge/proofs.", "back": "*A priori* knowledge is independent of experience, derived from reason alone. *A posteriori* knowledge depends on experience, derived from observation of the world."}, {"front": "Which two philosophers are highlighted as essential background for Meditation III, representing *a posteriori* and *a priori* approaches?", "back": "Thomas Aquinas, known for *a posteriori* proofs from the natural world, and Anselm of Canterbury, known for pioneering *a priori* proofs from the concept of God."}, {"front": "What central idea did Descartes argue demands a divine cause?", "back": "The very presence of the idea of an infinite, perfect being in our minds demands a divine cause."}, {"front": "Who was Thomas Aquinas, and what is his most influential work mentioned in the text?", "back": "Thomas Aquinas (1225–1274) was a Dominican friar, theologian, and philosopher. His most influential work is the *Summa Theologica*."}, {"front": "What is the common structure of Aquinas's Five Ways for proving God's existence?", "back": "They all begin from an observable feature of the natural world and argue that God must exist as the ultimate explanation of that feature, making them *a posteriori* arguments."}, {"front": "Briefly describe Aquinas's First Way (from motion).", "back": "Everything that moves is moved by something else; an infinite regress of movers is impossible; therefore, there must be an unmoved first mover, which is God."}, {"front": "Briefly describe Aquinas's Second Way (from efficient causation).", "back": "Nothing can be the efficient cause of itself; a chain of causes cannot regress to infinity; therefore, there is a first uncaused cause, which is God."}, {"front": "Briefly describe Aquinas's Third Way (from contingency).", "back": "All things we observe could possibly not exist; if everything could fail to exist, nothing would exist; but something exists now; therefore, something must exist necessarily, and this is God."}, {"front": "Briefly describe Aquinas's Fourth Way (from degrees of perfection).", "back": "We observe things that are more or less good, true, and noble; things that admit of degrees require a maximum; this maximum is God."}, {"front": "Briefly describe Aquinas's Fifth Way (from design).", "back": "Natural things that lack intelligence behave for ends, as if directed by knowledge; this direction requires an intelligent being, which is God."}, {"front": "According to Objection 2 in Aquinas's *Summa Theologica* I, Q. 2, Art. 1, why might 'God exists' be considered self-evident based on the definition of God?", "back": "If 'God' signifies 'that than which nothing greater can be conceived,' and actual existence is greater than mental existence, then understanding 'God' implies His actual existence."}, {"front": "What is Aquinas's main counter-argument against the proposition 'God exists' being self-evident *to us*?", "back": "He argues that no one can mentally admit the opposite of what is self-evident, but the 'fool' can deny God's existence (Psalm 52:1), meaning it's not universally self-evident."}, {"front": "What crucial distinction does Aquinas make regarding a proposition being 'self-evident'?", "back": "A proposition can be self-evident *in itself* (where the predicate is included in the subject's essence) but not self-evident *to us* (if we don't know the essence of the predicate and subject)."}, {"front": "How does Aquinas apply his distinction of self-evidence to the proposition 'God exists'?", "back": "He states 'God exists' is self-evident *in itself* because God is His own existence. However, it is not self-evident *to us* because we do not know God's essence and thus need demonstration from His effects."}, {"front": "How does Aquinas respond to the objection that the knowledge of God is naturally implanted in us (Obj. 1, Art. 1)?", "back": "He distinguishes between a 'general and confused way' of knowing God (as man's beatitude) and absolute knowledge of God's existence. Many confuse happiness with other things like riches or pleasures."}, {"front": "How does Aquinas address the argument (Obj. 2, Art. 1) that understanding the word 'God' as 'that than which nothing greater can be thought' implies actual existence?", "back": "He argues that not everyone understands 'God' in this way (some think God is a body). Even if they do, mental existence does not automatically imply actual existence; one cannot assume actual existence without it being admitted."}, {"front": "What is one objection against God's existence presented in *Summa Theologica* I, Q. 2, Art. 3, relating to the problem of evil?", "back": "If God is infinite goodness, and if one of two contraries is infinite, the other is destroyed. Since evil exists in the world, God (infinite goodness) cannot exist."}, {"front": "What is the objection against God's existence based on the principle of simplicity (Obj. 2, Art. 3)?", "back": "It is superfluous to assume many principles when few suffice. Natural things can be reduced to nature, and voluntary things to human reason/will, so God's existence is not needed to explain them."}, {"front": "In Aquinas's First Way (from motion), what is the key principle about motion?", "back": "Whatever is in motion is put in motion by another. A thing moves from potentiality to actuality only by something already in actuality; nothing can move itself in the same respect."}, {"front": "Why is an infinite regress of movers impossible in Aquinas's First Way?", "back": "If there were an infinite regress, there would be no first mover, and consequently, no other movers, since subsequent movers are only moved by the first mover (like a staff moved by a hand)."}, {"front": "What key principle about efficient causation does Aquinas rely on in his Second Way?", "back": "Nothing can be the efficient cause of itself, because it would have to be prior to itself, which is impossible."}, {"front": "Why is an infinite regress of efficient causes impossible in Aquinas's Second Way?", "back": "In an ordered chain of efficient causes, the first cause is essential for the intermediate and ultimate causes. Without a first cause, there would be no intermediate or ultimate effects, as removing the cause removes the effect."}, {"front": "What does the term 'the Philosopher' refer to in Aquinas's *Summa Theologica*?", "back": "'The Philosopher' is the medieval term used by Aquinas to refer to Aristotle."}, {"front": "How does Descartes's approach to proving God's existence in Meditation V relate to Anselm's?", "back": "Descartes will develop a purely rational (a priori) proof from the concept of God, building upon the tradition pioneered by Anselm of Canterbury."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
