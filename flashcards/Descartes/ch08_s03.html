<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What are the two great opposing traditions in early modern philosophy that followed Descartes?", "back": "The two great opposing traditions are Rationalism and Empiricism.", "id": "fc01"}, {"front": "Define Rationalism as a philosophical position.", "back": "Rationalism is the philosophical position that reason is the primary source of genuine knowledge, that the mind possesses innate ideas or innate rational structures, and that mathematics is the model for all knowledge.", "id": "fc02"}, {"front": "Define Empiricism as a philosophical position.", "back": "Empiricism is the philosophical position that all knowledge originates in sensory experience, that there are no innate ideas, and that the mind begins as a blank slate filled by what the senses deliver.", "id": "fc03"}, {"front": "What is the rationalist view concerning innate ideas?", "back": "Rationalists hold that the mind comes equipped with innate ideas or innate rational faculties from birth, not derived from sensory experience.", "id": "fc04"}, {"front": "What is the empiricist view concerning innate ideas?", "back": "Empiricists reject the existence of innate ideas, positing that the mind begins as a blank slate (tabula rasa) filled only by sensory experience.", "id": "fc05"}, {"front": "Which model for knowledge did Rationalists typically embrace, and why?", "back": "Rationalists embraced mathematics as the model for all knowledge because it is seen as certain, universal, and arrived at by pure thought.", "id": "fc06"}, {"front": "Name the three great Continental Rationalists of the seventeenth century.", "back": "Descartes, Baruch Spinoza, and Gottfried Wilhelm Leibniz.", "id": "fc07"}, {"front": "Name the three prominent British Empiricists discussed in the text.", "back": "John Locke, George Berkeley, and David Hume.", "id": "fc08"}, {"front": "How did Baruch Spinoza's system address Descartes' interaction problem?", "back": "Spinoza's system eliminated the two-substance framework by arguing that God and Nature are identical, and there is only one substance, of which mind and body are two attributes.", "id": "fc09"}, {"front": "How did Gottfried Wilhelm Leibniz's philosophy avoid the interaction problem?", "back": "Leibniz posited an infinity of non-material substances called monads, arranged in a pre-established harmony by God, so that mental and physical events correspond perfectly without ever causally interacting.", "id": "fc10"}, {"front": "What is *tabula rasa* and which philosopher is most associated with this concept?", "back": "*Tabula rasa* means 'blank slate,' and it is John Locke's argument that the mind at birth is empty of innate ideas, filled only by experience.", "id": "fc11"}, {"front": "How did John Locke's critique of innate ideas challenge Descartes' *cogito*?", "back": "Locke argued that if there are no innate ideas, then the *cogito* cannot be the discovery of a truth built into the mind's nature, but rather a product of accumulated experience and reflection.", "id": "fc12"}, {"front": "What is the meaning of Berkeley's famous slogan, *esse est percipi*?", "back": "'To be is to be perceived.' It means that physical objects are collections of ideas and exist only when they are perceived.", "id": "fc13"}, {"front": "According to George Berkeley, why do objects continue to exist even when no human perceives them?", "back": "Berkeley argued they continue to exist because God always perceives them, ensuring their continuous existence as ideas.", "id": "fc14"}, {"front": "How did David Hume challenge the concept of causation?", "back": "Hume argued that causation cannot be observed; we only see regularities and events following each other. The mind infers causation from habit, not rational insight or necessary connection.", "id": "fc15"}, {"front": "How did David Hume challenge Descartes' concept of the self (*res cogitans*)?", "back": "Hume argued that introspection reveals only a stream of perceptions, not a permanent, enduring self that has those perceptions.", "id": "fc16"}, {"front": "How did the Empiricists, particularly Hume, extend Descartes' method of doubt?", "back": "Descartes used doubt to find certainty. Empiricists, especially Hume, used the same critical spirit to show that the very 'certainties' Descartes thought he had recovered (God, self, external world) were themselves doubtful.", "id": "fc17"}, {"front": "Who famously stated that he was 'awakened from his dogmatic slumber' by reading David Hume?", "back": "Immanuel Kant.", "id": "fc18"}, {"front": "What did Kant describe as his 'Copernican revolution' in philosophy?", "back": "Just as Copernicus showed the earth moves around the sun, Kant argued that the mind actively structures experience rather than passively receiving it.", "id": "fc19"}, {"front": "In Kant's synthesis, what were the rationalists 'half right' about?", "back": "They were right that the mind contributes something to knowledge, but wrong to think it could generate genuine knowledge about reality by pure reason alone.", "id": "fc20"}, {"front": "In Kant's synthesis, what were the empiricists 'half right' about?", "back": "They were right that experience is necessary for knowledge, but wrong to think that experience alone, unstructured by the mind's own forms, could yield knowledge.", "id": "fc21"}, {"front": "According to Kant, what is the role of the mind in acquiring knowledge?", "back": "The mind is an active organizer that imposes forms (space, time, and the categories of understanding like causation) on the raw material of experience, thereby producing the structured, intelligible world we know.", "id": "fc22"}, {"front": "What does Kant believe is necessary for genuine knowledge?", "back": "Knowledge requires both the material provided by sensory experience AND the forms (structures) contributed by the mind. Neither alone is sufficient.", "id": "fc23"}, {"front": "What is a 'synthetic a priori judgment' in Kant's philosophy?", "back": "A judgment that is both independent of experience (a priori) and genuinely informative, adding something new to our knowledge that cannot be derived merely by analysis.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
