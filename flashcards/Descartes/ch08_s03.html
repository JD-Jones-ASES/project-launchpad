<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 8, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the overall structure and purpose of Descartes' Meditations on First Philosophy?", "back": "It is structured as a six-day journey of sustained thinking, descending into radical doubt and then climbing, step by step, toward rebuilt certainty."}, {"front": "What is the primary objective of Descartes' Meditation I?", "back": "To call into question everything he has ever believed by introducing various skeptical arguments, such as the unreliability of senses, the indistinguishability of dreams from waking, and the evil genius hypothesis."}, {"front": "What radical skeptical hypothesis does Descartes introduce in Meditation I to doubt even mathematical truths?", "back": "The 'evil genius' (or 'evil demon') hypothesis, which posits a supremely powerful and cunning deceiver misleading him about everything."}, {"front": "What is the first foundational certainty Descartes recovers in Meditation II, and what is its famous Latin formulation?", "back": "His own existence as a thinking being, encapsulated by 'Cogito, ergo sum' ('I think, therefore I am')."}, {"front": "After establishing his existence, how does Descartes define 'what he is' in Meditation II?", "back": "He defines himself as a 'thinking thing' (res cogitans), whose entire essence is to think, doubt, will, imagine, and perceive."}, {"front": "What is the purpose of Descartes' wax argument in Meditation II?", "back": "To demonstrate that the nature of physical objects (like wax) is grasped by the intellect alone, not primarily by the senses, thereby reinforcing the primacy of the mind."}, {"front": "Why does Descartes feel it necessary to prove God's existence in Meditation III?", "back": "To remove the lingering threat of the evil genius and guarantee the reliability of his clear and distinct perceptions, as a perfect God would not be a deceiver."}, {"front": "Briefly explain Descartes' first proof for God's existence (the causal argument) in Meditation III.", "back": "He argues that he, a finite being, has an an idea of an infinitely perfect being. This idea must have a cause with at least as much reality as the idea itself, thus requiring an infinitely perfect God as its origin."}, {"front": "How does Descartes reconcile human error with the existence of a perfect, non-deceiving God in Meditation IV?", "back": "He explains that error arises when the infinite human will assents to judgments that the finite intellect has not clearly and distinctly grasped, viewing error as a privation rather than a positive defect."}, {"front": "What is the basis of Descartes' ontological argument for God's existence in Meditation V?", "back": "He argues that existence belongs to God's essence as a supremely perfect being, just as having three angles belongs to a triangle's essence. Therefore, God must necessarily exist."}, {"front": "How does Descartes define the essence of matter in Meditation V?", "back": "As pure extension (res extensa), meaning it is fundamentally characterized by spatial properties and knowable by reason alone."}, {"front": "What 'real distinction' does Descartes establish in Meditation VI concerning mind and body?", "back": "He proves that mind (thinking substance) and body (extended substance) are two distinct kinds of substances, separable from each other, though intimately united in a human being."}, {"front": "What enduring philosophical contribution did Descartes make through his systematic 'method of doubt'?", "back": "It became an enormously productive philosophical tool, encouraging thinkers to push positions to their extreme to see what survives and to systematically question assumptions."}, {"front": "How did Descartes shift the starting point of modern epistemology?", "back": "By establishing the first-person perspective and the 'knowing subject' (the mind) as the primary datum, moving from asking how we know the world to how we get from the mind to the world."}, {"front": "What is Descartes' most consequential legacy, even though he didn't solve it?", "back": "The mind-body problem, articulated with such precision that it shaped subsequent debates in philosophy, neuroscience, psychology, and artificial intelligence regarding how an immaterial mind relates to a material body."}, {"front": "What 'internalist' criterion for truth did Descartes introduce, and what were its consequences?", "back": "The criterion of clarity and distinctness, asserting that the mind itself is the ultimate court of appeal for truth, which significantly influenced the Enlightenment tradition of reason judging itself."}, {"front": "What specific anatomical hypothesis did Descartes propose as the 'seat of the soul,' which was later proven incorrect?", "back": "The pineal gland, which he hypothesized was the single point where the immaterial mind interacted with the material body."}, {"front": "What is the 'Cartesian Circle' objection raised against Descartes' argument for God's existence and the validation of clear and distinct perceptions?", "back": "The apparent circularity of using clear and distinct perceptions to prove God's existence, and then using God's non-deceiving nature to guarantee the reliability of clear and distinct perceptions."}, {"front": "How did Descartes' definition of matter as pure extension conflict with later scientific developments like Newton's physics?", "back": "It left no room for forces or 'action at a distance,' as he conceived the physical world as geometry in motion, which contradicted Newton's theory of gravitational attraction."}, {"front": "According to the text, what was the value of Descartes' errors?", "back": "His errors were 'productively wrong,' generating precisely the questions that needed to be answered and driving the development of modern philosophy and science."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
