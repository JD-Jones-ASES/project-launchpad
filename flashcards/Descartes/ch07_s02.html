<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What foundational philosophical problem did Descartes' work generate for the modern world?", "back": "The mind-body problem, which involves understanding the relationship between the mental realm (mind) and the physical realm (body)."}, {"front": "How did the dominant medieval Christian tradition, influenced by Aristotle and developed by Aquinas, typically understand the soul's relationship to the body, prior to Descartes?", "back": "It was hylomorphic, meaning the soul was not a separate substance housed inside the body, but rather the 'form' of the body."}, {"front": "Define 'Hylomorphism' as applied to living beings in the context of the soul and body.", "back": "Hylomorphism (from Greek 'hyle' for matter and 'morphe' for form) is Aristotle's theory that every physical substance is composed of matter and form. For living beings, the soul is the form of the body—the organizing principle that makes matter a living being, not a separate substance inhabiting it."}, {"front": "How did Aquinas use the analogy of a knife to explain the soul's relationship to the body?", "back": "Just as the sharpness and shape (form) of a knife are not separate from the knife but what makes it a knife, the soul is what makes a human body a human body."}, {"front": "What is the main question Aquinas addresses regarding the intellectual principle and the body in *Summa Theologica I, Q. 76, Art. 1*?", "back": "The question is: 'Whether the Intellectual Principle Is United to the Body As Its Form?'"}, {"front": "What was one objection (from 'The Philosopher' / Aristotle) to the idea that the intellectual principle is united to the body as its form?", "back": "The intellect is 'separate' and 'not the act of any body,' suggesting it cannot be a form intrinsically tied to matter."}, {"front": "What objection argued that if the intellect were the body's form, it would be limited in its knowledge?", "back": "Forms are determined by the matter they organize; therefore, if the intellect were a form of the body, it would have a determinate nature and thus be incapable of knowing all things universally, which contradicts the nature of the intellect."}, {"front": "Explain the objection concerning how the intellect receives knowledge that challenges its union with the body as a form.", "back": "The intellect receives forms immaterially and universally, unlike bodily receptive powers (like senses) which receive materially and individually. This difference suggests the intellect is not a bodily form."}, {"front": "What objection stated that if the intellectual principle has 'per se existence' (subsistent), it cannot be a form of the body?", "back": "A form is that by which a thing exists, meaning its existence belongs to the composite, not to the form by itself. If the intellectual principle has 'per se existence' (is subsistent), it cannot be a mere form of the body."}, {"front": "How did the incorruptibility of the intellectual principle present an objection to it being a form of the body?", "back": "Forms are by nature united to matter and cannot exist without their proper matter. Since the intellectual principle is incorruptible and remains separate after the body's dissolution, it seemingly cannot be a form of the body."}, {"front": "What argument 'on the contrary' did Aquinas present, drawing from Aristotle, to support the intellectual principle as the form of man?", "back": "The 'rational' difference, which constitutes man's species, is derived from his form. Since 'rational' comes from the intellectual principle, it must be man's form."}, {"front": "What is Aquinas's primary argument, based on Aristotle, for why the intellectual principle is the form of the human body?", "back": "That by which a thing primarily acts is its form. The soul (including the intellectual principle) is the primary principle by which the body lives, nourishes, senses, moves, and understands. Therefore, the intellectual principle is the form of the body."}, {"front": "Why does Aquinas reject the idea that understanding is merely attributed to a person accidentally (e.g., as 'white builds')?", "back": "Understanding is ascribed to a person 'as man,' which is an essential predication. It's not accidental but fundamental to what a human being is."}, {"front": "How does Aquinas refute Plato's view that 'man is an intellectual soul' (i.e., man understands by virtue of his whole self)?", "back": "If man were just the intellectual soul, he couldn't sense, because sensing requires a body. Since the same man both understands and senses, the body must be part of man, and thus understanding is an action of the composite being."}, {"front": "Why does Aquinas reject the Commentator's view that the intellect is united to the body only through intelligible species and phantasms?", "back": "This union doesn't sufficiently explain how the *act of understanding* is truly the act of *this particular man*. It would be like saying a wall sees because colors are on it; the wall is seen, it doesn't see. Similarly, a man doesn't understand merely because phantasms are in his corporeal organs and species in his intellect."}, {"front": "What is one reason Aquinas gives against the idea that the intellect is united to the body as its 'motor'?", "back": "The intellect moves the body only *through the appetite*, and the appetite's movement presupposes the intellect's operation (understanding). A person is moved by intellect *because* they understand, not the other way around."}, {"front": "What is another reason Aquinas gives against the intellect being united to the body as a 'motor'?", "back": "The act of the intellect remains in the agent and does not pass into something else. The action of a motor (like heating) usually affects something external. Thus, understanding cannot be attributed to a person on the grounds that his intellect moves him."}, {"front": "How does Aquinas use the carpenter/saw analogy to argue against the intellect being a motor for the body?", "back": "If understanding is attributed to Socrates as the action of what moves him, it implies Socrates is merely an *instrument* for the intellect, which contradicts Aristotle's teaching that understanding is not possible through a corporeal instrument."}, {"front": "Why does Aquinas argue that if the intellect is only united as a motor, Socrates would not be 'one absolutely'?", "back": "The action of a part is attributed to the whole (a man sees with his eye), but never to another part. If intellect is only a motor, Socrates is not substantially one entity but a loose combination, and consequently not a 'being absolutely,' as unity is essential to being."}, {"front": "What is Aquinas's ultimate conclusion regarding the union of the intellectual principle with the body, based on his refutations and primary arguments?", "back": "The only remaining explanation is Aristotle's: the intellectual principle is united to the body as its form, thereby clarifying that this particular man understands *because* the intellectual principle is his form."}, {"front": "How does the 'nature of the human species' further support Aquinas's conclusion that the intellectual principle is the proper form of man?", "back": "The proper operation of man as man is to understand, by which he surpasses all other animals and achieves ultimate happiness. Since the species of anything is derived from its form, man must derive his species from the principle of this operation, concluding that the intellectual principle is the proper form of man."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
