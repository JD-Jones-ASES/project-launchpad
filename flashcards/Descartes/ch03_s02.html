<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the significance of Descartes' 'cogito' in modern philosophy?", "back": "The cogito is considered the opening move of modern philosophy, raising fundamental questions about the self, the mind, and the relationship between thinking and being."}, {"front": "According to Descartes, what constitutes the 'self'?", "back": "Descartes identifies the self with the thinking substance — the mind or soul. For him, 'I' just am my mind."}, {"front": "How does Descartes distinguish between the mind and the body regarding the self?", "back": "For Descartes, the mind is what 'I am,' while the body, if it exists, is something 'I have,' not something 'I am.'"}, {"front": "What defines the soul in Descartes' philosophy?", "back": "The soul, on Descartes' view, is defined entirely by its one activity it can never stop: thinking."}, {"front": "How does the Aristotelian-Thomistic view of the soul differ from Descartes' view?", "back": "In the Aristotelian-Thomistic framework, the soul is the 'form' of the body—the organizing principle that makes a living human body what it is. It is not a substance trapped in a body."}, {"front": "What happens, according to the Thomistic view, if the soul is removed from a human body?", "back": "If the soul is removed, you do not have a body plus a missing soul; you have something that is no longer a human body at all, only an organic corpse."}, {"front": "What profound tension arises from Descartes' distinction between mind and body?", "back": "The tension is how a purely thinking, non-extended mind can interact with a purely extended, non-thinking body."}, {"front": "How did David Hume's approach to the self differ from Descartes'?", "back": "Hume accepted Descartes' starting point that philosophy begins with the contents of the mind, but rejected his conclusion. Hume reported finding no persisting, unified self, only a 'bundle or collection of different perceptions.'"}, {"front": "Define Hume's 'bundle theory' of the self.", "back": "The bundle theory states that the self is not a single, unified, persisting substance but merely a collection of perceptions (sensations, thoughts, feelings) with no underlying subject that ties them together."}, {"front": "How does Hume challenge the 'I' in Descartes' 'I think'?", "back": "Hume argues that the 'I' in 'I think' refers to nothing more than the thought itself, not to a substantial self that underlies and owns the thought. There is no impression of a thinking substance."}, {"front": "What was Immanuel Kant's aim in responding to Hume's challenge?", "back": "Kant aimed to mediate between Descartes' rationalism and Hume's empiricism, taking Hume's challenge seriously but refusing to accept the bundle theory as the final word."}, {"front": "What is Kant's concept of the 'formal unity of consciousness'?", "back": "Kant argued that a formal unity of consciousness is a necessary condition for experience itself. For any experience to occur, there must be something that counts as 'mine' — an 'I think' that could accompany every representation."}, {"front": "According to Kant, is the 'formal 'I'' an object that can be known?", "back": "No, Kant states that the formal 'I' is not an object that can be known. It is a logical condition of knowing, not a substance that can be encountered in experience."}, {"front": "Where did Kant argue Descartes 'overreached' in his conclusions about the 'I think'?", "back": "Kant argued that Descartes overreached by concluding he had discovered a 'thinking substance' from the 'I think.' For Kant, it gives a logical placeholder, not a metaphysical substance."}, {"front": "What central problem did Descartes' cogito create for modern philosophy of mind?", "back": "The cogito created the central problem of modern philosophy of mind: how the mind is related to the body and brain, particularly how a non-material mind interacts with a physical body."}, {"front": "Define Physicalism (or Materialism) in the philosophy of mind.", "back": "Physicalism is the view that everything that exists, including mental states, is ultimately physical. On this view, the mind just is the brain, and mental states are identical to brain states."}, {"front": "Define Functionalism in the philosophy of mind.", "back": "Functionalism is the view that mental states are defined not by what they are made of (e.g., neurons) but by what they do — the causal role they play in processing inputs and generating outputs."}, {"front": "Define Property Dualism in the philosophy of mind.", "back": "Property dualism concedes there is only one kind of substance (physical) but insists that mental properties of a system are genuinely distinct from its physical properties and cannot be reduced to them."}, {"front": "What is the main unresolved question in philosophy of mind that stems directly from Descartes' Meditation II?", "back": "The question of what the mind is and how it relates to the body and brain remains one of the deepest unsolved problems in philosophy and science."}, {"front": "Which historical figure's argument 'si fallor, sum' ('if I am mistaken, I exist') strikingly anticipated Descartes' cogito?", "back": "Augustine of Hippo, in his work 'The City of God,' made an argument ('si fallor, sum') that is remarkably similar to Descartes' cogito, over a thousand years earlier."}, {"front": "What makes Descartes' philosophical use of the cogito distinctive, even if the core insight has ancient roots?", "back": "Descartes built a systematic epistemology on the foundation of the cogito, which Augustine, despite his similar insight, did not do."}, {"front": "Where did Descartes receive his education, and what philosophy heavily influenced its curriculum?", "back": "Descartes received his education at La Fleche, a Jesuit college. Its curriculum was heavily influenced by Scholastic philosophy, meaning Aristotle as interpreted by Aquinas."}, {"front": "According to Descartes, is the soul defined by its relationship to God or the world?", "back": "No, on Descartes' view, the soul is not defined by its relationship to the body, or to God, or to the world; it is defined solely by thinking."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
