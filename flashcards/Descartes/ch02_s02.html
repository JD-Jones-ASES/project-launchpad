<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who is recognized as the founder of ancient Pyrrhonism?", "back": "Pyrrho of Elis", "id": "fc01"}, {"front": "According to philosophical legend, why did Pyrrho of Elis require friends to guide him away from cliffs?", "back": "He refused to trust sensory perception.", "id": "fc02"}, {"front": "Which 16th-century rediscoveries preserved the specific arguments of the Pyrrhonists?", "back": "The texts of Sextus Empiricus", "id": "fc03"}, {"front": "What did Pyrrhonists claim was true of the arguments for every possible question?", "back": "There are equally strong arguments on both sides.", "id": "fc04"}, {"front": "Term: Epoche", "back": "The Greek term for the suspension or withholding of judgment.", "id": "fc05"}, {"front": "In Pyrrhonism, what is the term for the tranquil state of soul achieved by suspending judgment?", "back": "Ataraxia", "id": "fc06"}, {"front": "Why did the Pyrrhonists believe that suspending judgment leads to ataraxia?", "back": "It eliminates anxiety caused by holding uncertain beliefs with false confidence.", "id": "fc07"}, {"front": "How does Descartes' ultimate goal for doubting differ from that of the Pyrrhonists?", "back": "Descartes doubts to escape doubt, whereas Pyrrhonists doubt to remain in doubt.", "id": "fc08"}, {"front": "What is meant by the description of Descartes' method as \"skepticism in the service of anti-skepticism\"?", "back": "He uses skeptical arguments as a tool to find a truth that survives them.", "id": "fc09"}, {"front": "Which group of ancient skeptics represented a milder tradition than the Pyrrhonists?", "back": "The Academic skeptics", "id": "fc10"}, {"front": "Who were the two most prominent leaders of the Academic skeptics mentioned in the text?", "back": "Arcesilaus and Carneades", "id": "fc11"}, {"front": "According to Academic skeptics, what is the best attitude toward questions where certainty is unavailable?", "back": "Probabilism", "id": "fc12"}, {"front": "Definition: Probabilism", "back": "Acting on what seems most plausible while withholding assent from claims of certain knowledge.", "id": "fc13"}, {"front": "How did Academic skeptics suggest we should proportion our level of confidence?", "back": "In proportion to our evidence.", "id": "fc14"}, {"front": "Which 4th-century Christian theologian anticipated Descartes' cogito argument?", "back": "Augustine of Hippo", "id": "fc15"}, {"front": "What is the English translation of Augustine's phrase \"Si enim fallor, sum\"?", "back": "If I am mistaken, I exist.", "id": "fc16"}, {"front": "In which major work does Augustine argue that being deceived proves his existence?", "back": "The City of God", "id": "fc17"}, {"front": "What is the logical premise behind Augustine's argument that being deceived proves existence?", "back": "A being that does not exist cannot be deceived.", "id": "fc18"}, {"front": "Where was Augustine of Hippo born?", "back": "Thagaste in Roman North Africa (modern Algeria)", "id": "fc19"}, {"front": "Which religious movement did Augustine belong to before his conversion to Christianity?", "back": "Manichaeism", "id": "fc20"}, {"front": "Which medieval philosopher regarded Augustine as one of the supreme authorities in theology?", "back": "Thomas Aquinas", "id": "fc21"}, {"front": "What is the primary difference between Augustine's and Descartes' logical starting points for existence?", "back": "Augustine emphasizes that deception implies existence, while Descartes emphasizes that thinking implies existence.", "id": "fc22"}, {"front": "For Augustine, what was the ultimate purpose of establishing certainty of the self's existence?", "back": "To provide a foundation for recovering knowledge of God.", "id": "fc23"}, {"front": "Which Scottish philosopher accepted Descartes' skeptical method but rejected the possibility of a certain foundation?", "back": "David Hume", "id": "fc24"}, {"front": "According to David Hume, what is the true source of our beliefs about causation and the external world?", "back": "Habits of mind given by nature.", "id": "fc25"}, {"front": "How did David Hume's work affect Immanuel Kant's philosophical outlook?", "back": "It \"awakened\" Kant from his \"dogmatic slumber.\"", "id": "fc26"}, {"front": "Why did Hume believe we maintain beliefs about personal identity despite a lack of rational proof?", "back": "They are useful habits of mind, not because they are demonstrable.", "id": "fc27"}, {"front": "Who developed the modern \"brain in a vat\" hypothesis?", "back": "Hilary Putnam", "id": "fc28"}, {"front": "What is the core premise of the \"brain in a vat\" hypothesis?", "back": "A brain simulated by a computer would perceive an identical reality to our own with no way to tell the difference.", "id": "fc29"}, {"front": "Which 1999 science fiction film popularized a version of the brain-in-a-vat scenario?", "back": "The Matrix", "id": "fc30"}, {"front": "What advantage does Descartes' system have over the modern brain-in-a-vat skeptic for escaping doubt?", "back": "He relies on God's existence and non-deceptiveness.", "id": "fc31"}, {"front": "Why is the brain-in-a-vat scenario designed to be harder to escape than Descartes' evil genius?", "back": "It does not assume the existence of God to resolve the doubt.", "id": "fc32"}, {"front": "The Pyrrhonists argued that reason cannot settle questions regarding which three major areas?", "back": "Science, ethics, and religion.", "id": "fc33"}, {"front": "In which century were the texts of Sextus Empiricus rediscovered?", "back": "The sixteenth century.", "id": "fc34"}, {"front": "What is the literal Greek meaning of the word \"epoche\"?", "back": "Suspension or withholding.", "id": "fc35"}, {"front": "Descartes' stages of doubt in Meditation I draw on arguments developed by which ancient group?", "back": "The skeptics", "id": "fc36"}, {"front": "Unlike Pyrrhonists, Academic skeptics argued that genuine certainty is _____.", "back": "Rarely if ever available.", "id": "fc37"}, {"front": "What was the title of Augustine's sweeping defense of Christianity against pagan criticism?", "back": "The City of God", "id": "fc38"}, {"front": "Augustine's argument \"Si fallor, sum\" appears in The City of God and which other work?", "back": "On Free Will", "id": "fc39"}, {"front": "Which major philosophical tradition did Augustine study before his conversion?", "back": "Academic skepticism", "id": "fc40"}, {"front": "David Hume's 1739 work regarding the limits of human knowledge is titled _____.", "back": "A Treatise of Human Nature", "id": "fc41"}, {"front": "What is the title of David Hume's 1748 work on human understanding?", "back": "An Enquiry Concerning Human Understanding", "id": "fc42"}, {"front": "What did Hume conclude about our ability to establish beliefs on rational grounds?", "back": "We genuinely cannot establish them.", "id": "fc43"}, {"front": "In the brain-in-a-vat scenario, what replaces the body and the external world?", "back": "A computer feeding the brain electrical impulses.", "id": "fc44"}, {"front": "Descartes establishes God's non-deceptiveness in which two Meditations?", "back": "Meditations III and V.", "id": "fc45"}, {"front": "According to the text, what is the \"fixed point in a sea of doubt\" for both Augustine and Descartes?", "back": "The self's certainty of its own existence.", "id": "fc46"}, {"front": "Why does the text state that the question \"how do I know the world is real?\" cannot be dismissed?", "back": "It is a genuine philosophical problem that cannot be definitively proven.", "id": "fc47"}, {"front": "Who was Descartes' \"great antagonist\" throughout the writing of the Meditations?", "back": "The tradition of systematic doubt (skepticism).", "id": "fc48"}, {"front": "What is the date of the publication of Descartes' Meditations mentioned in the text?", "back": "1641", "id": "fc49"}, {"front": "Pyrrho of Elis reportedly lived between which years?", "back": "c. 360–270 BCE", "id": "fc50"}, {"front": "Augustine of Hippo lived during which years?", "back": "354–430", "id": "fc51"}, {"front": "The Academic skeptics were members of whose Academy in its later phase?", "back": "Plato's Academy", "id": "fc52"}, {"front": "In the ancient world, which school of skepticism was considered the most radical?", "back": "The Pyrrhonists", "id": "fc53"}, {"front": "What did Pyrrho refuse to trust as a consistent philosophical practice?", "back": "Sensory perception", "id": "fc54"}, {"front": "According to the Pyrrhonists, what eliminates the anxiety of holding uncertain beliefs?", "back": "Suspending judgment (epoche).", "id": "fc55"}, {"front": "How did Descartes respond to the historical connection between his cogito and Augustine's work?", "back": "He acknowledged Augustine's priority but argued his own point was different.", "id": "fc56"}, {"front": "Which philosopher pushed Descartes' skeptical tendencies to their logical conclusion and scandalized his peers?", "back": "David Hume", "id": "fc57"}, {"front": "What is the primary function of the computer in the \"brain in a vat\" hypothesis?", "back": "To simulate normal experience perfectly.", "id": "fc58"}, {"front": "Why did Descartes take the skeptics' best arguments seriously?", "back": "He wanted to defeat them.", "id": "fc59"}, {"front": "Which historical school of skepticism is associated with the 3rd to 1st century BCE?", "back": "Academic skepticism", "id": "fc60"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
