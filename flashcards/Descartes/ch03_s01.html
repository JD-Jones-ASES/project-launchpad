<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Descartes' primary goal at the beginning of the second Meditation?", "back": "To find one firm truth that cannot be doubted."}, {"front": "Which Greek figure does Descartes use as a metaphor for finding a single fixed certainty?", "back": "Archimedes."}, {"front": "What did Archimedes claim he could move if he had one firm point and a long enough lever?", "back": "The whole earth."}, {"front": "According to Descartes, what is the 'Archimedean Point' in philosophy?", "back": "A single proposition that cannot be doubted from which all knowledge can be levered back into place."}, {"front": "Descartes resolves to press on until he finds certainty or at least learns for certain that _____.", "back": "There is nothing in the world that is certain."}, {"front": "Why is the 'evil genius' unable to deceive Descartes about his own existence?", "back": "Descartes must exist in order for deception to take place."}, {"front": "What is the shorthand term for Descartes' first certainty regarding his own existence?", "back": "The Cogito."}, {"front": "What is the English translation of 'Cogito, ergo sum'?", "back": "I think, therefore I am."}, {"front": "In which 1637 work did Descartes first use the phrase 'I think, therefore I am'?", "back": "Discourse on the Method."}, {"front": "How does the formulation of the Cogito in the 'Meditations' differ from the 'Discourse'?", "back": "It is stated as 'I am, I exist' is necessarily true whenever it is conceived or pronounced."}, {"front": "Descartes' formulation in the 'Meditations' is intended to be an immediate intuition rather than a(n) _____.", "back": "Syllogism."}, {"front": "Term: Syllogism", "back": "Definition: A form of logical reasoning where a conclusion follows from two premises."}, {"front": "What is the hidden premise in the syllogistic interpretation of the Cogito?", "back": "Everything that thinks exists."}, {"front": "Term: Intuition (Philosophical sense)", "back": "Definition: A direct, non-inferential mental perception of a truth as self-evidently true."}, {"front": "Why does Descartes argue that the Cogito is not a syllogism?", "back": "It is a direct mental apprehension of truth at the moment of thinking, not a derivation from premises."}, {"front": "What bedrock of certainty remains even if an evil genius tricks Descartes about everything else?", "back": "The act of doubting (or thinking) itself."}, {"front": "After establishing that he exists, what specific question does Descartes immediately ask?", "back": "What am I?"}, {"front": "Why does Descartes reject the definition of a human as a 'rational animal'?", "back": "It requires explaining complex terms like 'animal' and 'rational,' leading to an endless chain of definitions."}, {"front": "Descartes concludes that his essence is that of a _____.", "back": "Thinking thing."}, {"front": "What is the Latin term for 'thinking thing' used by Descartes?", "back": "Res cogitans."}, {"front": "Descartes lists several modes of thought; name three that involve cognitive judgment.", "back": "Doubts, understands, and conceives."}, {"front": "Which three modes of thought in Descartes' list involve the will or decision-making?", "back": "Affirms, denies, and wills."}, {"front": "Besides reasoning and willing, what other two capacities does Descartes include in his definition of 'thinking'?", "back": "Imagining and feeling."}, {"front": "What is the Latin term for an 'extended thing' or physical body?", "back": "Res extensa."}, {"front": "Term: Substance Dualism", "back": "Definition: The view that mind and body are two fundamentally different kinds of things or substances."}, {"front": "What is the main purpose of the 'Wax Argument' in Meditation II?", "back": "To demonstrate that knowledge of physical objects comes from the intellect rather than the senses."}, {"front": "In the wax argument, what happens to the sensory qualities (color, smell, hardness) when the wax is melted?", "back": "They change completely or disappear entirely."}, {"front": "Why can't the senses be the source of our knowledge that the melted wax is the same as the solid wax?", "back": "Every sensory quality the wax originally possessed has been replaced by a different one."}, {"front": "According to Descartes, what are the three properties of wax that remain constant and are grasped by reason?", "back": "Extension, flexibility, and mutability."}, {"front": "Term: Extension (in the context of physical objects)", "back": "Definition: The quality of taking up space in the physical world."}, {"front": "How is the true nature of the wax 'grasped' if not by the eyes or hands?", "back": "By the intellect or the power of reason alone."}, {"front": "What does the wax argument suggest about our knowledge of the mind versus our knowledge of objects?", "back": "The mind is better known to us than any physical object."}, {"front": "Does the Cogito prove the existence of Descartes' physical body?", "back": "No, at the end of Meditation II, the body remains doubtful."}, {"front": "What 'unsolved problem' is generated by Descartes' view of substance dualism?", "back": "The nature of the interaction between the non-extended mind and the extended body."}, {"front": "According to the 'caution' section, does Meditation II prove the existence of other minds?", "back": "No, it only establishes the existence of the self as a thinking thing."}, {"front": "In which Meditation does Descartes finally attempt to recover the existence of the external world?", "back": "Meditation VI."}, {"front": "If Descartes' existence is necessarily true 'each time' he thinks it, his certainty is tied to the _____ of thinking.", "back": "Act (or moment)."}, {"front": "What is the primary characteristic of a 'res extensa'?", "back": "It is an extended, non-thinking substance."}, {"front": "What is the primary characteristic of a 'res cogitans'?", "back": "It is a non-extended thinking substance."}, {"front": "Why is 'I am, I exist' considered self-verifying each time it is pronounced?", "back": "The very act of pronouncing or conceiving it requires a thinker to perform the action."}, {"front": "In the syllogism 'All men are mortal; Socrates is a man; therefore, Socrates is mortal,' which part is the conclusion?", "back": "Socrates is mortal."}, {"front": "According to the 'Think Deeper' section, what aspect of 'self' is missing from Descartes' initial discovery?", "back": "Knowledge of his personality, memories, and relationships."}, {"front": "Descartes views the wax as 'mutable,' which means it has the capacity to _____.", "back": "Change."}, {"front": "Descartes views the wax as 'flexible,' which means it has the capacity to _____.", "back": "Take many different shapes."}, {"front": "What does the phrase 'Archimedes (c. 287–212 bc)' indicate about the source of Descartes' metaphor?", "back": "It refers to an ancient Greek mathematician and physicist."}, {"front": "True or False: Descartes considers 'feeling' to be a mode of thought.", "back": "True."}, {"front": "What does Descartes mean by saying the Cogito is his 'first certainty'?", "back": "It is the foundational truth that survives universal doubt and serves as a starting point for knowledge."}, {"front": "According to Descartes, even if he is wrong about everything, he cannot be tricked into thinking he exists when he does not because _____.", "back": "Thinking requires a thinker."}, {"front": "Why does Descartes emphasize that the Cogito is NOT an argument from general premises?", "back": "General premises could still be doubted, whereas the Cogito is self-evident in the moment of thought."}, {"front": "The list 'doubts, understands, conceives, affirms, denies, wills, refuses, imagines, and feels' describes the activities of a(n) _____.", "back": "Thinking thing (or res cogitans)."}, {"front": "What does the wax argument prove about the reliability of the senses?", "back": "The senses are less reliable than reason because they only perceive changing qualities, not essence."}, {"front": "What does Descartes conclude is 'better known' to him than the wax itself?", "back": "His own mind."}, {"front": "According to the text, what remains as the 'bedrock of certainty' for Descartes?", "back": "The act of thinking itself."}, {"front": "How does Descartes define a 'thinking thing' in a broad sense?", "back": "As something that doubts, understands, affirms, denies, wills, refuses, imagines, and feels."}, {"front": "Descartes borrowed the image of the lever and fulcrum from which scientist?", "back": "Archimedes."}, {"front": "The 'Meditation II' formulation of the Cogito focuses on the truth of existence being tied to the moment of _____.", "back": "Mental conception (or pronunciation)."}, {"front": "In Descartes' view, is the body (res extensa) a thinking substance?", "back": "No, it is a non-thinking substance."}, {"front": "According to the teacher note, why is the 'syllogism' version of the Cogito potentially problematic?", "back": "It relies on a general premise ('Everything that thinks exists') that has not yet been proven certain."}, {"front": "Does Meditation II establish the existence of a 'Rational Animal'?", "back": "No, it replaces that definition with 'Thinking Thing.'"}, {"front": "What is the primary source of knowledge about the wax's 'mutability'?", "back": "The intellect."}, {"front": "What is the primary source of knowledge about the wax's 'extension'?", "back": "The intellect."}, {"front": "By the end of Meditation II, has Descartes proven that his hands and eyes exist?", "back": "No, they remain doubtful."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
