<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 5, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Descartes">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central philosophical problem does Descartes confront in Meditation IV?", "back": "If God is perfect and created us, why do humans ever fall into error?"}, {"front": "What premise, established earlier, does Descartes rely on to begin his investigation into truth and error?", "back": "That God is not a deceiver."}, {"front": "According to Descartes, what kind of knowledge is considered most certain, and what is least certain?", "back": "Knowledge about God is most certain, followed by the human mind, and least certain is knowledge about corporeal objects."}, {"front": "What is Descartes's argument for why God cannot be a deceiver?", "back": "Deception is a mark of imperfection (malice or feebleness), and such imperfections cannot be found in a supremely perfect God."}, {"front": "Initially, how does Descartes connect his faculty of judgment to God's non-deceiving nature?", "back": "Since God gave him the capacity for judging and is not a deceiver, this faculty must not lead him to err if used correctly."}, {"front": "Describe Descartes's first, insufficient explanation for the existence of error.", "back": "Error is seen as a 'defect' or 'lack of perfection' in humans, who are an intermediate being between God (supreme perfection) and nothing (non-being), implying that the power to distinguish truth from error is not infinite."}, {"front": "Why does Descartes find his initial explanation of error as a 'pure negation' or 'defect' unsatisfactory?", "back": "Error is not merely the absence of a perfection he shouldn't have, but a lack of knowledge he ought to possess. A perfect Creator should produce perfect works, raising the question of why he was made prone to error."}, {"front": "When considering God's works, what does Descartes advise against doing when trying to understand why imperfections exist?", "back": "He advises against considering a single creature (like himself) in isolation. Instead, one should regard all of God's creations together as part of the whole universe, where seeming imperfections might contribute to overall perfection."}, {"front": "Why does Descartes argue against investigating 'final causes' (God's ends or purposes) in natural philosophy?", "back": "Because God's nature is immense and incomprehensible, human intelligence is too feeble and limited to understand God's inscrutable ends, making such an investigation presumptuous."}, {"front": "According to Descartes's ultimate solution, what two principal faculties combine to cause human error?", "back": "The faculty of Understanding (knowledge) and the power of Will (free choice)."}, {"front": "Describe the nature and function of the Understanding (faculty of knowledge) in Descartes's theory of judgment.", "back": "The Understanding apprehends ideas but neither asserts nor denies anything. Error is not found in the understanding itself, as it only presents ideas for judgment. Its scope is finite."}, {"front": "How does Descartes describe the nature and extent of the Will (free will)?", "back": "The Will is a power of choice so ample and extensive that it is subject to no limits. Descartes finds it to be so great in him that he can conceive of no greater idea, thus bearing the image and similitude of God."}, {"front": "How does Descartes define liberty or free will?", "back": "It consists in having the power to choose to do a thing or not to do it (affirm/deny, pursue/shun), acting without any external force constraining us."}, {"front": "What is the 'lowest grade of liberty' according to Descartes, and what does it signify?", "back": "Indifference, which is the state of not being swayed to one side or the other due to a lack of reason or clear knowledge. It evinces a lack or negation in knowledge rather than a perfection of will."}, {"front": "What is the 'highest grade of liberty,' and how is it attained?", "back": "When one clearly recognizes what is true and good, leading one to choose and embrace it without hesitation. Divine grace and natural knowledge increase and strengthen this liberty."}, {"front": "Can the Understanding alone be the source of human error? Explain why or why not.", "back": "No. The understanding only apprehends ideas. All that it understands, it understands as it ought, since it operates by the power God gave it, making it impossible to err in the understanding itself."}, {"front": "Can the Will alone be the source of human error? Explain why or why not.", "back": "No. The power of will is very ample and perfect of its kind, and of itself, it is merely the capacity to choose. It is not inherently flawed."}, {"front": "What is Descartes's ultimate explanation for the origin of human error?", "back": "Error arises because the Will is much wider in its range than the Understanding. When the Will extends itself to affirm or deny things that the Understanding does not clearly apprehend, it falls into error because it acts indifferent to truth."}, {"front": "Provide an example of how the combination of understanding and will leads to error, according to Descartes.", "back": "When the understanding presents an unclear or incomplete idea (e.g., about a complex scientific theory), and the will, not restraining itself, rushes to affirm or deny it without sufficient clear perception, error occurs."}, {"front": "How does Descartes reconcile the infinite perfection of God with the finite nature of human understanding?", "back": "He states that God is not bound to place all possible perfections in each of His works. The limited scope of human understanding is not a defect, but simply its nature, and God cannot be faulted for not making it infinite."}, {"front": "In what way do humans bear the 'image and similitude of God,' according_to Descartes?", "back": "Primarily through their infinite free will (liberty of choice), which is so great that Descartes can conceive no other idea to be more great in this particular formal sense, even if God's will is greater in power and object."}, {"front": "What is the difference between the power of will in God and in humans, even though its 'formal' extent is similar?", "back": "In God, the power of will is incomparably greater due to the immense knowledge and power conjoined with it, which makes it stronger and more efficacious, and its object extends to many more things."}, {"front": "Why does Descartes emphasize that he is not 'constrained' when exercising his free will, even when he chooses based on clear reasons?", "back": "Because true freedom isn't indifference between two options, but the conscious embracing of what is clearly recognized as good or true. The more one leans towards the good and true (whether by reason or divine grace), the more freely one chooses."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
