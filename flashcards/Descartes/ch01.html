<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What significant title is René Descartes often given in the history of thought?", "back": "He is often called the father of modern philosophy.", "id": "fc01"}, {"front": "What was the title of Descartes' influential work published in 1641?", "back": "Meditations on First Philosophy.", "id": "fc02"}, {"front": "How did Descartes' Meditations profoundly impact Western thinking?", "back": "It reshaped how the Western world thinks about knowledge, God, and the self.", "id": "fc03"}, {"front": "In what language and year were the Meditations originally published?", "back": "In Latin, in Paris, in 1641.", "id": "fc04"}, {"front": "What two prefatory pieces did Descartes include before the Meditations themselves?", "back": "A dedicatory letter addressed to the Faculty of Sacred Theology at the Sorbonne and a brief synopsis summarizing each Meditation.", "id": "fc05"}, {"front": "Why was the Sorbonne's approval or protection crucial to Descartes?", "back": "The Sorbonne was a highly prestigious theological institution with immense authority to approve or condemn philosophical and scientific works, giving Descartes' work legitimacy and potential protection from censorship.", "id": "fc06"}, {"front": "What historical event significantly influenced Descartes' cautious approach to publishing his philosophical work?", "back": "Galileo's condemnation by the Inquisition in 1633, just eight years before the Meditations' publication.", "id": "fc07"}, {"front": "What was Le Monde, and why did Descartes suppress its publication?", "back": "Le Monde ('The World') was Descartes' unpublished treatise on physics and cosmology that defended a heliocentric view. He suppressed it after hearing of Galileo's condemnation to avoid similar ecclesiastical censure.", "id": "fc08"}, {"front": "What was Descartes' strategic tone in the dedicatory letter to the Sorbonne?", "back": "He adopted a carefully deferential tone, presenting his philosophical arguments as aids to theology, rather than challenges, hoping to strengthen the Church's case against unbelievers.", "id": "fc09"}, {"front": "What is the primary function of the synopsis included in the Meditations?", "back": "It maps the argument of each Meditation in brief, revealing Descartes' careful and structured plan for his argument's progression.", "id": "fc10"}, {"front": "According to Descartes in the synopsis, what is the philosophical journey undertaken in the six Meditations?", "back": "It moves from total doubt (Meditation I), through the discovery of the self (Meditation II), two proofs of God's existence (Meditations III and V), an account of error (Meditation IV), and finally to the recovery of the external world (Meditation VI).", "id": "fc11"}, {"front": "What two 'chief questions' did Descartes aim to demonstrate using philosophical, rather than purely theological, arguments?", "back": "The existence of God and the fact that the human soul does not perish with the body (or is distinct from the body).", "id": "fc12"}, {"front": "Why did Descartes believe philosophical proofs were necessary for questions of God and the soul, even if 'faithful ones' accept them by faith?", "back": "To persuade 'infidels' of religion and moral virtue, as they could not be convinced by faith alone.", "id": "fc13"}, {"front": "What logical fallacy did Descartes identify in using purely theological arguments to convince infidels about God's existence?", "back": "He pointed out the circular reasoning of believing in God because of Holy Scriptures, and believing in Holy Scriptures because they come from God.", "id": "fc14"}, {"front": "Which historical Church Council and Pope did Descartes cite as condemning the idea that the soul perishes with the body?", "back": "The Lateran Council held under Pope Leo X (in the eighth session).", "id": "fc15"}, {"front": "What did Descartes identify as the principal reason many 'impious persons' doubted the existence of God and the soul's distinctness from the body?", "back": "They declared that no one had yet been able to demonstrate these two facts clearly.", "id": "fc16"}, {"front": "How did Descartes describe the certainty and evidence of his philosophical demonstrations in comparison to geometrical proofs?", "back": "He claimed they were equal to, or even surpassed, the certainty and evidence of geometric demonstrations.", "id": "fc17"}, {"front": "What two key characteristics did Descartes state were essential for a mind to adequately understand his metaphysical demonstrations?", "back": "A mind wholly free of prejudices and one which can be easily detached from the affairs of the senses.", "id": "fc18"}, {"front": "Why did Descartes believe fewer people were 'fitted for metaphysical speculations' compared to geometry?", "back": "Metaphysics demands a mind free of prejudices and detached from the senses, which is a rarer quality. Additionally, philosophy is often perceived as 'problematical,' unlike geometry where demonstrations are expected and accepted.", "id": "fc19"}, {"front": "Despite his confidence in his arguments, why did Descartes seek the Sorbonne's protection?", "back": "He recognized that his arguments belonged to philosophy, where everything is often considered 'problematical,' and he doubted they would have much effect on minds without the immense authority and judgment of the Sorbonne.", "id": "fc20"}, {"front": "What was Descartes' ultimate hope if the Sorbonne were to authorize and publicly attest to the truth and certainty of his proofs?", "back": "He believed that all errors and false opinions regarding God and the human soul would soon be eradicated, and even atheists would be influenced by their authority.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
