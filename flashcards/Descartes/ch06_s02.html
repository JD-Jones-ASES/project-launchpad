<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Philosophy (Descartes) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">First Philosophy (Descartes) &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Descartes.html">&larr; Back to First Philosophy (Descartes)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the ontological argument?", "back": "The ontological argument is a philosophical argument that attempts to prove God's existence based solely on the concept or definition of God, rather than on empirical evidence. It is the most discussed philosophical argument in the Western tradition.", "id": "fc01"}, {"front": "Who were the key historical figures involved in the debate surrounding the ontological argument?", "back": "Anselm of Canterbury (formulated), René Descartes (adapted), Thomas Aquinas (attacked), Immanuel Kant (attacked), and various philosophers in the twentieth century (revived).", "id": "fc02"}, {"front": "What was Thomas Aquinas's general stance on the ontological argument?", "back": "Aquinas vigorously rejected the ontological argument, insisting that God's existence cannot be derived from His concept alone but must be proven from observable effects God has on the world (a posteriori proofs).", "id": "fc03"}, {"front": "Who was Anselm of Canterbury, and what famous phrase did he coin?", "back": "Anselm of Canterbury (1033–1109) was an Italian-born Benedictine monk and Archbishop of Canterbury, a theologian and philosopher. He is best known for the ontological argument and for coining the phrase 'fides quaerens intellectum' ('faith seeking understanding').", "id": "fc04"}, {"front": "How did Anselm define God in his ontological argument?", "back": "Anselm defined God as 'that than which nothing greater can be conceived' — meaning the greatest possible being.", "id": "fc05"}, {"front": "Explain the core of Anselm's original ontological argument.", "back": "Anselm argued that if God, defined as 'that than which nothing greater can be conceived,' existed only in the mind (as a concept) and not in reality, then one could conceive of something greater (the same being, but also existing in reality). This would contradict the definition of God. Therefore, God must exist both in the mind and in reality.", "id": "fc06"}, {"front": "In Anselm's *Proslogium*, who does 'the Fool' represent?", "back": "In Anselm's *Proslogium*, 'the Fool' represents a skeptic who 'has said in his heart, there is no God,' echoing a phrase from the Psalmist.", "id": "fc07"}, {"front": "According to Anselm, in what two ways can a thing be conceived?", "back": "Anselm distinguishes two ways of conceiving a thing: (1) when the word signifying it is conceived, and (2) when the very entity or nature of the object is understood.", "id": "fc08"}, {"front": "Why does Anselm claim that no one who truly understands God can conceive that God does not exist?", "back": "Anselm argues that because God is 'that than which a greater cannot be conceived,' anyone who thoroughly understands this definition understands that such a being exists so truly that it cannot even be non-existent in concept. To understand God's essence is to understand His necessary existence.", "id": "fc09"}, {"front": "Who was Gaunilo of Marmoutiers, and what was his famous objection to Anselm's argument?", "back": "Gaunilo of Marmoutiers was a contemporary Benedictine monk. His famous objection, 'On Behalf of the Fool,' argued that if Anselm's logic were sound, it could prove the existence of a 'greatest conceivable island' (a perfect island), which is clearly absurd, thus invalidating the argument for God.", "id": "fc10"}, {"front": "How did Anselm respond to Gaunilo's 'Perfect Island' objection?", "back": "Anselm replied that his argument applies uniquely to God, 'that than which nothing greater can be conceived,' because God represents an absolute maximum of greatness. An island, however perfect, is a contingent, limited thing with no inherent upper limit to its perfection, making the concept of a 'greatest island' incoherent in the same way as God's concept.", "id": "fc11"}, {"front": "What was Thomas Aquinas's primary philosophical reason for rejecting the ontological argument?", "back": "Aquinas argued that humans do not have direct knowledge or a genuine intellectual intuition of God's infinite essence. Our concept of God is a 'nominal definition' (a description from the outside), not a true grasp of what God is, therefore we cannot deduce His existence from that concept alone.", "id": "fc12"}, {"front": "According to Aquinas, what is the relationship between essence and existence in created things?", "back": "In everything except God, essence (what a thing is) and existence (that it is) are distinct realities. For example, a unicorn has a perfectly good essence, but it lacks existence.", "id": "fc13"}, {"front": "According to Aquinas, what is the relationship between essence and existence in God?", "back": "In God alone, essence and existence are identical. God is not merely a being that exists; rather, God is Being itself (subsistent existence). His nature is to exist.", "id": "fc14"}, {"front": "How did Aquinas believe God's existence could be proven, if not through the ontological argument?", "back": "Aquinas believed God's existence could be proven through 'a posteriori' causal arguments, starting from observable features of the world and reasoning toward God as their ultimate explanation. These are known as his 'Five Ways.'", "id": "fc15"}, {"front": "What is a 'nominal definition' according to Aquinas, in the context of understanding God?", "back": "A nominal definition is a description or a way to point toward something (e.g., 'that than which nothing greater can be conceived') without having a complete, intuitive intellectual grasp of its full essence. Aquinas said our knowledge of God's essence is only nominal.", "id": "fc16"}, {"front": "State one of Aquinas's arguments for why God's existence is identical to His essence, as presented in the *Summa Theologica*.", "back": "If a thing's existence differs from its essence, that existence must be caused either by its essential principles or an exterior agent. But nothing can be the sufficient cause of its own existence if its existence is caused. Since God is the first efficient cause, His existence cannot be caused, therefore His essence and existence must be the same.", "id": "fc17"}, {"front": "State another of Aquinas's arguments for why God's existence is identical to His essence, as presented in the *Summa Theologica*.", "back": "Existence is that which makes every form or nature actual. Existence is compared to essence as actuality is to potentiality. Since there is no potentiality in God, it follows that in Him, essence does not differ from existence; His essence is His existence.", "id": "fc18"}, {"front": "State a third of Aquinas's arguments for why God's existence is identical to His essence, as presented in the *Summa Theologica*.", "back": "Just as that which has fire but is not itself fire is on fire by participation, so that which has existence but is not existence itself is a being by participation. God is His own essence. If He were not His own existence, He would be a participated being, not the first being, which is absurd. Therefore, God is His own existence.", "id": "fc19"}, {"front": "What are Aquinas's 'Five Ways'?", "back": "The 'Five Ways' are Aquinas's five a posteriori arguments for God's existence, presented in *Summa Theologica*: arguments from motion, efficient causation, contingency, degrees of perfection, and the order and design of nature. They all begin from observable features of the world.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
