<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Mencken describe the transaction of democracy in the doctrine of popular sovereignty?", "back": "As a transaction between “jackals and jackasses.”"}, {"front": "What aspect of popular sovereignty does Mencken concede, and what does he deny?", "back": "He concedes the power of the people but denies their knowledge."}, {"front": "According to Mencken, why is the 'theoretical variety' of democracy that energizes the popular will impossible to realize?", "back": "There are insuperable impediments solidly grounded in the common mind."}, {"front": "In Mencken's view, what condition must be met for democracy to be considered 'actually in being'?", "back": "The threat must always hang in the air that the popular will may be heard from suddenly and devastatingly."}, {"front": "According to the text, for which 'cases' is it genuinely important that the will of the mass be formulated and executed?", "back": "Capital cases."}, {"front": "What three animal metaphors does Mencken use to describe the American people?", "back": "Sheep, donkeys, and goats."}, {"front": "By whom are the American people constantly 'bamboozled and exploited' according to Mencken?", "back": "Small minorities, ambitious individuals, and exterior groups."}, {"front": "Mencken describes the victimization of the public as which three things?", "back": "A lucrative profession, an exact science, and a delicate and lofty art."}, {"front": "What does Mencken identify as the lowest reward for the 'adept practitioner' of public victimization?", "back": "A seat in Congress or a job as a Prohibition agent."}, {"front": "What is the 'highest reward' for a master of bamboozling the public?", "back": "Immortality."}, {"front": "To what does Mencken compare the delight victims feel toward their exploiters?", "back": "A hypochondriacal woman delighting in the flayings of a surgeon."}, {"front": "What is the only legal bar to the free functioning of the people's will in the United States?", "back": "The bars that the people themselves have erected."}, {"front": "How does the essence of American popular sovereignty compare to that of an absolute monarch?", "back": "It is probably just as complete in essence."}, {"front": "Why was no absolute monarch ever 'actually free' at all times?", "back": "The people could always rise against them and slit their gullet."}, {"front": "Which historical group gradually undermined the sovereignty of the Merovingian kings?", "back": "The mayors of the palace."}, {"front": "Which group eventually caused the emperors of Japan to succumb?", "back": "The shoguns."}, {"front": "The shoguns in Japan eventually succumbed to a combination of which two groups?", "back": "Territorial nobles and city capitalists."}, {"front": "According to Mencken, how do the common people in the United States compare to ancient despots in terms of sovereignty?", "back": "They are more completely sovereign in both fact and law."}, {"front": "Term: Prehensile soothsayers", "back": "Definition: Metaphorical term for greedy individuals who seduce and enchain the public with false promises."}, {"front": "By what device could the American public hang a politician tomorrow if they desired?", "back": "By intimidating Congress into action."}, {"front": "How does the jury system protect the 'executioners' of the popular will?", "back": "Once acquitted by a jury, they cannot be molested further except by illegal processes."}, {"front": "What does Mencken argue regarding the right of the majority to decide qualifications for citizenship?", "back": "If the majority cannot decide qualifications, it possesses no sovereignty at all."}, {"front": "What is the presumptive evidence of a class's general political incompetence?", "back": "Its lack of active interest in obtaining the ballot."}, {"front": "According to Mencken, who originally forced democracy upon its beneficiaries?", "back": "A small group of visionaries standing outside the class benefited."}, {"front": "What was the result of the abolition of the three-class system of voting in Prussia?", "back": "A vast falling off in the honesty and efficiency of government."}, {"front": "What change did the extension of the franchise to women bring to political conventions?", "back": "It substituted adultery for drunkenness as the principal divertissement."}, {"front": "Why does Mencken believe most women vote 'unwillingly and without clear purpose'?", "back": "They are too intelligent to believe in purely political remedies for the world's sorrows."}, {"front": "In 1920, why did many farm-wives vote against the Democratic candidate Cox?", "back": "Because he was a divorcee and thus viewed as an antinomian."}, {"front": "Mencken asserts that the extension of the franchise has turned the political 'clown-show' into a corps of mountebanks plus a few _____.", "back": "Jezebels"}, {"front": "Who was the 'swart statesman' from Georgia who chaired the delegation at the 1920 Republican National Convention?", "back": "Henry Lincoln Johnson."}, {"front": "How does Mencken characterize the disenfranchisement of African Americans in the rural South?", "back": "As a function of residence rather than something intrinsic and complete."}, {"front": "According to Mencken, why do many Black citizens in the South stay away from the polls?", "back": "They do not value the ballot highly enough to risk the dangers of using it."}, {"front": "Mencken argues that anyone unwilling to fight for the franchise is likely to lack what?", "back": "A proper sense of consecration when exercising the right to vote."}, {"front": "What motive does Mencken identify for New York Caucasians surrendering their legal right to vote?", "back": "To avoid jury duty."}, {"front": "What is the fundamental similarity between whites avoiding jury duty and Southern blacks avoiding the polls?", "back": "Both value their peace and security more than the right to vote."}, {"front": "What phrase describes the state of the popular will when it 'takes a coherent and apposite form' by a miracle of nature?", "back": "A prodigy of nature."}, {"front": "According to Mencken, what tradition keeps the United States free from conditioning its autonomy?", "back": "The tradition against foreign alliances."}, {"front": "What historical event involved King John being 'brought to bay' by nobles and capitalists?", "back": "The signing at Runnymede."}, {"front": "Who was the contemporary President Mencken used as an example of mediocrity elevated by democracy?", "back": "Calvin Coolidge (Dr. Coolidge)."}, {"front": "Mencken believes that if the popular will is heard suddenly and devastatingly under $x$ circumstances on $y$ day, then _____ is in being.", "back": "Democracy"}, {"front": "What class of persons, according to Mencken, were the leaders of the agitation against the three-class system in Belgium?", "back": "A small minority, often not even members of the transgressed class."}, {"front": "Mencken claims that women voters often succumb to the 'sentimentalities' of whom?", "back": "Their lords and masters (men)."}, {"front": "How does Mencken categorize the disenfranchisement of groups like D.C. residents or those with hay-fever?", "back": "Secondary and trivial character."}, {"front": "What is the 'fundamental law' regarding the voting rights of 'coloured folk' in the United States?", "back": "That they may and do vote."}, {"front": "What would be the result of determined mass action by Black citizens to vote, according to Mencken?", "back": "The resistance could not halt it and might lead to another Civil War."}, {"front": "Mencken defines the highest of all rights of the citizen under 'democratic dogma' as the _____.", "back": "Franchise"}, {"front": "Which group of people is mentioned as 'economic rivals' to intelligent American Negroes in the South?", "back": "Poor whites."}, {"front": "According to Mencken, the 'mountebanks' who hold office are unchanged by which political reform?", "back": "The extension of the franchise."}, {"front": "In Mencken's view, the American people have the power to halt 'the obscenity' of political victimization whenever it becomes _____.", "back": "Intolerable"}, {"front": "Mencken notes that even absolute monarchs had to fear 'His Holiness of Rome' or other agents of whom?", "back": "The King of Kings."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
