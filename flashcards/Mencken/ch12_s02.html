<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 12, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is H.L. Mencken's central argument regarding 'the popular will' in this section?", "back": "Mencken argues that 'the people' lack a coherent will, and therefore, democratic government cannot truly execute it."}, {"front": "Describe Mencken's rhetorical strategy in 'The Popular Will' section.", "back": "He concedes the theoretical sovereignty of the American people (total power) but then demonstrates their incompetence, creating tension between concession and verdict."}, {"front": "Who is Mencken's primary audience for this section?", "back": "The educated skeptic, whom he challenges to follow an extended, complex argument."}, {"front": "How does Mencken's persona and tone evolve throughout this section?", "back": "He shifts from a dispassionate analyst (observing 'sheep') to a dark humorist, and finally to a prophet of doom, often moving between contempt, admiration, and anger."}, {"front": "What is the effect of Mencken's unstable tone on the reader?", "back": "It keeps the reader off balance, preventing them from settling on a fixed understanding of Mencken's exact position, thus complicating the picture."}, {"front": "What three animal metaphors does Mencken use as 'graduated insults' for the American people?", "back": "Sheep, donkeys, and goats, representing docility, stupidity/stubbornness, and gullibility/willing victimhood, respectively."}, {"front": "What does Mencken imply by adding 'to borrow from their own dialect' to his animal insults?", "back": "It adds a layer of class contempt, suggesting that even the vocabulary of abuse must be simplified for the people being insulted to understand it."}, {"front": "Define 'prehensile soothsayers' in Mencken's context.", "back": "It describes politicians as 'grasping' (prehensile) for power while 'pretending to see the future' (soothsayers), essentially half primate, half oracle."}, {"front": "According to Mencken, who are 'blacklegs'?", "back": "Swindlers or cheats, especially those preying on gamblers. Mencken applies it to Prohibition agents, equating law enforcement with criminal enterprise."}, {"front": "Explain Mencken's use of the term 'antinomian'.", "back": "Theologically, one who believes faith alone, not moral law, brings salvation. Mencken uses it to mock voters applying religious categories to a politician's secular issues like divorce."}, {"front": "What does 'mellifluous' describe in Mencken's analysis of political rhetoric?", "back": "Sweet-sounding or honeyed. It highlights the gap between the pleasing language of political bargaining and the sordid reality of the transactions."}, {"front": "How does Mencken ironically use legal and constitutional language?", "back": "He applies grand terms like 'inalienable rights' to contexts that expose the gap between their grandeur and the 'meanness' or violence of the reality they describe."}, {"front": "What is the most striking syntactic feature Mencken uses in this section?", "back": "The catalogue (or enumeratio), a long, piling-up list that accumulates examples to overwhelm the reader."}, {"front": "Define 'enumeratio' as a rhetorical device.", "back": "A figure of speech where a speaker lists or catalogs items, reasons, or details, often in ascending or descending order of importance or absurdity."}, {"front": "What dual purpose does Mencken's extended catalogue serve as a rhetorical weapon?", "back": "It proves the unlimited sovereignty of the people by accumulation of evidence, AND it makes that sovereignty seem ridiculous and absurd through the list's length and content."}, {"front": "Describe Mencken's signature rhythmic move in his prose.", "back": "A short-sentence, monosyllabic verdict delivered after a long, complex analytical build-up, creating a devastating conclusion."}, {"front": "What is a rhetorical question?", "back": "A question asked not to elicit an answer but to make a point, with the answer assumed to be obvious, used for emphasis or to create an illusion of dialogue."}, {"front": "How does Mencken typically employ rhetorical questions in his writing?", "back": "He tends to embed implicit questions within aggressive declarative sentences, which function as challenges and state that no reasonable person could disagree."}, {"front": "Analyze the animal metaphor sequence (sheep, donkeys, goats) at the beginning of the section.", "back": "It's a graduated insult: sheep (docile), donkeys (stubborn/stupid), goats (gullible/willing victims). The sequence descends in dignity, arguing people are foolish, obstinate, and complicit in their exploitation."}, {"front": "Explain the significance of the closing metaphor, 'It is a combat between jackals and jackasses.'", "back": "It brings the animal imagery full circle, portraying politicians as predators (jackals) and voters as beasts of burden (jackasses), binding them together through alliteration and parallelism into a proverb-like verdict on democracy."}, {"front": "What is ironic about Mencken's use of 'science' in 'The science of politics under democracy consists in trading with them...'?", "back": "He applies the language of rational inquiry to an activity he immediately clarifies as fraudulent ('hoodwinking and swindling'), highlighting the corruption beneath the veneer of legitimacy."}, {"front": "In the close reading passage, what does 'i. e., in hoodwinking and swindling them' imply about Mencken's view of political science?", "back": "The Latin abbreviation 'i. e.' lends a scholarly air, but by defining political 'science' as fraud, Mencken ironically suggests that deceit is a core, technical aspect of democratic politics."}, {"front": "How does the syntactic parallelism in the close reading passage expose democracy as 'appetite meeting appetite'?", "back": "By repeating 'what they want,' 'what the politician wants,' and 'what the enterprising minorities behind him want,' Mencken reduces the democratic transaction to a mere exchange of desires, often for only the 'appearance' of what the people want."}, {"front": "Explain the significance of the simile 'as simple and sordid at bottom as the sale of a mule.'", "back": "It's deliberately undignified, contrasting the 'affecting rhetoric' with the base reality. Mules (sterile, stubborn, poor) symbolize the ignoble, sordid nature of the transaction, revealing democracy's squalor beneath its grandeur."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
