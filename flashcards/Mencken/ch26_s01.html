<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 26, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is 'Notes on Democracy' by Mencken, beyond being a simple treatise?", "back": "It is described as a sustained performance, tracing an arc that is as much tonal as it is logical."}, {"front": "What does Mencken mean by the 'inferior man' in Part I of 'Notes on Democracy'?", "back": "It is Mencken's Nietzschean term for the average citizen, whose intellectual limitations, as he sees them, make genuine self-government impossible."}, {"front": "According to Mencken, what are some key characteristics of the 'inferior man'?", "back": "Credulous, envious, hostile to excellence, and easily led by demagogues."}, {"front": "What is the primary rhetorical strategy Mencken employs in Part I of 'Notes on Democracy'?", "back": "Diagnosis, adopting the persona of a clinical observer using mock-scientific vocabulary and taxonomic metaphors."}, {"front": "List some of the key rhetorical tools Mencken uses in Part I.", "back": "Irony, antithesis, extended metaphor, hyperbole, and register mixing."}, {"front": "How does Mencken's coinage 'Homo boobiens' exemplify his rhetorical work in Part I?", "back": "The coinage itself does the rhetorical work by reducing a political category to a zoological joke."}, {"front": "What principle does Mencken argue governs the institutions of the democratic state in Part II?", "back": "The selection of mediocrity; the democratic state does not merely tolerate incompetence, it requires it."}, {"front": "How does the democratic state, according to Mencken, treat able individuals versus demagogues?", "back": "The able man is punished for his ability, while the demagogue is rewarded for his willingness to flatter the mob."}, {"front": "How does Mencken's rhetorical strategy change from Part I to Part II?", "back": "It shifts from diagnosis (detached naturalist) to prosecution (prosecuting attorney building a case)."}, {"front": "Describe how Mencken's syntax reflects the rhetorical shift in Part II.", "back": "The sentences grow more elaborate, the catalogues longer, and the periodic constructions more punishing."}, {"front": "Name a few new rhetorical terms that emerge in Part II.", "back": "Zeugma, parallelism, and the catalogue as a rhetorical device."}, {"front": "What is Mencken's main argument about democracy and liberty in Part III?", "back": "Democracy, far from protecting liberty, is liberty's most dangerous enemy because the mob enforces intolerance through the state."}, {"front": "How does the tone evolve in Part III compared to the previous parts?", "back": "The amused detachment of Part I and the prosecutorial energy of Part II give way to something closer to genuine anger."}, {"front": "How does Mencken define 'libertarian' in the context of Part III?", "back": "One who opposes all government interference in private life, a temperamental individualist who regards the state as the natural enemy of personal freedom."}, {"front": "Why is the occasional eruption of direct anger particularly effective in Part III?", "back": "After two parts of sustained irony, this tonal shift carries enormous force because the reader has been conditioned to expect mockery."}, {"front": "What is the 'grim forecast' Mencken delivers in 'The Future of Democracy' (Part IV)?", "back": "Democracy will persist not because it works, but because alternatives are worse, and the mob will never voluntarily surrender the illusion of self-government."}, {"front": "What is Mencken's surprising confession in 'Last Words' (Part IV) regarding his enjoyment of democracy?", "back": "He enjoys democracy, not because it is good, but because it is incomparably idiotic and hence incomparably amusing."}, {"front": "What is the primary rhetorical strategy in Part IV of 'Notes on Democracy'?", "back": "Withdrawal; the prosecutor steps down, the diagnostician closes his file."}, {"front": "Describe the stylistic changes Mencken employs in Part IV.", "back": "The vocabulary simplifies, sentences shorten, and understatement replaces hyperbole, leading to a quietness that is devastatingly effective."}, {"front": "What are the four parts of Mencken's overall arc in 'Notes on Democracy'?", "back": "Diagnosis, prosecution, outrage, withdrawal."}, {"front": "To what classical structure is Mencken's four-part arc compared?", "back": "The structure of a legal case: statement of facts, argument, emotional appeal, and peroration."}, {"front": "Why is understanding the overall arc of 'Notes on Democracy' important for studying Mencken's prose style?", "back": "It reveals that Mencken's power extends beyond individual sentences, as the sequence of tonal shifts (amusement to fury to resignation) is itself a rhetorical technique operating at the scale of the entire book."}, {"front": "What is Mencken's fundamental view on genuine self-government for the average citizen?", "back": "He believes the intellectual limitations of the average citizen make genuine self-government impossible."}, {"front": "What is the dominant tone Mencken uses when describing 'Democratic Man' in Part I?", "back": "Amused detachment, like a satirist cataloguing specimens with a raised eyebrow."}, {"front": "What rhetorical device is 'congeries' and where is it predominantly used in 'Notes on Democracy'?", "back": "Congeries is the piling up of examples with a relentless rhythm of accumulation, predominantly used in Part III."}, {"front": "How does Mencken characterize the mob's tolerance for dissent?", "back": "The mob cannot tolerate dissent, and the democratic state provides the machinery to enforce its intolerance."}, {"front": "What is the significance of 'Notes on Democracy' being described as a 'sustained performance' rather than a 'treatise'?", "back": "It highlights that the book's structure and tonal shifts are not merely logical arguments but an active rhetorical performance designed to sway the reader, similar to a legal presentation or a symphony."}, {"front": "In which part does Mencken's 'satirical mask' occasionally slip to reveal something deeper?", "back": "In Part III, where the tone shifts to genuine anger, revealing the libertarian individualist beneath the satirist."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
