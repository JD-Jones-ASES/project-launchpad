<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 6, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's primary rhetorical strategy in 'The Role of the Hormones'?", "back": "To explain civic life and political behavior not through philosophy or history, but through endocrinology, thereby denying democratic man the dignity of rational agency.", "id": "fc01"}, {"front": "According to Mencken, what three 'movements' characterize his argument about the 'inferior man' in this section?", "back": "1. Governed by the same drives as an infant (rage, fear, physical pleasure). 2. Incapable of empathy, leading to persecution. 3. Exemplified by the peasant farmer, whose theology and politics are expressions of unmitigated self-interest.", "id": "fc02"}, {"front": "How does Mencken use the theories of Sigmund Freud and John B. Watson in this section?", "back": "He borrows their language of psychology and behaviorism to provide a 'vocabulary of reduction,' framing human beings as laboratory specimens governed by instinctual drives rather than rational thought.", "id": "fc03"}, {"front": "Define 'libido' in Freudian psychology, as referenced in the text.", "back": "In Freudian psychology, it is the psychic and emotional energy associated with instinctual biological drives, especially sexual desire.", "id": "fc04"}, {"front": "Who is Mencken's intended audience for this section, and how does he flatter them?", "back": "The educated reader who prides themselves on being 'above the herd.' He flatters them by treating ordinary people as objects of clinical study to be classified and diagnosed, rather than citizens.", "id": "fc05"}, {"front": "Describe the persona Mencken adopts in 'The Role of the Hormones.'", "back": "He adopts the persona of a 'mock-clinician'—a doctor of the body politic who examines his patient with detached, faintly amused professionalism, maintaining an air of scientific neutrality.", "id": "fc06"}, {"front": "How does Mencken create 'comic shock' through register mixing in the opening paragraph?", "back": "He combines mock-pious language ('fresh from God's hands,' 'these sad days') with clinical vocabulary ('tumescence,' 'auto-erotic exercises') to describe human drives, producing a collision of registers.", "id": "fc07"}, {"front": "What is the true purpose behind Mencken's 'reduction of human behavior to biology'?", "back": "It is a rhetorical strategy, not a scientific argument. He uses biological language as a 'weapon of deflation' to strip democratic man of his pretensions to rational self-governance by insisting his motives are those of a rutting animal.", "id": "fc08"}, {"front": "What is 'pseudo-scientific diction,' and how does Mencken use it in this section?", "back": "It is the appropriation of clinical and technical vocabulary for satirical purposes. Mencken deploys the language of medicine, psychology, and biology not to explain, but to diminish.", "id": "fc09"}, {"front": "Define 'tumescence' as Mencken uses it in this section.", "back": "The swelling of body tissue, especially with blood; here used clinically to describe infant sexuality, with medical precision that makes the subject more uncomfortable.", "id": "fc10"}, {"front": "What are 'erogenous zones,' and why does Mencken use this Freudian term in his discussion of infant behavior?", "back": "Areas of the body particularly sensitive to stimulation. Mencken uses this term to maximize the reader's discomfort by applying a concept associated with adult sexuality to infants.", "id": "fc11"}, {"front": "Explain Mencken's coinage 'Homo stultus.'", "back": "Meaning 'foolish man,' it is Mencken's own specimen label for the democratic citizen, modeled after 'Homo sapiens,' used to diminish his subject.", "id": "fc12"}, {"front": "How does Mencken's 'register mixing' about bodily functions achieve a 'doubly ironic' effect?", "back": "He uses the highest register (formal language) to discuss inherently low-register subject matter (sex, reproduction, bodily functions). This simultaneously dignifies the subject while mocking the pretension that human beings are anything more than animals with vocabulary.", "id": "fc13"}, {"front": "What is the rhetorical purpose of Mencken's barnyard animal comparisons for democratic man?", "back": "They are not incidental metaphors but a systematic dehumanization, serving as the 'logical extension' of his central claim that if hormones rule, the difference between the citizen and the barnyard animal is merely one of pretension.", "id": "fc14"}, {"front": "How does Mencken's syntax evolve from the initial clinical tone to the peasant passages?", "back": "Initially, he uses longer, more complex sentences with subordinate clauses, reflecting a lecturer's elaboration. In the peasant passages, syntax shifts to a more staccato rhythm with shorter, declarative sentences that feel like 'verdicts delivered from the bench.'", "id": "fc15"}, {"front": "Give an example of Mencken's effective use of the colon and explain its effect.", "back": "Example: 'His natural cowardice, of course, moves him powerfully in such situations: his congenital fear is easily translated into cruelty.' The colon functions as a hinge between the abstract ('natural cowardice') and the concrete ('cruelty'), creating a logical inevitability.", "id": "fc16"}, {"front": "What is the 'central figure' of speech in this section?", "back": "The extended metaphor of humanity as a biological organism to be studied clinically.", "id": "fc17"}, {"front": "Describe Mencken's 'analogy of the political animal' as a subsidiary figure of speech.", "back": "He systematically compares democratic man to various barnyard animals (Tom cat, rooster, wolf, boar), each comparison isolating a specific negative trait (sexuality, crudity, cruelty, biological function) to achieve cumulative dehumanization.", "id": "fc18"}, {"front": "Identify three distinct examples of irony in 'The Role of the Hormones.'", "back": "1. The title itself ('medical textbook chapter' for political philosophy). 2. 'Fresh from God's hands' (invokes divine creation to describe a creature governed by glands). 3. 'Gloriously' applied to glandular development (celebrating what it simultaneously diagnoses as pathological).", "id": "fc19"}, {"front": "How does Mencken use hyperbole in the peasant passages, and what is its effect?", "back": "He exaggerates for rhetorical effect, claiming the peasant's first and last thought about heretics is 'to stand them up against a wall, and have at them with musketry.' This reveals what Mencken considers the underlying, emotionally true impulse, beyond literal fact.", "id": "fc20"}, {"front": "What is 'litotes,' and how does Mencken employ it to be dismissive?", "back": "Litotes is understatement by negating the contrary. Mencken uses the devastating qualifier 'of course' ('His natural cowardice, of course, moves him powerfully') to treat the inferior man's cowardice as a settled fact requiring no argument, which is more dismissive than any elaboration.", "id": "fc21"}, {"front": "In the close-read passage, what is the significance of the word 'anthropoid' amidst elevated diction?", "back": "'Anthropoid' (meaning ape-like) sits like a 'bomb' in the middle of refined vocabulary ('subtle,' 'refined,' 'embellishes'), detonating it and revealing that the inferior man's appetite is that of a primate, not a human, despite any veneer of civilization.", "id": "fc22"}, {"front": "Explain Mencken's phrase 'his powerful thirst for the not true.'", "back": "The phrase combines 'thirst' (physical, bodily) with 'the not true' (abstract, philosophical) to imply that self-deception is a biological need for the inferior man, as natural as drinking water, rather than an intellectual failure. The unusual construction gives it mock-philosophical weight.", "id": "fc23"}, {"front": "What is 'animism,' as Mencken uses it in relation to peasant theology?", "back": "The attribution of a soul or consciousness to natural objects and phenomena. Mencken equates peasant theology with the religion of 'savages' by applying this term.", "id": "fc24"}, {"front": "What is 'antinomianism,' and how does Mencken use it in this context?", "back": "The theological doctrine that moral law is not binding on Christians. Mencken uses it loosely to mean the rejection of conventional morality, especially sexual morality, to characterize the peasant's supposed beliefs.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
