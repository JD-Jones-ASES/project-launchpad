<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Chapter 6, Section 1, how does Mencken shift his explanation of democratic politics from the previous chapters?", "back": "He moves from a political framework to a biological one based on endocrinology."}, {"front": "By framing political behavior as glandular secretion, what does Mencken deny the 'democratic man'?", "back": "Rational agency."}, {"front": "Mencken argues that the drives of the 'inferior man' are identical to those of what development stage?", "back": "Infancy (rage, fear, and craving for pleasure)."}, {"front": "According to Mencken, what does the 'inferior man's' incapacity for empathy inevitably turn him into?", "back": "A persecutor."}, {"front": "Which group does Mencken identify as the 'purest specimen' of the inferior man?", "back": "The peasant farmer."}, {"front": "Mencken characterizes the theology and politics of the peasant farmer as expressions of what?", "back": "Unmitigated self-interest."}, {"front": "Psychology Concept: Libido", "back": "Definition: The psychic and emotional energy associated with instinctual biological drives, specifically sexual desire."}, {"front": "Which founder of behaviorism argued that human behavior is strictly a matter of stimulus and response?", "back": "John B. Watson."}, {"front": "For what rhetorical purpose does Mencken invoke Freud and Watson?", "back": "To provide a vocabulary of reduction that treats humans as laboratory specimens."}, {"front": "Who is the intended audience for Mencken's analysis in this section?", "back": "The educated reader who considers himself above the herd."}, {"front": "What specific 'persona' does Mencken adopt in 'The Role of the Hormones'?", "back": "The mock-clinician."}, {"front": "What is the rhetorical effect of Mencken's scientific neutrality when discussing shocking topics like violence or fanaticism?", "back": "It makes the content more shocking rather than less."}, {"front": "Which ironically pious phrase does Mencken use to describe the raw human being?", "back": "\"Fresh from God's hands.\""}, {"front": "What rhetorical effect is produced by the collision of mock-pious language and clinical vocabulary?", "back": "Comic shock."}, {"front": "How does Mencken's tone change when he transitions from scientific detachment to the 'peasant passages'?", "back": "It sharpens into prosecutorial energy and open contempt."}, {"front": "Mencken uses biological language not as a scientific argument, but as a _____ of _____.", "back": "Weapon of deflation."}, {"front": "Term: Tumescence", "back": "Definition: The swelling of body tissue, especially with blood; used by Mencken to describe infant sexuality clinically."}, {"front": "Term: Erogenous zones", "back": "Definition: Areas of the body sensitive to stimulation, used by Mencken to maximize reader discomfort."}, {"front": "Term: Auto-erotic", "back": "Definition: Sexual gratification obtained solely through one's own body."}, {"front": "Term: Animism", "back": "Definition: The attribution of a soul to natural objects; Mencken uses it to equate peasant theology with 'savages'."}, {"front": "Term: Antinomianism", "back": "Definition: The doctrine that moral law is not binding; used by Mencken to mean the rejection of conventional morality."}, {"front": "Term: Sage-femme", "back": "Definition: The French word for midwife, used to provide mock-elegance to rural sexual urgency."}, {"front": "Term: Homo stultus", "back": "Definition: Mencken's coinage meaning \"foolish man,\" modeled on Homo sapiens."}, {"front": "Why does Mencken utilize 'register mixing' when discussing bodily functions?", "back": "To mock the pretension that humans are anything more than animals with vocabulary."}, {"front": "Mencken compares the love life of the democratic man to which two barnyard animals?", "back": "The Tom cat and the rooster."}, {"front": "According to the text, what happens to the brain of the inferior man in the first years of his second decade?", "back": "It ceases to develop."}, {"front": "What is the rhythmic function of the word 'gloriously' in the sentence describing glandular development?", "back": "It serves as the rhythmic and ironic peak of the sentence."}, {"front": "In Mencken's syntax, what punctuation mark often hinges an abstract statement to a concrete, deflating specification?", "back": "The colon."}, {"front": "Describe the rhythm of the sentences Mencken uses to describe peasants.", "back": "Staccato, short, and declarative."}, {"front": "What is the cumulative rhetorical effect of Mencken's systematic animal analogies?", "back": "Systematic dehumanization of the democratic citizen."}, {"front": "Mencken uses the animal analogy of the 'boar' to isolate which specific human trait?", "back": "Biological function."}, {"front": "Mencken uses the animal analogy of the 'wolf' to isolate which specific human trait?", "back": "Cruelty."}, {"front": "What figure of speech is used when Mencken claims peasants want to stand heretics against a wall and use musketry?", "back": "Hyperbole (exaggeration for rhetorical effect)."}, {"front": "How does Mencken use litotes (understatement) in his", "back": "Through the qualifier \"of course,\" treating the cowardice as a settled fact."}, {"front": "In the close reading analysis, which word 'detonates' the refined vocabulary of 'subtle' and 'refined'?", "back": "Anthropoid (meaning ape-like)."}, {"front": "What does the phrase 'thirst for the not true' suggest about self-deception in the inferior man?", "back": "It is a biological need rather than an intellectual failure."}, {"front": "Why does Mencken use the specific construction 'the not true' instead of 'falsehood'?", "back": "To give the phrase a mock-philosophical weight and technical air."}, {"front": "Mencken's use of barnyard language implies the difference between a citizen and an animal is merely one of _____.", "back": "Pretension."}, {"front": "In the Freudian context used by Mencken, behavior is explained by the unconscious and the _____.", "back": "Libido."}, {"front": "What emotion does Mencken identify as being easily translated into cruelty in the inferior man?", "back": "Congenital fear."}, {"front": "Mencken describes the inferior man's engagement with 'sentiment' or 'poetry' as a way to _____ his anthropoid appetite.", "back": "Embellish."}, {"front": "According to Mencken's mock-clinical view, which biological components dominate the organism once the brain stops developing?", "back": "The glands."}, {"front": "Mencken equates the theology of the peasant with the religion of which group?", "back": "Savages."}, {"front": "The", "back": "Barnyard/low-register language."}, {"front": "What does the dash represent in the sentence: 'He hates everyone who is not a yokel — and is afraid of everyone'?", "back": "A pause for a clinical diagnosis."}, {"front": "Mencken's strategy of 'reduction' specifically targets democratic man's pretensions to _____ _____.", "back": "Rational self-governance."}, {"front": "Which term describes areas of the body particularly sensitive to stimulation?", "back": "Erogenous zones."}, {"front": "Which term refers to sexual gratification obtained solely through one's own body?", "back": "Auto-erotic."}, {"front": "In the context of Mencken's 'prosecutorial energy,' how is the peasant described in relation to those different from him?", "back": "He hates and is afraid of everyone who is not a yokel."}, {"front": "What is the primary rhetorical goal of Mencken's 'pseudo-scientific diction'?", "back": "To diminish the subject by using technical language to describe base behavior."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
