<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 6, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's central argument regarding the emotions that drive 'democratic man'?", "back": "He argues that these emotions are not noble sentiments but glandular secretions (hormones), reducing civic virtue to animal instinct."}, {"front": "According to the text, what are the two primary emotions observed in the 'raw human being' fresh from God's hands?", "back": "Rage and an earthly form of 'love'."}, {"front": "How does the text describe the nature of 'love' in an infant, contrasting it with poetic notions?", "back": "It's described as an earthly delight in being tickled, manifesting as amiability and cooing. It's attributed to erogenous zones and hormones, not the soul."}, {"front": "Which psychological theories does the text cite to support the idea that infant 'love' is tied to physical sensations and hormones?", "back": "Freudian observations and 'new child psychology'."}, {"front": "What 'satirical fact' by Dr. Watson is mentioned regarding male tumescence?", "back": "The 'dreadful phenomenon of tumescence in the male can occur at birth'."}, {"front": "How does Mencken describe the physiological changes in an 'inferior man' during adolescence and their impact on his emotional life?", "back": "Brain development ceases, but glands 'unfold gloriously' and dominate the organism, making him a 'vast geyser of hormones.' His 'love' becomes purely physical, like a 'Tom cat'."}, {"front": "How does the text differentiate the 'inner urge' of a bucolic 'Homo stultus' from that of an urban proletarian in their middle teens?", "back": "The bucolic type might act on his urges with a neighbor's daughter. The urban type finds the outer world more 'inhospitable' but the urge remains irresistible, leading to vicarious or harsh physiological expression."}, {"front": "How does the 'inferior man' later embellish his 'anthropoid appetite,' and what is the quality of this 'poetry'?", "back": "He uses his 'vast capacity for illusion' and 'powerful thirst for the not true' to toy with sentiment and a kind of poetry. The text describes this poetry as never far from that of a 'rooster in a barnyard'."}, {"front": "To the 'inferior man,' what does 'love' primarily remain, and what kind of heroes/heroines does he admire?", "back": "Love remains almost wholly a physical matter. He admires heroines offering 'grossest sexual provocation' and heroes described as a 'perambulating phallus'."}, {"front": "According to the text, what is the 'corner-stone' of the metaphysical system of 'eminent psychologists who conduct tabloid newspapers'?", "back": "The idea that 'love, to the inferior man, remains almost wholly a physical matter,' and their readers want 'no sublimation and no symbolism'."}, {"front": "How does the text reference Freud's view on love?", "back": "Freud explains that love has many meanings, 'from the erotic to the philanthropic'."}, {"front": "What is presented as one of the 'stupidities' of the 'inferior man' regarding his understanding of love and 'good'?", "back": "His inability to see beyond his own 'elemental yearnings' or to formulate 'the concept of a good that is not his own good'."}, {"front": "What historical behavior does the 'inferior man's' inability to conceive of a good beyond his own explain?", "back": "His 'immemorial heat against heretics, sacred and secular,' and his desire to eliminate them."}, {"front": "Provide historical examples of the 'inferior man's' lack of fairness, justice, or decency mentioned in the text.", "back": "Delighting in Roman arena slaughters, applauding Torquemada, and marching against radicals with the American Legion."}, {"front": "What three factors are cited as contributing to the 'inferior man's' cruelty and 'wolfishness'?", "back": "His natural cowardice (congenital fear easily translated into cruelty), his incapacity to project himself into the place of the other, and his deficiency in imagination."}, {"front": "How does the text describe the charity of the poor, specifically when confronted by their 'betters'?", "back": "They are charitable 'only to the poor.' When their 'betters' ask for fair dealing or common decency, they act like 'wolves'."}, {"front": "Who does Mencken identify as representing the 'lowest caste among civilized men,' and what are their characteristics?", "back": "Peasants. They are closest to primeval man in avocations and mental processes, considered 'sediment' after progress."}, {"front": "How does the text describe the 'city proletariat' in relation to peasants?", "back": "The city proletariat is 'appreciably superior,' as it includes 'more intelligent yokels' who escaped the 'dreadful drudgery of the dunghill'."}, {"front": "Describe the 'theology' prevailing on the land, according to the text.", "back": "It keeps contact with primitive animism (demons, witches, ghosts) and is intolerant of heresy, believing heretics should be harassed on Earth and roasted in hell."}, {"front": "What historical legal phenomenon is used to illustrate the 'peasant mind' in its intolerance of heresy?", "back": "The anti-evolution laws of the South and the Scopes trial, where dissenters from 'barnyard theology' were deemed scoundrels."}, {"front": "How does the 'virtuous clod-hopper' (inferior man/peasant) view the process of government?", "back": "As simply a process of promoting his private advantage; he can imagine no good save his own good."}, {"front": "When are peasants most likely to 'ram their advantage home with relentless ferocity' in politics?", "back": "When their affairs are prospering, meaning 'the needs of the city man are acute, and the latter is thus at his mercy'."}, {"front": "What is 'brummagem progressivism,' as described in the text, and what is at its heart?", "back": "It's the political demand that city dwellers be taxed to make up for peasants' losses. At its heart, despite trappings of 'Service,' there is 'nothing but bald self-seeking'."}, {"front": "What are the key social attitudes of the 'yokel' towards others?", "back": "He 'hates everyone who is not a yokel—and is afraid of everyone'."}, {"front": "Who is identified as 'democratic man in the altogether' and the 'glory and bulwark of all democratic states'?", "back": "The yokel/peasant."}, {"front": "How does the 'yokel' differ from the 'city proletarian' in terms of intellectual capacity and ideas?", "back": "The city proletarian 'may be flustered and run amok by ideas,' while the yokel 'has room in his head for only one' idea: God regards him fondly, and all others are out of favor."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
