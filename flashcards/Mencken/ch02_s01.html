<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 2, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Mencken characterize the initial arrival of democracy in the Western World?", "back": "Mencken states that democracy arrived not as a revolution from below, but as a fashion imposed from above by intellectuals.", "id": "fc01"}, {"front": "What specific type of individual did the concept of 'democratic man' initially idealize, according to Mencken?", "back": "The 'democratic man' began as an ideal being, full of 'ineffable virtues and romantic wrongs,' essentially 'Rousseau’s noble savage in smock and jerkin'.", "id": "fc02"}, {"front": "What core belief about 'the man at the bottom of the scale' does Mencken identify as central to the democratic idea?", "back": "The democratic idea posits that there is a mystical merit, an esoteric and ineradicable rectitude, in the man at the bottom of the scale, where inferiority somehow becomes a sort of superiority.", "id": "fc03"}, {"front": "According to Mencken, who originated this 'mystical merit' notion about the common man?", "back": "Mencken attributes this notion to 'poetic fancy of gentlemen on the upper levels'—sentimentalists and 'saccharine Liberals'—rather than the common man himself.", "id": "fc04"}, {"front": "What did early 'democratic man' actually desire, in contrast to the ideals intellectuals promoted?", "back": "Early 'democratic man' desired concrete, materialistic things like 'more to eat, less work, higher wages, lower taxes,' showing little interest in abstract democratic ideals.", "id": "fc05"}, {"front": "What was the common man's initial aim regarding the ruling class, according to Mencken, and what often happened during 'mob movements'?", "back": "His aim was not to exterminate the baron, but to make him discharge his business properly. During mob movements, accidental extermination occurred, but then the mob would butcher those from its own ranks who took on 'baronial airs'.", "id": "fc06"}, {"front": "What immediate historical consequence did Mencken cite after the Paris proletariat killed its King in 1793?", "back": "The Paris proletariat spent the next two years killing those who misled them, and by 1796, they had another king in fact, who became king de jure within three years.", "id": "fc07"}, {"front": "How did democratic theory 'seep down' to the masses, and where was this process faster or slower?", "back": "Democratic theory 'seeped down' through rhetoric. It was slower where 'harsh, exigent realities of battle and pillage' existed (the Continent) and faster where there was time for oratory (England and America).", "id": "fc08"}, {"front": "Describe the evolution of the 'democratic man's' self-perception regarding his rights and abilities.", "back": "Initially a slave, then a serf, he gained freedom to criticize masters. Over time, he began to believe himself gifted with 'peculiar rectitude of thought and will' and a 'high talent for ideas,' transforming his wishes into legal, then natural, rights.", "id": "fc09"}, {"front": "What significant doctrine arose by 1828 in America and 1848 in Europe concerning moral excellence?", "back": "The doctrine arose that 'all moral excellence, and with it all pure and unfettered sagacity, resided in the inferior four-fifths of mankind'.", "id": "fc10"}, {"front": "Who was the philosopher in 1867 who pushed this doctrine to its logical conclusion, and what was that conclusion?", "back": "A philosopher 'out of the gutter' taught that the superior minority had no virtues or rights, and the world belonged exclusively to 'those who hewed its wood and drew its water'.", "id": "fc11"}, {"front": "What was Mencken's assessment of the 'dictatorship of the proletariat' when it was tried?", "back": "He judged it to be 'somewhat impracticable,' even leading 'advanced Liberals' to 'cough sadly behind their hands'.", "id": "fc12"}, {"front": "Despite setbacks, what was the status of the underlying democratic dogma in Mencken's time?", "back": "It was 'more prosperous than ever before,' embraced by defeated nations after war, and 'official' everywhere in Christendom.", "id": "fc13"}, {"front": "What are the two fundamental axioms of democracy universally accepted in Mencken's time?", "back": "The two axioms are: (a) that the great masses of men have an inalienable right to govern themselves, and (b) that they are competent to do it.", "id": "fc14"}, {"front": "How do democratic theories propose to remedy perceived 'imbecilities' or 'naughtiness' of the masses?", "back": "For imbecilities, the remedy is 'more education.' For naughtiness or 'swinish' behavior, the remedy is to 'deliver them' from oppression.", "id": "fc15"}, {"front": "According to democratic theory, what defines a 'good' government versus a 'bad' government?", "back": "A 'good' government responds quickly and accurately to the desires and ideas of the people. A 'bad' government conditions their 'omnipotence' and questions their 'omniscience'.", "id": "fc16"}, {"front": "Define 'dulcet' as used in the text.", "back": "'Dulcet' means sweet and pleasant, especially to the ear.", "id": "fc17"}, {"front": "Define 'ineffable' as used in the text.", "back": "'Ineffable' means too great or extreme to be expressed or described in words.", "id": "fc18"}, {"front": "Who was Jean-Jacques Rousseau, and why is he mentioned in Mencken's analysis of democracy's origins?", "back": "Rousseau (1712–1778) was a French philosopher and key theorist of popular sovereignty. Mencken identifies him as his 'primary intellectual target,' associating him with the ideal of the 'noble savage' that democratic man was initially compared to.", "id": "fc19"}, {"front": "What does Mencken refer to as 'the mob'?", "back": "'The mob' is Mencken's blanket term for the democratic electorate—the mass of ordinary voters whom he considers unfit to govern, not a literal violent mob.", "id": "fc20"}, {"front": "Describe Mencken's general tone or attitude toward the origins and development of democracy.", "back": "Mencken's tone is critical, cynical, and sarcastic, viewing democracy's origins as a 'fashion' imposed by sentimental intellectuals and its development as based on preposterous and often impractical ideas about the common man's wisdom and virtue.", "id": "fc21"}, {"front": "What is Mencken's main critique of how democracy was initially introduced and later perpetuated?", "back": "Mencken critiques that democracy was introduced from above by intellectuals who idealized the common man without understanding him, and it was perpetuated through rhetoric that attributed mystical wisdom and inherent rectitude to the masses, despite their historical actions and materialistic desires.", "id": "fc22"}, {"front": "Contrast Mencken's view of democracy's origins ('fashion from above') with a typical understanding of democracy's emergence.", "back": "Mencken presents democracy as a 'fashion' imposed by elite intellectuals ('dulcet twittering from above'). This contrasts with a typical understanding which often portrays democracy as a revolutionary movement driven by popular demand or 'harsh bawling from below'.", "id": "fc23"}, {"front": "How does Mencken use the French Revolution to support his argument about the common man's actual desires and capacity to rule?", "back": "He cites the French Revolution where, after killing the King, the 'mob' then killed those who misled it, and eventually reverted to accepting a new king and aristocracy. This suggests the common man's aim was not to rule, but to correct specific grievances, and they were easily swayed and ultimately gravitated back towards a hierarchical order.", "id": "fc24"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
