<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 2, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Mencken open 'Notes on Democracy,' and what is the immediate rhetorical effect?", "back": "Mencken opens with a sardonic story of democracy's arrival, rather than a thesis statement. This immediately stages him as a historian surveying the 'wreckage' of an idea and sets a skeptical, irreverent tone.", "id": "fc01"}, {"front": "Who is Mencken's assumed audience for the opening section of 'Notes on Democracy'?", "back": "His assumed audience is the educated American who suspects that democratic politics is a sham but has not seen that suspicion articulated with such relish.", "id": "fc02"}, {"front": "What is Mencken's primary purpose in the opening section of 'Notes on Democracy'?", "back": "His purpose is not to persuade in the usual sense (e.g., change anyone's vote), but to thoroughly demolish a set of assumptions about democracy so readers can never hold them with the same innocence again.", "id": "fc03"}, {"front": "How does Mencken use historical events in his analysis of democracy?", "back": "He uses history (from Rousseau through the French Revolution to post-WWI) as a rhetorical weapon, selectively distorting and compressing events to make democracy appear less like a noble achievement and more like a confidence trick.", "id": "fc04"}, {"front": "Describe the persona Mencken adopts in this section.", "back": "He adopts the persona of a mock-historian—a scholar who appears to offer a dispassionate survey but whose every sentence drips with contempt, using an urbane, learned, and deliberately superior voice.", "id": "fc05"}, {"front": "Characterize the tone of Mencken's writing in this opening section.", "back": "The tone is consistently ironic, varying in intensity from almost gentle at the start to savage by the time he discusses the Paris mob, yet always controlled and stylistically precise, never losing control.", "id": "fc06"}, {"front": "Define 'irony' as Mencken employs it structurally in 'Notes on Democracy.'", "back": "Irony is a figure of speech where the intended meaning is the opposite of the literal meaning, or where there is a discrepancy between appearance and reality. Mencken's structural irony pretends to take the democratic ideal seriously while systematically undermining it.", "id": "fc07"}, {"front": "What does Mencken imply by using inflated language like 'ineffable virtues and romantic wrongs' to describe the common man?", "back": "The inflated language signals Mencken's belief that both the virtues and wrongs attributed to the common man are fictions, thereby sarcastically dismissing them.", "id": "fc08"}, {"front": "Explain Mencken's 'register mixing' in his word choices, using an example from the text.", "back": "Mencken freely mixes elevated and earthy, Latinate and colloquial language. For example, 'a stale Christian bilge ran through their veins' combines the coarse 'bilge' with the cliché of 'noble rhetoric,' creating a collision of meaning.", "id": "fc09"}, {"front": "What is the significance of Mencken's use of theological vocabulary (e.g., seraphic, mystical, omnipotence) in a secular context?", "back": "He applies these words to democratic theory to suggest that democracy is not a political system but a religion—and a particularly credulous one, thus diminishing its intellectual standing.", "id": "fc10"}, {"front": "What does the word 'dulcet' imply about democracy's initial presentation, according to Mencken?", "back": "'Dulcet' (sweet and pleasant to the ear) implies that democracy arrived as flattery and pleasing sound, rather than as a truth or reasoned argument, suggesting a superficial appeal.", "id": "fc11"}, {"front": "How does Mencken's use of 'smock and jerkin' contribute to his satirical portrayal of Rousseau's 'noble savage'?", "back": "By dressing Rousseau's abstract ideal in period working-class clothing, Mencken turns the 'noble savage' into a comic figure, thereby undermining the gravity and idealism of the concept.", "id": "fc12"}, {"front": "Analyze the rhythmic control of Mencken's opening sentence: 'Democracy came into the Western World to the tune of sweet, soft music.'", "back": "The sentence is short and deliberately musical. The phrase 'sweet, soft music' uses alliteration and a falling cadence, creating sonic agreement with the pleasantness it describes, which is ironic because Mencken's point is that this pleasantness was a lie.", "id": "fc13"}, {"front": "How does Mencken use antithesis in his second sentence ('There was, at the start, no harsh bawling from below; there was only a dulcet twittering from above')?", "back": "The semicolon marks a pivot between 'below' and 'above,' and 'harsh bawling' and 'dulcet twittering.' The parallelism forces the reader to contrast these opposing ideas, revealing meaning from the discrepancy.", "id": "fc14"}, {"front": "Describe Mencken's alternating sentence structure and its effect on the reader.", "back": "He alternates between long periodic sentences that delay their verdict, creating an atmosphere of scholarly deliberation, and short declarative sentences that puncture it, delivering a swift, often absurd, judgment.", "id": "fc15"}, {"front": "What is 'antithesis,' and how does Mencken use it as a dominant figure in this section?", "back": "Antithesis is the placing of opposing ideas side by side, usually in parallel grammatical structures. Mencken uses it to dramatize the gap between the democratic ideal and its reality, making the contrast itself the argument.", "id": "fc16"}, {"front": "Beyond antithesis, identify and explain one other figure of speech Mencken deploys.", "back": "Mencken uses extended metaphor, framing democracy as a 'musical performance' ('tune, music, twittering') to characterize it as artifice—something composed and rehearsed, rather than natural or inevitable.", "id": "fc17"}, {"front": "Explain how Mencken's extended musical metaphor ('democracy came to the tune of sweet, soft music') functions as structural irony.", "back": "It frames democracy as a composed performance, not a natural right; establishes a sensory world of sweetness to be systematically demolished later; and positions the reader as a listener who has been deceived by a melody.", "id": "fc18"}, {"front": "What is significant about Mencken's choice of the verb 'came' in his opening sentence, 'Democracy came into the Western World...'?", "back": "'Came' is a verb of passive arrival, suggesting democracy was an event that happened to the Western World, rather than something chosen, founded, won, or achieved. This undermines its status as a noble accomplishment.", "id": "fc19"}, {"front": "What does the phrase 'to the tune of' imply about democracy's origins in Mencken's view?", "back": "It introduces the musical metaphor, implying that democracy was artificial—composed, performed, designed to please, and 'marketed' like a sales pitch set to music, rather than discovered naturally or earned.", "id": "fc20"}, {"front": "How do the adjectives 'sweet' and 'soft' contribute to Mencken's portrayal of democracy's initial appeal?", "back": "They suggest pleasantness but also weakness and sentimentality. 'Sweet' implies childishness; 'soft' a lack of force. The alliteration creates a 'hissing' sound of seduction, implying an aesthetic appeal over intellectual substance.", "id": "fc21"}, {"front": "According to Mencken's rhetorical strategy, what distinguishes his use of history from a typical historical account?", "back": "Mencken's history is a 'rhetorical weapon,' where he deliberately selects, distorts, and compresses facts to expose what he sees as democracy's fundamental flaws and its deceptive nature, rather than presenting a balanced chronicle.", "id": "fc22"}, {"front": "How does Mencken's 'stylist's timing' affect the overall impact of his scathing tone?", "back": "Even when the tone becomes savage, Mencken maintains control, shaping the savagery with precise syntax and timing. This prevents his writing from becoming a mere rant, elevating it to a calculated performance designed for maximum rhetorical effect.", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
