<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What central concept does Mencken target in Section I.7 to challenge democracy?", "back": "Liberty. Mencken aims to show that democracy fails to deliver freedom, thus collapsing its last defense."}, {"front": "According to Mencken's established argument, what are three key characteristics of the 'common man'?", "back": "Intellectually limited, politically manipulable, and driven by envy."}, {"front": "What paradoxical argument does Mencken make regarding democracy and liberty?", "back": "Mencken argues that democracy, the supposed gift of liberty, actually threatens it. The common man, he asserts, wants security, not freedom."}, {"front": "Who is Mencken's primary audience, and what is his rhetorical goal for them?", "back": "His audience is the educated reader who already suspects the democratic masses are unfit for self-rule. His goal is to arm these sympathizers with a memorable formulation of their shared conviction."}, {"front": "How did 1920s American historical events inform Mencken's views on liberty and democratic governance?", "back": "Mencken observed events like Prohibition (Eighteenth Amendment), the Palmer Raids against dissidents, and the Scopes Trial, which he saw as examples of democratic moralism restricting personal freedoms."}, {"front": "Describe the initial tone Mencken adopts in Section I.7, and how it evolves.", "back": "Mencken opens as a cool diagnostician but shifts to a grim admiration for liberty, sometimes rising to reverence, before returning to contempt for the common man."}, {"front": "How does Mencken contrast the 'free man' and the 'common man' through his voice and tone?", "back": "He elevates the free man to 'a sort of god' (Nietzschean exaltation) while depicting the common man as an 'ox,' highlighting the height to which the common man was never capable of rising."}, {"front": "Explain the two sharply contrasting registers of diction Mencken uses in this section and their purpose.", "back": "Mencken uses elevated, abstract, almost liturgical diction for liberty and the free man (e.g., 'courage,' 'magnificent') and barnyard, insulting diction for the common man (e.g., 'ox,' 'butcher,' 'ham and cabbage'). This contrast itself forms a key part of his argument."}, {"front": "What is the significance of Mencken's animal imagery when describing the common man?", "back": "By comparing the common man to animals ('ox,' 'anthropoid'), Mencken systematically denies their claim to the rational self-governance that liberty requires, implying they cannot be free in any meaningful sense."}, {"front": "Define 'mountebanks' as Mencken uses it.", "back": "Charlatans or frauds, applied to politicians, reducing democratic choice to a selection between con men."}, {"front": "Define 'votaries' as Mencken uses it.", "back": "Devoted followers, originally of a religious cult. Mencken uses it to elevate freedom to a quasi-religious ideal while implying it attracts only a fanatic few."}, {"front": "Define 'poltroonery' as Mencken uses it.", "back": "Utter cowardice. Used to describe the democratic electorate, creating a collision between a world of knights and a world of cowards."}, {"front": "Define 'anthropoid' as Mencken uses it.", "back": "Resembling a human being but not quite one; a zoological term used to reduce the proletariat to a subspecies."}, {"front": "Define 'grandiloquently' as Mencken uses it.", "back": "Speaking in a lofty, pompous style. Mencken uses it to describe the mob's talk of liberty, implying its language exceeds its understanding."}, {"front": "Describe a key syntactic strategy Mencken employs to deliver his arguments.", "back": "He uses long build-ups with parallel clauses to establish an ideal or requirement (e.g., for liberty), followed by a devastatingly short, direct sentence that expresses the harsh reality or counterpunch."}, {"front": "How does Mencken use the dash as a punctuation mark?", "back": "He uses it to insert sardonic qualifications, deliver parenthetical verdicts, and redirect the sentence's meaning, functioning as an 'ambush.'"}, {"front": "Define alliteration and explain its purpose in Mencken's prose.", "back": "Alliteration is the repetition of initial consonant sounds in closely connected words. In Mencken's prose, it subtly binds phrases, creates rhythm, emphasizes key ideas, and makes phrases memorable and pleasurable to read aloud."}, {"front": "What is the dominant figure of speech in this section, and how does Mencken use it?", "back": "Antithesis – the pairing of opposites for rhetorical effect. Mencken's entire argument is built on series like liberty vs. security, free man vs. mob, courage vs. cowardice."}, {"front": "Explain the extended metaphor of the 'ox and the butcher' and its significance.", "back": "The common man is an 'ox whose last proud, defiant gesture is to lick the butcher behind the ear.' This metaphor depicts the common man as strong but stupid, useful but submissive, with his 'pride' being an ironic illusion masking his abject submission to his political master."}, {"front": "How does the 'ox and butcher' metaphor reflect Mencken's Nietzschean influence?", "back": "It suggests the relationship between ruler and ruled is not political but biological—a species relationship, implying the distinction between master and slave is a matter of nature, not circumstance."}, {"front": "What is the significance of Mencken's ironic use of Frederick the Great as an example?", "back": "Frederick, an absolute monarch, supported free speech, while democracy, for Mencken, threatens liberty. This inversion highlights Mencken's central paradox: absolutism can protect liberty, while democracy can undermine it."}, {"front": "In the close reading of 'He is an ox whose last proud, defiant gesture is to lick the butcher behind the ear,' what does the collision of diction (e.g., 'proud, defiant' vs. 'ox, lick, butcher') achieve?", "back": "It savagely exposes the heroic words ('proud,' 'defiant') as hollow and ironic when placed in the animal context, revealing the common man's submission as a pathetic imitation of dignity."}, {"front": "How does the syntax of the sentence 'He is an ox whose last proud, defiant gesture is to lick the butcher behind the ear' contribute to its impact?", "back": "It's a single independent clause with no subordination, mirroring the intellectual simplicity of the ox and offering no qualifications or escape routes for the reader or the common man."}, {"front": "How does Mencken's catalog of 'liberty demands' like 'self-reliance, resolution, enterprise, capacity for doing without' function syntactically?", "back": "The parallel clauses ('it means... it means...') create a cumulative effect, tightening the standard for liberty and giving the passage the feel of a creed, emphasizing the demanding nature of true freedom."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
