<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 8, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken, what is the primary underlying emotion of a democrat?", "back": "Envy."}, {"front": "What event usually triggers the expression of democratic envy in the 'proletarian'?", "back": "A sharp falling off in the supply of 'panem et circenses' (bread and circuses)."}, {"front": "Mencken argues that while historians claim city life breeds a love of liberty, 'city mobs' actually fight for what?", "back": "Ham and cabbage (material security)."}, {"front": "According to the text, what social groups were the first to formulate ideas of freedom?", "back": "Country gentlemen, poets, and philosophers."}, {"front": "Which historical figure does Mencken cite as the first to give legal support to free speech?", "back": "Frederick the Great."}, {"front": "What is the 'first act' of a city mob after winning a revolution?", "back": "To destroy every form of freedom not directed at material ends."}, {"front": "What is the 'second act' of a victorious city mob regarding proponents of liberty?", "back": "To butcher all professional libertarians."}, {"front": "Why does Mencken claim liberty is incomprehensible to the 'inferior man'?", "back": "It requires a quality he lacks completely: courage."}, {"front": "Mencken quotes Jefferson to state that _____ is the 'natural manure' of liberty.", "back": "Blood."}, {"front": "Beyond fighting for it, what 'arduous business' does genuine liberty demand of a person?", "back": "The ability to endure it."}, {"front": "In Mencken’s view, what does liberty specifically mean regarding personal conduct?", "back": "Self-reliance, resolution, enterprise, and the capacity for doing without."}, {"front": "How does Mencken characterize the social condition of a truly free man?", "back": "He is a 'god in his little world' who must face 'dreadful loneliness.'"}, {"front": "Term: Homo boobiens", "back": "Definition: Mencken's term for the species of gullible, credulous citizens."}, {"front": "Term: Booboisie", "back": "Definition: A portmanteau of 'bourgeoisie' and 'boob,' referring to the middle class of gullible citizens."}, {"front": "What does the common man mistake for liberty nine times out of ten?", "back": "The banal right to 'empty hallelujahs upon his oppressors.'"}, {"front": "Mencken uses the metaphor of an ox licking the butcher behind the ear to describe what?", "back": "The common man's final 'proud' gesture toward his oppressors."}, {"front": "According to Sir Francis Galton, what is the 'natural tendency' of the vast majority of persons?", "back": "To shrink from the responsibility of standing and acting alone."}, {"front": "Mencken attributes the common man's fear of liberty to the fact that four-fifths of the population were _____ only five generations ago.", "back": "Slaves."}, {"front": "To what ancient group does Mencken compare the French peasant of 1780 in terms of legal rights?", "back": "The fellahin who built Cheops’ pyramid."}, {"front": "How does Mencken describe the English town proletariat during the rise of the Industrial System?", "back": "As a half-starved and anthropoid (ape-like) population."}, {"front": "Mencken claims that in American history, Germans were once 'sold like _____.'", "back": "Cattle."}, {"front": "How does Mencken characterize the state of the Scotch at the close of the 18th century?", "back": "They were only two steps removed from savagery and cannibalism."}, {"front": "According to the text, when did liberty finally begin to exist in fact in Europe?", "back": "1848."}, {"front": "Who does Mencken argue 'imposed' the American Revolution upon the common people?", "back": "Their 'betters,' specifically commercial gents in New England and country gentlemen in the South."}, {"front": "In what year does Mencken state that universal manhood suffrage was first 'dreamed of'?", "back": "1867."}, {"front": "Mencken contends that the heritage of freedom belongs to a small minority descended from whom?", "back": "The old lords of the soil or the patricians of the free towns."}, {"front": "Why does Mencken believe the concept of liberty cannot be 'implanted in the mind of man at will'?", "back": "It must be bred in over generations like all other basic ideas."}, {"front": "What is the primary psychological reaction of the 'proletarian' to the 'pangs of liberty'?", "back": "Alarm, discomfort, and a sense of great loneliness."}, {"front": "Instead of liberty, what does the common man 'long for'?", "back": "Security."}, {"front": "Why do the masses 'submit supinely' to oppression despite having the means to resist?", "back": "They lack the resolution and cannot imagine taking the risk of resistance."}, {"front": "According to Mencken, what is the actual 'trade' of politics?", "back": "Playing upon the public's natural poltroonery (cowardice) by scaring them and then offering to save them."}, {"front": "Term: Poltroonery", "back": "Definition: Utter cowardice."}, {"front": "Mencken argues that the public 'oscillates eternally' between which two types of figures?", "back": "Scoundrels and heroes."}, {"front": "What does Mencken claim is the only quality of the public a practical politician can be sure of?", "back": "Fear (or poltroonery)."}, {"front": "Cloze: Liberty means _____: it means resolution, it means enterprise, it means the capacity for doing without.", "back": "Self-reliance"}, {"front": "How does Mencken define 'supine' behavior in the context of democratic states?", "back": "Failing to act or resist through passivity."}, {"front": "Why would Thomas Jefferson have 'made an even narrower escape from the guillotine' than Thomas Paine in 1793 Paris?", "back": "Because the city mob seeks to destroy 'professional libertarians' who prioritize rational liberty over material needs."}, {"front": "Mencken uses the term 'fellahin' to emphasize what about the French peasant of 1780?", "back": "Their lack of legal rights and their status as little more than ancient laborers."}, {"front": "According to Mencken, what is the 'natural manure' of liberty?", "back": "Blood (quoting Jefferson)."}, {"front": "Term: Cant", "back": "Definition: Hypocritical and sanctimonious talk, especially regarding morals or religion."}, {"front": "What does Mencken claim is the 'corner-stone of modern free states'?", "back": "Universal manhood suffrage."}, {"front": "According to Mencken, what is the 'heritage of freedom' dependent upon?", "back": "Legitimate or illegitimate descent from the old ruling classes (lords or patricians)."}, {"front": "Mencken defines the free man as one who has won a 'small and precarious territory' from whom?", "back": "The great mob of his inferiors."}, {"front": "What is the common man's capacity for writing symphonies compared to, according to Mencken?", "back": "His talent for self-reliance (which is non-existent)."}, {"front": "Mencken asserts that there was no liberty anywhere in Europe, even in name, until which year?", "back": "1789."}, {"front": "Mencken suggests that 'economic freedom' was little more than a name until when?", "back": "Years after 1867."}, {"front": "What percentage of men does Mencken claim had ancestors who were slaves only four generations ago?", "back": "Seven-eighths."}, {"front": "Mencken argues that politics is the art of playing upon the public's _____.", "back": "Poltroonery (or cowardice)."}, {"front": "How does the 'inferior man' view the responsibilities of a 'god' required by liberty?", "back": "He cannot comprehend them and lacks the talent to face the 'dreadful loneliness.'"}, {"front": "Mencken observes that while 'theoretically free,' the masses fail to overthrow tyrants because they lack _____.", "back": "Resolution."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
