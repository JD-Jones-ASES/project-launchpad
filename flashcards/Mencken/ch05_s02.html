<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken, what psychological force is the \"chiefest\" factor in democratic politics?", "back": "Fear."}, {"front": "What term does Mencken use to describe demagogues who thrive in democratic states?", "back": "Professors of mob psychology."}, {"front": "What is the \"corner-stone\" of the science of politics under a democracy?", "back": "Fear."}, {"front": "In Mencken's view, politics under democracy consists almost entirely of the discovery and chasing of _____.", "back": "Bugaboos."}, {"front": "Term: Bugaboo", "back": "Definition: An imaginary object of fear or a source of needless alarm."}, {"front": "How does Mencken characterize the role of a statesman in the \"last analysis\"?", "back": "A mere witch-hunter (or a glorified smeller and snooper)."}, {"front": "Mencken argues the history of the United States is a history of pursuits of what type of monsters?", "back": "Imaginary monsters."}, {"front": "Name three examples of \"bugaboos\" mentioned by Mencken from U.S. history.", "back": "The red-coats, the Bank, and Wall Street (Accept any three from text list)."}, {"front": "The term for government by the wealthy or rule by a rich elite is _____.", "back": "Plutocracy."}, {"front": "What is the observed voting tendency of the \"plain people\" under democracy?", "back": "They always vote against something, rather than for something."}, {"front": "Why do democratic states often favor \"colourless mediocrities\" over statesmen of genuine imagination?", "back": "It is impossible for the mob to fear mediocrities."}, {"front": "Why are statesmen of \"sound ability\" easy targets for demagogues?", "back": "They are \"shining marks\" that are easy to bring down."}, {"front": "According to Mencken, what \"incredible folly\" did William Jennings Bryan commit in 1896?", "back": "Advocating a constructive program instead of strictly chasing bugaboos."}, {"front": "Why did Bryan's constructive program in 1896 take on a \"sinister look\" to the mob?", "back": "It was highly technical and almost wholly unintelligible."}, {"front": "What was the result of Bryan's \"cow State political economy\" on his career?", "back": "It ruined him."}, {"front": "What speech initially led to the nomination of William Jennings Bryan?", "back": "The cross-of-gold speech."}, {"front": "What \"new issue\" did Bryan discover in his last days that was beyond the mob's comprehension?", "back": "The evolutionary hypothesis."}, {"front": "Where did Bryan find himself pursued and laughed at during his final political scene?", "back": "Dayton, Tennessee."}, {"front": "Mencken describes government under democracy as \"government by _____\".", "back": "Orgy (or orgasm)."}, {"front": "What was the initial reaction of the American \"mob\" at the start of World War I?", "back": "Eagerness to keep out of danger."}, {"front": "Which popular 1915 song reflected the American public's early stance on WWI?", "back": "\"I Didn't Raise My Boy to be a Soldier.\""}, {"front": "On what specific promise was Woodrow Wilson re-elected in 1916?", "back": "To preserve American boys from harm."}, {"front": "What was the primary goal of demagogues on the morning after the 1916 election?", "back": "To substitute a new and worse fear for the fear of entering the war."}, {"front": "How did the State Department attempt to create moral indignation against Germany?", "back": "By reporting that American infants were aboard every torpedoed ship."}, {"front": "To what did the Department of Justice attribute industrial accidents and fires during the WWI build-up?", "back": "German agents."}, {"front": "Term: Venal", "back": "Definition: Susceptible to bribery; corrupt."}, {"front": "What \"choice of fears\" was established to reconcile the mob to entering World War I?", "back": "Fear of a winning Germany vs. fear of a victorious Germany seeking revenge."}, {"front": "By February 1917, what was the public's attitude toward entering the war?", "back": "Reluctant acquiescence (or reconciled, but not eager)."}, {"front": "How did the government convert public acquiescence into war enthusiasm?", "back": "By manufacturing new fears on an epic scale."}, {"front": "What was the domestic psychological state of the American people by the end of 1917?", "back": "A state of siege (or extreme terror)."}, {"front": "What \"ingenious device\" does Mencken credit with giving the public the courage to attempt hostilities?", "back": "The draft (conscription)."}, {"front": "Why did the draft make individual citizens like \"John Doe\" bold?", "back": "It relieved them of the personal obligation to take up arms."}, {"front": "Before the draft, what contributions did the American public favor for the \"cause of democracy\"?", "back": "Munitions and money."}, {"front": "In Mencken's WWI scenario, who does \"Richard Roe\" represent?", "back": "A person in the conscript camps."}, {"front": "How did Mencken interpret the \"heroic mood\" of the American people in late 1917?", "back": "A truculent front concealing deep fear."}, {"front": "What home-front factors made the \"show\" of war enjoyable for those not serving?", "back": "High wages and safety at home."}, {"front": "According to Mencken, what is the \"capital defect\" of any constructive political program in a democracy?", "back": "It is often technical and unintelligible to the mob."}, {"front": "Why would Bryan have likely been elected in 1896 if he had stayed on the \"plutocracy\" issue?", "back": "It was a successful chase of a familiar bugaboo."}, {"front": "Mencken asserts that the American people in 1917 were in terror even though the foe was how far away?", "back": "3,000 miles."}, {"front": "Who does Mencken call \"a true son of the mob\"?", "back": "William Jennings Bryan."}, {"front": "What was the mob's reaction to the \"evolutionary hypothesis\" as an issue?", "back": "It aroused their fears because it was beyond their comprehension."}, {"front": "How did the newspapers contribute to the psychological mobilization for WWI?", "back": "They published officially inspired surmises about the effects of German victory."}, {"front": "What was the \"first fear\" regarding Germany that was eventually engulfed by a second?", "back": "The fear of a Germany making progress against her current foes."}, {"front": "According to Mencken, how do demagogues treat the science of mob psychology?", "back": "As an exact and puissant science."}, {"front": "Why does the democratic state pass over statesmen of \"genuine imagination\"?", "back": "They are easy targets for demagogues to attack as sources of fear."}, {"front": "What psychological effect did the State Department's diplomatic notes have on the public?", "back": "They increased moral indignation with each new note."}, {"front": "Mencken notes that the history of American WWI involvement is a record of fears amounting to _____.", "back": "Frenzies."}, {"front": "What was the primary motive of the \"mob\" in its initial reaction to WWI?", "back": "To keep out of danger."}, {"front": "What does Mencken claim was the true nature of the \"heroic mood\" that came upon the people?", "back": "It was a concealment of fear."}, {"front": "Mencken suggests a complete chronicle of the Republic could be written in terms of what?", "back": "The history of melodic pursuits of imaginary monsters."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
