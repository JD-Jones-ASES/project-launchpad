<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 5, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's primary focus in this section, following his portrait of the 'inferior man'?", "back": "He shifts to analyzing the political system that 'inferior man' creates and sustains, questioning what happens when such individuals are given power."}, {"front": "What is Mencken's rhetorical purpose for his audience in this section?", "back": "To entertain sympathizers of his views on democracy and perhaps push them further in their skepticism, rather than to persuade skeptics."}, {"front": "What term does Mencken use to describe the perceived existential threats that America frequently encounters?", "back": "'Bugaboos.'"}, {"front": "List three diverse examples of 'bugaboos' Mencken cites, spanning different historical periods.", "back": "(Any three from: 'the red-coats,' 'the Hessians,' 'the monocrats,' 'the Bank,' 'the Catholics,' 'Simon Legree,' 'the Slave Power,' 'Jeff Davis,' 'Mormonism,' 'Wall Street,' 'the rum demon,' 'John Bull,' 'the hell hounds of plutocracy,' 'the trusts,' 'General Weyler,' 'Pancho Villa,' 'German spies,' 'hyphenates,' 'the Kaiser,' 'Bolshevism.')"}, {"front": "Who was Simon Legree, and what does Mencken's inclusion of him in the 'bugaboos' list imply?", "back": "Simon Legree was the slave-owner villain from Harriet Beecher Stowe's *Uncle Tom's Cabin*. His inclusion implies that America's fears often include literary or even imagined threats alongside real historical figures."}, {"front": "What is Mencken's rhetorical stance or persona throughout this analysis of democratic politics?", "back": "That of a diagnostician and an observer who stands above the fray, diagnosing a recurring 'disease' without participating in the politics he describes."}, {"front": "According to Mencken, what does 'politics under democracy consist almost wholly of'?", "back": "'The discovery, chase and scotching of bugaboos.'"}, {"front": "How does Mencken use the word 'bugaboos' in his opening statement to set the tone for the section?", "back": "It reduces the entire apparatus of democratic governance (campaigns, elections, etc.) to a childish game of monster-hunting, immediately deflating the seriousness of politics."}, {"front": "Describe the major tonal shift that occurs in the section's second half, particularly when Mencken discusses the World War.", "back": "The tone shifts from sardonic amusement at absurdities to a darker, more serious edge, describing how fear was deliberately manufactured to send men to their deaths."}, {"front": "How does Mencken achieve the tonal shift from comic to serious without explicitly announcing it?", "back": "Through careful word choice (diction shifts) – e.g., 'bugaboos' becomes 'frenzies,' 'chase' becomes 'terror,' and 'smeller and snooper' becomes 'the whole power of the government.'"}, {"front": "Define 'register' in linguistics.", "back": "Register refers to the level of formality in language, ranging from highly formal (academic, legal) to highly informal (slang, colloquial speech)."}, {"front": "What is 'register mixing,' and what is its rhetorical effect?", "back": "Register mixing is the deliberate juxtaposition of different registers (formal and informal) within a single sentence or passage, used to create irony, humor, or a deflating effect, often by undercutting the expected tone."}, {"front": "How does Mencken's phrase 'the demagogues, i. e., the professors of mob psychology' exemplify register mixing?", "back": "It yokes the academic 'professors' with the street-level 'mob,' implying demagoguery is both a science and a fraud, an academic discipline practiced on animals, creating a comic and critical effect."}, {"front": "Explain the ironic use of the word 'puissant' in Mencken's discussion.", "back": "'Puissant' means powerful or mighty. It is ironically applied to 'science' in 'mob psychology,' suggesting a powerful science, but one used to manipulate a contemptible 'mob.'"}, {"front": "What is Mencken's signature rhythmic move, especially demonstrated with the 'bugaboo' list?", "back": "A long, rolling catalogue sentence that piles up items, followed by a short, sharp verdict or punch line (e.g., 'The list might be lengthened indefinitely.')."}, {"front": "How does Mencken use the structure of the catalogue sentence to strengthen his argument about American fears?", "back": "The cumulative structure, piling detail upon detail, carries the reader along, and the sheer length of the list makes the pattern of undiscriminating panic seem undeniable and irrefutable."}, {"front": "Explain Mencken's use of antithesis in the phrase: 'the plain people, under democracy, never vote for anything, but always against something.'", "back": "The italicized prepositions ('for' vs. 'against') create a sharp contrast, suggesting that democratic political engagement is driven solely by fear and opposition rather than proactive support for ideas."}, {"front": "What is Mencken's central metaphor for democratic politics in this section?", "back": "The 'witch-hunt' metaphor, where statesmen are 'witch-hunters' and political threats are 'bugaboos,' implying that democratic man's political instincts are pre-modern and irrational, like those of a Salem villager."}, {"front": "How does Mencken use irony in his description of the World War propaganda campaign?", "back": "He describes the manipulation with apparent neutrality and clinical language (e.g., 'problem,' 'converting,' 'manufactured'), but this detached tone itself exposes the manipulation, making the indictment sharper than direct outrage would."}, {"front": "Define 'catalogue' (also known as enumeratio or congeries) as a figure of speech.", "back": "It is the listing of multiple items in rapid succession for rhetorical effect, often used for emphasis or overwhelming accumulation."}, {"front": "How does the diction in Mencken's 'bugaboo' catalogue (mixing proper nouns, abstract concepts, literary characters) contribute to his argument?", "back": "By placing diverse items like 'the Kaiser' next to 'the rum demon,' Mencken creates a leveling effect, implying that 'democratic man' treats all perceived threats with the same undiscriminating, panicked response."}, {"front": "Describe the purpose and effect of Mencken's use of complex syntax in the World War passage.", "back": "The longer, more complex sentences, filled with subordinate clauses and parenthetical dashes, mirror the elaborate machinery of propaganda and enact the process of fear-manufacture, with each clause adding another layer of alarm."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
