<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 15, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's central argument regarding the 'reformer's dream' in politics?", "back": "Mencken argues that the political system inevitably corrupts the reformer long before the reformer can reform the system."}, {"front": "According to Mencken, what is the 'psychic impossibility' concerning a gentleman holding federal office?", "back": "It is almost impossible for a gentleman to hold office under the Federal Union and retain his integrity, requiring a miraculous combination of circumstances."}, {"front": "What analogy does Mencken use to illustrate the futility of sending gentlemen into politics to reform it?", "back": "He compares it to 'filling the bawdy-houses with virgins,' suggesting the virgins would either flee or cease to be virgins, implying gentlemen in politics would either leave or be corrupted."}, {"front": "What two alternatives confront a 'gentleman' who enters politics, according to Mencken?", "back": "Either they retain their rectitude and lose office, or they retain office and dilute their rectitude by adapting to the mob's tastes and prejudices."}, {"front": "How does Mencken characterize the 'mob' that a political aspirant must confront and adapt to?", "back": "The mob has specific tastes and prejudices; a politician must soothe it with 'balderdash,' anticipate its crazes, join them vociferously, and make terms with 'mob-masters' (agents of prehensile minorities)."}, {"front": "Who does Mencken identify as the 'worst enemies of political decency'?", "back": "The 'tired reformers,' especially those whose primary thirst for incorruption was accompanied by a 'somewhat sniffish class consciousness'."}, {"front": "Name one prominent American political figure Mencken cites as an example of a reformer who succumbed to demagoguery.", "back": "Theodore Roosevelt, who came into politics as a 'sword drawn against demagogy' but became a 'violent and shameless demagogue'."}, {"front": "What is the 'pride' (cost) that America pays for the 'great boon of democracy,' according to Mencken?", "back": "Men of native integrity are either barred from public service altogether or subjected to almost irresistible temptations after they get in, leading to their corruption or removal."}, {"front": "How does Mencken contrast the American political system with England's, particularly regarding the maintenance of integrity in public office?", "back": "England's aristocratic tradition (anachronistic but powerful) helps check the 'outlawry and corruption of the best' by keeping principal offices in its hands and preserving intellectual influence, which the U.S. lacks."}, {"front": "Why does Mencken believe that American scholarship (e.g., from Harvard) has no influence on Capitol Hill?", "back": "Because there is no aristocracy, whether intellectual or otherwise, in the United States, meaning scholarship and higher thought have no functional connection or influence on politics."}, {"front": "How does Mencken describe the typical American President's intellectual curiosity or choice of company, citing examples?", "back": "American Presidents generally lack eagerness for contacts outside professional politics. Harding spent his hours with bootleggers, not metaphysicians; his successor entertained only party newspaper editors."}, {"front": "According to Mencken, what is the general state of the American judiciary?", "back": "It 'sinks quite as low,' carrying out 'dull and preposterous duties' outside civilized thought, and is often filled with 'duffers' and 'scoundrels' due to political appointments/elections."}, {"front": "What is Mencken's criticism of American judges regarding constitutional rights?", "back": "They acquiesce almost unanimously in the destruction of fundamental rights (e.g., First, Second, Fourth, Fifth, Sixth Amendments) and 'supinely connived at the invasion of the Fourteenth and Fifteenth'."}, {"front": "Why, according to Mencken, do 'better sort of lawyers' often avoid judicial office in America?", "back": "There is a multiplicity of courts, and judges are chosen for purely political reasons, making the office unattractive to lawyers with professional dignity and self-respect."}, {"front": "How does Mencken explain the superiority of the English bench compared to the American one?", "back": "The governing oligarchy in England, lingering on despite democratic upheaval, keeps jealous guard over the judiciary in the interest of its own class, preventing the elevation of 'preposterous shysters'."}, {"front": "In American states, particularly where judges are elected, who has an advantage in attaining judicial office?", "back": "The 'shyster' has every advantage over the reputable lawyer, including a 'vast and undivided passion' for the judicial salary."}, {"front": "What is the implication of the 'grandmother' oath mentioned in the text?", "back": "It's a hyperbolic example to illustrate that office-holders are forced into a moral dilemma where they must either be a liar or a 'pig,' demonstrating the system's inherent corruption and the impossibility of remaining a gentleman."}, {"front": "What does Mencken mean by 'prehensile minorities' whose agents the politician must make terms with?", "back": "These are powerful, grasping special interest groups or factions that exert control over the 'mob' and thus over politicians."}, {"front": "What does Mencken imply about figures like Theodore Roosevelt who were 'imitation aristocrats'?", "back": "Even those who, like Roosevelt, tried to break down barriers and engage with diverse intellectuals, were anomalies and did not fundamentally alter the corrupting nature of American politics."}, {"front": "How does Mencken characterize the difference in how 'genuine talent' versus 'imbecility' gets into the judiciary in England versus the United States?", "back": "In England, genuine talent (however humble) may get in, but not imbecility. In the United States, 'the thing runs the other way,' with 'duffers' and 'scoundrels' often filling the bench."}, {"front": "What specific 'scandals' or issues does Mencken implicitly reference when mentioning President Harding?", "back": "Harding's administration was known for corruption (e.g., Teapot Dome scandal), which Mencken presents as proof that democracy rewards incompetence."}, {"front": "What is the significance of the phrase 'dilute his rectitude with the cologne spirits of the trade'?", "back": "It means that to maintain his political office, a gentleman must compromise his moral integrity by adopting the deceptive and manipulative practices common in politics."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
