<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 22, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken, what is the shift in focus between Section III.2 and Section III.3 of his argument?", "back": "The argument moves from the psychology of democratic moralism to its practical results."}, {"front": "What three negative outcomes does Mencken argue result from Puritanical legislation?", "back": "Hypocrisy, persecution of the citizen, and the degradation of the law."}, {"front": "Mencken's claim that the democratic citizen has 'no rights that the police are bound to respect' alludes to which 1857 Supreme Court case?", "back": "Dred Scott v. Sandford."}, {"front": "What group's status does Mencken compare to enslaved persons before the Civil War through his Dred Scott allusion?", "back": "The status of the political dissident under democratic moralism."}, {"front": "Mencken viewed the 1925 Scopes trial as the supreme example of democratic _____.", "back": "Anti-intellectualism."}, {"front": "What was the specific legal violation in the Scopes trial?", "back": "Teaching evolution in violation of state law."}, {"front": "The _____ Act provided the enforcement mechanism for the Eighteenth Amendment (Prohibition).", "back": "Volstead"}, {"front": "What rhetorical persona does Mencken adopt in Section III.3?", "back": "A defense attorney arguing before the court of educated opinion."}, {"front": "How does Mencken's tone in Section III.3 differ from earlier sections?", "back": "The philosophical detachment is replaced by a combative tone of indignation bordering on fury."}, {"front": "What is the 'paradox' of Mencken's invective identified in the text?", "back": "His rage is genuine and heated, but the prose remains controlled and architecturally sound."}, {"front": "In the final paragraphs, Mencken's tone shifts from fury to a _____ meditation on the loss of 'common decency.'", "back": "Melancholy (or elegiac)."}, {"front": "According to Mencken, what has destroyed 'mutual trust' in the community?", "back": "Puritan surveillance."}, {"front": "Why does Mencken utilize a dense vocabulary of legal terms like 'due process' and 'habeas corpus'?", "back": "To demonstrate that the democratic state has betrayed its own founding principles."}, {"front": "Term: Specious", "back": "Definition: Superficially plausible but actually wrong."}, {"front": "Term: Sumptuary", "back": "Definition: Relating to laws that regulate personal behavior or consumption of food and drink."}, {"front": "Term: Proscribed", "back": "Definition: Forbidden by authority or outlawed."}, {"front": "Term: Caveat", "back": "Definition: A warning or caution."}, {"front": "What historical association does the word 'proscribed' carry regarding the status of a citizen?", "back": "Political death, where citizens on the list could be killed with impunity."}, {"front": "What syntactic structure does Mencken use to force the reader to hold an entire argument in mind before reaching the verdict?", "back": "Periodic construction (long sentences withholding the main point until the end)."}, {"front": "In the metaphor 'mill of justice,' what is the significance of the word 'mill'?", "back": "It implies a machine that grinds rather than an institution that judges."}, {"front": "Invective is defined as the art of verbal attack that combines _____ with _____.", "back": "Evidence; contempt."}, {"front": "How does Mencken use irony in his introduction of Bishop Wilson?", "back": "He uses inflated, respectful language to make the Bishop's actual argument appear more contemptible."}, {"front": "In the Bishop Wilson passage, Mencken's rhetorical technique is described as 'ironic _____.'", "back": "Prosecution."}, {"front": "Why does Mencken avoid adding his own commentary after quoting Bishop Wilson's sermon?", "back": "To let the evidence speak for itself and allow the reader to convict the enemy."}, {"front": "What was Bishop Wilson's stance on the constitutional protection of Atheism?", "back": "He argued it does not deserve a place and should not be defended under free speech guarantees."}, {"front": "In the sentence 'What avails it for a man...', why does Mencken use the word 'avails'?", "back": "It is an archaic term from the Puritan's own oratorical register used to turn the weapon against them."}, {"front": "What do the 'money in the bank' and 'Ford in his garage' represent in Mencken's close-reading passage?", "back": "Totems of modest, middle-class American prosperity in the 1920s."}, {"front": "What does the image of 'knotholes' suggest about the neighbors in Mencken's", "back": "Furtive, shameful spying rather than open moral guardianship."}, {"front": "According to Mencken's closing argument, what is the prerequisite for 'enjoying' men?", "back": "Trusting them."}, {"front": "How does the syntax change in Mencken's final paragraph to create a 'sense of arrival'?", "back": "The sentences become shorter and more direct."}, {"front": "What is the effect of the contrast between legal jargon and the words 'clubbed' or 'railroaded'?", "back": "It highlights the gap between the promise of the Constitution and the reality of enforcement."}, {"front": "Mencken compares the 'vague accusation' at the start of the 'mill of justice' to what at its end?", "back": "Staggering penalties."}, {"front": "According to the analysis, what distinguishes Mencken's 'effective invective' from 'mere ranting'?", "back": "The rage is organized by intelligence and disciplined by style."}, {"front": "What specific religious groups or publications does Mencken note as supporting Bishop Wilson's 'bloodthirsty' dictum?", "back": "Methodist organs and other bishops."}, {"front": "What is the primary rhetorical purpose of Mencken's use of parallel subordinate clauses in the 'What avails it' passage?", "back": "To equate neighborly surveillance with institutional religious persecution."}, {"front": "Mencken uses the term _____ to connect modern Prohibition to ancient forms of government overreach.", "back": "Sumptuary"}, {"front": "The phrase 'no rights which the white man was bound to respect' was originally written by which Chief Justice?", "back": "Roger B. Taney."}, {"front": "In rhetorical terms, what does a semicolon often mark in Mencken's periodic sentences?", "back": "The 'turn' from the premise to the resulting argument or penalty."}, {"front": "Mencken's final conclusion is that living in a decent community requires neighbors who _____.", "back": "Leave each other alone."}, {"front": "What is the effect of placing the word 'jail' at the very end of the close-reading sentence?", "back": "It functions like a 'trapdoor,' suddenly moving from domestic comfort to confinement."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
