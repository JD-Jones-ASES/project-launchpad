<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 22, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Mencken argue the law has been 'weaponized' under Puritanical influence?", "back": "It is used against unpopular citizens, with courts abandoning impartiality, especially when 'heresy' is perceived to be at stake."}, {"front": "According to Mencken, what happens to constitutional rights and common law rules when someone is accused of 'heresy'?", "back": "They are swept away as invalid; rules against double jeopardy and hearsay are suspended in order to secure a conviction."}, {"front": "What does Mencken claim is the consequence of the 'enormous multiplicity of sumptuary and inquisitorial statutes'?", "back": "It makes it easy for authorities to find a law an unpopular person can be accused of breaking, even after being singled out for persecution."}, {"front": "What specific constitutional rights does Mencken accuse the Volstead Act of destroying or habitually violating?", "back": "The constitutional right to a jury trial, the prohibition of unreasonable searches and seizures, and the rule against double jeopardy."}, {"front": "Why does Mencken suggest that higher courts do not interfere with clearly unconstitutional statutes?", "back": "The mob is always in favor of the prosecution, and very few American judges or prosecuting attorneys have the courage to enforce constitutional guarantees against public pressure."}, {"front": "How does Mencken characterize the mindset of many American judges, particularly regarding those accused of 'political heresies'?", "back": "He suggests that many former prosecuting officers carry their habits of mind to the bench, often convinced that anyone accused of a crime is guilty, and that those with political heresies commit 'blasphemy' by mentioning constitutional rights."}, {"front": "How does Mencken compare the police power in American states like California and Pennsylvania to ancient oriental monarchies?", "back": "He states that the police power in these American states surpasses anything ever heard of in the oriental monarchies of antiquity, implying an excessive and unchecked authority."}, {"front": "Who does Mencken identify as being at the mercy of the 'Polizei' in American states?", "back": "The man who finds himself in an unpopular minority, especially those who speak out boldly for the Bill of Rights."}, {"front": "What 'bloodthirsty and astounding dictum' did Bishop Luther B. Wilson preach regarding atheism and free speech?", "back": "He declared that 'Atheism is not only folly, but to the state a traitor. It does not deserve a place and should not be defended by any specious claim for immunity under the constitutional guaranties of the right of free speech.'"}, {"front": "How did the prosecuting attorney general Stewart and Judge Raulston demonstrate the 'no rights' doctrine during the Scopes trial?", "back": "When Arthur Garfield Hays protested that his client wasn't getting a fair trial, Stewart candidly stated an atheist had no right to a fair trial in Tennessee, which Judge Raulston approved with a nod."}, {"front": "Besides atheists, what other groups did Mencken claim faced legal disabilities in various American states?", "back": "Catholics, Negroes, persons unable to speak local dialects (South of the Potomac), anti-Catholics (Massachusetts), and anti-Semites (New York)."}, {"front": "What does Mencken mean by 'common decency' in the context of society?", "back": "The habit, in the individual, of viewing with tolerance and charity the acts and ideas of other individuals, making one a reliable friend, a generous opponent, and a good citizen."}, {"front": "According to Mencken, how does 'democratic man' often fall short of 'common decency'?", "back": "His eagerness to force his 'dull and docile way of thinking' on others leads to acts of unfairness, oppression, and dishonor, which break down mutual trust essential for civilized society."}, {"front": "What explanation does Mencken offer for the 'cultural collapse of New England' and 'cultural backwardness' of regions in the South and Middle West?", "back": "The harassment and lack of decency faced by well-informed, self-respecting individuals who do not accept the democratic epistemology and the Puritan ethic, compelling them to leave."}, {"front": "Why does Mencken argue that Americans, despite great material prosperity, are 'probably the least happy in Christendom'?", "back": "Because they do not trust one another, and without mutual trust, there can be no ease or genuine happiness."}, {"front": "Why does Mencken say it's impossible to trust a Puritan?", "back": "Because a Puritan believes his duty to 'save us from our sins' (i.e., non-Puritanical acts) is paramount to his duty to let us be happy in our own way, making them intolerant and unable to be magnanimous."}, {"front": "What is the meaning of the term 'specious' as used in the text?", "back": "Superficially plausible but actually wrong; misleading in appearance."}, {"front": "In what way does Mencken describe a democrat as 'a Puritan doubly damned'?", "back": "A democrat, like a Puritan, is driven by a harsh compulsion to observe the letter of the law at all costs, overcoming impulses for magnanimity, forgiveness, or generosity, as seen in the case of Debs."}, {"front": "What specific actions were people jailed for in Pennsylvania, according to Mencken?", "back": "Merely mentioning the Bill of Rights, and protesting publicly against its violation."}, {"front": "How does Mencken describe the typical progression of a prisoner through the 'mill of justice' when singled out for being unpopular?", "back": "They begin under vague accusations like disorderly conduct or disturbing the peace, but end charged with severe crimes that carry staggering penalties, after a diligent search for a law they can be accused of breaking."}, {"front": "How does Mencken connect the 'success' of a prosecuting attorney to their 'ferocity'?", "back": "He states that a prosecuting attorney's success depends largely upon their ferocity, and the more passionately they indulge in extravagant attacks, the more certain their promotion to higher office, including the judiciary."}, {"front": "What 'doctrine' does Mencken claim is 'so thoroughly democratic' in the United States that it is seldom questioned?", "back": "The doctrine that a man who stands in contempt of the prevailing ideology has no rights under the law."}, {"front": "What does Mencken imply about the influence of former prosecuting officers who become judges?", "back": "They carry their 'habits of mind' to the bench, often convinced of a defendant's guilt and dismissive of the constitutional rights of those with 'political heresies,' making them biased."}, {"front": "How does Mencken differentiate between the 'natural difficulty' a heterodox individual faces with a jury and the 'hostility' he describes as 'settled practice' in American criminal law?", "back": "The natural difficulty comes from juries of limited information and intelligence. The 'settled practice' refers to systematic hostility from prosecuting officers, judges, and the newspapers that influence their fortunes."}, {"front": "What is the fundamental reason Mencken gives for the 'irreconcilable antagonism between democratic Puritanism and common decency'?", "back": "Democratic Puritanism's compulsion to 'save us from our sins' overrides tolerance and magnanimity, creating a pervasive distrust that undermines common decency and happiness."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
