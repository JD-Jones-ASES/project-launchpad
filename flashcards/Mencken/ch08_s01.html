<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 8, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's central argument regarding the common man's relationship with liberty?", "back": "Mencken argues that the common man does not merely fail to defend freedom, but actively fears it, delivering a 'death sentence' to democracy's claim of liberty as its highest achievement."}, {"front": "According to Mencken, what typically instigates revolutions throughout history?", "back": "Revolutions are started by hungry city mobs when the supply of 'panem et circenses' (bread and circuses) falls off, leading them to fight for basic needs like 'ham and cabbage' rather than liberty."}, {"front": "Who does Mencken credit with first formulating the ideas of freedom that prevail today?", "back": "Country gentlemen, aided by poets and philosophers, with occasional help from an eccentric king."}, {"front": "Provide an example Mencken uses to illustrate that even absolute monarchs could support aspects of liberty.", "back": "Frederick the Great, an absolute monarch, gave the first legal support in law for free speech."}, {"front": "When a city mob fights and wins, what two actions does Mencken say it takes regarding freedom and 'professional libertarians'?", "back": "First, it destroys every form of freedom not directed wholly to its immediate needs. Second, it butchers all professional libertarians."}, {"front": "What example does Mencken use to show the danger for 'professional libertarians' during city revolutions?", "back": "He suggests Thomas Jefferson, if living in Paris in 1793, would have made an even narrower escape from the guillotine than Thomas Paine."}, {"front": "How does Mencken differentiate between 'false forms of liberty' and 'true liberty' in the mind of the 'inferior man'?", "back": "The inferior man can imagine 'false forms' like choosing between two political 'mountebanks.' However, 'true liberty' is incomprehensible to him."}, {"front": "What essential quality does Mencken argue 'genuine liberty' demands of its adherents?", "back": "Courage. The man who loves liberty must be willing to fight for it and, even more arduously, endure it."}, {"front": "List some of the key characteristics Mencken associates with 'true liberty.'", "back": "Self-reliance, resolution, enterprise, and the capacity for doing without."}, {"front": "Describe Mencken's concept of a 'free man' and his position relative to others.", "back": "A free man is one who has won a small, precarious territory from the 'great mob of his inferiors,' is prepared to defend it alone, and faces the 'dreadful loneliness' and responsibilities of a 'sort of god' in his own world."}, {"front": "What is 'Homo boobiens' and what is Mencken's view of this group's capacity for liberty?", "back": "'Homo boobiens' is Mencken's term for the gullible, credulous citizen. He believes they have no talent or understanding for self-reliance, and liberty is unfathomable to them, much like honor or writing symphonies."}, {"front": "According to Mencken, what does the 'inferior man' often mistake for liberty?", "back": "He mistakes it for 'the banal right to empty hallelujahs upon his oppressors' or the right to yell for the more obviously dishonest political figure."}, {"front": "What observation did Sir Francis Galton make that Mencken cites to support his arguments about the common man?", "back": "Galton stated, 'The vast majority of persons of our race... have a natural tendency to shrink from the responsibility of standing and acting alone.'"}, {"front": "According to Mencken, what is the 'obvious cause' for the majority's tendency to shrink from responsibility and true liberty?", "back": "To their kind, even mild liberties are very recent acquisitions. Their ancestors were largely slaves, meaning the heritage of freedom is 'not in their blood.'"}, {"front": "How recent does Mencken state that 'mild and narrow liberties' have been for the lower orders of men?", "back": "Barely a century and a half (a scant five generations), noting that four-fifths of the world's people were slaves, in reality if not in name, before this period."}, {"front": "Provide an example of widespread lack of liberty in 18th-century Europe, according to Mencken.", "back": "The French peasant of 1780 was little removed from ancient fellahin; English industrial towns were filled with a 'half-starved and anthropoid proletariat,' and German subjects were 'sold like cattle.'"}, {"front": "When does Mencken state that universal manhood suffrage and economic freedom truly became more than names in America?", "back": "Universal manhood suffrage was 'only dreamed of' until 1867, and economic freedom was 'little more than a name' until years later."}, {"front": "What is Mencken's contention about the 'heritage of freedom' and its acquisition?", "back": "It belongs to a small minority, descended from 'old lords of the soil or from the patricians of the free towns.' He contends such ideas cannot be implanted at will but must be 'bred in' through generations."}, {"front": "What does Mencken argue the proletarian truly longs for, in contrast to liberty?", "back": "Security. He needs protection, is afraid of getting hurt, and lacks 'high adventurousness,' preferring comfort over the 'pangs of liberty.'"}, {"front": "How does Mencken explain why the 'great masses of men' submit to oppression and exploitation despite theoretical freedom?", "back": "They lack the resolution and cannot imagine taking the risk of resistance. They look for leaders and follow them slavishly, even when their courage is 'buncombe' and their altruism a 'cloak for more and worse oppressions.'"}, {"front": "What does Mencken describe as the 'trade' of practical politics?", "back": "Playing upon the masses' 'natural poltroonery' (cowardice) — 'scaring it half to death, and then proposing to save it.'"}, {"front": "Define 'panem et circenses' as implied by Mencken in the context of city mobs.", "back": "'Bread and circuses,' referring to the basic necessities and diversions provided to a populace to keep them content and prevent unrest. When these are scarce, mobs revolt for sustenance, not liberty."}, {"front": "Define 'poltroonery' based on its usage in the text.", "back": "Utter cowardice; a fundamental quality of the masses that practical politicians exploit to gain and maintain power."}, {"front": "What is the 'underlying reality' of liberty that Mencken claims the proletarian cannot grasp?", "back": "The demanding nature of genuine liberty, which requires courage, self-reliance, resolution, enterprise, and the capacity for doing without, as opposed to mere superficial rights."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
