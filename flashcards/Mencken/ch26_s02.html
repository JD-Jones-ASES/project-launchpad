<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 26, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Term: Irony", "back": "Definition: Saying one thing while meaning another."}, {"front": "Term: Antithesis", "back": "Definition: Placing opposing ideas in parallel structures."}, {"front": "What is the rhetorical term for sustaining a comparison across an entire passage?", "back": "Extended Metaphor"}, {"front": "Term: Connotation", "back": "Definition: The emotional weight words carry beyond their literal meaning."}, {"front": "What occurs in prose when formal and informal language are made to collide?", "back": "Register Mixing"}, {"front": "Term: Hyperbole", "back": "Definition: Deliberate exaggeration used as a form of argument."}, {"front": "How does alliteration function as a rhetorical device in prose?", "back": "It uses sound patterns to reinforce meaning."}, {"front": "Which sentence type builds suspense by withholding the main clause until the end?", "back": "Periodic Sentence"}, {"front": "Which sentence type piles descriptive detail after the main clause has been stated?", "back": "Cumulative Sentence"}, {"front": "Term: Analogy", "back": "Definition: Illuminating one thing by comparing it to another."}, {"front": "What is the purpose of a rhetorical question?", "back": "To pose a question that assumes its own answer."}, {"front": "Term: Parallelism", "back": "Definition: Repeated syntactic structure used for emphasis."}, {"front": "What rhetorical device involve one word governing two others in different senses?", "back": "Zeugma"}, {"front": "How does satire differ from a polemic as a form of rhetorical attack?", "back": "Satire is an indirect attack, while a polemic is a direct attack."}, {"front": "Term: Persona", "back": "Definition: The constructed voice of a writer versus the real author."}, {"front": "Term: Catalogue (or Enumeration)", "back": "Definition: The use of a list as a rhetorical device."}, {"front": "What is a compressed, memorable statement called in rhetoric?", "back": "Epigram"}, {"front": "Term: Bathos", "back": "Definition: A deliberate descent from an elevated tone to the absurd."}, {"front": "Which rhetorical device involves a direct address to an absent person or abstraction?", "back": "Apostrophe"}, {"front": "Term: Accumulation", "back": "Definition: Piling up examples for an overwhelming effect."}, {"front": "Term: Invective", "back": "Definition: The art of verbal attack."}, {"front": "What is the term for repetition at the beginning of successive clauses?", "back": "Anaphora"}, {"front": "Term: Peroration", "back": "Definition: The closing section of a speech or argument."}, {"front": "Term: Understatement (or Litotes)", "back": "Definition: Saying less than you mean for rhetorical effect."}, {"front": "According to Mencken's lessons, why is voice essential to a writer?", "back": "A writer without a voice is a writer without readers."}, {"front": "How is a writer's voice developed according to the text?", "back": "It is a construction built through journalism, reading, and deliberate experimentation."}, {"front": "What is the prerequisite for finding one's unique writing voice?", "back": "A writer must first write a great deal of bad prose."}, {"front": "At what level does rhythm in prose operate on the reader?", "back": "It works on the reader's ear before reaching the reader's mind."}, {"front": "In the context of Mencken's prose, how is exaggeration viewed as a craft?", "back": "It is used as a form of precision rather than carelessness."}, {"front": "What is the rhetorical function of hyperbole like Mencken's 'Homo boobiens'?", "back": "It forces the reader to locate the truth between the literal claim and its opposite."}, {"front": "Why is 'surprise' considered the engine of attention in prose?", "back": "It keeps the reader off balance and makes the prose impossible to skim."}, {"front": "Give an example of a structural surprise in Mencken's writing.", "back": "A book-length attack that ends with a confession of enjoyment."}, {"front": "What is the deepest lesson Mencken teaches regarding the relationship between style and argument?", "back": "Style and argument are inseparable."}, {"front": "What distinguishes prose that 'performs its argument' from prose that merely 'argues'?", "back": "It demonstrates the truth of its statement through the texture of the language itself."}, {"front": "In Mencken's opening to 'Notes on Democracy,' what register is 'sweet, soft music' drawn from?", "back": "The language of aesthetics."}, {"front": "In Mencken's opening to 'Notes on Democracy,' what register is 'harsh bawling' drawn from?", "back": "The language of the barnyard."}, {"front": "What effect does Mencken achieve by placing aesthetic and barnyard registers side by side?", "back": "He reduces democratic ideals to a pretty noise and democratic reality to an animal cry."}, {"front": "What specific rhythm is evoked by the sentence 'Democracy came into the Western World'?", "back": "The rhythm of a fairy tale."}, {"front": "In Mencken's antithetical construction, what is the function of the semicolon?", "back": "It acts as a fulcrum to hold two opposing halves in perfect equilibrium."}, {"front": "What mood is created by the sibilant s-sounds in the phrase 'sweet, soft music'?", "back": "A sinister tone suggesting seduction rather than sincerity."}, {"front": "What do the quick, light t-sounds in 'dulcet twittering' suggest rhetorically?", "back": "They suggest triviality."}, {"front": "What does the heavy, blunt b-sound in 'harsh bawling from below' represent?", "back": "An eruption of ugliness."}, {"front": "How does irony function in Mencken's phrase 'dulcet twittering' regarding Enlightenment philosophers?", "back": "It reduces them to the status of songbirds."}, {"front": "What political implication does Mencken suggest with the phrase 'from above'?", "back": "That democracy was imposed by elites rather than demanded by the people."}, {"front": "What is the central lesson regarding 'Style as Argument'?", "back": "The way something is said is an integral part of what is being said."}, {"front": "What does a rhythmically flat and tonally dead sentence communicate to a reader?", "back": "That the writer has nothing interesting to say."}, {"front": "According to the text, style is not decoration applied to an argument, but rather its _____.", "back": "First and most powerful advocate."}, {"front": "Why is studying Mencken's prose useful even if one does not wish to imitate him?", "back": "It helps develop an ear for how language works at the level of the individual sentence."}, {"front": "How can rhetorical knowledge help a citizen analyze a politician's speech?", "back": "It allows them to notice devices like anaphora used to create false urgency."}, {"front": "How does prose influence a reader's perspective of the world?", "back": "Every sentence nudges the reader toward a specific conclusion, emotion, or viewpoint."}, {"front": "Why is the ability to understand how sentences work considered a vital skill in a democracy?", "back": "It allows the citizen to decide consciously whether to be nudged by a writer's prose."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
