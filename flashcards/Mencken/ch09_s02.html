    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 9, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

    <script>
    var CARDS = [{"front": "What is the primary shift in Mencken's argumentative strategy in Section I.8 of \"The Effects Upon Progress\"?", "back": "Mencken shifts from focusing on the character of \"democratic man\" to examining the *consequences* for civilization when this creature is given political power."}, {"front": "What is Mencken's central thesis regarding democracy's impact on human progress in Section I.8?", "back": "His central thesis is that democracy consistently retards human progress at every turn."}, {"front": "How is Mencken's rhetorical situation described in Section I.8, and what does he aim to present?", "back": "He is described as a prosecutor delivering a closing argument, presenting \"evidence of harm\" after having established the defendant's character."}, {"front": "Who is Mencken's intended audience for Section I.8?", "back": "The educated reader who fancies himself \"above the herd,\" invited to survey the \"wreckage that democracy has made.\""}, {"front": "What rhetorical purpose does the length and accumulation of examples serve in Section I.8?", "back": "By \"piling example upon example, country upon country, century upon century,\" Mencken aims to create an overwhelming sense of inevitability and crush objections through sheer mass of evidence."}, {"front": "What was the significance of the 1925 Scopes Trial to Mencken's writing in \"Notes on Democracy\"?", "back": "Mencken covered the trial, portraying it as a collision between Enlightenment reason and democratic ignorance, directly influencing his references to \"anti-evolution acts\" and the \"Hookworm Belt.\""}, {"front": "What did Mencken mean by the \"Hookworm Belt\"?", "back": "It was Mencken's contemptuous term for the rural South, implying it was a region where hookworm disease was endemic and intellectual life was correspondingly impoverished."}, {"front": "Describe the dominant voice Mencken adopts in Section I.8.", "back": "The dominant voice is that of the \"encyclopedic satirist,\" a figure who commands vast learning and deploys it entirely in the service of contempt."}, {"front": "How does the tone of Section I.8 compare to earlier sections of Part I?", "back": "It is angrier and genuinely indignant, particularly concerning the persecution of art and science, contrasting with the amused or sardonic tones of earlier sections."}, {"front": "In what specific area does Mencken's \"mask slip\" to reveal genuine feeling in Section I.8?", "back": "His defense of art and science against the mob's persecution, such as the imagined musician \"railroaded to the calaboose\" for playing Bach, shows passionate engagement beyond satirical performance."}, {"front": "How does Mencken's control over his \"fury\" despite his indignation reinforce his argument?", "back": "The discipline and craft of his polished prose represent the order and learning that the mob threatens, implicitly contrasting with the chaos and ignorance he attributes to the common man."}, {"front": "How does Mencken's diction systematically degrade the common man? Provide examples.", "back": "He uses zoological terms like \"Homo neandertalensis,\" \"yokel,\" \"streptococci,\" and \"horned cattle\" to reduce the common man to a base, unintelligent creature."}, {"front": "How does Mencken's diction elevate the achievements of civilization, and what is the effect?", "back": "He uses magisterial names like Bach, Beethoven, Euripides, Aristotle, and Plato, forming a \"grand catalogue\" that functions as an incantation of everything the mob cannot comprehend."}, {"front": "What is the meaning of \"ameliorating\" as used by Mencken, and what does its formal usage emphasize?", "back": "\"Ameliorating\" means making something better or improving conditions. Mencken's formal usage emphasizes the gap between the sophistication of the concept and the crudeness of the mob's opposition."}, {"front": "Define \"farrago\" in the context of Mencken's vocabulary.", "back": "\"Farrago\" means a confused mixture or hodgepodge. Mencken applies it to Fundamentalism to reduce an entire theological movement to \"intellectual debris.\""}, {"front": "What is a \"periodic sentence\"?", "back": "A periodic sentence delays its main idea (grammatical and logical completion) until the end, building suspense through subordinate clauses, phrases, or conditions."}, {"front": "What is the rhetorical effect of Mencken's frequent use of periodic sentences?", "back": "It creates suspense, requires the reader to trust the writer, and makes Mencken's verdicts feel inevitable rather than arbitrary by delaying resolution until the end of elaborate indictments."}, {"front": "Describe Mencken's signature rhythmic shift in Section I.8.", "back": "It shifts from the formal, periodic, or catalogued elements to the epigrammatic and blunt, often concluding with a comic punchline or sharp verdict."}, {"front": "How does Mencken's extensive use of enumeration function rhetorically?", "back": "Long lists of sciences, arts, names, and historical examples create a sense of overwhelming abundance, transforming the sheer quantity of what the common man does not know into a form of evidence, serving as \"the syntax of the indictment.\""}, {"front": "What is the dominant figure of speech in Section I.8, and what is its purpose?", "back": "Analogy is dominant. Mencken compares the mob's intellect to animals, children, or savages, serving as a structural argument to deny the common man the capacity for rational thought that democratic theory requires."}, {"front": "Explain the rhetorical function of Mencken's \"barrel of cider\" analogy for human thought.", "back": "It is a deliberately debasing metaphor that reduces consciousness to chemistry, lending pseudo-scientific precision. It argues that the common man's political opinions have no more validity than \"bubbles in cider,\" thereby denying them rational legitimacy without burden of proof."}, {"front": "How does Mencken employ sustained irony in the passage about the Department of Agriculture?", "back": "He praises the department's work while noting that the farmers it helped opposed it \"almost unanimously,\" letting the historical facts themselves highlight the absurdity that the mob resists the very institutions that serve it."}, {"front": "What is the effect of the closing image of the section—the imagined musician \"railroaded to the calaboose\"?", "back": "It serves as a hypothetical narrative or \"thought experiment\" that extends the logic of real examples into a slightly exaggerated, yet plausible, future, making Mencken's critique feel both real and absurd."}, {"front": "In the close-read sentence, \"It is a tragic but inescapable fact that most of the finest fruits of human progress, like all of the nobler virtues of man, are the exclusive possession of small minorities, chiefly unpopular and disreputable,\" identify the key diction groups.", "back": "One group: \"tragic,\" \"inescapable,\" \"finest,\" \"nobler\" (vocabulary of high seriousness). Other group: \"unpopular,\" \"disreputable\" (words of social exclusion). Their collision forms the sentence's argument."}, {"front": "How does the syntax of the close-read sentence (\"It is a tragic but inescapable fact...\") demonstrate a periodic construction?", "back": "The main assertion (\"progress belongs to small minorities\") is delayed until the end, after a series of qualifying and amplifying phrases and clauses that build emotional stakes and suspense before the final verdict."}, {"front": "What is the deep irony Mencken conveys in the phrase \"chiefly unpopular and disreputable\" within the close-read sentence?", "back": "It is ironic because, in a democracy, \"unpopular\" and \"disreputable\" mean rejected by the majority or lacking respectability. Yet, Mencken asserts these minorities possess \"the finest fruits of human progress,\" implying democracy's own standards condemn its greatest benefactors."}, {"front": "What is \"calaboose\" and how does Mencken's use of it affect the tone?", "back": "\"Calaboose\" is a colloquial, almost comic word for a jail or prison. Its use deflates the gravity of the imagined persecution, making the mob's tyranny seem both real and absurd."}, {"front": "What are \"cosmogonies\" and how does Mencken use them to mark intellectual worth?", "back": "\"Cosmogonies\" are theories of the origin of the universe. Mencken contrasts the \"inordinately complex\" cosmogonies of science with the simple creation story of Genesis, making complexity itself a marker of intellectual worth."}, {"front": "How does Mencken use catalogues of proper names (e.g., Homer, Virgil, Bach) as a \"sorting mechanism\"?", "back": "These names are invoked without explanation. The reader who recognizes them is admitted to Mencken's \"company,\" while the one who does not is implicitly classified with the mob, separating readers into the \"elect and the damned.\""}, {"front": "According to Mencken, what is the connection between the discipline of his prose and his argument against the mob?", "back": "The polished periods and controlled craft of his writing represent the order and learning that the chaotic, ignorant mob threatens, making the discipline itself part of the argument."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
