<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Define \"demagogue\" according to the text.", "back": "A political leader who gains power by appealing to popular desires and prejudices rather than by reasoned argument."}, {"front": "What is a \"bugaboo\" in the context of democratic politics?", "back": "An imaginary object of fear; a source of needless alarm, often created by demagogues."}, {"front": "What does \"plutocracy\" mean?", "back": "Government by the wealthy; rule by a rich elite."}, {"front": "What is Mencken's central argument about politics under democracy?", "back": "It is primarily \"government by fear,\" characterized by an endless parade of invented monsters (bugaboos) chased by witch-hunting statesmen and demagogues."}, {"front": "Why does the text describe fear as the \"corner-stone\" of mob psychology in democratic states?", "back": "Demagogues, who are \"professors of mob psychology,\" exploit fear as the most effective tool to gain and maintain power."}, {"front": "How does the text characterize the role of a statesman in a democracy driven by fear?", "back": "The statesman becomes \"a mere witch-hunter, a glorified smeller and snooper,\" perpetually seeking out and \"scotching bugaboos.\""}, {"front": "Name three historical \"bugaboos\" that the text claims have been pursued in U.S. history.", "back": "Examples include: the red-coats, the Hessians, the Bank, the Catholics, the Slave Power, Wall Street, the rum demon, the Kaiser, Bolshevism. (Any three are acceptable.)"}, {"front": "What does the text observe about how \"plain people\" vote under democracy?", "back": "They \"never vote for anything, but always against something.\""}, {"front": "Why do democratic states, according to the text, tend to prefer \"colourless mediocrities\" over \"statesmen of genuine imagination and sound ability\"?", "back": "Statesmen of genuine imagination are \"shining marks\" easily brought down by demagogues. Mediocrities are preferred because \"it is impossible to fear them.\""}, {"front": "How did William Jennings Bryan initially gain prominence in his 1896 campaign according to the text?", "back": "He was nominated through his \"cross-of-gold speech,\" which successfully chased the \"bugaboo of plutocracy.\""}, {"front": "Why did Bryan ultimately \"come ignominiously to grief\" in his 1896 presidential bid despite his initial success?", "back": "He committed the \"folly\" of advocating a \"constructive program\" that was too technical and unintelligible to the mob, making it easy for opponents to alarm the public against him."}, {"front": "How does the text describe Bryan's intelligence and his ability to learn from experience?", "back": "He is called a \"highly unintelligent man, a true son of the mob,\" who \"never learned anything by experience.\""}, {"front": "What new issue did Bryan attempt to use as a bugaboo in his later days, and why did it fail?", "back": "The \"evolutionary hypothesis.\" It was beyond the comprehension of the mob, and he allowed his foes to turn the offensive against him, making him the pursued."}, {"front": "What does the author mean by stating that \"government under democracy is thus government by orgy, almost by orgasm\"?", "back": "It refers to the frenzied, emotional, and often irrational processes of democratic governance, especially evident in times of crisis like war."}, {"front": "What was the American public's initial reaction to the World War, as indicated by a popular song in 1915?", "back": "The public was \"eager only to keep out of danger,\" reflected by the popular song \"I Didn’t Raise My Boy to be a Soldier.\""}, {"front": "What promise secured Woodrow Wilson's re-election in 1916?", "back": "His \"fraudulent promise\" to preserve American boys from harm and keep the U.S. out of the war."}, {"front": "After Wilson's re-election, what was the \"problem\" for demagogues regarding public opinion on WWI, and how did they approach solving it?", "back": "The problem was to \"substitute a new and worse fear for the one that prevailed\" (fear of war) to reconcile the mob to entering the war."}, {"front": "Name two ways official agencies contributed to manipulating public fear to justify U.S. entry into WWI.", "back": "The State Department exaggerated reports of American citizens (even infants) on torpedoed ships; the Department of Justice attributed fires, floods, and industrial accidents to German agents."}, {"front": "What \"choice of fears\" was presented to the American mob to push for WWI entry?", "back": "The first was fear of a heavily beset Germany making progress. The second, which \"engulfed the first,\" was fear of a victorious Germany thirsting for revenge on a \"false and venal friend\" (the U.S.)."}, {"front": "After the mob was reconciled to entering WWI, what remained to be done, and how was it achieved?", "back": "The problem was to convert \"reluctant acquiescence into enthusiasm,\" which was solved by \"manufacturing new fears\" and throwing the plain people into a panic on an \"epic scale.\""}, {"front": "According to the text, what was the ingenious device that gave the American people \"sufficient courage to attempt actual hostilities\" in WWI?", "back": "The draft. By relieving the \"overwhelming majority\" of any obligation to take up arms, it made them bold."}, {"front": "Explain the concept of \"altruistic eagerness\" developed by \"John Doe\" in relation to the draft during WWI.", "back": "Once individuals like \"John Doe\" knew they wouldn't have to serve, they developed a seemingly unselfish desire for war, effectively supporting conflict from a safe distance while others (Richard Roe) were conscripted."}, {"front": "Based on this section, what is Mencken's general outlook on the rationality and wisdom of the \"plain people\" in a democracy?", "back": "Highly pessimistic. He views them as easily manipulated by fear, unintelligent, susceptible to demagoguery, and prone to irrational frenzies rather than reasoned thought."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
