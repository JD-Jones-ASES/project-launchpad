<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Mencken's portrait, what three characteristics define the \"inferior man\"?", "back": "He is credulous, fearful, and incapable of abstract thought."}, {"front": "Mencken's intended audience for 'Notes on Democracy' consists of _____.", "back": "educated readers who already suspect democratic politics is a swindle"}, {"front": "How does Mencken's focus shift in Chapter 5, Section 1 compared to the previous sections?", "back": "He turns from describing the democratic citizen to the political system they sustain."}, {"front": "Mencken characterizes politics under democracy as the pursuit and \"scotching\" of _____.", "back": "bugaboos"}, {"front": "Term: Bugaboo", "back": "Definition: A nursery word for an imaginary monster, applied by Mencken to national political fears."}, {"front": "What is the rhetorical purpose of the nursery word \"bugaboo\" in Mencken's analysis?", "back": "It reduces the complex apparatus of democratic governance to a children's game."}, {"front": "Mencken recasts the democratic statesman as a \"glorified smeller and snooper\" using an allusion to which fairy tale?", "back": "Jack and the Beanstalk"}, {"front": "Who is the literary villain from 'Uncle Tom’s Cabin' included in Mencken's list of American fears?", "back": "Simon Legree"}, {"front": "Which historical figure was the Spanish military governor of Cuba included in Mencken's catalogue of bugaboos?", "back": "General Valeriano Weyler"}, {"front": "In the context of WWI, the term \"hyphenates\" referred to _____.", "back": "immigrants whose loyalty to America was questioned"}, {"front": "What is Mencken's dominant persona in Chapter 5, Section 1?", "back": "A world-weary chronicler or diagnostician standing above the political fray."}, {"front": "How does Mencken's tone shift when discussing the World War compared to earlier catalogues of bugaboos?", "back": "The tone becomes darker and more serious as he describes the manufacture of lethal fear."}, {"front": "Term: Register Mixing", "back": "Definition: The deliberate juxtaposition of formal and informal language levels for rhetorical effect."}, {"front": "Mencken's use of \"professors of mob psychology\" to describe demagogues is an example of _____.", "back": "register mixing"}, {"front": "According to the text, what is the rhetorical effect of register mixing in Mencken’s writing?", "back": "It creates irony or humor by undercutting a dignified subject with crude or low language."}, {"front": "Vocabulary: Scotching", "back": "Definition: To decisively put an end to or defeat something."}, {"front": "Vocabulary: Puissant", "back": "Definition: Powerful or mighty."}, {"front": "Vocabulary: Venal", "back": "Definition: Susceptible to bribery or corruption."}, {"front": "Vocabulary: Ignominiously", "back": "Definition: In a humiliating or disgraceful manner."}, {"front": "What rhythmic structure does Mencken use to make his catalogue of political fears seem irrefutable?", "back": "A long, rolling catalogue sentence followed by a short, sharp verdict."}, {"front": "How does the \"cumulative structure\" of Mencken's sentences contribute to his argument?", "back": "The sheer weight of accumulated details makes his observations feel like an undeniable pattern."}, {"front": "Mencken uses the contrast between a \"cross-of-gold speech\" and \"cow State political economy\" as an example of _____.", "back": "antithesis"}, {"front": "Mencken's central metaphor frames democratic politics as a _____.", "back": "witch-hunt"}, {"front": "According to Mencken, what is the primary motivation of voters in a democracy?", "back": "They do not vote for anything, but always against something."}, {"front": "What figure of speech is the rapid listing of items like \"the rum demon\" and \"the Kaiser\" for rhetorical effect?", "back": "Catalogue (or enumeratio)"}, {"front": "Mencken describes government under democracy as \"government by orgy, almost by _____.\"", "back": "orgasm"}, {"front": "In the phrase \"government by orgy,\" the word \"orgy\" implies that democratic politics is driven by _____.", "back": "collective physical excitement and emotion rather than reason"}, {"front": "Mencken argues that the processes of democracy are most \"nakedly\" displayed during _____.", "back": "war days"}, {"front": "What irony does Mencken find in the behavior of citizens safe from the draft during WWI?", "back": "They developed an \"altruistic eagerness\" for attacks they would not have to participate in."}, {"front": "The use of the word \"beautifully\" to describe the display of democratic dysfunction represents the perspective of a _____.", "back": "connoisseur or clinical observer"}, {"front": "How does Mencken transition from a comic to a serious tone without explicitly stating the change?", "back": "He shifts his diction from nursery words like \"bugaboos\" to darker terms like \"terror.\""}, {"front": "What is the rhetorical effect of placing the \"Kaiser\" next to the \"rum demon\" in a list?", "back": "It levels the items, implying democratic man treats all threats with undiscriminating panic."}, {"front": "Mencken describes the statesman as \"eternally chanting 'Fe, Fi, Fo, Fum!'\" to frame him as a _____.", "back": "childish witch-hunter chasing imaginary giants"}, {"front": "Why does Mencken use clinical language like \"manufactured\" and \"converting\" when describing WWI propaganda?", "back": "It exposes the manipulation of the public precisely by refusing to express moral outrage."}, {"front": "In Mencken's syntax, what role does the semicolon often play in his sentences of contrast?", "back": "It acts as a hinge between two parallel clauses that create a sharp antithesis."}, {"front": "The phrase \"cow State political economy\" uses a low register to deflate the platform of which historical figure?", "back": "William Jennings Bryan"}, {"front": "Mencken’s prosecutorial brief in this section relies on _____ historical evidence.", "back": "selectively chosen"}, {"front": "How does the syntax in the World War passage mirror the subject matter?", "back": "The long, winding clauses enact the complex process of fear-manufacture and propaganda."}, {"front": "Mencken's use of \"altruistic\" to describe a cowardly citizen's eagerness for war is an example of _____.", "back": "ironic reversal"}, {"front": "What does yoking \"government\" with \"orgy\" suggest about the climax of democratic governance?", "back": "It suggests that war is the honest, emotional climax of a mass-arousal political system."}, {"front": "By framing politics as superstition, Mencken implies the democratic citizen possesses _____ instincts.", "back": "pre-modern or primitive"}, {"front": "What is the primary function of Mencken's list of twenty historical bugaboos?", "back": "To demonstrate that the manufacturing of national panic is a recurring historical pattern."}, {"front": "Mencken's diction mixing scholarly terms like \"Latinate sentences\" with \"barroom\" words is the defining trait of _____.", "back": "register mixing"}, {"front": "The word \"bugaboo\" specifically mocks the _____ nature of democratic fears.", "back": "childish or imaginary"}, {"front": "Mencken’s use of \"smeller and snooper\" reduces the dignity of high office to that of a _____.", "back": "low-level detective or meddler"}, {"front": "Which historical \"bugaboo\" in Mencken's list represents a personification of the British government?", "back": "John Bull"}, {"front": "According to the analysis, Mencken's \"witch-hunt\" metaphor suggests democratic man reacts like a _____ villager.", "back": "Salem"}, {"front": "What effect does the dash have in the sentence specifying \"war days\" as an example of democracy standing naked?", "back": "It creates a pause and tonal whiplash before a devastating specific illustration."}, {"front": "The \"short sentence after the long one\" in Mencken's catalogues functions as a _____.", "back": "rhythmic punch line"}, {"front": "Mencken identifies the central goal of democratic statesmanship as the discovery and chase of _____.", "back": "monsters"}, {"front": "What does the clinical word \"diagnostician\" imply about Mencken's relationship to politics?", "back": "He views politics as a disease to be observed rather than a cause to join."}, {"front": "In Mencken's view, the \"plain people\" are primarily moved by _____ rather than positive goals.", "back": "fear (or voting against things)"}, {"front": "What historical period does Mencken cover in his catalogue of bugaboos?", "back": "From the American Revolution through the 1920s."}, {"front": "The", "back": "against democracy by selecting damaging evidence"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
