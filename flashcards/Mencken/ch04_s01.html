<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken's 'The New Psychology', what primary force governs the mind of the common man?", "back": "Fear"}, {"front": "What rhetorical strategy does Mencken employ in Chapter 4 to build upon the zoological classification used in Chapter 3?", "back": "A mock-scientific approach using experimental psychology."}, {"front": "Which psychologist and founder of behaviorism does Mencken cite to lend authority to his polemic?", "back": "Dr. John B. Watson"}, {"front": "How does Mencken use the observations of Dr. Eleanor R. Wembridge?", "back": "To highlight the limits of verbal comprehension in lower-class populations."}, {"front": "What was the dominant school of American psychology in the 1920s?", "back": "Behaviorism"}, {"front": "Behaviorism rejected the traditional method of _____ in favor of observing external behavior.", "back": "Introspection"}, {"front": "How does behaviorism explain human behavior according to John B. Watson?", "back": "As observable stimulus-response patterns."}, {"front": "What specific aspect of Watson's behaviorism does Mencken ignore to support his own arguments?", "back": "Environmentalism"}, {"front": "Mencken's prose style in this section combines the mock-scientist persona with that of the _____.", "back": "Entertainer"}, {"front": "What is the rhetorical purpose of the comic 'vaudeville' set pieces in Mencken's clinical analysis?", "back": "To keep the reader amused and demonstrate that emotions govern even the educated."}, {"front": "How does Mencken describe the relationship between reason and emotion in his own readers?", "back": "He appeals to their sense of humor to prove they are governed by feeling rather than logic."}, {"front": "Why does Mencken occasionally use 'tactical retreats' or hedges in his arguments?", "back": "To create the impression of being a fair-minded investigator while dismissing competing views."}, {"front": "In Mencken’s diction, the 'crashing together' of scientific and colloquial vocabulary is called a _____.", "back": "Collision of registers"}, {"front": "In the 'greased poles' metaphor, what does the 'grease' represent?", "back": "The inherent difficulty of genuine thought."}, {"front": "What do the 'gaudy and seductive flags' represent in Mencken's fairground metaphor?", "back": "Intellectual ideas and ambitions that appear attractive but are cheap prizes."}, {"front": "Term: Weaponized Connotation", "back": "The practice of choosing words whose emotional associations perform the work of an argument."}, {"front": "What does the word 'tabby-cats' suggest about the common man’s emotions?", "back": "That they are pampered, dependent, and trivial."}, {"front": "Definition: Connotation", "back": "The emotional association or suggestive meaning of a word beyond its literal definition."}, {"front": "Definition: Denotation", "back": "The literal dictionary definition of a word."}, {"front": "What is the connotative effect of the phrase 'insensate sweating' regarding mental life?", "back": "It suggests mindlessness, unpleasantness, and waste."}, {"front": "Term: Phylogenic", "back": "Definition: Relating to the evolutionary development of a species."}, {"front": "Why does Mencken use the word 'abysm' instead of 'abyss'?", "back": "To suggest depths in the species' past that are beyond ordinary measurement."}, {"front": "Term: Arboreal", "back": "Definition: Living in or relating to trees."}, {"front": "In the sentence 'Up each a human soul goes shinning', how does the syntax mirror the action described?", "back": "The inverted word order 'Up each' creates a sense of physical effort."}, {"front": "What register does the word 'shinning' belong to in Mencken's analysis of intellectual effort?", "back": "The colloquial and physical register."}, {"front": "What syntactic device does Mencken use in the list: 'Golf is easier; so is joining Rotary; so is Fundamentalism...'?", "back": "A descending list with syntactic parallelism."}, {"front": "What is the rhetorical effect of placing 'Golf' and 'Americanism' in the same parallel list?", "back": "It treats a leisure activity and a political ideology as equally mindless substitutes for thinking."}, {"front": "What is the dominant spatial figure Mencken uses to structure his argument on intelligence?", "back": "The metaphor of ascent (a vertical axis)."}, {"front": "In Mencken's vertical metaphor, what is located 'near the ground'?", "back": "Stupidity and the majority of humanity."}, {"front": "What is the effect of the simile comparing an infant's shaking to a 'Sunday-school superintendent taken in adultery'?", "back": "It suggests that primitive fear and social fear are fundamentally the same emotion."}, {"front": "How does Mencken’s use of the word 'adultery' in a psychology context serve his polemic?", "back": "It smuggles moral judgment and hypocrisy into an ostensibly scientific observation."}, {"front": "What does the imperative mood in 'Make a loud noise behind an infant' do to the reader?", "back": "It places the reader in the role of a scientific experimenter."}, {"front": "What does the term 'yokels' in the tooth-puller simile reveal about Mencken’s attitude?", "back": "It demonstrates a sense of quiet contempt for the common people he describes."}, {"front": "Watson claimed he could train any infant to be a specialist regardless of its _____.", "back": "Natural talents"}, {"front": "What is the function of 'five semicolons' in Mencken's list of easier alternatives to thinking?", "back": "They create a drumbeat of equivalent, mindless options."}, {"front": "Mencken uses the 'greased pole' metaphor to convert the intellectual life of the species into a _____.", "back": "County-fair competition"}, {"front": "Why is the greased-pole metaphor considered 'kinetic'?", "back": "Because it makes the reader feel the physical sensation of slipping while climbing."}, {"front": "What does Mencken imply by calling a Sunday-school superintendent a 'pillar of the community' in the context of fear?", "back": "That even the most respectable classes are governed by primitive, deserved fear."}, {"front": "In Mencken’s rhetorical strategy, what does citing names like Watson and Wembridge provide?", "back": "The appearance of a scholarly literature review."}, {"front": "What register collision occurs when Mencken uses 'human soul' and 'shinning' in the same sentence?", "back": "The philosophical register meets the colloquial register."}, {"front": "What is the 'central claim' Mencken demonstrates through his humorous prose?", "back": "The relationship between reason and emotion."}, {"front": "Mencken uses 'tabby-cats' to contrast the common man with _____.", "back": "Independent men"}, {"front": "What does 'phylogenic' suggest about the nature of fear in Mencken's view?", "back": "That it is inherited and wired into the human animal at an evolutionary level."}, {"front": "What is the 'mock-scientific' goal of comparing an infant to a superintendent?", "back": "To equalize diverse social behaviors as basic biological reflexes."}, {"front": "How does Mencken qualify his alignment with John B. Watson?", "back": "He states that 'one need not follow Dr. Watson so far'."}, {"front": "What does the word 'gaudy' contribute to the connotation of the flags on the poles?", "back": "It suggests that the goals of the climbers are showy and tasteless."}, {"front": "The simile involving 'yokels howling under the travelling tooth-puller's pliers' represents a burst of _____.", "back": "Vaudeville"}, {"front": "How does Mencken treat the theory that human fear responses are 'arboreal'?", "back": "He mentions it to show scientific engagement before dismissing it."}, {"front": "Which two items appear at the very end of Mencken's descending list of 'easier' things?", "back": "Osteopathy and Americanism"}, {"front": "In the vertical metaphor of the greased pole, what are the people at the bottom looking at?", "back": "The backsides of those above them."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
