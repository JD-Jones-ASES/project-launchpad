<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken's Section I.8, what effect does democracy have on human progress?", "back": "Democracy retards human progress at every turn by empowering the intellectual limitations of the common man."}, {"front": "Mencken's rhetorical strategy in Section I.8 is compared to which legal figure?", "back": "A prosecutor delivering a closing argument."}, {"front": "What was the specific target of the 1925 Scopes Trial in Dayton, Tennessee?", "back": "John Scopes was tried for teaching evolution in a public school."}, {"front": "What is Mencken's contemptuous term for the rural South where hookworm disease was endemic?", "back": "The Hookworm Belt."}, {"front": "Describe the dominant persona Mencken adopts in Section I.8.", "back": "An encyclopedic satirist who uses vast learning to express contempt for the mob."}, {"front": "How does the tone of Section I.8 differ from earlier sections of Mencken's work?", "back": "It is angrier and more genuinely indignant, particularly regarding the persecution of art and science."}, {"front": "According to the text, what do Mencken's 'polished periods' and disciplined prose represent in opposition to the mob?", "back": "They represent the order and learning that the chaotic mob threatens."}, {"front": "What principle governs the vocabulary Mencken uses to describe the common man?", "back": "Systematic degradation."}, {"front": "Term: Ameliorating", "back": "Definition: Making something better or improving conditions."}, {"front": "Term: Farrago", "back": "Definition: A confused mixture or hodgepodge."}, {"front": "Term: Cosmogonies", "back": "Definition: Theories regarding the origin of the universe."}, {"front": "Term: Proscribe", "back": "Definition: To forbid or condemn, often in a legal sense."}, {"front": "Mencken uses the colloquial term _____ to describe a jail, deflating the gravity of the mob's tyranny.", "back": "calaboose"}, {"front": "What is the rhetorical purpose of the long list of proper names like Homer and Bach in Mencken's text?", "back": "It serves as a sorting mechanism to separate the educated readers from the mob."}, {"front": "Definition: Periodic Sentence", "back": "A sentence that delays its main idea or grammatical completion until the very end."}, {"front": "What specific psychological effect does the periodic sentence create for the reader?", "back": "It creates suspense and a sense of authority by withholding the verdict until the final clause."}, {"front": "Mencken's rhythmic shift from formal catalogues to blunt, comic punchlines is known as his _____ move.", "back": "signature"}, {"front": "In Mencken's prose, what does the 'syntax of the list' or enumeration signify?", "back": "It creates an overwhelming sense of evidence for the common man's ignorance."}, {"front": "What is the dominant figure of speech used in Section I.8?", "back": "Analogy."}, {"front": "Mencken's comparison of human thought to fermentation in a _____ reduces consciousness to simple chemistry.", "back": "barrel of cider"}, {"front": "To what biological specimen does Mencken compare the difficulty of teaching cosmology to peasants?", "back": "Streptococci."}, {"front": "How does Mencken use the Department of Agriculture as a case study in structural irony?", "back": "He notes that the farmers the department helped almost unanimously opposed its existence."}, {"front": "What hypothetical scenario does Mencken use to close the section?", "back": "A musician being arrested and jailed for playing Bach in rural Tennessee."}, {"front": "According to the close reading of Section I.8, who are the 'exclusive possessors' of human progress?", "back": "Small minorities that are often unpopular and disreputable."}, {"front": "How does the sound of the phrase 'small minorities' contribute to the tone of Mencken's sentence?", "back": "The echoed 'm' sounds give the phrase a quiet, mournful quality."}, {"front": "In the phrase 'chiefly unpopular and disreputable,' why is the word 'unpopular' considered ironic?", "back": "It implies that democracy's own standard of popularity condemns its most valuable contributors."}, {"front": "Why does Mencken refer to the common man as 'Homo neandertalensis'?", "back": "To apply zoological diction that denies the common man the capacity for rational thought."}, {"front": "What historical event in 1925 directly influenced Mencken's references to 'anti-evolution acts'?", "back": "The Scopes Trial."}, {"front": "How does Mencken distinguish between scientific 'cosmogonies' and the Book of Genesis?", "back": "He frames scientific theories as 'inordinately complex' markers of intellectual worth compared to the simple creation story."}, {"front": "Mencken describes the common man's perception of Greek as a jargon spoken by _____.", "back": "boot-blacks"}, {"front": "In Mencken's humorous analogy, who is the composer Wagner confused with by the common man?", "back": "A retired baseball player."}, {"front": "What does Mencken use as an 'incantation' of things the mob cannot comprehend?", "back": "A grand catalogue of historical names like Aristotle, Plato, and Beethoven."}, {"front": "Why is the comparison of human thought to a 'biochemical process' rhetorically effective for Mencken?", "back": "It allows him to dismiss the validity of political opinions as mere biological bubbles."}, {"front": "The phrase 'finest fruits' is an example of which sound-based rhetorical device?", "back": "Alliteration."}, {"front": "In a periodic sentence, the reader is held in a state of _____ until the final clause snaps the meaning into focus.", "back": "incomplete understanding"}, {"front": "What does Mencken suggest is 'as vain' as teaching cosmology to peasants?", "back": "Teaching streptococci."}, {"front": "Mencken's use of the word 'calaboose' originates from which language?", "back": "Spanish (from 'calabozo')."}, {"front": "By comparing the common man to 'horned cattle,' Mencken is using a technique called _____.", "back": "systematic degradation"}, {"front": "What is the intended effect of Mencken's 'accumulation of evidence' strategy?", "back": "To create a sense of inevitability that crushes potential objections."}, {"front": "Mencken portrays the Scopes Trial as a collision between Enlightenment reason and _____.", "back": "democratic ignorance"}, {"front": "Which specific group of people does Mencken describe as denouncing Shakespeare?", "back": "Baptist clergymen."}, {"front": "Mencken's defense of art against the mob is described as the one place where his _____.", "back": "mask slips and genuine feeling shows through"}, {"front": "Mencken uses formal Latinate words for reforms to emphasize the gap between the concept's sophistication and the _____.", "back": "crudeness of the opposition"}, {"front": "The reader who does not recognize Mencken's list of historical figures is implicitly classified as part of the _____.", "back": "mob"}, {"front": "What does Mencken's syntax of enumeration suggest about the quantity of the common man's ignorance?", "back": "It suggests the quantity of ignorance is itself evidence against democratic theory."}, {"front": "The 'barrel of cider' metaphor is described as having _____ precision, lending it rhetorical authority.", "back": "pseudo-scientific"}, {"front": "In Mencken's view, the institutions that serve the mob are often the very ones the mob _____.", "back": "resists"}, {"front": "What is the function of parenthetical amplification in the sentence about the 'finest fruits of human progress'?", "back": "It raises the emotional stakes before the final verdict of the sentence is delivered."}, {"front": "Mencken frames the possession of progress by small minorities as a _____ but inescapable fact.", "back": "tragic"}, {"front": "The vocabulary of 'tragic,' 'finest,' and 'nobler' represents what register in Mencken's diction?", "back": "High seriousness."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
