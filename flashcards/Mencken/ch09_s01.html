<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 9, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's central argument regarding the relationship between progress and democracy?", "back": "Mencken contends that progress is the work of a rare and gifted few, and democracy is the engine that grinds them down.", "id": "fc01"}, {"front": "How does Mencken describe the 'inferior man's' understanding and attitude towards liberty?", "back": "The inferior man, being a natural slave, is unable to understand the desire for liberty in his superiors, envies those who harbor it, and is eager to put them down.", "id": "fc02"}, {"front": "According to Mencken, what is the typical fate of genuine justice in a democracy?", "back": "Justice is always unpopular and in difficulties under democracy, save for a 'false form' of so-called social justice designed to get labor more than its fair share.", "id": "fc03"}, {"front": "Provide examples Mencken uses to illustrate the 'proletarian' willingness to suppress the rights of others.", "back": "Mencken cites the American Legion and the American Federation of Labor aiding the 'pogrom against Reds' after WWI, and the city workman mourning beer loss but not liberty during Prohibition.", "id": "fc04"}, {"front": "Where do protests against violations of justice and decency typically originate in a democratic state, according to Mencken?", "back": "Such protests come from the 'higher levels,' where a few genuine believers in liberty and justice survive.", "id": "fc05"}, {"front": "What analogy does Mencken use to emphasize the rarity and difficulty of cultivating a libertarian mindset?", "back": "He states, 'It takes quite as long to breed a libertarian as it takes to breed a race-horse. Neither may be expected to issue from a farm mare.'", "id": "fc06"}, {"front": "What is Mencken's controversial assertion about the masses' role in the 'progress of the world,' even when it benefits them?", "back": "He claims the whole progress of the world, even in ameliorating the lot of the masses, is always opposed by the masses.", "id": "fc07"}, {"front": "How does the history of the American Department of Agriculture exemplify Mencken's claim about the masses' opposition to their own benefit?", "back": "Farmers opposed the Department's establishment and for years kept it feeble, despite its work providing immense benefits that reduced their labor and augmented profits.", "id": "fc08"}, {"front": "What happened when John Adams proposed a Weather Bureau, according to Mencken?", "back": "He was denounced as an idiot and a scoundrel by the public, as detailed by Henry Adams.", "id": "fc09"}, {"front": "Describe the public's reaction to measures for safeguarding public health, according to Mencken, using the Los Angeles example.", "back": "Mencken states that all public health measures are opposed by the majority; in Los Angeles, a vaccination ordinance was rejected via referendum, leading to a smallpox spread, after which the alarmed proletariat turned to quacks.", "id": "fc10"}, {"front": "Explain the paradox of Germany's social legislation under Bismarck, as described by Mencken.", "back": "Germany's advanced social legislation (workingmen's insurance, minimum wage, child labor) was ferociously fought 'step by step' by its intended beneficiaries, the workingmen themselves.", "id": "fc11"}, {"front": "Summarize Sir Henry Maine's argument about the potential impact of genuinely effective universal suffrage on progress.", "back": "Maine argued that universal suffrage would have prohibited major scientific inventions and social changes throughout history, due to the populace's resistance to innovation.", "id": "fc12"}, {"front": "What specific examples did Sir Henry Maine give of things universal suffrage would have prevented or caused?", "back": "He claimed it would have prohibited the spinning-jenny and power loom, forbidden the threshing-machine, prevented the adoption of the Gregorian Calendar, restored the Stuarts, and proscribed Catholics and Dissenters.", "id": "fc13"}, {"front": "List some 'anti-progress' laws in the United States that Mencken attributes to the 'lower orders.'", "back": "Mencken points to anti-evolution acts, anti-vivisection and anti-contraception statutes, laws licensing osteopaths and other frauds, and acts depriving enlightened minorities of free assembly and speech.", "id": "fc14"}, {"front": "What 'irrational' notion does Lecky criticize regarding popular government and progress?", "back": "Lecky criticizes the notion that increased ignorance in the elective body will convert into increased capacity for good government in the representative body, and that placing government under the least enlightened classes secures rational progress.", "id": "fc15"}, {"front": "Why, according to Mencken, is 'Homo neandertalensis' (the average person) hostile to exact knowledge?", "back": "They are against it because it is complex, occult to their 'dark mind,' puts an unbearable burden on their 'meagre capacity for taking in ideas,' and propels them into the realm of the unknowable and alarming.", "id": "fc16"}, {"front": "What kind of knowledge or explanations do the masses prefer, and why?", "back": "They prefer short-cuts, simple formulæ, and revelation because they are simple and understandable, while complex ideas puzzle and dismay them.", "id": "fc17"}, {"front": "Provide examples of popular 'short-cuts' or 'quackeries' that Mencken mentions as appealing to the 'submerged.'", "back": "Superstitions, political platitudes, chiropractic, osteopathy, Christian Science, spiritualism, and Fundamentalism.", "id": "fc18"}, {"front": "How does Mencken explain the vast popularity of Fundamentalism among peasants?", "back": "He explains it by its simplicity: the cosmogony of Genesis is easy for a 'yokel' to grasp, unlike the complex cosmogonies of educated men, and it provides an excuse for hating their betters.", "id": "fc19"}, {"front": "What does Mencken claim about the average human being's knowledge of the sciences and fine arts, even in civilized states?", "back": "He states they are as ignorant as 'horned cattle in the fields' regarding subjects like histology, protozoology, philology, paleontology, chemistry, biology, physics, anatomy, physiology, and the fine arts.", "id": "fc20"}, {"front": "How does the average person perceive someone with specialized knowledge, according to Mencken?", "back": "Such a person seems 'a ridiculous figure, with a touch of the sinister.'", "id": "fc21"}, {"front": "What analogy does Mencken use to describe the average man's understanding of basic sciences, specifically chemistry and biology?", "back": "He says the average man's life is a biochemical process comparable to what goes on in a 'barrel of cider,' yet he knows no more about chemistry than a cow and no more about biology than its calf.", "id": "fc22"}, {"front": "Name some historically significant figures in philosophy, science, and art that Mencken claims the average person has never heard of.", "back": "Euripides, Hippocrates, Aristotle, Plato, Vesalius, Newton, Roger Bacon, and Wagner (mistaking him for a baseball player).", "id": "fc23"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
