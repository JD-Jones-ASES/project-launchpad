<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 25, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken, what is the primary reason democracy is the 'most charming' form of government?", "back": "It is based upon propositions that are palpably not true."}, {"front": "What trait in the majority of men makes them prefer untruths over the truth?", "back": "An incurable romanticism that finds truth harsh and final."}, {"front": "Which 'ancient promise' does Mencken identify as being at the bottom of both democracy and Christianity?", "back": "The promise that the lowly shall inherit the earth."}, {"front": "How does Mencken rank the authority given to the promise of the lowly inheriting the earth in democracy versus Christianity?", "back": "Democracy gives it a higher credit and authority than Christianity."}, {"front": "What psychological feeling does the 'mob man' gain by functioning as a citizen in a democracy?", "back": "The feeling that he is important and genuinely running things."}, {"front": "Mencken attributes a 'sense of vast and mysterious power' to which groups participating in democracy?", "back": "Archbishops, police sergeants, and the grand goblins of the Ku Klux Klan."}, {"front": "According to Mencken, what conviction makes United States Senators and fortune-tellers happy?", "back": "The conviction that they are wise and that their views are taken seriously."}, {"front": "What emotional state is derived by 'hangmen and husbands' from the democratic system?", "back": "A glowing consciousness of a high duty triumphantly done."}, {"front": "How does Mencken characterize the various forms of happiness derived from democracy?", "back": "They are illusory and do not last."}, {"front": "Mencken claims the democrat's disaster is rooted in the 'naïve delusion' that happiness is obtained by _____.", "back": "Taking it away from the other fellow."}, {"front": "According to the text, what is the 'true charm' of democracy intended for?", "back": "The spectator, rather than the democrat."}, {"front": "Mencken argues that the 'fraud of democracy' is more amusing than the fraud of which other major institution?", "back": "Religion."}, {"front": "Which specific democratic invention does Mencken suggest provides 'paled and palsied' mirth when considered soberly?", "back": "Law Enforcement."}, {"front": "Who is the 'typical democratic prophet' referred to by Mencken as the 'late Archangel'?", "back": "William Jennings Bryan."}, {"front": "To what 'self-limiting disease' does Mencken tentatively compare democracy?", "back": "Measles."}, {"front": "What does Mencken mean when he describes democracy as 'self-devouring'?", "back": "Its tendency to abandon its whole philosophy at the first sign of strain."}, {"front": "How do 'tribunes of democracy' behave when national safety is menaced?", "back": "They convert themselves into despots of fabulous ferocity."}, {"front": "Which three U.S. Presidents does Mencken explicitly name as examples of democratic leaders becoming despots?", "back": "Lincoln, Roosevelt, and Wilson."}, {"front": "Which two historical figures does Mencken place in the 'background, waiting to be recalled' as democratic despots?", "back": "Jackson and Cleveland."}, {"front": "According to Mencken, what is the 'corner-stone' of democracy's political metaphysic?", "back": "Liberty."}, {"front": "What specific event does Mencken cite as 'gaudily humorous' evidence of democracy warring against liberty?", "back": "Americans being jailed for reading the Bill of Rights."}, {"front": "What paradox does Mencken identify regarding the 'mob' in a democracy?", "back": "The mob is competent to rule others but must be rigorously policed itself."}, {"front": "What is the paradox regarding the concept of a government of 'laws, not men'?", "back": "Men are set upon benches to decide finally what the law is and may be."}, {"front": "What 'first assumption' meets a citizen who essays to discharge their duty to the state?", "back": "An assumption of the citizen's disingenuousness and dishonor."}, {"front": "Mencken states that democracy is 'incomparably idiotic' and therefore 'incomparably _____.'", "back": "Amusing."}, {"front": "How does Mencken view the 'rascality' found at the heart of democracy?", "back": "He suggests it may be necessary to human government and civilization itself."}, {"front": "Mencken defines civilization, at its bottom, as potentially being nothing but a _____.", "back": "Colossal swindle."}, {"front": "What is Mencken's final question regarding the possibility of being a 'sincere' democrat?", "back": "He asks how any man can be a democrat who feels for the people being debauched."}, {"front": "According to Mencken, what is the end result of the human quest for happiness?", "back": "Unhappiness."}, {"front": "How does Mencken describe his own sympathies when it comes to the 'suckers' in a democracy?", "back": "His sympathies tend to be coy."}, {"front": "What does Mencken claim is 'always immensely more fascinating' to the majority of men than truth?", "back": "What is not true."}, {"front": "Under democracy, axioms resolve into 'thundering paradoxes' that often amount to _____.", "back": "Downright contradictions in terms."}, {"front": "What 'seeds of disaster' lie within the democrat's own nature?", "back": "Stupidity."}, {"front": "Mencken compares the joy of Presbyterians on the Last Day to what animal?", "back": "Chicks stepping out of an egg."}, {"front": "What is the result of 'maudlin herding after rogues and mountebanks' for the common citizen?", "back": "A sense of vast and mysterious power."}, {"front": "According to Mencken, all forms of government are 'enemies' to which type of people?", "back": "Laborious and virtuous men."}, {"front": "How long does Mencken claim Americans have borne the 'rascality' of their democracy?", "back": "Since 1776."}, {"front": "What aspect of truth is said to collide with the 'incurable romanticism' of the masses?", "back": "Its air of finality."}, {"front": "In democracy, the feeling that a citizen is 'genuinely running things' is an example of what?", "back": "Objective and demonstrable truth appearing to be real when it is not."}, {"front": "What is the 'mathematical formula' result for the fulfillment of democratic promises?", "back": "A depressing set of chances against their fulfillment."}, {"front": "Mencken observes that democracy tends to kill the thing it theoretically _____.", "back": "Loves."}, {"front": "What humorous comparison does Mencken use to contrast monarchy's treatment of subjects with democracy's?", "back": "Monarchy jailing subjects for maintaining the divine right of Kings."}, {"front": "How does Mencken justify the pain of seeing 'dunderheads' and 'cads' exalted in a democracy?", "back": "The pain is obliterated by the joy of seeing them come down."}, {"front": "Mencken describes the democratic state as having an 'ineradicable tendency' to do what at the first sign of strain?", "back": "Abandon its whole philosophy."}, {"front": "What 'glowing consciousness' makes a hangman happy in a democratic society?", "back": "The sense of a high duty triumphantly done."}, {"front": "According to Mencken, what is the 'true charm' of the show of democracy?", "back": "Its heroic absurdity and welter of fraud."}, {"front": "What happens 'invariably' in democratic states when national safety is menaced?", "back": "The process of leaders converting themselves into despots begins."}, {"front": "What does Mencken report about the spectacle of 'suckers' when they are 'running well'?", "back": "The spectacle is infinitely exhilarating."}, {"front": "Term: The Mob Man.", "back": "Definition: The average citizen in a democracy who derives a false sense of importance and power from political participation."}, {"front": "Concept: Self-devouring government.", "back": "Definition: A political system, like democracy, that tends to destroy its own foundational principles (such as liberty) through its internal operations."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
