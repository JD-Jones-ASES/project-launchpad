<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 11, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken, in whom does sovereignty actually reside in democratic states?", "back": "The lowly Christian (the common citizen)."}, {"front": "Mencken argues that if the democratic citizen is swindled, it is due to their _____ and imbecility.", "back": "credulity"}, {"front": "Why does Mencken consider the precise form of government (monarchy vs. republic) to be of \"small importance\"?", "back": "All forms are essentially the same structure of a mob versus self-seeking minorities."}, {"front": "What is the \"camorra\" in Mencken’s analysis of the democratic state?", "back": "Self-seeking minorities that attempt to inflame, delude, and victimize the mob."}, {"front": "Mencken describes the democratic political process as a \"mere battle of _____ _____.\"", "back": "rival rogues"}, {"front": "Why does the democratic mob typically choose to follow \"thieves\"?", "back": "The mob understands their words and cherishes their ideas."}, {"front": "What group does Mencken claim is the \"theoretical and in fact the ultimate judge of all ideas\"?", "back": "The mob."}, {"front": "Mencken notes that the mob can only decide for an honest minority through the \"hand of God\" or some \"_____.\"", "back": "miracle"}, {"front": "What is the common Liberal remedy for the perceived organic diseases of representative government?", "back": "A resort to a \"purer\" democracy (e.g., the initiative and referendum)."}, {"front": "How does the \"purer democracy\" model attempt to change the role of the representative?", "back": "It converts the representative into a mere clerk or messenger."}, {"front": "Who are the \"stall-fed Rousseaus\" Mencken mentions as advocates for direct democracy?", "back": "People from \"cow States\" who occasionally reach high political office."}, {"front": "What specific tools does the Liberal propose to ensure voters have the final determination on public questions?", "back": "The recall, the initiative, and the referendum."}, {"front": "Mencken labels the idea that \"the cure for the evils of democracy is more democracy\" as simple _____.", "back": "rhetoric"}, {"front": "What is Mencken's assessment of the historical success of \"purer democracy\" measures?", "back": "They fail ingloriously every time they are tried."}, {"front": "Mencken compares the myth of collective law-making to the debunked theory of how _____ _____ were composed.", "back": "popular ballads"}, {"front": "Who actually authored the popular ballads that survive from earlier ages?", "back": "Concrete poets who were mostly not of the folk."}, {"front": "In Mencken's ballad analogy, what was the limited function of the \"folk\"?", "back": "They acted as referees by choosing which ballads would survive."}, {"front": "Who actually formulated the measures adopted in New England town-meetings?", "back": "A few men of unusual initiative and determination (demagogues and fanatics)."}, {"front": "What force moved the citizens in New England town-meetings more powerfully than the Beatitudes?", "back": "Blood."}, {"front": "What usually triumphed over reason in the decisions of New England town-meetings?", "back": "Appeals to mere prejudice and superstition."}, {"front": "According to Mencken, what is the appetite for logic among citizens compared to their \"fear of hell\"?", "back": "Logic seldom gets the better of the fear of hell."}, {"front": "Why is the difference between representative and direct democracy less marked than political sentimentalists assume?", "back": "Both forms require the sovereign mob to employ agents to execute its will."}, {"front": "What happens to the agents of the mob because of their very position of power?", "back": "They become \"politicians ex officio\" and gain influence above that of ordinary citizens."}, {"front": "What does Mencken claim agents usually do with their remaining influence after securing their own ends?", "back": "They sell it."}, {"front": "What is the primary cognitive obstacle to the functionality of any democratic form?", "back": "The congenital inability of the generality of citizens to comprehend complex problems."}, {"front": "How did professional theologians lead the New England town-meetings?", "back": "They acted as quacks with something to sell, leading the \"ardent amateurs\" of theology."}, {"front": "Who do modern American masses look to for leadership in national policy?", "back": "Professional politicians."}, {"front": "Professional politicians are influenced by small, determined minorities with \"_____ _____ and special interests.\"", "back": "special knowledge"}, {"front": "How does Mencken describe the American public's entry into the \"late war\"?", "back": "They were shoved into it by politicians despite being overwhelmingly against going in."}, {"front": "What two qualities does Mencken claim the \"plain people\" lacked to stay out of the war?", "back": "Sense and resolution."}, {"front": "According to Mencken, the lowly Christian is not only the glory of democratic states but also their _____.", "back": "boss"}, {"front": "In a representative democracy, the people are left only with the \"function of _____.\"", "back": "referees"}, {"front": "Why are \"scattered\" and \"unorganized\" citizens unable to formulate desires quickly?", "back": "They are grouped into huge, unworkable units."}, {"front": "Mencken asserts that some of the most \"idiotic decisions\" in history were made by _____ _____ town-meetings.", "back": "New England"}, {"front": "The leaders of New England town-meetings are sarcastically described as \"ineffable blossoms of the contemporary _____.\"", "back": "Kultur"}, {"front": "What immutable principles guide modern Americans in national policy, according to Mencken?", "back": "Principles of almost religious authority."}, {"front": "Mencken describes the \"university pundits\" as wasting \"a great deal of _____ _____ _____\" discussing types of democracy.", "back": "paper and ink"}, {"front": "What is the ultimate source of power in a democracy, according to the text?", "back": "The mob."}, {"front": "Why is it often impossible to ascertain voter views post hoc?", "back": "The citizens are unable to consider comprehended problems in an unbiased manner."}, {"front": "What role does Mencken assign to the \"professional politicians\" of today relative to the public?", "back": "They provide the leading that the masses look for."}, {"front": "Mencken defines \"imbecility\" as the quality of being extremely _____.", "back": "foolish"}, {"front": "What does Mencken claim is the mob's actual power over \"rival rogues\"?", "back": "The power to throw them off at will or whim."}, {"front": "Mencken uses _____ as an example of a \"constitutional monarchy\" that is essentially the same as other democracies.", "back": "England"}, {"front": "Mencken uses _____ as an example of a \"representative republic\" in his analysis.", "back": "France"}, {"front": "According to Mencken, does the mob ever have \"all the relevant facts\" before them in a town-meeting?", "back": "No, and they make no effort to unearth them."}, {"front": "What is the \"sad story\" that every Liberal knows regarding representative government?", "back": "The inability of the people to formulate or enforce their virtuous desires."}, {"front": "Mencken identifies the New England town-meeting leaders as being, for the most part, simply \"_____ _____ _____.\"", "back": "demagogues and fanatics"}, {"front": "According to Mencken, do agents in a democracy have \"ideas of their own\"?", "back": "Yes, based upon interests of their own."}, {"front": "Mencken argues that citizens remain unable to comprehend problems even if they are \"_____ _____.\"", "back": "assiduously... instructed"}, {"front": "The determined minorities that influence politicians are described as being \"small but _____.\"", "back": "competent"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
