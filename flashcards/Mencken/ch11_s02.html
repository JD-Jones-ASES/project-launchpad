<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 11, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's central question in Part II of *Notes on Democracy*?", "back": "He asks whether the distinction between direct and representative democracy truly matters."}, {"front": "What is Mencken's direct answer to his central question about direct vs. representative democracy?", "back": "He answers that the distinction is \"simply rhetoric,\" setting up the argument for the rest of Part II."}, {"front": "What primary rhetorical strategy does Mencken use to demolish the distinction between direct and representative democracy?", "back": "He uses analogy, comparing political theory to more familiar situations to make his point vivid and concrete."}, {"front": "Define \"analogy\" as it's used in rhetoric and argumentation.", "back": "An analogy is an extended comparison between two things, typically for explanation or clarification, mapping a familiar situation onto an unfamiliar one to make it seem obvious."}, {"front": "Describe Mencken's persona and tone in this section.", "back": "He adopts the persona of a world-weary political realist, addressing an audience of fellow skeptics with a conversational, authoritative tone, punctuated by dryly devastating asides."}, {"front": "How does Mencken use \"concession\" as a rhetorical device in this section?", "back": "He signals fairness by appearing to grant his opponents' strongest points (e.g., \"some of them genuinely superior\") before delivering a critical blow, making his critique more potent."}, {"front": "What are the three distinct registers of diction Mencken employs in this section?", "back": "The language of political science, the language of contempt, and the language of mock-concession."}, {"front": "Explain the term \"camorra\" as Mencken uses it in the context of democratic politics.", "back": "Mencken uses \"camorra\" to describe the self-serving minorities that he believes dominate democratic politics, lending them an air of criminal glamour like an organized ring of conspirators."}, {"front": "Analyze the meaning and effect of Mencken's phrase \"stall-fed Rousseaus.\"", "back": "It's a devastating compound modifier that reduces democratic idealists to mere livestock, implying they are fattened without genuine insight and that they are common, interchangeable types."}, {"front": "What does Mencken mean by \"philologues of defective powers of observation\"?", "back": "It's a mock-academic phrase used contemptuously to describe scholars who, despite their specialized knowledge, fail to grasp practical realities or observe the world accurately."}, {"front": "What is the typical structure and rhythm of Mencken's sentences in this section?", "back": "His sentences tend to be long and cumulative, building clause upon clause before arriving at a short, decisive verdict or \"punchline.\" This creates a theatrical effect."}, {"front": "How does Mencken's use of the dash in Part II differ from his use in Part I?", "back": "In Part II, the dash is used more for qualification and concession, giving the prose a measured, judicial rhythm suited for building an argument. In Part I, it was often for comic interruption."}, {"front": "Define \"tricolon\" and explain its effect when Mencken uses it.", "back": "A tricolon is a series of three parallel clauses or phrases. Mencken uses it to create a rhythm of exhaustive enumeration, suggesting that all forms of government ultimately reduce to the same underlying reality."}, {"front": "Explain Mencken's central analogy comparing the New England town-meeting.", "back": "He compares it to the composition of folk ballads, arguing that just as ballads were written by 'concrete poets' and the 'folk' merely chose which survived, town meetings were led by a few dominant personalities while citizens only went 'through the motions of deciding.'"}, {"front": "Describe Mencken's second analogy comparing the sovereignty of democratic citizens.", "back": "He compares it to the sovereignty of absolute monarchs, observing that even kings were constrained. This suggests that all forms of sovereignty, including that of democratic citizens, are constrained and partial, making the distinction seem trivial."}, {"front": "What is \"Irony Through Concession\" as Mencken employs it?", "back": "It's a device where Mencken appears to grant his opponents' strongest points but then drains them of all substance through qualifications (e.g., \"under the hand of God,\" \"by some miracle\"), making the conceded possibilities seem fantastically improbable."}, {"front": "In the phrase \"in point of fact,\" what does this signal to the reader in Mencken's writing?", "back": "It signals a shift from comfortable myths or illusions to what Mencken presents as the blunt, inconvenient reality, indicating that illusions are about to be shattered."}, {"front": "What is the significance of the phrase \"concrete poets\" in Mencken's ballad analogy?", "back": "It emphasizes individual authorship against the romantic abstraction of 'the folk,' highlighting that specific individuals, not a collective, are the true creators, much like individual leaders in a democracy."}, {"front": "According to Mencken's ballad analogy, what was the actual role of 'the folk' in creating ballads?", "back": "The folk \"simply acted as referees, choosing which should survive,\" reducing their role from active creators to passive judges or ratifiers in a process resembling a game."}, {"front": "What larger argument about democracy does Mencken's ballad analogy serve to support?", "back": "It supports his argument that apparent democracy is actually oligarchy, where the many merely ratify what a powerful few have already decided."}, {"front": "What is the overall effect Mencken's triple register diction has on the reader?", "back": "It makes the reader feel simultaneously informed, entertained, and superior, flattering them by assuming they can understand political terminology while also enjoying its demolition."}, {"front": "To what does Mencken extend his skepticism in Part II, beyond the competence of ordinary voters?", "back": "He extends his skepticism to the democratic institutions that those ordinary voters have built."}, {"front": "What type of political distinction does Mencken aim to \"demolish\" in this section?", "back": "He aims to demolish the distinction between direct democracy and representative democracy, which political scientists consider fundamental."}, {"front": "What note of impatience distinguishes this section from Part I of *Notes on Democracy*?", "back": "Mencken expresses impatience with the argument he is dismantling, implying that the distinction between direct and representative democracy is not even worth serious refutation, but a nuisance to be swept aside."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
