    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>

<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 7, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

    <script>
    var CARDS = [{"front": "According to Mencken, what is the fundamental philosophical nature of democracy?", "back": "Mencken argues that democracy is not a political system but a philosophy, specifically a philosophy of envy, driven by the inferior man's desire for what his betters possess and hatred for them."}, {"front": "Which German philosopher heavily influenced Mencken's view of democracy, and what key concept did Mencken adapt?", "back": "Mencken was deeply influenced by Friedrich Nietzsche, adapting the concept of *ressentiment*—the disguised envy the weak feel toward the strong."}, {"front": "Define Nietzsche's concept of *ressentiment*.", "back": "*Ressentiment* is a particular form of envy felt by those powerless to act on their desires. It involves a transformation of values where the envious person declares the thing they cannot have to be evil and their own deprivation to be a virtue."}, {"front": "How did Mencken apply *ressentiment* to American society?", "back": "Mencken argued that democratic moralism (e.g., Prohibition, censorship, blue laws) is *ressentiment* on a national scale, where those unable to enjoy certain pleasures declare them sinful and use government to suppress them."}, {"front": "How did Mencken translate Nietzsche's abstract philosophical concepts for an American audience?", "back": "Mencken translated Nietzsche into concrete American terms by creating vivid narrative scenes, such as the Iowa farmer peering at his 'slatternly wife' and dreaming of Chicago cabarets."}, {"front": "What was Mencken's primary rhetorical strategy to make complex philosophical ideas accessible and memorable for American readers in this section?", "back": "Mencken illustrated theory not with philosophical argument but with specific, often humorous, narrative scenes (like the farmer in his barn) that made the abstract point unforgettable."}, {"front": "Describe the dramatic shift in Mencken's persona and tone within a single paragraph in this section.", "back": "Mencken shifts from an academic philosopher (quoting French, using abstract terminology) to a comic novelist, painting the farmer's life with 'Dickensian relish and cruelty,' combining sympathetic and savage tones."}, {"front": "Why is Mencken's portrait of the farmer described as 'caricature' rather than journalism?", "back": "Caricature is Mencken's chosen mode; he exaggerates details to reveal what he considers the 'essential truth' beneath the surface, rather than aiming for factual accuracy."}, {"front": "What is a primary rhetorical device Mencken uses in his diction and vocabulary in this section to perform his argument?", "back": "Mencken employs 'register collisions,' alternating between the sophisticated language of European philosophy (e.g., French literary quotation) and the crude language of the American barnyard ('slatternly wife')."}, {"front": "Explain the significance of Mencken's use of 'panem et circenses' in this section.", "back": "Mencken applies 'panem et circenses' (Latin for 'bread and circuses,' the Roman formula for keeping the populace docile) directly to the American welfare state, implying that social services are instruments of control."}, {"front": "How does Mencken use 'mock-celebratory diction' when describing the welfare state's social services?", "back": "He describes the welfare state with the language of advertising or boosterism ('elaborate machinery,' 'brilliant, aseptic'), creating irony by highlighting the gap between brochure promises and the concealed reality of control."}, {"front": "Describe the effect of Mencken's 'rhetorical question series' in the barn-door passage.", "back": "The series builds to a crescendo of increasingly longer and more elaborate questions, creating a rhythm of ascending desperation or comedy that highlights the farmer's unreachable desires for city pleasures."}, {"front": "What is Mencken's 'signature move' in syntax, exemplified after the rhetorical questions in the barn-door passage?", "back": "He uses a long, lyrical build-up (the swooning rhetorical questions) followed by a devastatingly short, flat declarative sentence ('The yokel peeks...') to create a rhythmic and thematic crash from mock-romance to squalor."}, {"front": "How does Mencken's use of the 'cumulative sentence' in the proletarian passage contribute to his argument?", "back": "He piles clause upon clause, enumerating benefits and services until the sheer weight of the list becomes comic, illustrating how the urban worker's envy is 'managed and sublimated' and they are rendered docile."}, {"front": "Define 'hyperbole' as a rhetorical figure, and explain how Mencken uses it.", "back": "Hyperbole is deliberate exaggeration not meant to be taken literally, but to push a claim beyond factual boundaries to reveal an underlying truth. Mencken uses it as a sustained rhetorical mode, pitching the entire section at a level of deliberate excess."}, {"front": "What does the 'barn-door scene' function as, specifically in relation to Mencken's argument about *ressentiment*?", "back": "It functions as an extended metaphor for *ressentiment* itself, rendering the concept in narrative form, where the farmer's envy and transformation of unreachable desires into 'sin' illustrate Nietzsche's idea."}, {"front": "How does 'antithesis' structure the larger argument of this section?", "back": "Antithesis structures the argument by contrasting elements like the farmer with the city dweller, rural theology with urban cynicism, and Prohibition with the cabaret, all to illustrate that envy arises from proximity to what one cannot have."}, {"front": "Where is 'irony' most concentrated in this section, and how does it operate?", "back": "Irony is most concentrated in the proletarian passage, where Mencken describes the welfare state with apparent admiration, presenting social services as triumphs while structurally implying they are instruments of control."}, {"front": "According to Nietzsche, what did 'master morality' and 'slave morality' represent?", "back": "*Master morality* represented the values of the strong (courage, creativity, independence), while *slave morality* represented the values of the weak (pity, humility, obedience)."}, {"front": "What specific words exemplify Mencken's 'register collisions' regarding the farmer and the cabaret?", "back": "Words like 'glabella' (clinical, for a headache) and 'slatternly' (contemptuous, for the wife) contrast with archaic 'sackbuts' (mock-poetic for cabaret music) and French literary quotation."}, {"front": "How does the tone shift in the section's second half, when discussing the city proletarian, compared to the farmer's portrait?", "back": "The tone becomes more analytical and less vivid, shifting from the 'mockery of a novelist' to the 'mockery of a sociologist,' with longer, more measured prose that details the 'managed and sublimated' envy of the urban worker."}, {"front": "What is the significance of 'frou-frou' as the section's final word?", "back": "The final word, 'frou-frou' (a rustling sound of silk), exquisitely conveys that the city proletarian is close enough to luxury to hear its presence but not to touch it, symbolizing a different, more sublimated form of envy than the farmer's."}, {"front": "What does Mencken suggest the 'barn door' symbolizes in the extended metaphor of the farmer's scene?", "back": "The barn door symbolizes the barrier between desire and morality: on one side, the desired world of cabaret pleasures; on the other, the farmer's world, which he has made virtuous by declaring the first one evil."}, {"front": "What is the core difference Mencken highlights between the farmer's envy and the city worker's envy?", "back": "The farmer's envy is portrayed as 'raw and violent,' driven by direct deprivation, while the city worker's envy is 'managed and sublimated' through the provision of extensive social services that keep them docile."}, {"front": "How does Mencken's use of statistical precision like 'six and a half million farmers' serve a rhetorical purpose in his hyperbole?", "back": "The mock-scientific precision gives the exaggeration an air of authority, pushing the claim beyond factual boundaries to reveal an underlying 'truth' Mencken perceives, like the 'unmitigated monogamy' of farmers."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
