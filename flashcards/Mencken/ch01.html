<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Henry Louis Mencken (1880–1956)?", "back": "He was the most feared, most quoted, and most entertaining journalist in American history, known for his influential and distinctive prose style."}, {"front": "What is the primary focus when reading Mencken's prose in this book?", "back": "The focus is on *how* he writes and builds his arguments through language, rather than judging *what* he thinks."}, {"front": "Name the six elements of the analytical framework used to read Mencken's prose.", "back": "Rhetorical Context, Voice and Tone, Diction and Vocabulary, Syntax and Rhythm, Figures of Speech, and Close Reading."}, {"front": "What does the 'Rhetorical Context' step of analysis involve?", "back": "Identifying who Mencken is addressing, what he wants his reader to think/feel/do, and his stance toward his subject."}, {"front": "How does 'Voice and Tone' analysis contribute to understanding Mencken?", "back": "It examines the persona Mencken projects and the emotional quality of his writing (e.g., ironic, solemn, playful, furious), noting any shifts within the passage."}, {"front": "Define *Irony* and explain how Mencken often uses it.", "back": "Saying one thing while meaning another, or the opposite. Mencken's prose is saturated with *verbal irony*, where he often appears to praise what he actually despises."}, {"front": "What is *Hyperbole* and what is its effect in Mencken's writing?", "back": "Deliberate exaggeration for emphasis or effect, not intended to be taken literally. Mencken uses it to shock the reader into attention and expose what he considers the absurdity of his target."}, {"front": "Define *Antithesis*.", "back": "The placement of contrasting ideas in parallel grammatical structures. It sharpens an argument by making the contrast between two ideas impossible to miss."}, {"front": "Differentiate between a *Periodic Sentence* and a *Cumulative Sentence*.", "back": "A *Periodic Sentence* withholds its main idea until the end, building suspense. A *Cumulative Sentence* states its main idea first, then adds detail through a series of modifying phrases and clauses."}, {"front": "How does Mencken utilize *Periodic Sentences* and *Cumulative Sentences* in his writing?", "back": "He uses periodic sentences to build elaborate arguments whose conclusions hit with delayed impact, and cumulative sentences to pile up evidence, examples, or insults for an effect of overwhelming accumulation."}, {"front": "What is *Register* in language, and what is Mencken's 'signature technique' related to it?", "back": "Register is the level of formality in language. Mencken's signature technique is *register mixing*, where he drops slang into formal sentences or inserts scholarly Latin into street-level attacks, creating humor and rhetorical force."}, {"front": "Define *Diction* and *Connotation*.", "back": "*Diction* is word choice. *Connotation* refers to the emotional associations a word carries beyond its literal meaning. Mencken chooses words for their connotative weight to achieve his rhetorical purposes."}, {"front": "What is the fundamental role of a *Figure of Speech* in skilled writing, according to the text?", "back": "Figures of speech are not mere ornaments; in skilled hands, they are the argument itself, departing from literal meaning for rhetorical effect."}, {"front": "What was Mencken's view of daily journalism, and why did he value it?", "back": "He believed daily journalism was the most honest form of writing because it demanded clarity, speed, and contact with the actual world."}, {"front": "What was Mencken's general stance towards academics and conventional literary criticism?", "back": "He distrusted academics, despised 'professors of English,' and considered most literary criticism a 'species of fraud.'"}, {"front": "Which American authors did Mencken champion, opposing the 'genteel tradition'?", "back": "He championed writers like Theodore Dreiser (raw naturalism) and Sinclair Lewis (satirical novels)."}, {"front": "What literary values did Mencken prioritize over the 'genteel tradition'?", "back": "He valued vitality over propriety, honesty over elegance, and genuine talent over approved mediocrity."}, {"front": "What was *The American Language* (1919), and what did it demonstrate about Mencken?", "back": "It was his scholarly masterpiece, a monumental study of how American English diverged from British English, demonstrating his genuine erudition and patience for detail beneath his journalistic flair."}, {"front": "What was the purpose of Mencken's *Prejudices* series (six volumes, 1919–1927)?", "back": "It collected his literary and cultural criticism, amounting to a sustained assault on everything he found dishonest, sentimental, or dull in American culture."}, {"front": "List three of Mencken's main targets or 'enemies'.", "back": "Puritanism, Prohibition, evangelical Christianity, political demagogues, academic pedantry, popular sentimentality, and 'the uplift' (any three)."}, {"front": "Who were some of Mencken's intellectual heroes or what ideas did he champion?", "back": "He admired Friedrich Nietzsche's contempt for herd morality, the natural aristocracy of talent and intelligence, and the independent mind that refused to bow to public opinion."}, {"front": "What is the primary effect of Mencken's characteristic 'register mixing'?", "back": "The collision between formal and informal language produces both humor and rhetorical force, often serving to deflate pretension."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
