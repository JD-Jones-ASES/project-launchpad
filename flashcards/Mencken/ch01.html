<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Henry Louis Mencken, known as 'the Sage of Baltimore'?", "back": "H.L. Mencken (1880–1956) was an American journalist, essayist, satirist, and cultural critic, known for his flamboyant and aggressive prose style."}, {"front": "When and where was H.L. Mencken born?", "back": "Mencken was born on September 12, 1880, in Baltimore, Maryland, a city he loved and refused to leave."}, {"front": "What was Mencken's primary motivation for writing, despite describing his childhood as 'absurdly happy'?", "back": "He did not write out of personal grievance, but because 'the world offended his intelligence,' leading to his lifelong hostility to sentimentality."}, {"front": "What was Mencken's first newspaper job, and how quickly did he advance?", "back": "He started at the Baltimore Morning Herald in February 1899 at age eighteen and became city editor within four years."}, {"front": "Which newspaper did H.L. Mencken spend most of his career with, and what was a notable feature he wrote?", "back": "He joined The Baltimore Sun in 1906, remaining associated with the Sunpapers for most of his career. His 'Monday Articles' in the Evening Sun became widely read."}, {"front": "What famous 1925 trial did Mencken cover, and what was his stance on it?", "back": "He covered the Scopes Trial, formally The State of Tennessee v. John Thomas Scopes, where he savaged William Jennings Bryan and the anti-evolution movement."}, {"front": "What personal tragedy deeply affected Mencken in 1935?", "back": "His wife, Sara Haardt, died from tuberculosis in 1935 after a happy marriage, a loss that profoundly impacted him."}, {"front": "How did Mencken primarily identify his profession, and what values did he associate with it?", "back": "He was, 'first and last, a newspaper man,' believing daily journalism demanded clarity, speed, and contact with the actual world."}, {"front": "How did Mencken view academic literary criticism compared to his own approach?", "back": "He distrusted academics and 'professors of English,' considering most literary criticism a 'species of fraud.' His own criticism pronounced judgment loudly and confidently rather than analyzing."}, {"front": "Name two prominent American novelists Mencken championed, and what literary style did they represent?", "back": "He championed Theodore Dreiser for his raw naturalism and Sinclair Lewis for his satirical novels about small-town America."}, {"front": "What was 'the genteel tradition' that H.L. Mencken strongly opposed?", "back": "The genteel tradition, coined by George Santayana, described the polite, moralistic, and increasingly lifeless literary culture that dominated American letters in the late 19th century, which Mencken considered his personal enemy."}, {"front": "What was H.L. Mencken's 'scholarly masterpiece,' and what was its subject?", "back": "His scholarly masterpiece was *The American Language* (1919), a monumental study of how American English diverged from British English."}, {"front": "What was the purpose and distinctive nature of Mencken's 'Prejudices' series?", "back": "The six volumes of *Prejudices* (1919–1927) collected his literary and cultural essays, serving as a sustained assault on everything he found dishonest, sentimental, or dull in American culture. The title was deliberately provocative."}, {"front": "List some of H.L. Mencken's frequent targets or 'enemies' in American culture.", "back": "His enemies included Puritanism, Prohibition, evangelical Christianity, political demagogues, academic pedantry, popular sentimentality, and 'the uplift' (democratic moralism)."}, {"front": "Who were some of Mencken's 'heroes' or intellectual inspirations?", "back": "His heroes were Friedrich Nietzsche, the natural aristocracy of talent and intelligence, and the independent mind that refused to bow to public opinion."}, {"front": "Explain 'register mixing' as a characteristic of Mencken's prose style.", "back": "Mencken would drop slang and colloquial language into sentences of otherwise formal diction, creating a clash that deflated pretension and kept the reader off balance."}, {"front": "How did Mencken use 'hyperbole' in his writing?", "back": "He routinely overstated his case by a factor of ten, using exaggeration not as carelessness but as a deliberate technique to dare the reader to find the real argument underneath."}, {"front": "Describe Mencken's use of 'mock-scientific diction' in his style.", "back": "He borrowed vocabulary from biology, medicine, and psychology to discuss politics and culture, treating human folly as a clinical specimen."}, {"front": "What was the effect of Mencken's 'devastating short sentences' in his prose?", "back": "After building up a long, complex argument, he would drop a two- or three-word sentence that delivered the final, lethal verdict, creating a strong contrast."}, {"front": "What literary magazine did Mencken co-edit with George Jean Nathan before founding *The American Mercury*?", "back": "He co-edited *The Smart Set* with George Jean Nathan from 1914 to 1923, transforming it into a vehicle for iconoclastic criticism and new American fiction."}, {"front": "When did Mencken launch *The American Mercury*, and what was its distinctive visual feature?", "back": "He launched *The American Mercury* in January 1924, published by Alfred A. Knopf, known for its signature green cover."}, {"front": "Describe the target audience for *The American Mercury*.", "back": "Its audience was the educated skeptic, the college student wanting to distinguish themselves, and the young professional who despised small-town values."}, {"front": "What did reading *The American Mercury* signify about its readers?", "back": "It marked them as someone who had outgrown conventional pieties and gave them 'permission to feel superior.'"}, {"front": "List some of the recurring targets in Mencken's monthly editorials for *The American Mercury*.", "back": "He consistently attacked Puritanism, Prohibition, democratic mediocrity, evangelical religion, censorship, and academic pomposity."}, {"front": "What major national event led to a sharp decline in Mencken's cultural influence after 1930?", "back": "The stock market crash in October 1929 and the subsequent Great Depression made his aristocratic scorn for the common man seem cruel and obscene."}, {"front": "What physical ailment severely impacted Mencken's ability to work late in life?", "back": "On November 23, 1948, he suffered a massive stroke that left him unable to read or write, a cruel blow for a man whose life was built around the written word."}, {"front": "What were three of H.L. Mencken's major works?", "back": "His major works included *The American Language* (1919), the six volumes of *Prejudices* (1919–1927), and *Notes on Democracy* (1926)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
