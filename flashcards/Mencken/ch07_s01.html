<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Mencken argues that democracy is not merely a political system, but a philosophy of _____.", "back": "Envy"}, {"front": "Which German philosopher's critique of herd morality serves as the intellectual framework for Mencken's analysis?", "back": "Friedrich Nietzsche"}, {"front": "What is Nietzsche's term for the disguised envy that the weak feel toward the strong?", "back": "Ressentiment"}, {"front": "According to Nietzsche, what values characterize \"master morality\"?", "back": "Courage, creativity, and independence."}, {"front": "According to Nietzsche, what values characterize \"slave morality\"?", "back": "Pity, humility, and obedience."}, {"front": "Nietzsche argued that Christianity and democracy were both expressions of _____.", "back": "Slave morality"}, {"front": "How does Mencken translate Nietzsche’s \"Christian asceticism\" into a concrete American context?", "back": "He substitutes it with Prohibition."}, {"front": "In the context of ressentiment, how does an envious person transform the value of something they cannot have?", "back": "They declare the unreachable thing to be evil and their own deprivation to be a virtue."}, {"front": "Concept: Ressentiment", "back": "Definition: Envy felt by the powerless that rebrands the desired object as sinful and the lack of it as moral superiority."}, {"front": "What fable illustrates ressentiment by depicting a creature declaring unreachable grapes to be sour?", "back": "The Fox and the Grapes"}, {"front": "Mencken views democratic moralism—such as Prohibition and censorship—as _____ on a national scale.", "back": "Ressentiment"}, {"front": "What narrative scene does Mencken use to illustrate the abstract concept of ressentiment for an American audience?", "back": "The Iowa farmer peering through a barn door at his life while dreaming of the city."}, {"front": "Mencken's persona shifts from a philosopher quoting Heine to a _____ painting a barnyard scene with Dickensian relish.", "back": "Comic novelist"}, {"front": "How does Mencken justify the use of caricature in his depiction of the Iowa farmer?", "back": "He exaggerates the figure to reveal what he considers the essential truth beneath the surface."}, {"front": "How does the envy of the city proletarian differ from the envy of the farmer in Mencken's analysis?", "back": "The farmer's envy is raw and violent, while the city worker's is managed and sublimated."}, {"front": "Mencken's move between French literary quotes and barnyard descriptions is an example of what rhetorical device?", "back": "Register collision"}, {"front": "What is the primary rhetorical purpose of Mencken's \"Register Collisions\"?", "back": "To show the exalted theory of democracy dissolving into the squalid reality of democratic life."}, {"front": "Term: Glabella", "back": "Definition: The smooth area of the forehead between the eyebrows."}, {"front": "Term: Slatternly", "back": "Definition: Slovenly or untidy, typically used by Mencken to describe the farmer's wife."}, {"front": "What does Mencken use the archaic word \"sackbuts\" to describe?", "back": "The music of the cabaret that the farmer can never visit."}, {"front": "Term: Antinomianism", "back": "Definition: The rejection of moral law, used by Mencken to describe urban sexual liberation."}, {"front": "What Latin phrase does Mencken apply to the American welfare state's method of keeping the populace docile?", "back": "Panem et circenses (Bread and circuses)"}, {"front": "Term: Frou-frou", "back": "Definition: The rustling sound of a woman's silk dress."}, {"front": "Mencken uses _____ diction, similar to advertising or boosterism, to ironically describe the welfare state.", "back": "Mock-celebratory"}, {"front": "What syntactic structure does Mencken use to build a sense of desperation or absurdity regarding the farmer's longing?", "back": "A series of rhetorical questions."}, {"front": "What rhythmic \"signature move\" does Mencken use after a long, lyrical build-up?", "back": "A devastatingly flat, short sentence."}, {"front": "Term: Hyperbole", "back": "Definition: Deliberate exaggeration intended to reveal an underlying truth rather than to be taken literally."}, {"front": "How does Mencken use specific statistics, like \"six and a half million farmers,\" for rhetorical effect?", "back": "He uses them hyperbolically to grant the exaggeration a sense of mock-scientific authority."}, {"front": "The passage cataloging the social services of the city worker uses _____ sentences to create a comic effect through accumulation.", "back": "Cumulative"}, {"front": "Mencken compares the city proletarian to a \"_____ in a comfortable sty\" to emphasize state control over freedom.", "back": "Hog"}, {"front": "What does the \"barn door\" represent in Mencken's extended metaphor for ressentiment?", "back": "The barrier between the world the farmer desires and the world he has made virtuous by declaring desire evil."}, {"front": "How does Mencken use antithesis to structure his argument?", "back": "He contrasts the rural farmer with the city dweller and rural theology with urban cynicism."}, {"front": "According to the text, the city worker's advantage over the farmer consists entirely in his proximity to _____.", "back": "Temptation (or entertainment)"}, {"front": "In the close reading of Mencken's prose, the phrase \"melancholy heaving of manure\" is a mixture of what two registers?", "back": "The poetic and the earthy."}, {"front": "A rhetorical figure consisting of three parallel clauses or phrases is called a _____.", "back": "Tricolon"}, {"front": "In the sentence ending \"a Prohibitionist by conscience,\" what is the function of the dash?", "back": "It acts as a dramatic pause that separates the narrative scene from its psychological diagnosis."}, {"front": "What does Mencken mean by saying a farmer is a Prohibitionist \"by conscience\"?", "back": "The belief is a psychological necessity to avoid admitting envy, rather than a rational position."}, {"front": "The phrase \"doubly-riveted and immovable\" is a metaphor drawn from _____ to describe moral conviction.", "back": "Metalwork"}, {"front": "Mencken's description of the city proletarian's obstetric care as \"brilliant\" and \"aseptic\" is an example of _____ irony.", "back": "Structural"}, {"front": "Mencken published an early English-language study of Nietzsche in 1908 titled _____.", "back": "The Philosophy of Friedrich Nietzsche"}, {"front": "What does Mencken suggest is the real reason behind the farmer's support for blue laws?", "back": "A desire to suppress the pleasures of the city that he cannot enjoy."}, {"front": "In Mencken's description, the city worker is a \"passive recipient\" of social services, which reduces him to a state of _____.", "back": "Docility (or management)"}, {"front": "How does Mencken characterize the rhythm of the farmer's life in the barn-door scene?", "back": "As a subsidence into \"dung\" following a mock-lyrical suspension."}, {"front": "Mencken uses the term \"unmitigated _____\" to hyperbolically describe the farmer's domestic situation.", "back": "Monogamy"}, {"front": "What term does Mencken use to describe the farmer's cider drinking to emphasize his isolation?", "back": "Onanism"}, {"front": "Mencken’s analysis of the city proletarian adopts the mockery of a _____ rather than a novelist.", "back": "Sociologist"}, {"front": "Why does Mencken use clinical terms like \"glabella\" in a comic description of a farmer?", "back": "To create a register collision between medical precision and squalid reality."}, {"front": "According to the text, what does the city worker hear that the farmer does not, symbolizing his proximity to luxury?", "back": "The frou-frou of perfumed skirts."}, {"front": "In Nietzsche's view, slave morality was a system designed to restrain the _____ for the benefit of the weak.", "back": "Strong"}, {"front": "Mencken claims the \"inferior man\" does not actually want liberty or justice, but rather _____.", "back": "What his betters have."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
