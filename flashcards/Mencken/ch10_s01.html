<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 10, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Rhetorical function of Section I.9 in Mencken's 'The Eternal Mob'", "back": "It serves as a peroration, gathering the themes of Part I into a compressed summation."}, {"front": "Mencken's primary verdict on 'the mob' in Section I.9", "back": "The mob is a permanent feature of civilization, not a temporary condition."}, {"front": "The bridge function of Section I.9 within the book's structure", "back": "It concludes the study of democratic man to prepare for the study of democratic institutions in Part II."}, {"front": "Characterize the rhetorical 'voice' adopted by Mencken in Section I.9", "back": "A secular prophet pronouncing judgment with finality and liturgical rhythm."}, {"front": "Compare the tone of Section I.9 to the earlier sections of Part I", "back": "I.9 is predominantly bleak and bitter, whereas earlier sections mixed contempt with wit."}, {"front": "Identify the target of Mencken's 'iconoclast' voice in the second paragraph of I.9", "back": "Democratic religion, specifically the influence of the Apostle Paul."}, {"front": "Rhetorical purpose of using words like 'eternally' and 'infallibly' in this section", "back": "To create a world of finality where reform is presented as futile and debate as pointless."}, {"front": "Definition of the word 'nether' in Mencken’s diction", "back": "Lower or situated below, suggesting the common man inhabits a type of underworld."}, {"front": "Meaning of the adjective 'improvident' in Mencken's indictment", "back": "Lacking foresight or failing to provide for the future."}, {"front": "Origin and significance of the term 'Stammvater'", "back": "German for ancestor or progenitor; it signals Mencken's intellectual debt to Nietzsche."}, {"front": "Why does Mencken apply the term 'blackguard' to the Apostle Peter?", "back": "To acknowledge Peter's scoundrel-like faults as preferable to Paul’s sanctimoniousness."}, {"front": "Ironical usage of the word 'hosannas' in Section I.9", "back": "It describes the mob's shouts of praise for tyrants and butchers rather than saviors."}, {"front": "Rhetorical effect of pairing proper names like 'Nero' vs. 'Galileo'", "back": "They serve as shorthand for the mob’s perverse judgment and hostility toward excellence."}, {"front": "Structure of a 'cumulative' (or loose) sentence", "back": "It begins with the main clause and then adds details and modifying phrases."}, {"front": "Rhetorical effect of cumulative sentences in Mencken’s writing", "back": "They overwhelm the reader with an expanding wave of evidence and imagery."}, {"front": "Structure of a 'periodic' sentence", "back": "The main idea arrives last, following a sequence of subordinate elements."}, {"front": "Primary rhetorical strategy of a periodic sentence", "back": "To hold the reader in suspense until a dramatic reveal or final verdict."}, {"front": "Contrast between cumulative and periodic sentences in terms of movement", "back": "Cumulative syntax provides abundance and saturation, while periodic syntax provides suspense."}, {"front": "Dominant structural figure of speech used throughout Section I.9", "back": "Antithesis, specifically the pairing of opposites."}, {"front": "Definition of 'litotes' as used by Mencken", "back": "Understatement achieved through negation, such as saying progress is only 'an inch'."}, {"front": "Example of litotes regarding human progress in I.9", "back": "The claim that man has only moved 'an inch' in two thousand years."}, {"front": "Pattern of Mencken's antithetical pairings in this section", "back": "The first element represents the mob's enthusiasm for evil/mediocrity; the second represents its hostility toward good."}, {"front": "Mencken's metaphorical", "back": "A stew flavored with remnants of Greek demonology borrowed from 'soul-snatchers'."}, {"front": "Purpose of the 'seven fried chickens' detail regarding mob-masters", "back": "To ground a theological critique in a physical, comic detail that makes them seem ridiculous."}, {"front": "Meaning of shifting belief in witches to the 'political sphere'", "back": "Reframing ancient superstition as contemporary political behavior."}, {"front": "Sequence of adjectives in the phrase 'lazy, improvident and unclean'", "back": "A tricolon arranged in ascending order of severity from mundane fault to biblical curse."}, {"front": "Definition: Tricolon", "back": "A rhetorical structure consisting of three parallel elements, often escalating in weight."}, {"front": "Phonetic effect of the alliteration in 'preposterous' and 'priests'", "back": "The hard 'p' sounds create a spitting quality that conveys audible contempt."}, {"front": "Relationship between the 'main clause' and 'additions' in Mencken's cumulative logic", "back": "The opening point is established immediately, and subsequent layers make it feel richer and inevitable."}, {"front": "Mencken's view on the effect of reform and education on the mob", "back": "He argues that no amount of education or reform will change the mob's fundamental nature."}, {"front": "Historical figure Mencken pairs with the inquisitor Torquemada", "back": "Nero."}, {"front": "Historical figure Mencken pairs with the adventurer Cagliostro", "back": "Georges Danton."}, {"front": "Rhetorical implication of the 'four-footed brothers' imagery", "back": "It characterizes the common man's existence as bestial and animalistic."}, {"front": "Definition of a 'peroration'", "back": "The concluding section of a speech or argument that gathers main themes and intensifies emotion."}, {"front": "Function of the colon in Mencken’s cumulative sentence structure", "back": "It acts as a gate that opens into a further expansion of the sentence's meaning."}, {"front": "Symbolic meaning of the 'lynching-party' in Mencken's progress scale", "back": "A modern form of barbarism equivalent to the 'sports of the arena'."}, {"front": "Mencken's characterization of 'mob-masters'", "back": "Individuals who terrorize and enchant the mob with 'insane damnations'."}, {"front": "Significance of the 'Methodist revival' in Mencken’s antithesis", "back": "He equates its 'obscenities' with those of the ancient Roman Saturnalia."}, {"front": "Audience addressed in Section I.9", "back": "The educated reader who has followed the preceding eight sections of argument."}, {"front": "Purpose of Mencken's 'vocabulary of finality'", "back": "To shut down debate by suggesting that the mob's failings are eternal and without exception."}, {"front": "Effect of the repeated 'Such is' pattern in the opening of Section I.9", "back": "It creates the cadence of a formal sermon or a funeral oration."}, {"front": "Mencken's critique of P.T. Barnum and William Jennings Bryan", "back": "He uses them as a pairing to suggest the mob's heroes are merely different tiers of charlatans."}, {"front": "Definition: Loose Sentence", "back": "Another term for a cumulative sentence, which begins with the main clause and adds detail."}, {"front": "In Mencken's analysis, who does the mob 'instinctively' support?", "back": "Tyrants and fraudulent figures like Nero, Torquemada, and Cagliostro."}, {"front": "In Mencken's analysis, who does the mob 'instinctively' oppose?", "back": "Seekers of truth and reformers like Galileo, Savonarola, and Danton."}, {"front": "Contrast in sound between 'preposterous' and 'lazy, improvident and unclean'", "back": "The former is sharp and spitting; the latter is a weary, resigned catalogue."}, {"front": "Rhetorical effect of proper names as 'argumentative weapons'", "back": "They sort the reader: those who recognize the names join the elite; those who do not are grouped with the mob."}, {"front": "How does Mencken degrade theology in his", "back": "He uses a culinary metaphor, reducing theology to a 'stew' flavored by 'soul-snatchers'."}, {"front": "The significance of the word 'unclean' in the context of the common man", "back": "It invokes biblical exclusion and suggests a fundamental lack of moral or physical purity."}, {"front": "Mencken's definition of human progress relative to the common man", "back": "Something that passes him by, with its 'finest fruits' remaining beyond his reach."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
