<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 23, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken, what is the 'operating principle' of democracy, rather than a mere disease of the system?", "back": "Corruption (or bribery)."}, {"front": "Mencken defines democracy itself as a form of wholesale _____.", "back": "bribery."}, {"front": "Which German publicist and diplomat does Mencken cite as a disillusioned defender of parliamentary systems?", "back": "Friedrich von Gentz."}, {"front": "Mencken's argument that the herd is not just stupid but complicit in its own exploitation is described as highly _____.", "back": "Nietzschean."}, {"front": "What persona does Mencken adopt in Chapter 23, Section 1?", "back": "The worldly-wise observer (or veteran journalist)."}, {"front": "Which rhetorical register does Mencken use to deliver a thesis statement so blunt it refuses to be misunderstood?", "back": "The clinical register."}, {"front": "The register in which Mencken marshals evidence from figures like Tocqueville and Henry Adams is the _____ register.", "back": "historian's"}, {"front": "What is the primary function of Mencken's satirical register?", "back": "To make the argument memorable through images rather than logic."}, {"front": "Mencken's use of the lexicon of commerce and criminality is intended to strip democracy of its _____ vocabulary.", "back": "idealistic"}, {"front": "Term: prehensile", "back": "Definition: Capable of grasping. Example: Mencken uses it to describe the animal greed of minorities in the mob."}, {"front": "What term does Mencken use to describe evasions or shifts of allegiance with a scholarly, Latinate tone?", "back": "Tergiversations."}, {"front": "In Mencken's vocabulary, what does the colloquial word 'rooked' mean?", "back": "Cheated or swindled."}, {"front": "Term: conies", "back": "Definition: Rabbits; by extension, dupes or gulls. Example: Reference to Elizabethan confidence trick literature."}, {"front": "How does Mencken combine the Italian-flavored 'Americano' with street-level slang like 'rooked'?", "back": "Through register mixing."}, {"front": "What is the characteristic syntactic signature of Mencken's writing in this section?", "back": "The long, accumulative sentence using semicolons."}, {"front": "The syntactic pattern 'one day... the next day... the day after' creates a rhythm of _____.", "back": "escalation."}, {"front": "In Mencken's prose, what punctuation mark acts as a 'stage whisper' to deliver direct judgments?", "back": "The dash."}, {"front": "Rhetorical Device: Anaphora", "back": "Definition: The repetition of a word or phrase at the beginning of successive clauses to create rhythm or emphasis."}, {"front": "Unlike inspirational oratory, Mencken uses anaphora to create a sense of _____ in his indictments.", "back": "accumulation."}, {"front": "What is the dominant extended metaphor Mencken uses to describe democratic government?", "back": "A commercial transaction (or marketplace)."}, {"front": "In Mencken's commercial metaphor, the citizen is viewed as a _____ rather than a sovereign.", "back": "customer (or 'mark')."}, {"front": "In the whiskey parable, what three ingredients compose the 'fraudulent' whiskey discovered after uncorking?", "back": "Pepper, prune juice, and wood alcohol."}, {"front": "What does the whiskey represent in Mencken's parable of the democratic citizen?", "back": "The promise of self-government."}, {"front": "The phrase 'specialists in rectitude' is an example of _____ because Mencken presents virtue as a social disability.", "back": "irony"}, {"front": "According to the close reading of the text, in what form does public opinion 'gush out' in its raw state?", "back": "The mob's fears."}, {"front": "The word 'immemorial' in the context of the mob's fears suggests that these fears are a _____ feature of human nature.", "back": "permanent"}, {"front": "Mencken uses the word _____ to describe the location where raw public opinion is flavored, colored, and processed.", "back": "factories"}, {"front": "What do the passive constructions 'is piped' and 'is flavoured' suggest about the citizen's agency?", "back": "They strip the citizen of all agency."}, {"front": "What is the 'coup de gr\\^ace' image that reduces the ideal of self-government to an industrial process?", "back": "Canned opinions (or putting opinion into cans)."}, {"front": "Mencken's use of the word 'canned' implies that public opinions are mass-produced and _____.", "back": "fraudulent (or artificial)."}, {"front": "What specific historical administration does Mencken use as an example of democratic corruption alongside the Grant era?", "back": "The Wilson administration."}, {"front": "Mencken argues that revolution is impossible because the _____ has learned to manipulate democratic institutions effectively.", "back": "plutocracy"}, {"front": "In the 'one day... next day' sentence, what group is referred to as 'a government within the general government'?", "back": "The labour leaders."}, {"front": "Which historical figure's disillusionment with democratic governance does Mencken use to lend respectability to his argument?", "back": "Friedrich von Gentz."}, {"front": "Why does Mencken use the word 'gushes' to describe the eruption of public opinion?", "back": "To suggest abundance and a lack of control."}, {"front": "The setting of the 'contraband whiskey' parable refers to which specific era in American history?", "back": "Prohibition (1920s)."}, {"front": "Mencken's 'clinical register' poses the question: 'Why should democracy rise against bribery?' What is his blunt answer?", "back": "It is itself a form of wholesale bribery."}, {"front": "According to the text, the 'day after' the labour leaders and their dupes are bought, who must be bribed next?", "back": "Manufacturers, Methodists, Catholics, and farmers."}, {"front": "What is the rhetorical effect of placing 'Americano' next to 'rooked' and 'officially'?", "back": "It creates a collision between high office and low conduct."}, {"front": "Mencken's transition between clinical, historical, and satirical registers is a _____ strategy.", "back": "rhetorical"}, {"front": "The metaphor of democracy as a marketplace is never stated formally but is built through _____.", "back": "accumulated commercial vocabulary."}, {"front": "In Mencken's industrial metaphor, what are 'central factories' used for?", "back": "Processing raw fears into standardized public opinion."}, {"front": "What adjective does Mencken use to describe the obscure 'evasions' of democratic politicians to make them sound scholarly?", "back": "Tergiversations."}, {"front": "Concept: The Mob's Perspective", "back": "Mencken argues that from the mob's perspective, democratic corruption is entirely rational."}, {"front": "What does Mencken's syntactic pattern in the 'bribery parade' enact for the reader?", "back": "The endless, exhausting process of democratic deal-making."}, {"front": "What term does Mencken use to imply that a citizen is a victim of a confidence trick, echoing Elizabethan pamphlets?", "back": "Conies."}, {"front": "In Mencken's view, democracy is not self-government but the industrial processing of _____ into compliance.", "back": "fear"}, {"front": "Mencken's persona as a man who 'reads Machiavelli for fun' is established through his _____.", "back": "register mixing (high and low diction)."}, {"front": "What is the 'immemorial form' of raw public opinion according to the text?", "back": "Mob fears."}, {"front": "The purpose of the satirical register in Mencken's argument is to ensure the argument is _____ as well as understood.", "back": "felt"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
