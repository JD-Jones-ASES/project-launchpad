<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 26, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Part I of Notes on Democracy, what Rousseauian concept does Mencken attempt to dismantle?", "back": "The myth of the noble, self-governing citizen."}, {"front": "What Nietzschean term does Mencken use to describe the average citizen in Part I?", "back": "The inferior man."}, {"front": "According to Mencken, why is genuine self-government impossible for the average citizen?", "back": "Because of the citizen's inherent intellectual limitations."}, {"front": "What four characteristics does Mencken attribute to the 'Democratic Man' in Part I?", "back": "Credulous, envious, hostile to excellence, and easily led by demagogues."}, {"front": "What is the primary rhetorical strategy Mencken employs in Part I?", "back": "Diagnosis, where he adopts the persona of a clinical observer."}, {"front": "Term: Homo boobiens", "back": "Definition: A mock-scientific coinage used by Mencken to reduce the political category of the common man to a zoological joke."}, {"front": "What tone does Mencken adopt in the first part of his argument to maintain the appearance of objectivity?", "back": "Amused detachment."}, {"front": "How does Mencken utilize 'register mixing' as a rhetorical tool in Part I?", "back": "By combining mock-scientific vocabulary with taxonomic metaphors to express contempt."}, {"front": "What structural role do rhetorical tools like hyperbole and antithesis play in Mencken's argument?", "back": "They are not ornaments but the substance of the argument itself."}, {"front": "In Part II, Mencken shifts his focus from the individual citizen to what subject?", "back": "The democratic state and its institutions."}, {"front": "According to Part II, what is the governing principle behind democratic elections and legislation?", "back": "The selection of mediocrity."}, {"front": "In Mencken's view of the democratic state, how is the 'able man' treated compared to the demagogue?", "back": "The able man is punished for his ability, while the demagogue is rewarded for flattering the mob."}, {"front": "How does the rhetorical strategy shift from Part I to Part II?", "back": "It moves from clinical diagnosis to legalistic prosecution."}, {"front": "What change in Mencken's syntax reflects the shift toward a prosecutorial strategy in Part II?", "back": "The sentences become more elaborate and feature punishing periodic constructions."}, {"front": "Term: Zeugma", "back": "Definition: A rhetorical device introduced in Part II to build the cumulative weight of Mencken's polemic."}, {"front": "In Part II, Mencken uses the _____ as a rhetorical device to build a case against democratic institutions.", "back": "catalogue"}, {"front": "What is the central subject of Part III of Notes on Democracy?", "back": "Democratic moralism, including Prohibition and censorship."}, {"front": "What does Mencken identify as the 'Puritan impulse' in democratic society?", "back": "The drive to regulate private behavior in the name of public virtue."}, {"front": "According to Mencken, why is democracy the 'most dangerous enemy' of liberty?", "back": "Because the mob cannot tolerate dissent and uses state machinery to enforce intolerance."}, {"front": "How does the tone of the text change in Part III compared to the earlier sections?", "back": "It shifts from amused detachment and prosecutorial energy to genuine anger."}, {"front": "Term: Congeries", "back": "Definition: A rhetorical technique of piling up examples with a relentless rhythm of accumulation, used in Part III."}, {"front": "How does Mencken define a 'libertarian' in the context of his work?", "back": "A temperamental individualist who opposes all government interference in private life."}, {"front": "In Mencken's view, what is the natural relationship between the state and personal freedom?", "back": "The state is the natural enemy of personal freedom."}, {"front": "Why is the eruption of direct anger in Part III considered a powerful rhetorical strategy?", "back": "It carries force because the reader has been conditioned by the previous parts to expect mockery."}, {"front": "What 'grim forecast' does Mencken provide in the section titled 'The Future of Democracy'?", "back": "Democracy will persist because its alternatives are worse and the mob desires the illusion of self-government."}, {"front": "What ironic confession does Mencken make in the 'Last Words' section of the book?", "back": "He enjoys democracy because its idiocy is incomparably amusing."}, {"front": "What rhetorical strategy defines Part IV of Notes on Democracy?", "back": "Withdrawal, where the diagnostician and prosecutor both step down."}, {"front": "How does the prose style change in Part IV to achieve its 'devastating effect'?", "back": "The vocabulary simplifies, sentences shorten, and hyperbole is replaced by understatement."}, {"front": "Mencken's four-part rhetorical arc consists of diagnosis, prosecution, _____, and withdrawal.", "back": "outrage"}, {"front": "What classical structure does the overall arc of Notes on Democracy mirror?", "back": "The structure of a legal case, including the statement of facts, argument, emotional appeal, and peroration."}, {"front": "Why is the sequence of tonal shifts in Notes on Democracy considered a macro-level rhetorical technique?", "back": "Because it operates at the scale of the entire book to perform an argument rather than just stating one."}, {"front": "What is the rhetorical function of mock-scientific terms like 'Homo vulgaris'?", "back": "To give the appearance of objective classification to Mencken's contempt."}, {"front": "Under what condition does Mencken believe the mob will surrender the illusion of self-government?", "back": "Mencken argues the mob will never voluntarily surrender that illusion."}, {"front": "In Part II, how does Mencken describe the democratic state's requirement for incompetence?", "back": "The state does not just tolerate incompetence; it actively requires it for its survival."}, {"front": "Which rhetorical tool involves the use of contrast between two opposing ideas, as seen in Part I?", "back": "Antithesis."}, {"front": "How does Mencken describe the relationship between democratic machinery and the mob in Part III?", "back": "The machinery gives the mob the power to enforce its intolerance on others."}, {"front": "Concept: The Arc as Rhetoric", "back": "Definition: The tonal progression from amusement to fury to resignation that structures Mencken's performance."}, {"front": "What paradox is found in the final pages of Notes on Democracy?", "back": "The restrained quietness of the prose is more devastating than the previous denunciations."}, {"front": "According to Mencken, what impulse drives the creation of 'blue laws'?", "back": "The Puritan impulse to regulate private behavior."}, {"front": "In Part II, Mencken's sentences are described as _____ constructions, meaning the main point is delayed until the end for impact.", "back": "periodic"}, {"front": "Mencken argues that the democratic state rewards those who are willing to _____ the mob.", "back": "flatter"}, {"front": "What term describes the intentional use of a single word to govern two or more parts of a sentence, found in Part II?", "back": "Zeugma."}, {"front": "How does the 'satirical mask' slip in Part III of the book?", "back": "It reveals the genuine anger of the libertarian underneath the irony."}, {"front": "What is the primary metaphor used in Part I to describe Mencken's rhetorical stance?", "back": "The naturalist or clinical observer classifying specimens."}, {"front": "In the context of the four-part arc, which stage corresponds to the 'emotional appeal' of a legal case?", "back": "Part III: Democracy and Liberty (Outrage)."}, {"front": "In Part IV, Mencken replaces hyperbole with _____, creating a sense of finality.", "back": "understatement"}, {"front": "What is the significance of the term 'Homo boobiens' regarding the common man's intellect?", "back": "It suggests that the average citizen is fundamentally foolish or 'boob-like.'"}, {"front": "Why is the structure of Notes on Democracy compared to a symphony?", "back": "Because its movements feel as inevitable as a musical performance with a beginning, middle, and end."}, {"front": "What specific political category does Mencken's taxonomy attempt to diminish through zoological metaphors?", "back": "The common man or democratic citizen."}, {"front": "Which part of the book is described as containing Mencken's 'most passionate writing'?", "back": "Part III: Democracy and Liberty."}, {"front": "What rhetorical effect is achieved by the 'relentless rhythm of accumulation' in Part III?", "back": "It creates a sense of overwhelming weight and unstoppable force."}, {"front": "According to the text, why did Mencken likely produce such a sophisticated rhetorical structure?", "back": "Through the instincts of a master prose stylist rather than conscious planning."}, {"front": "How does Part IV reverse the trajectory of the entire book?", "back": "By ending with the confession that the author actually finds the subject amusing rather than purely loathsome."}, {"front": "In Part II, Mencken uses _____ to emphasize the repetitive failures and mediocre nature of democratic institutions.", "back": "parallelism"}, {"front": "What is the rhetorical purpose of using the persona of a 'naturalist' in Part I?", "back": "To establish a distance of 'amused detachment' between the author and the subjects of his critique."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
