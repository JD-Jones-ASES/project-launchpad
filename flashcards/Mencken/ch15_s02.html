<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 15, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to Mencken, what is the fate of the reformer who enters the political system?", "back": "The system corrupts the reformer before any reforms are achieved."}, {"front": "Mencken describes it as a 'psychic impossibility' for which type of person to hold Federal office?", "back": "A gentleman"}, {"front": "What 'grim dilemma' does the constitutional oath regarding alcohol create for a gentleman in office?", "back": "He must choose between being a liar or a 'pig.'"}, {"front": "To what does Mencken compare the Liberal argument that gentlemen should enter politics to fix the 'quagmire'?", "back": "Filling bawdy-houses with virgins."}, {"front": "What is one of the two outcomes Mencken predicts for 'virgins' placed in a 'bawdy-house'?", "back": "They leap out of the windows or cease to be virgins."}, {"front": "To stay within the 'political fence,' a gentleman must adapt himself to the mob's _____.", "back": "tastes and prejudices"}, {"front": "How must a political aspirant treat the 'mob' when it begins to 'whinny'?", "back": "Soothe it with balderdash."}, {"front": "Mencken suggests a politician must use his 'anæsthesia on points of honour' to exploit the mob's sensitivity on points of _____.", "back": "morals"}, {"front": "Term: Mob-masters", "back": "Agents of 'prehensile minorities' who perform upon the spines of the public."}, {"front": "According to the 'axiom of practical politics,' who are the worst enemies of political decency?", "back": "Tired reformers"}, {"front": "Mencken identifies Theodore Roosevelt as a 'shameless demagogue' who initially entered politics as a _____.", "back": "sword drawn against demagogy"}, {"front": "Mencken describes Henry Cabot Lodge as the 'perfect model' of what political figure?", "back": "The party hack"}, {"front": "Despite his 'adamantine' reputation, how does Mencken describe the flexibility of Henry Cabot Lodge?", "back": "As limber as an eel."}, {"front": "Mencken claims a politician who retains his office must dilute his rectitude with the '_____' of the trade.", "back": "cologne spirits"}, {"front": "Why does a 'haughty amateur' in politics usually succeed only in his first battle?", "back": "The mob likes a brutal show of indignation, but he cannot sustain his rectitude and stay in office."}, {"front": "What checks the 'outlawry and corruption of the best' in democratic England?", "back": "An aristocratic tradition."}, {"front": "How does the influence of university scholarship differ between the English Parliament and the U.S. Congress?", "back": "It is felt at Westminster but has no effect on Capitol Hill."}, {"front": "In the United States, how does the class of politicians interact with other social classes?", "back": "It tends to separate itself sharply from all other classes."}, {"front": "Mencken describes Theodore Roosevelt as an 'imitation aristocrat' who attempted to appear as an _____.", "back": "Admirable Crichton"}, {"front": "How did Warren G. Harding spend his 'hours of ease' as President?", "back": "With bootleggers, golf, poker, and guzzling."}, {"front": "Who were the only types of guests President Harding's successor entertained on the Mayflower?", "back": "Editors of party newspapers."}, {"front": "When do American Governors typically come into contact with local 'Gelehrte' (scholars)?", "back": "When a bill is proposed to prohibit the teaching of biology."}, {"front": "Mencken criticizes American judges for operating outside the stream of _____.", "back": "civilized thought"}, {"front": "According to Mencken, most American judges are content to enforce laws regardless of their conflict with _____.", "back": "fundamental human rights"}, {"front": "Mencken names Brandeis, Holmes, and _____ as rare exceptions to the low standard of the American judiciary.", "back": "Cardozo"}, {"front": "Mencken claims American judges have supinely connived at the invasion of which two Amendments?", "back": "The Fourteenth and Fifteenth Amendments."}, {"front": "Why is the judicial office in America often unattractive to high-quality lawyers?", "back": "Judges are chosen for purely political reasons and the courts are overly numerous."}, {"front": "In states where judges are elected, what advantage does the 'shyster' have over a reputable lawyer?", "back": "A vast and undivided passion for the judicial salary."}, {"front": "How does the English 'governing oligarchy' protect the quality of its bench?", "back": "By keeping jealous guard over it in the interest of its own class."}, {"front": "In the Federal courts, to which religious/political group must a candidate 'crook his knee'?", "back": "The Methodist wowsers of the Anti-Saloon League."}, {"front": "Term: Prehensile", "back": "Capable of grasping; Mencken uses it to describe greedy or predatory minority groups."}, {"front": "Term: Mountebank", "back": "A person who deceives others, typically through flamboyant showmanship or trickery."}, {"front": "Mencken identifies the 'worst of the worst' reformers as those who possess a _____ class consciousness.", "back": "sniffish"}, {"front": "Who did Henry Cabot Lodge deal jobs to with 'hearty devotion,' according to Mencken?", "back": "Penrose or Henry Lincoln Johnson."}, {"front": "Mencken argues that the English aristocracy preserves a function for even its _____ members.", "back": "non-officeholding"}, {"front": "What does Mencken claim is the 'average American judge's' status in their days at the bar?", "back": "A trailer, not a leader."}, {"front": "English jurisprudence is described as more fluent and _____ than American jurisprudence.", "back": "reasonable"}, {"front": "Which Amendment does Mencken specifically link to the destruction of the right to bring wine to a grandmother?", "back": "The Eighteenth Amendment (implied by the prohibition context)."}, {"front": "Mencken suggests that a gentleman in politics must anticipate the mob's _____, and join in them vociferously.", "back": "crazes"}, {"front": "According to Mencken, if a politician neglects to soothe the mob, he is swiftly _____.", "back": "heaved over the fence"}, {"front": "What was the 'primary thirst' of the reformers Mencken criticizes?", "back": "To make the corruptible put on incorruption."}, {"front": "Lodge is described as being unable to disentangle his private convictions from the fabric of his _____.", "back": "political dodges"}, {"front": "Mencken defines the American 'gentleman' as one who is not susceptible to _____.", "back": "open bribery in cash"}, {"front": "Which group does Mencken claim 'admires and envies' the English aristocracy?", "back": "The plutocracy"}, {"front": "Where does Mencken say the scholarship of Harvard is felt as little as it is in Westerville, Ohio?", "back": "Capitol Hill"}, {"front": "What was Warren G. Harding's 'notion of a good time,' according to Mencken?", "back": "To refresh himself in the manner of a small-town Elk."}, {"front": "Term: Gelehrte", "back": "Scholars or learned people."}, {"front": "Term: Wowsers", "back": "Puritanical or censorious people, especially those associated with the Temperance movement."}, {"front": "American judges often acquiesce in the destruction of the First, Second, Fourth, Fifth, and _____ Amendments.", "back": "Sixth"}, {"front": "Even when a character like F.E. Smith is admitted to the English bench, what does the oligarchy ensure?", "back": "That he is a competent lawyer."}, {"front": "According to Mencken, American jurisprudence is being reduced to _____ by ignorant legislators.", "back": "imbecility"}, {"front": "What is the primary motive Mencken attributes to the 'shyster' seeking judicial office?", "back": "A passion for the judicial salary."}, {"front": "Mencken believes that in most other countries, the 'corruption of the best' is checked by _____.", "back": "an aristocratic tradition"}, {"front": "What must a gentleman do to allay the mob's resentment of his background?", "back": "Prove that he is not 'washed behind the ears.'"}, {"front": "What was the name of the 'lamented' President whom Mencken criticized for guzzling with bootleggers?", "back": "Warren G. Harding"}, {"front": "Lodge's failure to perform before the mob 'unchastely' like Roosevelt was due to his _____ facade.", "back": "absurd"}, {"front": "In the South, the dispenser of Federal patronage to whom a judge must bow is often described by Mencken as a _____.", "back": "worthless Negro"}, {"front": "How does Mencken describe the duties of the American judiciary?", "back": "Dull and preposterous."}, {"front": "Mencken compares the 'ideal of democracy' to a state where it is a psychic impossibility for a gentleman to _____.", "back": "hold office"}, {"front": "According to Mencken, English jurisprudence is protected against the 'dull stupidities' of _____.", "back": "ignoramuses"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
