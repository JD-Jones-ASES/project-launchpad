<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 15, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's primary objective in the \"CH15_ANALYSIS\" section?", "back": "To demolish the idealist's hope of reforming the system from within, by showing that the system actively destroys good leaders."}, {"front": "Who are Mencken's two primary target audiences in this section?", "back": "Educated skeptics (to whom he offers confirmation of their suspicions) and \"professional Liberals\" (whom he challenges regarding their belief in personnel-based reform)."}, {"front": "What role do historical examples play in Mencken's polemic in this section?", "back": "They ground his arguments in observable reality, featuring figures like Theodore Roosevelt and Calvin Coolidge, challenging readers to dispute the evidence rather than the argument itself."}, {"front": "According to Mencken, how did Theodore Roosevelt's political career illustrate the corrupting nature of democratic politics?", "back": "Roosevelt, who entered politics as a reformer, eventually became, in Mencken's view, precisely the kind of demagogue he had set out to oppose, serving as a central exhibit for the thesis that democratic politics corrupts the well-intentioned."}, {"front": "Name the three distinct tonal registers Mencken adopts in this section.", "back": "Mock-philosopher, satirist, and polemicist."}, {"front": "Describe Mencken's \"mock-philosopher\" tone and provide an example of its effect.", "back": "He delivers axioms with an air of weary certainty, inflating practical observations into cosmic laws, as seen in phrases like \"psychic impossibility\" for a gentleman to hold office."}, {"front": "How does Mencken's \"satirist\" tone operate, and what is a key example?", "back": "It works through analogy and indirection, ridiculing rather than refuting. A key example is comparing political reform to filling \"the bawdy-houses with virgins.\""}, {"front": "What characterizes Mencken's \"polemicist\" tone?", "back": "Speaking directly and without ironic cover, stating damning facts plainly, such as describing Harding spending his leisure \"with bootleggers, not with metaphysicians.\""}, {"front": "What is the significance of Mencken's ability to shift between satirical indirection and direct polemic?", "back": "It keeps the reader off balance, refusing them a comfortable reading posture by blurring the lines between serious argument and punchline, thereby reinforcing his attack on comfort."}, {"front": "How does Mencken use diction to create contrast in this section?", "back": "He contrasts the 'elevated vocabulary of moral aspiration' (e.g., 'duty,' 'integrity') used by reformers with the 'vocabulary of the street, the courtroom, and the confidence game' (e.g., 'mountebanks,' 'shysters')."}, {"front": "What is a 'mountebank,' according to Mencken's usage, and what does it connote?", "back": "Originally an itinerant charlatan, Mencken uses it for career politicians who sell false remedies to a gullible public, carrying connotations of both performance and fraud."}, {"front": "Define 'sempiternal' and explain Mencken's ironic use of it.", "back": "Sempiternal means everlasting or eternal. Mencken deploys it with ironic heaviness to elevate the persistent prejudices of the mob to a kind of cosmic permanence."}, {"front": "What is the 'conditional chain' in Mencken's syntax, and what is its effect on the reformer's options?", "back": "A sequence of 'if then' structures that trap the reader in an inescapable logical progression, narrowing the reformer's options until only capitulation remains."}, {"front": "How does Mencken use rhythmic contrast between paragraphs?", "back": "He follows long, clause-heavy passages with short, decisive sentences, creating a staccato rhythm that mimics the quick, darting, unprincipled movements of an opportunistic politician."}, {"front": "What is the key distinction between satire and polemic?", "back": "Satire attacks indirectly through irony, ridicule, or analogy, requiring the reader to decode its real meaning. Polemic attacks directly, stating objections plainly and arguing openly without ironic cover."}, {"front": "Provide an example of satire from the text, as distinct from polemic.", "back": "Mencken's comparison of political reform to filling 'the bawdy-houses with virgins' is satire; it ridicules the reformer's position through a shocking analogy rather than direct argument."}, {"front": "What is the dominant figure of speech in this section, and how does it function?", "back": "Analogy pushed to the point of argument. It translates political abstractions into physical or commercial realities, making the reformer's compromise feel visceral rather than theoretical."}, {"front": "Explain one of the ways the \"Bawdy-House Analogy\" works on multiple levels.", "back": "It equates political office with prostitution (both sell something intimate for money), or it reframes the Liberal position as naive rather than wrong, or it introduces inevitability ('virgins would leap out...or cease to be virgins')."}, {"front": "What is 'litotes,' and how does Mencken use it for ironic effect?", "back": "Litotes is understatement. Mencken uses it for ironic effect, as when he writes of Calvin Coolidge: 'there is no evidence that he is acquainted with a single intelligent man,' making the mild phrasing more devastating than a direct accusation."}, {"front": "In the 'Close Reading' passage about Theodore Roosevelt, how does Mencken's first sentence function rhetorically?", "back": "\"Has the United States ever seen a more violent and shameless demagogue than Theodore Roosevelt?\" is pure polemic—a rhetorical question serving as a direct, unironic condemnation."}, {"front": "In the Roosevelt passage, how does the second sentence (\"Yet Roosevelt came into politics as a sword drawn against demagogy\") shift the rhetorical energy?", "back": "It shifts to satire, using a deliberately heroic metaphor ('sword drawn') only to expose the absurdity of its application, implying Roosevelt became the very 'dragon' he set out to slay."}, {"front": "How does Mencken use the dash to convey meaning in this section?", "back": "The dash presents paired alternatives, often connected by 'or,' to highlight a logical binary that forecloses hope, illustrating the reformer's dilemma with no third option."}, {"front": "How does Mencken use the nursery-room idiom 'washed behind the ears' in a political analysis?", "back": "He yokes it to a political analysis to suggest that the mob's hostility to a gentleman is as primitive and irrational as a child's resistance to soap."}, {"front": "In Mencken's view, what was Calvin Coolidge's primary qualification for office?", "back": "His inoffensiveness; Mencken regarded Coolidge as the embodiment of mediocrity, whose chief qualification was not to offend."}, {"front": "What did Mencken imply about President Harding's leisure activities?", "back": "He implied Harding spent his hours of ease 'with bootleggers, not with metaphysicians,' directly conveying contempt for his intellectual and moral company without irony."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
