<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 10, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Mencken characterize the evolutionary state of the \"mob\" in democratic states?", "back": "He argues the mob is not evolving but is eternal."}, {"front": "According to Mencken, what is the mob's primary relationship to human progress?", "back": "Progress passes the mob by, as its aims are unintelligible to them."}, {"front": "What does Mencken claim is the only part of human progress that actually reaches the mob?", "back": "What falls from the tree and is shared with animals."}, {"front": "How has the mob changed since the \"earliest recorded time,\" according to the text?", "back": "The mob has changed very little, and often for the worse."}, {"front": "To what sphere has the mob shifted its ancient belief in witches?", "back": "The political sphere."}, {"front": "Mencken describes the mob as being a slave to _____ and trembling before their \"preposterous magic.\"", "back": "priests"}, {"front": "List the three derogatory adjectives Mencken uses to describe the mob's personal habits.", "back": "Lazy, improvident, and unclean."}, {"front": "What is the mob's historical relationship to the creation of \"durable values\"?", "back": "Values have been created against the mob's opposition."}, {"front": "How does Mencken describe the mob's capacity for imagining beauty or grasping truth?", "back": "The mob can imagine nothing beautiful and grasp nothing true."}, {"front": "What is the mob's \"pathological compulsion\" when choosing between a sound and an unsound idea?", "back": "They almost infallibly choose the unsound idea."}, {"front": "The mob marches with \"loud hosannas\" behind what types of historical figures?", "back": "Great tyrants and butchers."}, {"front": "Whom is the mob \"eternally against,\" according to Mencken's analysis?", "back": "Those who seek to liberate the spirit of the race."}, {"front": "Mencken claims the mob favored Nero and Torquemada based on what factor?", "back": "Instinct."}, {"front": "Which two historical figures does Mencken cite as being instinctively opposed by the mob?", "back": "Galileo and Savonarola."}, {"front": "According to the text, the death of a Cagliostro leaves the mob ready for a _____.", "back": "Danton"}, {"front": "Mencken claims the mob rushes from the funeral of Barnum to the triumph of _____.", "back": "Bryan (William Jennings Bryan)"}, {"front": "What is the only contribution the world receives from the mob?", "back": "Brute labour."}, {"front": "How does Mencken view the mob's relationship to democracy as a concept?", "back": "He claims democracy owes nothing of worth or dignity to the mob."}, {"front": "Mencken equates the modern \"lynching-party\" to what ancient activity?", "back": "The sports of the arena."}, {"front": "The text equates the \"Methodist revival\" to what ancient Roman festival?", "back": "The Saturnalia."}, {"front": "What is the status of the mob's knowledge according to Mencken?", "back": "What they know is not true, and they don't want to know what is worth knowing."}, {"front": "The mob's \"cardinal articles of credo\" are described as the inventions of _____.", "back": "mountebanks"}, {"front": "Mencken describes the mob's heroes as being mainly _____.", "back": "scoundrels"}, {"front": "How does Mencken contrast \"debased Christianity\" with the actual teachings of Christ?", "back": "He argues they have no colorable likeness to one another."}, {"front": "Mencken compares the modern corps of evangelical pastors to what group of men?", "back": "The rabble-rousers who attended Paul."}, {"front": "How does Mencken define the term \"evangelical\" in the context of his critique?", "back": "Anti-intellectual revivalist Christianity."}, {"front": "According to the text, why did the mob turn against Christ and applaud His crucifixion?", "back": "His ideas were too logical and His ethics were too austere."}, {"front": "What did the mob \"yearn for\" that Christ did not provide?", "back": "Old comfortable balderdash under a new name."}, {"front": "From which groups did Paul borrow to create his \"stew\" of doctrines?", "back": "Wandering dervishes and soul-snatchers of Asia Minor."}, {"front": "What element of Greek thought did Paul use to flavor his religious doctrines?", "back": "Greek demonology."}, {"front": "Why were Paul's doctrines successful with the mob, according to Mencken?", "back": "The mob found the unintelligible and nonsensical to be soothing."}, {"front": "Paul is described by Mencken as a former \"travelling _____ leader.\"", "back": "labour"}, {"front": "Term: Stammvater", "back": "Definition: An ancestral father or founder; Mencken uses it to describe Paul as the originator of modern Christian mob-masters."}, {"front": "What satirical detail does Mencken use to describe the lifestyle of modern Christian \"mob-masters\"?", "back": "They eat \"seven fried chickens a week.\""}, {"front": "When was Paul \"thrown overboard\" by the early church in favor of Peter?", "back": "When the church emerged from catacombs and reorganization was forced by barbarian invasions."}, {"front": "How does Mencken describe the character of Peter compared to Paul?", "back": "A blackguard who was free from the taint of \"Little Bethel.\""}, {"front": "To what \"mystical dignity\" did the Roman Church raise Peter?", "back": "Rock."}, {"front": "Mencken identifies Paul as the \"prophet of the _____.\"", "back": "sewers"}, {"front": "Which historical figures are identified as modern \"incarnations\" of Paul?", "back": "Luther, Calvin, and Wesley."}, {"front": "How does Mencken describe Christ's actual reduction of human duties?", "back": "The duties of a gentleman."}, {"front": "Mencken uses the term \"Little Bethel\" to imply what about Paul's influence?", "back": "A crude, narrow, or lower-class form of sectarianism."}, {"front": "According to Mencken, what is the primary \"natural provender\" of the mob?", "back": "Nonsense."}, {"front": "What makes Christianity bearable to the mob, according to Mencken's critique of Paul?", "back": "Paul’s turgid and witless metaphysics."}, {"front": "How does the mob treat the labor they contribute to the world?", "back": "They try to evade it."}, {"front": "What is the mob's reaction when confronted with a choice between a sound and an unsound idea?", "back": "They choose the unsound one by pathological compulsion."}, {"front": "Mencken claims the mob lives out its life in the image of which deity?", "back": "Jahveh."}, {"front": "How does Mencken characterize the body of ideas preached by Christ in terms of clarity?", "back": "Simple and magnificent."}, {"front": "According to Mencken, what is the relationship between bogus Christianity and the system of Aristotle?", "back": "There is no relation between them."}, {"front": "Mencken claims that the mob’s hand is \"eternally against\" whom?", "back": "Those who seek to liberate the spirit of the race."}, {"front": "What was the mob's reaction to the crucifixion of Christ?", "back": "They applauded it."}, {"front": "How long has it taken the mob to move an \"inch\" from the arena to the lynching-party?", "back": "Two thousand years."}, {"front": "What does Mencken claim is the mob's view on things \"worth knowing\"?", "back": "They don't know them and don't want to know them."}, {"front": "Mencken describes Paul's theology as being \"flavoured\" with remnants of what?", "back": "Greek demonology."}, {"front": "Why does Mencken argue that no two men can agree on the meaning of Paul's doctrines?", "back": "The code is so discordant and nonsensical."}, {"front": "According to Mencken, who was the first \"Stammvater\" of the Christian mob-masters?", "back": "Paul."}, {"front": "Mencken compares modern Methodists abandoning Wesley to what specific leisure activity?", "back": "Acquiring the means for golf."}, {"front": "What rank was Peter promoted to \"post mortem\" by the Roman Church?", "back": "The Papacy."}, {"front": "Mencken describes the mob as the \"pet and glory\" of which political system?", "back": "Democratic states."}, {"front": "What is the mob's response to those who try to \"liberate the spirit of the race\"?", "back": "The mob's hand is eternally against them."}, {"front": "Mencken refers to Paul's theology as a \"stew\" of ideas from where?", "back": "Asia Minor."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
