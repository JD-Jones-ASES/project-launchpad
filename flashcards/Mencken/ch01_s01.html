<html lang="en">
<head>

    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In rhetorical analysis, what does the 'Rhetorical Context' aim to identify regarding the audience?", "back": "It identifies who the author is specifically addressing."}, {"front": "What three things does an analyst seek to determine about an author's goal for the reader in 'Rhetorical Context'?", "back": "What the author wants the reader to think, feel, or do."}, {"front": "In the context of 'Voice and Tone,' what is meant by the 'persona' of a writer?", "back": "The specific personality or image the writer projects to the reader."}, {"front": "How is 'Tone' defined in the analysis of Mencken’s prose?", "back": "The writer's attitude toward the subject, such as being ironic, solemn, or playful."}, {"front": "What are the two common linguistic origins of words that a writer might mix when choosing diction?", "back": "Latinate and Anglo-Saxon."}, {"front": "In rhetorical analysis, what is the primary purpose of examining 'Register'?", "back": "To determine the level of formality in the language, from elevated to colloquial."}, {"front": "Term: Register Mixing", "back": "Definition: The technique of combining different levels of formality, such as slang and scholarly language, in the same passage."}, {"front": "What rhetorical function does punctuation, like the dash or semicolon, serve in Mencken's syntax?", "back": "It functions as rhythm within the construction of his sentences."}, {"front": "According to the text, what is the relationship between 'Figures of Speech' and an author's argument?", "back": "Figures of speech serve the argument rather than merely decorating it."}, {"front": "In the five-part analytical framework, what is the purpose of 'Close Reading'?", "back": "To examine a short passage in full depth to see how all rhetorical elements work together."}, {"front": "What is the specific definition of 'Verbal Irony'?", "back": "The gap between what a speaker says and what they actually mean."}, {"front": "What is the specific definition of 'Situational Irony'?", "back": "The gap between what is expected to happen and what actually occurs."}, {"front": "How does Mencken frequently employ verbal irony in his prose?", "back": "He often appears to praise exactly what he actually despises."}, {"front": "Term: Hyperbole", "back": "Definition: Deliberate exaggeration for emphasis or effect that is not intended to be taken literally."}, {"front": "What is the rhetorical purpose of Mencken's use of hyperbole?", "back": "To shock the reader into attention and expose the absurdity of his target."}, {"front": "What rhetorical device places contrasting ideas in parallel grammatical structures?", "back": "Antithesis."}, {"front": "How does 'Antithesis' function to sharpen an argument?", "back": "It makes the contrast between two ideas impossible for the reader to miss."}, {"front": "Which sentence type withholds its main idea until the very end, building suspense through subordinate clauses?", "back": "Periodic sentence."}, {"front": "What is the intended rhetorical effect of a 'Periodic Sentence'?", "back": "To deliver the conclusion with the force of delayed impact."}, {"front": "Which sentence type states its main idea first and then adds details through modifying phrases?", "back": "Cumulative sentence."}, {"front": "What is the cumulative sentence's opposite sentence structure?", "back": "Periodic sentence."}, {"front": "What rhetorical effect does Mencken achieve by using cumulative sentences?", "back": "An effect of overwhelming accumulation of evidence, examples, or insults."}, {"front": "The collision between different linguistic registers in Mencken’s writing produces both rhetorical force and _____.", "back": "Humor."}, {"front": "Term: Diction", "back": "Definition: The specific word choices a writer makes, which can range from formal to colloquial."}, {"front": "What is the central question to ask when analyzing a writer's diction?", "back": "Why were these specific words chosen rather than others?"}, {"front": "Term: Connotation", "back": "Definition: The emotional associations a word carries beyond its literal, dictionary meaning."}, {"front": "How do the words 'home' and 'residence' differ in rhetorical analysis?", "back": "They denote the same thing but have very different connotations."}, {"front": "In contrast to using language for beauty, what is Mencken’s typical purpose for selecting words with heavy connotations?", "back": "Demolition of his subject."}, {"front": "What is the general definition of a 'Figure of Speech'?", "back": "Any use of language that departs from its literal meaning for rhetorical effect."}, {"front": "The phrase 'There was no harsh bawling from below; there was only a dulcet twittering from above' is an example of _____.", "back": "Antithesis."}, {"front": "Mencken's signature technique of inserting scholarly Latin into a street-level attack is an example of _____.", "back": "Register mixing."}, {"front": "What is the difference between formal and informal registers?", "back": "Formal register uses elevated language while informal register is casual and colloquial."}, {"front": "How does Mencken use 'Diction' similarly to a poet?", "back": "He chooses words for their connotative weight with extreme care."}, {"front": "What structural element is required for a sentence to be considered 'Antithesis'?", "back": "Parallel grammatical structures."}, {"front": "Why is Mencken's prose described as 'saturated' with verbal irony?", "back": "Because he constantly creates a gap between what he says and what he means."}, {"front": "What aspect of writing involves deciding between abstract and concrete words?", "back": "Diction."}, {"front": "In rhetorical analysis, what does an author's 'Stance' refer to?", "back": "The author's position or viewpoint toward their subject."}, {"front": "Which component of the analytical framework focuses on whether a sentence is blunt or elaborate?", "back": "Syntax and Rhythm."}, {"front": "A statement that is calculated to shock and is not meant to be taken literally is called _____.", "back": "Hyperbole."}, {"front": "Metaphor, simile, and personification are all categorized as _____.", "back": "Figures of speech."}, {"front": "What determines whether a word is considered 'technical' or 'colloquial'?", "back": "Its register or level of formality."}, {"front": "How does a cumulative sentence handle evidence compared to a periodic sentence?", "back": "It piles up evidence immediately following the main idea rather than building up to it."}, {"front": "What is the primary benefit of developing the skills used to read Mencken?", "back": "It makes the reader better at analyzing any form of persuasive prose."}, {"front": "What is the 'denotation' of a word?", "back": "Its literal or dictionary meaning."}, {"front": "Register mixing often involves dropping a _____ word into a formal sentence.", "back": "Slang."}, {"front": "In the analysis of 'Voice,' what are two possible tones a writer might use?", "back": "Ironic and solemn."}, {"front": "What is the hallmark of Mencken's mastery of English prose mentioned in the text?", "back": "His use of hyperbole."}, {"front": "What is the specific goal of using a 'Periodic Sentence' structure?", "back": "To build suspense."}, {"front": "The five-part framework moves from 'wide-angle context' to _____.", "back": "Close-up examination."}, {"front": "What role do subordinate clauses play in a periodic sentence?", "back": "They build the sentence's structure before the main idea is revealed at the end."}, {"front": "What is the effect of 'piling up' modifiers in a cumulative sentence?", "back": "It creates an overwhelming effect of accumulation."}, {"front": "Diction that is 'Latinate' is generally associated with what level of formality?", "back": "Formal or scholarly register."}, {"front": "Diction that is 'Anglo-Saxon' is generally associated with what level of formality?", "back": "Informal or plain register."}, {"front": "In rhetorical studies, what term describes the daily flood of persuasive language in society?", "back": "Rhetoric."}, {"front": "What is the relationship between 'Figures of Speech' and literal meaning?", "back": "Figures of speech depart from literal meaning to achieve a rhetorical effect."}, {"front": "How does the text define 'Verbal Irony' specifically in Mencken's work?", "back": "As a gap where he appears to praise what he actually despises."}, {"front": "What is the effect of 'register collision' in prose?", "back": "It produces both humor and rhetorical force."}, {"front": "What does a reader learn during the 'Close Reading' phase of the framework?", "back": "How all the rhetorical elements work together to make the analysis pay off."}, {"front": "Term: Antithesis", "back": "Example: 'There was no harsh bawling from below; there was only a dulcet twittering from above.'"}, {"front": "True or False: In rhetorical analysis, 'Diction' only refers to the formality of words.", "back": "False (it also includes origins, concreteness, and technicality)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
