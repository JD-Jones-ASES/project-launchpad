<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 19, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In the 1920s context, what was the technical definition of a \"lame duck\" politician?", "back": "A politician continuing to serve after losing an election or declining to run again."}, {"front": "Prior to 1933, until what specific date did defeated Congressmen continue to serve?", "back": "March 4 of the following year."}, {"front": "Which constitutional amendment shortened the \"lame duck\" period by moving the inauguration to January 20?", "back": "The Twentieth Amendment."}, {"front": "What was the ratification year of the Twentieth Amendment?", "back": "1933."}, {"front": "Instead of technical \"lame ducks,\" who was the true psychological subject of Mencken's Chapter 19 analysis?", "back": "The defeated aspirant whose ambition curdles into destructive rage."}, {"front": "Mencken frames this section as a \"footnote\" to suggest that his historical examples are _____.", "back": "Obvious enough that an educated reader could supply them themselves."}, {"front": "What term describes Mencken's dominant tone when surveying the wreckage of American politics?", "back": "Mock-historical."}, {"front": "Mencken's commentary often shifts from historical analysis into _____, delivered with a comic fluency.", "back": "Character assassination."}, {"front": "Mencken defines all politics under democracy as a series of \"_____ questions.\"", "back": "Dynastic."}, {"front": "Which rhetorical device describes a deliberate descent from serious historical analysis to absurdist comedy?", "back": "Bathos."}, {"front": "Mencken describes the death of William Jennings Bryan with a precision that hovers between clinical reportage and _____.", "back": "Gothic horror."}, {"front": "Term: Surcease", "back": "Definition: Relief or cessation, especially from suffering."}, {"front": "Term: Amok", "back": "Definition: In a frenzy of violence (derived from the Malay language)."}, {"front": "How does Mencken apply the term \"warlocks\" to minor political figures?", "back": "It suggests their destructive influence operates like dark magic or sorcery."}, {"front": "Term: Ambulent", "back": "Definition: Walking or ambulatory; used by Mencken to describe Bryan as a \"walking infection.\""}, {"front": "What does the medical term \"tertiary lues\" specifically refer to?", "back": "The third and final stage of syphilis, involving neurological damage."}, {"front": "Term: Endocarditis", "back": "Definition: Inflammation of the heart's inner lining."}, {"front": "What is the literal English translation and the actual meaning of the French term \"maison de santé\"?", "back": "Literally \"house of health\"; used as a euphemism for a lunatic asylum."}, {"front": "Mencken creates irony by stating Bryan \"_____ himself to reprisals,\" using a verb associated with religious devotion for political revenge.", "back": "Consecrated."}, {"front": "In describing Bryan's \"colossal lust for revenge,\" Mencken applies the language of _____ to a man known for denouncing it.", "back": "Sin."}, {"front": "How does the length of Mencken's historical portraits change as he approaches his primary target, Bryan?", "back": "The portraits grow progressively longer and more detailed, creating a sense of acceleration."}, {"front": "According to Mencken, at what specific temperature did William Jennings Bryan \"pass out of life\"?", "back": "110 degrees."}, {"front": "Where were Bryan's eyes \"rolling horribly\" toward at the moment of his death?", "back": "1600 Pennsylvania avenue, N.W. (the White House)."}, {"front": "In the Bryan death scene, what trivial detail about the White House provides the final bathetic deflation?", "back": "Its leaky copper roof."}, {"front": "Mencken's use of the full postal address \"1600 Pennsylvania avenue, N.W.\" for the White House creates a tone of _____.", "back": "Bureaucratic precision."}, {"front": "In the phrase \"In the suffering South his fever lives after him,\" what does \"fever\" double for?", "back": "Bryan's literal body temperature at death and the figurative fever of anti-intellectualism."}, {"front": "What is the Greek root of the word \"bathos\"?", "back": "Depth."}, {"front": "Who popularized the term \"bathos\" in the 1727 satirical essay \"Peri Bathous\"?", "back": "Alexander Pope."}, {"front": "How does bathos differ from a standard anticlimax?", "back": "Bathos is intentional and calculated for comic effect, whereas anticlimax may be accidental."}, {"front": "Mencken uses the \"Crown Prince\" fantasy to contrast royal discretion with democracy's tendency to _____ grievances from every stump.", "back": "Bellow."}, {"front": "What hyperbolic comparison does Mencken use to describe the extent of the damage Bryan caused to the South?", "back": "He claims it was greater than the damage done by Sherman's army."}, {"front": "Mencken's", "back": "Ambulent."}, {"front": "What rhetorical effect is achieved by Mencken moving from elevated to vulgar diction within a single sentence?", "back": "Comedy through the collision of different linguistic registers."}, {"front": "Mencken uses the parenthetical \"_____\" in his closing paragraph to assume a worldly complicity between himself and the reader.", "back": "Of course."}, {"front": "Mencken argues that the Prince \"cannot go about praying publicly\" for his father to contract _____, mocking royal protocol with clinical specificity.", "back": "Endocarditis."}, {"front": "What does Mencken call Bryan's campaign against evolution in terms of its impact on human dignity?", "back": "The most gross attack ever made by a politician in modern times."}, {"front": "In Mencken's prose, bathos acts as a weapon to deflate _____.", "back": "Pomposity."}, {"front": "The phrase \"passed out of life\" is used as a _____ euphemism that Mencken immediately undercuts with a clinical temperature reading.", "back": "Genteel."}, {"front": "Which three figures are listed as the earlier, shorter portraits before Mencken reaches Roosevelt and Bryan?", "back": "Clay, Calhoun, and Burr."}, {"front": "Mencken's use of medical terms like \"tertiary lues\" in the context of royal politics is an example of _____ precision used for a joke.", "back": "Deadpan."}, {"front": "What is the rhetorical purpose of Mencken's extreme hyperbole regarding Bryan and Sherman's army?", "back": "To perform outrage and invite the reader to laugh at the extravagance of the comparison."}, {"front": "The contrast between the whispered ambitions of princes and the \"bellowed\" grievances of politicians is the section's final _____.", "back": "Antithesis."}, {"front": "What specific part of the White House does Mencken mention to reduce a symbol of power to a building with a maintenance problem?", "back": "The leaky copper roof."}, {"front": "Mencken's rhetorical situation in this \"footnote\" is compared to that of a _____.", "back": "Closing argument."}, {"front": "What is the primary source of comedy in Mencken's diction throughout this section?", "back": "The collision between elevated and vulgar registers."}, {"front": "In the Bryan portrait, theology is characterized not as a faith, but as a _____.", "back": "Weapon."}, {"front": "The \"footnote\" framing allows Mencken to disguise one of his most sustained _____ narratives.", "back": "Historical."}, {"front": "What does Mencken suggest exiled aspirants to the throne die of in Paris as a deadpan joke?", "back": "Tertiary lues (syphilis)."}, {"front": "The Crown Prince fantasy operates on three levels: the political, the psychological, and the _____.", "back": "Linguistic."}, {"front": "How does Mencken describe Bryan's anti-evolution campaign in relation to democratic pathology?", "back": "As a gross attack on human dignity and decorum."}, {"front": "Mencken's use of bathos demonstrates a command of _____ range that earns the reader's trust.", "back": "Tonal."}, {"front": "Mencken claims that what the monarchy keeps silent, democracy _____.", "back": "Broadcasts."}, {"front": "The", "back": "Gothic horror."}, {"front": "Mencken describes the \"suffering South\" following Bryan's death, echoing a biblical or _____ formula for gravity.", "back": "Shakespearean."}, {"front": "According to the analysis, bathos occurs when a writer builds to high seriousness and then substitutes something _____.", "back": "Absurd."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
