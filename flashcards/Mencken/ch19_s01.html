<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 19, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "According to the text, what is the technical definition of a 'lame duck' politician?", "back": "An official who continues to serve after losing an election or declining to run again."}, {"front": "In the 1920s, on what specific date did defeated Congressmen leave office?", "back": "March 4."}, {"front": "Which constitutional amendment shortened the period between election and inauguration?", "back": "The Twentieth Amendment."}, {"front": "In what year was the Twentieth Amendment ratified?", "back": "1933."}, {"front": "The Twentieth Amendment moved the presidential inauguration date from March 4 to which date?", "back": "January 20."}, {"front": "What is Mencken's primary interest regarding 'lame ducks' in his analysis?", "back": "The psychological type of the defeated politician whose ambition turns into destructive rage."}, {"front": "List three of the historical 'lame ducks' or defeated aspirants Mencken includes in his list.", "back": "Henry Clay, John C. Calhoun, and William Jennings Bryan."}, {"front": "What is the dominant tone Mencken adopts throughout this section of the text?", "back": "Mock-historical."}, {"front": "Mencken uses a rhetorical device where he presents sustained historical narrative as a mere 'footnote' to suggest what?", "back": "That the examples are so obvious an educated reader could provide them himself."}, {"front": "Define the rhetorical term 'bathos' as used in Mencken's prose.", "back": "A deliberate, intentional descent from the elevated or serious to the trivial or absurd."}, {"front": "How does Mencken differentiate bathos from a standard anticlimax?", "back": "Bathos is distinguished by its intentionality, whereas anticlimax can be accidental."}, {"front": "From which language is the word 'bathos' derived, and what does it mean?", "back": "It is derived from the Greek word for 'depth'."}, {"front": "Which 18th-century satirist popularized the term 'bathos' in his essay 'Peri Bathous'?", "back": "Alexander Pope."}, {"front": "Term: Surcease", "back": "Definition: Relief or cessation, especially from suffering."}, {"front": "Term: Amok", "back": "Definition: In a frenzy of violence (derived from Malay)."}, {"front": "To which group of people does Mencken apply the term 'warlocks'?", "back": "Minor political figures whose destructive influence operates like dark magic."}, {"front": "Term: Ambulent", "back": "Definition: Walking or ambulatory."}, {"front": "What does the medical term 'tertiary lues' refer to in the context of Mencken's jokes?", "back": "The third and final stage of syphilis."}, {"front": "Term: Endocarditis", "back": "Definition: Inflammation of the inner lining of the heart."}, {"front": "Term: Maison de sant'é", "back": "Definition: A polite French term for a lunatic asylum (literally 'house of health')."}, {"front": "Which historical figure does Mencken describe as an 'ambulent boil'?", "back": "William Jennings Bryan."}, {"front": "Mencken describes Bryan's death as occurring at what specific body temperature?", "back": "110 degrees."}, {"front": "Mencken's use of '1600 Pennsylvania avenue, N.W.' in the middle of a death scene is an example of what rhetorical strategy?", "back": "Bathos (specifically, using bureaucratic precision to deflate high drama)."}, {"front": "What trivial physical detail does Mencken use to conclude the portrait of Bryan's lifelong ambition?", "back": "The leaky copper roof of the White House."}, {"front": "To what military force does Mencken compare the damage done by William Jennings Bryan?", "back": "Sherman's army."}, {"front": "In Mencken's metaphorical", "back": "His fever (representing anti-intellectualism)."}, {"front": "What religious verb does Mencken use to mock Bryan's devotion to political revenge?", "back": "Consecrated."}, {"front": "Mencken uses the phrase 'colossal lust for revenge' to link Bryan's actions to which concept he often denounced?", "back": "Sin."}, {"front": "How does the syntax of Mencken's historical portraits change as he approaches Bryan?", "back": "The portraits grow longer and more detailed, creating a sense of acceleration."}, {"front": "What is the primary source of comedy in Mencken's word choice according to the analysis?", "back": "The collision between elevated/poetic diction and vulgar/clinical registers."}, {"front": "In Mencken's closing 'Crown Prince' fantasy, what is the Prince forbidden from doing?", "back": "Praying publicly for the King's death by endocarditis."}, {"front": "Mencken contrasts monarchy and democracy by stating that while monarchy keeps ambitions silent, democracy does what?", "back": "It bellows them from every stump."}, {"front": "What is the effect of the parenthetical phrase 'of course' in the final paragraph of the section?", "back": "It establishes a sense of worldly complicity between the writer and the reader."}, {"front": "According to the text, why is Mencken's use of hyperbole regarding Bryan effective?", "back": "The absurdity is intentional and serves as a performance of rhetorical outrage."}, {"front": "What specific campaign of Bryan's is described as the 'most gross attack upon human dignity' in modern times?", "back": "His campaign against evolution."}, {"front": "Mencken describes the Crown Prince's situation as a clash between psychological tension and what?", "back": "Royal protocol and etiquette."}, {"front": "The 'Footnote on Lame Ducks' functions as a coda to which part of Mencken’s book?", "back": "Part II."}, {"front": "Mencken suggests that democracy resolves all politics into a series of _____ questions.", "back": "Dynastic."}, {"front": "Which word origin does Mencken use to add a 'note of wildness' to the portrait of defeated politicians?", "back": "The Malay origin of the word 'amok'."}, {"front": "In the Bryan portrait, Mencken describes his theology as a _____ rather than a faith.", "back": "Weapon."}, {"front": "What rhetorical shift occurs between the portraits of Clay/Calhoun and the portrait of Bryan?", "back": "A shift from brief historical narrative to sustained, venomous character assassination."}, {"front": "Mencken's use of 'tertiary lues' is a medical term used to deliver what kind of joke?", "back": "A claim that exiled royal aspirants in Paris die of syphilis."}, {"front": "The", "back": "Gothic horror."}, {"front": "According to the text, Mencken is a master of bathos because he uses it to deflate what?", "back": "Pomposity."}, {"front": "Mencken portrays Bryan's anti-evolution work as being done with a 'colossal _____ for revenge.'", "back": "Lust."}, {"front": "What postal detail does Mencken include in his", "back": "The compass abbreviation 'N.W.'"}, {"front": "Mencken suggests that all princes desire the death of their fathers, which he calls a _____ tension.", "back": "Psychological."}, {"front": "The phrase 'The damage he did was greater than that done by Sherman's army' is an example of which figure of speech?", "back": "Hyperbole."}, {"front": "What 'clinical' detail about Bryan's body temperature is used to contrast with the 'genteel' phrase 'passed out of life'?", "back": "110 degrees."}, {"front": "Mencken defines his specific subject in this section not just as 'lame ducks,' but as _____ aspirants.", "back": "Defeated."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
