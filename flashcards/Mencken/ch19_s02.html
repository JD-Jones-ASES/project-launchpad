<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 19, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the rhetorical purpose of the 'Footnote on Lame Ducks' section in Mencken's book?", "back": "It serves as a coda to Part II, a closing argument against democratic politics, presenting additional entertaining examples of bitter, defeated politicians."}, {"front": "How does Mencken use the 'footnote' framing as a rhetorical device?", "back": "By presenting the material as an afterthought, Mencken creates a false modesty, suggesting the examples are obvious. This disguises that it's actually one of the book's most sustained historical narratives."}, {"front": "What was the technical definition of a 'lame duck' in the 1920s, and what problem did it pose?", "back": "A 'lame duck' was a politician who continued to serve after losing an election or declining to run again. The problem was that defeated Congressmen served until March 4, leaving months for rejected officeholders to make law."}, {"front": "How did the Twentieth Amendment (ratified 1933) address the 'lame duck' problem?", "back": "It shortened the period by moving the presidential inauguration from March 4 to January 20, thereby reducing the time rejected officeholders could still make law."}, {"front": "What was Mencken's primary concern regarding 'lame ducks,' beyond constitutional mechanics?", "back": "His concern was with the psychological type: the defeated politician whose ambition curdles into destructive rage, particularly those who sought the presidency and, failing, turned to sabotage."}, {"front": "Describe the dominant tone Mencken adopts in 'Footnote on Lame Ducks.'", "back": "It is mock-historical, with Mencken assuming the posture of a historian but sliding into character assassination. The voice is anecdotal, informed, opinionated, and thoroughly entertaining."}, {"front": "What literary device does Mencken master by deliberately descending from serious analysis to absurdist comedy?", "back": "Bathos, defined as the art of the calculated anticlimax, where a deliberate descent from the elevated to the absurd is used for comic effect."}, {"front": "How does the tone shift specifically in Mencken's portrait of William Jennings Bryan?", "back": "The tone darkens and becomes venomous, moving beyond playful contempt. Bryan is described with grotesque precision, evoking uneasy laughter from the reader."}, {"front": "What is a key characteristic of Mencken's diction in this section, and how does it contribute to the comedy?", "back": "He moves from the elevated to the vulgar within a single sentence. The collision between these different registers is a primary source of comedy."}, {"front": "What is the significance of Mencken describing Bryan as 'an ambulent boil'?", "back": "This is a metaphor that uses 'ambulent' (walking) to transform Bryan into a walking infection, a disease in human form, embodying democratic pathology."}, {"front": "Explain the irony in Mencken's use of the verb 'consecrated' in 'Bryan consecrated himself to reprisals.'", "back": "'Consecrated' is a religious verb implying devotion, applied here to an act of political revenge. This creates dense irony, as Bryan, an evangelical crusader, is described using religious language for destructive purposes."}, {"front": "How does Mencken use the phrase 'colossal lust for revenge' to characterize Bryan, and what is the ironic effect?", "back": "He applies the language of sin ('lust') to Bryan, a man who built his career denouncing it. This highlights the perceived hypocrisy or profound transformation of Bryan's character."}, {"front": "How does the syntax of the historical portraits contribute to the section's rhythm and sense of acceleration?", "back": "The portraits grow progressively longer and more detailed, starting with brief sentences for Clay and Calhoun, and building to the longest, most sustained invective in the Bryan portrait."}, {"front": "Analyze the effect of Mencken's description of Bryan's death: 'He passed out of life at last at a temperature of 110 degrees, his eyes rolling horribly toward 1600 Pennsylvania avenue, N.W. and its leaky copper roof.'", "back": "This sentence uses an accumulation of absurd specificity. It combines clinical, gothic, bureaucratic, and bathetic details to transform a solemn death into a joke, perfecting bathos by reducing Bryan's lifelong ambition to a fixation on a leaky roof."}, {"front": "Define 'bathos' as discussed in the text, and how does it differ from anticlimax?", "back": "Bathos is a deliberate descent from the elevated or serious to the trivial or absurd, used for comic effect. It is distinguished from anticlimax by its intentionality; anticlimax can be accidental."}, {"front": "How is the 'Crown Prince fantasy' at the end of the section a 'masterclass in bathos'?", "back": "After a serious historical survey, Mencken shifts to a comic sketch about royal etiquette, deliberately descending from the important (constitutional history) to the trivial (a prince's secret wish for his father's demise with 'endocarditis')."}, {"front": "What is the final antithesis presented in the 'Crown Prince fantasy' paragraph?", "back": "The contrast between the whispered, hidden ambitions and murderous thoughts of monarchs (like wishing for endocarditis) and the 'bellowed' grievances of politicians 'from every stump' under democracy."}, {"front": "Provide an example of hyperbole used by Mencken in describing Bryan, and explain its purpose.", "back": "Mencken claims Bryan's damage 'was greater than that done by Sherman's army.' The claim is so extravagant and over-the-top that its absurdity becomes the point, making it funny."}, {"front": "Besides 'ambulent boil,' what other metaphors does Mencken use to characterize Bryan?", "back": "His theology is depicted as a weapon, not a faith, and he 'consecrated himself to reprisals,' applying language of the altar to an assassin's work. This transforms Bryan into a force of nature or a democratic pathology."}, {"front": "What is 'tertiary lues,' and how does Mencken's use of this term contribute to the section's humor?", "back": "Tertiary lues is the advanced stage of syphilis. Mencken uses this clinical term with deadpan precision in a joke about exiled aspirants to the throne, making a serious medical condition absurdly relevant to royal politics."}, {"front": "Explain the comedic effect of Mencken's use of 'maison de santé.'", "back": "It's a French euphemism for a lunatic asylum. Mencken's use of this diplomatic language when referring to the wish that a king be locked up is an example of register mixing, adding to the section's sophisticated, ironic humor."}, {"front": "How does Mencken's closing paragraph, describing the Crown Prince, shift the section's rhythm and tone?", "back": "It shifts to shorter, more conversational sentences, often including parenthetical phrases like 'of course.' This creates a sense of complicity with the reader, as if both are worldly enough to understand the prince's murderous thoughts."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
