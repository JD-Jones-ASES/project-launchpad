<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 18, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In democratic politics, what is the typical fate of the rare honest man according to Mencken?", "back": "He is punished for his virtues while the fraud is rewarded for his vices."}, {"front": "The success of an honorable man in public office is described by Mencken as a suspension of _____.", "back": "Natural laws"}, {"front": "Why is the first term of an honorable man in a democratic system usually his last?", "back": "His success is seldom more than transient and faces incredible bitterness."}, {"front": "What role did 'the waspish ghost of the late Dr. Wilson' play in the Missouri Senator's campaign?", "back": "It represented part of the opposition from a combination of all parties and factions."}, {"front": "What two personal factors helped the Missouri Senator overcome the odds in his last campaign?", "back": "His talents as a popular orator and his reputation as a rough-and-ready fighter."}, {"front": "In which regions of the United States do honorable men have the best chance of holding office?", "back": "The newer States and the border States."}, {"front": "What factor bars men of genuine dignity from public life in states like Georgia and Vermont?", "back": "Strong and long-standing party fidelity."}, {"front": "How does Mencken characterize the 'party hacks' who dominate long-standing party-fidelity states?", "back": "Men who have trimmed, fawned, and are incapable of frank discussion on principal issues."}, {"front": "What is the mob's general assumption regarding even the most honorable man in public office?", "back": "That he possesses the same cowardice and venality as his orthodox colleagues."}, {"front": "Under democracy, why are the acts of a man of genuine rectitude usually ascribed to sordid motives?", "back": "The mob and the majority of politicians are unable to grasp the concept of honor."}, {"front": "What is the primary factor Mencken identifies as keeping decent men out of American public life?", "back": "The assumption that their motives are always base or self-serving."}, {"front": "The 'astounding timorousness' of American politics is largely attributed to what social phenomenon?", "back": "The public's inability to imagine a motive other than private advantage."}, {"front": "What method did Prohibitionist leaders use to silence politicians who spoke against them?", "back": "A technique of terrorization based on accusing them of the grossest baseness."}, {"front": "What was a common 'whispered' accusation leveled against politicians who opposed Prohibition?", "back": "That they were secret drunkards protecting their own supply."}, {"front": "During the battle over the Eighteenth Amendment, who was actually found to be on the pay-roll of the Anti-Saloon League?", "back": "Many of the principal supporters of Prohibition, including high officers of justice."}, {"front": "Why did the 'plain people' believe accusations that anti-prohibitionists were in the pay of the 'Whiskey Ring'?", "back": "They could only imagine motives that would move themselves, specifically private advantage."}, {"front": "How long did it take for a faction of politicians to muster the courage to defy Prohibitionists?", "back": "Five or six years."}, {"front": "What event finally enabled politicians to defy the Anti-Saloon League?", "back": "The League's obvious corruption and the imprisonment of its agents for crimes."}, {"front": "What did Prohibitionists charge Mencken with when they first came to power?", "back": "Taking money from brewers and distillers."}, {"front": "Why did Mencken describe bootleggers as 'allies' of the Prohibitionists?", "back": "The existence of Prohibition created the bootleggers' market."}, {"front": "Why did brewers eventually offer to put Mencken on their pay-roll?", "back": "They believed the public accusation that he was acting as a paid agent."}, {"front": "Whom was Mencken accused of being a retainer for when he exposed the 'quackeries' of osteopaths and chiropractors?", "back": "The mythical 'Medical Trust' (including the Mayo brothers and Johns Hopkins)."}, {"front": "What corrupt motive was ascribed to Mencken when he denounced the political activity of the Methodist Church?", "back": "Receiving bribes from the Vatican."}, {"front": "What specific charge did the 'comstocks' use in their attempt to jail Mencken?", "back": "The circulation of pornography."}, {"front": "Why do many American newspapers assume a candidate is guilty as charged?", "back": "The editors believe every man is willing to do what they themselves would do in that case."}, {"front": "According to Mencken, what qualities give typical American editors a 'special fitness' for influencing the mob?", "back": "A lack of sound knowledge, genuine intelligence, and notions of honor."}, {"front": "How does Mencken describe the 'daily toil' of the typical American editor?", "back": "Praising fraudulent men and ideas while denouncing those respected by their betters."}, {"front": "What two topics define the typical American editor's output in Mencken's succinct description?", "back": "Support for Coolidge and opposition to Darwin."}, {"front": "What does the typical American editor value more than self-respect?", "back": "His job."}, {"front": "Why is the influence of typical editors considered 'generally evil' regarding public men of dignity?", "back": "They are unable to understand or support such men, throwing their weight against them."}, {"front": "According to the ideas of the mob, what makes a fraud 'charming and reassuring'?", "back": "The perception that he is a 'regular fellow.'"}, {"front": "What is the mob's core belief regarding an honest and candid man?", "back": "That he is dangerous or that such a person does not exist."}, {"front": "How is a superior editor who deviates from the mob level often dismissed?", "back": "As a 'Bolshevik.'"}, {"front": "What 'nefarious' motive is assumed of any superior editor not dismissed as a Bolshevik?", "back": "Personal aggrandizement."}, {"front": "Identify the two editors Mencken cites as honest, able men who faced opposition from their colleagues.", "back": "Fremont Older and Julian Harris."}, {"front": "The democratic process is described as being 'furiously inimical' to what types of motives?", "back": "Honourable motives."}, {"front": "Why does a public servant who masters his job gain nothing in a democracy?", "back": "His impatience with others' incompetence makes him enemies and draws suspicion from the mass."}, {"front": "Who wrote the book 'The Cult of Incompetence'?", "back": "Emile Faguet."}, {"front": "According to Emile Faguet, what does law-making become under democracy?", "back": "A series of panics (or 'government by orgy and orgasm')."}, {"front": "What does public service become under the 'Cult of Incompetence'?", "back": "A refuge for prehensile morons."}, {"front": "Concept: Post-war Katzenjammer", "back": "Definition: A state of confusion or 'hangover' following a war that influenced voter behavior."}, {"front": "In Mencken's view, why are newspapers often forced into 'elaborate explanations' after attacking a candidate?", "back": "To purge themselves of libel charges after assuming the candidate's guilt."}, {"front": "What does the term 'Comstocks' refer to in the context of Mencken's experience?", "back": "Groups or individuals engaged in the censorship of literature."}, {"front": "Why are editors in democracy described as 'adept trimmers and flatterers'?", "back": "They prioritize their job security by reflecting the mob's biases."}, {"front": "Mencken suggests that in a democracy, the only way an intelligent man succeeds is through _____.", "back": "Luck or a miracle"}, {"front": "What is the 'Medical Trust' in the context of the accusations against Mencken?", "back": "A mythical organization supposedly paying him to expose alternative medical practitioners."}, {"front": "Why were brewers 'vastly surprised' when Mencken declined their pay-roll offer?", "back": "They could not imagine a man discharging a public duty disinterestedly."}, {"front": "What is the common phrase used to describe a fraud who is accepted by the mob?", "back": "A 'regular fellow.'"}, {"front": "What characteristic of editors allows them to 'voice the ideas of the mob'?", "back": "The fact that they come out of the mob themselves."}, {"front": "How does Mencken describe the 'ignoble contortions' of party hacks?", "back": "As trimming and fawning to avoid principal issues facing the nation."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
