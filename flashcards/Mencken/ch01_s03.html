<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 1, Section 3</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "On what specific date was Henry Louis Mencken born?", "back": "September 12, 1880"}, {"front": "In which American city was H.L. Mencken born and raised?", "back": "Baltimore, Maryland"}, {"front": "What was the profession of H.L. Mencken's father, August Mencken?", "back": "Prosperous tobacco merchant"}, {"front": "What was the ethnic heritage of both of Mencken's parents?", "back": "German descent"}, {"front": "How did Mencken describe his childhood in his later years?", "back": "Almost absurdly happy"}, {"front": "Mencken's hostility to _____ is noted as striking given his very happy childhood.", "back": "Sentimentality"}, {"front": "What was the highest level of formal education H.L. Mencken completed?", "back": "Graduation from Baltimore Polytechnic Institute"}, {"front": "At what age did Mencken finish his formal education?", "back": "Sixteen (16)"}, {"front": "What specific business did August Mencken want his son to enter?", "back": "The cigar business"}, {"front": "What event in January 1899 led Mencken to finally pursue a writing career?", "back": "The death of his father, August Mencken"}, {"front": "At what newspaper did Mencken begin his journalism career in February 1899?", "back": "The Baltimore Morning Herald"}, {"front": "How old was Mencken when he began working for the Baltimore Morning Herald?", "back": "Eighteen (18)"}, {"front": "Which editorial position did Mencken achieve by 1903, only four years into his career?", "back": "City editor"}, {"front": "In what year did Mencken move to the Baltimore Sun?", "back": "1906"}, {"front": "The Baltimore Sun and the Evening Sun were collectively known by what name?", "back": "The Sunpapers"}, {"front": "In what year was the Baltimore Sun founded?", "back": "1837"}, {"front": "In what year was the Evening Sun founded?", "back": "1910"}, {"front": "What was the title of Mencken's widely read opinion column in the Evening Sun?", "back": "Monday Articles"}, {"front": "What 1925 event is considered Mencken's most famous piece of reporting?", "back": "The Scopes Trial"}, {"front": "In what town and state was the Scopes Trial held?", "back": "Dayton, Tennessee"}, {"front": "What was the formal legal name of the 1925 Scopes Trial?", "back": "The State of Tennessee v. John Thomas Scopes"}, {"front": "What specific type of law was being tested during the Scopes Trial?", "back": "A state law banning the teaching of evolution in public schools"}, {"front": "Which historical figure was the primary target of Mencken's ferocity during the Scopes Trial?", "back": "William Jennings Bryan"}, {"front": "Mencken viewed the anti-evolution movement as a form of \"organized _____.\"", "back": "Ignorance"}, {"front": "On what date did H.L. Mencken marry Sara Haardt?", "back": "August 27, 1930"}, {"front": "Sara Haardt, Mencken's wife, was a writer and former instructor from which city and state?", "back": "Montgomery, Alabama"}, {"front": "What was the cause of Sara Haardt's death in 1935?", "back": "Tubercular meningitis"}, {"front": "How did Sara Haardt's death affect Mencken’s public persona according to his associates?", "back": "Something in him hardened"}, {"front": "On what date in 1948 did Mencken suffer a massive, career-ending stroke?", "back": "November 23, 1948"}, {"front": "What two specific cognitive abilities did Mencken lose following his 1948 stroke?", "back": "Reading and writing"}, {"front": "Where was the Hollins Street rowhouse located where Mencken lived for most of his life?", "back": "Baltimore"}, {"front": "On what date did H.L. Mencken die?", "back": "January 29, 1956"}, {"front": "At what age did H.L. Mencken pass away?", "back": "Seventy-five (75)"}, {"front": "What was the popular nickname given to H.L. Mencken?", "back": "The Sage of Baltimore"}, {"front": "In what year was Mencken's work 'The American Language' published?", "back": "1919"}, {"front": "How many volumes make up Mencken’s collection of essays titled 'Prejudices'?", "back": "Six (6)"}, {"front": "What is the title of Mencken’s 1926 book regarding political theory?", "back": "Notes on Democracy"}, {"front": "Which magazine did Mencken edit between 1914 and 1923?", "back": "The Smart Set"}, {"front": "What magazine did H.L. Mencken found in 1924?", "back": "The American Mercury"}, {"front": "Mencken's prose style is described as flamboyant, aggressive, learned, and deliberately _____.", "back": "Outrageous"}, {"front": "According to the text, what was Mencken's primary motivation for writing?", "back": "The world offended his intelligence"}, {"front": "Term: personbox description of H.L. Mencken", "back": "American journalist, essayist, satirist, and cultural critic"}, {"front": "Mencken's mother was Anna Abhau and his father was _____ Mencken.", "back": "August"}, {"front": "Mencken's 'Monday Articles' appeared in which specific Sunpaper?", "back": "The Evening Sun"}, {"front": "For how many years did Mencken live in a state of near silence following his 1948 stroke?", "back": "Seven years"}, {"front": "What city did Mencken famously mock and defend, yet refuse to ever leave?", "back": "Baltimore"}, {"front": "Between which years were the six volumes of 'Prejudices' published?", "back": "1919–1927"}, {"front": "According to the text, how did Mencken's childhood environment rank in terms of social class?", "back": "Middle-class"}, {"front": "What was the professional background of Sara Haardt before her marriage?", "back": "Writer and college instructor"}, {"front": "Mencken is credited with setting the standard for American _____ through his aggressive and learned prose.", "back": "Cultural criticism"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
