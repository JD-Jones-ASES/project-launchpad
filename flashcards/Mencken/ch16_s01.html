<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 16, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How does Mencken interpret the existence of an occasional man of integrity in democratic politics?", "back": "He argues that the exception serves only to illuminate the 'squalor of the rule,' suggesting that such integrity is rare and highlights the pervasive corruption."}, {"front": "According to Mencken, what does it signify when a man of unquestionable integrity and ability attains high office in a democracy?", "back": "It happens 'only by a failure of the rule,' meaning the system's inherent design typically works against such individuals."}, {"front": "What compromises does a 'self-respecting candidate' typically make to succeed in democratic politics?", "back": "Efforts to diminish the heavy odds against him involve compromising 'complete candour' and potentially sacrificing valuable self-respect."}, {"front": "Describe the two coping mechanisms a self-respecting candidate might adopt when facing political compromises.", "back": "He might take refuge in cynicism, treating the 'cozening of the populace' as a cruel intellectual exercise, or accept conditions resignedly, charging 'dodges and false pretences' to spiritual profit and loss."}, {"front": "What is the ultimate cost to a self-respecting man who compromises his integrity for political success, according to Mencken?", "back": "He parts with something 'tremendously valuable' to himself, and 'even more valuable to the country he serves'—his honor and integrity."}, {"front": "How does Mencken characterize the members of the national House of Representatives?", "back": "He views them as 'a group of men who have compromised with honour—in brief, a group of male Magdalens.'"}, {"front": "What fate typically awaits 'occasional mavericks' (men of integrity) in Congress, according to Mencken?", "back": "They 'last a session, and then disappear,' unable to maintain their position within the established system."}, {"front": "Identify the two types of 'veteran' Congressmen who achieve genuine influence and power, as described by Mencken.", "back": "They are either so stupid that 'the ideas of the mob are his own ideas,' or 'so far gone in charlatanry that he is unconscious of his shame.'"}, {"front": "Define 'charlatanry' as it is used in the provided text.", "back": "The practice of a charlatan; fraudulent claims to knowledge or skill."}, {"front": "According to Mencken, who primarily creates and enforces laws in a democracy?", "back": "Laws are made by men who 'have sold their honour for their jobs' and executed by men who 'put their jobs above justice and common sense.'"}, {"front": "What paradoxical statement does Mencken make about the source of good in a democracy?", "back": "He states, 'We are dependent for whatever good flows out of democracy upon men who do not believe in democracy.'"}, {"front": "Beyond democracy, what is Mencken's broader argument about the nature of all government?", "back": "He asserts that all government is essentially 'a conspiracy of a small group against the masses of men,' where officeholders prioritize their jobs over their obligations."}, {"front": "Compare the nature of flatterers under a king (courtiers) versus under the mob (democratic politicians).", "back": "While both exist, a courtier abases himself before a theoretical superior/equal, whereas a democratic politician must abase himself before 'swine' (the mob)."}, {"front": "Why does Mencken suggest a courtier can maintain or regain honor more easily than a democratic politician?", "back": "A courtier isn't forced to pretend to be worse than he is or 'hold his nose' before his benefactor, and his sovereign may respect his honor. The mob, however, lacks such sensitivity or awareness of honor."}, {"front": "Provide an example of honor, as depicted by Mencken, that democrats found puzzling or contemptible.", "back": "Wilhelm I of Prussia refused the imperial crown from a parliament, stating he could only accept it from his equals (sovereign princes), an attitude based on honor that democrats deemed offensive."}, {"front": "How does Mencken claim democrats typically perceive an attitude founded on honor, dignity, and integrity?", "back": "He states that such an attitude seems 'contemptible and offensive' to a democrat."}, {"front": "What reason did Frederick the Great give for only commissioning Junker in his army, and how did democrats typically interpret this?", "back": "He chose Junker because 'they will not lie and they cannot be bought.' Democrats, however, interpreted this as proof that Junker were 'scoundrels, but also half-wits.'"}, {"front": "How do democratic politicians typically preserve their 'amour propre' (self-esteem) when faced with the realities of political life?", "back": "They deny the plain facts, converting their degradations into renunciations, self-seeking into public spirit, and 'swinishness into heroism.'"}, {"front": "What is the origin of the belief that the 'mob is wise' and 'always comes to right decisions in the long run'?", "back": "This doctrine was 'invented by mob-masters to save their faces' and is generally not taken seriously by genuine statesmen."}, {"front": "What historical event does Mencken cite to challenge the notion of the 'mob's wisdom'?", "back": "He refers to 'the long history of the anti-slavery agitation in America' as 'a truly magnificent record of buncombe, false pretences, and imbecility.'"}, {"front": "What crucial assumption does a 'genuine statesman' make about the mob, even if accidentally produced by democracy?", "back": "He assumes it is 'difficult, if not impossible to go to the mob for support, and still retain the ordinary decencies.'"}, {"front": "According to Mencken, how did the framers of the US Constitution intend to protect the honor of high-ranking state officials?", "back": "As expressed in Article II, Sections 1 and 2, their intent was to relieve these officials of the 'degrading necessity' of seeking direct mob support."}, {"front": "What common method is employed to safeguard an office's integrity when it becomes riddled with corruption?", "back": "The office is 'taken out of the gift of the mob, and make it appointive.'"}, {"front": "Why is seeking an appointive office (from a President or Governor) considered less humiliating than seeking it directly from the mob?", "back": "The appointer, even if flawed, 'is at least able to understand plain English, and need not be put into good humour by the arts of the circus clown or Baptist evangelist.'"}, {"front": "Summarize Mencken's essential objection to democracy in comparison to his essential objection to feudalism.", "back": "Feudalism imposed degrading acts upon the vassal toward a brutal suzerain. Democracy, with few exceptions, imposes degrading acts upon state officials toward ignorant constituents (the mob)."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
