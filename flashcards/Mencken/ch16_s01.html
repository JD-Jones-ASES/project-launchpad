<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 16, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What rhetorical purpose does Mencken's concession that some men of integrity reach high office serve?", "back": "It strengthens his case by acknowledging and then testing the strongest objection to his argument."}, {"front": "In Mencken's logic, how does the 'occasional exception' of a good man in office relate to the general rule of political corruption?", "back": "The exception proves the rule by testing and ultimately confirming it."}, {"front": "Mencken compares the American democratic system to which historical English system?", "back": "The English oligarchy."}, {"front": "According to the text, why does Mencken use the English comparison instead of stating his defense of aristocratic values directly?", "back": "It allows him to smuggle in those values without losing his American audience."}, {"front": "Which 19th-century French thinker also compared the English aristocracy to American democracy in 'Democracy in America'?", "back": "Alexis de Tocqueville."}, {"front": "In Mencken's rhetorical framework, what do Oxford and Cambridge represent?", "back": "An idealized vision of governance where scholarship and breeding temper popular opinion."}, {"front": "According to the text, what is the definition of a 'persona' in rhetoric?", "back": "A constructed voice or character through which an author speaks, distinct from their real-life identity."}, {"front": "How does Mencken's persona in 'Notes on Democracy' differ from his actual professional life?", "back": "His persona is a detached, scornful aristocrat, while he was actually an engaged journalist in Baltimore."}, {"front": "What specific tonal shift occurs when Mencken narrates the story of Wilhelm I of Prussia?", "back": "He moves from satiric prose to a voice of philosophical resignation and genuine admiration for honor."}, {"front": "On what grounds did Wilhelm I of Prussia refuse the imperial crown, according to Mencken?", "back": "He refused it because he believed he could only accept it from his equals."}, {"front": "Which two contrasting vocabularies dominate Section 1 of the analysis?", "back": "The vocabulary of honor/rectitude and the vocabulary of degradation/shame."}, {"front": "Term: male Magdalens", "back": "Definition: A phrase applying the language of sexual shame and prostitution to political compromise."}, {"front": "What is the rhetorical effect of Mencken's gender reversal in the phrase 'male Magdalens'?", "back": "It creates a note of grotesque comedy by casting powerful men in a traditionally feminine role of shame."}, {"front": "Term: charlatanry", "back": "Definition: The practice of pretending to possess knowledge or skills one does not actually have."}, {"front": "Why does Mencken choose the French term 'amour propre' over the English 'self-respect'?", "back": "It carries a connotation of vanity, suggesting the politician defends a shallow self-image rather than true honor."}, {"front": "Term: suzerain", "back": "Definition: A feudal lord to whom a vassal owes allegiance."}, {"front": "In Mencken's comparison, to whom does the modern democratic politician owe homage, effectively acting as a vassal?", "back": "The constituents (the mob)."}, {"front": "Which syntactic device is used in the phrases 'They have been broken...', 'They have learned...', and 'They have kept silent...'?", "back": "Anaphora."}, {"front": "What is the primary syntactic feature of the section's final sentence regarding feudalism and democracy?", "back": "Parallelism (or balanced syntax)."}, {"front": "What is the 'essential objection' to feudalism according to Mencken's peroration?", "back": "It imposed degrading acts and attitudes upon the vassal."}, {"front": "What is the 'essential objection' to democracy according to Mencken's peroration?", "back": "It imposes degrading acts and attitudes upon the men responsible for the state's welfare."}, {"front": "How does the target of degradation differ between feudalism and democracy in Mencken's final argument?", "back": "Feudalism degrades the powerless (vassals), whereas democracy degrades the powerful (leaders)."}, {"front": "What figure of speech is the Frederick the Great anecdote classified as in the text?", "back": "An exemplum (historical exemplum)."}, {"front": "According to Frederick the Great, why did he only give army commissions to Junker?", "back": "Because they would not lie and could not be bought."}, {"front": "How does Mencken interpret the democratic theory that Junkers are 'half-wits'?", "back": "He suggests democrats mistake the Junkers' incorruptibility for a lack of intelligence."}, {"front": "The _____ of Mencken's argument are not merely ornamental; they are described as being the argument itself.", "back": "Antitheses"}, {"front": "What does Mencken's use of a dash signal in the sentence regarding the value of a man's integrity?", "back": "A crucial qualification that deepens the thought from a personal to a political level."}, {"front": "Why does the text claim Mencken's admiration for Prussian aristocrats is not a call for authoritarianism?", "back": "His focus is on the individual cost of politics to integrity, not the superiority of one government system over another."}, {"front": "In Mencken's view, the democrat's reaction to Wilhelm I's refusal of the crown constitutes an irony of _____.", "back": "Situation"}, {"front": "What role does the parenthetical phrase '(the perfect antithesis to democracy)' play in Mencken's final summary?", "back": "It establishes that the two systems are opposites, meaning what is true for one is false for the other."}, {"front": "According to the close reading, what does the phrase 'with few exceptions' in the final paragraph demonstrate syntactically?", "back": "It mirrors the fragility and rarity of the exceptions themselves by being a weak parenthetical aside."}, {"front": "What two things does Frederick the Great claim a Junker will never do?", "back": "Lie and be bought."}, {"front": "Mencken uses the vocabulary of 'crawled' and 'broken to the goose-step' to describe the politician's _____.", "back": "Degradation"}, {"front": "According to the text, how does Mencken's 'prosecutorial' voice differ from his 'philosophical' voice?", "back": "The prosecutorial voice is satiric and aggressive, while the philosophical voice is balanced, precise, and serious."}, {"front": "What is the rhetorical effect of the monosyllable 'both' at the end of Mencken's comparison between suzerains and constituents?", "back": "It acts as a punchline that emphasizes the ignorance and brutality of the democratic majority."}, {"front": "Mencken's comparison of the courtier to the politician is an example of what structural figure?", "back": "Antithesis"}, {"front": "The phrase 'male Magdalens' continues a metaphor of _____ initiated in a previous section.", "back": "Political prostitution"}, {"front": "Mencken argues that under democracy, the 'vassal' now bows to the _____ instead of a lord.", "back": "Mob"}, {"front": "What does Mencken suggest is the ultimate cost of democratic politics to the individual leader?", "back": "The loss of self-respect and the necessity of committing degrading acts."}, {"front": "Why was the Frederick the Great anecdote effective in Mencken’s argument?", "back": "Its simplicity and lack of irony provide a stark contrast to the lying nature of democratic politicians."}, {"front": "Concept: The Exception Proves the Rule", "back": "In this context, it means the exception serves to test the validity of the rule and ultimately confirms its general truth."}, {"front": "Mencken's use of 'integrity' and 'rectitude' constitutes the language of _____.", "back": "Honor"}, {"front": "The term used by Mencken to describe a politician who has practiced deception so long it has become second nature is _____.", "back": "Charlatan"}, {"front": "In the comparison between the suzerain and the constituent, what traits do they both share according to Mencken's final sentence?", "back": "Brutality and ignorance."}, {"front": "What does the text identify as the 'hinge' of the final parallel sentence comparing feudalism and democracy?", "back": "The phrase 'degrading acts and attitudes'."}, {"front": "How does Mencken justify the historical inaccuracy of his 'idealized vision' of English governance?", "back": "He uses it as a rhetorical tool that his American readers cannot easily fact-check against their own experience."}, {"front": "In the context of the Frederick the Great anecdote, what is a 'Junker'?", "back": "A member of the Prussian landed aristocracy."}, {"front": "Mencken’s", "back": "Repentance (for a sin they continue to commit)."}, {"front": "According to the text, what allows Mencken to say things that a 'more openly positioned writer' could not?", "back": "The gap between his constructed persona and his real-life identity."}, {"front": "Which rhetorical strategy involves acknowledging a counter-argument to strengthen one's own position?", "back": "Tactical concession."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
