<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What was H.L. Mencken's fundamental belief about daily journalism?", "back": "He believed it was the most honest form of writing because it demanded clarity, speed, and direct contact with the actual world.", "id": "fc01"}, {"front": "How did Mencken generally view academics and most literary criticism?", "back": "He distrusted academics, despised \"professors of English,\" and considered most literary criticism a \"species of fraud.\"", "id": "fc02"}, {"front": "Describe the characteristics of Mencken's own literary criticism.", "back": "It was written in punchy, opinionated, and entertaining prose. He pronounced judgment on literature loudly and confidently rather than analyzing it.", "id": "fc03"}, {"front": "What was 'the genteel tradition' in American letters, and how did Mencken relate to it?", "back": "Coined by George Santayana in 1911, it described the polite, moralistic, and increasingly lifeless literary culture dominating late 19th-century American letters. Mencken considered it his \"personal enemy.\"", "id": "fc04"}, {"front": "Name two prominent American writers Mencken championed against the 'genteel tradition.'", "back": "Theodore Dreiser (for his raw naturalism) and Sinclair Lewis (for his satirical novels).", "id": "fc05"}, {"front": "Beyond American authors, which European literary figures did Mencken introduce to English-language readers?", "back": "He introduced readers to Joseph Conrad, Nietzsche, and a broader European literary world.", "id": "fc06"}, {"front": "What key values did Mencken prioritize in his literary judgments?", "back": "He valued vitality over propriety, honesty over elegance, and genuine talent over approved mediocrity.", "id": "fc07"}, {"front": "What was Mencken's 'scholarly masterpiece,' and what did it explore?", "back": "His masterpiece was *The American Language* (1919), a monumental study of how American English diverged from British English in vocabulary, pronunciation, spelling, and idiom.", "id": "fc08"}, {"front": "What was the significance of the title of Mencken's *Prejudices* series (1919–1927)?", "back": "The title was deliberately provocative; Mencken openly displayed his biases and considered objectivity a pretense of the mediocre.", "id": "fc09"}, {"front": "List some of Mencken's numerous 'enemies' in American culture and society.", "back": "Puritanism, Prohibition, evangelical Christianity, political demagogues, academic pedantry, popular sentimentality, and the entire apparatus of democratic moralism he called \"the uplift.\"", "id": "fc10"}, {"front": "Who were Mencken's primary 'heroes'?", "back": "Friedrich Nietzsche (for his contempt for herd morality), the natural aristocracy of talent and intelligence, and the independent mind that defied public opinion.", "id": "fc11"}, {"front": "Explain 'register mixing' as a characteristic of Mencken's prose style.", "back": "He combined slang and colloquial language with formal or scholarly diction. This clash was intentional, designed to deflate pretension and keep the reader off balance.", "id": "fc12"}, {"front": "How did Mencken utilize 'hyperbole' in his writing?", "back": "He routinely overstated his case significantly. This exaggeration was a deliberate technique to challenge the reader to discern the real argument beneath the surface.", "id": "fc13"}, {"front": "What is 'mock-scientific diction' in Mencken's writing style?", "back": "He borrowed vocabulary from biology, medicine, and psychology to discuss politics and culture, treating human folly as a clinical specimen.", "id": "fc14"}, {"front": "Describe the effect of Mencken's 'devastating short sentences.'", "back": "After constructing a long, elaborate argument, he would deliver a two- or three-word sentence that acted as a lethal verdict, creating a powerful contrast.", "id": "fc15"}, {"front": "Who was Theodore Dreiser, and what was his relationship with Mencken?", "back": "An American novelist (e.g., *Sister Carrie*, *An American Tragedy*) who pioneered literary naturalism. Mencken championed his fiction against critics who deemed it crude and immoral, maintaining a turbulent friendship.", "id": "fc16"}, {"front": "Who was Sinclair Lewis, and what was his significance in American literature?", "back": "An American novelist (e.g., *Main Street*, *Babbitt*) and the first American to win the Nobel Prize in Literature. His satirical novels attacked conformity and materialism in middle-class American life, making him a natural ally to Mencken.", "id": "fc17"}, {"front": "What did Mencken mean by 'the uplift'?", "back": "It was his label for the entire apparatus of democratic moralism, encompassing elements like Puritanism, Prohibition, evangelical Christianity, and popular sentimentality, all of which he opposed.", "id": "fc18"}, {"front": "How did Mencken connect to the philosophy of Friedrich Nietzsche?", "back": "Mencken translated Nietzsche's contempt for 'herd morality' into American terms, applying it to his critique of cultural and political conformity in the United States.", "id": "fc19"}, {"front": "What broader quality did *The American Language* demonstrate about Mencken, beyond his critical 'fireworks'?", "back": "It showcased his genuine erudition and a scholar's patience for detail, revealing a deeper academic side beneath his opinionated critical persona.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
