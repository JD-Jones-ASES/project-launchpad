<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What did H.L. Mencken consider to be his primary professional identity?", "back": "He considered himself a newspaper man first and last."}, {"front": "Why did Mencken believe daily journalism was the most honest form of writing?", "back": "It required clarity, speed, and direct contact with the actual world."}, {"front": "How did Mencken generally regard literary criticism as a profession?", "back": "He considered it a species of fraud."}, {"front": "Whom did Mencken specifically target when he expressed disdain for academics?", "back": "He despised those he called \"professors of English.\""}, {"front": "Instead of literary analysis, what was the primary aim of Mencken's criticism?", "back": "His aim was to pronounce judgment loudly and with absolute confidence."}, {"front": "Who coined the term \"genteel tradition\" in 1911?", "back": "The philosopher George Santayana."}, {"front": "How did George Santayana describe the \"genteel tradition\" in American letters?", "back": "As a polite, moralistic, and increasingly lifeless literary culture."}, {"front": "Which literary movement did Theodore Dreiser pioneer in the United States?", "back": "Literary naturalism."}, {"front": "Why did respectable critics initially dismiss Theodore Dreiser's work?", "back": "They considered his raw naturalism to be vulgar and immoral."}, {"front": "Identify the two major novels by Theodore Dreiser mentioned in the text.", "back": "Sister Carrie and An American Tragedy."}, {"front": "What was the nature of the long-term relationship between Mencken and Dreiser?", "back": "They maintained a turbulent friendship for decades."}, {"front": "Who was the first American writer to win the Nobel Prize in Literature?", "back": "Sinclair Lewis, who won the prize in 1930."}, {"front": "What were the primary targets of Sinclair Lewis’s satirical novels?", "back": "The conformity, materialism, and cultural poverty of middle-class American life."}, {"front": "List the three satirical novels by Sinclair Lewis highlighted in the text.", "back": "Main Street, Babbitt, and Elmer Gantry."}, {"front": "What derogatory term did Mencken and Sinclair Lewis use to describe the American masses?", "back": "The booboisie."}, {"front": "Which European philosopher's contempt for \"herd morality\" did Mencken champion?", "back": "Friedrich Nietzsche."}, {"front": "Besides Nietzsche, which English-language author did Mencken introduce to readers to challenge American provincialism?", "back": "Joseph Conrad."}, {"front": "In his criticism, what quality did Mencken value over propriety?", "back": "He valued vitality over propriety."}, {"front": "In his criticism, what quality did Mencken value over elegance?", "back": "He valued honesty over elegance."}, {"front": "Mencken prioritized genuine talent over what he called \"_____.\"", "back": "Approved mediocrity."}, {"front": "What is the title of Mencken’s 1919 scholarly study of American English?", "back": "The American Language."}, {"front": "What was the central thesis of Mencken's 'The American Language'?", "back": "It demonstrated how American English had diverged from British English."}, {"front": "The American Language analyzed divergence in vocabulary, spelling, idiom, and _____.", "back": "Pronunciation."}, {"front": "How many volumes comprise Mencken's 'Prejudices' series?", "back": "Six volumes."}, {"front": "Between which years was the 'Prejudices' series published?", "back": "1919 and 1927."}, {"front": "Why did Mencken choose the provocative title 'Prejudices' for his essay collections?", "back": "He wore his biases openly and viewed objectivity as a pretension of the mediocre."}, {"front": "What collective label did Mencken use for democratic moralism and its associated apparatus?", "back": "The uplift."}, {"front": "Which religious movement did Mencken count among his primary enemies?", "back": "Evangelical Christianity (or Puritanism)."}, {"front": "Which political policy of the early 20th century was a major target of Mencken’s criticism?", "back": "Prohibition."}, {"front": "What type of academic behavior did Mencken include in his list of enemies?", "back": "Academic pedantry."}, {"front": "Whom did Mencken consider to be his \"heroes\"?", "back": "The natural aristocracy of talent and intelligence and the independent mind."}, {"front": "The Mencken Style: Define \"register mixing.\"", "back": "The practice of dropping slang and colloquial language into sentences of otherwise formal or scholarly diction."}, {"front": "The Mencken Style: What was the purpose of mixing slang with formal register?", "back": "To deflate pretension and keep the reader off balance."}, {"front": "The Mencken Style: How much did Mencken typically overstate his arguments when using hyperbole?", "back": "He routinely overstated his case by a factor of ten."}, {"front": "The Mencken Style: What was the intent behind Mencken's extreme use of exaggeration?", "back": "It was a deliberate technique to dare the reader to find the actual underlying argument."}, {"front": "The Mencken Style: From which three fields did Mencken borrow \"mock-scientific diction\"?", "back": "Biology, medicine, and psychology."}, {"front": "The Mencken Style: Why did Mencken use mock-scientific vocabulary to discuss culture and politics?", "back": "To treat human folly as if it were a clinical specimen."}, {"front": "The Mencken Style: How did Mencken use sentence structure to deliver a \"lethal\" verdict?", "back": "He placed a devastating two- or three-word sentence after building up a long, complex argument."}, {"front": "Term: Prejudices (1919–1927)", "back": "Definition: A six-volume collection of essays serving as a sustained assault on dishonest, sentimental, or dull American culture."}, {"front": "How did Mencken adapt Friedrich Nietzsche’s philosophy for an American audience?", "back": "He translated Nietzsche's contempt for herd morality into American terms."}, {"front": "Which 1919 book proved that Mencken possessed genuine erudition and a scholar’s patience?", "back": "The American Language."}, {"front": "In Mencken's view, what was the \"pretension of the mediocre\"?", "back": "Objectivity."}, {"front": "What quality of the independent mind did Mencken most admire?", "back": "The refusal to bow to public opinion."}, {"front": "How did Mencken characterize the American establishment in relation to European literature?", "back": "He considered the American establishment to be provincial."}, {"front": "What was Mencken's primary criticism of the \"genteel tradition\"?", "back": "He viewed it as his personal enemy because it was lifeless and moralistic."}, {"front": "The American Language was expanded through four editions and how many supplements?", "back": "Two supplements published in 1945 and 1948."}, {"front": "Which writer did Mencken champion specifically for his raw naturalism?", "back": "Theodore Dreiser."}, {"front": "Which writer did Mencken ally with to attack the small-town \"booboisie\"?", "back": "Sinclair Lewis."}, {"front": "In the Mencken Style, what is the effect of dropping a short sentence after an elaborate argument?", "back": "It creates a lethal contrast that delivers a sharp verdict."}, {"front": "Mencken's prose style is often described as punchy, opinionated, and _____.", "back": "Entertaining."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
