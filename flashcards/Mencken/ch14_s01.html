<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 14, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html#Mencken">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Mencken's rhetorical strategy involves transforming the politician from a figure of authority into an _____.", "back": "Object of clinical study"}, {"front": "What effect does Mencken's clinical stance have on his audience?", "back": "It flatters the reader by inviting them to observe the subject from a position of superiority."}, {"front": "What was the core exchange within the American \"boss system\" of the 1870s-1930s?", "back": "Patronage networks traded jobs and favors for votes."}, {"front": "Name three prominent city bosses mentioned as icons of the boss system.", "back": "William Tweed, Tom Pendergast, and Frank Hague"}, {"front": "How did the boss system function for immigrants and the poor in American cities?", "back": "It provided essential services that the formal government could not or would not deliver."}, {"front": "What persona does Mencken adopt to deliver his critique of the politician?", "back": "A prosecuting attorney delivering a summation."}, {"front": "Robert Michels is cited in the text for his theory known as the _____.", "back": "Iron law of oligarchy"}, {"front": "According to the \"iron law of oligarchy,\" what do all organizations eventually become?", "back": "Oligarchies"}, {"front": "What does Mencken's \"tonal instability\" suggest about the politician's status?", "back": "The politician is not worthy of sustained dignity and deserves occasional ridicule."}, {"front": "Which linguistic register does Mencken use to cite words like \"altruist\" and \"honour\" with contempt?", "back": "Legal and political"}, {"front": "What is the rhetorical purpose of the \"vernacular and physical\" register in Mencken's analysis?", "back": "To drag the politician's image from the platform down to the mud."}, {"front": "The \"zoological and clinical\" register frames the politician as a creature driven by _____.", "back": "Instinct"}, {"front": "Term: armamentarium", "back": "Definition: A collection of equipment or methods available for a particular purpose."}, {"front": "Mencken uses the word \"armamentarium\" to describe the politician's deceptions as having an air of _____.", "back": "Professional competence"}, {"front": "Term: demaslave", "back": "Definition: Mencken's coinage for a leader who pretends to follow the people."}, {"front": "The word \"demaslave\" is a \"shot-gun marriage\" of which two languages?", "back": "Latin and Greek"}, {"front": "Term: clapper-clawing", "back": "Definition: To scratch or claw at noisily; used to describe the vulgar applause of a crowd."}, {"front": "In Mencken's syntax, what follows a long prosecutorial sentence built of parallel clauses?", "back": "A short sentence acting as a final verdict."}, {"front": "How does Mencken use the semicolon in his descriptions of the common people?", "back": "To chain parallel clauses into an increasingly oppressive and weighted catalogue."}, {"front": "Definition: Zeugma", "back": "A figure of speech where a single word governs two or more words in different ways."}, {"front": "What is the typical effect of a zeugma on the reader?", "back": "It forces the mind to hold two incompatible meanings simultaneously, creating surprise."}, {"front": "Definition: Periodic Sentence", "back": "A sentence that delays its main clause or completion until the very end to build suspense."}, {"front": "What is the opposite of a periodic sentence?", "back": "A cumulative (or loose) sentence."}, {"front": "What is the governing analogy Mencken uses to reframe democratic politics as feudalism in reverse?", "back": "The Courtier Analogy"}, {"front": "In the Courtier Analogy, who plays the role of the king?", "back": "The mob (the common people)"}, {"front": "According to the Courtier Analogy, why does the politician yield to the employer?", "back": "To rule him."}, {"front": "In the Chorus Girl Analogy, what is equated with political compromise?", "back": "Sexual exploitation"}, {"front": "According to Mencken, what is the key difference between \"vanity\" and \"pride\"?", "back": "Vanity is pleasure in others' regard, while pride is self-respect independent of others."}, {"front": "Mencken suggests democratic politics selects for _____ rather than leaders.", "back": "Exhibitionists"}, {"front": "How does Mencken use \"apparent concession\" as a rhetorical device?", "back": "By insisting his harsh description is the \"normal\" case to imply the \"worst\" is unimaginable."}, {"front": "In the phrase \"compromised with their honour,\" what does the verb \"compromised\" imply about honour?", "back": "It is treated as a debt settled for less than the full amount."}, {"front": "How does Mencken contrast the actions of \"swallowing\" and \"whooping\" in his close reading?", "back": "Swallowing is involuntary and physical, while whooping is loud, voluntary, and bestial."}, {"front": "Why does Mencken use the word \"person\" as a euphemism in the Chorus Girl Analogy?", "back": "To make the indecency of the situation sharper through delicate precision."}, {"front": "In Mencken's writing, the parallel structure of \"They are... They are...\" is used to equate _____ with sexual compromise.", "back": "Political compromise"}, {"front": "What does Mencken mean by the politician having his \"ear ever close to the ground\"?", "back": "The politician is constantly monitoring the whims of the electorate to ensure his own survival."}, {"front": "How does Mencken's use of Robert Michels' quote affect the rhetorical tone?", "back": "It provides a mask of academic respectability to his polemic."}, {"front": "Which city boss was associated with Tammany Hall in New York?", "back": "William Tweed"}, {"front": "Tom Pendergast was a political boss in which American city?", "back": "Kansas City"}, {"front": "Which register of diction includes terms like \"specimen,\" \"breed,\" and \"congenital\"?", "back": "Zoological and clinical"}, {"front": "The phrase \"to butter his parsnips\" belongs to which register of Mencken's diction?", "back": "Vernacular and physical"}, {"front": "What does Mencken's use of \"ignobility\" at the end of a periodic sentence represent?", "back": "The final, inescapable verdict of the argument."}, {"front": "According to the analysis, what does the politician lose while retaining vanity?", "back": "Pride (self-respect)"}, {"front": "What is the significance of veteran politicians being compared to chorus girls of \"long experience\"?", "back": "They have become resigned and even complacent about their own self-degradation."}, {"front": "How does Mencken's syntactic rhythm reflect his \"prosecutorial\" stance?", "back": "By using long sentences for evidence and short sentences for the gavel-like verdict."}, {"front": "Mencken's audience is primarily characterized as the _____ reader.", "back": "Educated"}, {"front": "The word \"demagogue\" comes from the Greek for \"leader of the people,\" but Mencken's \"demaslave\" implies the leader is actually a _____.", "back": "Slave to the people"}, {"front": "What does the text identify as the \"central effect\" of Mencken's shifting diction?", "back": "The contrast between elevated self-image and gutter reality."}, {"front": "What does Mencken's comparison of the politician to a courtier imply about the nature of democracy?", "back": "It is a form of feudalism in reverse."}, {"front": "The use of the word \"whooping\" suggests that the politician's public support for untruths is _____.", "back": "Noisy and performative"}, {"front": "In the context of the boss system, what was traded in exchange for \"coal and favors\"?", "back": "Votes"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
