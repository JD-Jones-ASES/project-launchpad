<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../quizzes.html">&larr; Back to Quiz Hub</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the primary argument Mencken presents in 'Varieties of Homo Sapiens' regarding human intelligence?", "back": "Human beings differ in intelligence as obviously as they do in height."}, {"front": "According to Mencken, why is the vast majority of humanity unfit for self-governance?", "back": "They are too stupid to govern themselves."}, {"front": "In his rhetorical strategy, Mencken adopts the persona of a _____ observing specimens in a laboratory.", "back": "disinterested naturalist"}, {"front": "What is the intended effect of Mencken using the 'language and methods of natural science' in his argument?", "back": "It implies his conclusions are objective findings rather than personal opinions."}, {"front": "How does Mencken define a 'democrat' in the context of his Chapter 3 analysis?", "back": "Anyone who believes in the fundamental competence of the common man."}, {"front": "Who are the secondary targets of Mencken's critique regarding intelligence testing?", "back": "Liberals who criticize the movement out of a faith in human equality."}, {"front": "Which German philosopher's critique of 'herd morality' profoundly influenced Mencken?", "back": "Friedrich Nietzsche"}, {"front": "How did Friedrich Nietzsche categorize democratic egalitarianism?", "back": "As a form of 'slave morality' or the resentment of the weak."}, {"front": "What distinction did Nietzsche make between moralities that Mencken echoes in his writing?", "back": "The distinction between 'master' and 'slave' moralities."}, {"front": "Describe the specific 'voice' Mencken adopts to treat human beings as objects of study.", "back": "The clinical tone of a mock-scientist."}, {"front": "What rhetorical purpose is served by Mencken's eruptions of contempt within his clinical tone?", "back": "They make his scorn seem like an earned conclusion based on observation."}, {"front": "Mencken's title 'Varieties of Homo Sapiens' borrows from which biological classification system?", "back": "The Linnaean system"}, {"front": "What is the meaning of Mencken's mock-Latin coinage 'Homo stultus'?", "back": "Foolish man."}, {"front": "To whom does Mencken attribute the coinage of the term 'Homo stultus'?", "back": "The French physiologist Charles Richet."}, {"front": "How does Mencken use 'register mixing' as an aggressive rhetorical tool?", "back": "He yokes scientific Latin with savage editorial judgments."}, {"front": "Define the term 'ratiocination' as Mencken applies it to the 'superior' mind.", "back": "The process of logical, methodical reasoning."}, {"front": "Why does Mencken use the word 'pedagogue' with consistent contempt?", "back": "It represents the democratic delusion that everyone can be educated."}, {"front": "How does Mencken use the word 'transcendental' to mock believers in equality?", "back": "He suggests their faith belongs to theology rather than realistic politics."}, {"front": "What specific bodily function does Mencken compare the 'inferior' mind's activity to?", "back": "Insensate sweating, like that of a kidney."}, {"front": "What does the word 'insensate' imply about Mencken's view of common thought?", "back": "It lacks consciousness or feeling."}, {"front": "How does Mencken's syntax mimic the form of scientific argument?", "back": "He uses long sentences that pile up evidence before delivering a verdict."}, {"front": "What is the rhetorical effect of Mencken's 'devastating short sentence' after a long buildup?", "back": "The brevity acts as a 'punch' or 'killing' blow to the argument's subject."}, {"front": "What is the dominant figure of speech used throughout 'Varieties of Homo Sapiens'?", "back": "The extended metaphor of humanity as a zoological collection."}, {"front": "Define an 'extended metaphor' in the context of Mencken’s writing style.", "back": "A comparison sustained across multiple sentences or paragraphs that elaborates on the original idea."}, {"front": "Mencken compares the democratic belief in equality to which biblical book?", "back": "Genesis."}, {"front": "By comparing democratic theory to madstones and ectoplasms, what does Mencken imply about it?", "back": "That it belongs to the category of superstition and credulity."}, {"front": "In the 'kidney simile,' what does the comparison to a kidney suggest about the work of the 'inferior' mind?", "back": "It is necessary but mindless processing of waste."}, {"front": "Which rhetorical device is used in the sentence comparing minds that perform 'high deeds' versus those that 'sweat like a kidney'?", "back": "Antithesis."}, {"front": "How does Mencken's use of 'high and arduous deeds' contrast with his", "back": "It uses the vocabulary of heroic endeavor to heighten the subsequent descent into visceral insult."}, {"front": "What does Mencken's use of parallel structure in his sentences often disguise?", "back": "The logical asymmetry of his arguments."}, {"front": "What is the primary rhetorical goal of Mencken's mock-scientific vocabulary?", "back": "To give his prejudices the weight of taxonomy."}, {"front": "In the context of Mencken's style, what does the transition from 'clinical' to 'crude' language achieve?", "back": "It uses scientific framing to make his insults seem inevitable."}, {"front": "According to the close reading, where does Mencken place his most vivid sentences to persuade the reader?", "back": "At the beginning of a section, before logic has been fully established."}, {"front": "Mencken's division of humanity into 'superior' and 'inferior' types is a direct echo of which philosopher?", "back": "Friedrich Nietzsche."}, {"front": "How does Mencken's persona differ between Chapter 2 and Chapter 3?", "back": "He shifts from a mock-historian to a mock-scientist."}, {"front": "What does Mencken believe is the 'democratic delusion' regarding education?", "back": "The idea that every individual is capable of being educated."}, {"front": "How does Mencken use the word 'gratuitous' to insult democratic objections?", "back": "He uses it as a scholarly sounding word that functions as an insult."}, {"front": "In Mencken's zoological metaphor, how is the democratic electorate treated?", "back": "As a set of specimens to be sorted and labelled."}, {"front": "What is the 'class implication' of the kidney simile in Mencken's analysis?", "back": "The inferior man performs a function in democracy that he neither understands nor appreciates."}, {"front": "What does the phrase 'insensate sweating' reduce human thought to in Mencken's imagery?", "back": "A biological secretion."}, {"front": "Mencken uses parallel phrasing like 'Of one mind... Of another' to create a sense of _____ judgment.", "back": "balanced"}, {"front": "What is the 'secondary target' of Mencken’s attack in this section besides the common man?", "back": "Critics of the intelligence testing movement."}, {"front": "How does Mencken position himself relative to the intelligence testing movement?", "back": "As an independent observer willing to use tests when they suit him without being a partisan."}, {"front": "Mencken's use of the Linnaean system is an example of using _____ to serve political argument.", "back": "biological classification"}, {"front": "According to the teacher's note, what is the central question regarding Mencken's rhetorical power?", "back": "Whether rhetorical power and logical validity are the same thing."}, {"front": "Which word does Mencken use to describe the process of logical reasoning reserved for 'superior' minds?", "back": "Ratiocination."}, {"front": "What does Mencken's clinical tone effectively do to citizens with rights?", "back": "It treats them as objects of study."}, {"front": "What is the effect of placing democratic faith alongside 'witches' and 'madstones'?", "back": "It implies that democratic beliefs are forms of irrational credulity."}, {"front": "In Mencken's 'Varieties of Homo Sapiens,' the ' naturalist's calm' is frequently broken by _____.", "back": "eruptions of contempt"}, {"front": "What stylistic device uses words like 'superior equipment' and 'high deeds' followed by 'insensate sweating'?", "back": "Antithesis."}, {"front": "Mencken describes the democratic faith in equality as _____, suggesting it is based on sentiment rather than fact.", "back": "metaphysical"}, {"front": "In the sentence 'In other words, they actually work,' what rhetorical role does brevity play?", "back": "It delivers the final, definitive verdict after a long buildup."}, {"front": "What does Mencken's use of scientific Latin achieve for his 'savage editorial judgment'?", "back": "It gives the judgment a veneer of objectivity and precision."}, {"front": "According to Mencken, what is the 'raw material' of democracy that he attacks in Chapter 3?", "back": "The people themselves."}, {"front": "The shift in Mencken's register from the laboratory to 'the gutter' constitutes his primary _____.", "back": "argument"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
