<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's definition of the 'inferior man'?", "back": "Mencken's term for the average citizen whose intellectual limitations make self-government impossible, echoing Nietzsche's contrast between higher and lower types.", "id": "fc01"}, {"front": "According to Mencken, how much evidence exists for the 'wisdom' and 'virtue' of the inferior man?", "back": "He contends there is no more evidence for them than for superstitions like Friday being an unlucky day, calling them 'phantasms' that are difficult to disprove.", "id": "fc02"}, {"front": "How does Mencken describe the fundamental nature and operation of the human mind?", "back": "He states it is primarily a function of purely physical and chemical phenomena, subject to the same natural laws that govern the development of physical organs.", "id": "fc03"}, {"front": "Explain Mencken's view on the inherent differences between human minds.", "back": "He observes minds with superior equipment for 'high and arduous deeds' and others that 'never get any further than a sort of insensate sweating,' meaning men differ naturally in their innate intellectual capacity.", "id": "fc04"}, {"front": "What is Mencken's ironic use of the term 'Homo sapiens'?", "back": "Latin for 'wise man,' Mencken uses it with heavy irony to highlight his belief that the majority of humanity, particularly the 'inferior man,' lacks true wisdom.", "id": "fc05"}, {"front": "What was Mencken's initial reaction to intelligence tests, and why did it change?", "back": "Initially, he reacted with 'brutish passions' because 'pedagogues' had them in hand. However, 'time and experience' eventually won him over, as the 'immense accumulations of empiric corroboration' showed them to 'actually work'.", "id": "fc06"}, {"front": "According to Mencken, why are 'Liberals' (democrats) so vehemently critical of intelligence tests?", "back": "He suggests it's because they are 'honest believers in democracy' and recognize that intelligence tests, like those by Simon and Binet, pose a 'dangerous menace' to their 'vapourings' by scientifically demonstrating inherent differences in intelligence.", "id": "fc07"}, {"front": "In what two significant ways do intelligence tests 'aid and comfort' the 'enemies' of democracy, according to Mencken?", "back": "1. They provide a scientific means to demonstrate differences in natural intelligence between individuals. 2. They offer a rational scale for measuring intelligence and a logical explanation for these differences.", "id": "fc08"}, {"front": "How does Mencken differentiate between an 'intelligent man' and a 'stupid man' based on learning capacity?", "back": "An intelligent man is capable of taking in knowledge until the natural limits of the species are reached. A stupid man's progress is arrested at some specific point before then.", "id": "fc09"}, {"front": "Define Mencken's concept of the 'unteachable' in psychology and politics.", "back": "The idea that some men, despite physical maturation, stop mental development in childhood or infancy (e.g., mental age of ten or twelve), and thus cannot learn beyond that point.", "id": "fc10"}, {"front": "How do democrats typically challenge the idea of inherent intelligence differences and the 'unteachable'?", "back": "They object not with evidence, but with 'metaphysical character' and 'gratuitous, transcendental assumptions' about what *ought* to be true, often appealing to the 'dignity of man, made in God’s image'.", "id": "fc11"}, {"front": "To what does Mencken compare democracy, particularly in its response to 'uncomfortable facts'?", "back": "He compares democracy to a 'form of theology' that exhibits 'immemorial stigmata,' such as disposing of facts by appealing to the 'highest sentiments of the human heart' and labeling opponents as 'wicked'.", "id": "fc12"}, {"front": "What 'undoubted fact' related to human intelligence does Mencken say gives democrats 'left-handed support'?", "back": "The fact that 'man on the lower levels,' though limited in absorbing actual knowledge, 'remains capable for a long time thereafter of absorbing delusions'.", "id": "fc13"}, {"front": "Where does Mencken assert the capacity for absorbing delusions is fundamentally important?", "back": "It lies at the heart of what is called religion and 'at the heart of all democratic politics no less,' suggesting the thinking of 'Homo stultus' is largely 'palpable nonsense'.", "id": "fc14"}, {"front": "Who is 'Homo stultus,' as referenced by Mencken from Charles Richet?", "back": "Meaning 'stupid man,' Mencken uses this term to describe the inferior man whose thinking is almost entirely based on 'palpable nonsense' and who possesses a 'dreadful capacity for embracing and cherishing impostures'.", "id": "fc15"}, {"front": "How does Mencken characterize the historical experience of 'Homo stultus'?", "back": "As a history of 'successive victimizations' by priests, politicians, and quacks, where his 'heroes are always frauds,' and he 'hated bitterly the men who were labouring most honestly and effectively for the progress of the race'.", "id": "fc16"}, {"front": "Why do the teachings of those working for the progress of the human race fail to resonate with 'Homo stultus'?", "back": "Mencken states that what such men teach is 'beyond his grasp,' leading 'Homo stultus' to consequently believe it is 'unsound, immoral and of the devil'.", "id": "fc17"}, {"front": "According to Mencken, what distinguishes the arguments of democrats from those of other critics regarding human intelligence?", "back": "While democrats may echo 'caveats of other and less romantic critics,' when 'hard pressed,' they 'fall back pathetically upon the argument that believing such things would be in contempt of the dignity of man, made in God’s image,' distinguishing their metaphysical objection.", "id": "fc18"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
