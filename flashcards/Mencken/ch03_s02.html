<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is H.L. Mencken's specific term for the average citizen whose intellectual limitations prevent effective self-government?", "back": "The inferior man"}, {"front": "Mencken argues that the human mind is primarily a function of physical and _____ phenomena.", "back": "Chemical"}, {"front": "According to Mencken, the development of the human mind is subject to the same natural laws as which two physical organs?", "back": "The nose and the lungs"}, {"front": "Mencken compares the functioning of a low-capacity mind to the 'insensate sweating' of which organ?", "back": "The kidney"}, {"front": "How does Mencken define an 'intelligent man' in terms of knowledge acquisition?", "back": "One capable of taking in knowledge until the species' natural limits are reached"}, {"front": "How does Mencken define a 'stupid man' regarding his intellectual progress?", "back": "One whose progress is arrested at a specific point before reaching species limits"}, {"front": "What specific 'mental age' does Mencken claim many physically adult men never progress beyond?", "back": "Ten or twelve"}, {"front": "Why did Mencken initially feel 'brutish passions' against intelligence tests?", "back": "They were managed by pedagogues (teachers)"}, {"front": "What eventually won Mencken over to the use of intelligence tests?", "back": "The accumulation of empirical evidence that they actually work"}, {"front": "Mencken identifies which group as the most 'frantic critics' of intelligence tests?", "back": "The Liberals"}, {"front": "Which two researchers created the tests that Mencken describes as a 'menace' to democratic theories?", "back": "Binet and Simon"}, {"front": "According to Mencken, intelligence tests provide a scientific means to demonstrate differences in _____ between individuals.", "back": "Natural intelligence"}, {"front": "Mencken argues that Democrats challenge the facts of intelligence differences using _____ assumptions rather than evidence.", "back": "Metaphysical (or transcendental)"}, {"front": "What 'pathetic' argument do democrats fall back on when challenged by the concept of unteachable men?", "back": "That such beliefs show contempt for the dignity of man made in God's image"}, {"front": "Mencken characterizes democracy as a form of _____, noting it possesses all the same 'immemorial stigmata.'", "back": "Theology"}, {"front": "How does the 'theology' of democracy typically treat an anti-democrat?", "back": "As a person who is not merely mistaken, but wicked"}, {"front": "Mencken claims that modern democrats are 'Fundamentalists by instinct' because they rely on which biblical verse?", "back": "Genesis 1:27"}, {"front": "What does Mencken claim is the reaction of 'man on the lower levels' when confronted by the truth?", "back": "He is daunted by it"}, {"front": "In Mencken's view, what type of information finds 'lodgment' in the lower-level mind with the least resistance?", "back": "Delusions (or what is not true)"}, {"front": "Which term, attributed to Charles Richet, does Mencken use to describe the 'stupid man'?", "back": "Homo stultus"}, {"front": "Mencken asserts that the thinking of the common man is almost entirely in terms of 'palpable _____.'", "back": "Nonsense"}, {"front": "According to the text, the history of the lower-level man is a history of successive victimization by which three groups?", "back": "Priests, politicians, and quacks"}, {"front": "How does the average man typically view those who labor honestly for the progress of the human race?", "back": "With bitter hatred and the belief that they are immoral or 'of the devil'"}, {"front": "Mencken claims that what cannot be tried and disproved has always had a '_____ lure' for illogical man.", "back": "Lascivious"}, {"front": "What does Mencken claim is the primary 'menace' to the 'vapourings' of honest believers in democracy?", "back": "Intelligence tests (specifically the Binet-Simon tests)"}, {"front": "According to Mencken, those who stop developing mentally in childhood still grow physically to 'sprout beards' and '_____.'", "back": "Political delusions"}, {"front": "Mencken argues that those who defend the 'rubbish of Genesis' do so to prevent the 'rabble' from becoming what?", "back": "One with the brutes (or unhappy and immoral)"}, {"front": "What is the result when a person of superior equipment is exposed to a 'suitable process of training'?", "back": "They acquire the largest body of knowledge and highest skill at ratiocination"}, {"front": "Mencken uses the Latin term _____ to refer to the human species with heavy irony.", "back": "Homo sapiens"}, {"front": "According to Mencken, what 'rational scale' do intelligence tests provide for understanding human differences?", "back": "A scale for measuring and explaining levels of intelligence"}, {"front": "What term does Mencken use for the category of people who can no longer learn due to natural intellectual limits?", "back": "The unteachable"}, {"front": "In Mencken’s view, why do Liberals master the danger of Binet and Simon’s work quickly?", "back": "Because they are themselves capable of learning"}, {"front": "Mencken contrasts 'naturally intelligent' men who can learn with 'naturally _____ ' men who cannot.", "back": "Stupid"}, {"front": "The phrase 'Christian juices' is used by Mencken to describe the temperament of which group?", "back": "The earliest modern democrats"}, {"front": "Mencken claims that democratic politics and religion both rely on the human capacity to absorb _____.", "back": "Impostures (or delusions)"}, {"front": "What does Mencken claim happens to a 'stupid man' when he reaches his natural intellectual limit?", "back": "His progress is arrested"}, {"front": "Mencken asserts that the 'wisdom of the inferior man' has as much evidence as the notion that _____ is an unlucky day.", "back": "Friday"}, {"front": "According to Mencken, the concept of the 'unteachable' appears first in psychology and then in _____.", "back": "Politics"}, {"front": "What does Mencken suggest would still be widely believed if human progress depended on the 'rabble'?", "back": "Witches, ectoplasms, and madstones"}, {"front": "Mencken describes the democratic belief in equality as 'congenital intuitions and inherent _____.'", "back": "Benevolences"}, {"front": "What is the 'singular and beautiful phenomenon' Mencken identifies regarding men on 'lower levels'?", "back": "Their long-term capacity for absorbing delusions despite limited knowledge capacity"}, {"front": "Mencken notes that the difference in natural intelligence was recognized by all men except _____ throughout history.", "back": "Democrats"}, {"front": "Mencken calls teachers who strictly or pedantically manage intelligence tests '_____.'", "back": "Pedagogues"}, {"front": "According to Mencken, why were people excused for believing in democratic 'phantasms' in the past?", "back": "It was difficult to put those theories to the test"}, {"front": "What does Mencken claim is the 'only surviving honest believer in democracy'?", "back": "The Liberal"}, {"front": "Mencken equates the 'gentlemen of the sacred faculty' with those who defend which biblical text?", "back": "Genesis"}, {"front": "The 'collapse of the Holy Alliance' is used by Mencken to emphasize the significance of which development?", "back": "The introduction of Binet and Simon's intelligence tests"}, {"front": "Mencken argues that men differ 'inside their heads' just as they differ _____.", "back": "Outside (physically)"}, {"front": "What is the primary reason Mencken gives for the common man's hatred of honest reformers?", "back": "What the reformers teach is beyond the common man's grasp"}, {"front": "Mencken describes 'Little Bethel' as a place frequented by those who hold which type of views?", "back": "Fundamentalist or sentimental religious views"}, {"front": "In Mencken's kidney analogy, what describes the state of a mind that lacks capacity for high deeds?", "back": "Insensate sweating"}, {"front": "What characteristic does Mencken attribute to the heroes of the common man?", "back": "They are always frauds"}, {"front": "Mencken argues that the mind's operation is governed by precisely the same _____ as the body.", "back": "Natural laws"}, {"front": "According to Mencken, the democratic objection to intelligence tests involves assumptions about what '_____ to be true.'", "back": "Ought"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
