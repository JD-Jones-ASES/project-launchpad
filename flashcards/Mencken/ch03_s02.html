<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is Mencken's central argument against humanity in the 'Varieties of Homo Sapiens' section?", "back": "Mencken argues that human beings differ vastly in intelligence, and the vast majority are too stupid to govern themselves.", "id": "fc01"}, {"front": "What rhetorical strategy does Mencken employ to make his arguments in this section appear objective?", "back": "He borrows the language and methods of natural science, presenting himself as a disinterested observer cataloguing specimens, implying his conclusions are 'findings' rather than 'opinions' or 'prejudice.'", "id": "fc02"}, {"front": "Who is Mencken's 'immediate target' in this section, and what does he mean by the term 'democrat'?", "back": "His immediate target is anyone who believes in the fundamental competence of the common man. 'Democrat' refers to this belief, not a political party member.", "id": "fc03"}, {"front": "Who is Mencken's 'secondary target' in 'Varieties of Homo Sapiens'?", "back": "Critics of the intelligence testing movement, whom he identifies as Liberals clinging to a 'sentimental faith in human equality.'", "id": "fc04"}, {"front": "Describe Mencken's persona in 'Varieties of Homo Sapiens' and how it differs from Chapter 2.", "back": "He shifts from the mock-historian of Chapter 2 to a mock-scientist. He writes as a detached, clinical naturalist examining 'specimens' of a new species.", "id": "fc05"}, {"front": "How does Mencken's clinical tone serve as a rhetorical weapon in his argument?", "back": "It treats human beings as objects of study rather than citizens with rights, thereby shifting the register to do 'half the argumentative work' before a single claim is made.", "id": "fc06"}, {"front": "Explain how Mencken's 'mask slips' during this section and the calculated purpose of these tonal breaks.", "back": "The naturalist's calm is punctuated by 'eruptions of contempt.' These are calculated to make his scorn seem 'earned' and 'inevitable,' as though derived from observation rather than temperament.", "id": "fc07"}, {"front": "What is the most striking feature of Mencken's diction in 'Varieties of Homo Sapiens'?", "back": "His use of pseudo-scientific vocabulary, especially mock-Latin terms (e.g., Homo stultus), to classify human beings and lend his prejudices the 'weight of taxonomy.'", "id": "fc08"}, {"front": "Provide an example of Mencken's 'register mixing' from the text and explain its effect.", "back": "He yokes scientific Latin (language of objectivity) to savage editorial judgment, such as coining 'Homo stultus' ('foolish man') to give his contempt a veneer of scientific respectability.", "id": "fc09"}, {"front": "Analyze how Mencken's simile 'a sort of insensate sweating, like that of a kidney' exemplifies his diction and argument.", "back": "It reduces human thought to a mindless bodily secretion. The progression from 'insensate' (medical) to 'sweating' (visceral) to 'kidney' (comic deflation) demonstrates a descent from clinical observation to crude devaluation, arguing thought is mere biological process.", "id": "fc10"}, {"front": "In Mencken's usage, what does 'ratiocination' mean and how does he apply it?", "back": "It means the process of logical, methodical reasoning. Mencken uses it without irony when describing the 'superior' mind, reserving his contempt for those he believes cannot perform it.", "id": "fc11"}, {"front": "How does Mencken typically use the word 'pedagogue' in 'Notes on Democracy'?", "back": "With consistent contempt. For Mencken, the pedagogue represents the 'democratic delusion' that everyone can be educated.", "id": "fc12"}, {"front": "What is the dominant figure of speech Mencken uses throughout 'Varieties of Homo Sapiens'?", "back": "The extended metaphor of humanity as a zoological collection, treating human intelligence as a classification problem and the democratic electorate as a set of specimens.", "id": "fc13"}, {"front": "Define an 'extended metaphor.'", "back": "An extended metaphor is a comparison sustained across multiple sentences, paragraphs, or an entire work, with each new detail elaborating the original comparison and drawing out multiple points of correspondence.", "id": "fc14"}, {"front": "What other figures of speech does Mencken use besides extended metaphor, and what is their effect?", "back": "He uses irony (e.g., calling democratic objections 'metaphysical and gratuitous') and analogy (e.g., comparing democratic theory to Genesis or belief in witches). These are deliberately insulting, equating democratic faith with superstition.", "id": "fc15"}, {"front": "How does Mencken's cumulative sentence style contribute to his argument?", "back": "He piles up evidence and examples in long sentences that swell with subordinate clauses, mimicking the form of scientific argument – the careful marshalling of data before a verdict – even though the 'data' is largely his opinion.", "id": "fc16"}, {"front": "Describe Mencken's 'signature move' regarding syntax and rhythm.", "back": "The devastating short sentence delivered after a long build-up. The long sentences do the framing, and the brevity of the short sentence provides the 'punch' or 'killing' verdict.", "id": "fc17"}, {"front": "How does Friedrich Nietzsche's philosophy influence Mencken's thinking in this section?", "back": "Nietzsche's critique of 'herd morality' and distinction between 'master' and 'slave' moralities profoundly influenced Mencken, whose division of humanity into 'superior' and 'inferior' types echoes Nietzsche's categories.", "id": "fc18"}, {"front": "Explain Nietzsche's concept of 'slave morality' as it relates to democratic egalitarianism.", "back": "Nietzsche argued that democratic egalitarianism was a form of 'slave morality'—the resentment of the weak disguised as a moral principle.", "id": "fc19"}, {"front": "Analyze the rhetorical effect of the parallelism in Mencken's statement: 'Of one mind we may say... Of another we may say...'", "back": "The parallelism creates a sense of balanced judgment, as if weighing evidence on a scale. However, the scale is 'rigged' because the first clause describes a rare exception, the second the majority, disguising the asymmetry of the argument.", "id": "fc20"}, {"front": "Identify the rhetorical device and structure used in the close-read sentence: 'There are minds which start out with a superior equipment... there are minds which never get any further than a sort of insensate sweating, like that of a kidney.'", "back": "Antithesis. The semicolon divides the sentence into two perfectly balanced halves ('there are minds which...') creating a parallel structure that insists on comparison.", "id": "fc21"}, {"front": "How does the diction in the two halves of the 'superior equipment' vs. 'insensate sweating' sentence contrast, and what is its effect?", "back": "The first half uses elevated diction ('superior equipment,' 'high and arduous deeds'), while the second uses brutal, visceral language ('insensate sweating,' 'a kidney'), creating a 'vertiginous' descent from heroic to crude.", "id": "fc22"}, {"front": "What is significant about the placement of the 'superior equipment' vs. 'insensate sweating' sentence in the section?", "back": "It arrives near the beginning, announcing rather than concluding Mencken's argument. Its vivid rhetoric is designed to half-persuade the reader before any logical evidence has been presented, substituting rhetoric for logic.", "id": "fc23"}, {"front": "What does Mencken imply by mockingly calling the 'democrats'' faith in human equality 'transcendental'?", "back": "He implies their beliefs belong to theology or sentimental faith rather than to politics or empirical observation, thereby dismissing them as irrational or beyond rational scrutiny.", "id": "fc24"}, {"front": "According to the analysis, how does Mencken's comparison of mental activity to 'renal function' (kidney) serve his argument?", "back": "By comparing thought to the mindless, waste-processing work of a kidney, Mencken reduces intelligence to a base, unconscious biological process. The 'insensate' aspect further removes consciousness, implying the 'inferior man' participates in democracy without true understanding.", "id": "fc25"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
