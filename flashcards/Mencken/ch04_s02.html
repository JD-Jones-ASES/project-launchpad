<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sage of Baltimore (Mencken) &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses.html">&larr; Back to Courses</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "In Mencken’s Nietzschean terminology, what is a 'superior man'?", "back": "A rare individual characterized by genuine intelligence, taste, and independence."}, {"front": "Which psychological concept does Mencken claim reduced old-time introspection to 'unimportant fancies'?", "back": "Arrested development."}, {"front": "Mencken uses the metaphor of 'greased poles' to represent what aspect of human life?", "back": "The struggle for individuals to climb to high levels of intellectual or social achievement."}, {"front": "According to Mencken, what do the 'great majority' of people eventually do on the 'greased poles' of life?", "back": "They give up because the effort is too much and does not seem worth the agony."}, {"front": "Mencken lists Rotary, Fundamentalism, and Americanism as easier alternatives to what difficult task?", "back": "Scaling the 'dizziest heights' of intellectual and personal prowess."}, {"front": "How is government functionally determined in an aristocratic society according to the text?", "back": "It is the function of those who have reached the high levels of the 'poles' by prowess or inheritance."}, {"front": "In a democratic society, government is primarily the function of which group?", "back": "Those who have only climbed a few spans from the ground."}, {"front": "According to the text, what triggers 'bitterness' in the common man toward those above him?", "back": "The perception of actual, rational superiority."}, {"front": "Under what condition does the democratic 'mob' admire those who are higher up the social pole?", "back": "When what they see in those above them is fraud."}, {"front": "Mencken defines 'public opinion' under democracy as a stable form of interacting _____ and _____.", "back": "Bitterness and admiration."}, {"front": "According to Mencken's analysis, the mental age of the 'mob' hovers around which developmental period?", "back": "Puberty (and chiefly below it)."}, {"front": "What was the 'disastrous fallacy' of old-time introspective psychology regarding children?", "back": "Viewing a child as simply a 'little man' rather than a distinct developmental stage."}, {"front": "Which field of medicine does Mencken compare to the 'new' behaviorist psychology?", "back": "Pediatrics."}, {"front": "According to Mencken, what is the 'earliest and most profound' of all human emotions?", "back": "Fear."}, {"front": "How does Mencken describe the intelligence of a newborn human relative to marine life?", "back": "Almost as devoid of intelligence as an oyster."}, {"front": "What specific physical reaction does Mencken attribute to a newborn infant exposed to a loud noise?", "back": "It shakes like a Sunday-school superintendent taken in adultery."}, {"front": "To what does Dr. John B. Watson attribute the 'phylogenic origin' of the fear of falling?", "back": "The daily hazards faced by 'arboreal man,' such as breaking tree branches."}, {"front": "According to the text, how do most other human emotions relate to the emotion of fear?", "back": "Every other emotion is subordinate to fear."}, {"front": "At what age does Mencken, citing Dr. Watson, claim a child's mental baggage is often just a mass of anxieties and superstitions?", "back": "Three years."}, {"front": "Mencken describes the rational process of education as primarily a means of shedding what?", "back": "Immemorial fears of the race (such as strange men and ideas)."}, {"front": "What is the defining internal state of the 'ideal educated man' in Mencken's view?", "back": "Serenity (being sure of himself and free from a dread of the dark)."}, {"front": "Why does Mencken believe the vast majority of men are 'congenitally incapable' of intellectual progress?", "back": "They cannot take in new ideas or rid themselves of old fears."}, {"front": "What fundamental deficiency prevents the 'common man' from reasoning from facts?", "back": "A lack of logical sense and the inability to remain free from emotional distraction."}, {"front": "Dr. Eleanor R. Wembridge compares the speech of the 'lower orders' to the behavior of which group?", "back": "Trained animals."}, {"front": "According to Dr. Wembridge, what is the 'lower order' of man's thinking limited to?", "back": "A few primitive appetites and emotions."}, {"front": "Why is it described as a 'sheer impossibility' to educate the lower orders of men?", "back": "Their minds cannot grasp even the simplest abstractions."}, {"front": "What metaphor does Mencken use to describe the futility of a 'school-marm' teaching the lower orders?", "back": "Shouting up a rain-spout."}, {"front": "How do the masses typically respond to 'ideas' according to the text?", "back": "Ideas leave them unscathed; they are responsive only to emotions."}, {"front": "Mencken compares the elemental emotions of the common man to those of which animal?", "back": "Tabby-cats."}, {"front": "Term: Phylogenic origin", "back": "Definition: Inherited race experience originating from the deep past of a species' development."}, {"front": "Concept: The New Psychology", "back": "Definition: A shift from introspective analysis of 'superior' minds to behaviorist study of fear and arrested development in the masses."}, {"front": "What role does Mencken assign to 'fresh delusions' in the formation of public opinion?", "back": "They enter the complex of prejudices on waves of frantic emotion while maintaining its main outlines."}, {"front": "According to Mencken, what is the central aim of 'every rational system of education'?", "back": "To produce men who have put away the immemorial fears of the race."}, {"front": "In Mencken's pole metaphor, climbing from the 'shoulders of their fathers' represents what social mechanism?", "back": "Inherited status or wealth in an aristocratic society."}, {"front": "Which specific group does Mencken mention to illustrate the 'mental age of puberty' in the mob?", "back": "Congressmen, ice-wagon drivers, or cinema actors."}, {"front": "What was the reaction of 'orthodox psychologists' to the rise of behaviorism?", "back": "Furious opposition to those who laughed at their speculations and derided their authority."}, {"front": "According to the text, what type of fears does an infant add to its 'primeval' fears as it grows?", "back": "Irrational fears of ideas, strange men, and hostile nature."}, {"front": "What specific finding did Dr. Eleanor R. Wembridge contribute to the 'New Psychology' described by Mencken?", "back": "The lower orders are incompetent to take in bald facts and deal only in elemental words."}, {"front": "Mencken asserts that the majority of men are unable to grasp which type of linguistic concept?", "back": "Abstractions."}, {"front": "How does Mencken characterize the 'old-time introspective psychology's' focus?", "back": "It concerned itself almost exclusively with the mental processes of reflective, superior adults."}, {"front": "What is the result of the mob sensing 'actual superiority' in others?", "back": "Bitterness."}, {"front": "Mencken claims that in a democracy, those in government are 'mainly' those who have achieved what level of progress?", "back": "Only a few spans from the ground."}, {"front": "According to Watson, the 'warning crack' of a branch is an example of what type of inherited fear?", "back": "An arboreal hazard preserved in human race experience."}, {"front": "The 'complex of prejudices' that forms public opinion is described as having what level of stability?", "back": "More or less stable forms that keep their main outlines."}, {"front": "How does the 'lower order' deceptive imitation affect the teacher (the 'school-marm')?", "back": "It deceives her into believing her expositions have been understood."}, {"front": "Mencken claims that the 'ideal educated man' is no longer 'ridden' by which specific dread?", "back": "Dread of the dark."}, {"front": "What happens to 'old psychological categories' under the new behaviorist psychology?", "back": "They are discarded along with vague and meaningless psychological terminology."}, {"front": "Mencken argues that the 'mental processes' of a genuinely superior man cannot be used to understand whom?", "back": "A congressman, an ice-wagon driver, or a cinema actor."}, {"front": "What is the primary driver of politics for the 'common man' according to the section introduction?", "back": "Dread (fear) rather than thought."}, {"front": "Mencken describes the infant's first minutes of life as being characterized by a sensitivity to what?", "back": "Susceptibility to fear."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
