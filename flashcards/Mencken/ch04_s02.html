    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">The Sage of Baltimore (Mencken) &mdash; Chapter 4, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Mencken.html">&larr; Back to The Sage of Baltimore (Mencken)</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">

            </div>
        </div>

    <script>
    var CARDS = [{"front": "What is Mencken's central argument about the common man's mind in this section?", "back": "Mencken argues that the common man's mind is governed not by reason but by fear."}, {"front": "How does Mencken's rhetorical strategy in this section evolve from Chapter 3?", "back": "It escalates from borrowing zoological classification language in Chapter 3 to borrowing the authority of experimental psychology, specifically behaviourism, in Chapter 4."}, {"front": "Which prominent psychologists does Mencken cite by name, and what is the purpose of these citations?", "back": "He cites Dr. John B. Watson (founder of behaviourism) and Dr. Eleanor R. Wembridge. This is to lend his polemic the appearance of a literature review."}, {"front": "What was Behaviourism, and who founded it?", "back": "Behaviourism was the dominant school of American psychology in the 1920s, founded by John B. Watson around 1913. It rejected introspection in favor of observing external behavior."}, {"front": "How does Mencken use Behaviourism selectively to support his argument?", "back": "Mencken seizes on behaviourism's emphasis on observable responses, particularly the fear reflex, but ignores Watson's environmentalism, using only what supports his argument and discarding the rest."}, {"front": "Beyond the mock-scientist persona, what new dimension does Mencken add to his voice in this section?", "back": "He adds the dimension of an entertainer, punctuating the clinical tone with comic set pieces."}, {"front": "What is the double purpose of Mencken's comic interruptions (e.g., the infant shaking like a superintendent)?", "back": "They keep the reader amused and reading, and they demonstrate Mencken's central claim that even the educated are governed by emotion (humor) rather than logic."}, {"front": "How does Mencken modulate his tone between confidence and qualification, and what effect does this create?", "back": "He occasionally hedges ('one need not follow Dr. Watson so far') before reasserting his position. This creates the impression of a fair-minded investigator willing to consider objections, even as he dismisses them."}, {"front": "Describe Mencken's characteristic rhetorical tool involving the 'collision of registers.'", "back": "He crashes scientific and colloquial vocabulary together, where 'the wreckage is the meaning,' to create a distinct rhetorical effect."}, {"front": "Explain Mencken's metaphor of 'a vast field of greased poles, flying gaudy and seductive flags.'", "back": "This carnival image is Mencken's metaphor for intellectual aspiration. The greased poles represent the difficulty of genuine thought, and the 'gaudy' (showy, tasteless) flags represent ideas and ambitions that are ultimately cheap prizes."}, {"front": "What is 'weaponized connotation,' and how does Mencken use it?", "back": "'Weaponized connotation' is choosing words whose emotional associations do argumentative work for him. For example, calling common man's emotions 'tabby-cats' implies softness, dependence, and triviality."}, {"front": "Define 'connotation' and contrast it with 'denotation.'", "back": "Connotation is the emotional association or suggestive meaning of a word, while denotation is its literal dictionary definition. Words can denote the same thing but carry different connotations (e.g., 'statesman' vs. 'politician')."}, {"front": "What does 'phylogenic' mean, and how does Mencken apply it?", "back": "'Phylogenic' relates to the evolutionary development of a species. Mencken borrows it to suggest that fear is not merely personal but inherited, wired into the human animal."}, {"front": "How does Mencken create a sense of physical effort and difficulty in the sentence: 'Up each a human soul goes shinning, painfully and with many a slip.'?", "back": "He inverts normal word order ('Up each' precedes the subject), uses the colloquial and physical verb 'shinning,' and employs adverbs like 'painfully and with many a slip' to slow the sentence and make the reader feel the difficulty."}, {"front": "Analyze the humor and purpose of Mencken's 'list that descends' (e.g., 'Golf is easier; so is joining Rotary; so is Fundamentalism; so is osteopathy; so is Americanism').", "back": "The humor lies in the syntactic parallelism, which treats disparate items (from harmless leisure to political ideology) as equivalent mindless substitutes for intellectual effort. The descent from golf to Americanism highlights their perceived mindlessness."}, {"front": "What is the dominant figure of speech in this section, and how does Mencken employ it?", "back": "The dominant figure is the metaphor of ascent (greased poles, climbing, falling back). Mencken structures his argument around a vertical axis where intelligence is 'up' and stupidity is 'down,' literalizing it with comic vividness."}, {"front": "How does the simile 'the infant shaking like a Sunday-school superintendent taken in adultery' function on multiple levels?", "back": "It is funny (incongruity), class-coded (the superintendent represents middle-class respectability), and thematically relevant (fear is a fundamental human emotion, whether primitive or social, supporting Mencken's argument)."}, {"front": "Explain the 'Greased Pole' as a political metaphor in Mencken's writing.", "back": "Borrowed from country fairs, it represents intellectual and political life. The grease signifies the difficulty of genuine thought; flags are ideas/ambitions. Most people give up near the bottom, settling for easier pursuits, allowing Mencken to invite reader contempt."}, {"front": "In the close reading of 'Make a loud noise behind an infant...', what significant connotative work does the word 'adultery' perform?", "back": "'Adultery' introduces sin, hypocrisy, and moral failure. It allows Mencken to smuggle a moral judgment into a scientific observation, implying that the respectable classes are governed by fear, and in their case, it is deserved."}, {"front": "How does Mencken imply the universality of fear through the comparison of the infant and the Sunday-school superintendent?", "back": "By comparing a newborn's instinctive fear response to a moralist's social fear of exposure, Mencken implies that fear is the same emotion whether primitive or civilized, merely given new names by society, thus highlighting its fundamental nature."}, {"front": "According to the 'Teacher Note,' what is an effective pedagogical approach for introducing the concept of connotation?", "back": "It is more effective to introduce connotation as a formal concept retrospectively, giving students a technical term for something they have already done intuitively (e.g., analyzing words like 'dulcet,' 'ineffable,' and 'kidney' in previous chapters)."}, {"front": "Why is the greased-pole passage recommended for in-class close reading?", "back": "It is recommended because it is vivid, funny, and syntactically interesting, especially the 'descending list' which effectively demonstrates how syntactic equivalence can create humor by treating disparate items as equally mindless."}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    render();
    </script>
</body>
</html>
