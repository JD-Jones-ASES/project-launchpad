<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 1, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What does 'horror vacui' mean, and how long did the doctrine last?", "back": "'Horror vacui' is Latin for 'nature abhors a vacuum.' It was one of the most durable scientific claims in history, surviving from Aristotle to the mid-seventeenth century — nearly two thousand years — before being decisively overturned by Torricelli and von Guericke.", "id": "fc01"}, {"front": "What was Aristotle's definition of space, and why did it make a vacuum logically impossible?", "back": "Aristotle defined space as a relation between bodies — the 'place' a body occupies, defined by whatever surrounds it. Remove all bodies, and you remove all places and all space. A vacuum (space with nothing in it) was therefore self-contradictory — like a marriage without two people.", "id": "fc02"}, {"front": "What was Aristotle's 'dynamical argument' against the vacuum?", "back": "Aristotle held that objects move by pushing fluid (air or water) out of their path, which then rushes around to propel them forward. In a vacuum there would be no medium, no mechanism for motion, and nothing could move. Since physics obviously did work, vacuums obviously did not exist.", "id": "fc03"}, {"front": "How did scholastic philosophers handle the question of whether God could create a vacuum?", "back": "The consensus was that God could not create a vacuum because it was so self-contradictory that even omnipotence could not make one. The text notes this was 'a remarkable claim about the limits of omnipotence that the Church somehow never found alarming.'", "id": "fc04"}, {"front": "What practical mining problem led Torricelli to his atmospheric pressure theory?", "back": "Suction pumps used in mines could not lift water higher than about ten meters, regardless of pump quality. The standard horror vacui explanation predicted no such limit; a perfect pump should lift water indefinitely. This contradiction set Torricelli thinking.", "id": "fc05"}, {"front": "What was Torricelli's key insight about why water rises in a pump?", "back": "He realized the explanation was backward: nature was not pulling water up to avoid a vacuum. The weight of the atmosphere was pushing water up from below. Atmospheric pressure could only support a column about ten meters high — and not one millimeter more.", "id": "fc06"}, {"front": "Why did Torricelli use mercury rather than water in his 1643 experiment?", "back": "Mercury is about 13.6 times denser than water. If atmospheric pressure supports a ten-meter water column, it should support only about 760 mm of mercury — small enough to be practically manageable in a glass tube.", "id": "fc07"}, {"front": "What is the 'Torricellian vacuum'?", "back": "The space at the sealed top of Torricelli's inverted mercury tube, after the mercury column dropped to approximately 76 centimeters. Critics argued it was filled with mercury vapors or ether; Torricelli (and later evidence) suggested it was genuinely empty.", "id": "fc08"}, {"front": "What were the Magdeburg hemispheres, and what did the demonstration prove?", "back": "Two copper hemispheres machined to fit together precisely, with a leather gasket, forming a hollow sphere with a valve. Von Guericke pumped the air out; atmospheric pressure from outside held the halves together so firmly that thirty horses could not separate them. Opening the valve released the seal instantly.", "id": "fc09"}, {"front": "Who was Otto von Guericke, and what new tool did he contribute to vacuum science?", "back": "Mayor of Magdeburg and amateur natural philosopher. He built the first vacuum pump — a device for actively removing air from a sealed container, rather than merely demonstrating air's absence (as Torricelli's mercury tube did).", "id": "fc10"}, {"front": "At which event did von Guericke stage his most famous hemisphere demonstration, and who was in the audience?", "back": "The Imperial Diet in Regensburg in 1654, before an audience that included Holy Roman Emperor Ferdinand III. Thirty horses — fifteen on each side — could not separate the evacuated hemispheres.", "id": "fc11"}, {"front": "What is the quantum vacuum, and why does it matter for the question of whether true emptiness exists?", "back": "The quantum vacuum is the lowest possible energy state of a quantum field. Even 'empty' space is filled with quantum fluctuations — virtual particle pairs that pop into existence and annihilate almost instantaneously. True emptiness is impossible even in principle.", "id": "fc12"}, {"front": "What is the Casimir effect, and how was it confirmed?", "back": "Predicted by Hendrik Casimir in 1948 and experimentally confirmed in 1997: two uncharged metal plates placed very close together in a vacuum attract each other. Constrained quantum fluctuations between the plates create lower pressure than unconstrained fluctuations outside, pushing the plates together.", "id": "fc13"}, {"front": "How does the Casimir effect illustrate the concept of 'the weight of nothing'?", "back": "The plates are pushed together by the difference in quantum fluctuations inside (constrained) vs. outside (unconstrained). The text says the plates are 'pushed together by the weight of nothing' — vacuum fluctuations exerting measurable force without any material substance.", "id": "fc14"}, {"front": "What is the arc of the section's intellectual narrative, from Aristotle to quantum mechanics?", "back": "From 'nature abhors a vacuum' (vacuum impossible by definition) → Torricelli (vacuum possible, bounded by atmospheric pressure) → von Guericke (vacuum actively created) → quantum mechanics (even perfect vacuum is not empty). The journey took about 2,300 years.", "id": "fc15"}, {"front": "What was the phrase 'natura abhorret vacuum' and how did its status change over time?", "back": "'Nature abhors a vacuum' — originally Aristotle's theoretical conclusion, it became repeated so often it stopped being a claim and became a background assumption — 'the kind of thing you don't argue for because it's what you argue from.' It functioned as an unexamined axiom for nearly two millennia.", "id": "fc16"}, {"front": "Scenario: A student says 'Horror vacui must be true because all my experiments seem to confirm it.' What does the text's history suggest about this reasoning?", "back": "The text notes that horror vacui 'survived for nearly two thousand years, not because people failed to test it but because the tests kept seeming to confirm it.' Apparent confirmation is not proof — a theory can appear robust until a cleverly designed experiment (like Torricelli's) reveals it was explaining the wrong mechanism entirely.", "id": "fc17"}, {"front": "Scenario: An engineer designs a pump to lift water from a well 15 meters deep. What does the text's account of Torricelli predict, and why?", "back": "The pump cannot work as designed. Atmospheric pressure can only support a water column of approximately ten meters. No pump quality can overcome this physical ceiling — it is imposed by the weight of the atmosphere, not by engineering limitations.", "id": "fc18"}, {"front": "What practical applications does the Specimen box list for the vacuum concept?", "back": "Vacuum tubes, MRI machines, particle accelerators, freeze-drying, and thermos flasks — all depend on the ability to create or exploit regions of reduced or near-zero pressure.", "id": "fc19"}, {"front": "What philosophical paradox about the vacuum does the Specimen box highlight?", "back": "'Something that doesn't exist, yet is one of the most technologically useful concepts in physics.' The vacuum — once considered logically impossible — is now indispensable to modern technology.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
