<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 7, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What navigational problem did the Mercator projection (1569) solve?", "back": "It made rhumb lines — constant compass bearings — appear as straight lines on a flat map, enabling sailors to navigate predictably without recalculating heading as the route curved.", "id": "fc01"}, {"front": "What is the Theorema Egregium, and what does it imply for cartography?", "back": "Carl Friedrich Gauss's 'Remarkable Theorem' proves that a sphere and a flat plane have different Gaussian curvature, making it mathematically impossible for any flat map projection to preserve area, shape, distance, and direction all at once.", "id": "fc02"}, {"front": "What is a conformal projection, and which famous projection is an example?", "back": "A conformal projection preserves local angles and shapes, making it useful for navigation. The Mercator projection is conformal — it distorts area (especially near the poles) in order to preserve angular accuracy.", "id": "fc03"}, {"front": "What is an equal-area projection? Give an example.", "back": "An equal-area projection preserves the relative sizes of land masses, making continental comparisons accurate. The Mollweide and Gall–Peters projections are equal-area; they sacrifice shape accuracy to achieve correct area representation.", "id": "fc04"}, {"front": "What is a compromise projection, and why was the Robinson projection commissioned?", "back": "A compromise projection sacrifices accuracy on all dimensions to minimize the worst distortions across all properties. The National Geographic Society commissioned the Robinson projection in 1963 to produce a map that 'looks right' to Western eyes — optimized for aesthetic familiarity.", "id": "fc05"}, {"front": "How large is Africa compared to Greenland, and why does Greenland look comparable on the Mercator map?", "back": "Africa covers approximately 11.7 million square miles — about 14 times larger than Greenland's 836,000 square miles. On the Mercator projection, Greenland appears comparable because the conformal transformation massively inflates polar features.", "id": "fc06"}, {"front": "What political argument did Arno Peters make for his equal-area projection in 1973?", "back": "Peters argued that Mercator's enlargement of Europe and North America at the expense of tropical regions embedded a colonial worldview into Western visual culture, and that an equal-area map would produce a more accurate political consciousness.", "id": "fc07"}, {"front": "What was the cartographic community's response to the Peters projection?", "back": "The American Cartographic Association issued a 1989 resolution condemning all rectangular world map projections — Mercator and Peters alike — as inappropriate for general use. Critics noted that Gall–Peters, while area-accurate, stretched equatorial nations and compressed polar ones.", "id": "fc08"}, {"front": "What is the core lesson of Borges's story about the 1:1 scale map?", "back": "A perfect representation of a thing is indistinguishable from the thing itself — and therefore provides no advantage over it. The utility of a map comes from its distortions: the omissions and compressions that make it smaller and more manipulable than the territory.", "id": "fc09"}, {"front": "What does it mean to say the globe is 'the only honest map'?", "back": "The globe preserves geometric properties that no flat projection can, making it the only representation without projection distortion. The irony is that it is useless for practical navigation: it cannot be folded, cannot be unrolled, and costs more to print.", "id": "fc10"}, {"front": "What is projection distortion, in the sense used in this section?", "back": "Projection distortion is the unavoidable misrepresentation of at least one geometric property — area, shape, distance, or direction — that results from any mathematical transformation of a sphere's curved surface onto a flat plane.", "id": "fc11"}, {"front": "What does 'the appropriate lie depends on what truth you most need to tell' mean?", "back": "Because every projection must distort something, choosing a projection is choosing which property to preserve and which to sacrifice. The 'right' projection is the one whose distortions are least harmful for the specific purpose the map serves.", "id": "fc12"}, {"front": "What is a rhumb line?", "back": "A rhumb line is a path that crosses all meridians at the same angle — a constant compass bearing. On a Mercator projection, rhumb lines appear as straight lines, making the map invaluable for maritime navigation.", "id": "fc13"}, {"front": "Describe Korzybski's warning as applied to maps in this section.", "back": "Korzybski warned that every map encodes a choice about which truths to preserve and which to sacrifice. When a map optimized for one purpose (navigation) is used for another (education), its implicit distortions travel invisibly and do unnoticed work on the user's perceptions.", "id": "fc14"}, {"front": "What analogies does the text draw between map-making and other disciplines?", "back": "A cartographer who distorts area for navigation parallels an economist who models humans as rational agents for tractability, and a physician who applies discrete diagnostic categories to fuzzy real-world conditions. All involve structural lies that are necessary but become dangerous when forgotten.", "id": "fc15"}, {"front": "What property does the Azimuthal Equidistant projection preserve, and what is its limitation?", "back": "The Azimuthal Equidistant projection preserves distances from a single center point but distorts increasingly as you move away from that center. It is useful only within a limited range around the chosen reference point.", "id": "fc16"}, {"front": "Why did the Mercator projection persist in classrooms long after its navigational era?", "back": "According to the text, the Mercator projection became a default schoolroom map not because of its navigational properties but because of inertia — it was already everywhere and familiar. In doing so, it trained generations of students to misperceive the relative sizes of the continents.", "id": "fc17"}, {"front": "Apply the Borges/Carroll 1:1 map paradox to a data context: when does a dataset become as useless as the territory itself?", "back": "A dataset that preserves every detail of a phenomenon — no sampling, no aggregation, no selection — is indistinguishable from the raw phenomenon and offers no analytical advantage. The value of a model or dataset derives from what it leaves out.", "id": "fc18"}, {"front": "The Gall–Peters projection was published by James Gall in 1855. What does this reveal about Peters's 1973 claim to originality?", "back": "Peters appears to have been unaware of Gall's prior publication. The text notes the projection is more accurately called 'Gall–Peters.' This does not invalidate the political argument Peters made, but it weakens his claim that the projection was a novel invention.", "id": "fc19"}, {"front": "What is the key insight shared by the phrase 'a map that preserves everything is not a map — it is a second territory'?", "back": "Representation requires selection and simplification. A representation that omits nothing adds no cognitive or practical value over the thing itself. Usefulness in maps — and in any model — is a function of what has been deliberately excluded.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
