<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 5, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What were rai stones, and why do they matter philosophically?", "back": "Enormous stone discs from Yap (up to 12 feet wide) used as currency without being moved. Ownership changed through shared social agreement, demonstrating that money is information held in collective belief, not a physical substance.", "id": "fc01"}, {"front": "According to the text, what is the single thing that transforms any object into money?", "back": "Collective belief — specifically, the shared belief that others will accept the object in exchange for things you want. Material composition is irrelevant.", "id": "fc02"}, {"front": "What is the 'double coincidence of wants' problem?", "back": "In barter, trade requires that you have something I want AND I have something you want, at the same time and place, in the right proportions. This coordination requirement makes pure barter economies highly inefficient.", "id": "fc03"}, {"front": "How does money solve the double coincidence of wants?", "back": "Money introduces a universal intermediate: you sell goods to anyone who will pay money, then use that money to buy from anyone who accepts it. You no longer need your trading partner to want exactly what you have.", "id": "fc04"}, {"front": "What is 'commodity money'?", "back": "Currency made from objects with intrinsic use value (cowrie shells, livestock, grain, salt, metal coins). Even here, monetary value began to exceed material value — a gold coin was worth more as currency than as raw metal.", "id": "fc05"}, {"front": "Why did a sovereign's stamp on a gold coin matter economically?", "back": "The stamp vouched for the coin's weight and purity, making it trustworthy in trade. This social institution — not the metal alone — was what made the coin function as money, and it raised the coin's value above its raw metal content.", "id": "fc06"}, {"front": "What was the gold standard, and when did the U.S. formally adopt it?", "back": "A system in which each unit of currency represented a fixed weight of gold, redeemable by holders of paper money. The U.S. formally adopted it in 1900 as part of the Bretton Woods lineage; Britain operated versions from 1717.", "id": "fc07"}, {"front": "How did the gold standard harm the U.S. economy during the Great Depression?", "back": "It prevented the government from expanding the money supply to fight deflation. Countries that abandoned the gold standard earlier recovered earlier. The text: 'The anchor was sinking the ship.'", "id": "fc08"}, {"front": "What happened on August 15, 1971, and what did it complete?", "back": "President Nixon announced the U.S. would no longer exchange dollars for gold at a fixed price (the 'Nixon shock'). This ended the Bretton Woods system and completed money's transition into a purely social institution backed only by government authority and collective confidence.", "id": "fc09"}, {"front": "What is fractional reserve banking?", "back": "Banks hold only a fraction of their deposits as reserves and lend the rest into existence. When a bank approves a mortgage, it creates new money by crediting accounts — money emerges from a promise to repay, not from vaulted cash.", "id": "fc10"}, {"front": "What is a blockchain, and what trust problem does it attempt to solve?", "back": "A distributed ledger — a record of transactions maintained simultaneously across thousands of computers with no single point of control. It replaces institutional trust (in governments or banks) with mathematical proof, so no central authority can print more currency.", "id": "fc11"}, {"front": "Why does Bitcoin still rely on collective belief despite its mathematical architecture?", "back": "Bitcoin still requires collective belief that the ledger is valid, that the rules will be followed, and that someone tomorrow will exchange it for something of value. The mechanism differs from fiat money, but the social foundation is the same.", "id": "fc12"}, {"front": "What does fiat currency mean?", "back": "Currency whose value derives from government legal authority and collective user confidence, not from a commodity backing. Post-1971, all major currencies are fiat: created primarily by commercial banks through lending, backed by government taxing power.", "id": "fc13"}, {"front": "What would destroy fiat currency, according to the Specimen box?", "back": "Not a shortage of gold, but a collapse of confidence — the belief that tomorrow the money will not be accepted. Hyperinflation and bank runs are crises of collective disbelief, not physical scarcity.", "id": "fc14"}, {"front": "What early Mesopotamian evidence shows that money as information preceded money as object?", "back": "Clay tablets from the city of Ur (~2100–2000 BCE) recorded grain debts, credits, and obligations. Systematic accounting — tracking who owed what — existed long before coined money was invented.", "id": "fc15"}, {"front": "The text calls money 'the world's most successful shared fiction.' What does 'fiction' mean in this context?", "back": "An invented abstraction that is none the less real in its effects. Money is not a natural object; it is a collectively maintained social agreement. Its reality stems from the consequences it produces, not from any intrinsic physical property.", "id": "fc16"}, {"front": "If a rai stone sank to the ocean floor, could it still function as money? Why?", "back": "Yes. Several rai stones were lost at sea and kept circulating because money is a shared mental ledger, not a physical object. As long as the community agreed on ownership, the inaccessibility of the stone was irrelevant.", "id": "fc17"}, {"front": "A country pegged its currency to gold during a recession. According to the text, what policy option was unavailable to it, and what was the consequence?", "back": "It could not expand the money supply (monetary policy was severely limited by the gold backing). It therefore could not reflate prices or revive demand — the gold standard prevented the fiscal and monetary flexibility that recovery required.", "id": "fc18"}, {"front": "What does the text mean when it says money is 'not a thing of value but a promise of future exchange, held in concentrated form'?", "back": "Money has no use-value in itself; you cannot eat, wear, or shelter under a dollar bill. Its value is entirely its capacity to be exchanged for something you want at a future moment — it is a social IOU crystallized into a portable token.", "id": "fc19"}, {"front": "Salt was once used as currency. What does the word 'salary' preserve about this history?", "back": "The word 'salary' derives from salt (Latin: sal), reflecting that Roman soldiers were sometimes paid in salt or given an allowance to purchase it — one of the earliest commodity-money wages in recorded history.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
