<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 4, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the physical nature of the electromagnetic spectrum with respect to color?", "back": "It is a continuous gradient of wavelengths from roughly 380 nm (violet) to 700 nm (red), with no gaps, fences, or natural breakpoints where one color ends and another begins.", "id": "fc01"}, {"front": "What does the Welsh word 'glas' illustrate about color categories?", "back": "It covers what English divides into 'blue' and 'green' — sky, sea, grass, and distant hills are all 'glas' — showing that a single language can treat as one category what another language carves into two.", "id": "fc02"}, {"front": "How does the Japanese color term 'ao' demonstrate linguistic influence on color categories?", "back": "Historically 'ao' covered both blue and green; only after contact with European color systems did 'midori' enter common use as a separate term for green, showing that color vocabularies change under cultural influence.", "id": "fc03"}, {"front": "What is the Russian 'siniy/goluboy' distinction, and why is it significant?", "back": "Russian has two separate basic color terms for blue: 'siniy' (dark blue) and 'goluboy' (light blue). Where English has one category, Russian has two — making the dark/light difference a categorical distinction rather than a matter of degree.", "id": "fc04"}, {"front": "Who were Berlin and Kay, and what did their 1969 study examine?", "back": "Brent Berlin (anthropologist) and Paul Kay (linguist). Their study of color vocabulary in 98 languages examined the universality and evolution of basic color terms, finding both cross-cultural regularities and language-specific boundary variation.", "id": "fc05"}, {"front": "What universal sequence did Berlin and Kay discover in how languages acquire color terms?", "back": "If a language has only 2 terms they cover dark-cool and light-warm. The third is always red; then yellow or green; then both; then blue; then brown; then others. No language skips ahead in this sequence.", "id": "fc06"}, {"front": "What is the difference between 'focal colors' and 'category edges' according to Berlin and Kay?", "back": "Focal colors — the best exemplars (most 'red' red, most 'blue' blue) — are broadly consistent across cultures. Category edges — where one color ends and another begins — are fuzzy, negotiated, and genuinely different between languages.", "id": "fc07"}, {"front": "What is the Sapir-Whorf hypothesis (linguistic relativity)?", "back": "The proposal that a language's structure affects its speakers' worldview and cognition. The strong version says language determines thought (largely abandoned); the weak version says language influences cognitive processing (supported by evidence).", "id": "fc08"}, {"front": "Why has the strong version of the Sapir-Whorf hypothesis been largely abandoned?", "back": "It requires that speakers of a language are cognitively incapable of grasping concepts their language lacks a word for — which is obviously false, as people can learn and use foreign concepts even without native vocabulary.", "id": "fc09"}, {"front": "Describe the Winawer et al. Russian blue experiment and its key finding.", "back": "Russian and English speakers were shown a blue center square flanked by two comparison squares and asked to match one. Russian speakers were measurably faster when the pair crossed the siniy/goluboy boundary; the advantage vanished when both squares were on the same side of the boundary. Conclusion: language categories create real perceptual discontinuities in cognitive processing.", "id": "fc10"}, {"front": "Where does the Russian blue perceptual effect occur — in the physics, the retina, or elsewhere?", "back": "In 'the cognitive processing between sensation and judgment.' The physical signal and the retinal response are the same for Russian and English speakers; the difference is downstream in cognitive processing.", "id": "fc11"}, {"front": "What is the Sorites paradox?", "back": "A philosophical puzzle: one grain of sand is not a heap; adding one grain to something that is not a heap cannot make it a heap; therefore no number of grains constitutes a heap. It arises whenever a predicate applies clearly at one extreme but not the other with no precise transition point.", "id": "fc12"}, {"front": "What does the Sorites paradox reveal about language and categories?", "back": "That language draws sharp lines through continuous reality, and any such line is at some level arbitrary. The paradox does not show that heaps, baldness, or salary levels do not exist — it shows that the boundary marking them is drawn, not found.", "id": "fc13"}, {"front": "What does 'soros' mean in Greek, and how does it relate to the Sorites paradox?", "back": "'Soros' means 'heap.' The Sorites paradox is named for the heap puzzle (soritical reasoning) — adding one grain at a time to a non-heap to illustrate that predicates can apply clearly at extremes but resist precise boundary-drawing.", "id": "fc14"}, {"front": "What is the central structure the section identifies in the problem of color categories?", "back": "Reality is a gradient (the electromagnetic spectrum is continuous); language requires categories; categories require boundaries; boundaries are sharp lines imposed on continuous distributions. The gradient does not contain the line — we put it there.", "id": "fc15"}, {"front": "Why does the section argue that color-name lines are 'neither useless nor interchangeable' even though they are invented?", "back": "Because drawn lines do real cognitive work: a color name that makes a speaker faster at matching swatches is functionally valuable. The question is not whether to draw lines but whether we remember that the line is ours, not nature's.", "id": "fc16"}, {"front": "Apply: A traveler raised speaking Welsh learns English as an adult. According to this section, which aspect of color perception might change, and which would not?", "back": "Their focal perceptions of 'blue' and 'green' exemplars should align with English speakers (focal colors are broadly universal). However, their processing speed or ease of distinguishing colors near the English blue-green boundary might increase, reflecting the new categorical structure their language now provides at that edge.", "id": "fc17"}, {"front": "How does the Berlin-Kay research challenge both the Whorfian and anti-Whorfian extremes?", "back": "Against strong Whorfians: the universal sequence of color term acquisition shows color categories are not purely arbitrary. Against anti-Whorfians: category edges are genuinely language-dependent, not fixed by biology. Color naming is neither purely conventional nor purely natural.", "id": "fc18"}, {"front": "What does it mean to say color names are a 'linguistic fiction' rather than a pure falsehood?", "back": "They are invented boundaries imposed on a continuum, not discovered natural joints. But 'fiction' here does not mean useless — like all productive fictions, color names enable real cognitive tasks (discrimination, communication, coordination) even though the physical boundary they imply does not exist in nature.", "id": "fc19"}, {"front": "What implication does the section draw from the fact that 'the gradient does not contain the line'?", "back": "That we — the language users — placed the line there. This means we should recognize that different placements are possible, that the line is conventional, and that we bear responsibility for remembering it is drawn, not found in nature.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
