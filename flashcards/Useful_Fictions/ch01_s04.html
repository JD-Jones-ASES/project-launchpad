<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 1, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is the 'paradox at the heart of this chapter' that the text identifies?", "back": "The most generative concept in human intellectual history is the concept of nothing. The void is not empty in the sense of lacking something — it is empty in the sense of being available. Nothingness, properly understood, is the precondition for everything.", "id": "fc01"}, {"front": "What is creatio ex nihilo, and which religious traditions hold it as a central doctrine?", "back": "Creatio ex nihilo is the doctrine that God created the world from nothing — not from pre-existing matter. It became the dominant doctrine in Christianity, Judaism, and Islam. It follows from the question of what nothing is.", "id": "fc02"}, {"front": "How does creation from pre-existing matter differ theologically from creatio ex nihilo?", "back": "If God creates from pre-existing matter, matter has a kind of independence from God — it was there before, with its own nature. Creation ex nihilo means matter is entirely God's product, God is entirely unconstrained, and the universe is radically contingent: it need not exist and exists only because God wills it, moment by moment.", "id": "fc03"}, {"front": "What did Thomas Aquinas argue made creation ex nihilo philosophically distinctive?", "back": "It required no instrument, no material, and no elapsed time. An ordinary craftsman needs material, tools, and time; God needed none of these. The void was not a container God filled — it was the 'contrast class against which creation was intelligible.' Nothing made everything possible by being its opposite.", "id": "fc04"}, {"front": "What is the Hawking-Hartle argument about asking 'what came before the Big Bang'?", "back": "Hawking and Hartle proposed that the question may be malformed — like asking what is north of the North Pole. Time itself may have begun with the Big Bang, in which case 'before' has no referent. The universe did not emerge into pre-existing nothing; it emerged together with space and time themselves.", "id": "fc05"}, {"front": "In what way does the Big Bang model 'rhyme uncomfortably' with creatio ex nihilo, according to the text?", "back": "Both share a deep structure: a universe that exists against a background of nothing, where that nothing is not merely absence but is in some sense the condition of possibility for existence. The Big Bang is not theological — no creator, no will — but structurally it echoes ex nihilo creation.", "id": "fc06"}, {"front": "What is the Lawrence Krauss controversy about the universe coming from 'nothing'?", "back": "Krauss argued the universe came from 'nothing,' but critics (including philosophers) point out that the quantum vacuum from which particles can spontaneously emerge is not, in any meaningful sense, nothing at all. The debate is 'partly terminological and partly profound' and turns on what exactly we mean by nothing.", "id": "fc07"}, {"front": "What is the empty set (∅), and what does it represent in the von Neumann construction?", "back": "The empty set is the unique set containing no elements (cardinality 0). In the von Neumann construction, ∅ represents 0. Its existence is guaranteed by the Axiom of Empty Set in ZFC set theory. Crucially, ∅ is a subset of every set.", "id": "fc08"}, {"front": "How does the von Neumann construction generate the natural numbers from the empty set?", "back": "∅ = 0. {∅} = 1 (one member). {∅, {∅}} = 2 (two members). Each natural number is the set of all natural numbers that precede it. From nothing, using only set membership and a handful of axioms, you can build all arithmetic.", "id": "fc09"}, {"front": "Who developed the construction of numbers from the empty set, and what framework does it underpin?", "back": "John von Neumann in the 1920s. It is the foundation of ZFC set theory (Zermelo-Fraenkel with Choice) — the standard axiomatic foundation for most of contemporary mathematics. Everything from fractions to calculus rests on nested empty sets.", "id": "fc10"}, {"front": "What happened at the Maverick Concert Hall in Woodstock on August 29, 1952?", "back": "Pianist David Tudor performed John Cage's 4'33\" — he sat at the piano, opened the score, and played nothing for four minutes and thirty-three seconds. He marked three 'movements' by opening and closing the keyboard lid. The audience heard wind, rain, and their own bewilderment.", "id": "fc11"}, {"front": "What philosophical argument does Cage's 4'33\" make about silence?", "back": "There is no such thing as silence. In the anechoic chamber at Harvard, Cage heard two sounds: one high (his nervous system) and one low (his blood circulating). What we call silence is always the sound of what we weren't listening to. The empty score frames the unintentional, making it audible.", "id": "fc12"}, {"front": "What intellectual traditions does the text say John Cage drew on for 4'33\"?", "back": "Zen Buddhism and the philosophy of Marcel Duchamp.", "id": "fc13"}, {"front": "What does the 'Think About It' section say a moment of silence at a memorial demonstrates about declared absence?", "back": "A moment of silence is not simply stopping talking — the framing (announcement, bowed heads, collective stillness) transforms ordinary quiet into something charged with grief, memory, and community. Naming the absence creates a presence. The nothing is filled with meaning.", "id": "fc14"}, {"front": "What is the unifying insight that the text says connects zero, the vacuum, blank slates, and the generative void?", "back": "Nothing is not the opposite of something — it is its precondition. You cannot count without zero, measure pressure without a vacuum, inscribe without a prepared surface, hear music without silence, or read text without white space. The void is not nothing: it is where everything starts.", "id": "fc15"}, {"front": "How does the text's discussion of money, laws, and categories extend the chapter's argument in its closing paragraphs?", "back": "Every useful fiction in the book defines itself against a background of nothing. Money is meaningful because having none is possible. Laws matter because lawlessness is possible. Categories organize experience because the experience is otherwise undifferentiated. The void is the condition that makes the fiction necessary and powerful.", "id": "fc16"}, {"front": "Scenario: A composer leaves a deliberate five-second rest in the middle of a symphony. A critic says it 'contains nothing.' Using the section's argument, what is the critic missing?", "back": "The rest is not nothing — it is a frame that creates anticipation, emphasizes what surrounds it, and makes the following note more powerful. Cage's argument (and the section's) is that silence is always full; the framing makes the unintentional intentional. The rest is a generative void.", "id": "fc17"}, {"front": "Scenario: A mathematician says 'we can build all of arithmetic starting from nothing at all.' Is this literally true, and what does it require?", "back": "Yes, in the von Neumann construction: starting from the empty set (∅) alone, using only the axioms of ZFC set theory, you can generate all natural numbers and — by extension — all of mathematics. It requires careful agreement about rules, but no initial 'content' other than the empty set itself.", "id": "fc18"}, {"front": "What is the Axiom of Empty Set in ZFC set theory?", "back": "An axiom that guarantees the existence of the empty set — the unique set containing no elements. It is the starting point from which the von Neumann construction builds all mathematics.", "id": "fc19"}, {"front": "What does the text mean by calling 4'33\" 'the most philosophically interesting piece of music ever composed, in part because it is not, in any traditional sense, music at all'?", "back": "4'33\" performs the generative-void argument: by framing nothing, it reveals the sounds that were always present but unheard. It forces the audience to confront what 'music' means — whether intentionality or framing is what distinguishes organized from unorganized sound. The piece is philosophy enacted as performance.", "id": "fc20"}, {"front": "What are the four movements of thought in Chapter 1 that the closing 'Paradox Resolved' section traces?", "back": "Historical (inventing zero) → Physical (the vacuum) → Political (blank slates and empty lands) → Creative (the generative void). All four lead to the same insight: nothing is the precondition of something.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
