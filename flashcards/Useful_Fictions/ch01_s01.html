<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 1, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is a 'placeholder zero' and how does it differ from a 'numerical zero'?", "back": "A placeholder zero is a notational device that marks an empty position in a number (e.g., distinguishing 3 from 300) but cannot stand alone or participate in arithmetic. A numerical zero is a number in its own right, representing the quantity 'none,' with defined arithmetic properties — the far more radical invention.", "id": "fc01"}, {"front": "What did Brahmagupta contribute to the concept of zero in 628 CE?", "back": "In his Brahmasphutasiddhanta, Brahmagupta gave zero explicit arithmetic rules: zero added to any number returns that number; zero multiplied by any number gives zero. These 'definitions' transformed sunya from a void into an operational mathematical entity.", "id": "fc02"}, {"front": "What was the Babylonian solution to the problem of marking an empty column?", "back": "The Babylonians used a small wedge-shaped gap — later formalized as two diagonal wedge marks — as a placeholder. It was a typographical convenience: you could not add it, subtract it, or treat it in isolation. The text compares it to 'a blank space in a spreadsheet cell.'", "id": "fc03"}, {"front": "Why did the Romans have no zero, and what practical consequence did this have?", "back": "Roman numerals had no zero, not even a placeholder. This made Roman arithmetic extremely cumbersome — the text notes that long division in Roman numerals is nearly impractical.", "id": "fc04"}, {"front": "What is sunya, and why is its etymology important?", "back": "Sunya is Sanskrit for 'empty' or 'void' — the word Brahmagupta used for zero. It became sifr in Arabic ('empty'), then zephirum in medieval Latin, then zefiro in Italian, and finally 'zero' in English. The word 'cipher' also derives from sifr.", "id": "fc05"}, {"front": "What two enduring words in English derive from Al-Khwarizmi?", "back": "'Algorithm' derives from the Latinization of Al-Khwarizmi's name; 'algebra' derives from the title of his treatise on calculation. He was the scholar who transmitted Hindu-Arabic numerals (including zero) to the Islamic world and eventually to Europe.", "id": "fc06"}, {"front": "Why did Florence ban Hindu-Arabic numerals, including zero, in 1299?", "back": "The ban had two motivations: fear of fraud (a zero could be appended to a numeral to multiply it by ten) and deeper philosophical discomfort about the ontological status of nothingness, which raised uncomfortable questions in Catholic theology.", "id": "fc07"}, {"front": "What theological questions did zero raise for the medieval Catholic Church?", "back": "If God created everything from nothing, what was nothing — something God created, or something that pre-existed God? If the universe was created ex nihilo, did nothingness have 'ontological priority' over existence? These questions made zero philosophically dangerous in a theological context.", "id": "fc08"}, {"front": "What does the text mean when it says zero requires 'philosophical courage'?", "back": "Zero asks you to treat the absence of a thing as a thing in itself — to assign a name, symbol, and arithmetic role to emptiness. This is counterintuitive: perception naturally registers presences, not absences. Accepting zero is an act of intellectual will against the grain of how minds work.", "id": "fc09"}, {"front": "Where and approximately when was the numerical zero developed?", "back": "The numerical zero developed in India, probably in the fifth century CE. The critical moment is traditionally associated with Brahmagupta (598–668 CE) and his 628 CE treatise, though the concept likely predates him.", "id": "fc10"}, {"front": "Why did the Babylonians need any kind of zero marker at all?", "back": "Their sexagesimal (base-60) positional notation required distinguishing between values in different columns — e.g., between 3 and 300. Without a marker for empty columns, numbers in positional systems become ambiguous.", "id": "fc11"}, {"front": "What legacy did Babylonian base-60 arithmetic leave in modern life?", "back": "The division of hours into 60 minutes and circles into 360 degrees — both still in daily use — are direct inheritances from Babylonian sexagesimal arithmetic.", "id": "fc12"}, {"front": "What error did Brahmagupta make in his treatment of zero?", "back": "He incorrectly defined zero divided by zero as equaling zero. The text notes this is 'simply wrong' and that mathematics would spend centuries sorting it out — but credits his getting most of zero right as still remarkable for 628 CE.", "id": "fc13"}, {"front": "According to the text, what becomes possible only after zero is accepted as a number?", "back": "Algebra, calculus, and software — the entire edifice of modern quantitative civilization. The text states: 'You can do algebra. You can do calculus. You can write software.' None of this is possible with only a placeholder zero.", "id": "fc14"}, {"front": "What does the text mean by calling zero 'a fiction'?", "back": "Zero is not found in nature — it must be invented. It is a human decision to treat absence as a mathematical entity. The text says 'The entire edifice of modern quantitative civilization rests, at its base, on a fiction: the idea that nothing is a number.'", "id": "fc15"}, {"front": "How did the resistance to zero in Europe eventually dissolve?", "back": "Under the weight of practical necessity. Italian merchants adopted Hindu-Arabic numerals because they made calculation vastly easier. By the sixteenth century, zero was everywhere in European mathematics. The text generalizes: 'resistance to useful tools generally [crumbles] under the weight of practical necessity.'", "id": "fc16"}, {"front": "Scenario: A medieval scholar argues that 'nothingness cannot be a number because numbers quantify things that exist.' Using the text's logic, how would you respond?", "back": "You would explain that zero is not discovered but invented — it is a conceptual decision to treat absence as a kind of presence, to assign it a name and arithmetic rules. The scholar's objection is exactly the philosophical resistance the text describes; the power of zero is precisely that it overcomes this intuition.", "id": "fc17"}, {"front": "Scenario: A company uses spreadsheet software where empty cells are always treated as blank — the software cannot perform arithmetic on 'nothing.' What does the text suggest is missing from this system?", "back": "It has only a 'placeholder zero' — a typographical blank — not a numerical zero. Without a numerical zero that can participate in calculations, the system cannot perform the full range of arithmetic that modern computing requires, echoing the Babylonian limitation.", "id": "fc18"}, {"front": "What does the text suggest is the lasting cultural significance of the 'division by zero' software error?", "back": "It is a modern expression of the anxiety zero has always generated — the text says the unease 'migrated from theology to philosophy' and then to the moment when a computer 'seems to briefly stare into the void.' The conceptual vertigo around nothingness never fully disappeared; it just changed form.", "id": "fc19"}, {"front": "How does the Specimen box classify zero's 'danger level,' and what two dangers does it identify?", "back": "'Moderate to high.' The two dangers: (1) division by zero remains undefined, and (2) zero's philosophical implications troubled medieval European theology for centuries.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
