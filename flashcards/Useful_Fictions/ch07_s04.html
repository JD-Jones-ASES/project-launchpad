<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 7, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "Who was Alfred Korzybski, and what field did he found?", "back": "A Polish-American engineer and philosopher who published Science and Sanity (1933) and founded general semantics — a practical discipline for improving human reasoning by clarifying the relationship between language and reality.", "id": "fc01"}, {"front": "What is Korzybski's central observation about human cognition?", "back": "Human beings routinely mistake their representations of reality for reality itself. We respond to the symbol as if it were the thing symbolized — reacting to the word 'cancer' with physiological fear even in a crossword puzzle, or treating a mental model of a situation as the situation itself.", "id": "fc02"}, {"front": "What did Korzybski call the pathological collapse of the map-territory distinction?", "back": "Identification — the error of responding to a representation with all the emotional and behavioral intensity that the actual reality would warrant, as if the map and territory were the same.", "id": "fc03"}, {"front": "How does the text say propaganda works according to Korzybski's framework?", "back": "Propaganda works by identification: it gives you a map of the enemy so vivid and total that you stop seeing the territory behind it. You then respond to the representation with the emotional intensity appropriate to actual people — which is exactly the response the propagandist wants.", "id": "fc04"}, {"front": "What is reification?", "back": "From the Latin 'res' (thing): the cognitive move of treating an abstraction as if it were a concrete object — stable, bounded, with fixed properties that can be measured, manipulated, and acted upon. Examples: treating 'the company' as an entity with preferences; treating 'what France wants' as the unambiguous preference of a single agent.", "id": "fc05"}, {"front": "Give three examples of reification from the Specimen box.", "back": "Treating 'the economy' as an organism that must be kept healthy; treating 'IQ' as a thing inside your head rather than a score on a test; treating 'the market' as an agent with preferences; treating diagnostic categories as natural kinds rather than administrative conventions.", "id": "fc06"}, {"front": "What is the 'tell' that identifies reification, according to the Specimen box?", "back": "When someone says 'the market demands,' 'science says,' or 'human nature requires' — ask whether what follows is a description of a reality or a defense of a map.", "id": "fc07"}, {"front": "Who was Robert McNamara, and what did he believe about measurement?", "back": "Secretary of Defense under Kennedy, former Ford Motor Company executive, World War II statistical officer. He believed that any operation that could not be measured could not be managed — and that any operation that could be measured could be. He applied this to the Vietnam War.", "id": "fc08"}, {"front": "What was the body count metric in Vietnam, and why did it fail?", "back": "The primary measure of progress: enemy soldiers killed, reported daily, briefed to the President. It failed because commanders were evaluated on it and optimized it: inflating confirmed kills, counting civilians as combatants, planting weapons near bodies. The metric decoupled from the reality it was supposed to represent.", "id": "fc09"}, {"front": "State Yankelovich's four-step definition of the McNamara Fallacy.", "back": "(1) Measure whatever can be easily measured. (2) Disregard what can't be easily measured or give it an arbitrary quantitative value. (3) Presume what can't be easily measured isn't important. (4) Say what can't be measured really doesn't exist. Each step is individually defensible; the sequence produces confident ignorance.", "id": "fc10"}, {"front": "What is 'teaching to the test,' and how does the text classify it?", "back": "When standardized test scores become the primary metric for evaluating schools and teachers, institutions optimize for the test: narrowing curricula, practicing tested formats, neglecting untested skills. It is the educational analogue of the McNamara Fallacy — a proxy measure acquiring authority and displacing the underlying goal.", "id": "fc11"}, {"front": "What other institutions does the text say exhibit the McNamara Fallacy pattern?", "back": "Hospital ranking systems (optimize for ranking metrics), academic departments (optimize for citation counts), corporations (optimize for quarterly earnings per share), and social media profiles (optimize for engagement metrics). Any system in which a proxy measure acquires institutional authority.", "id": "fc12"}, {"front": "What does the text mean by 'the territory begins to reshape itself in the map's image'?", "back": "When a metric acquires authority, the systems it measures adjust their behavior to score better on the metric — not because they have genuinely improved, but because they have learned to look better on the map. The representation gains causal power over the reality it was supposed to passively describe.", "id": "fc13"}, {"front": "What is the 'recursive problem' with the map-territory framework?", "back": "The map-territory distinction is itself a map — a meta-representation subject to all the same distortions it was designed to diagnose. It can be reified (treated as fixed metaphysical truth), misapplied (the distinction is illuminating in some contexts and misleading in others), and can itself become the identification it was meant to prevent.", "id": "fc14"}, {"front": "How does the LinkedIn profile example illustrate the recursive map problem?", "back": "A LinkedIn profile is a map of a professional self. But the person adjusts behavior to match the profile, pursues profileable accomplishments, and develops skills the framework makes visible while neglecting those it has no field for. The map shapes the territory; the territory shapes the next map. The self is substantially navigated into existence by a series of maps.", "id": "fc15"}, {"front": "What does 'the goal is not to stop making maps; it is to stop worshipping them' mean?", "back": "Representation is inescapable — you must model reality to navigate it. Korzybski's insight does not recommend abstaining from representation. It recommends a calibrated relationship: knowing what each map was designed to show and what it omits, and keeping the possibility of a better map always open.", "id": "fc16"}, {"front": "How does the text describe general semantics?", "back": "Korzybski's 1933 practical discipline for improving human reasoning by clarifying the relationship between language and reality. The text notes that 'most of the thousand pages have not aged well' but that the central observation — identification as the root of confusion and conflict — has endured.", "id": "fc17"}, {"front": "Why does the cost of reification include making abstractions 'resistant to revision'?", "back": "When an abstraction is treated as a concrete object with fixed properties, its constructed nature is hidden. What is actually a political or social decision appears to be a natural constraint — making it harder to challenge or revise the underlying decision.", "id": "fc18"}, {"front": "What does the text say Korzybski's framework 'cannot quite contain' about the recursive problem?", "back": "The moment you invoke the map-territory distinction, you create a meta-map — a representation of the relationship between representation and reality. This meta-map is subject to all the same distortions as any other map: reification, misapplication, and the potential to become the very identification it was designed to prevent.", "id": "fc19"}, {"front": "What practical insight does awareness of the map-territory distinction give the navigator?", "back": "Not certainty — the feeling of touching reality — but navigational skill: understanding what each tool was designed to show and what it was designed to omit, and keeping the possibility of a better map always open. The distinction shifts you from map-worshipper to map-user.", "id": "fc20"}, {"front": "Apply the McNamara Fallacy to a university's use of citation counts to evaluate research quality.", "back": "If departments are evaluated primarily on citations, faculty will optimize for citation-generating behavior: citing each other, publishing in high-traffic journals, working on fashionable topics. Research that is original, slow to be recognized, or in underserved areas will be deprioritized — the metric rises while research quality may not improve.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
