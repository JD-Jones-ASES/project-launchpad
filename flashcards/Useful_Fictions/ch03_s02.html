<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 3, Section 2</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What is William Paley's 'watchmaker argument' and why did the text call it 'genuinely compelling'?", "back": "Paley argued (Natural Theology, 1802) that just as finding a watch implies a watchmaker, finding a living organism — vastly more complex and intricately fitted than any watch — implies a designer. The text calls it tight because it is formally valid; it fails only because Darwin discovered a mechanism Paley couldn't have known about.", "id": "fc01"}, {"front": "Why does Paley's argument fail, according to the text?", "back": "Not because it is badly reasoned, but because natural selection — a process nobody had described yet in 1802 — produces exactly the appearance of design without requiring a designer. The argument's premise (only design produces functional complexity) turned out to be false.", "id": "fc02"}, {"front": "What does the text mean by 'Darwin's Great Inversion'?", "back": "Darwin replaced purposive explanations (design, intention, intelligence) with a mechanical one (differential reproduction over geological time). Just as Torricelli replaced Aristotle's purposive physics with mechanical atmospheric pressure, Darwin replaced the need for a designer with a mindless process that mimics design.", "id": "fc03"}, {"front": "How does the text describe what natural selection 'actually is' versus what it 'sounds like'?", "back": "What it actually is: a differential equation — the proportion of a heritable variant in a population changes over time in proportion to its effect on reproductive success. What it sounds like: organisms striving, adapting, competing, trying to survive. The gap between these is the fictional element.", "id": "fc04"}, {"front": "What is teleological language in biology, and give three examples from the text?", "back": "Language attributing purpose or goal-directedness to biological processes. Examples: 'The peacock's tail evolved to attract females.' 'The eye is designed to focus light.' 'White blood cells seek out and destroy pathogens.' All are technically inaccurate — evolution has no purposes, white blood cells obey chemical gradients.", "id": "fc05"}, {"front": "What does 'teleology' mean, and what is it a shorthand for in evolutionary biology?", "back": "Teleology is the attribution of purpose, goal, or end-directedness to a process. In biology, it is shorthand for a longer mechanistic description: 'the eye evolved to see' compresses 'organisms with more effective visual systems had higher reproductive success, so effective visual systems became more common over evolutionary time.'", "id": "fc06"}, {"front": "Why does the text say even Darwin himself used teleological language 'constantly'?", "back": "Because it is 'genuinely difficult to think about selection without using intentional language.' The fiction persists not from ignorance but because the human mind finds it nearly impossible to reason about mindless optimization processes without smuggling in agency.", "id": "fc07"}, {"front": "What is Daniel Dennett's 'intentional stance'?", "back": "The strategy of treating a system as if it had beliefs, desires, and goals because doing so lets you predict its behavior — often more effectively than tracking actual mechanisms. We predict a chess computer's next move by asking what a rational player would do, not by tracing electron paths through silicon.", "id": "fc08"}, {"front": "What does the intentional stance reveal about useful fictions?", "back": "That a fiction can earn its keep by being predictively effective without being literally true. The intentional stance works — it generates accurate predictions — but it doesn't tell you the truth about what is actually happening inside the system.", "id": "fc09"}, {"front": "Are genes literally selfish, according to the text?", "back": "No. A gene is a sequence of nucleotides; it has no preferences, desires, or stake in the future. Dawkins himself said so explicitly. 'Selfish gene' is an 'as if' framework — genes behave as if selfish — not a literal description.", "id": "fc10"}, {"front": "What specific biological phenomena does the selfish gene framework successfully predict?", "back": "It predicts altruism among genetic relatives, explains why parents invest more in offspring than in siblings, and illuminates conflicts between parents and offspring, between different copies of the same gene in different bodies, and between genes and the organisms that carry them.", "id": "fc11"}, {"front": "Why does the 'selfish gene' fiction persist despite Dawkins' explicit disclaimer?", "back": "Because the phrase is vivid, narratively satisfying, and good at generating testable predictions — more useful than the accurate but cumbersome alternative ('the gene whose frequency in a population increases because organisms carrying it have higher inclusive fitness'). This is the mark of a successful fiction.", "id": "fc12"}, {"front": "What is the 'dangerous slide' the text warns about in connection with the selfish gene?", "back": "The move from 'as if' to 'actually': from 'genes behave as if selfish' to 'selfishness is the fundamental fact of nature — cooperation is impossible and altruism is always disguise.' This arrives somewhere Dawkins never intended and cannot explain the enormous cooperation and mutualism the territory actually contains.", "id": "fc13"}, {"front": "What does it mean to 'mistake the map for the territory' in the context of the selfish gene?", "back": "To treat the analytical framework ('selfish gene') as a literal description of reality, forgetting it is a tool for thinking. The map (selfish gene metaphor) is useful for navigation; mistaking it for the territory (the actual world) leads to false conclusions — like thinking cooperation is impossible.", "id": "fc14"}, {"front": "What is the Specimen classification for Natural Selection, and what is its Danger level?", "back": "Classification: 'Biological mechanism / Explanation-fiction for functional design.' The fictional element is all intentional language about selection: organisms don't 'try' anything; the process has no foresight, goals, or direction. The danger: even careful scientists use the teleological shorthand, risking its literalization.", "id": "fc15"}, {"front": "How does the text characterize the relationship between Darwin and Paley?", "back": "Paley identified the explanatory problem (functional complexity implies design) correctly; Darwin solved it with a mechanism Paley lacked. 'The appearance of purpose is real. The purpose itself is fiction.' Darwin didn't disprove Paley's observation — he explained it without the designer.", "id": "fc16"}, {"front": "Apply the section's argument: Why is 'organisms evolved eyes to see' problematic despite being standard biology textbook language?", "back": "It implies a goal (seeing) that the evolutionary process never had. The mechanistically accurate version: organisms with more effective visual systems left more offspring, so over time effective visual systems became more common. 'To see' ascribes purpose to a process of differential reproduction that operates with no purposes at all.", "id": "fc17"}, {"front": "What is 'inclusive fitness' and why does it matter for the selfish gene framework?", "back": "Inclusive fitness is the measure of an organism's genetic success that counts not just its own offspring but also the offspring of genetic relatives (weighted by degree of relatedness). The selfish gene framework's accurate but cumbersome alternative invokes it: 'the gene whose frequency increases because carriers have higher inclusive fitness.'", "id": "fc18"}, {"front": "What is the chapter's underlying theme that this section illustrates?", "back": "That the most powerful explanatory fictions in science (natural selection, selfish gene) work precisely by importing intentionality into agentless mechanical processes. The fiction earns its keep analytically but creates a persistent risk: the 'as if' slides to 'actually,' and the map is mistaken for the territory.", "id": "fc19"}, {"front": "The text says 'The appearance of purpose is real. The purpose itself is fiction.' What does this mean?", "back": "It means the functional complexity and apparent design in organisms (the peacock's tail is really useful for attracting mates; the eye really does focus light) are genuine observable facts. But the process that produced them had no purpose, foresight, or goal — the appearance of design was produced by mindless differential reproduction.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
