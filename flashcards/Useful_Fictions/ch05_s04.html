<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 5, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "What did the 1990 U.S. Clean Air Act Amendments create to reduce sulfur dioxide emissions?", "back": "A cap-and-trade market. Each power plant received annual permits for a fixed tonnage of SO₂. Plants cutting emissions below their allocation could sell surplus permits; those finding cleanup expensive could buy permits instead. The total cap declined over time, ensuring aggregate reductions.", "id": "fc01"}, {"front": "Why was the U.S. sulfur dioxide market considered a success, and what lesson did economists draw from it?", "back": "Acid rain declined dramatically; emissions fell faster and more cheaply than projected. Economists concluded market mechanisms can solve environmental problems more efficiently than command-and-control regulation — a lesson then applied to climate change.", "id": "fc02"}, {"front": "What conceptual operation does a cap-and-trade system perform?", "back": "It turns pollution into a commodity. The right to emit a ton of carbon dioxide becomes a tradeable asset with a market price. The cap limits total permitted emissions; trade allocates them to whoever values them most, as measured by willingness to pay.", "id": "fc03"}, {"front": "What is the EU Emissions Trading System (EU ETS), and how large is it?", "back": "The world's largest carbon market, launched in 2005. Covers power plants, industrial facilities, and aviation within the European Economic Area (since 2012). Covers roughly 40 percent of EU greenhouse gas emissions. Entities surrender one permit per ton of CO₂ equivalent emitted.", "id": "fc04"}, {"front": "Why does the text call the carbon credit 'a particularly pure example' of a useful fiction?", "back": "A right to emit one ton of CO₂ did not exist before the law created it, has no physical form, and represents a social permission slip created by collective agreement. Nobody physically prevents an uncredentialed emitter from emitting — the fiction makes a formerly free action priced.", "id": "fc05"}, {"front": "What is a carbon offset, and what accounting logic underpins it?", "back": "A certificate representing verified emissions avoided elsewhere — e.g., planting trees or preserving a forest. The logic: a ton of carbon not emitted in Brazil offsets a ton emitted in Ohio, because the atmosphere is global and does not distinguish the source of a molecule.", "id": "fc06"}, {"front": "What is 'additionality' in offset markets?", "back": "The requirement that an offset project represent emissions reductions that would NOT have occurred without the offset payment. A forest that was never going to be cut does not offset anything — it is counterfactual carbon, a notional reduction in a hypothetical future.", "id": "fc07"}, {"front": "What did a 2023 investigation by the Guardian, Zeit Online, and SourceMaterial find about Verra's rainforest offsets?", "back": "More than 90 percent of Verra's rainforest offset credits — the dominant standard in the voluntary carbon market — represented 'phantom credits' not supported by actual emission reductions.", "id": "fc08"}, {"front": "How does the phantom-credit problem illustrate Goodhart's Law?", "back": "Once offset certification became a commodity with a price, the incentive to produce certified reductions overwhelmed the incentive to produce actual reductions. The accounting detached from physical reality, exactly as Goodhart's Law predicts when a measure becomes a target.", "id": "fc09"}, {"front": "What are ESG scores, and who assigns them?", "back": "Ratings of companies on Environmental, Social, and Governance dimensions, assigned by firms including MSCI, Sustainalytics, and Bloomberg. Used by asset managers for 'sustainable investing' products, by regulators, and by boards. In 2020, assets under ESG mandates reportedly exceeded $35 trillion.", "id": "fc10"}, {"front": "What is the correlation problem with ESG ratings?", "back": "A 2019 MIT Sloan study found the average correlation between different agencies' ESG ratings of the same company is 0.61 — far below bond credit rating agencies' correlation of ~0.99. ESG scores construct corporate virtue differently; they do not describe a pre-existing attribute.", "id": "fc11"}, {"front": "What is 'commensurability' as a philosophical thesis?", "back": "The thesis that all values can be ranked on a single scale and compared — that morally relevant quantities can be reduced to a common unit and traded off. Carbon markets, ESG scores, and the felicific calculus all presuppose commensurability.", "id": "fc12"}, {"front": "What does Elizabeth Anderson argue about commensurability?", "back": "That it is false for some morally important comparisons. Some values are incommensurable — not just different in amount but different in kind — such that ranking them on a single scale necessarily misrepresents at least one of them. The love of a parent for a child is not a large quantity of the same thing as gustatory pleasure.", "id": "fc13"}, {"front": "If a ton of carbon is atmospherically equivalent regardless of source, why does the text still object to the Ohio-Indonesia offset?", "back": "The atmospheric commensurability may be true, but the text argues commensurability in atmospheric terms does not exhaust the relevant moral comparison. The moral dimensions of burning coal in Ohio versus preserving a forest in Indonesia are not captured by the single unit of 'tons CO₂ equivalent.'", "id": "fc14"}, {"front": "What does the text call 'the layers' of the carbon credit fiction?", "back": "A legal right (the permit) → representing an atmospheric permission (a ton of CO₂) → that may not correspond to atmospheric reality (if offsets are fraudulent) → intended to produce a moral outcome (stable climate) → via a market mechanism → that may or may not align economic incentives with atmospheric reality.", "id": "fc15"}, {"front": "What is the text's final warning about the carbon market?", "back": "'The books may balance. The atmosphere does not care about the books.' A well-maintained accounting system is not the same as a well-functioning physical intervention — rich-country institutions may feel virtuous while the planet continues to warm.", "id": "fc16"}, {"front": "What does cap-and-trade assume about the relationship between price and behavior?", "back": "That making formerly free externalities visible in financial terms changes behavior: once emitting has a cost, actors will invest in abatement up to the point where the cost of further reduction exceeds the cost of buying a permit. The fiction (the permit market) is intended to do something real (reduce emissions).", "id": "fc17"}, {"front": "How does the ESG score illustrate the same accounting impulse as indulgences?", "back": "Both apply commercial accounting logic to moral evaluation. Indulgences assigned a price to moral debt and issued certificates of cancellation; ESG scores assign numerical ratings to corporate virtue. In both cases, a complex moral reality is reduced to a tradeable metric with institutional authority.", "id": "fc18"}, {"front": "Can a company emit carbon in Ohio and pay for a forest in Indonesia to make the net atmospheric impact zero? What is the philosophical problem?", "back": "Atmospherically the accounting may be sound (a ton is a ton globally). But moral commensurability — whether the two actions are equivalent in all morally relevant senses — is almost certainly false. The accounting system says yes; common moral intuition is less certain.", "id": "fc19"}, {"front": "What does the text suggest distinguishes carbon credits that 'do something right' from those that 'do something wrong'?", "back": "Right: makes formerly invisible externalities visible in financial terms; creates economic incentives aligned with atmospheric goals (when the system works). Wrong: suggests any amount of emission is acceptable provided the paperwork is correct — reducing a physical problem to a bookkeeping exercise.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
