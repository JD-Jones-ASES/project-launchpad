<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Fictions: A Field Guide &mdash; Flashcards &mdash; Scholastica Codex</title>
    <link rel="stylesheet" href="../../styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script>
    MathJax = {
        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea','code'] }
    };

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 3, Section 1</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-credits">
                    <p>Content licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/" class="cc-link" target="_blank">CC BY-SA 4.0</a> &mdash; Copyright &copy; 2025&ndash;2026 JD Jones</p>
                    <p style="margin-top:0.5rem; font-size:0.85rem;">Uses <a href="https://developers.google.com/youtube/v3" target="_blank" style="color: var(--secondary-color);">YouTube Data API v3</a>. <a href="../../privacy.html" style="color: var(--secondary-color);">Privacy Policy</a></p>
                </div>
            </div>
        </div>
    </footer>
    <script>
    var CARDS = [{"front": "How many times did Adam Smith use the phrase 'invisible hand' in all his published writing?", "back": "Exactly three times: once in The Theory of Moral Sentiments (1759), once in The Wealth of Nations (1776), and once in an early essay on the history of astronomy.", "id": "fc01"}, {"front": "What was the original, limited context of the 'invisible hand' in The Wealth of Nations?", "back": "A single paragraph on why domestic capital investment tends to exceed foreign investment even when foreign returns appear higher — an observation about risk aversion and home-country bias, not a general theory of market self-organization.", "id": "fc02"}, {"front": "What does the phrase 'in this, as in many other cases' in Smith's original sentence reveal about his intent?", "back": "It quietly concedes there are other cases where self-interested action does not produce socially optimal outcomes. Smith was hedging — he wrote 'sometimes,' not 'always.'", "id": "fc03"}, {"front": "What was Adam Smith's professional identity, and why does it matter for interpreting the invisible hand?", "back": "Smith was a professor of moral philosophy, not an advocate for unconstrained markets. He wrote extensively about monopoly dangers, legitimate government regulation, and the moral hazards of letting merchants set their own rules.", "id": "fc04"}, {"front": "What is 'hypersensitive agency detection,' and who coined the term?", "back": "Coined by cognitive scientist Paul Bloom, it describes the evolved human tendency to find intention and purpose everywhere — even where none exists. It originated as a survival skill (detecting predators) and now drives us to perceive agents in impersonal systems.", "id": "fc05"}, {"front": "How does the invisible hand metaphor satisfy hypersensitive agency detection while maintaining scientific respectability?", "back": "It doesn't claim a god arranges the market; it says 'it's as if a hand were arranging it' — hedged enough to sound scientific, but still invoking the cognitive shape of intentional guidance that our agency-detection drive craves.", "id": "fc06"}, {"front": "Trace the four-step semantic slide the text identifies in the use of the invisible hand metaphor.", "back": "1) 'It's as if a hand were doing this.' 2) 'A hand is doing this.' 3) 'The hand always does this.' 4) 'Interfering with the hand is therefore sacrilege.' Each step drops a hedge present in the previous one.", "id": "fc07"}, {"front": "What does the textbook mean when it calls the invisible hand 'a carefully hedged theological claim wrapped in economic language'?", "back": "The metaphor smuggles in the cognitive structure of divine Providence (a guiding intelligence behind apparent chaos) while using economic rather than religious vocabulary — making the same agency-implying claim in a scientifically respectable register.", "id": "fc08"}, {"front": "What is the textbook's term for the process by which the invisible hand became an axiom of political theology?", "back": "The text calls it how 'useful fictions metastasize' — each step small and individually defensible, but the cumulative journey enormous, from a cautious observation about domestic investment to a justification for abolishing rent control and public education.", "id": "fc09"}, {"front": "Why does the text say the invisible hand's transformation is 'especially instructive'?", "back": "Because the mechanism is transparent: we can read what Smith wrote, compare it to what successors claimed he wrote, and watch the fiction grow. The textual evidence of the gap is unusually clear.", "id": "fc10"}, {"front": "What do the alternative terms 'network,' 'process,' 'equilibrium,' and 'gradient' lack that 'hand' supplies?", "back": "Intentionality and agency. A hand implies guidance, direction, and someone in charge. The alternatives describe mechanisms without implying a guiding intelligence, which is why 'hand' is more emotionally and cognitively resonant — and more dangerous.", "id": "fc11"}, {"front": "What does the textbook mean by calling market self-organization 'genuine and remarkable' while also calling the invisible hand problematic?", "back": "Market coordination of millions of decisions, price signals conveying distributed information, supply-demand balance without central orders — these are real phenomena. The problem is not the phenomenon but the metaphor: 'invisible hand' adds a fictional agent to a real but agentless process.", "id": "fc12"}, {"front": "What aspect of Adam Smith is systematically omitted in libertarian uses of his metaphor?", "back": "Smith's warnings about 'the mean rapacity, the monopolizing spirit of merchants,' his support for government regulation of commerce, and his view that merchants should never govern — the skeptic and moralist Smith who worried about unregulated commerce's effects on workers.", "id": "fc13"}, {"front": "Why does the invisible hand metaphor appear 'not as the climax of a sustained argument' in The Wealth of Nations?", "back": "Because Smith used it as an incidental observation about one specific phenomenon (domestic vs. foreign investment preferences), not as a theoretical centerpiece. Later readers elevated it retroactively to a foundational principle it was never meant to be.", "id": "fc14"}, {"front": "What evolutionary logic explains why humans prefer to see agents behind impersonal processes?", "back": "For most of human evolutionary history, detecting agents (predators, enemies) was critical for survival. Better to see a hundred phantom agents than miss one real lion. This produced a cognitive bias toward perceiving intention and guidance even in agentless systems.", "id": "fc15"}, {"front": "Apply the text's analysis: A CEO says 'the market will naturally reward innovation without any need for government R&D policy.' What fiction is at work?", "back": "The CEO is committing the slide from 'sometimes self-interest produces good outcomes' to 'the hand always produces optimal outcomes.' The hedged original observation (Smith's 'in this, as in many other cases') has been converted into an absolute guarantee — the useful fiction has metastasized.", "id": "fc16"}, {"front": "What is the 'Specimen' classification for the Invisible Hand in the text?", "back": "'Economic metaphor / Ideological anchor' — its original scope was the tendency of domestic capital investment to exceed foreign investment; its current usage is a general claim that uncoordinated self-interested action produces socially optimal outcomes. Danger level: High.", "id": "fc17"}, {"front": "Why does the textbook call the invisible hand 'not an anomaly' but 'the normal shape of a certain kind of human thought'?", "back": "Because the same move — describing an agentless process in agent-implying language — appears in biology (natural selection 'designing' organisms), social theory (history 'moving toward' justice), and theology (Providence guiding events). The invisible hand is one instance of a pervasive cognitive pattern.", "id": "fc18"}, {"front": "What is the 'Danger level: High' judgment based on, according to the Specimen box?", "back": "The gap between what Smith actually meant (a limited observation about domestic investment preferences) and what the metaphor is made to mean (a universal guarantee of market optimality) is wide enough to drive an entire political philosophy through — and has been.", "id": "fc19"}, {"front": "How does the text connect the invisible hand to the chapter's broader theme of 'fictions of agency without agents'?", "back": "The invisible hand is the paradigm case: a real coordination phenomenon (markets) that genuinely lacks a central coordinator, described with a metaphor that imports agency anyway. The same structure recurs in natural selection, emergence, and teleological history — the chapter's other main cases.", "id": "fc20"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
