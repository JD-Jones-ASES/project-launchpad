        tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },

    <style>
        .fc-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }
        .fc-breadcrumb {
            margin-bottom: 2rem;
        }
        .fc-breadcrumb a {
            color: var(--secondary-color);
            text-decoration: none;
            font-family: 'Crimson Text', serif;
            border: 1px solid var(--secondary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .fc-breadcrumb a:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Card */
        .fc-card-wrapper {
            perspective: 1000px;
            margin: 2rem auto;
            cursor: pointer;
            user-select: none;
        }
        .fc-card {
            position: relative;
            width: 100%;
            min-height: 280px;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .fc-card.flipped {
            transform: rotateY(180deg);
        }
        .fc-face {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            font-size: 1.15rem;
            line-height: 1.7;
        }
        .fc-front {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 8px 24px var(--shadow-light);
        }
        .fc-back {
            background: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
            border-color: var(--primary-color);
        }
        .fc-label {
            position: absolute;
            top: 0.75rem;
            left: 1rem;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08rem;
            opacity: 0.5;
        }
        .fc-front .fc-label { color: var(--text-secondary); }
        .fc-back .fc-label { color: rgba(255,255,255,0.6); }
        .fc-tap-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 1rem;
            font-size: 0.75rem;
            opacity: 0.4;
            font-style: italic;
        }

        /* Controls */
        .fc-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .fc-btn {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--secondary-color);
            border-radius: 6px;
            background: transparent;
            color: var(--secondary-color);
            font-family: 'Crimson Text', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .fc-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .fc-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        .fc-btn:disabled:hover {
            background: transparent;
            color: var(--secondary-color);
        }
        .fc-counter {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            min-width: 80px;
        }

        /* Progress bar */
        .fc-progress {
            width: 100%;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 1rem 0 0.5rem;
            overflow: hidden;
        }
        .fc-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Toolbar */
        .fc-toolbar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .fc-tool {
            padding: 0.35rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fc-tool:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        .fc-tool.active {
            background: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        /* Keyboard hint */
        .fc-keys {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .fc-keys kbd {
            background: #f5f0e8;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border-color);
            font-family: monospace;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .fc-face {
                font-size: 1rem;
                padding: 2rem 1.5rem;
                min-height: 220px;
            }
            .fc-controls {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="hero-section" style="padding: 2rem 0;">
        <div class="container">
            <div class="hero-content">
                <h1 class="main-title" style="font-size: 2.5rem;">FLASHCARDS</h1>
                <p class="subtitle">Useful Fictions: A Field Guide &mdash; Chapter 3, Section 4</p>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="container">
            <div class="fc-container">
                <div class="fc-breadcrumb">
                    <a href="../../courses/Useful_Fictions.html">&larr; Back to Useful Fictions: A Field Guide</a>
                </div>

                <div class="fc-progress">
                    <div class="fc-progress-bar" id="progressBar" style="width: 0%"></div>
                </div>

                <div class="fc-card-wrapper" id="cardWrapper" onclick="flipCard()">
                    <div class="fc-card" id="card">
                        <div class="fc-face fc-front">
                            <span class="fc-label">Question</span>
                            <div id="frontText"></div>
                            <span class="fc-tap-hint">click to flip</span>
                        </div>
                        <div class="fc-face fc-back">
                            <span class="fc-label">Answer</span>
                            <div id="backText"></div>
                        </div>
                    </div>
                </div>

                <div class="fc-controls">
                    <button class="fc-btn" id="prevBtn" onclick="prevCard()">&larr; Prev</button>
                    <span class="fc-counter" id="counter">1 / 1</span>
                    <button class="fc-btn" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
                </div>

                <div class="fc-toolbar">
                    <button class="fc-tool" onclick="shuffleDeck()">Shuffle</button>
                    <button class="fc-tool" onclick="resetDeck()">Reset</button>
                </div>

                <div class="fc-keys">
                    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&bull;&nbsp;
                    <kbd>Space</kbd> flip &nbsp;&bull;&nbsp;
                    <kbd>S</kbd> shuffle
                </div>
            </div>
        </div>
    </main>

        <div class="container">

    <script>
    var CARDS = [{"front": "Who originated the phrase 'the arc of the moral universe is long, but it bends toward justice'?", "back": "It originated with Unitarian minister Theodore Parker in an 1853 sermon. Martin Luther King Jr. quoted it often and movingly in the 1960s. Most people who use it attribute it to King.", "id": "fc01"}, {"front": "What is the text's fundamental epistemic critique of 'the arc of the moral universe bends toward justice'?", "back": "It is a wish expressed in the grammatical form of a fact. The moral universe is under no empirical obligation to go anywhere in particular. There is no known mechanism bending it toward justice rather than indifference or entropy. The line is not a description.", "id": "fc02"}, {"front": "What is 'teleological history,' and why does the text call it one of the 'oldest and most tenacious useful fictions'?", "back": "The belief that history is going somewhere — that it has a direction, a destination, a plot. It is 'tenacious' because it appears in nearly every major religious and political tradition and persists even against strong counter-evidence, because its psychological function (making suffering bearable) is so powerful.", "id": "fc03"}, {"front": "What is providential history, and what example does the text give of it in American history?", "back": "Providential history: God guides events toward a divine purpose; all episodes are parts of a story God is writing. The Puritan settlers exemplified it: their 'errand into the wilderness' was a divinely commissioned mission; their suffering and success were both signs of divine attention.", "id": "fc04"}, {"front": "How is karma similar to providential history, and how does it differ?", "back": "Similarity: both hold that the universe is morally ordered and that bad things don't simply happen to good people — there are reasons, frameworks, rules. Difference: karma implies moral agency (your choices shape your future circumstances across lifetimes) rather than pure fatalism, and it operates at the individual rather than the collective level.", "id": "fc05"}, {"front": "List the seven variants of teleological history identified in the Specimen box.", "back": "Divine Providence (Christianity, Islam), karma (Hinduism, Buddhism), Manifest Destiny (American expansionism), the Whig interpretation of history, Hegelian dialectic, Marxist historical materialism, progressive inevitabilism.", "id": "fc06"}, {"front": "What is the Specimen classification for Historical Teleology, and what is its Danger level?", "back": "Classification: 'Narrative fiction / Civilizational organizing myth.' Core claim: History has a direction, purpose, or destination. Danger level: Very high. 'Teleological history has been used to justify almost every atrocity of the modern era by framing it as a necessary step toward an inevitable end.'", "id": "fc07"}, {"front": "What was the doctrine of Manifest Destiny, and how did teleological fiction function in its ideology?", "back": "Manifest Destiny held that American expansion was not conquest but fulfillment of a divine plan for a chosen nation. Teleological fiction converted moral choices (dispossession of indigenous peoples, annexation of Mexican territory) into historical inevitabilities — removing them from ordinary ethical evaluation. It provided 'conscience-salving narrative that made aggression feel like destiny.'", "id": "fc08"}, {"front": "What is 'Whig history' (Herbert Butterfield, 1931)?", "back": "A historiographical vice: reading history backwards from the liberal democratic present, tracing a triumphant narrative of Progress toward it. Events that led to where we are were inevitable and good; those that didn't are aberrations. It makes history useless as a guide because you can only see what confirmed the conclusion you already had.", "id": "fc09"}, {"front": "What was Marx's historical materialism, and what stages did it identify?", "back": "History moves through necessary stages driven by the internal contradictions of each mode of production: primitive communism → slave society → feudalism → capitalism → socialism → communism. The communist end-state was not merely desirable but inevitable — 'a destination inscribed in the logic of economic development.'", "id": "fc10"}, {"front": "Why did Marxist historical inevitability prove 'extremely dangerous in practice'?", "back": "If the destination is fixed and inevitable, then any action that accelerates arrival can be justified, however brutal. The logic of inevitability removes the brake of ordinary moral evaluation from actions taken 'in history's name.'", "id": "fc11"}, {"front": "What was the Cross-Reference connecting this section to Chapter 6 of the textbook?", "back": "The teleological fictions here — karma, Providence, History's Arc — all work by treating impersonal processes as if they had intentions. The invisible hand and the arc of history are 'cousins': both attribute purpose to purposeless processes. The cognitive operation is the same: finding an agent in a system that has none.", "id": "fc12"}, {"front": "What is William James's contribution to understanding why teleological fictions persist?", "back": "James observed that the human mind has a 'peculiar intolerance for meaninglessness.' We can endure suffering if we can place it in a story — answer 'what is this for?' What we cannot endure is suffering for nothing. Teleological fiction is an analgesic: it converts the unbearable (pointless evil) into the endurable (evil serving an unseen larger good).", "id": "fc13"}, {"front": "What does 'theodicy' mean, and how does it relate to teleological history?", "back": "Theodicy is the philosophical and theological attempt to reconcile a just God with a world full of unjust suffering. Teleological history is one form of theodicy: it provides a framework in which even extreme suffering has a place in a larger arc, giving it meaning within a moral universe.", "id": "fc14"}, {"front": "How did the Holocaust affect the Jewish theological tradition's engagement with teleological belief?", "back": "Rather than ending the tradition, it produced an explosion of it as theologians struggled with whether and how the arc still bent after Auschwitz. Responses ranged from abandoning traditional God-concepts to reformulating Providence. Almost nobody could conclude that the six million dead were 'statistically predictable consequences of industrialized tribalism with no further meaning' — the accurate conclusion the text calls 'almost unbearable.'", "id": "fc15"}, {"front": "Is 'the arc of the moral universe bends toward justice' falsifiable? What does this imply?", "back": "The text implies it is not clearly falsifiable — which means it may function not as a description of the world but as a declaration of how one wants to feel about it. This raises the question: is there a meaningful difference between a universe that actually bends toward justice and one in which believers are better equipped to act justly? Does the truth of the belief matter if the belief is productive?", "id": "fc16"}, {"front": "In what sense are teleological fictions 'productive and lethal in proportion to the same quality'?", "back": "Their unconditional confidence that they know where the story ends. This same certainty sustained the American civil rights movement through decades of defeat, and justified the Gulag by framing atrocities as necessary steps toward an inevitable destination. The productive and lethal uses draw from the same cognitive and motivational source.", "id": "fc17"}, {"front": "Apply: An activist says 'history is on our side' to sustain a movement through repeated failures. What is the text's dual assessment of this move?", "back": "It may be genuinely productive: teleological conviction can sustain resistance movements through decades of defeat when empirical evidence alone cannot. It is also potentially dangerous: it may prevent taking seriously the possibility that things are simply getting worse, and in extreme forms — 'history demands this' — can authorize any action as a necessary step toward an inevitable end.", "id": "fc18"}, {"front": "What does the text identify as the mechanism that teleological history requires to work?", "back": "A driver: God, karma, dialectical materialism, natural selection of ideas, progressive inevitabilism — some force that actually moves history toward the claimed destination. Without a plausible mechanism, the teleological claim is simply an assertion about the universe's intentions.", "id": "fc19"}, {"front": "How does the section connect to the chapter's overarching theme of 'fictions of agency without agents'?", "back": "Historical teleology is the grandest case: the universe itself becomes the agent, bending history toward a destination. The invisible hand operates in markets, natural selection in biology, emergence in social systems — all are agentless processes described in agent-implying terms. Historical teleology extends this to civilization and cosmic time, and with correspondingly higher stakes.", "id": "fc20"}, {"front": "What do Providence, karma, Manifest Destiny, and Marxist materialism all share, despite their vastly different content?", "back": "They all treat an impersonal process as if it had intentions — as if the universe means something, as if events are aimed somewhere. All provide meaning, justify suffering, motivate action, and either naturalize or delegitimize the existing order. All place individual lives within a larger story that gives them direction and purpose.", "id": "fc21"}];
    var originalOrder = CARDS.slice();
    var idx = 0;

    function render() {
        var card = CARDS[idx];
        document.getElementById('frontText').innerHTML = card.front;
        document.getElementById('backText').innerHTML = card.back;
        document.getElementById('counter').textContent = (idx + 1) + ' / ' + CARDS.length;
        document.getElementById('card').classList.remove('flipped');
        document.getElementById('prevBtn').disabled = (idx === 0);
        document.getElementById('nextBtn').disabled = (idx === CARDS.length - 1);
        document.getElementById('progressBar').style.width = ((idx + 1) / CARDS.length * 100) + '%';
        if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('flipped');
    }

    function nextCard() {
        if (idx < CARDS.length - 1) { idx++; render(); }
    }

    function prevCard() {
        if (idx > 0) { idx--; render(); }
    }

    function shuffleDeck() {
        for (var i = CARDS.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = CARDS[i]; CARDS[i] = CARDS[j]; CARDS[j] = tmp;
        }
        idx = 0;
        render();
    }

    function resetDeck() {
        CARDS = originalOrder.slice();
        idx = 0;
        render();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'Right') nextCard();
        else if (e.key === 'ArrowLeft' || e.key === 'Left') prevCard();
        else if (e.key === ' ') { e.preventDefault(); flipCard(); }
        else if (e.key === 's' || e.key === 'S') shuffleDeck();
    });

    /* Navigate to specific card by hash (e.g., #fc03) */
    var hash = location.hash;
    if (hash && hash.length > 1) {
        var targetId = hash.substring(1);
        for (var hi = 0; hi < CARDS.length; hi++) {
            if (CARDS[hi].id === targetId) { idx = hi; break; }
        }
    }
    render();
    </script>
</body>
</html>
